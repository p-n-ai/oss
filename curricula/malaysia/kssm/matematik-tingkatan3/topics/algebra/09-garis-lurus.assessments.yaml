  - id: Q14
    text: >-
      In a parallelogram $PQRS$, the gradient of $PQ$ is the same as $SR$, which is $\displaystyle\frac{1}{2}$.
      If $Q$ is $(0, h)$ and $P$ is $(-4, 6)$, determine the value of $h$.
    difficulty: hard
    learning_objective: 9.1.7
    answer:
      type: exact
      value: "8"
    working: |
      Since PQRS is a parallelogram, PQ is parallel to SR, so their gradients are equal.
      Gradient $PQ = \displaystyle\frac{1}{2}$
      Using the coordinates $P(-4, 6)$ and $Q(0, h)$ to calculate the gradient:
      $\displaystyle\frac{h - 6}{0 - (-4)} = \displaystyle\frac{1}{2}$
      $\displaystyle\frac{h - 6}{4} = \displaystyle\frac{1}{2}$
      Cross-multiply:
      $2(h - 6) = 4(1)$
      $2h - 12 = 4$
      $2h = 16$
      $h = 8$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Applies the gradient formula correctly: (h - 6) / (0 - (-4))."
      - marks: 1
        criteria: "Equates the gradient formula to 1/2."
      - marks: 1
        criteria: "Solves the equation correctly to find h = 8."
    hints:
      - level: 1
        text: >-
          Use the formula for gradient $m = \displaystyle\frac{y_2 - y_1}{x_2 - x_1}$
          with the points P and Q, and set it equal to $\displaystyle\frac{1}{2}$.

  - id: Q15
    text: >-
      A straight road connects town E $(-7, -1)$ and town F $(3, 3)$ on a Cartesian map.
      Determine the equation of the straight road connecting the two towns.
    difficulty: hard
    learning_objective: 9.1.7
    answer:
      type: exact
      value: "y = 2/5 x + 9/5"
    working: |
      Step 1: Calculate the gradient ($m$) using $E(-7, -1)$ and $F(3, 3)$.
      $m = \displaystyle\frac{3 - (-1)}{3 - (-7)} = \displaystyle\frac{4}{10} = \displaystyle\frac{2}{5}$
      
      Step 2: Determine the y-intercept ($c$) by substituting point $F(3, 3)$ into $y = mx + c$.
      $3 = (\displaystyle\frac{2}{5})(3) + c$
      $3 = \displaystyle\frac{6}{5} + c$
      $c = 3 - \displaystyle\frac{6}{5}$
      $c = \displaystyle\frac{15}{5} - \displaystyle\frac{6}{5} = \displaystyle\frac{9}{5}$
      
      Step 3: Write the equation.
      $y = \displaystyle\frac{2}{5}x + \displaystyle\frac{9}{5}$
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correctly identifies the need to find the gradient between two points."
      - marks: 1
        criteria: "Calculates the gradient correctly as 2/5 (or 0.4)."
      - marks: 1
        criteria: "Substitutes one of the points and the gradient to solve for c = 9/5 (or 1.8)."
      - marks: 1
        criteria: "Constructs the final equation y = 2/5x + 9/5."
    hints:
      - level: 1
        text: "You have two points. First, find the gradient between them. Then, use one of the points to find the y-intercept."
