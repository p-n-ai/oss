  - id: Q11
    text: "Determine whether the straight line $y = 3x + 5$ is parallel to the straight line $6x - 2y = 9$."
    difficulty: medium
    learning_objective: 9.1.4
    answer:
      type: exact
      value: "Yes, they are parallel."
    working: |
      For the first line, $y = 3x + 5$, the gradient is $3$.
      For the second line, convert $6x - 2y = 9$ into the form $y = mx + c$:
      $-2y = -6x + 9$
      $y = \displaystyle\frac{-6}{-2}x + \displaystyle\frac{9}{-2}$
      $y = 3x - 4.5$
      The gradient of the second line is also $3$.
      Since both lines have the same gradient ($m = 3$), they are parallel.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identifies the gradient of the first line is 3."
      - marks: 1
        criteria: "Rearranges the second equation and correctly identifies its gradient is 3."
      - marks: 1
        criteria: "Concludes they are parallel based on having equal gradients."
    hints:
      - level: 1
        text: "Parallel lines must have the exact same gradient. Convert the second equation to $y = mx + c$ to check its gradient."

  - id: Q12
    text: "Find the point of intersection of the straight lines $2x + y = 5$ and $x + 2y = 1$."
    difficulty: hard
    learning_objective: 9.1.6
    answer:
      type: exact
      value: "(3, -1)"
    working: |
      Using the substitution method:
      From the first equation: $y = 5 - 2x$  --- (1)
      Substitute (1) into the second equation:
      $x + 2(5 - 2x) = 1$
      $x + 10 - 4x = 1$
      $-3x = -9$
      $x = 3$
      Substitute $x = 3$ into (1):
      $y = 5 - 2(3)$
      $y = 5 - 6$
      $y = -1$
      Thus, the point of intersection is $(3, -1)$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correctly isolates one variable (e.g., y = 5 - 2x) OR matches coefficients for elimination."
      - marks: 1
        criteria: "Substitutes into the other equation to form a single-variable equation."
      - marks: 1
        criteria: "Correctly solves for the first variable (x = 3)."
      - marks: 1
        criteria: "Correctly solves for the second variable and states the coordinate point (3, -1)."
    hints:
      - level: 1
        text: "Use simultaneous equations. Try expressing $y$ from the first equation and substituting it into the second."

  - id: Q13
    text: "Determine the point of intersection of the straight lines $y = -8$ and $y = -4x + 12$."
    difficulty: medium
    learning_objective: 9.1.6
    answer:
      type: exact
      value: "(5, -8)"
    working: |
      Since the first equation gives $y = -8$, substitute this directly into the second equation:
      $-8 = -4x + 12$
      $4x = 12 + 8$
      $4x = 20$
      $x = 5$
      The y-coordinate is already known to be $-8$.
      Therefore, the point of intersection is $(5, -8)$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Substitutes y = -8 into the second equation."
      - marks: 1
        criteria: "Solves for x accurately to get x = 5."
      - marks: 1
        criteria: "Writes the final point of intersection as coordinates (5, -8)."
    hints:
      - level: 1
        text: "You already know the exact value of $y$ from the first equation. Plug it into the second equation to find $x$."

