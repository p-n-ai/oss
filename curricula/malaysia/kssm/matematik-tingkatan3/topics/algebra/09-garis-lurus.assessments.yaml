  - id: Q8
    text: "Determine whether the point $P(2, 8)$ lies on the straight line $y = 3x + 2$."
    difficulty: medium
    learning_objective: 9.1.3
    answer:
      type: exact
      value: "Yes"
    working: |
      Substitute $x = 2$ and $y = 8$ into the equation $y = 3x + 2$.
      Left side: $y = 8$
      Right side: $3(2) + 2 = 6 + 2 = 8$
      Since Left side = Right side, the point $P(2, 8)$ satisfies the equation.
      Therefore, $P(2, 8)$ lies on the straight line.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Substitutes x = 2 into the expression 3x + 2 and calculates 8."
      - marks: 1
        criteria: "Makes the correct conclusion that the point lies on the line."
    hints:
      - level: 1
        text: "Substitute the x-coordinate of the point into the equation. Does it give you the same value as the y-coordinate?"

  - id: Q9
    text: >-
      Ali substitutes the coordinates of point $R(1, 2)$ into the straight line equation $x + 2y = 4$.
      He finds that the left side equals $5$, while the right side equals $4$. Explain what this means
      regarding the position of point $R$.
    difficulty: medium
    learning_objective: 9.1.3
    answer:
      type: free_text
      value: "Point R does not lie on the straight line x + 2y = 4 because its coordinates do not satisfy the equation."
    working: |
      Substitute $x = 1, y = 2$ into the left side of $x + 2y = 4$.
      Left side = $1 + 2(2) = 5$
      Right side = $4$
      Since Left side $\neq$ Right side, the coordinates do not satisfy the equation.
      Thus, the point does not lie on the line.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Notes that the values indicate the coordinates do not satisfy the equation (Left $\neq$ Right)."
      - marks: 1
        criteria: "Makes the final inference that point R does not lie on the straight line."
    hints:
      - level: 1
        text: "For a point to be on a line, both sides of the equation must be perfectly equal. What happens if they are not?"

  - id: Q10
    text: >-
      Determine the equation of a straight line with a gradient of $\displaystyle\frac{1}{2}$
      and that passes through point $P(6, 8)$.
    difficulty: medium
    learning_objective: 9.1.5
    answer:
      type: exact
      value: "y = 1/2 x + 5"
    working: |
      Given gradient, $m = 1/2$.
      Substitute $m = 1/2, x = 6$, and $y = 8$ into $y = mx + c$ to find $c$.
      $8 = (\displaystyle\frac{1}{2})(6) + c$
      $8 = 3 + c$
      $c = 8 - 3$
      $c = 5$
      Therefore, the equation of the straight line is $y = \displaystyle\frac{1}{2}x + 5$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly substitutes the gradient m = 1/2 into the standard equation."
      - marks: 1
        criteria: "Substitutes the coordinates (6, 8) and correctly solves for c = 5."
      - marks: 1
        criteria: "States the full correct final equation."
    hints:
      - level: 1
        text: "You have $m$, $x$, and $y$. Plug them into $y = mx + c$ to find the missing intercept, $c$."

