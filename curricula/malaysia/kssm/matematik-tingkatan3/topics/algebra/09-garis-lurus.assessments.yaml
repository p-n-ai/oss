  # ---------------------------------------------------------
  # SUBCHAPTER 9.1.1: Mengenal Persamaan Garis Lurus
  # ---------------------------------------------------------
  - id: Q1
    text: "For the straight line $y = 3x - 4$, state the gradient and the y-intercept."
    difficulty: easy
    learning_objective: 9.1.1
    answer:
      type: exact
      value: "Gradient = 3, y-intercept = -4"
    working: |
      Compare the given equation $y = 3x - 4$ with the general form $y = mx + c$.
      The coefficient of $x$ is the gradient ($m$), so $m = 3$.
      The constant term is the y-intercept ($c$), so $c = -4$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifies the gradient as 3."
      - marks: 1
        criteria: "Correctly identifies the y-intercept as -4."
    hints:
      - level: 1
        text: "Match the equation with the standard form $y = mx + c$, where $m$ is the gradient and $c$ is the y-intercept."

  - id: Q2
    text: >-
      State the equation of a straight line that is parallel to the x-axis and passes
      through the point $P(-2, 6)$.
    difficulty: easy
    learning_objective: 9.1.1
    answer:
      type: exact
      value: "y = 6"
    working: |
      A straight line parallel to the x-axis has a gradient of 0 and takes the form $y = k$.
      Since the line passes through $P(-2, 6)$, the y-coordinate is consistently 6.
      Thus, the equation is $y = 6$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Recognizes that a line parallel to the x-axis has the form y = k."
      - marks: 1
        criteria: "Correctly states the equation as y = 6."
    hints:
      - level: 1
        text: "A line parallel to the x-axis is perfectly horizontal, meaning its y-value never changes."

  - id: Q3
    text: >-
      A straight line is parallel to the y-axis and passes through the point $Q(4, -3)$.
      What is the equation of this straight line?
    difficulty: easy
    learning_objective: 9.1.1
    answer:
      type: exact
      value: "x = 4"
    working: |
      A straight line parallel to the y-axis is a vertical line and takes the form $x = h$.
      Since the line passes through $Q(4, -3)$, the x-coordinate is consistently 4.
      Thus, the equation is $x = 4$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Recognizes that a line parallel to the y-axis has the form x = h."
      - marks: 1
        criteria: "Correctly states the equation as x = 4."
    hints:
      - level: 1
        text: "A line parallel to the y-axis is perfectly vertical, meaning its x-value never changes."

  # ---------------------------------------------------------
  # SUBCHAPTER 9.1.2: Menukar Bentuk Persamaan
  # ---------------------------------------------------------
  - id: Q4
    text: "Change the equation of the straight line $3x - 5y = 15$ to the form $y = mx + c$."
    difficulty: easy
    learning_objective: 9.1.2
    answer:
      type: exact
      value: "y = 3/5 x - 3"
    working: |
      $3x - 5y = 15$
      $-5y = -3x + 15$
      Divide the entire equation by $-5$ to isolate $y$:
      $y = \displaystyle\frac{-3}{-5}x + \displaystyle\frac{15}{-5}$
      $y = \displaystyle\frac{3}{5}x - 3$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Rearranges the terms to place y on one side and x on the other (-5y = -3x + 15)."
      - marks: 1
        criteria: "Divides by -5 correctly to state the final equation in y = mx + c form."
    hints:
      - level: 1
        text: "You need to make $y$ the subject of the formula. Start by moving the $x$ term to the right side."

  - id: Q5
    text: >-
      State the x-intercept and y-intercept for the straight line
      $\displaystyle\frac{x}{6} + \displaystyle\frac{y}{3} = 1$.
    difficulty: easy
    learning_objective: 9.1.2
    answer:
      type: exact
      value: "x-intercept = 6, y-intercept = 3"
    working: |
      Compare the given equation with the intercept form: $\displaystyle\frac{x}{a} + \displaystyle\frac{y}{b} = 1$.
      Here, $a$ is the x-intercept and $b$ is the y-intercept.
      Therefore, x-intercept = 6 and y-intercept = 3.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly states the x-intercept is 6."
      - marks: 1
        criteria: "Correctly states the y-intercept is 3."
    hints:
      - level: 1
        text: >-
          Look at the denominators in the equation format
          $\displaystyle\frac{x}{a} + \displaystyle\frac{y}{b} = 1$.

  - id: Q6
    text: "Given the equation of a straight line is $2x + 5y = 30$, determine the x-intercept."
    difficulty: medium
    learning_objective: 9.1.2
    answer:
      type: exact
      value: "15"
    working: |
      For points that lie on the x-axis, the value of the y-coordinate is zero.
      Substitute $y = 0$ into the equation:
      $2x + 5(0) = 30$
      $2x = 30$
      $x = 15$
      Therefore, the x-intercept is 15.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Substitutes y = 0 into the given equation."
      - marks: 1
        criteria: "Correctly calculates x = 15."
    hints:
      - level: 1
        text: "The x-intercept is the point where the line crosses the x-axis. What is the value of $y$ at that exact point?"

  - id: Q7
    text: >-
      Write the equation of the straight line in the form $\displaystyle\frac{x}{a} + \displaystyle\frac{y}{b} = 1$
      given that its x-intercept is 4 and its y-intercept is -7.
    difficulty: easy
    learning_objective: 9.1.2
    answer:
      type: exact
      value: "x/4 - y/7 = 1"
    working: |
      The formula for the intercept form is $\displaystyle\frac{x}{a} + \displaystyle\frac{y}{b} = 1$.
      Substitute $a = 4$ (x-intercept) and $b = -7$ (y-intercept).
      $\displaystyle\frac{x}{4} + \displaystyle\frac{y}{-7} = 1$
      $\displaystyle\frac{x}{4} - \displaystyle\frac{y}{7} = 1$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Substitutes the intercepts into the correct denominators."
      - marks: 1
        criteria: "Expresses the final equation correctly, handling the negative sign properly."
    hints:
      - level: 1
        text: >-
          In the formula $\displaystyle\frac{x}{a} + \displaystyle\frac{y}{b} = 1$,
          $a$ represents the x-intercept and $b$ represents the y-intercept.

