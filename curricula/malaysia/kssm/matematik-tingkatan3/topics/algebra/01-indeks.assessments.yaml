questions:
  ### ---------------------------------------------------------
  ### SUBCHAPTER 1.1: Tatatanda Indeks (Index Notation)
  ### ---------------------------------------------------------
  - id: Q1
    text: >-
      Represent the following repeated multiplication in index form: $m \times m \times m \times m \times m \times m \times m$. Then, state the 'asas' (base) and the 'indeks' (index).
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 1.1.1
    answer:
      type: exact
      value: "m^7; asas = m; indeks = 7"
    working: |
      The factor m is multiplied by itself 7 times.
      In index form, this is written as m to the power of 7 ($m^7$).
      The 'asas' is the repeated factor, which is m.
      The 'indeks' is the number of times the factor is repeated, which is 7.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly writes the expression in index form as m^7."
      - marks: 1
        criteria: "Correctly identifies both the 'asas' as m and the 'indeks' as 7. Accept these components in any order."
    hints:
      - level: 1
        text: "Count how many times m appears in the multiplication to find the index."

  - id: Q2
    text: >-
      Write 64 in index form using base 2. Show your working using the repeated division method (kaedah pembahagian berulang).
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 1.1.2
    answer:
      type: exact
      value: "2^6"
    working: |
      Divide 64 repeatedly by 2:
      64 ÷ 2 = 32
      32 ÷ 2 = 16
      16 ÷ 2 = 8
      8 ÷ 2 = 4
      4 ÷ 2 = 2
      2 ÷ 2 = 1
      The number 2 is divided 6 times (n = 6).
      Hence, $64 = 2^6$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Shows the correct repeated division by 2."
      - marks: 1
        criteria: "Correctly states the final index form as 2^6."
    hints:
      - level: 1
        text: "Keep dividing 64 by 2 until you reach 1. Count how many times you divided."

  - id: Q3
    text: "Calculate the value of the given number in index form: $(0.6)^3$."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 1.1.2
    answer:
      type: exact
      value: "0.216"
    working: |
      $(0.6)^3$ means 0.6 is multiplied by itself 3 times.
      $0.6 \times 0.6 \times 0.6$
      $= 0.36 \times 0.6$
      $= 0.216$
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly calculates the value as 0.216."
    hints:
      - level: 1
        text: "Expand the index form into repeated multiplication: $0.6 \times 0.6 \times 0.6$."

  - id: Q4
    text: "Which of the following represents $5 \times 5 \times 5 \times 5$ in index notation?"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 1.1.1
    answer:
      type: multiple_choice
      value: "5^4"
    working: |
      The base is 5.
      It is multiplied by itself 4 times.
      Therefore, the index notation is 5^4.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly states 5^4."
    hints:
      - level: 1
        text: "The number being multiplied is the base, and the number of times it appears is the index."

  - id: Q5
    text: "Calculate the value of $2^5$."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 1.1.2
    answer:
      type: exact
      value: "32"
    working: |
      2^5 = 2 * 2 * 2 * 2 * 2
      2 * 2 = 4
      4 * 2 = 8
      8 * 2 = 16
      16 * 2 = 32
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly evaluates to 32."
    hints:
      - level: 1
        text: "Expand it out: multiply 2 by itself five times."

  ### ---------------------------------------------------------
  ### SUBCHAPTER 1.2: Hukum Indeks (Law of Indices)
  ### ---------------------------------------------------------
  - id: Q6
    text: "Simplify the following expression using the laws of indices: $3^2 \times 3^5$."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.2.1
    answer:
      type: exact
      value: "3^7"
    working: |
      When multiplying numbers in index form with the same base, add the indices.
      Rule: $a^m \times a^n = a^{m+n}$
      $3^2 \times 3^5 = 3^{2+5}$
      $= 3^7$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Keeps the base correctly as 3."
      - marks: 1
        criteria: "Adds the indices correctly to obtain 7."
    hints:
      - level: 1
        text: "For multiplication with the same base, combine the number of factors by adding their indices."

  - id: Q7
    text: >-
      Simplify the following expression using the laws of indices: $2^6 \div 2^2$.
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.2.2
    answer:
      type: exact
      value: "2^4"
    working: |
      When dividing numbers in index form with the same base, subtract the indices.
      Rule: $a^m \div a^n = a^{m-n}$
      $2^6 \div 2^2 = 2^{6-2}$
      $= 2^4$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Uses the subtraction rule for division of indices correctly."
      - marks: 1
        criteria: "States the simplified answer as 2^4."
    hints:
      - level: 1
        text: "Division with the same base means reducing the number of repeated factors by subtracting."

  - id: Q8
    text: "Simplify the following expression using the laws of indices: $(3^2)^4$."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.2.3
    answer:
      type: exact
      value: "3^8"
    working: |
      When a number in index form is raised to a power, multiply the indices.
      Rule: $(a^m)^n = a^{m \times n}$
      $(3^2)^4 = 3^{2 \times 4}$
      $= 3^8$
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly multiplies the indices to get 3^8."
    hints:
      - level: 1
        text: "Multiply the inner index with the outer power."

  - id: Q9
    text: "Simplify $4^{-2}$. Express your answer in positive index form, then calculate its final value."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.2.4
    answer:
      type: exact
      value: "1/4^2; 1/16"
    working: |
      A negative index indicates a reciprocal.
      Rule: $a^{-n} = \displaystyle\frac{1}{a^n}$
      $4^{-2} = \displaystyle\frac{1}{4^2}$
      Calculate the value:
      $\displaystyle\frac{1}{4 \times 4} = \displaystyle\frac{1}{16}$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly converts the negative index into a positive index fraction (1/4^2). Accept variations in fraction notation."
      - marks: 1
        criteria: "Evaluates the expression to exactly 1/16."
    hints:
      - level: 1
        text: "Move the base to the denominator to make the index positive."

  - id: Q10
    text: >-
      Express the following number in the form $\sqrt[n]{a^m}$: $125^{2/3}$. Then, calculate its final value without using a calculator.
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.2.5
    answer:
      type: exact
      value: "(\\sqrt[3]{125})^2; 25"
    working: |
      Using the relationship $a^{m/n} = (\sqrt[n]{a})^m$:
      $125^{2/3} = (\sqrt[3]{125})^2$
      Calculate the cube root first:
      $\sqrt[3]{125} = 5$
      Calculate the square:
      $5^2 = 25$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly identifies the denominator (3) as the root and the numerator (2) as the power."
      - marks: 1
        criteria: "Calculates the cube root of 125 as 5."
      - marks: 1
        criteria: "Squares the 5 to get the final answer 25."
    hints:
      - level: 1
        text: "The denominator of the fraction index becomes the root, and the numerator becomes the power. Try taking the root first."

  - id: Q11
    text: >-
      Simplify the following expression using the laws of indices: $\displaystyle\frac{(2^3 \times 3^2)^2}{2^4 \times 3^3}$.
    difficulty: medium
    tp_level: 4
    kbat: false
    learning_objective: 1.2.6
    answer:
      type: exact
      value: "12"
    working: |
      Apply the law $(a^m b^n)^q = a^{mq} b^{nq}$ to expand the numerator:
      $(2^3 \times 3^2)^2 = 2^{3 \times 2} \times 3^{2 \times 2} = 2^6 \times 3^4$
      Apply the division law $a^m / a^n = a^{m-n}$:
      $\displaystyle\frac{2^6 \times 3^4}{2^4 \times 3^3} = 2^{6-4} \times 3^{4-3}$
      Simplify indices:
      $= 2^2 \times 3^1$
      Calculate final value:
      $= 4 \times 3$
      $= 12$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly expands the brackets in the numerator."
      - marks: 1
        criteria: "Correctly applies the division law by subtracting indices for identical bases."
      - marks: 1
        criteria: "Evaluates the final numerical value accurately as 12."
    hints:
      - level: 1
        text: >-
          First, distribute the outside power (2) to the indices inside the bracket. Then, group the bases 2 and 3 separately and subtract the bottom indices from the top.

  - id: Q12
    text: >-
      Simplify the following expression: $\displaystyle\frac{(2x^2 y^{-3})^3}{4x^{-1} y^4}$. Express your answer with positive indices.
    difficulty: medium
    tp_level: 4
    kbat: false
    learning_objective: 1.2.6
    answer:
      type: exact
      value: "2x^7 / y^13"
    working: |
      Expand the numerator by multiplying the indices:
      $(2x^2 y^{-3})^3 = 2^3 x^{2 \times 3} y^{-3 \times 3} = 8x^6 y^{-9}$
      The expression becomes:
      $\displaystyle\frac{8x^6 y^{-9}}{4x^{-1} y^4}$
      Divide the coefficients: $8 / 4 = 2$.
      Subtract the indices for base x: $6 - (-1) = 6 + 1 = 7$.
      Subtract the indices for base y: $-9 - 4 = -13$.
      Combine terms: $2x^7 y^{-13}$.
      Convert to positive indices: $\displaystyle\frac{2x^7}{y^{13}}$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly expands the numerator to 8x^6 y^{-9}."
      - marks: 1
        criteria: "Correctly applies the division law to the variables, resulting in x^7 and y^{-13}."
      - marks: 1
        criteria: "Expresses the final answer with positive indices as (2x^7)/y^13. Give partial marks if equivalent negative index 2x^7 y^{-13} is provided."
    hints:
      - level: 1
        text: >-
          Apply the power outside the bracket to the coefficient (2) and both variables. When dividing, subtract the bottom index from the top index.

  - id: Q13
    text: >-
      Simplify the following expression: $\displaystyle\frac{(-3x)^3 \times (2x^3y^{-4})^2}{108x^4y^3}$. Express your answer with positive indices.
    difficulty: hard
    tp_level: 4
    kbat: false
    learning_objective: 1.2.6
    answer:
      type: exact
      value: "-x^5 / y^11"
    working: |
      Expand the terms in the numerator:
      $(-3x)^3 = (-3)^3 x^3 = -27x^3$
      $(2x^3y^{-4})^2 = 2^2 x^{3 \times 2} y^{-4 \times 2} = 4x^6y^{-8}$
      Multiply the expanded terms:
      $(-27x^3) \times (4x^6y^{-8}) = -108x^9y^{-8}$
      Divide by the denominator:
      $\displaystyle\frac{-108x^9y^{-8}}{108x^4y^3}$
      Coefficients: $-108 / 108 = -1$.
      Base x: $9 - 4 = 5$.
      Base y: $-8 - 3 = -11$.
      Result: $-x^5 y^{-11} = -\displaystyle\frac{x^5}{y^{11}}$
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correctly expands the first bracket to -27x^3."
      - marks: 1
        criteria: "Correctly expands the second bracket to 4x^6y^{-8}."
      - marks: 1
        criteria: "Combines the numerator and divides by the denominator coefficients correctly to get -1."
      - marks: 1
        criteria: "Submits the final correct expression with positive indices."
    hints:
      - level: 1
        text: >-
          Be careful with the negative coefficient! $(-3)^3$ is $-27$. Expand all brackets in the top row first, multiply them together, and then divide by the bottom row.

  - id: Q14
    text: >-
      Simplify the following expression involving fractional and negative indices: $\displaystyle\frac{(16p^8q^4)^{1/4}}{(p^{-2}q^3)^2}$.
    difficulty: hard
    tp_level: 4
    kbat: false
    learning_objective: 1.2.6
    answer:
      type: exact
      value: "2p^6 / q^5"
    working: |
      Expand the numerator by multiplying indices by 1/4:
      $(16p^8q^4)^{1/4} = 16^{1/4} p^{8/4} q^{4/4} = 2p^2q^1$
      Expand the denominator by multiplying indices by 2:
      $(p^{-2}q^3)^2 = p^{-2 \times 2} q^{3 \times 2} = p^{-4} q^6$
      Divide the numerator by the denominator:
      $\displaystyle\frac{2p^2q^1}{p^{-4} q^6}$
      Base p: $2 - (-4) = 2 + 4 = 6$.
      Base q: $1 - 6 = -5$.
      Result: $2p^6 q^{-5} = \displaystyle\frac{2p^6}{q^5}$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly calculates the numerator as 2p^2q^1."
      - marks: 1
        criteria: "Correctly calculates the denominator as p^{-4} q^6."
      - marks: 1
        criteria: "Divides accurately and converts the final answer to positive indices."
    hints:
      - level: 1
        text: >-
          The power $1/4$ means the 4th root. Find the 4th root of 16, and multiply the indices of the variables by $1/4$.

  - id: Q15
    text: "Calculate the value of $x$ for the following equation: $3^x \times 9^{x-1} = 27$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 1.2.7
    answer:
      type: exact
      value: "5/3"
    working: |
      Convert all numbers to a common prime base (base 3):
      $9 = 3^2$, so $9^{x-1} = (3^2)^{x-1} = 3^{2x-2}$
      $27 = 3^3$
      Substitute these into the equation:
      $3^x \times 3^{2x-2} = 3^3$
      Apply the multiplication law (add indices on the left side):
      $3^{x + 2x - 2} = 3^3$
      $3^{3x - 2} = 3^3$
      Equate the indices (since bases are identical):
      $3x - 2 = 3$
      $3x = 5$
      $x = \displaystyle\frac{5}{3}$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Expresses all terms (9 and 27) in the common base of 3."
      - marks: 1
        criteria: "Correctly combines the indices and forms a linear equation (3x - 2 = 3)."
      - marks: 1
        criteria: "Solves for x accurately to get 5/3."
    hints:
      - level: 1
        text: >-
          Rewrite 9 and 27 as powers of 3. Once all the bases match, you can drop them and solve the indices as a standard algebra equation.

  - id: Q16
    text: >-
      Solve the following simultaneous equations (persamaan serentak) to find the values of $x$ and $y$: 
      $8^x \times 2^y = 32$
      $3^x \div 9^y = \displaystyle\frac{1}{27}$
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 1.2.7
    answer:
      type: exact
      value: "x = 1, y = 2"
    working: |
      Equation 1 (Convert to base 2):
      $(2^3)^x \times 2^y = 2^5$
      $2^{3x+y} = 2^5$
      $3x + y = 5$  --- (Eq 1)

      Equation 2 (Convert to base 3):
      $3^x \div (3^2)^y = 3^{-3}$
      $3^{x-2y} = 3^{-3}$
      $x - 2y = -3$ --- (Eq 2)

      Solve using substitution method. From Eq 1:
      $y = 5 - 3x$ --- (Eq 3)
      Substitute Eq 3 into Eq 2:
      $x - 2(5 - 3x) = -3$
      $x - 10 + 6x = -3$
      $7x = 7$
      $x = 1$

      Substitute x=1 into Eq 3:
      $y = 5 - 3(1) = 2$
    marks: 4
    rubric:
      - marks: 1
        criteria: "Converts the first equation entirely to base 2 to form the linear equation 3x + y = 5."
      - marks: 1
        criteria: "Converts the second equation entirely to base 3 to form the linear equation x - 2y = -3."
      - marks: 1
        criteria: "Correctly identifies the value of x as 1 using a valid elimination or substitution method."
      - marks: 1
        criteria: "Correctly identifies the value of y as 2."
    hints:
      - level: 1
        text: >-
          Convert all bases in the first equation to base 2 and all bases in the second equation to base 3. This will give you two simple linear equations you can solve together.

  - id: Q17
    text: >-
      In an experiment performed by Susan, the temperature of a metal rose from $25^{\circ}C$ to $T^{\circ}C$ according to the equation $T = 25(1.2)^m$ when the metal was heated for $m$ seconds. Calculate the difference in temperature between the fifth second and the sixth second, to the nearest degree Celsius.
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 1.2.7
    answer:
      type: exact
      value: "12"
    working: |
      Calculate the temperature at the fifth second ($m = 5$):
      $T_5 = 25(1.2)^5$
      $T_5 = 25(2.48832) = 62.208^{\circ}C$

      Calculate the temperature at the sixth second ($m = 6$):
      $T_6 = 25(1.2)^6$
      $T_6 = 25(2.985984) = 74.6496^{\circ}C$

      Calculate the difference in temperature:
      Difference = $T_6 - T_5$
      $= 74.6496 - 62.208 = 12.4416^{\circ}C$

      Round to the nearest degree Celsius:
      $= 12^{\circ}C$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly substitutes m=5 and m=6 into the formula to find the two specific temperatures."
      - marks: 1
        criteria: "Finds the exact difference between the two temperatures (12.4416)."
      - marks: 1
        criteria: "Correctly rounds the answer to the nearest whole number (12)."
    hints:
      - level: 1
        text: >-
          Substitute $m = 5$ into the equation to find the temperature at the 5th second. Do the same for $m = 6$, and then subtract the smaller value from the larger one.

  - id: Q18
    text: >-
      Mrs Kiran Kaur saved RM50 000 on 1 March 2019 in a local bank with an interest of 3.5% per annum. After $t$ years, her total savings, in RM, is given by the formula $50 000(1.035)^t$. Calculate her total savings on 1 March 2025, if she does not withdraw her savings. Round your answer to the nearest RM.
    difficulty: hard
    tp_level: 6
    kbat: true
    learning_objective: 1.2.7
    answer:
      type: exact
      value: "61463"
    working: |
      Determine the value of t (number of years from 2019 to 2025):
      t = 2025 - 2019 = 6.
      Substitute t = 6 into the given formula:
      Savings = 50 000(1.035)^6
      Calculate the value of the index:
      (1.035)^6 ≈ 1.229255
      Multiply by the base amount:
      50 000 × 1.229255 = 61462.75
      Round to the nearest RM (Ringgit Malaysia):
      RM61463
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly identifies t = 6."
      - marks: 1
        criteria: "Substitutes t=6 into the formula and calculates the raw value (approx 61462.75)."
      - marks: 1
        criteria: "Rounds the final answer correctly to the nearest whole number (61463)."
    hints:
      - level: 1
        text: "First, find out how many years have passed between 2019 and 2025. Then, replace 't' in the formula with that number."

  - id: Q19
    text: >-
      Chong and Navin performed an experiment to determine the relationship between variables $x$ and $y$. The equation Chong obtained was $16(4^x) = 16^y$, while the equation Navin got was $3(9^x) = 27^y$. Calculate the values of $x$ and $y$ which satisfy both experiments.
    difficulty: hard
    tp_level: 6
    kbat: true
    learning_objective: 1.2.7
    answer:
      type: exact
      value: "x = 4, y = 3"
    working: |
      Equation 1 (Chong): 16(4^x) = 16^y
      Convert 16 to base 4: 4^2(4^x) = (4^2)^y
      4^(2+x) = 4^(2y)
      Equate indices: 2 + x = 2y  --- (Eq 1)

      Equation 2 (Navin): 3(9^x) = 27^y
      Convert 9 and 27 to base 3: 3^1(3^2)^x = (3^3)^y
      3^(1+2x) = 3^(3y)
      Equate indices: 1 + 2x = 3y --- (Eq 2)

      Solve simultaneous equations using substitution:
      From Eq 1: x = 2y - 2
      Substitute into Eq 2:
      1 + 2(2y - 2) = 3y
      1 + 4y - 4 = 3y
      4y - 3 = 3y
      y = 3

      Substitute y = 3 into x = 2y - 2:
      x = 2(3) - 2
      x = 6 - 2 = 4
    marks: 4
    rubric:
      - marks: 1
        criteria: "Forms the first linear equation (2 + x = 2y) by converting bases to 4 or 2."
      - marks: 1
        criteria: "Forms the second linear equation (1 + 2x = 3y) by converting bases to 3."
      - marks: 1
        criteria: "Correctly finds the value of y as 3."
      - marks: 1
        criteria: "Correctly finds the value of x as 4."
    hints:
      - level: 1
        text: "You have two equations. For the first one, convert all numbers to base 4. For the second, convert all numbers to base 3. Then, solve the two index equations simultaneously."
