teaching_guide:
  chapter: "Bab 2: Pemfaktoran dan Pecahan Algebra (Factorisation and Algebraic Fractions)"
  overview: >
    "Pemfaktoran dan Pecahan Algebra" is arguably the most critical algebra chapter in the lower secondary syllabus.
    It introduces students to expanding expressions, reversing that process through factorisation, and manipulating algebraic fractions using the four fundamental operations.
    Mastery of this chapter is the ultimate gateway to advanced mathematics. However, this is also the danger zone where the highest rate of student misconceptions occurs—specifically regarding sign errors and "illegal" fraction cancellations.
  
  dskp_anchors_and_taxonomy:
    standard_kandungan:
      - sk_2_1: "Kembangan (Expansion): Expanding single and double brackets by multiplying expressions, and simplifying combined operations using BODMAS."
      - sk_2_2: "Pemfaktoran (Factorisation): Understanding factorisation as the exact inverse of expansion, using Highest Common Factors (FSTB), perfect squares, cross-multiplication, and grouping."
      - sk_2_3: "Ungkapan Algebra & Hukum Operasi Asas Aritmetik: Adding, subtracting, multiplying, and dividing algebraic fractions."
    tahap_penguasaan:
      tp_1: "Mempamerkan pengetahuan asas tentang faktor (Exhibit basic knowledge of factors)."
      tp_2: "Mempamerkan kefahaman tentang konsep kembangan dan pemfaktoran (Demonstrate comprehension of expansion and factorisation concepts)."
      tp_3: "Mengaplikasikan kefahaman tentang kembangan dan pemfaktoran untuk melaksanakan tugasan mudah (Apply understanding to perform simple algebraic tasks)."
      tp_4: "Mengaplikasikan pengetahuan dan kemahiran... dalam konteks penyelesaian masalah rutin yang mudah (Apply knowledge to solve simple routine problems)."
      tp_5: "Mengaplikasikan pengetahuan dan kemahiran... dalam konteks penyelesaian masalah rutin yang kompleks (Apply knowledge to solve complex routine problems)."
      tp_6: "Mengaplikasikan pengetahuan dan kemahiran... dalam konteks penyelesaian masalah bukan rutin secara kreatif (Apply knowledge creatively to solve non-routine problems)."
  
  prerequisites_check:
    - "Native fluency in collecting like terms and working with linear expressions (F1-05)."
    - "Ability to solve basic linear equations and verify results (F1-06)."
    - "Strong command of directed numbers and integer operations, especially negative signs (F1-01)."
    - "Solid grounding in basic primary school fraction logic, such as finding common denominators and cross-cancellation (Primary Syllabus)."
  
  teaching_sequence_and_strategy:
    - topic: "1. Kembangan Meaning and Mechanics (Expansion)"
      time_allocated: "20 min"
      strategies:
        - "Use Jubin Algebra (Algebraic Tiles) or area models: The DSKP and textbook highly recommend using algebraic tiles to prove that a(b+c) is exactly the same as finding the area of a rectangle (ab + ac)."
        - "The Mechanics: Once they trust the geometry, introduce the distributive arrows. For double brackets (a+b)(c+d), teach a systematic approach like multiplying every term in the first bracket with every term in the second."
        - "The Trap: Watch out for negative signs! Treat the sign as permanently glued to the term immediately behind it."
    
    - topic: "2. Pemfaktoran as Reverse Expansion (Factorisation)"
      time_allocated: "25 min"
      strategies:
        - "Start by explicitly teaching that factorisation is the reverse process (songsangan) of expansion. Give them the expanded terms and ask, 'What did we multiply to get this?'."
        - "Extracting Faktor Sepunya Terbesar (FSTB): Start with common factor extraction (e.g., 8x + 12x^2 = 4x(2 + 3x)) before moving to structured forms."
        - "Difference of Two Perfect Squares: x^2 - y^2 = (x+y)(x-y)."
        - "Pendaraban Silang (Cross-Multiplication): Essential for quadratics in the form ax^2 + bx + c. Teach them to list factors of a and c, cross-multiply, and check if the sum equals b."
        - "Grouping (4 Algebraic Terms): e.g., jm - jn + ym - yn = j(m-n) + y(m-n) = (j+y)(m-n)."
    
    - topic: "3. Combined Operations on Expressions (Adding and Subtracting Fractions)"
      time_allocated: "25 min"
      strategies:
        - "Sequence tasks from simple to mixed operations to avoid overload, emphasizing operation order (BODMAS) and clean line-by-line work."
        - "Ground fraction addition heavily in primary school fraction logic. Ask them: 'Can you add 1/2 and 1/3 directly? No!'. The exact same rule applies to algebraic denominators."
        - "Different Denominators: Walk them through finding the Gandaan Sepunya Terkecil (GSTK) / LCM for algebraic denominators."
        - "Numerator Danger: Emphasize that adding/subtracting expressions in the numerator requires careful grouping. Always bracket the numerators when combining them over a single denominator so the negative sign is properly distributed."
    
    - topic: "4. Method Selection (Multiplying and Dividing Fractions)"
      time_allocated: "20 min"
      strategies:
        - "Present equivalent problems with different best methods; ask students to justify their method choice before solving."
        - "The Golden Rule of Cancellation: You can only cancel FACTORS (things being multiplied), never TERMS (things being added or subtracted)."
        - "Factorise First: Force students to fully factorise expressions before any division or multiplication happens."
        - "Division: Link back to the 'Keep, Change, Flip' (Salingan) rule. Flip the second fraction to turn it into multiplication, factorise everything, and only then start cancelling top-to-bottom."

    - topic: "5. Application Problems"
      time_allocated: "20 min"
      strategies:
        - "Use contextual or non-routine items where students must both simplify and interpret outcomes."
        - "Example: Calculate the remaining area of a rectangular carpet after specific sections are cut out, requiring expansion or factorisation to solve."
  
  high_alert_misconceptions:
    - misconception: "Illegal Cancellation: (x+4)/x = 4"
      why_students_think_this: "Overgeneralizing fraction simplification rules to terms instead of factors."
      how_to_fix: "Prove with numbers: Let x=2. Is (2+4)/2 equal to 4? No, it's 3! Establish the 'Cancel Factors Only' rule and use counterexamples."
    - misconception: "Losing the Negative Sign: -(x - 5) = -x - 5"
      why_students_think_this: "Forgetting to distribute the negative sign to the second term due to weak sign-discipline in multi-step algebra."
      how_to_fix: "Visual Cues: Require sign-highlighting before each transformation. Force them to write a visible -1(x - 5) and draw two physical distributive arrows."
    - misconception: "Fake Perfect Squares: (x+3)^2 = x^2 + 9"
      why_students_think_this: "Applying the exponent directly to terms inside a sum."
      how_to_fix: "Physical Proof: Make them physically write out (x+3)(x+3) before expanding via cross-multiplication."
    - misconception: "Separating the Topics"
      why_students_think_this: "Topics are viewed as unrelated, separate procedures."
      how_to_fix: "Mirror Match: Pair every expansion example directly with its reverse factorised form so they see the loop."
  
  engagement_hooks:
    - "Method-Match Challenge: Put students in teams. Give them 5 expressions and ask them to match problems to the best solving strategy (FSTB, Cross-Multiplication, etc.) before doing any calculations."
    - "'Spot the Fraud' Board Race: Put 4 worked-out fraction simplifications on the board, where 3 contain deliberate sign or illegal cancellation mistakes. Give them 60 seconds to find the legal one."
    - "Reverse Engineering Geometry: Give them the final expanded area equation and have them physically construct the rectangle dimensions (factorisation) using paper cutouts of 'Jubin Algebra'."
  
  assessment_guidance:
    - "Include procedural fluency items and explanation-required items."
    - "Ensure tests isolate skills: test pure common factors before mixing in quadratics."
    - "ALWAYS test expansion and factorisation back-to-back so they see the inverse relationship."
    - "Include 'find the error' questions, specifically targeting illegal fraction cancellations."
    - "Add one multi-step item with marks distributed by method + accuracy."

  bilingual_key_terms:
    Expansion: "Kembangan"
    Factorisation: "Pemfaktoran"
    Common_factor: "Faktor sepunya"
    Highest_Common_Factor_HCF: "Faktor Sepunya Terbesar (FSTB)"
    Lowest_Common_Multiple_LCM: "Gandaan Sepunya Terkecil (GSTK)"
    Cross_multiplication: "Pendaraban silang"
    Algebraic_fraction: "Pecahan algebra"
    Numerator: "Pengangka"
    Denominator: "Penyebut"
    Simplify: "Mempermudah"
    Distributive_law: "Hukum taburan"
