  - id: WE-01
    topic: "Direct Substitution / Penentuan Nilai Pemboleh Ubah (3.1.3)"
    scenario: "Calculate the final velocity, v, given the formula v = u + at, where initial velocity u = 10, acceleration a = 5, and time t = 4."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.3
    real_world_analogy: >-
      Using a formula is exactly like following a cooking recipe. The letters (variables) are labeled bowls. You just drop the exact ingredients (numbers) into their correct bowls and let the math do the mixing!
    misconception_alert: >-
      BODMAS rule applies! A huge mistake is adding u and a together before multiplying by t. You must multiply 'a' and 't' together FIRST.
    working: |
      Step 1: Write down the blank formula: 
      v = (  ) + (  )(  )
      Step 2: Drop the numbers in: 
      v = 10 + (5)(4)
      Step 3: Multiply first (BODMAS): 
      v = 10 + 20
      Step 4: Add: 
      v = 30
      Final Answer: 30

  - id: WE-02
    topic: "Changing the Subject - Linear Manipulation (3.1.2)"
    scenario: "Given the equation y = 4x - 7, make x the subject of the formula."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    real_world_analogy: >-
      Rearranging a formula is like a reverse rescue mission. To save 'x' and leave it completely alone, you have to systematically move everyone else across the 'equals' bridge. Numbers that are added/subtracted go across first. The numbers glued directly to x (multiplication) cross last!
    misconception_alert: >-
      Many students try dividing by 4 right at the start. If you do that, you have to divide the -7 by 4 as well, which gets messy. Always move the 'floating' constants (+ or -) first!
    working: |
      Step 1: The goal is to get x alone. Who is furthest from x on that side? The -7.
      Step 2: Send -7 across the bridge. It becomes +7.
      y + 7 = 4x
      Step 3: Now extract x from the 4. Since it is 4 multiplied by x, it crosses the bridge as a division.
      (y + 7) / 4 = x
      Final Answer: x = \\frac{y + 7}{4}

  - id: WE-03
    topic: "Changing the Subject - Grouping Variables (3.1.2)"
    scenario: "Express x in terms of y if: y = \\frac{2x + 5}{x - 1}"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.2
    real_world_analogy: >-
      When your target (x) exists in two different places, you have an 'imposter' problem. You need to blast open the fraction, drag all terms containing 'x' to the exact same room (same side of the equation), and then extract the 'true x' using factorisation!
    misconception_alert: >-
      You CANNOT cancel the 'x' on the top with the 'x' on the bottom of the fraction! They are locked inside addition/subtraction brackets. You MUST cross multiply to shatter the fraction first.
    working: |
      Step 1: Clear the fraction by multiplying both sides by (x - 1).
      y(x - 1) = 2x + 5
      Step 2: Expand the bracket.
      xy - y = 2x + 5
      Step 3: Move all terms containing 'x' to the left side, and dump all other terms to the right side.
      xy - 2x = y + 5
      Step 4: You have two 'x's. To get just one, factorise 'x' out!
      x(y - 2) = y + 5
      Step 5: Isolate x by dividing the bracket back across.
      Final Answer: x = \\frac{y + 5}{y - 2}
