topic_id: F2-02
provenance: ai-assisted
questions:
  - id: Q1
    text: "Expand: $3(x + 4)$."
    difficulty: easy
    learning_objective: 2.1.2
    answer:
      type: exact
      value: "3x + 12"
      working: |
        Distribute 3 to each term inside the bracket:
        3(x) + 3(4)
        = 3x + 12
    marks: 2
    rubric:
      - marks: 1
        criteria: "Applies distributive property correctly."
      - marks: 1
        criteria: "Final expanded expression is correct."
    hints:
      - level: 1
        text: "Multiply the number outside the bracket by both terms inside the bracket."

  - id: Q2
    text: "Expand the following algebraic expressions: $(x + 2)(x - 5)$."
    difficulty: easy
    learning_objective: 2.1.2
    answer:
      type: exact
      value: "x^2 - 3x - 10"
      working: |
        Multiply each term in the first bracket by each term in the second bracket:
        x(x) + x(-5) + 2(x) + 2(-5)
        = x^2 - 5x + 2x - 10
        = x^2 - 3x - 10
    marks: 2
    rubric:
      - marks: 1
        criteria: "Expands all four terms correctly."
      - marks: 1
        criteria: "Simplifies by combining the like terms (-5x + 2x) accurately."
    hints:
      - level: 1
        text: "Multiply the first terms, then outer, inner, and finally the last terms."

  - id: Q3
    text: "Simplify the combined operation: $(x + y)(x - y) + x(x - 2y)$."
    difficulty: medium
    learning_objective: 2.1.3
    answer:
      type: exact
      value: "2x^2 - y^2 - 2xy"
      working: |
        Expand the first part (difference of squares):
        (x + y)(x - y) = x^2 - y^2
        Expand the second part:
        x(x - 2y) = x^2 - 2xy
        Combine both parts:
        x^2 - y^2 + x^2 - 2xy
        = 2x^2 - y^2 - 2xy
    marks: 3
    rubric:
      - marks: 1
        criteria: "Expands the first two brackets correctly into x^2 - y^2."
      - marks: 1
        criteria: "Expands the second part correctly into x^2 - 2xy."
      - marks: 1
        criteria: "Combines like terms accurately for the final expression."
    hints:
      - level: 1
        text: "Follow BODMAS: do the multiplications (expansions) first before adding them together."

  - id: Q4
    text: "Simplify: $(x + 2)(x + 5) - x(x + 1)$."
    difficulty: medium
    learning_objective: 2.1.3
    answer:
      type: exact
      value: "6x + 10"
      working: |
        Expand the first product:
        (x + 2)(x + 5) = x^2 + 5x + 2x + 10 = x^2 + 7x + 10
        Expand the second product, taking care of the negative sign:
        -x(x + 1) = -x^2 - x
        Combine the terms:
        (x^2 + 7x + 10) - x^2 - x
        = 6x + 10
    marks: 3
    rubric:
      - marks: 1
        criteria: "Expands first product correctly."
      - marks: 1
        criteria: "Distributes the negative x correctly in the second expansion."
      - marks: 1
        criteria: "Subtracts and simplifies accurately to 6x + 10."
    hints:
      - level: 1
        text: "Expand both sets of brackets first. Be very careful with the negative sign when multiplying -x."

  - id: Q5
    text: "Puan Maria has a rectangular carpet with a length of $(3r - 2)$ meters and a width of $(r + 1)$ meters. Calculate the area of the carpet in terms of $r$."
    difficulty: hard
    learning_objective: 2.1.4
    answer:
      type: exact
      value: "3r^2 + r - 2"
      working: |
        Area = length × width
        Area = (3r - 2)(r + 1)
        Expand the brackets:
        = 3r(r) + 3r(1) - 2(r) - 2(1)
        = 3r^2 + 3r - 2r - 2
        = 3r^2 + r - 2
    marks: 3
    rubric:
      - marks: 1
        criteria: "Sets up the correct multiplication for area."
      - marks: 1
        criteria: "Expands to four correct terms."
      - marks: 1
        criteria: "Simplifies correctly to the final quadratic expression."
    hints:
      - level: 1
        text: "The area of a rectangle is length multiplied by width. Write it as two brackets multiplied together."

  - id: Q6
    text: "Factorise the algebraic expression completely: $8x + 12x^2$."
    difficulty: easy
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "4x(2 + 3x)"
      working: |
        Find the Highest Common Factor (HCF) for the numbers 8 and 12, which is 4.
        Find the HCF for variables x and x^2, which is x.
        Extract 4x:
        8x / 4x = 2
        12x^2 / 4x = 3x
        = 4x(2 + 3x)
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the correct Highest Common Factor (4x)."
      - marks: 1
        criteria: "Writes the fully factorised form correctly. Accept equivalent forms like 4x(3x + 2)."
    hints:
      - level: 1
        text: "Look for the largest number and the largest variable that can divide both terms."

  - id: Q7
    text: "Factorise the following using the difference of two perfect squares: $b^2 - 81$."
    difficulty: easy
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "(b + 9)(b - 9)"
      working: |
        Recognize that 81 is a perfect square (9^2).
        Apply the difference of squares rule: a^2 - b^2 = (a + b)(a - b)
        b^2 - 9^2 = (b + 9)(b - 9)
    marks: 2
    rubric:
      - marks: 1
        criteria: "Recognizes 81 as the perfect square of 9."
      - marks: 1
        criteria: "Applies the rule correctly to yield (b + 9)(b - 9). Accept bracket reversal: (b - 9)(b + 9)."
    hints:
      - level: 1
        text: "81 is a perfect square. Use the rule x^2 - y^2 = (x + y)(x - y)."

  - id: Q8
    text: "Factorise completely using the cross-multiplication method: $x^2 + 6x + 8$."
    difficulty: medium
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "(x + 2)(x + 4)"
      working: |
        Find factors of x^2: x and x
        Find factors of 8 that add up to 6: 2 and 4
        Cross multiply:
        x * 4 = 4x
        x * 2 = 2x
        Sum = 6x (matches the middle term)
        Result = (x + 2)(x + 4)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identifies correct factors for 8."
      - marks: 1
        criteria: "Validates middle term correctly using cross multiplication."
      - marks: 1
        criteria: "Writes the final brackets correctly. Accept bracket reversal: (x + 4)(x + 2)."
    hints:
      - level: 1
        text: "Find two numbers that multiply to give 8 and add together to give 6."

  - id: Q9
    text: "Factorise the expression involving four terms: $pq + qr + ps + rs$."
    difficulty: medium
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "(q + s)(p + r)"
      working: |
        Group the terms into pairs with common factors:
        (pq + qr) + (ps + rs)
        Extract the common factor from each pair:
        q(p + r) + s(p + r)
        Extract the common bracket (p + r):
        = (p + r)(q + s) OR (q + s)(p + r)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Groups terms correctly."
      - marks: 1
        criteria: "Extracts common factors to create a matching binomial bracket."
      - marks: 1
        criteria: "Extracts the common binomial bracket to give the final answer. Accept bracket reversal: (p + r)(q + s)."
    hints:
      - level: 1
        text: "Divide the 4 terms into two groups of 2. Factorise each group separately first."

  - id: Q10
    text: "A rectangular football field has an area of $(4x^2 + 16x)$ square meters. If the width of the field is $4x$ meters, find its length in terms of $x$."
    difficulty: hard
    learning_objective: 2.2.3
    answer:
      type: exact
      value: "x + 4"
      working: |
        Length = Area / Width
        Length = (4x^2 + 16x) / 4x
        Factorise the numerator (Area) using HCF:
        4x^2 + 16x = 4x(x + 4)
        Divide by the denominator (Width):
        = 4x(x + 4) / 4x
        Cancel the common factor 4x:
        = x + 4
    marks: 3
    rubric:
      - marks: 1
        criteria: "Sets up the relationship: Length = Area / Width."
      - marks: 1
        criteria: "Factorises the area expression correctly."
      - marks: 1
        criteria: "Performs accurate division to find the length."
    hints:
      - level: 1
        text: "Factorise the expression for the area first, then divide by the width."

  - id: Q11
    text: "Simplify the algebraic fraction: $\\frac{4a}{5} + \\frac{3a}{5}$."
    difficulty: easy
    learning_objective: 2.3.1
    answer:
      type: exact
      value: "\\frac{7a}{5}"
      working: |
        Since the denominators are the same (5), combine the numerators directly:
        (4a + 3a) / 5
        = 7a / 5
    marks: 2
    rubric:
      - marks: 1
        criteria: "Combines numerators over the single denominator."
      - marks: 1
        criteria: "Simplifies the numerator accurately."
    hints:
      - level: 1
        text: "The denominators are identical, so you just need to add the numerators together."

  - id: Q12
    text: "Simplify: $\\frac{2}{3} - \\frac{4s}{9}$."
    difficulty: medium
    learning_objective: 2.3.1
    answer:
      type: exact
      value: "\\frac{6 - 4s}{9}"
      working: |
        Find the common denominator for 3 and 9, which is 9.
        Multiply the numerator and denominator of the first fraction by 3:
        = (2 * 3) / (3 * 3) - 4s / 9
        = 6 / 9 - 4s / 9
        Combine over the common denominator:
        = (6 - 4s) / 9
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identifies the correct common denominator (9)."
      - marks: 1
        criteria: "Transforms the first fraction accurately."
      - marks: 1
        criteria: "Combines the numerators correctly for the final answer."
    hints:
      - level: 1
        text: "Find the Lowest Common Multiple (LCM) for the denominators 3 and 9 before subtracting."

  - id: Q13
    text: "Simplify the multiplication of algebraic fractions: $\\frac{a^2 - 1}{2ab} \\times \\frac{b^2}{1 + a}$."
    difficulty: medium
    learning_objective: 2.3.2
    answer:
      type: exact
      value: "\\frac{b(a - 1)}{2a}"
      working: |
        Factorise the numerator a^2 - 1 (difference of squares):
        = (a + 1)(a - 1)
        Substitute into the equation:
        = [(a + 1)(a - 1) / 2ab] * [b^2 / (1 + a)]
        Note that (1 + a) is the same as (a + 1).
        Cancel the common factor (a + 1).
        Cancel the common factor b from b^2 and 2ab:
        = (a - 1) * b / 2a
        = b(a - 1) / 2a
    marks: 3
    rubric:
      - marks: 1
        criteria: "Factorises a^2 - 1 correctly."
      - marks: 1
        criteria: "Cancels the (a+1) factor correctly."
      - marks: 1
        criteria: "Cancels the factor 'b' and writes the final simplified expression."
    hints:
      - level: 1
        text: "Factorise a^2 - 1 first. Then look for terms you can cancel cross-wise."

  - id: Q14
    text: "Simplify the division of algebraic fractions: $\\frac{m + n}{x - y} \\div \\frac{(m + n)^2}{x^2 - y^2}$."
    difficulty: hard
    learning_objective: 2.3.2
    answer:
      type: exact
      value: "\\frac{x + y}{m + n}"
      working: |
        Change division to multiplication by flipping the second fraction:
        = [(m + n) / (x - y)] * [(x^2 - y^2) / (m + n)^2]
        Factorise x^2 - y^2 into (x + y)(x - y):
        = [(m + n) / (x - y)] * [(x + y)(x - y) / (m + n)(m + n)]
        Cancel the common factor (x - y):
        Cancel the common factor (m + n):
        = (x + y) / (m + n)
    marks: 4
    rubric:
      - marks: 1
        criteria: "Converts division to multiplication by flipping the fraction."
      - marks: 1
        criteria: "Factorises difference of two squares correctly."
      - marks: 1
        criteria: "Cancels common factor (x - y)."
      - marks: 1
        criteria: "Cancels common factor (m + n) to get final fraction."
    hints:
      - level: 1
        text: "Keep, Change, Flip. Then factorise everything before you cancel terms top and bottom."

  - id: Q15
    text: "Simplify the combined operation: $\\frac{2}{5b}(15a + 25b) + \\frac{a}{b}$."
    difficulty: hard
    learning_objective: 2.3.3
    answer:
      type: exact
      value: "\\frac{7a + 10b}{b}"
      working: |
        Solve the multiplication part first (BODMAS):
        Method 1 (Expansion):
        = [2(15a) / 5b] + [2(25b) / 5b] + a/b
        = 30a/5b + 50b/5b + a/b
        = 6a/b + 10 + a/b
        To combine, ensure same denominator:
        = (6a + 10b + a) / b
        = (7a + 10b) / b

        Method 2 (Factorisation):
        Factorise 5 out of (15a + 25b): 5(3a + 5b)
        = (2 / 5b) * 5(3a + 5b) + a/b
        Cancel the 5s:
        = 2(3a + 5b) / b + a/b
        = (6a + 10b) / b + a/b
        = (7a + 10b) / b
    marks: 4
    rubric:
      - marks: 1
        criteria: "Prioritizes multiplication over addition (BODMAS)."
      - marks: 1
        criteria: "Accurately expands or factorises to clear the 5 in denominator."
      - marks: 1
        criteria: "Finds common denominator for adding a/b."
      - marks: 1
        criteria: "Combines like terms accurately for final simplified fraction."
    hints:
      - level: 1
        text: "Multiply the first term out, or factorise the bracket to cancel the 5 in the denominator first. Then add."

  ### ---------------------------------------------------------
  ### UASA NATIONAL EXAM EXEMPLARS
  ### ---------------------------------------------------------
  # EXAM: UASA (Bahagian A - OAP)
  # RATIONALE: Evaluates fundamental expansion of double brackets involving both positive and negative constants [4, 7].
  - id: Q16
    text: >-
      Expand $(x - 4)(x + 2)$.

      A) $x^2 + 2x + 8$
      B) $x^2 - 6x - 8$
      C) $x^2 - 2x - 8$
      D) $x^2 + 6x + 8$
    difficulty: easy
    learning_objective: 2.1.2
    answer:
      type: multiple_choice
      value: "C"
      working: |
        (x * x) + (x * 2) - (4 * x) - (4 * 2)
        = x^2 + 2x - 4x - 8
        = x^2 - 2x - 8
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option C."
    hints:
      - level: 1
        text: "Use distributive arrows to multiply every term in the first bracket with every term in the second [19]."

  # EXAM: UASA (Bahagian A - OAP)
  # RATIONALE: Tests extracting the Highest Common Factor (FSTB) with multiple variables, a crucial first line of defense in factorisation [7, 20].
  - id: Q17
    text: >-
      Factorise the following expression: $12x^2y + 15xy^2$

      A) $3xy(4xy + 5)$
      B) $3xy(4x + 5y)$
      C) $3x(4x + 5y)$
      D) $3y(4x + 5y)$
    difficulty: medium
    learning_objective: 2.2.2
    answer:
      type: multiple_choice
      value: "B"
      working: |
        Highest Common Factor for 12 and 15 is 3.
        Common variables are x and y. So FSTB = 3xy.
        12x^2y / 3xy = 4x.
        15xy^2 / 3xy = 5y.
        Result = 3xy(4x + 5y).
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option B."
    hints:
      - level: 1
        text: "Find the largest number that divides both 12 and 15, then factor out the lowest powers of x and y."

  # EXAM: UASA (Bahagian A - OAP)
  # RATIONALE: A high-level danger zone question where students must perform division by converting to multiplication and factorising before cross-cancelling [10, 21].
  - id: Q18
    text: >-
      Simplify: $\frac{2x - 4y}{8z} \div \frac{3x - 6y}{6}$

      A) $\frac{x - y}{2z}$
      B) $\frac{1}{2z}$
      C) $\frac{x - y}{4z}$
      D) $\frac{3}{6z}$
    difficulty: hard
    learning_objective: 2.3.2
    answer:
      type: multiple_choice
      value: "B"
      working: |
        Flip the second fraction to multiply:
        ((2x - 4y) / 8z) * (6 / (3x - 6y))
        Factorise the terms:
        (2(x - 2y) / 8z) * (6 / 3(x - 2y))
        Cancel the common factor (x - 2y):
        (2 / 8z) * (6 / 3) = (1 / 4z) * 2 = 2 / 4z = 1 / 2z.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option B."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Keep, Change, Flip! Turn the division into multiplication first, then factorise the numerators and denominators to cancel common factors [21]."

  # EXAM: UASA (Bahagian B - OPB)
  # RATIONALE: Checks sign discipline when distributing a negative multiplier across a binomial [10, 22].
  - id: Q19
    text: "Expand $-9(m - 3n)$"
    difficulty: easy
    learning_objective: 2.1.2
    answer:
      type: exact
      value: "-9m + 27n"
      working: |
        -9 * m = -9m
        -9 * -3n = +27n
        Result: -9m + 27n
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly expands including the correct positive sign for 27n."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Remember that a negative multiplied by a negative results in a positive term [19, 22]."

  # EXAM: UASA (Bahagian C - Subjektif)
  # RATIONALE: Tests cancellation of algebraic fractions using the difference of two perfect squares in the denominator [10, 20].
  - id: Q20
    text: "Simplify: $S = \frac{2x - 1}{4x^2 - 1}$"
    difficulty: medium
    learning_objective: 2.3.2
    answer:
      type: exact
      value: "1 / (2x + 1)"
      working: |
        Recognise 4x^2 - 1 as difference of two squares.
        4x^2 - 1 = (2x - 1)(2x + 1)
        S = (2x - 1) / ((2x - 1)(2x + 1))
        Cancel (2x - 1) to leave 1 / (2x + 1).
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identifies the denominator as a difference of squares."
      - marks: 1
        criteria: "Correctly factorises the denominator to (2x-1)(2x+1)."
      - marks: 1
        criteria: "Cancels the correct factors to obtain final simplified fraction."
    hints:
      - level: 1
        text: "Factorise the denominator first. Can you spot the 'difference of two perfect squares' pattern? [20]"

  # EXAM: UASA (Bahagian C - Subjektif)
  # RATIONALE: Requires two-step factorisation: extracting a common constant factor first, then using difference of squares [10, 20].
  - id: Q21
    text: "Factorise completely: $2x^2 - 50$"
    difficulty: medium
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "2(x - 5)(x + 5)"
      working: |
        Extract common factor 2: 2(x^2 - 25)
        Factorise the difference of squares: 2(x - 5)(x + 5)
    marks: 2
    rubric:
      - marks: 1
        criteria: "Extracts common factor 2."
      - marks: 1
        criteria: "Correctly factorises x^2 - 25."
    hints:
      - level: 1
        text: "Look for the largest number that divides both terms first. Then factorise the bracket again."

  # EXAM: UASA (Bahagian C - Subjektif)
  # RATIONALE: Contextual geometry problem requiring expansion of double brackets and subtraction to find the remaining area, testing TP5 application [4, 10, 22].
  - id: Q22
    text: >-
      Encik Mohan's yard, which is rectangular in shape with a length of $(4p + 3)$ m
      and a width of $(2p + 5)$ m. A rectangular fish pond is built in one corner of
      the yard with a length of 10 m and a width of 6 m, while the remaining area is
      covered with artificial grass. Calculate the area, in $m^2$, of the region that
      is covered with artificial grass.
    difficulty: hard
    learning_objective: 2.1.4
    answer:
      type: exact
      value: "8p^2 + 26p - 45"
      working: |
        Total Yard Area = (4p + 3)(2p + 5)
        = 8p^2 + 20p + 6p + 15
        = 8p^2 + 26p + 15
        Pond Area = 10 * 6 = 60
        Grass Area = Total Yard - Pond
        = (8p^2 + 26p + 15) - 60
        = 8p^2 + 26p - 45
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly sets up the expansion for the total yard area."
      - marks: 1
        criteria: "Expands the binomials accurately to 8p^2 + 26p + 15."
      - marks: 1
        criteria: "Subtracts 60 to find the correct final quadratic expression."
    hints:
      - level: 1
        text: "Find the total area of the yard by multiplying length and width, then subtract the area of the pond."
