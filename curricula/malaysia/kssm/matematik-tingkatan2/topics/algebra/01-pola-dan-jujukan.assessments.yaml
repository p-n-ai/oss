topic_id: F2-01
provenance: ai-assisted
questions:
  ### ---------------------------------------------------------
  ### SUBCHAPTER 1.1: Pola (Patterns)
  ### ---------------------------------------------------------
  - id: Q1
    text: "Identify the even numbers (nombor genap) from the following list: 7, 12, 17, 22, 27, 32."
    difficulty: easy
    learning_objective: 1.1.1
    answer:
      type: exact
      value: "12, 22, 32"
      working: |
        Even numbers are numbers that are perfectly divisible by 2.
        12 / 2 = 6
        22 / 2 = 11
        32 / 2 = 16
        The odd numbers (7, 17, 27) leave a remainder.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly identifies all three even numbers without including odd numbers."
    hints:
      - level: 1
        text: "Even numbers can be divided exactly by 2. Check the last digit of each number."

  - id: Q2
    text: "What is the missing number in the following Fibonacci sequence: 0, 1, 1, 2, 3, ___, 8, 13?"
    difficulty: easy
    learning_objective: 1.1.1
    answer:
      type: exact
      value: "5"
      working: |
        A Fibonacci sequence is obtained by adding the two previous terms.
        2 + 3 = 5.
        Check: 3 + 5 = 8.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly states the missing Fibonacci number as 5."
    hints:
      - level: 1
        text: "In a Fibonacci sequence, add the two numbers immediately before the blank to find the answer."

  - id: Q3
    text: "To build Pascal's Triangle (Segi Tiga Pascal), what number must all rows start and end with?"
    difficulty: easy
    learning_objective: 1.1.1
    answer:
      type: exact
      value: "1"
      working: |
        By the definition of Pascal's Triangle, it begins with 1 at the top, and all subsequent rows start and end with the number 1.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly identifies the number 1."
    hints:
      - level: 1
        text: "Look at the outer edges of Pascal's Triangle. They never change."

  - id: Q4
    text: "Identify the pattern for the following sequence of numbers: 17, 7, -3, -13, ..."
    difficulty: medium
    learning_objective: 1.1.1
    answer:
      type: free_text
      value: "Subtract 10 from the previous number."
      working: |
        Check the difference between consecutive terms:
        7 - 17 = -10
        -3 - 7 = -10
        -13 - (-3) = -10
        Pattern: Subtract 10.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the correct operation (subtract/tolak)."
      - marks: 1
        criteria: "Identifies the correct value (10)."
    hints:
      - level: 1
        text: "Are the numbers increasing or decreasing? By how much?"

  - id: Q5
    text: "State the pattern for the set of numbers: 81, 27, 9, 3, ..."
    difficulty: medium
    learning_objective: 1.1.1
    answer:
      type: free_text
      value: "Divide the previous number by 3."
      working: |
        Check the ratio between consecutive terms:
        27 / 81 = 1/3
        9 / 27 = 1/3
        3 / 9 = 1/3
        Pattern: Divide by 3.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the correct operation (divide/bahagi)."
      - marks: 1
        criteria: "Identifies the correct value (3)."
    hints:
      - level: 1
        text: "Since the numbers shrink drastically, check if it's division rather than subtraction."

  ### ---------------------------------------------------------
  ### SUBCHAPTER 1.2: Jujukan (Sequences)
  ### ---------------------------------------------------------
  - id: Q6
    text: "Determine whether the set of numbers 4, 5, -7, 10, -14 is a sequence. Give your reason."
    difficulty: easy
    learning_objective: 1.2.1
    answer:
      type: free_text
      value: "No, because it does not follow a specific or consistent pattern."
      working: |
        Difference between terms:
        5 - 4 = +1
        -7 - 5 = -12
        10 - (-7) = +17
        Since the pattern (+1, -12, +17) is not constant, it is not a sequence.
    marks: 2
    rubric:
      - marks: 1
        criteria: "States 'No' or 'Bukan'."
      - marks: 1
        criteria: "Provides the reason that there is no consistent pattern."
    hints:
      - level: 1
        text: "A sequence must follow the exact same rule for every single step. Does this one?"

  - id: Q7
    text: "Complete the sequence: 7, 13, ___, 25, ___"
    difficulty: easy
    learning_objective: 1.2.2
    answer:
      type: exact
      value: "19, 31"
      working: |
        Find the difference between known consecutive terms: 13 - 7 = 6.
        Pattern is add 6.
        13 + 6 = 19
        25 + 6 = 31
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifies the first missing term as 19."
      - marks: 1
        criteria: "Correctly identifies the second missing term as 31."
    hints:
      - level: 1
        text: "Find the difference between 13 and 7, then apply that to find the missing numbers."

  - id: Q8
    text: "Determine the next term for the sequence: 1, 0.3, 0.09, 0.027, ___"
    difficulty: medium
    learning_objective: 1.2.2
    answer:
      type: exact
      value: "0.0081"
      working: |
        Find the common ratio:
        0.3 / 1 = 0.3
        0.09 / 0.3 = 0.3
        Pattern is multiply by 0.3.
        0.027 * 0.3 = 0.0081.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the pattern as multiplying by 0.3."
      - marks: 1
        criteria: "Calculates the correct next term: 0.0081."
    hints:
      - level: 1
        text: "How do you go from 1 to 0.3, and from 0.3 to 0.09? Try multiplying."

  - id: Q9
    text: "State the pattern of the following sequence: 1/2, 1/4, 0, -1/4, ..."
    difficulty: medium
    learning_objective: 1.2.2
    answer:
      type: free_text
      value: "Subtract 1/4 from the previous number."
      working: |
        Find the common difference:
        1/4 - 1/2 = -1/4
        0 - 1/4 = -1/4
        Pattern is subtract 1/4.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the operation as subtraction."
      - marks: 1
        criteria: "Identifies the value as 1/4."
    hints:
      - level: 1
        text: "Find the difference between 1/2 and 1/4."

  - id: Q10
    text: "Fill in the missing terms: 88, ___, 64, 52, ___"
    difficulty: hard
    learning_objective: 1.2.2
    answer:
      type: exact
      value: "76, 40"
      working: |
        Find the difference between consecutive known terms: 52 - 64 = -12.
        Pattern is subtract 12.
        88 - 12 = 76.
        52 - 12 = 40.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly fills in 76."
      - marks: 1
        criteria: "Correctly fills in 40."
    hints:
      - level: 1
        text: "Use the two numbers that are next to each other (64 and 52) to find the hidden rule first."

  ### ---------------------------------------------------------
  ### SUBCHAPTER 1.3: Pola dan Jujukan (Patterns and Sequences)
  ### ---------------------------------------------------------
  - id: Q11
    text: "Write a rule in words for the sequence 1, 9, 17, 25, 33, ..."
    difficulty: medium
    learning_objective: 1.3.1
    answer:
      type: free_text
      value: "Add 8 to the previous number."
      working: |
        The change between terms is constant:
        9 - 1 = 8
        17 - 9 = 8
        So the rule is add 8 repeatedly.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the operation as addition."
      - marks: 1
        criteria: "States repeated increment of 8."
    hints:
      - level: 1
        text: "Check the difference between each adjacent pair of terms and write it as a sentence."

  - id: Q12
    text: "Write an algebraic expression for the sequence 3, 6, 9, 12, 15, ... and define the values of n."
    difficulty: hard
    learning_objective: 1.3.1
    answer:
      type: exact
      value: "3n, where n = 1, 2, 3, ..."
      working: |
        Pattern is adding 3.
        1st term: 3 = 3(1)
        2nd term: 6 = 3(2)
        3rd term: 9 = 3(3)
        Therefore, the expression is 3n, where n = 1, 2, 3...
    marks: 3
    rubric:
      - marks: 2
        criteria: "Forms the correct algebraic expression (3n)."
      - marks: 1
        criteria: "Correctly defines the starting values of n (n = 1, 2, 3...)."
    hints:
      - level: 1
        text: "Link the term's position (1st, 2nd, 3rd) to the value. 1 x 3 = 3. 2 x 3 = 6."

  - id: Q13
    text: "For the sequence 2, 10, 18, 26, ... determine the 5th term (T5)."
    difficulty: medium
    learning_objective: 1.3.2
    answer:
      type: exact
      value: "34"
      working: |
        Determine the pattern: 10 - 2 = +8. Add 8 to the previous number.
        T1 = 2
        T2 = 10
        T3 = 18
        T4 = 26
        T5 = 26 + 8 = 34
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the pattern as +8."
      - marks: 1
        criteria: "Calculates T5 correctly as 34."
    hints:
      - level: 1
        text: "Find the common difference first, then add it to the 4th term."

  - id: Q14
    text: "Given the sequence 65, 60, 55, 50, ..., which term (T_n) is the number 40?"
    difficulty: medium
    learning_objective: 1.3.2
    answer:
      type: exact
      value: "6th term (T6)"
      working: |
        Pattern: Subtract 5.
        T1 = 65
        T2 = 60
        T3 = 55
        T4 = 50
        T5 = 45
        T6 = 40
        Therefore, 40 is the 6th term.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Continues the sequence accurately down to 40."
      - marks: 1
        criteria: "Correctly identifies its position as the 6th term."
    hints:
      - level: 1
        text: "Keep subtracting 5 and counting your steps until you reach 40."

  - id: Q15
    text: "An automatic fish feeder is set to feed fish 4 times a day. If the first feeding is at 7:35 a.m., at what time is the third feeding?"
    difficulty: hard
    learning_objective: 1.3.3
    answer:
      type: exact
      value: "7:35 p.m."
      working: |
        1 day = 24 hours.
        Interval for 4 feedings: 24 / 4 = 6 hours.
        Pattern = Add 6 hours.
        T1 = 7:35 a.m.
        T2 = 7:35 a.m. + 6 hours = 1:35 p.m.
        T3 = 1:35 p.m. + 6 hours = 7:35 p.m.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Calculates the correct interval pattern (6 hours)."
      - marks: 1
        criteria: "Calculates the second feeding time (T2) accurately."
      - marks: 1
        criteria: "Determines the final third feeding time correctly with correct AM/PM notation."
    hints:
      - level: 1
        text: "First, find out how many hours pass between each of the 4 feedings in a 24-hour day."

  ### ---------------------------------------------------------
  ### UASA NATIONAL EXAM EXEMPLARS
  ### ---------------------------------------------------------
  # EXAM: UASA (Bahagian A - OAP)
  # RATIONALE: Tests the TP3 ability to identify a pattern's multiplying factor and project it forward to determine a specific nth term [3, 6].
  - id: Q16
    text: "It is given that the first four terms of a sequence are 8, 24, 72 and 216. What is the 5th term of the sequence?\n\nA) 144\nB) 225\nC) 648\nD) 732"
    difficulty: easy
    learning_objective: 1.2.2
    answer:
      type: multiple_choice
      value: "C"
      working: |
        The pattern is multiplying the previous term by 3.
        216 * 3 = 648
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option C."
    hints:
      - level: 1
        text: "Compare 8 and 24, and 24 and 72. What number do you multiply by to get the next term?"

  # EXAM: UASA (Bahagian A - OAP)
  # RATIONALE: Tests conceptual understanding of generalizing a pattern using words, directly mapping to SK 1.3.1 [3, 6].
  - id: Q17
    text: "Diagram 1 shows a set of numbers arranged in a pattern: 9, 45, 225, 1 125, ...\nState the pattern for the number set.\n\nA) Multiply the previous number by 15.\nB) Multiply the previous number by 13.\nC) Multiply the previous number by 5.\nD) Multiply the previous number by 3."
    difficulty: easy
    learning_objective: 1.2.2
    answer:
      type: multiple_choice
      value: "C"
      working: |
        45 / 9 = 5
        225 / 45 = 5
        The pattern is multiplying the previous number by 5.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option C."
    hints:
      - level: 1
        text: "Divide the second term by the first term to find the relationship."

  # EXAM: UASA (Bahagian B - OPB)
  # RATIONALE: Assesses the student's ability to recognize the recursive addition rule of Fibonacci-style sequences, avoiding the trap of purely arithmetic differences [9, 14].
  - id: Q18
    text: >-
      Mark 'True' for the correct Fibonacci numbers and 'False' if otherwise.
      (i) 1, 1, 2, 3, 6, 9, 14
      (ii) 1, 3, 4, 7, 11, 18, 29
      (iii) 12, 13, 25, 38, 63, 101
      (iv) 21, 31, 52, 63, 76, 99, 111
    difficulty: medium
    learning_objective: 1.2.2
    answer:
      type: exact
      value: "(i) False, (ii) True, (iii) True, (iv) False"
      working: |
        Fibonacci logic requires the sum of the two previous terms to equal the next term.
        (i) 1+1=2, 1+2=3, 2+3=5 (Not 6). False.
        (ii) 1+3=4, 3+4=7, 4+7=11... True.
        (iii) 12+13=25, 13+25=38, 25+38=63... True.
        (iv) 21+31=52, 31+52=83 (Not 63). False.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correctly identifies (i) as False."
      - marks: 1
        criteria: "Correctly identifies (ii) as True."
      - marks: 1
        criteria: "Correctly identifies (iii) as True."
      - marks: 1
        criteria: "Correctly identifies (iv) as False."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Fibonacci sequences are formed by adding the two previous numbers together to get the next one [15]."

  # EXAM: UASA (Bahagian C - Subjektif)
  # RATIONALE: Requires calculating a negative common difference to complete a sequence involving integers [9, 16].
  - id: Q19
    text: "Complete the following sequence: 7, 1, -5, -11, P, Q"
    difficulty: medium
    learning_objective: 1.2.2
    answer:
      type: exact
      value: "P = -17, Q = -23"
      working: |
        Common difference: 1 - 7 = -6.
        P = -11 - 6 = -17
        Q = -17 - 6 = -23
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly states P = -17."
      - marks: 1
        criteria: "Correctly states Q = -23."
    hints:
      - level: 1
        text: "Find the difference by subtracting the first term from the second term. Apply this to the end of the sequence."

  # EXAM: UASA (Bahagian C - Subjektif)
  # RATIONALE: Requires students to describe a decreasing arithmetic sequence using words, emphasizing generalization methods [9, 17].
  - id: Q20
    text: "The diagram below shows a number sequence: 51, 46, 41, 36, 31. Describe the pattern of the sequence."
    difficulty: easy
    learning_objective: 1.3.1
    answer:
      type: free_text
      value: "Subtract 5 from the previous number."
      working: |
        46 - 51 = -5.
        41 - 46 = -5.
        The sequence is formed by subtracting 5.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Clearly states the subtraction of 5 from the previous term."
    hints:
      - level: 1
        text: "Look at whether the numbers are increasing or decreasing, and by how much."

  # EXAM: UASA (Bahagian C - Subjektif)
  # RATIONALE: Moves from a visual representation to a numerical pattern, hitting the core DSKP requirement of exploratory activities involving objects [7, 18].
  - id: Q21
    text: "The diagram below shows some pencils arranged by Adelia:\n|   |||   |||||\nState the pattern of the pencils above."
    difficulty: easy
    learning_objective: 1.1.1
    answer:
      type: free_text
      value: "Add 2 to the previous number."
      working: |
        The number of pencils are 1, 3, 5.
        The difference is +2 each time.
    marks: 1
    rubric:
      - marks: 1
        criteria: "States the pattern is adding 2."
    hints:
      - level: 1
        text: "Count the number of pencils in each group first to create a number sequence."
