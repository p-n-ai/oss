  - id: WE-01
    topic: "Identifying Patterns (1.1)"
    scenario: "Extend the following number sequence by two more terms: 2, 6, 18, 54, ..."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 1.1.1
    real_world_analogy: >-
      Think of a viral social media post. If one person tells 3 friends, and those 3 each tell 3 more, the number of people who know grows by multiplying every time!
    misconception_alert: >-
      Students often try to subtract (6 - 2 = 4) first. Always check if the difference is the same for the next pair (18 - 6 = 12). If it's not the same, the pattern might be multiplication instead.
    working: |
      Step 1: Compare the first and second term: 6 / 2 = 3.
      Step 2: Verify with the next pair: 18 / 6 = 3. The pattern is 'multiply by 3'.
      Step 3: Calculate the next two terms:
      54 x 3 = 162
      162 x 3 = 486
      Final Answer: 162, 486

  - id: WE-02
    topic: "Algebraic Expressions for Sequences (1.3.1)"
    scenario: "Write an algebraic expression for the sequence: 10, 14, 18, 22, ..."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.3.1
    real_world_analogy: >-
      It's like building a LEGO tower. You start with a big base block (the first number), and every floor you add has the same number of new bricks (the common difference).
    misconception_alert: >-
      The most common error is writing '10 + 4n' and forgetting that the first term is for n=0. If you want to use n=1, 2, 3..., the expression should be '4n + 6'. Always test n=1 to see if you get the first number!
    working: |
      Step 1: Find the common difference: 14 - 10 = 4. This is our multiplier for 'n'.
      Step 2: If we use 4n where n=1, 2, 3..., the first term would be 4(1) = 4. 
      Step 3: Adjust the formula to reach our actual first term (10). 
      4 + 6 = 10. So the constant is +6.
      Final Answer: 4n + 6, where n = 1, 2, 3, ...

  - id: WE-03
    topic: "Solving Problems with Fibonacci Numbers (1.3.3)"
    scenario: "The numbers of rabbits in a colony follow a Fibonacci sequence: 1, 1, 2, 3, 5, 8, ... If the pattern continues, how many rabbits will there be in the 10th generation?"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: 1.3.3
    real_world_analogy: >-
      Fibonacci is nature's signature. Each generation is the sum of the parents and the grandparents.
    misconception_alert: >-
      Don't try to find a multiplication rule! Fibonacci rules only work by adding the two previous numbers. If you lose your place in the list, start recounting from the beginning.
    working: |
      Step 1: List the known generations: 1, 1, 2, 3, 5, 8 (6 generations).
      Step 2: Calculate the 7th: 5 + 8 = 13.
      Step 3: Calculate the 8th: 8 + 13 = 21.
      Step 4: Calculate the 9th: 13 + 21 = 34.
      Step 5: Calculate the 10th: 21 + 34 = 55.
      Final Answer: 55 rabbits
