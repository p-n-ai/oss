  - id: Q17
    text: "Represent the following situation using an inequality: The passing mark, $m$, for a Mathematics test is 50."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 7.2.1
    answer:
      type: exact
      value: "m \\geq 50"
      working: |
        A passing mark of 50 means the mark must be exactly 50 or any number greater than 50.
        Therefore, m >= 50.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correct final answer. Must include the correct inequality sign."
    hints:
      - level: 1
        text: "If you score exactly 50, do you pass? Yes. So you need the symbol for 'greater than or equal to'."

  - id: Q18
    text: "Solve the linear inequality: $x + 4 < 9$"
    difficulty: easy
    tp_level: 3
    kbat: false
    learning_objective: 7.2.2
    answer:
      type: exact
      value: "x < 5"
      working: |
        x + 4 < 9
        x < 9 - 4
        x < 5
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correct final answer. Must include the correct inequality sign."
    hints:
      - level: 1
        text: "Move the +4 to the other side by subtracting 4 from both sides."
