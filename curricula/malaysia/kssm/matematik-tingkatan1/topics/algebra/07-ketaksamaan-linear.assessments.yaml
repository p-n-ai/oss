  - id: Q11
    # EXAM: UASA Bahagian A (OAP)
    text: "Given: $-\\frac{1}{5}x \\geq -\\frac{3}{5}$ \nIf $x$ is a positive integer, state the values of $x$ that satisfy the inequality.\n\nA) 1, 2, 3\nB) 1, 2\nC) 0, 1, 2, 3\nD) 1, 1, 2"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 7.2.2
    answer:
      type: multiple_choice
      value: "A"
      working: |
        -1/5 x >= -3/5 
        Multiply both sides by -5. The sign MUST flip. 
        x <= 3 
        Positive integers less than or equal to 3 are: 1, 2, 3. (Note: 0 is not a positive integer).
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option A."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Do not forget to flip the inequality sign! And do not include '0', since 0 is neutral, not a 'positive integer'."
      - level: 2
        text: "Multiply both sides by -5 to get 'x' by itself. What is the special rule for the inequality symbol when multiplying by a negative?"

  - id: Q12
    # EXAM: UASA Bahagian A (OAP)
    text: "Form a new inequality by performing the operation stated in the brackets. $\\frac{3}{4}g > -6 \\quad [\\times \\frac{2}{3}]$\n\nA) $\\frac{g}{3} > -6$ \nB) $\\frac{g}{2} > -4$ \nC) $\\frac{g}{2} < -4$ \nD) $\\frac{g}{3} > -6$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 7.1.2
    answer:
      type: multiple_choice
      value: "B"
      working: |
        Multiply both sides by 2/3: 
        (3/4 g) * (2/3) > -6 * (2/3) 
        (6/12) g > -12 / 3 
        1/2 g > -4 
        g/2 > -4 
        Since we multiplied by a POSITIVE number, the sign does NOT flip.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option B."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Just because there is a negative number on the right (-6), do not flip the sign! The sign ONLY flips if the multiplier itself is negative."

  - id: Q13
    # EXAM: UASA Bahagian A (OAP)
    text: "Given universal set: $\\{x : x < 15, x \\text{ is an even number}\\}$ \nSet P = {multiples of 3} \nFind $P'$.\n\nA) {3, 6, 9, 12} \nB) {2, 4, 6, 8, 10, 12, 14} \nC) {1, 3, 5, 7, 9, 11, 13} \nD) {2, 4, 8, 10, 14}"
    difficulty: hard
    tp_level: 6
    kbat: true
    learning_objective: 7.2.2
    answer:
      type: multiple_choice
      value: "D"
      working: |
        Universal domain = Even numbers less than 15 = {2, 4, 6, 8, 10, 12, 14} 
        Set P = Multiples of 3 strictly within this domain = {6, 12} 
        P' (Complement of P) = Everything in the universal domain EXCEPT {6, 12} 
        P' = {2, 4, 8, 10, 14}
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option D."
    hints:
      - level: 1
        text: "First, list out every single number in the universal set. (Even numbers smaller than 15)."
      - level: 2
        text: "Next, from that specific list you just made, circle the numbers that are multiples of 3. That is Set P. P' means 'everything else'."

  - id: Q14
    # EXAM: UASA Bahagian B (OPK)
    text: "Match the given integer solution sets to their correct inequality range. Ranges available: $[1 < x < 3], [1 \\leq x < 3], [-1 \\leq x \\leq 3], [-1 < x < 3]$\n(i) $x = -1, 0, 1, 2, 3$ \n(ii) $x = 1, 2$ \n(iii) $x = 0, 1, 2$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 7.2.1
    answer:
      type: exact
      value: "(i) -1 <= x <= 3, (ii) 1 <= x < 3, (iii) -1 < x < 3"
      working: |
        (i) Set includes -1 and 3, so both bounds must have 'or equal to' (<=). Thus: -1 <= x <= 3. 
        (ii) Set includes 1 but stops at 2 (less than 3). So 1 is inclusive, 3 is strict. Thus: 1 <= x < 3. 
        (iii) Set starts at 0 (greater than -1) and stops at 2 (less than 3). Both bounds strict. Thus: -1 < x < 3.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Matches (i) to -1 <= x <= 3."
      - marks: 1
        criteria: "Matches (ii) to 1 <= x < 3."
      - marks: 1
        criteria: "Matches (iii) to -1 < x < 3."
    hints:
      - level: 1
        text: "If the list exactly includes the boundary number, you need the line underneath the symbol (<=)."

  - id: Q15
    # EXAM: UASA Bahagian C (Subjektif)
    text: "Solve each of the following simultaneous linear inequalities and find the possible values of $x$.\n$1 + 4x \\leq 9$ and $-\\frac{2}{5}x \\leq 2$"
    difficulty: hard
    tp_level: 4
    kbat: false
    learning_objective: 7.2.3
    answer:
      type: exact
      value: "-5 \\leq x \\leq 2"
      working: |
        Inequality 1: 1 + 4x <= 9 -> 4x <= 8 -> x <= 2 
        Inequality 2: -2/5 x <= 2 -> x >= 2 * (-5/2) -> x >= -5 (SIGN FLIP) 
        Intersection: -5 <= x <= 2
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly solves both individual inequalities: x <= 2 and x >= -5."
      - marks: 1
        criteria: "Correctly combines into single range: -5 <= x <= 2. Accept equivalent like 2 >= x >= -5, ignore spacing."
    hints:
      - level: 1
        text: "Solve the left inequality first as if it's its own problem. Then solve the right one. Don't forget the sign flip rule on the second one!"

  - id: Q16
    # EXAM: UASA Bahagian C (Subjektif)
    text: "Solve each of the following simultaneous linear inequalities and find the possible values of $x$.\n$3(x + 1) \\geq -6$ and $\\frac{3x}{2} + 1 < 7$"
    difficulty: hard
    tp_level: 4
    kbat: false
    learning_objective: 7.2.3
    answer:
      type: exact
      value: "-3 \\leq x < 4"
      working: |
        Inequality 1: 3(x + 1) >= -6 -> x + 1 >= -2 -> x >= -3
        Inequality 2: 3x/2 + 1 < 7 -> 3x/2 < 6 -> 3x < 12 -> x < 4
        Intersection: -3 <= x < 4
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly solves both individual inequalities: x >= -3 and x < 4."
      - marks: 1
        criteria: "Correctly merges into -3 <= x < 4. Accept equivalent like 4 > x >= -3, ignore spacing."
    hints:
      - level: 1
        text: "For the first inequality, try dividing both sides by 3 before expanding the bracket."

