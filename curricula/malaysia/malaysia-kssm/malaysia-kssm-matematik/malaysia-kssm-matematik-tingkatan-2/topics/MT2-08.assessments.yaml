topic_id: MT2-08
provenance: ai-assisted
questions:

  # =========================
  # 8.1.1 Function Meaning (TP1)
  # =========================
  - id: Q1
    text: "Which of the following relations is a function?"
    difficulty: easy
    learning_objective: "8.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "{(1,2), (2,3), (3,4)}"
        B: "{(1,2), (1,3), (2,4)}"
        C: "{(2,5), (2,6), (3,7)}"
        D: "{(4,8), (4,9), (4,10)}"
      working: |
        Step 1: Check each input value.
        Step 2: A function must assign exactly one output to each input.
        Step 3: Only option A satisfies this rule.
      distractors:
        - value: "B"
          feedback: "Input 1 has two outputs (2 and 3). This breaks the 'one input, one output' rule."
        - value: "C"
          feedback: "Input 2 maps to two outputs. This is a one-to-many relation."
        - value: "D"
          feedback: "Input 4 has multiple outputs. Not a function."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly identifies a valid function."
    hints:
      - level: 1
        text: "Check if any input repeats with different outputs."

  # =========================
  # 8.1.2 Identify Function (OPB)
  # =========================
  - id: Q2
    text: "State whether each relation is a function (True/False):\n(i) {(1,2),(2,3),(3,4)}\n(ii) {(1,2),(1,5)}"
    difficulty: easy
    learning_objective: "8.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: structured
      value: "(i) True, (ii) False"
      working: |
        (i) Each input has one output → Function.
        (ii) Input 1 has two outputs → Not a function.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct answer for (i)."
      - marks: 1
        criteria: "Correct answer for (ii)."
    hints:
      - level: 1
        text: "Focus only on repeated inputs."

  # =========================
  # 8.2.1 Table of Values (TP3)
  # =========================
  - id: Q3
    text: "Complete the table for the function $y = 2x + 1$ when $x = -1, 0, 2$."
    difficulty: medium
    learning_objective: "8.2.1"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "(-1,-1), (0,1), (2,5)"
      working: |
        Substitute each value into y = 2x + 1:
        x = -1 → y = -2 + 1 = -1
        x = 0 → y = 1
        x = 2 → y = 5
    marks: 3
    rubric:
      - marks: 1
        criteria: "Each correct pair earns 1 mark."
    hints:
      - level: 1
        text: "Substitute x into the equation step-by-step."

  # =========================
  # 8.2.1 Graph Concept (MCQ)
  # =========================
  - id: Q4
    text: "Which graph represents a quadratic function?"
    difficulty: medium
    learning_objective: "8.2.1"
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: "B"
      options:
        A: "Straight line"
        B: "U-shaped curve"
        C: "Hyperbola"
        D: "Zig-zag line"
      working: |
        A quadratic function produces a parabola, which is a U-shaped curve.
      distractors:
        - value: "A"
          feedback: "This represents a linear function."
        - value: "C"
          feedback: "This represents a reciprocal function."
        - value: "D"
          feedback: "This is not a standard function graph."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Identifies correct graph shape."
    hints:
      - level: 1
        text: "Think of the shape of $x^2$."

  # =========================
  # 8.2.2 Interpretation (TP4)
  # =========================
  - id: Q5
    text: "A graph shows distance against time. What does the slope represent?"
    difficulty: medium
    learning_objective: "8.2.2"
    tp_level: 4
    kbat: true
    answer:
      type: multiple_choice
      value: "Speed"
      options:
        A: "Distance"
        B: "Time"
        C: "Speed"
        D: "Acceleration"
      working: |
        Slope = change in distance ÷ change in time → speed.
      distractors:
        - value: "A"
          feedback: "Distance is represented on the axis, not slope."
        - value: "B"
          feedback: "Time is the horizontal axis."
        - value: "D"
          feedback: "Acceleration is the slope of a speed-time graph."
    marks: 2
    rubric:
      - marks: 2
        criteria: "Correct interpretation of slope."
    hints:
      - level: 1
        text: "Slope means 'rate of change'. What is changing here?"

  # =========================
  # 8.2.3 Problem Solving (TP6)
  # =========================
  - id: Q6
    text: "Two taxi companies charge as follows:\nCompany A: RM5 + RM2 per km\nCompany B: RM3 per km\nFind the distance when both costs are equal."
    difficulty: hard
    learning_objective: "8.2.3"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "5 km"
      working: |
        Let distance = x
        A: y = 5 + 2x
        B: y = 3x
        Set equal: 5 + 2x = 3x
        x = 5
    marks: 5
    rubric:
      - marks: 2
        criteria: "Correct equations formed."
      - marks: 2
        criteria: "Correct solving process."
      - marks: 1
        criteria: "Correct final answer with unit."
    hints:
      - level: 1
        text: "Set both cost equations equal."