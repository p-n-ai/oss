topic_id: MT2-07
provenance: ai-assisted
description: "Scaffolded worked examples for Cartesian Coordinate Geometry"

worked_examples:
  - id: WE-01
    topic: "Distance between two points on a Cartesian plane"
    difficulty: easy
    learning_objective: "7.1.3"
    tp_level: 2
    real_world_analogy: "A delivery rider travels from one house to another using the shortest possible straight route instead of following road turns."
    misconception_alert: "Students often add coordinate values or count grid steps horizontally and vertically instead of using the distance formula."
    scenario: "Find the distance between point $A(2, 3)$ and point $B(5, 7)$."
    working: |
      1. Identify coordinates: $(x_1, y_1) = (2, 3)$ and $(x_2, y_2) = (5, 7)$.
      2. Write the distance formula: $d = \sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}$.
      3. Substitute values: $d = \sqrt{(5 - 2)^2 + (7 - 3)^2}$.
      4. Simplify differences: $d = \sqrt{3^2 + 4^2}$.
      5. Square values: $d = \sqrt{9 + 16}$.
      6. Add: $d = \sqrt{25}$.
      7. Final answer: $d = 5$ units.

  - id: WE-02
    topic: "Midpoint between two points on a Cartesian plane"
    difficulty: medium
    learning_objective: "7.2.3"
    tp_level: 3
    real_world_analogy: "Two friends agree to meet exactly halfway between their houses at a school canteen table."
    misconception_alert: "Students often confuse midpoint with distance and incorrectly apply subtraction or Pythagoras instead of averaging coordinates."
    scenario: "Calculate the midpoint between $C(-2, 4)$ and $D(4, -6)$."
    working: |
      1. Identify coordinates: $(x_1, y_1) = (-2, 4)$ and $(x_2, y_2) = (4, -6)$.
      2. Write midpoint formula: $M = \left(\frac{x_1 + x_2}{2}, \frac{y_1 + y_2}{2}\right)$.
      3. Substitute x-values: $x_m = \frac{-2 + 4}{2}$.
      4. Simplify numerator: $x_m = \frac{2}{2} = 1$.
      5. Substitute y-values: $y_m = \frac{4 + (-6)}{2}$.
      6. Simplify numerator: $y_m = \frac{-2}{2} = -1$.
      7. Form coordinate pair: $M = (1, -1)$.

  - id: WE-03
    topic: "Coordinate geometry problem solving involving verification of shapes"
    difficulty: hard
    learning_objective: "7.3.1"
    tp_level: 5
    real_world_analogy: "A construction engineer verifies whether a building plot is a perfect square by measuring diagonals rather than relying on visual appearance."
    misconception_alert: "Students often assume equal sides alone are enough to confirm a square, without checking diagonals and midpoint properties."
    scenario: "Given points $E(1,2)$, $F(5,2)$, $G(5,6)$, and $H(1,6)$, prove that they form a square by analyzing diagonals $EG$ and $FH$."
    working: |
      1. Identify diagonal EG endpoints: $E(1,2)$ and $G(5,6)$.
      2. Apply distance formula: $EG = \sqrt{(5-1)^2 + (6-2)^2}$.
      3. Simplify: $EG = \sqrt{4^2 + 4^2}$.
      4. Square values: $EG = \sqrt{16 + 16} = \sqrt{32}$.
      5. Identify diagonal FH endpoints: $F(5,2)$ and $H(1,6)$.
      6. Apply distance formula: $FH = \sqrt{(1-5)^2 + (6-2)^2}$.
      7. Simplify: $FH = \sqrt{(-4)^2 + 4^2} = \sqrt{16 + 16} = \sqrt{32}$.
      8. Compare diagonals: $EG = FH = \sqrt{32}$.
      9. Find midpoint of EG: $\left(\frac{1+5}{2}, \frac{2+6}{2}\right) = (3,4)$.
      10. Find midpoint of FH: $\left(\frac{5+1}{2}, \frac{2+6}{2}\right) = (3,4)$.
      11. Conclusion: Equal diagonals and identical midpoint confirm a square.