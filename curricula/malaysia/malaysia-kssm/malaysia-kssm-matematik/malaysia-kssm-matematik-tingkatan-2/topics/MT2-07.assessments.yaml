topic_id: MT2-07
provenance: ai-assisted

questions:
  - id: Q1
    text: "Which of the following best describes the distance between two points on a Cartesian plane?"
    difficulty: easy
    type: multiple_choice
    learning_objective: "7.1.1"
    tp_level: 1
    answer:
      value: "The shortest straight-line length connecting two points."
      working: |
        Distance in the Cartesian system is defined as the shortest straight-line segment joining two coordinates.
      options:
        A: "The shortest straight-line length connecting two points."
        B: "The total number of grid units moved horizontally and vertically."
        C: "The average of the x-coordinates and y-coordinates."
        D: "The difference between x-values only."
      distractors:
        - value: "B"
          feedback: "This describes Manhattan distance, not Euclidean distance used in KSSM."
        - value: "C"
          feedback: "This describes midpoint, not distance."
        - value: "D"
          feedback: "Distance involves both x and y components, not only one axis."
    marks: 1
    hints:
      - level: 1
        text: "Think: What is the shortest possible path between two points?"

  - id: Q2
    text: "Given points P(2,2) and Q(2,8), determine the distance between them."
    difficulty: easy
    type: exact
    learning_objective: "7.1.3"
    tp_level: 2
    answer:
      value: "6"
      working: |
        Since x-coordinates are equal (x = 2), distance is vertical only.
        Apply |y2 - y1| = |8 - 2| = 6.
      options: null
    marks: 2
    hints:
      - level: 1
        text: "Same x-value means you only compare y-values."

  - id: Q3
    text: "Calculate the distance between A(1,5) and B(5,2)."
    difficulty: medium
    type: exact
    learning_objective: "7.1.3"
    tp_level: 3
    answer:
      value: "5"
      working: |
        d = √((5−1)² + (2−5)²)
        = √(4² + (−3)²)
        = √(16 + 9)
        = 5
      options: null
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct substitution into distance formula"
      - marks: 1
        criteria: "Correct handling of negative values"
      - marks: 1
        criteria: "Correct final simplification"
    hints:
      - level: 1
        text: "Always square both x and y differences separately."
      - level: 2
        text: "Remember: (-3)² becomes positive."

  - id: Q4
    text: "Find the midpoint of C(-2,4) and D(4,-6)."
    difficulty: medium
    type: exact
    learning_objective: "7.2.3"
    tp_level: 3
    answer:
      value: "(1,-1)"
      working: |
        Midpoint formula: ((x1+x2)/2, (y1+y2)/2)
        x = (-2+4)/2 = 1
        y = (4-6)/2 = -1
      options: null
    marks: 3
    hints:
      - level: 1
        text: "Average x-values separately from y-values."

  - id: Q5
    text: "Midpoint of PQ is M(3,4). If P is (1,2), find Q."
    difficulty: hard
    type: exact
    learning_objective: "7.2.4"
    tp_level: 4
    answer:
      value: "(5,6)"
      working: |
        Let Q = (x,y)
        (1+x)/2 = 3 → x = 5
        (2+y)/2 = 4 → y = 6
      options: null
    marks: 4
    hints:
      - level: 1
        text: "Reverse midpoint means solving backwards."

  - id: Q6
    text: "A map scale is 1 unit = 5 km. Hospital is at (-4,3), school is at (8,-2). Find real distance."
    difficulty: hard
    type: exact
    learning_objective: "7.3.1"
    tp_level: 5
    answer:
      value: "65"
      working: |
        d = √((8+4)² + (-2-3)²)
        = √(12² + (-5)²)
        = 13 units
        Real distance = 13 × 5 = 65 km
      options: null
    marks: 4
    hints:
      - level: 1
        text: "First find grid distance."
      - level: 2
        text: "Then apply scale conversion."