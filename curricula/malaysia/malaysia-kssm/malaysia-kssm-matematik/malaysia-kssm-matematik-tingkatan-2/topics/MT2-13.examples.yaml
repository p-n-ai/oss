description: "Worked examples for Kebarangkalian Mudah"
worked_examples:
  - id: WE-01
    topic: "Menentukan Ruang Sampel dan Peristiwa"
    difficulty: easy
    real_world_analogy: "Memilih warna guli daripada beg sebagai perwakilan ruang sampel dalam eksperimen"
    misconception_alert: "Pelajar sering mengelirukan ruang sampel dengan peristiwa tertentu. Ingat bahawa ruang sampel merangkumi semua kemungkinan hasil."
    scenario: "Anda mempunyai beg yang mengandungi 3 guli merah, 2 guli hijau, dan 1 guli biru. Nyatakan ruang sampel dan satu peristiwa jika seorang pelajar memilih satu guli secara rawak."
    working: |
      Step 1: Tentukan ruang sampel. Ruang sampel adalah semua hasil yang mungkin. Dalam kes ini, ruang sampel adalah {merah, merah, merah, hijau, hijau, biru}.
      Step 2: Nyatakan peristiwa. Contohnya, peristiwa mendapatkan guli merah adalah {merah, merah, merah}.
      Step 3: Simpulkan bahawa ruang sampel mewakili semua kemungkinan, manakala peristiwa adalah subset daripada ruang sampel.

  - id: WE-02
    topic: "Menentukan Kebarangkalian Peristiwa"
    difficulty: medium
    real_world_analogy: "Melempar syiling dan berharap akan mendapat kepala sebagai contoh peristiwa"
    misconception_alert: "Ada yang menganggap kebarangkalian tidak berubah walaupun bilangan cubaan berubah. Ingat, kebarangkalian teori tidak berubah tetapi kebarangkalian eksperimen boleh berubah dengan bilangan cubaan."
    scenario: "Seorang pelajar melemparkan satu dadu biasa sebanyak 30 kali. Berapakah kebarangkalian teori untuk mendapatkan nombor genap?"
    working: |
      Step 1: Tentukan ruang sampel. Dadu biasa mempunyai 6 sisi, jadi ruang sampel adalah {1, 2, 3, 4, 5, 6}.
      Step 2: Tentukan peristiwa mendapatkan nombor genap. Nombor genap adalah {2, 4, 6}.
      Step 3: Hitung kebarangkalian teori. Kebarangkalian teori = bilangan hasil peristiwa / bilangan hasil dalam ruang sampel = 3/6 = 1/2.
      Step 4: Oleh itu, kebarangkalian teori untuk mendapatkan nombor genap adalah 0.5 atau 50%.

  - id: WE-03
    topic: "Menentukan Kebarangkalian Peristiwa Pelengkap"
    difficulty: hard
    real_world_analogy: "Memikirkan tentang tidak mendapat hujan apabila ramalan cuaca mengatakan ada 70% kebarangkalian hujan"
    misconception_alert: "Pelajar mungkin lupa bahawa kebarangkalian peristiwa pelengkap dan peristiwa asal mesti berjumlah 1."
    scenario: "Dalam satu ujian, kebarangkalian untuk lulus ialah 0.7. Hitung kebarangkalian untuk gagal."
    working: |
      Step 1: Kenal pasti kebarangkalian peristiwa pelengkap. Peristiwa pelengkap ialah kemungkinan untuk gagal.
      Step 2: Gunakan formula kebarangkalian pelengkap: P(gagal) = 1 - P(lulus).
      Step 3: Hitung kebarangkalian untuk gagal: P(gagal) = 1 - 0.7 = 0.3.
      Step 4: Oleh itu, kebarangkalian untuk gagal dalam ujian tersebut adalah 0.3 atau 30%.