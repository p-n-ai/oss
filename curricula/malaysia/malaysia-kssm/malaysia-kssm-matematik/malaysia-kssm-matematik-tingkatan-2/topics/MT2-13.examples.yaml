id: MT2-13
topic: "Simple Probability"

examples:
  # --- 13.2.1 Sample Space (Easy) ---
  - id: WE-01
    topic: "Sample Space and Events"
    difficulty: easy
    learning_objective: "13.2.1"
    real_world_analogy: "Think of sample space like a Pasar Malam food stall menu. Everything available to buy is the sample space, while your chosen food is just one event."
    misconception_alert: "The 'Set vs Number' trap. Students often confuse S (the full list) with n(S) (the count). S is a set { }, n(S) is a number."
    scenario: "A letter is picked randomly from the word 'PROBABILITY'. List the sample space and the event of picking a vowel."
    working: |
      1. List all letters in the word PROBABILITY: P, R, O, B, A, B, I, L, I, T, Y.
      2. Write sample space: S = {P, R, O, B, A, B, I, L, I, T, Y}.
      3. Count total outcomes: n(S) = 11.
      4. Identify vowels: O, A, I, I.
      5. Write event A: A = {O, A, I, I}.
      6. Count event outcomes: n(A) = 4.

  # --- 13.1.1 Experimental Probability (Medium) ---
  - id: WE-02
    topic: "Experimental Probability"
    difficulty: medium
    learning_objective: "13.1.1"
    real_world_analogy: "Like checking how often your favourite Mamak gives crispy roti canai out of 20 orders — that is experimental probability."
    misconception_alert: "The 'Theoretical vs Experimental' confusion. Students think experimental must equal theory immediately. It only gets closer when trials increase."
    scenario: "A coin is flipped 80 times and lands on heads 52 times. Find the experimental probability of heads."
    working: |
      1. Identify frequency of heads = 52.
      2. Total trials = 80.
      3. Use formula P(A) = frequency / total.
      4. P(heads) = 52/80.
      5. Simplify: 52 ÷ 4 = 13, 80 ÷ 4 = 20.
      6. Final answer: 13/20.

  # --- 13.3.2 Complement Probability (Medium) ---
  - id: WE-03
    topic: "Complement of an Event"
    difficulty: medium
    learning_objective: "13.3.2"
    real_world_analogy: "If there is a 30% chance of traffic jam on the Federal Highway, then there is a 70% chance of NO traffic jam — that is complement probability."
    misconception_alert: "The 'Not Event ≠ Just Opposite Feeling' trap. Students forget to subtract from 1."
    scenario: "The probability of drawing a red marble is 2/5. Find the probability of NOT drawing a red marble."
    working: |
      1. P(red) = 2/5.
      2. Use complement rule: P(A') = 1 - P(A).
      3. P(not red) = 1 - 2/5.
      4. Convert: 1 = 5/5.
      5. 5/5 - 2/5 = 3/5.
      6. Final answer: 3/5.

  # --- 13.4.1 Problem Solving (Hard / TP6) ---
  - id: WE-04
    topic: "Real-Life Probability Problem Solving"
    difficulty: hard
    learning_objective: "13.4.1"
    real_world_analogy: "Imagine you are managing a night market stall. You use past sales patterns to predict future profit — that is probability in business strategy."
    misconception_alert: "The 'Jumping Steps' trap. Students often calculate profit without first finding total outcomes or probability structure."
    scenario: "A shop sells 40 drinks per day. 10 are iced tea. Profit per iced tea is RM2. If the shop operates for 30 days, find total expected profit from iced tea."
    working: |
      1. Total drinks per day = 40.
      2. Iced tea = 10.
      3. Probability of iced tea = 10/40 = 1/4.
      4. Total drinks in 30 days = 40 × 30 = 1200.
      5. Expected iced tea sold = 1/4 × 1200 = 300.
      6. Profit = 300 × RM2 = RM600.
      7. Final answer: RM600.