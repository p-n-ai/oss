topic_id: MT2-02
provenance: ai-assisted
worked_examples:
  - id: WE-01
    topic: "Expansion (2.1)"
    scenario: "Expand the given algebraic expression brackets: $(x + 3)(x - 4)$"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 2.1.2
    real_world_analogy: >-
      Think of expanding double brackets like the 'Pasar Malam Handshake'. Every person in the first tent ($x$ and $+3$) MUST shake hands with every person in the second tent ($x$ and $-4$). Nobody gets skipped!
    misconception_alert: >-
      Aiyoo, don't just multiply the front and back terms to get $x^2 - 12$! The middle terms MUST interact too! Draw 'Rainbow Arcs' to visually track your handshakes so you never forget the inner and outer multiplications.
    working: |
      Step 1: Multiply the first terms (First handshakes):
      $x \times x = x^2$
      
      Step 2: Multiply the outer terms (Outer handshakes):
      $x \times (-4) = -4x$
      
      Step 3: Multiply the inner terms (Inner handshakes):
      $3 \times x = 3x$
      
      Step 4: Multiply the last terms (Last handshakes):
      $3 \times (-4) = -12$
      
      Step 5: Combine them all together in one line:
      $= x^2 - 4x + 3x - 12$
      
      Final Step: Simplify by gathering the like terms in the middle ($-4x + 3x = -1x$):
      Final Answer: $x^2 - x - 12$

  - id: WE-02
    topic: "Factorisation (2.2)"
    scenario: "Factorise the following quadratic expression completely using the cross-multiplication method: $x^2 + 7x + 10$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 2.2.2
    real_world_analogy: >-
      Factorising is like 'un-baking' a cake to find out what ingredients were mixed into it. We are looking for the two original brackets that were multiplied together to create the quadratic expression.
    misconception_alert: >-
      Watch out for the signs! When finding factors of $+10$ that add to $+7$, do not randomly pick numbers. Both factors have to be positive ($+2$ and $+5$) for everything to balance out properly. Golden Rule 1: Always do a quick 'Rainbow Check-Back' in your head! Mentally expand your answer $(x + 2)(x + 5)$ to ensure it perfectly reconstructs the original middle term $+7x$.
    working: |
      Step 1: Look at the last number ($+10$). Let's list the factors of 10: 
      $(1, 10)$ and $(2, 5)$
      
      Step 2: Look at the middle number ($+7$). Which pair of factors adds up to 7?
      $1 + 10 = 11$ (Incorrect)
      $2 + 5 = 7$ (Correct!)
      
      Step 3: Setup the cross-multiplication frame (Tic-Tac-Toe):
      Write factors of $x^2$ on the left: $x$ and $x$
      Write factors of 10 on the right: $+2$ and $+5$
      
      Step 4: Cross multiply to verify the middle term:
      $x \times 5 = 5x$
      $x \times 2 = 2x$
      Sum $= 5x + 2x = 7x$ (Matches the middle term exactly!)
      
      Step 5: Read horizontally to form your two brackets.
      Final Answer: $(x + 2)(x + 5)$

  - id: WE-03
    topic: "Algebraic Fractions (2.3)"
    scenario: "Simplify the algebraic fraction equation: $\frac{3}{4r} - \frac{m}{3rs}$"
    difficulty: hard
    tp_level: 4
    kbat: false
    learning_objective: 2.3.1
    real_world_analogy: >-
      Subtracting fractions is exactly like the 'Mamak Currency Exchange'. You cannot just subtract Ringgit and Yen together without exchanging them to a common currency first. That 'common currency' is your common denominator!
    misconception_alert: >-
      The biggest mistake students make is subtracting the top numbers and subtracting the bottom numbers. You can NEVER subtract denominators! Always find the Lowest Common Multiple (LCM) first.
    working: |
      Step 1: Look at the two denominators: $4r$ and $3rs$. Senang je ni! We must find the Lowest Common Multiple (LCM) to get our 'common currency'.
      - Numbers: LCM of $4$ and $3$ is $12$.
      - Variables: LCM of $r$ and $rs$ is $rs$.
      - Total LCM (Common Denominator) = $12rs$.
      
      Step 2: Transform the first fraction. Ask yourself, what do I multiply $4r$ by to get $12rs$? The answer is $3s$. Multiply top and bottom!
      $= \frac{3 \times 3s}{4r \times 3s} = \frac{9s}{12rs}$
      
      Step 3: Transform the second fraction. What do I multiply $3rs$ by to get $12rs$? The answer is $4$. Multiply top and bottom!
      $= \frac{m \times 4}{3rs \times 4} = \frac{4m}{12rs}$
      
      Step 4: Ngam! Both fractions are in the same currency now. We can safely subtract the numerators over the single common denominator:
      $= \frac{9s}{12rs} - \frac{4m}{12rs}$
      
      Final Answer: $\frac{9s - 4m}{12rs}$
