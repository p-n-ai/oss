topic_id: MT2-04
provenance: ai-assisted
questions:
  - id: Q1
    text: "Which statement best defines a regular polygon?"
    difficulty: easy
    learning_objective: "4.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "All sides are equal and all interior angles are equal."
      working: |
        A regular polygon must be both equilateral (equal sides) and equiangular (equal angles).
      distractors:
        - value: "All sides are equal only."
          feedback: "Equal sides alone are not enough. The angles must also be equal."
        - value: "All angles are equal only."
          feedback: "Equal angles alone do not guarantee equal side lengths."
        - value: "It has at least one line of symmetry."
          feedback: "Many irregular shapes also have symmetry. Regular polygons require equal sides AND angles."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correct definition selected."
    hints:
      - level: 1
        text: "A regular polygon must satisfy TWO conditions, not just one."

  - id: Q2
    text: "State the number of axes of symmetry for a regular octagon."
    difficulty: easy
    learning_objective: "4.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "8"
      working: |
        For a regular polygon, number of axes of symmetry = number of sides.
        Octagon has 8 sides → 8 axes of symmetry.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correct answer: 8."
    hints:
      - level: 1
        text: "In a regular polygon, symmetry follows the number of sides."

  - id: Q3
    text: "Calculate the sum of interior angles of a hexagon."
    difficulty: medium
    learning_objective: "4.2.1"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "720°"
      working: |
        Use formula: (n - 2) × 180°
        n = 6
        (6 - 2) × 180 = 4 × 180 = 720°
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct substitution."
      - marks: 1
        criteria: "Correct final answer."
    hints:
      - level: 1
        text: "How many triangles can be formed inside a 6-sided shape?"

  - id: Q4
    text: "Find the exterior angle of a regular decagon."
    difficulty: medium
    learning_objective: "4.2.3"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "36°"
      working: |
        Exterior angle = 360° / n
        n = 10
        360 ÷ 10 = 36°
    marks: 2
    rubric:
      - marks: 1
        criteria: "Uses correct formula."
      - marks: 1
        criteria: "Correct answer."
    hints:
      - level: 1
        text: "Exterior angles always add up to 360°."

  - id: Q5
    text: "A regular polygon has an exterior angle of 30°. How many sides does it have?"
    difficulty: medium
    learning_objective: "4.2.3"
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "12"
      working: |
        n = 360° / 30°
        n = 12
    marks: 2
    rubric:
      - marks: 2
        criteria: "Correct answer with working."
    hints:
      - level: 1
        text: "Divide 360° by the given angle."

  - id: Q6
    text: "A regular pentagon and a square meet at a point. Find the missing angle x."
    difficulty: hard
    learning_objective: "4.2.4"
    tp_level: 5
    kbat: true
    answer:
      type: exact
      value: "162°"
      working: |
        Pentagon angle = 108°
        Square angle = 90°
        Total around a point = 360°
        x = 360 - 108 - 90 = 162°
    marks: 4
    rubric:
      - marks: 2
        criteria: "Finds correct angles."
      - marks: 2
        criteria: "Applies angle rule correctly."
    hints:
      - level: 1
        text: "Angles around a point always add up to 360°."

  - id: Q7
    text: "Is it possible for a polygon to have a total interior angle of 300°? Explain."
    difficulty: hard
    learning_objective: "4.2.4"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "No, because the number of sides is not a whole number."
      working: |
        (n - 2) × 180 = 300
        n - 2 = 300 / 180 = 1.67
        n = 3.67 (not integer)
        Therefore impossible.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Forms equation."
      - marks: 1
        criteria: "Finds non-integer value."
      - marks: 1
        criteria: "Explains impossibility."
    hints:
      - level: 1
        text: "Number of sides must be a whole number."

  - id: Q8
    text: "Which formula is used to find the sum of interior angles of a polygon?"
    difficulty: easy
    learning_objective: "4.2.1"
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "(n - 2) × 180°"
      working: |
        Standard formula for sum of interior angles.
      distractors:
        - value: "n × 180°"
          feedback: "This overcounts the total."
        - value: "360° / n"
          feedback: "This is for exterior angle, not interior sum."
        - value: "(n + 2) × 180°"
          feedback: "Incorrect formula."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correct formula selected."
    hints:
      - level: 1
        text: "Think about triangles inside a polygon."