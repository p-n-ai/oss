learning_objectives:
  - id: "6.1.1"
    content_standard_id: "6.1"
    text_en: "Compare, contrast and classify three-dimensional shapes including prisms, pyramids, cylinders, cones and spheres, and describe their geometric properties."
    bloom: analyze

  - id: "6.2.1"
    content_standard_id: "6.2"
    text_en: "Analyse nets of prisms, pyramids, cylinders and cones, and construct models from nets."
    bloom: analyze

  - id: "6.3.1"
    content_standard_id: "6.3"
    text_en: "Derive and use formulae for surface area of cubes, cuboids, prisms, pyramids, cylinders and cones."
    bloom: apply

  - id: "6.3.2"
    content_standard_id: "6.3"
    text_en: "Determine surface area of spheres using formula."
    bloom: apply

  - id: "6.3.3"
    content_standard_id: "6.3"
    text_en: "Solve problems involving surface area of three-dimensional shapes."
    bloom: evaluate

  - id: "6.4.1"
