prerequisites:
  required:
    - "MT1-13"
    - "MT1-10"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Identify and classify 3D shapes using real objects."
    - "Step 2: Explore nets and relate them to 3D structures."
    - "Step 3: Derive surface area formulas from nets."
    - "Step 4: Derive volume formulas from base area × height relationships."
    - "Step 5: Apply formulas to spheres and composite shapes."
    - "Step 6: Solve real-world problems involving unit conversion and combined shapes."

  common_misconceptions:
    - misconception: "Students think spheres have edges or vertices."
      remediation: "Clarify that all points on a sphere are equidistant from the centre, so no edges or vertices exist."

    - misconception: "Students confuse slant height with vertical height."
      remediation: "Emphasise that volume uses perpendicular height only."

    - misconception: "Students mix up surface area and volume formulas."
      remediation: "Use unit reasoning: cm² vs cm³."

  engagement_hooks:
    - "Tun Mustapha Tower: Compare cylindrical structure with cuboid buildings."
    - "Traditional Malay roof structures: Explore geometric efficiency."
    - "Ice cream cones: Real-world volume application."

