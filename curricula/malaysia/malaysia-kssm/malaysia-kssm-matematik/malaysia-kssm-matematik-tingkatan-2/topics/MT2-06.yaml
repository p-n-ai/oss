    text_en: "Derive formulae for volume of prisms, cylinders, pyramids and cones."
    bloom: analyze

  - id: "6.4.2"
    content_standard_id: "6.4"
    text_en: "Calculate volume of prisms, cylinders, cones, pyramids and spheres."
    bloom: apply

  - id: "6.4.3"
    content_standard_id: "6.4"
