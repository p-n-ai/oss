topic_id: MT2-09
provenance: ai-assisted
questions:

  # 9.1.1 (OAP - TP1)
  - id: Q1
    text: "Which of the following best defines speed as a rate?"
    difficulty: easy
    learning_objective: "9.1.1"
    tp_level: 1
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "The ratio of distance traveled to time taken"
        B: "The total distance traveled"
        C: "Distance multiplied by time"
        D: "Change in position only"
      working: |
        Speed is defined as $Speed = \frac{Distance}{Time}$.
      distractors:
        - value: "B"
          feedback: "This describes distance only. Speed must include time."
        - value: "C"
          feedback: "Multiplying distance and time is incorrect. Speed is a ratio."
        - value: "D"
          feedback: "This refers to displacement, not rate."
    marks: 1

  # 9.1.1 (OPB - TP2)
  - id: Q2
    text: "State True or False: Speed is a comparison of two different quantities."
    difficulty: easy
    learning_objective: "9.1.1"
    tp_level: 2
    answer:
      type: exact
      value: "True"
      working: |
        Speed compares distance and time.
    marks: 1

  # 9.1.2 (Subjective - TP2)
  - id: Q3
    text: "A car travels 10 m every second. Is the motion uniform or non-uniform?"
    difficulty: easy
    learning_objective: "9.1.2"
    tp_level: 2
    answer:
      type: exact
      value: "Uniform speed"
      working: |
        Equal distances are covered in equal time intervals.
    marks: 2
    hints:
      - level: 1
        text: "Check if the distance is consistent for each second."

  # 9.1.3 (Subjective - TP3)
  - id: Q4
    text: "Convert $72\\text{ km/h}$ to $m/s$."
    difficulty: medium
    learning_objective: "9.1.3"
    tp_level: 3
    answer:
      type: exact
      value: "20 m/s"
      working: |
        $72 \\times \\frac{1000}{3600} = 20$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct conversion factor"
      - marks: 2
        criteria: "Correct final answer"
    hints:
      - level: 1
        text: "Use $\\frac{1000}{3600}$ to convert km/h to m/s."

  # 9.1.4 (OAP - TP4)
  - id: Q5
    text: "A bus travels 300 km in 5 hours. What is its average speed?"
    difficulty: medium
    learning_objective: "9.1.4"
    tp_level: 4
    answer:
      type: multiple_choice
      value: "B"
      options:
        A: "50 km/h"
        B: "60 km/h"
        C: "65 km/h"
        D: "70 km/h"
      working: |
        $Speed = 300 / 5 = 60$
      distractors:
        - value: "A"
          feedback: "Check your division again."
        - value: "C"
          feedback: "You may have miscalculated the division."
        - value: "D"
          feedback: "Re-evaluate using the correct formula."
    marks: 2

  # 9.2.2 (OPB - TP3)
  - id: Q6
    text: "Match the correct formula: Acceleration"
    difficulty: medium
    learning_objective: "9.2.2"
    tp_level: 3
    answer:
      type: exact
      value: "$a = \\frac{v-u}{t}$"
      working: |
        Acceleration measures change in velocity over time.
    marks: 2

  # 9.2.2 (Subjective - TP4)
  - id: Q7
    text: "A car increases its speed from 10 m/s to 30 m/s in 5 seconds. Find the acceleration."
    difficulty: medium
    learning_objective: "9.2.2"
    tp_level: 4
    answer:
      type: exact
      value: "4 m/s^2"
      working: |
        $a = (30-10)/5 = 4$
    marks: 4
    rubric:
      - marks: 2
        criteria: "Correct substitution"
      - marks: 2
        criteria: "Correct final answer"
    hints:
      - level: 1
        text: "Identify initial and final speeds before substituting."

  # 9.2.3 (Subjective - TP6)
  - id: Q8
    text: "A vehicle decelerates uniformly from 20 m/s to rest in 10 s. Find the distance traveled."
    difficulty: hard
    learning_objective: "9.2.3"
    tp_level: 6
    answer:
      type: exact
      value: "100 m"
      working: |
        Average speed = (20+0)/2 = 10  
        Distance = 10 × 10 = 100
    marks: 6
    rubric:
      - marks: 3
        criteria: "Correct use of average speed"
      - marks: 3
        criteria: "Correct distance calculation"
    hints:
      - level: 1
        text: "Use average speed when acceleration is uniform."