questions:
  # LO 9.1.1: Menerangkan maksud laju sebagai suatu kadar yang melibatkan jarak dan masa.
  - id: Q1
    text: "Seorang pelari menamatkan larian sejauh 400 meter dalam masa 50 saat. Apakah laju pelari tersebut dalam meter per saat?"
    difficulty: medium
    learning_objective: LO9.1.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: '8 m/s'
      working: |
        \[
        \text{Laju} = \frac{\text{Jarak}}{\text{Masa}} = \frac{400 \, \text{m}}{50 \, \text{s}} = 8 \, \text{m/s}
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira jarak atau masa dengan betul."
      - marks: 2
        criteria: "Menggunakan formula laju dengan betul."
      - marks: 3
        criteria: "Mengira laju dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa laju adalah jarak dibahagi dengan masa."

  # LO 9.1.2: Memerihal perbezaan antara laju seragam dan laju tak seragam.
  - id: Q2
    text: "Jelaskan perbezaan antara laju seragam dan laju tak seragam dengan memberikan contoh bagi setiap satu."
    difficulty: medium
    learning_objective: LO9.1.2
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Laju seragam bermaksud laju yang tidak berubah sepanjang masa. Contohnya, kereta bergerak pada 60 km/j sepanjang perjalanan. Laju tak seragam bermaksud laju yang berubah. Contohnya, kereta yang mempercepat dari 0 hingga 60 km/j."
      working: |
        Laju seragam: Laju yang tetap tanpa perubahan. Contoh: Kereta bergerak pada 60 km/j sepanjang masa.
        Laju tak seragam: Laju yang berubah dengan masa. Contoh: Kereta yang mempercepat dari berhenti hingga 60 km/j.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Menjelaskan konsep laju seragam dengan contoh."
      - marks: 2
        criteria: "Menjelaskan konsep laju tak seragam dengan contoh."
    hints:
      - level: 1
        text: "Fikirkan perbezaan antara kelajuan yang tetap dan yang berubah."

  # LO 9.1.3: Melaksanakan pengiraan yang melibatkan laju dan laju purata termasuk penukaran unit.
  - id: Q3
    text: "Sebuah kereta bergerak pada kelajuan 90 km/j selama 2 jam dan kemudian 60 km/j selama 1 jam. Apakah laju purata kereta tersebut untuk keseluruhan perjalanan?"
    difficulty: medium
    learning_objective: LO9.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '80 km/j'
      working: |
        \[
        \text{Jarak pertama} = 90 \, \text{km/j} \times 2 \, \text{jam} = 180 \, \text{km}
        \]
        \[
        \text{Jarak kedua} = 60 \, \text{km/j} \times 1 \, \text{jam} = 60 \, \text{km}
        \]
        \[
        \text{Jumlah jarak} = 180 \, \text{km} + 60 \, \text{km} = 240 \, \text{km}
        \]
        \[
        \text{Jumlah masa} = 2 \, \text{jam} + 1 \, \text{jam} = 3 \, \text{jam}
        \]
        \[
        \text{Laju purata} = \frac{\text{Jumlah jarak}}{\text{Jumlah masa}} = \frac{240 \, \text{km}}{3 \, \text{jam}} = 80 \, \text{km/j}
        \]
    marks: 4
    rubric:
      - marks: 1
        criteria: "Mengira jarak setiap bahagian perjalanan dengan betul."
      - marks: 2
        criteria: "Mengira jumlah jarak dan masa dengan betul."
      - marks: 4
        criteria: "Mengira laju purata dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan anda menambah jarak dan masa dengan betul sebelum mengira laju purata."

  # LO 9.2.1: Menerangkan maksud pecutan dan nyahpecutan sebagai suatu kadar yang melibatkan laju dan masa.
  - id: Q4
    text: "Jelaskan maksud pecutan dan nyahpecutan dengan memberikan satu contoh bagi setiap satu."
    difficulty: medium
    learning_objective: LO9.2.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Pecutan adalah perubahan laju dalam satu tempoh masa, contohnya, kereta mempercepat dari 0 hingga 60 km/j dalam 10 saat. Nyahpecutan adalah pengurangan laju dalam satu tempoh masa, contohnya, kereta memperlahankan dari 60 km/j hingga 0 km/j."
      working: |
        Pecutan: Perubahan positif dalam laju. Contoh: Kereta mempercepat dari 0 hingga 60 km/j.
        Nyahpecutan: Perubahan negatif dalam laju. Contoh: Kereta memperlahankan dari 60 km/j hingga berhenti.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Menjelaskan konsep pecutan dengan contoh."
      - marks: 2
        criteria: "Menjelaskan konsep nyahpecutan dengan contoh."
    hints:
      - level: 1
        text: "Fikirkan bagaimana laju berubah sama ada bertambah atau berkurang."

  # LO 9.2.2: Melaksanakan pengiraan yang melibatkan pecutan termasuk penukaran unit.
  - id: Q5
    text: "Sebuah kereta mempercepat dari keadaan pegun kepada 25 m/s dalam masa 5 saat. Hitung pecutan kereta tersebut."
    difficulty: medium
    learning_objective: LO9.2.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '5 m/s²'
      working: |
        \[
        \text{Pecutan} = \frac{\Delta \text{Laju}}{\Delta \text{Masa}} = \frac{25 \, \text{m/s} - 0 \, \text{m/s}}{5 \, \text{s}} = 5 \, \text{m/s}^2
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira perubahan laju dengan betul."
      - marks: 2
        criteria: "Menggunakan formula pecutan dengan betul."
      - marks: 3
        criteria: "Mengira pecutan dengan betul."
    hints:
      - level: 1
        text: "Pecutan adalah perubahan laju dibahagi dengan masa yang diambil untuk perubahan tersebut."