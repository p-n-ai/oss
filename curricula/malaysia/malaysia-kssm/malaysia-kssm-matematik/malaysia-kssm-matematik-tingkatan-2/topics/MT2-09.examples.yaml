topic_id: MT2-09
provenance: ai-assisted

worked_examples:
  - id: WE-01
    topic: "Speed as a Rate"
    difficulty: easy
    misconception_alert: "Students often treat speed as only distance. Remind them that speed must include BOTH distance and time. Without time, it is not a rate."
    scenario: "Aida walks 100 m to a local shop in 5 minutes. Calculate her speed in m/min."
    working: |
      Step 1: Identify values. Distance = $100\text{ m}$, Time = $5\text{ min}$.
      Step 2: Write formula. Speed = $\frac{Distance}{Time}$.
      Step 3: Substitute values. Speed = $\frac{100}{5}$.
      Step 4: Calculate. $100 \div 5 = 20$.
      Step 5: Final answer: $20\text{ m/min}$.

  - id: WE-02
    topic: "Average Speed and Unit Conversion"
    difficulty: medium
    misconception_alert: "Do NOT average speeds directly. Average speed requires TOTAL distance divided by TOTAL time."
    scenario: "A bus travels 354 km from Puchong to Perai in 5 hours 20 minutes. Calculate its average speed in km/h."
    working: |
      Step 1: Convert time. $5\text{ h }20\text{ min} = 5 + \frac{20}{60}$.
      Step 2: $20/60 = 0.33$.
      Step 3: Total time = $5.33\text{ h}$.
      Step 4: Formula. Average speed = $\frac{Total\ Distance}{Total\ Time}$.
      Step 5: Substitute. $\frac{354}{5.33}$.
      Step 6: Calculate. $66.42\text{ km/h}$.

  - id: WE-03
    topic: "Acceleration and Deceleration Problem Solving"
    difficulty: hard
    misconception_alert: "Students often forget deceleration is negative acceleration and misuse the formula by swapping values incorrectly."
    scenario: "A toy lorry decelerates at $0.741\text{ m/s}^2$ for 27 seconds until it stops. Find its initial velocity."
    working: |
      Step 1: Final velocity = $0\text{ m/s}$, time = $27\text{ s}$.
      Step 2: Acceleration = $-0.741\text{ m/s}^2$.
      Step 3: Formula: $a = \frac{v - u}{t}$.
      Step 4: Substitute: $-0.741 = \frac{0 - u}{27}$.
      Step 5: Multiply: $-0.741 \times 27 = -u$.
      Step 6: $-20 \approx -u$.
      Step 7: $u = 20\text{ m/s}$.