    text_en: "Interior and Exterior Angles of Polygons"

learning_objectives:
  - id: 4.1.1
    text: "Menghuraikan sifat geometri poligon sekata menggunakan pelbagai perwakilan."
    text_en: "Describe the geometric properties of regular polygons using various representations."
    bloom: understand
  - id: 4.1.2
    text: "Membina poligon sekata menggunakan pelbagai kaedah dan menerangkan rasional langkah-langkah pembinaan."
    text_en: "Construct regular polygons using various methods and explain the rationales for the steps of construction."
    bloom: apply
  - id: 4.2.1
    text: "Menerbitkan rumus hasil tambah sudut pedalaman suatu poligon."
    text_en: "Derive the formula for the sum of interior angles of a polygon."
    bloom: analyze
  - id: 4.2.2
    text: "Membuat dan mengesahkan konjektur tentang hasil tambah sudut peluaran poligon."
    text_en: "Make and verify conjectures about the sum of exterior angles of a polygon."
    bloom: evaluate
  - id: 4.2.3
    text: "Menentukan nilai sudut pedalaman, sudut peluaran dan bilangan sisi suatu poligon."
    text_en: "Determine the values of interior angles, exterior angles and the number of sides of a polygon."
    bloom: apply
  - id: 4.2.4
    text: "Menyelesaikan masalah yang melibatkan poligon."
    text_en: "Solve problems involving polygons."
    bloom: apply

performance_standards:
  - id: TP1
    text_en: "Demonstrate the basic knowledge of regular and irregular polygons."
  - id: TP2
    text_en: "Demonstrate the understanding of the construction of regular polygons."
  - id: TP3
    text_en: "Apply the understanding of interior and exterior angles and number of sides to perform simple tasks."
  - id: TP4
    text_en: "Apply appropriate knowledge and skills of polygons in the context of simple routine problem solving."
  - id: TP5
    text_en: "Apply appropriate knowledge and skills of polygons in the context of complex routine problem solving."
  - id: TP6
    text_en: "Apply appropriate knowledge and skills of polygons in the context of non-routine problem solving in a creative manner."

teaching:
  sequence:
    - "Step 1: Introduction to regular vs irregular polygons using sides, angles, and axes of symmetry (30 min)"
    - "Step 2: Construction of regular polygons using geometric tools and software (30 min)"
    - "Step 3: Deriving the interior angle formula (n-2) × 180° (30 min)"
    - "Step 4: Exploring exterior angles and their sum (360°) (30 min)"
    - "Step 5: Problem solving involving polygons (30 min)"

