topic_id: MT2-12
provenance: ai-generated
description: "Scaffolded worked examples for Measures of Central Tendencies including grouped and ungrouped data analysis."
worked_examples:
  - id: WE-01
    topic: "Calculating Mode, Mean, and Median for Ungrouped Data"
    learning_objective: "12.1.1"
    difficulty: easy
    real_world_analogy: "Finding the most popular fruit in a basket is like finding the Mode. Finding the middle person in a height-ordered queue is like finding the Median."
    misconception_alert: "Students often forget to arrange the data in ascending order before finding the Median. No sorting means no Median!"
    scenario: "A group of five students at SMK Damai recorded their daily pocket money: RM5, RM8, RM3, RM7, and RM5. Determine the mode, mean, and median."
    working: |
      1. Identify Mode:
         - Values: 3, 5, 5, 7, 8
         - RM5 appears most frequently → Mode = RM5

      2. Calculate Mean:
         - Sum = 5 + 8 + 3 + 7 + 5 = 28
         - Mean = 28 / 5 = 5.60
         - Mean = RM5.60

      3. Find Median:
         - Sorted data: 3, 5, 5, 7, 8
         - Middle value = 3rd term = 5
         - Median = RM5

  - id: WE-02
    topic: "Mean of Grouped Data Using Midpoints"
    learning_objective: "12.1.4"
    difficulty: medium
    real_world_analogy: "Grouped data is like a classroom where each group has a representative (midpoint) standing in for all students in that group."
    misconception_alert: "Students often forget to multiply frequency by midpoint (f × x) and instead use frequency alone."
    scenario: "The table shows the time taken (minutes) by 10 students to complete a quiz. Calculate the mean time."

    working: |
      | Time (min) | Frequency (f) |
      |------------|---------------|
      | 1–5        | 4             |
      | 6–10       | 6             |

      1. Midpoints:
         - (1+5)/2 = 3
         - (6+10)/2 = 8

      2. Multiply f × x:
         - 4 × 3 = 12
         - 6 × 8 = 48

      3. Sum:
         - Σfx = 60
         - Σf = 10

      4. Mean:
         - 60 / 10 = 6
         - Mean = 6 minutes

  - id: WE-03
    topic: "Choosing Mean or Median with Outliers"
    learning_objective: "12.1.5"
    difficulty: hard
    real_world_analogy: "One billionaire among students makes the mean misleading, while the median still reflects the typical student."
    misconception_alert: "Students assume mean is always best, ignoring how outliers distort it."
    scenario: "A company pays salaries: RM2000, RM2200, RM2100, RM2300, and RM15000. Which measure best represents typical salary?"

    working: |
      1. Mean:
         - Sum = 23600
         - Mean = 23600 / 5 = 4720

      2. Median:
         - Sorted: 2000, 2100, 2200, 2300, 15000
         - Median = 2200

      3. Conclusion:
         - Mean is skewed by extreme value (15000)
         - Median is more representative of typical salary