topic_id: MT2-13
provenance: ai-generated

questions:
  # Learning Objective: Understand and calculate simple probabilities
  - id: Q1
    text: "Dalam satu kotak terdapat 5 bola merah dan 3 bola biru. Jika satu bola dipilih secara rawak, apakah kebarangkalian untuk memilih bola merah?"
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "5/8"
      working: |
        Bilangan bola merah = 5
        Bilangan bola biru = 3
        Jumlah bola = 5 + 3 = 8
        Kebarangkalian memilih bola merah = 5/8
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengira jumlah bola dengan betul."
      - marks: 1
        criteria: "Mengira kebarangkalian dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa kebarangkalian adalah nisbah antara kejadian yang diingini dengan jumlah kemungkinan."

  # Learning Objective: Apply probability concepts to solve real-world problems
  - id: Q2
    text: "Dalam permainan dadu, apakah kebarangkalian untuk mendapatkan nombor ganjil apabila dadu dilambung?"
    difficulty: medium
    learning_objective: LO2
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "1/2"
      working: |
        Nombor ganjil pada dadu: 1, 3, 5
        Jumlah nombor pada dadu: 1, 2, 3, 4, 5, 6
        Kebarangkalian mendapatkan nombor ganjil = 3/6 = 1/2
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menyenaraikan nombor ganjil dengan betul."
      - marks: 1
        criteria: "Mengira kebarangkalian dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan anda menyenaraikan semua nombor dari dadu terlebih dahulu."

  # Learning Objective: Analyze probability situations
  - id: Q3
    text: "Seorang pelajar memilih satu kad dari set kad bernombor 1 hingga 10. Apakah kebarangkalian bahawa nombor pada kad adalah lebih besar daripada 7?"
    difficulty: medium
    learning_objective: LO3
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "3/10"
      working: |
        Nombor lebih besar daripada 7: 8, 9, 10
        Jumlah nombor kad: 10
        Kebarangkalian = 3/10
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menyenaraikan nombor yang lebih besar daripada 7 dengan betul."
      - marks: 1
        criteria: "Mengira kebarangkalian dengan betul."
    hints:
      - level: 1
        text: "Fikirkan tentang nombor yang melebihi 7 dari set 1 hingga 10."

  # Learning Objective: Use tree diagrams to solve probability problems
  - id: Q4
    text: "Dalam satu eksperimen, dua koin dilambungkan. Gunakan rajah pokok untuk menentukan kebarangkalian mendapatkan sekurang-kurangnya satu kepala."
    difficulty: medium
    learning_objective: LO4
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "3/4"
      working: |
        Peluang: KK, KE, EK, EE
        Kebarangkalian sekurang-kurangnya satu kepala = 3/4 (KE, EK, KK)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Melukis rajah pokok dengan betul."
      - marks: 1
        criteria: "Mengenalpasti peluang yang sesuai."
      - marks: 1
        criteria: "Mengira kebarangkalian dengan betul."
    hints:
      - level: 1
        text: "Lukiskan rajah pokok untuk melihat semua kemungkinan hasil."

  # Learning Objective: Evaluate probability in compound events
  - id: Q5
    text: "Sebuah beg mengandungi 4 gula-gula merah, 5 gula-gula hijau dan 2 gula-gula biru. Dua gula-gula diambil secara berturut-turut tanpa penggantian. Apakah kebarangkalian bahawa kedua-dua gula-gula adalah hijau?"
    difficulty: medium
    learning_objective: LO5
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: "5/33"
      working: |
        Peluang pertama: 5/11 (pilih gula-gula hijau pertama)
        Peluang kedua: 4/10 (pilih gula-gula hijau kedua)
        Kebarangkalian = 5/11 * 4/10 = 20/110 = 5/33
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira kebarangkalian pengambilan pertama dengan betul."
      - marks: 1
        criteria: "Mengira kebarangkalian pengambilan kedua dengan betul."
      - marks: 1
        criteria: "Menggabungkan kebarangkalian dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa gula-gula tidak dikembalikan selepas diambil."