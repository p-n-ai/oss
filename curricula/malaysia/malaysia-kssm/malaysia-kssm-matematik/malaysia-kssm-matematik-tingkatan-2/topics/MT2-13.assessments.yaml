questions:
  # Learning Objective 13.1.1
  - id: Q1
    text: "Ahmad melontar sebuah dadu sebanyak 60 kali dan mencatatkan bahawa nombor 6 muncul sebanyak 10 kali. Tentukan kebarangkalian eksperimen bagi nombor 6 muncul."
    difficulty: medium
    learning_objective: 13.1.1
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "0.1667"
      working: |
        Kebarangkalian eksperimen = (Bilangan kejadian yang diingini) / (Bilangan cubaan)
        = 10 / 60
        = 0.1667
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan bilangan kejadian yang diingini dan bilangan cubaan."
      - marks: 1
        criteria: "Mengira kebarangkalian eksperimen dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa kebarangkalian eksperimen ialah nisbah antara bilangan kejadian yang diingini dengan bilangan cubaan."
  
  # Learning Objective 13.1.2
  - id: Q2
    text: "Satu duit syiling dilambungkan sebanyak 1000 kali dan hasilnya menunjukkan 520 kali kepala dan 480 kali ekor. Apakah kesimpulan yang boleh dibuat tentang kebarangkalian eksperimen ini?"
    difficulty: medium
    learning_objective: 13.1.2
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Kesimpulan yang boleh dibuat ialah kebarangkalian eksperimen menghampiri 0.5 apabila bilangan cubaan adalah besar, menunjukkan bahawa duit syiling adalah seimbang."
      working: |
        Apabila bilangan cubaan cukup besar, kebarangkalian eksperimen akan menghampiri kebarangkalian teori. Di sini, kebarangkalian eksperimen untuk kepala ialah 520/1000 = 0.52 dan untuk ekor ialah 480/1000 = 0.48, yang hampir dengan 0.5.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira kebarangkalian eksperimen untuk kepala dan ekor."
      - marks: 1
        criteria: "Membandingkan kebarangkalian eksperimen dengan kebarangkalian teori."
      - marks: 1
        criteria: "Menarik kesimpulan tentang kebarangkalian eksperimen."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Kebarangkalian eksperimen sepatutnya menghampiri kebarangkalian teori apabila bilangan cubaan adalah besar."
  
  # Learning Objective 13.2.1
  - id: Q3
    text: "Nyatakan ruang sampel apabila sebuah dadu dan sebuah duit syiling dilambungkan serentak."
    difficulty: medium
    learning_objective: 13.2.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "{(1,H), (1,T), (2,H), (2,T), (3,H), (3,T), (4,H), (4,T), (5,H), (5,T), (6,H), (6,T)}"
      working: |
        Ruang sampel adalah semua kemungkinan pasangan hasil daripada melambungkan dadu dan duit syiling.
        Dadu: 1, 2, 3, 4, 5, 6
        Duit syiling: H (kepala), T (ekor)
        Ruang sampel = {(1,H), (1,T), (2,H), (2,T), (3,H), (3,T), (4,H), (4,T), (5,H), (5,T), (6,H), (6,T)}
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menulis semua hasil kemungkinan bagi dadu."
      - marks: 1
        criteria: "Menggabungkan hasil kemungkinan dadu dengan duit syiling untuk membentuk ruang sampel."
    hints:
      - level: 1
        text: "Ingat bahawa ruang sampel adalah semua hasil yang mungkin daripada dua eksperimen."

  # Learning Objective 13.2.2
  - id: Q4
    text: "Seorang pelajar ingin membina model kebarangkalian untuk melambungkan dua dadu. Apakah kebarangkalian teori mendapatkan jumlah mata 7?"
    difficulty: medium
    learning_objective: 13.2.2
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: "0.1667"
      working: |
        Kebarangkalian teori = (Bilangan cara mendapatkan jumlah 7) / (Jumlah hasil dalam ruang sampel)
        Hasil untuk jumlah 7: (1,6), (2,5), (3,4), (4,3), (5,2), (6,1) = 6 cara
        Jumlah hasil dalam ruang sampel = 6 * 6 = 36
        Kebarangkalian teori = 6 / 36 = 0.1667
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira bilangan cara untuk mendapatkan jumlah mata 7."
      - marks: 1
        criteria: "Menentukan jumlah hasil dalam ruang sampel."
      - marks: 1
        criteria: "Mengira kebarangkalian teori dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Ingat bahawa setiap dadu mempunyai 6 kemungkinan dan ruang sampel terdiri daripada semua pasangan ini."

  # Learning Objective 13.3.2
  - id: Q5
    text: "Dalam satu permainan, sebuah kad ditarik daripada satu dek penuh. Apakah kebarangkalian menarik bukan kad hati?"
    difficulty: medium
    learning_objective: 13.3.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "0.75"
      working: |
        Kebarangkalian menarik kad hati = 13/52
        Kebarangkalian menarik bukan kad hati = 1 - (13/52) = 39/52 = 0.75
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan kebarangkalian menarik kad hati."
      - marks: 1
        criteria: "Mengira kebarangkalian peristiwa pelengkap dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa kebarangkalian peristiwa pelengkap adalah 1 tolak kebarangkalian peristiwa asal."