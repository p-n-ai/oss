topic_id: MT2-05
provenance: ai-assisted
description: "Worked examples for Chapter 5: Circles, covering properties, symmetry, construction, and measurement."

worked_examples:
  - id: WE-01
    topic: "Recognise parts of a circle (5.1.1)"
    difficulty: easy
    real_world_analogy: "Think of a traditional Malaysian 'Kipas Anyaman' (woven hand fan). The centre where you hold it is the centre of the circle, and the outer edge is the circumference."
    misconception_alert: "Students often confuse a Segment and a Sector. A Sector is like a pizza slice (bounded by two radii), while a Segment is the curved cap cut off by a chord."
    scenario: "Fatimah draws a straight line across her circular cake passing through the candle placed at the centre. Identify the line and the regions formed."
    working: |
      1. The straight line passes through the centre of the circle.
      2. Therefore, the line is the **Diameter**.
      3. A diameter is also the longest **Chord** in a circle.
      4. The diameter divides the circle into two equal halves.
      5. Each half is a **Semicircle**.
      6. Final answer: The line is the diameter and it forms two semicircles.

  - id: WE-02
    topic: "Determine centre and radius by construction (5.2.2)"
    difficulty: medium
    real_world_analogy: "Imagine a broken bicycle wheel without its hub. The hub (centre) can be reconstructed by finding where structural supports (perpendicular bisectors) intersect."
    misconception_alert: "Students often try to estimate the centre visually. In geometry construction, the exact centre must be found using perpendicular bisectors of chords."
    scenario: "Pak Abu finds a circular wooden plate with no centre mark. He draws two chords PQ = 6 cm and RS = 8 cm. How can he determine the centre?"
    working: |
      1. Draw chord PQ on the circle.
      2. Construct the perpendicular bisector of PQ:
         - Open compass more than half of PQ.
         - Draw arcs from point P above and below the chord.
         - Without changing compass width, draw arcs from Q intersecting the first arcs.
         - Draw a straight line through intersection points.
      3. Repeat the same construction for chord RS.
      4. The two perpendicular bisectors intersect at one point.
      5. This intersection point is the **Centre (O)** of the circle.
      6. Measure from O to any point on the circle to obtain the radius.

  - id: WE-03
    topic: "Chord properties and Pythagoras application (5.2.3)"
    difficulty: hard
    real_world_analogy: "A Wau Bulan kite structure: the central spine acts like a radius that bisects the horizontal frame at a right angle."
    misconception_alert: "Students often forget that the radius, perpendicular distance from centre, and half-chord form a right-angled triangle required for Pythagoras."
    scenario: "A circular window has radius 13 cm. A chord is placed 5 cm from the centre. Find the length of the chord."
    working: |
      1. Identify right triangle components:
         - Hypotenuse (radius) = 13 cm
         - One leg (distance from centre) = 5 cm
         - Other leg (half-chord) = x
      2. Apply Pythagoras Theorem:
         $x^2 + 5^2 = 13^2$
      3. Expand:
         $x^2 + 25 = 169$
      4. Rearrange:
         $x^2 = 144$
      5. Solve:
         $x = \sqrt{144} = 12$
      6. Full chord length:
         $2x = 24$ cm
      7. Final answer: 24 cm

  - id: WE-04
    topic: "Area and circumference applications (5.3.4)"
    difficulty: hard
    real_world_analogy: "A Mamak plate: the curry-covered surface represents area ($\pi r^2$), while the metal rim represents circumference ($2\pi r$)."
    misconception_alert: "Students often forget unit consistency. Always convert units before applying formulas, especially when squaring radius for area."
    scenario: "A circular tabletop has a circumference of 132 cm. Find its area. (Use $\pi = \frac{22}{7}$)"
    working: |
      1. Use circumference formula:
         $C = 2\pi r$
      2. Substitute values:
         $132 = 2 \times \frac{22}{7} \times r$
      3. Simplify:
         $132 = \frac{44}{7}r$
      4. Solve for r:
         $r = 132 \times \frac{7}{44}$
      5. Calculate:
         $r = 21$ cm
      6. Use area formula:
         $A = \pi r^2$
      7. Substitute:
         $A = \frac{22}{7} \times 21^2$
      8. Compute:
         $A = \frac{22}{7} \times 441$
      9. Final answer:
         $A = 1386 \text{ cm}^2$