      text: "Menentusahkan dan menerangkan bahawa (i) diameter ialah paksi simetri bulatan; (ii) jejari yang berserenjang dengan perentas membahagi dua sama perentas itu dan sebaliknya; (iii) pembahagi dua sama serenjang dua perentas bertemu di pusat bulatan; (iv) perentas yang sama panjang menghasilkan lengkok yang sama panjang; dan (v) perentas yang sama panjang adalah sama jarak dari pusat bulatan dan sebaliknya."
      text_en: "Verify and explain that (i) diameter is the axis of symmetry of a circle; (ii) a radius perpendicular to a chord bisects the chord and vice versa; (iii) the perpendicular bisectors of two chords meet at the center of the circle; (iv) chords of equal length produce arcs of equal length; and (v) chords of equal length are equidistant from the center of the circle and vice versa."
