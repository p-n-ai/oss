learning_objectives:
  - id: "12.1.1"
    content_standard_id: "12.1"
    text_en: "Determine the mode, mean and median for a set of ungrouped data."
    bloom: apply

  - id: "12.1.2"
    content_standard_id: "12.1"
    text_en: "Make conclusions about the effect of changes in a data set on the values of mode, mean and median."
    bloom: analyze

  - id: "12.1.3"
    content_standard_id: "12.1"
    text_en: "Collect data, construct and interpret frequency tables for grouped data."
    bloom: apply

  - id: "12.1.4"
    content_standard_id: "12.1"
    text_en: "Determine the modal class and mean of a set of grouped data."
    bloom: apply

  - id: "12.1.5"
    content_standard_id: "12.1"
    text_en: "Select and justify the most appropriate measure of central tendency for a data distribution, including data with extreme values."
    bloom: evaluate

  - id: "12.1.6"
    content_standard_id: "12.1"
    text_en: "Determine mode, mean and median from data representations."
    bloom: apply

  - id: "12.1.7"
    content_standard_id: "12.1"
    text_en: "Apply understanding of measures of central tendency to make predictions, form arguments, and draw conclusions."
    bloom: apply

performance_standards:
  - level: 1
    descriptor_en: "Demonstrate basic knowledge of mode, mean, and median."
  - level: 2
    descriptor_en: "Demonstrate understanding of mode, mean, and median."
  - level: 3
    descriptor_en: "Apply understanding of mode, mean, and median in simple tasks."
  - level: 4
    descriptor_en: "Apply knowledge in routine problem solving."
  - level: 5
    descriptor_en: "Apply knowledge in complex routine problem solving."
  - level: 6
    descriptor_en: "Apply knowledge in non-routine creative problem solving."

prerequisites:
  required:
    - "MT1-12"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce mode, mean, and median using real-life datasets."
    - "Step 2: Compute measures for ungrouped data."
    - "Step 3: Analyse effects of data changes and extreme values."
    - "Step 4: Construct and interpret grouped frequency tables."
    - "Step 5: Calculate modal class and mean for grouped data."
    - "Step 6: Select appropriate measures for skewed distributions."
    - "Step 7: Apply concepts to interpretation and prediction tasks."

  common_misconceptions:
    - misconception: "Mean is always the best representation of data."
      remediation: "Show how outliers distort the mean while median remains stable."
    - misconception: "Median is the middle value without sorting data."
      remediation: "Emphasize ordering data before identifying the median."
    - misconception: "Mode, mean, and median always give similar results."
      remediation: "Use skewed datasets to show differences clearly."

  engagement_hooks:
    - "How do sports analysts use averages to select the best players?"
    - "How do economists use mean income vs median income in reports?"
    - "How can your daily expenses be analysed using statistics?"

quality_level: 3
