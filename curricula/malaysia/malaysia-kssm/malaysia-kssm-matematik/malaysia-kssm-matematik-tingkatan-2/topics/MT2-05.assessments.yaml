topic_id: MT2-05
provenance: ai-assisted

questions:

  - id: Q1
    text: "Which statement BEST defines a 'Chord' in a circle?"
    difficulty: easy
    learning_objective: "5.1.1"
    tp_level: 1
    answer:
      type: multiple_choice
      value: "B"
      options:
        A: "A line passing through the centre and touching two points on the circle."
        B: "A straight line joining any two points on the circumference."
        C: "A curved part of the circle boundary."
        D: "A region enclosed by two radii and an arc."
      working: |
        A chord is a straight line segment joining any two points on the circumference.
      distractors:
        - value: "A"
          feedback: "This is a diameter, not any chord. A diameter must pass through the centre."
        - value: "C"
          feedback: "This describes an arc, which is part of the circumference."
        - value: "D"
          feedback: "This describes a sector, which is an area, not a line."
    marks: 1
    hints:
      - level: 1
        text: "Focus on whether it is a line or a region. A chord is always a straight line."

  - id: Q2
    text: "TRUE or FALSE: A diameter is always a chord, but a chord is not always a diameter."
    difficulty: easy
    learning_objective: "5.1.1"
    tp_level: 2
    answer:
      type: true_false
      value: "TRUE"
      working: |
        A diameter is a special chord passing through the centre.
    marks: 1

  - id: Q3
    text: "A radius is perpendicular to a chord MN at point P. What property is applied?"
    difficulty: medium
    learning_objective: "5.2.1"
    tp_level: 3
    answer:
      type: multiple_choice
      value: "C"
      options:
        A: "Chord becomes a diameter."
        B: "Radius equals chord length."
        C: "Chord is bisected into two equal parts."
        D: "Radius doubles."
      working: |
        Perpendicular radius bisects the chord.
      distractors:
        - value: "A"
          feedback: "Perpendicularity does not create a diameter."
        - value: "B"
          feedback: "Radius length does not depend on chord."
        - value: "D"
          feedback: "Radius is fixed; it does not change."
    marks: 1

  - id: Q4
    text: "Radius = 13 cm. Distance from centre to chord = 12 cm. Find half-chord length."
    difficulty: hard
    learning_objective: "5.2.3"
    tp_level: 4
    answer:
      type: exact
      value: "5 cm"
      working: |
        13² = 12² + x²
        169 = 144 + x²
        x = 5 cm
    marks: 3

  - id: Q5
    text: "Which statement is correct about chords in a circle?"
    difficulty: medium
    learning_objective: "5.2.1"
    tp_level: 3
    answer:
      type: matching
      value:
        rule: "Equal chords are equidistant from the centre"
      working: |
        Equal chords have equal distance from centre.
    marks: 2

  - id: Q6
    text: "Derive the formula for the area of a circle."
    difficulty: medium
    learning_objective: "5.3.2"
    tp_level: 3
    answer:
      type: structured_response
      value: "πr²"
      working: |
        Circle rearranged into rectangle shape:
        base = πr, height = r
        area = πr²
    marks: 3

  - id: Q7
    text: "Find circumference of a circle with radius 10 cm."
    difficulty: easy
    learning_objective: "5.3.1"
    tp_level: 2
    answer:
      type: exact
      value: "20π cm"
      working: |
        C = 2πr = 20π
    marks: 1

  - id: Q8
    text: "Find area of a sector with angle 90° and radius 14 cm."
    difficulty: medium
    learning_objective: "5.3.3"
    tp_level: 3
    answer:
      type: exact
      value: "154 cm²"
      working: |
        (90/360) × (22/7) × 196 = 154
    marks: 2

  - id: Q9
    text: "A track has radius 21 m. A runner completes 5 laps. Find total distance."
    difficulty: hard
    learning_objective: "5.3.4"
    tp_level: 5
    answer:
      type: exact
      value: "660 m"
      working: |
        One lap = 2πr = 132
        5 laps = 660
    marks: 3

  - id: Q10
    text: "A circular garden has area 154 m². Is 50 m fencing enough?"
    difficulty: hard
    learning_objective: "5.3.4"
    tp_level: 6
    answer:
      type: structured_response
      value: "Yes, enough fencing"
      working: |
        r² = 49 → r = 7
        circumference = 44 m
        fencing = 50 m → sufficient
    marks: 4