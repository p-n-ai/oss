performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang translasi, pantulan dan putaran."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang translasi, pantulan dan putaran."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman penjelmaan untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran dalam penyelesaian masalah rutin mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran dalam penyelesaian masalah rutin kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran dalam penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required:
    - "MT1-Coordinates"
    - "MT1-Polygons"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan penjelmaan dan kesepadanan satu-ke-satu (15 minit)"
    - "Langkah 2: Meneroka translasi menggunakan grid dan vektor (20 minit)"
    - "Langkah 3: Mengkaji pantulan menggunakan cermin dan paksi (20 minit)"
    - "Langkah 4: Memahami putaran dengan pusat, sudut dan arah (20 minit)"
    - "Langkah 5: Menghubungkan penjelmaan dengan isometri dan kekongruenan (15 minit)"
    - "Langkah 6: Menentukan simetri putaran dan darjahnya (15 minit)"
  common_misconceptions:
    - misconception: "Pelajar beranggapan penjelmaan mengubah saiz objek."
      remediation: "Tekankan bahawa isometri mengekalkan jarak dan saiz."
    - misconception: "Pelajar keliru arah putaran (arah jam dan lawan arah jam)."
      remediation: "Gunakan analogi jam untuk mengukuhkan arah."
    - misconception: "Pelajar keliru antara objek dan imej."
      remediation: "Labelkan objek asal dan imej dengan jelas secara konsisten."
  engagement_hooks:
    - "Gunakan corak batik untuk mengenal pasti translasi dan pantulan."
    - "Minta pelajar mereka logo menggunakan penjelmaan."
    - "Gunakan aktiviti cermin untuk menunjukkan pantulan."

