  - id: "1.3"
    text: "Pola dan Jujukan"

learning_objectives:
  - id: 1.1.1
    content_standard_id: "1.1"
    text: "Mengenal pasti dan memerihalkan pola pelbagai set nombor dan objek dalam kehidupan sebenar, dan seterusnya membuat rumusan tentang pola."
    bloom: understand
  - id: 1.2.1
    content_standard_id: "1.2"
    text: "Menerangkan maksud jujukan."
    bloom: understand
  - id: 1.2.2
    content_standard_id: "1.2"
    text: "Mengenal pasti dan memerihalkan pola suatu jujukan, dan seterusnya melengkapkan dan melanjutkan jujukan tersebut."
    bloom: apply
  - id: 1.3.1
    content_standard_id: "1.3"
    text: "Membuat generalisasi tentang pola suatu jujukan menggunakan nombor, perkataan dan ungkapan algebra."
    bloom: analyze
  - id: 1.3.2
    content_standard_id: "1.3"
    text: "Menentukan sebutan tertentu bagi suatu jujukan."
    bloom: apply
  - id: 1.3.3
    content_standard_id: "1.3"
    text: "Menyelesaikan masalah yang melibatkan jujukan."
    bloom: apply

performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang pola."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang pola dan jujukan."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang pola dan jujukan untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang pola dan jujukan dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang pola dan jujukan dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang pola dan jujukan dalam konteks penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required:
    - "MT1-05"
    - "MT1-06"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Pola (20 min)"
    - "Langkah 2: Mendefinisikan Jujukan (20 min)"
    - "Langkah 3: Melengkapkan Jujukan (30 min)"
    - "Langkah 4: Membuat Generalisasi dengan Algebra (40 min)"
    - "Langkah 5: Menyelesaikan Masalah Dunia Sebenar (40 min)"
  common_misconceptions:
    - misconception: "Menganggap setiap kumpulan nombor adalah jujukan, walaupun tanpa pola yang konsisten."
      remediation: "Gunakan 'Semakan Konsistensi'. Buktikan hubungan antara Sebutan 1 dan Sebutan 2 mesti terpakai untuk semua sebutan seterusnya."
    - misconception: "Kesukaran menterjemah 'tambah 3 setiap kali' kepada bentuk algebra (cth: 3n + c)."
      remediation: "Gunakan 'Logik Lompatan'. Perbezaan sepunya ialah pekali bagi n."
  engagement_hooks:
    - "Kembara Alam Fibonacci: Perhatikan pola pada bunga matahari, kon pain, dan cangkerang untuk menemui jujukan semula jadi."
    - "Rentak Muzik Digital: Analisis corak dram (tempo 4/4) sebagai jujukan nombor yang berulang."

quality_level: 3
