topic_id: MT2-01
provenance: ai-assisted
worked_examples:
  ### ---------------------------------------------------------
  ### CONTOH KERJA: Pola dan Jujukan
  ### ---------------------------------------------------------
  - id: WE-01
    topic: "Mengenal Pasti Pola (1.1)"
    scenario: "Lanjutkan jujukan nombor berikut dengan dua lagi sebutan: 2, 6, 18, 54, ..."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 1.1.1
    real_world_analogy: >-
      Fikirkan tentang satu hantaran media sosial yang tular. Jika seorang memberitahu 3 rakan, dan setiap 3 rakan itu memberitahu 3 rakan lagi, bilangan orang yang mengetahuinya bertambah dengan mendarab setiap kali!
    misconception_alert: >-
      Pelajar sering cuba menolak (6 - 2 = 4) terlebih dahulu. Sentiasa semak jika perbezaannya sama untuk pasangan seterusnya (18 - 6 = 12). Jika tidak sama, polanya mungkin melibatkan pendaraban.
    working: |
      Langkah 1: Bandingkan sebutan pertama dan kedua: 6 / 2 = 3.
      Langkah 2: Sahkan dengan pasangan seterusnya: 18 / 6 = 3. Polanya adalah 'darab dengan 3'.
      Langkah 3: Hitung dua sebutan seterusnya:
      54 x 3 = 162
      162 x 3 = 486
      Jawapan Akhir: 162, 486

  - id: WE-02
    topic: "Ungkapan Algebra untuk Jujukan (1.3.1)"
    scenario: "Tulis satu ungkapan algebra bagi jujukan: 10, 14, 18, 22, ..."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.3.1
    real_world_analogy: >-
      Ia seperti membina menara LEGO. Anda bermula dengan blok tapak yang besar (nombor pertama), dan setiap tingkat yang anda tambah mempunyai bilangan bata baharu yang sama (perbezaan sepunya).
    misconception_alert: >-
      Ralat yang paling biasa ialah menulis '10 + 4n' dan lupa bahawa sebutan pertama adalah untuk n=0. Jika anda ingin menggunakan n=1, 2, 3..., ungkapan seharusnya menjadi '4n + 6'. Sentiasa uji n=1 untuk melihat sama ada anda mendapat nombor pertama!
    working: |
      Langkah 1: Cari perbezaan sepunya: 14 - 10 = 4. Ini adalah pekali bagi 'n'.
      Langkah 2: Jika kita menggunakan 4n di mana n=1, 2, 3..., sebutan pertama ialah 4(1) = 4.
      Langkah 3: Laraskan formula untuk mencapai sebutan pertama sebenar kita (10).
      4 + 6 = 10. Jadi pemalarnya ialah +6.
      Jawapan Akhir: 4n + 6, di mana n = 1, 2, 3, ...

  - id: WE-03
    topic: "Menyelesaikan Masalah dengan Nombor Fibonacci (1.3.3)"
    scenario: "Bilangan arnab dalam sebuah koloni mengikut jujukan Fibonacci: 1, 1, 2, 3, 5, 8, ... Jika pola ini berlanjutan, berapakah bilangan arnab dalam generasi ke-10?"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: 1.3.3
    real_world_analogy: >-
      Fibonacci ialah tanda tangan alam semula jadi. Setiap generasi adalah hasil tambah ibu bapa dan datuk nenek.
    misconception_alert: >-
      Jangan cuba cari peraturan pendaraban! Peraturan Fibonacci hanya berfungsi dengan menambah dua nombor sebelumnya. Jika anda keliru, mulakan pengiraan semula dari awal.
    working: |
      Langkah 1: Senaraikan generasi yang diketahui: 1, 1, 2, 3, 5, 8 (6 generasi).
      Langkah 2: Hitung yang ke-7: 5 + 8 = 13.
      Langkah 3: Hitung yang ke-8: 8 + 13 = 21.
      Langkah 4: Hitung yang ke-9: 13 + 21 = 34.
      Langkah 5: Hitung yang ke-10: 21 + 34 = 55.
      Jawapan Akhir: 55 ekor arnab
