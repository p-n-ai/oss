prerequisites:
  required:
    - "Memplot titik pada satah Cartes"
    - "Mengenal pasti paksi-x, paksi-y dan asalan (0, 0)"
    - "Memahami Teorem Pythagoras asas"
  recommended:
    - "Operasi punca kuasa dua asas"
    - "Pemahaman kuadran koordinat"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Perkenalkan satah Cartes dan koordinat (15 minit)"
    - "Langkah 2: Terangkan konsep jarak menggunakan pergerakan grid (20 minit)"
    - "Langkah 3: Terbitkan formula jarak menggunakan Teorem Pythagoras (25 minit)"
    - "Langkah 4: Perkenalkan konsep titik tengah menggunakan idea purata (15 minit)"
    - "Langkah 5: Terbitkan formula titik tengah langkah demi langkah (20 minit)"
    - "Langkah 6: Aplikasi kedua-dua formula dalam penyelesaian masalah gabungan (20 minit)"

  common_misconceptions:
    - misconception: "Pelajar menganggap titik tengah sebagai satu nombor purata tunggal, bukan pasangan koordinat."
      remediation: "Tekankan bahawa titik tengah mesti dalam bentuk (x, y) dengan mempuratakan x dan y secara berasingan."

    - misconception: "Pelajar terlupa bahawa jarak melibatkan kuasa dua perbezaan."
      remediation: "Kukuhkan bahawa jarak berasal daripada Teorem Pythagoras yang memerlukan kuasa dua sebelum punca kuasa dua."

  engagement_hooks:
    - "Gunakan peta sekolah untuk mengira jarak lurus antara dua bilik darjah."
    - "Tunjukkan bagaimana aplikasi navigasi menggunakan koordinat untuk mencari jarak paling pendek."

