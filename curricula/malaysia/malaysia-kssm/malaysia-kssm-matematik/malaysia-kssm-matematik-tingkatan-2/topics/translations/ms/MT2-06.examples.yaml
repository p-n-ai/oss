id: MT2-06
topic_id: MT2-06
worked_examples:
  - id: WE-01
    topic: "Sifat Geometri Bentuk 3D"
    learning_objective: "6.1.1"
    difficulty: easy
    real_world_analogy: "Fikirkan topi kon hari jadi. Ada satu puncak tajam dan satu tapak bulatan."
    misconception_alert: "Pelajar sering fikir sfera ada bucu kerana 'kutub' glob. Sebenarnya bucu hanya wujud apabila dua tepi bertemu — sfera tiada tepi langsung."
    scenario: "Kenal pasti bentuk 3D yang mempunyai satu tapak bulatan, satu puncak dan satu permukaan melengkung."
    working: |
      Langkah 1: Kenal pasti sifat:
      - 1 tapak bulatan
      - 1 puncak
      - 1 permukaan melengkung

      Langkah 2: Bandingkan:
      - Silinder: 2 tapak bulatan
      - Piramid: tapak poligon
      - Kon: 1 tapak + 1 puncak

      Langkah 3: Kesimpulan: **Kon**

  - id: WE-02
    topic: "Bentangan Bentuk Tiga Dimensi"
    learning_objective: "6.2.1"
    difficulty: easy
    real_world_analogy: "Bayangkan buka label tin Milo — bila diratakan, nampak bentuk 2D sebelum jadi silinder."
    misconception_alert: "Sfera tidak boleh dijadikan bentangan rata sempurna. Ia akan sentiasa mengalami distorsi."
    scenario: "Satu bentangan terdiri daripada 2 bulatan dan 1 segi empat tepat. Apakah bentuk yang terhasil?"
    working: |
      Langkah 1: Kenal pasti komponen:
      - 2 bulatan → tapak atas & bawah
      - 1 segi empat tepat → sisi melengkung

      Langkah 2: Bayangkan lipatan.

      Langkah 3: Bentuk terhasil ialah **Silinder**

  - id: WE-03
    topic: "Luas Permukaan Silinder"
    learning_objective: "6.3.1"
    difficulty: medium
    real_world_analogy: "Membalut tin Milo dengan kertas — perlu tutup atas, bawah dan sisi."
    misconception_alert: "Perangkap Silinder Bogel: pelajar selalu lupa kira kedua-dua tapak bulatan."
    scenario: "Hitung luas permukaan silinder tertutup dengan jejari $7\\text{ cm}$ dan tinggi $10\\text{ cm}$. Guna $\\pi = \\frac{22}{7}$."
    working: |
      Langkah 1: Rumus:
      $A = 2\\pi j^2 + 2\\pi jt$

      Langkah 2: Gantikan nilai:
      $A = 2 \\times \\frac{22}{7} \\times 7^2 + 2 \\times \\frac{22}{7} \\times 7 \\times 10$

      Langkah 3: Luas tapak:
      $308\\text{ cm}^2$

      Langkah 4: Luas sisi:
      $440\\text{ cm}^2$

      Langkah 5: Jumlah:
      $748\\text{ cm}^2$

      Langkah 6: Jawapan:
      $748\\text{ cm}^2$

  - id: WE-04
    topic: "Isi Padu Kon"
    learning_objective: "6.4.2"
    difficulty: medium
    real_world_analogy: "Kon aiskrim menunjukkan ruang isi yang boleh diisi di dalamnya."
    misconception_alert: "Perangkap Tinggi Sendeng: isi padu mesti guna tinggi tegak, bukan tinggi condong."
    scenario: "Hitung isi padu kon dengan jejari $7\\text{ cm}$ dan tinggi $12\\text{ cm}$. Guna $\\pi = \\frac{22}{7}$."
    working: |
      Langkah 1: Rumus:
      $V = \\frac{1}{3}\\pi j^2 t$

      Langkah 2: Gantikan:
      $V = \\frac{1}{3} \\times \\frac{22}{7} \\times 7^2 \\times 12$

      Langkah 3: Permudahkan:
      $V = 616\\text{ cm}^3$

      Langkah 4: Jawapan akhir:
      $616\\text{ cm}^3$

  - id: WE-05
    topic: "Isi Padu Bentuk Gabungan"
    learning_objective: "6.4.3"
    difficulty: hard
    real_world_analogy: "Nasi Lemak bungkus: kubus sebagai tapak dan piramid sebagai bahagian atas."
    misconception_alert: "Pelajar sering keliru tinggi mana untuk setiap bentuk. Asingkan kubus dan piramid dengan jelas."
    scenario: "Satu kubus bersisi $10\\text{ cm}$ dan piramid bertapak segi empat sama tinggi $6\\text{ cm}$. Cari isi padu jumlah."
    working: |
      Langkah 1: Isi padu kubus:
      $1000\\text{ cm}^3$

      Langkah 2: Isi padu piramid:
      $200\\text{ cm}^3$

      Langkah 3: Jumlah:
      $1200\\text{ cm}^3$

      Langkah 4: Jawapan:
      $1200\\text{ cm}^3$