performance_standards:
  - level: 1
    descriptor: "Menunjukkan pengetahuan asas tentang fungsi."
  - level: 2
    descriptor: "Menunjukkan kefahaman tentang graf fungsi."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman fungsi untuk membina jadual nilai dan melukis graf."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran fungsi dalam penyelesaian masalah rutin mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran fungsi dalam penyelesaian masalah rutin kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran fungsi dalam penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required:
    - "MT1-06"
  recommended:
    - "MT1-08"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Memperkenalkan fungsi sebagai mesin input-output dalam situasi kehidupan sebenar (15 min)"
    - "Langkah 2: Mengenal pasti fungsi menggunakan pasangan tertib, jadual, graf dan persamaan (20 min)"
    - "Langkah 3: Membina jadual nilai untuk pelbagai jenis fungsi termasuk y = ax^n (25 min)"
    - "Langkah 4: Memplot dan melukis graf dengan tepat menggunakan skala (25 min)"
    - "Langkah 5: Mentafsir graf dan menyelesaikan masalah termasuk titik persilangan (20 min)"

  common_misconceptions:
    - misconception: "Semua hubungan adalah fungsi."
      remediation: "Gunakan ujian garis mencancang untuk menunjukkan bahawa setiap input hanya boleh mempunyai satu output."

    - misconception: "Fungsi tidak boleh mempunyai output yang sama untuk input berbeza."
      remediation: "Terangkan bahawa hubungan banyak kepada satu adalah fungsi yang sah, tetapi satu kepada banyak tidak sah."

    - misconception: "Graf hanyalah lukisan tanpa makna."
      remediation: "Bimbing murid mentafsir arah, trend dan maksud graf dalam konteks sebenar."

  engagement_hooks:
    - "Gunakan carta BMI untuk menunjukkan bagaimana berat adalah fungsi kepada tinggi."
    - "Teroka kos penghantaran makanan di mana jumlah harga bergantung kepada bilangan item."
    - "Analisis jadual bas untuk melihat hubungan masa berlepas dan masa ketibaan."

quality_level: 3
