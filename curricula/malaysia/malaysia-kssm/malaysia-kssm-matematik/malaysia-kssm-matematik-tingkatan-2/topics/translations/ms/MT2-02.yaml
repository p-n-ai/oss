mastery:
  minimum_score: 0.75
  assessment_count: 5
  spaced_repetition:
    initial_interval_days: 2
    multiplier: 2.0

teaching:
  sequence:
    - "Langkah 1: Konsep Kembangan & Melaksanakan Kembangan Dua Ungkapan Algebra (30 minit)"
    - "Langkah 2: Gabungan Operasi Melibatkan Kembangan & Penyelesaian Masalah (25 minit)"
    - "Langkah 3: Memahami Faktor & Memfaktorkan Ungkapan Algebra (FSTB, Kuasa Dua Sempurna, Pendaraban Silang) (40 minit)"
    - "Langkah 4: Penyelesaian Masalah Melibatkan Pemfaktoran & Ungkapan 4 Sebutan (20 minit)"
    - "Langkah 5: Penambahan, Penolakan, Pendaraban & Pembahagian Pecahan Algebra (35 minit)"
  common_misconceptions:
    - misconception: "Pemotongan tidak sah, cth: memotong x dalam (x+4)/x menjadi 4."
      remediation: "Gunakan peraturan 'Faktor Sahaja'. Pemotongan hanya boleh dilakukan untuk faktor dalam kurungan, bukan sebutan dengan tanda +/-."
    - misconception: "Kehilangan tanda negatif semasa pengagihan, cth: -(x-5) menjadi -x-5."
      remediation: "Gunakan 'Pengawal Kurungan'. Anggap tanda tolak sebagai pendarab -1 untuk SETIAP sebutan di dalam."
    - misconception: "Kuasa Dua Sempurna Palsu: (x+3)^2 = x^2 + 9."
      remediation: "Gunakan 'Semakan Pelangi'. Sentiasa tulis dua kurungan kembar bersebelahan sebelum menyelesaikan."
  engagement_hooks:
    - "Penggodam Kod Rahsia: Ungkapan algebra ialah mesej yang disulitkan; pemfaktoran ialah kunci untuk menyahsulitnya."
    - "Seni Bina Pelan Lantai: Gunakan kembangan untuk mengira jumlah luas rumah modular berdasarkan dimensi x."

