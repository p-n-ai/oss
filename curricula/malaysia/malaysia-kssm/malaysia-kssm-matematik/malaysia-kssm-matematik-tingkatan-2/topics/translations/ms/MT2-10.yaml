performance_standards:
  - level: 1
    descriptor: "Menunjukkan pengetahuan asas tentang kecerunan garis lurus."
  - level: 2
    descriptor: "Menunjukkan kefahaman tentang kecerunan."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman kecerunan untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran kecerunan dalam penyelesaian masalah rutin mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran kecerunan dalam penyelesaian masalah rutin kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran kecerunan dalam penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required:
    - "MT2-07"
  recommended:
    - "MT1-06"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Perkenalkan kecerunan melalui situasi sebenar (tangga, bukit, bumbung) (15 min)"
    - "Langkah 2: Terangkan kecerunan sebagai nisbah jarak mencancang kepada jarak mengufuk (15 min)"
    - "Langkah 3: Terbitkan rumus kecerunan menggunakan koordinat (20 min)"
    - "Langkah 4: Terokai sifat kecerunan (tanda, magnitud, kes khas) (20 min)"
    - "Langkah 5: Selesaikan masalah rutin dan bukan rutin melibatkan kecerunan (20 min)"

  common_misconceptions:
    - misconception: "Keliru antara jarak mencancang dan jarak mengufuk."
      remediation: "Gunakan rajah ‘naik atas, gerak tepi’ untuk membezakan kedua-duanya."

    - misconception: "Menukar susunan penolakan dalam rumus koordinat."
      remediation: "Pastikan susunan konsisten: (y₂ - y₁) bahagi (x₂ - x₁)."

    - misconception: "Terlupa tanda negatif dalam rumus pintasan."
      remediation: "Tekankan bahawa m = - (pintasan-y / pintasan-x)."

    - misconception: "Menganggap garis menegak mempunyai kecerunan sifar."
      remediation: "Terangkan bahawa kecerunan garis menegak adalah tidak ditakrif kerana bahagi dengan sifar."

  engagement_hooks:
    - "Bincangkan kecuraman laluan Gunung Kinabalu dan laluan zig-zag."
    - "Analisis papan tanda jalan bagi cerun curam."
    - "Bandingkan kecerunan tangga, tangga lipat, dan tanjakan."

