topic_id: MT2-10
provenance: ai-assisted
questions:
  - id: Q1
    text: "Takrifkan istilah 'Kecerunan' bagi garis lurus dan nyatakan nisbah yang digunakan."
    difficulty: easy
    learning_objective: "10.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: free_text
      value: "Kecerunan ialah darjah kecuraman. Ia merupakan nisbah jarak mencancang kepada jarak mengufuk."
      working: |
        Kecerunan menunjukkan tahap kecuraman.
        Rumus: Kecerunan = Jarak mencancang / Jarak mengufuk.
    marks: 2

  - id: Q2
    text: "Manakah rumus yang betul bagi kecerunan?"
    difficulty: easy
    learning_objective: "10.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "$m = \\frac{y_2 - y_1}{x_2 - x_1}$"
        B: "$m = \\frac{x_2 - x_1}{y_2 - y_1}$"
        C: "$m = y_2 - x_1$"
        D: "$m = x_2 - y_1$"
      working: |
        Kecerunan ialah perubahan y bahagi perubahan x.
      distractors:
        - value: "B"
          feedback: "Anda terbalikkan nisbah. Sepatutnya mencancang bahagi mengufuk."
        - value: "C"
          feedback: "Ini bukan nisbah. Kecerunan mesti melibatkan bahagi."
        - value: "D"
          feedback: "Koordinat tidak dipadankan dengan betul."
    marks: 2

  - id: Q3
    text: "Padankan jenis garis dengan kecerunannya."
    difficulty: medium
    learning_objective: "10.1.3"
    tp_level: 3
    kbat: false
    answer:
      type: structured
      value: |
        Positif → Naik ke kanan
        Negatif → Turun ke kanan
        Sifar → Garis mendatar
        Tidak tertakrif → Garis menegak
    marks: 4

  - id: Q4
    text: "Hitung kecerunan garis melalui titik P(-3, 4) dan Q(2, -1)."
    difficulty: medium
    learning_objective: "10.1.4"
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "-1"
      working: |
        m = (y₂ - y₁)/(x₂ - x₁)
        = (-1 - 4)/(2 - (-3))
        = -5/5 = -1
    marks: 2

  - id: Q5
    text: "Diberi pintasan-y ialah 6 dan pintasan-x ialah -3. Cari kecerunan."
    difficulty: medium
    learning_objective: "10.1.4"
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "2"
      working: |
        m = -(6 / -3)
        = 2
    marks: 3

  - id: Q6
    text: "Diberi kecerunan garis melalui M(1, k) dan N(-2, 3) ialah -2, cari nilai k."
    difficulty: hard
    learning_objective: "10.1.5"
    tp_level: 5
    kbat: true
    answer:
      type: exact
      value: "-3"
      working: |
        -2 = (3 - k)/-3
        6 = 3 - k
        k = -3
    marks: 4

  - id: Q7
    text: "Sebuah bumbung mempunyai rentang 21 m dan tinggi 5 m. Jika simetri, hitung kecerunan dan terangkan kepentingannya di kawasan hujan lebat."
    difficulty: hard
    learning_objective: "10.1.5"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "Kecerunan ≈ 0.476. Bumbung curam membantu air mengalir dengan cepat."
      working: |
        Jarak mengufuk = 10.5
        Kecerunan = 5/10.5 ≈ 0.476
    marks: 5