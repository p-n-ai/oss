topic_id: MT2-09
provenance: ai-assisted
questions:

  - id: Q1
    text: "Antara berikut, yang manakah mentakrifkan laju sebagai kadar?"
    difficulty: easy
    learning_objective: "9.1.1"
    tp_level: 1
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "Nisbah jarak kepada masa"
        B: "Jumlah jarak"
        C: "Jarak darab masa"
        D: "Perubahan kedudukan sahaja"
      working: |
        $Laju = \\frac{Jarak}{Masa}$
      distractors:
        - value: "B"
          feedback: "Ini hanya jarak sahaja."
        - value: "C"
          feedback: "Laju bukan hasil darab."
        - value: "D"
          feedback: "Ini merujuk kepada sesaran."
    marks: 1

  - id: Q2
    text: "Betul atau Salah: Laju membandingkan dua kuantiti berbeza."
    difficulty: easy
    learning_objective: "9.1.1"
    tp_level: 2
    answer:
      type: exact
      value: "Betul"
      working: |
        Laju membandingkan jarak dan masa.
    marks: 1

  - id: Q3
    text: "Sebuah kereta bergerak 10 m setiap saat. Adakah gerakan ini seragam atau tidak seragam?"
    difficulty: easy
    learning_objective: "9.1.2"
    tp_level: 2
    answer:
      type: exact
      value: "Laju seragam"
      working: |
        Jarak sama bagi setiap sela masa.
    marks: 2
    hints:
      - level: 1
        text: "Periksa sama ada jarak setiap saat adalah sama."

  - id: Q4
    text: "Tukarkan $72\\text{ km/j}$ kepada $m/s$."
    difficulty: medium
    learning_objective: "9.1.3"
    tp_level: 3
    answer:
      type: exact
      value: "20 m/s"
      working: |
        $72 × \\frac{1000}{3600} = 20$
    marks: 3

  - id: Q5
    text: "Sebuah bas bergerak 300 km dalam 5 jam. Berapakah laju purata?"
    difficulty: medium
    learning_objective: "9.1.4"
    tp_level: 4
    answer:
      type: multiple_choice
      value: "B"
      options:
        A: "50 km/j"
        B: "60 km/j"
        C: "65 km/j"
        D: "70 km/j"
      working: |
        $300 ÷ 5 = 60$
      distractors:
        - value: "A"
          feedback: "Semak pembahagian anda."
        - value: "C"
          feedback: "Terdapat kesilapan pengiraan."
        - value: "D"
          feedback: "Gunakan formula dengan betul."
    marks: 2

  - id: Q6
    text: "Padankan formula yang betul bagi pecutan."
    difficulty: medium
    learning_objective: "9.2.2"
    tp_level: 3
    answer:
      type: exact
      value: "$a = \\frac{v-u}{t}$"
      working: |
        Pecutan ialah perubahan laju per masa.
    marks: 2

  - id: Q7
    text: "Sebuah kereta meningkat dari 10 m/s ke 30 m/s dalam 5 saat. Hitung pecutan."
    difficulty: medium
    learning_objective: "9.2.2"
    tp_level: 4
    answer:
      type: exact
      value: "4 m/s^2"
      working: |
        $(30-10)/5 = 4$
    marks: 4

  - id: Q8
    text: "Sebuah kenderaan nyahpecut dari 20 m/s ke pegun dalam 10 s. Hitung jarak."
    difficulty: hard
    learning_objective: "9.2.3"
    tp_level: 6
    answer:
      type: exact
      value: "100 m"
      working: |
        Laju purata = (20+0)/2 = 10  
        Jarak = 10 × 10 = 100
    marks: 6