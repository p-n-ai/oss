  - id: Q20
    text: "Permudahkan: $S = \\frac{2x - 1}{4x^2 - 1}$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "1 / (2x + 1)"
      working: |
        Kenal pasti 4x^2 - 1 sebagai beza antara dua sebutan kuasa dua sempurna.
        4x^2 - 1 = (2x - 1)(2x + 1)
        S = (2x - 1) / ((2x - 1)(2x + 1))
        Mansuhkan (2x - 1) untuk meninggalkan 1 / (2x + 1).
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenal pasti penyebut sebagai beza kuasa dua sempurna."
      - marks: 1
        criteria: "Memfaktorkan penyebut dengan betul kepada (2x-1)(2x+1)."
      - marks: 1
        criteria: "Memansuhkan faktor yang betul untuk mendapatkan pecahan akhir yang dipermudahkan."
    hints:
      - level: 1
        text: "Faktorkan penyebut dahulu. Boleh tak anda kenal pasti corak 'beza antara dua sebutan kuasa dua sempurna'?"
      - level: 2
        text: "AMARAN KESILAPAN KONSEP: Ingat Peraturan Emas 3! Anda tidak boleh memansuhkan sebutan yang dipisahkan oleh tanda '+' atau '-'. Anda mesti memfaktorkan ungkapan terlebih dahulu dan hanya memansuhkan 'keluarga' kurungan yang telah dikunci."

  - id: Q21
    text: "Faktorkan selengkapnya: $2x^2 - 50$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 2.2.2
    answer:
      type: exact
      value: "2(x - 5)(x + 5)"
      working: |
        Keluarkan faktor sepunya 2:
        2(x^2 - 25)
        Faktorkan beza kuasa dua sempurna:
        2(x - 5)(x + 5)
    marks: 2
    rubric:
