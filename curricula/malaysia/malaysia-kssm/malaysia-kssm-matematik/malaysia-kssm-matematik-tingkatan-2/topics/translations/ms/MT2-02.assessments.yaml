        text: "Cari nombor terbesar yang membahagi kedua-dua sebutan dahulu. Kemudian faktorkan kurungan itu sekali lagi."
      - level: 2
        text: "Peraturan Emas 1: Sentiasa lakukan 'Semakan Pelangi' (Rainbow Check-Back)! Kembangkan kurungan anda dalam minda untuk memastikan anda mendapat ungkapan dan tanda asal yang tepat."

  - id: Q22
    text: "Halaman rumah Encik Mohan yang berbentuk segi empat tepat mempunyai panjang $(4p + 3)$ m dan lebar $(2p + 5)$ m. Sebuah kolam ikan berbentuk segi empat tepat dibina di satu sudut halaman itu dengan panjang 10 m dan lebar 6 m, manakala kawasan selebihnya ditutupi dengan rumput tiruan. Hitung luas, dalam $m^2$, kawasan yang ditutupi dengan rumput tiruan."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 2.1.4
    answer:
      type: exact
      value: "8p^2 + 26p - 45"
      working: |
        Jumlah Luas Halaman = (4p + 3)(2p + 5)
        = 8p^2 + 20p + 6p + 15
        = 8p^2 + 26p + 15
        Luas Kolam = 10 * 6 = 60
        Luas Rumput = Jumlah Halaman - Kolam
        = (8p^2 + 26p + 15) - 60
        = 8p^2 + 26p - 45
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyediakan persamaan kembangan yang betul untuk jumlah luas halaman."
      - marks: 1
        criteria: "Mengembangkan ungkapan binomial dengan tepat kepada 8p^2 + 26p + 15."
      - marks: 1
        criteria: "Menolak 60 untuk mencari ungkapan kuadratik akhir yang betul."
    hints:
      - level: 1
        text: "Cari jumlah luas halaman dengan mendarab panjang dan lebar, kemudian tolak luas kolam tersebut."

  - id: Q23
    text: "Luas sebuah segi empat tepat ialah $(x^2 + 5x + 6)$ cm². Jika panjang segi empat tepat tersebut ialah $(x + 3)$ cm, ungkapkan perimeter segi empat tepat itu dalam sebutan $x$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 2.2.3
    answer:
      type: exact
      value: "4x + 10"
      working: |
        Luas = Panjang x Lebar
        Lebar = Luas / Panjang
        Lebar = (x^2 + 5x + 6) / (x + 3)
        Faktorkan x^2 + 5x + 6:
        Faktor bagi 6 yang hasil tambahnya 5 ialah 2 dan 3.
        = (x + 2)(x + 3)
        Maka, Lebar = [(x + 2)(x + 3)] / (x + 3)
        = (x + 2)
        Perimeter = 2(Panjang) + 2(Lebar)
        = 2(x + 3) + 2(x + 2)
        = 2x + 6 + 2x + 4
        = 4x + 10
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menyediakan pembahagian untuk mencari lebar."
      - marks: 1
        criteria: "Memfaktorkan ungkapan kuadratik dengan betul kepada (x+2)(x+3)."
      - marks: 1
        criteria: "Mengenal pasti lebar sebagai (x+2)."
      - marks: 1
        criteria: "Mengira ungkapan perimeter yang betul menggunakan 2L + 2W."
    hints:
      - level: 1
        text: "Untuk mencari lebar yang hilang, faktorkan luas dan mansuhkan bahagian panjang. Kemudian ingat formula perimeter!"
