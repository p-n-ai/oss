prerequisites:
  required:
    - "MT1-04"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Memperkenalkan laju sebagai kadar menggunakan konteks jarak-masa dan contoh kehidupan sebenar (20 min)"
    - "Langkah 2: Membezakan laju seragam dan tidak seragam menggunakan jadual dan graf (15 min)"
    - "Langkah 3: Melaksanakan pengiraan laju dan laju purata termasuk penukaran unit (25 min)"
    - "Langkah 4: Memperkenalkan pecutan dan nyahpecutan sebagai kadar perubahan laju (20 min)"
    - "Langkah 5: Menyelesaikan masalah dunia sebenar termasuk masalah berbilang langkah dan bukan rutin (30 min)"

  common_misconceptions:
    - misconception: "Keliru antara laju dengan jarak atau masa."
      remediation: "Gunakan formula Laju = Jarak ÷ Masa dengan bantuan model segitiga."
    - misconception: "Menganggap laju purata ialah purata aritmetik bagi laju."
      remediation: "Tekankan bahawa Laju Purata = Jumlah Jarak ÷ Jumlah Masa."
    - misconception: "Menganggap nyahpecutan berbeza sepenuhnya daripada pecutan."
      remediation: "Jelaskan bahawa nyahpecutan ialah pecutan negatif (pengurangan laju)."

  engagement_hooks:
    - "Bincangkan had laju dan kepentingannya dalam keselamatan jalan raya."
    - "Analisis pergerakan kenderaan seperti motosikal atau kereta dalam kehidupan harian."
    - "Terokai bagaimana atlet mengawal laju dan pecutan dalam sukan seperti larian dan berbasikal."

