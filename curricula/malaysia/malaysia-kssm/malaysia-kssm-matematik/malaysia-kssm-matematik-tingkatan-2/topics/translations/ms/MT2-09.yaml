  - level: 2
    descriptor: "Menunjukkan kefahaman tentang laju dan pecutan."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang laju dan pecutan untuk melaksanakan pengiraan."
  - level: 4
