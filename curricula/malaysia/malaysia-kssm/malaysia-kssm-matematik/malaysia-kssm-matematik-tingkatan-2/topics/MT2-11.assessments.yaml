topic_id: MT2-11
provenance: ai-assisted
questions:

  - id: Q1
    text: "Which of the following describes a transformation that maintains shape and size?"
    difficulty: easy
    learning_objective: "11.1.1"
    tp_level: 1
    answer:
      type: multiple_choice
      value: "Isometric Transformation"
      working: |
        Step 1: Identify transformation that preserves distance between points.
        Step 2: This is called an isometry.
      options:
        A: "Isometric Transformation"
        B: "Enlargement"
        C: "Stretching"
        D: "Shearing"
      distractors:
        - value: "B"
          feedback: "Enlargement changes size, so it is not an isometry."
        - value: "C"
          feedback: "Stretching changes shape and size, breaking isometric properties."
        - value: "D"
          feedback: "Shearing distorts shape, so it does not preserve congruence."
    marks: 1
    hints:
      - "Think: which transformation keeps ALL distances unchanged?"

  - id: Q2
    text: "Point A(4, -2) is translated by vector $\\begin{pmatrix} -3 \\\\ 5 \\end{pmatrix}$. Find A'."
    difficulty: medium
    learning_objective: "11.2.3"
    tp_level: 3
    answer:
      type: exact
      value: "(1, 3)"
      working: |
        x' = 4 + (-3) = 1
        y' = -2 + 5 = 3
      options: null
      distractors: []
    marks: 2
    hints:
      - "Add x with top vector value, y with bottom value."

  - id: Q3
    text: "Point P(2,5) is reflected in y = 3. Find P'."
    difficulty: medium
    learning_objective: "11.3.4"
    tp_level: 4
    answer:
      type: exact
      value: "(2, 1)"
      working: |
        Distance from 5 to 3 = 2
        Reflect across to 1
      distractors: []
    marks: 3
    hints:
      - "Measure vertical distance from mirror line."

  - id: Q4
    text: "Point M(3,2) rotated 90° clockwise about origin becomes?"
    difficulty: hard
    learning_objective: "11.4.3"
    tp_level: 3
    answer:
      type: multiple_choice
      value: "(2, -3)"
      working: |
        (x, y) → (y, -x)
      options:
        A: "(2, -3)"
        B: "(-2, 3)"
        C: "(-3, 2)"
        D: "(3, -2)"
      distractors:
        - value: "B"
          feedback: "This is 90° anticlockwise rule."
    marks: 2
    hints:
      - "Clockwise rotation swaps coordinates with sign change."

  - id: Q5
    text: "Triangles are congruent under isometry. Find missing angle."
    difficulty: hard
    learning_objective: "11.5.3"
    tp_level: 5
    answer:
      type: exact
      value: "130°"
      working: |
        180 - 35 - 15 = 130
      distractors: []
    marks: 4
    hints:
      - "Use triangle angle sum + congruence property."

  - id: Q6
    text: "Order of rotational symmetry of a pentagon?"
    difficulty: medium
    learning_objective: "11.6.2"
    tp_level: 3
    answer:
      type: exact
      value: "5"
      working: |
        A pentagon has 5 equal rotations
      distractors: []
    marks: 1
    hints:
      - "Count how many times shape matches itself in 360°"

  - id: Q7
    text: "Why is a translated and reflected square still congruent?"
    difficulty: hard
    learning_objective: "11.5.2"
    tp_level: 6
    answer:
      type: free_text
      value: "Both transformations preserve distance and shape."
      working: |
        Translation = isometry
        Reflection = isometry
        Composition = isometry
      distractors: []
    marks: 5
    hints:
      - "Do these transformations change length or area?"