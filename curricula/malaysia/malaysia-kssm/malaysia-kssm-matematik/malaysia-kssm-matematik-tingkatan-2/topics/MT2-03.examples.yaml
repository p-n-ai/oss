topic_id: MT2-03
provenance: ai-assisted
worked_examples:
  - id: WE-01
    topic: "Changing the Subject - Linear (3.1.2)"
    scenario: "Given $y = 3x - 5$, make $x$ the VIP (subject of the formula)."
    difficulty: easy
    tp_level: 3
    real_world_analogy: >-
      Think of the equals sign as a bridge! To get the VIP (x) all alone on the left, you must strip away the weakest guards first using the 'Reverse BODMAS Shield'.
    misconception_alert: >-
      Don't divide by 3 first! Remember the 'Reverse BODMAS Shield'—we must remove addition/subtraction guards (+/-) before dealing with multiplication/division bodyguards.
    working: |
      Step 1: Identify the VIP (x). It's currently guarded by a '3' and a '-5'.
      Step 2: Add 5 to BOTH sides to move the weakest guard across the bridge:
      $y + 5 = 3x - 5 + 5$
      $y + 5 = 3x$
      Step 3: Divide BOTH sides by 3 to remove the attached bodyguard:
      $\frac{y + 5}{3} = \frac{3x}{3}$
      $\frac{y + 5}{3} = x$
      Final Step: Flip it so the VIP sits on the left with a positive 1 coefficient:
      Final Answer: $x = \frac{y + 5}{3}$
      
  - id: WE-02
    topic: "Changing the Subject - Squares/Roots (3.1.2)"
    scenario: "Given $k = \\sqrt{m + 2}$, make $m$ the subject."
    difficulty: medium
    tp_level: 3
    real_world_analogy: >-
      The square root symbol is like a heavy armor protecting the variable. To rescue $m$, you must destroy the armor first using its opposite power!
    misconception_alert: >-
      Beware of the 'Partial Root' trap! You cannot just move the 2. The root covers both $m$ and $2$. You must square the ENTIRE opposite side to break it.
    working: |
      Step 1: The 'VIP' $m$ is trapped under a square root armor.
      Step 2: Destroy the armor by squaring BOTH sides:
      $(k)^2 = (\sqrt{m + 2})^2$
      $k^2 = m + 2$
      Step 3: Subtract 2 from BOTH sides to isolate m:
      $k^2 - 2 = m + 2 - 2$
      $k^2 - 2 = m$
      Final Step: Flip the equation so the VIP sits on the left:
      Final Answer: $m = k^2 - 2$
      
  - id: WE-03
    topic: "Substitution with Protective Bubbles (3.1.3)"
    scenario: "Given the formula $z = x^2 - 4w$, calculate $z$ when $x = -3$ and $w = 2$."
    difficulty: medium
    tp_level: 3
    real_world_analogy: >-
      Negative numbers are like radioactive isotopes. Never touch them directly! Always put them in 'Bubble Wrap' (brackets) before dropping them into the formula.
    misconception_alert: >-
      The 'Naked Negative' Trap! If you substitute without brackets and write $-3^2$, your calculator will evaluate it as $-9$. But $(-3)^2$ is $+9$. Brackets save lives!
    working: |
      Step 1: Apply the 'Bubble Wrap Rule'. Write the formula with empty brackets for the variables:
      $z = ( )^2 - 4( )$
      Step 2: Drop the numbers carefully into the bubbles:
      $z = (-3)^2 - 4(2)$
      Step 3: Solve the square first. $(-3) \times (-3) = 9$:
      $z = 9 - 4(2)$
      Step 4: Multiply next according to BODMAS. $4 \times 2 = 8$:
      $z = 9 - 8$
      Final Answer: $z = 1$
