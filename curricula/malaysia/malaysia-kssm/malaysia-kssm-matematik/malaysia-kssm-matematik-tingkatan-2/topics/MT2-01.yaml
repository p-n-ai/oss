id: MT2-01
official_ref: "Bab 1"
name: "Pola dan Jujukan"
name_en: "Patterns and Sequences"
subject_grade_id: malaysia-kssm-matematik-tingkatan-2
subject_id: malaysia-kssm-matematik
syllabus_id: malaysia-kssm
country_id: malaysia
language: en
difficulty: intermediate
tier: core

content_standards:
  - id: "1.1"
    text_en: "Patterns"
  - id: "1.2"
    text_en: "Sequences"
  - id: "1.3"
    text_en: "Patterns and Sequences"

learning_objectives:
  - id: 1.1.1
    content_standard_id: "1.1"
    text_en: "Identify and describe patterns of various number sets and objects in the real world, and hence make generalisation about patterns."
    bloom: understand
  - id: 1.2.1
    content_standard_id: "1.2"
    text_en: "Explain the meaning of sequence."
    bloom: understand
  - id: 1.2.2
    content_standard_id: "1.2"
    text_en: "Identify and describe the pattern of a sequence, and hence complete and extend the sequence."
    bloom: apply
  - id: 1.3.1
    content_standard_id: "1.3"
    text_en: "Make generalisation about the pattern of a sequence using numbers, words and algebraic expressions."
    bloom: analyze
  - id: 1.3.2
    content_standard_id: "1.3"
    text_en: "Determine specific terms of a sequence."
    bloom: apply
  - id: 1.3.3
    content_standard_id: "1.3"
    text_en: "Solve problems involving sequences."
    bloom: apply

performance_standards:
  - level: 1
    descriptor_en: "Demonstrate basic knowledge of patterns."
  - level: 2
    descriptor_en: "Demonstrate understanding of patterns and sequences."
  - level: 3
    descriptor_en: "Apply understanding of patterns and sequences to perform simple tasks."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of patterns and sequences in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of patterns and sequences in the context of complex routine problem solving."
  - level: 6
    descriptor_en: "Apply appropriate knowledge and skills of patterns and sequences in the context of non-routine problem solving in a creative manner."

prerequisites:
  required:
    - "MT1-05"
    - "MT1-06"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to Patterns (20 min)"
    - "Step 2: Defining Sequences (20 min)"
    - "Step 3: Extending Sequences (30 min)"
    - "Step 4: Generalising with Algebra (40 min)"
    - "Step 5: Solving Real-world Problems (40 min)"
  common_misconceptions:
    - misconception: "Assuming every collection of numbers is a sequence, even without a consistent pattern."
      remediation: "Highlight the 'Consistency Check'. Prove the relationship between Term 1 and Term 2 must hold for all subsequent terms."
    - misconception: "Difficulty translating 'add 3 each time' into the algebraic form (e.g., 3n + c)."
      remediation: "Use the 'Jump Logic'. The common difference is the multiplier for n."
  engagement_hooks:
    - "The Fibonacci Nature Walk: Observe patterns in sunflowers, pinecones, and seashells to discover natural sequences."
    - "Digital Music Beats: Analyze drum patterns (4/4 time) as repeating numerical sequences."

quality_level: 3
provenance: ai-assisted
ai_teaching_notes: "MT2-01.teaching.md"
assessments_file: "MT2-01.assessments.yaml"
examples_file: "MT2-01.examples.yaml"
