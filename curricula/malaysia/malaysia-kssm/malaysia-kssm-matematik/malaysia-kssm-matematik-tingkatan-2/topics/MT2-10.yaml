prerequisites:
  required:
    - "MT2-07"
  recommended:
    - "MT1-06"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce gradient using real-life steepness (stairs, hills, roofs) (15 min)"
    - "Step 2: Explain gradient as ratio of vertical distance to horizontal distance (15 min)"
    - "Step 3: Derive gradient formula using coordinates (20 min)"
    - "Step 4: Explore properties of gradient (sign, magnitude, special cases) (20 min)"
    - "Step 5: Solve routine and non-routine problems involving gradient (20 min)"

  common_misconceptions:
    - misconception: "Confusing vertical distance with horizontal distance."
      remediation: "Use ‘rise over run’ visual diagrams to reinforce correct orientation."

    - misconception: "Reversing subtraction order in coordinate formula."
      remediation: "Always subtract consistently: (y2 - y1) over (x2 - x1)."

    - misconception: "Forgetting the negative sign in intercept formula."
      remediation: "Highlight that m = - (y-intercept / x-intercept) and relate to graph direction."

    - misconception: "Believing vertical lines have zero gradient."
      remediation: "Clarify that vertical lines have undefined gradient due to division by zero."

  engagement_hooks:
    - "Discuss steepness of Mount Kinabalu trails and why paths zigzag."
    - "Analyze road signs showing slope percentages."
    - "Compare gradients of stairs, ladders, and ramps in daily life."

quality_level: 3
provenance: ai-assisted

ai_teaching_notes: "MT2-10.teaching.md"
assessments_file: "MT2-10.assessments.yaml"
examples_file: "MT2-10.examples.yaml"