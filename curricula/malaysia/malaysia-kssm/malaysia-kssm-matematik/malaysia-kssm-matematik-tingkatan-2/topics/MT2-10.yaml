performance_standards:
  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of gradient of a straight line."
  - level: 2
    descriptor_en: "Demonstrate the understanding of gradient."
  - level: 3
    descriptor_en: "Apply the understanding of gradient to perform simple tasks."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of gradient in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of gradient in the context of complex routine problem solving."
