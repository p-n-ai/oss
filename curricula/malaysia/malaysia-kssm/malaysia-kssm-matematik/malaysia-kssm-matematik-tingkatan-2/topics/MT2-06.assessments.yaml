  # Learning Objective 1: Understanding the Properties of Three-Dimensional Shapes
  - id: Q1
    text: "A cube has a volume of 64 cm³. What is the length of one side of the cube?"
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "4 cm"
      working: |
        The volume of a cube is given by $V = a^3$, where $a$ is the side length.
        Given that $V = 64 \text{ cm}^3$, we have $a^3 = 64$.
        Therefore, $a = \sqrt[3]{64} = 4 \text{ cm}$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct use of the formula for the volume of a cube."
      - marks: 1
        criteria: "Correct calculation of the cube root of 64."
    hints:
      - level: 1
        text: "Remember the formula for the volume of a cube: $V = a^3$."

  # Learning Objective 2: Calculating Surface Area of Three-Dimensional Shapes
  - id: Q2
    text: "Calculate the surface area of a cylinder with a radius of 3 cm and a height of 5 cm."
    difficulty: medium
    learning_objective: LO2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "150.72 cm²"
      working: |
        The surface area of a cylinder is given by $A = 2\pi r(h + r)$.
        Substituting $r = 3 \text{ cm}$ and $h = 5 \text{ cm}$, we get:
        $A = 2\pi(3)(5 + 3) = 2\pi(3)(8) = 48\pi$.
        Converting to decimal, $A \approx 150.72 \text{ cm}^2$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct formula for the surface area of a cylinder."
      - marks: 1
        criteria: "Correct substitution of radius and height into the formula."
      - marks: 1
        criteria: "Correct calculation and conversion to decimal."
    hints:
      - level: 1
        text: 'Use the formula for the surface area of a cylinder: $A = 2\pi r(h + r)$.'

  # Learning Objective 3: Identifying and Describing Three-Dimensional Shapes
  - id: Q3
    text: "Which of the following is not a property of a sphere?"
    difficulty: medium
    learning_objective: LO3
    tp_level: 2
    kbat: true
    answer:
      type: multiple_choice
      value: "C"
      options:
        A: "It has no edges."
        B: "It has no vertices."
        C: "It has a flat surface."
        D: "It is perfectly symmetrical."
      working: |
        A sphere is a perfectly symmetrical object in three dimensions. It has no edges or vertices, and all points on its surface are equidistant from its center. It does not possess any flat surfaces.
    marks: 2
