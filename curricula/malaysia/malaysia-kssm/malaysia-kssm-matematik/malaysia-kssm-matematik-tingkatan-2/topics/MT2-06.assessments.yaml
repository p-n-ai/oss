  # Learning Objective 4: Analyzing and Comparing Three-Dimensional Shapes
  - id: Q4
    text: "Compare the volumes of a cone and a cylinder with the same base radius of 4 cm and height of 6 cm."
    difficulty: medium
    learning_objective: LO4
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "The volume of the cone is one-third of the volume of the cylinder."
      working: |
        The volume of a cylinder is given by $V_c = \pi r^2 h$.
        Substituting $r = 4 \text{ cm}$ and $h = 6 \text{ cm}$, $V_c = \pi (4)^2 (6) = 96\pi \text{ cm}^3$.
        The volume of a cone is $V_{cone} = \frac{1}{3} \pi r^2 h$.
        Therefore, $V_{cone} = \frac{1}{3} \times 96\pi = 32\pi \text{ cm}^3$.
        Thus, the volume of the cone is one-third of the volume of the cylinder.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correct formula for the volume of a cylinder."
      - marks: 1
        criteria: "Correct calculation of the cylinder's volume."
      - marks: 1
        criteria: "Correct formula for the volume of a cone."
      - marks: 1
        criteria: "Correct comparison between the volumes."
    hints:
      - level: 1
        text: 'Remember the formula for the volume of a cone: $V = \frac{1}{3}\pi r^2 h$.'

  # Learning Objective 5: Solving Real-World Problems Involving Three-Dimensional Shapes
  - id: Q5
    text: "A rectangular prism has dimensions of 2 cm by 3 cm by 4 cm. If the length is doubled, how does the volume change?"
    difficulty: medium
    learning_objective: LO5
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "The volume doubles."
      working: |
        The original volume $V = l \times w \times h = 2 \times 3 \times 4 = 24 \text{ cm}^3$.
        If the length is doubled, the new dimensions are $4 \times 3 \times 4$.
        The new volume $V_{new} = 4 \times 3 \times 4 = 48 \text{ cm}^3$.
        Therefore, the volume doubles.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct calculation of the original volume."
      - marks: 1
        criteria: "Correct calculation of the new volume with doubled length."
      - marks: 1
        criteria: "Correct conclusion that the volume doubles."
    hints:
      - level: 1
        text: "Consider how changing one dimension affects the total volume."