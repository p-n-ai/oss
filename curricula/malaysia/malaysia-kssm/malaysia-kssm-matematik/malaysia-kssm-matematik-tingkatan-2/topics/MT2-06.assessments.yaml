id: MT2-06
topic_id: MT2-06

questions:

  - id: Q1
    text: "A solid has 1 circular base, 1 apex, and 1 curved surface. Identify the shape."
    difficulty: easy
    learning_objective: "6.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "B"
      options:
        A: "Cylinder"
        B: "Cone"
        C: "Pyramid"
        D: "Sphere"
      working: |
        Step 1: Identify features: 1 circular base + 1 apex + curved surface.
        Step 2: Compare solids:
        - Cylinder: 2 circular bases → reject
        - Pyramid: polygon base → reject
        - Sphere: no base/apex → reject
        Therefore, cone is correct.
      distractors:
        - value: "A"
          feedback: "A cylinder has two circular bases and no apex."
        - value: "C"
          feedback: "A pyramid does not have a circular base."
        - value: "D"
          feedback: "A sphere has no base, edges, or vertices."
    marks: 1
    hints:
      - level: 1
        text: "Visualise an ice cream cone. What 3D shape is it?"

  - id: Q2
    text: "True or False: A sphere has zero edges and zero vertices."
    difficulty: easy
    learning_objective: "6.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "True"
        B: "False"
      working: |
        Step 1: Sphere is fully curved.
        Step 2: No flat faces exist.
        Step 3: Therefore no edges or vertices.
      distractors:
        - value: "B"
          feedback: "Incorrect. A sphere has no corners or edges."
    marks: 1
    hints:
      - level: 1
        text: "Think of a football. Do you see any sharp corners?"

  - id: Q3
    text: "A net consists of 2 identical circles and 1 rectangle. What 3D shape is formed?"
    difficulty: easy
    learning_objective: "6.2.1"
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "Cylinder"
      working: |
        Step 1: Two circles → top and bottom faces.
        Step 2: Rectangle wraps curved surface.
        Step 3: Forms a cylinder.
    marks: 2
    hints:
      - level: 1
        text: "Think of a Milo tin when unwrapped."

  - id: Q4
    text: "Can a sphere be formed from a flat net?"
    difficulty: medium
    learning_objective: "6.2.1"
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: "B"
      options:
        A: "Yes"
        B: "No"
      working: |
        Step 1: Sphere has no flat faces.
        Step 2: Flattening requires distortion.
        Step 3: Perfect net is impossible.
      distractors:
        - value: "A"
          feedback: "Incorrect. A sphere cannot be flattened without stretching."
    marks: 1
    hints:
      - level: 1
        text: "Try peeling an orange. Does it lie flat?"

  - id: Q5
    text: "Find the surface area of a closed cylinder with radius $7 \\text{ cm}$ and height $10 \\text{ cm}$. Use $\\pi = \\frac{22}{7}$."
    difficulty: medium
    learning_objective: "6.3.1"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "748 cm^2"
      working: |
        Step 1: Formula = $2\\pi r^2 + 2\\pi rh$
        Step 2: Substitute values
        Step 3: Base area = 308 cm²
        Step 4: Curved surface = 440 cm²
        Step 5: Total = 748 cm²
    marks: 3
    hints:
      - level: 1
        text: "Did you include both circular bases?"

  - id: Q6
    text: "A cone and cylinder have the same base and height. Cylinder volume is $450 \\text{ cm}^3$. Find cone volume."
    difficulty: medium
    learning_objective: "6.4.1"
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: "150 cm^3"
      working: |
        Step 1: Cone = 1/3 cylinder
        Step 2: 450 ÷ 3 = 150
    marks: 2
    hints:
      - level: 1
        text: "Use the sago experiment idea."

  - id: Q7
    text: "A composite solid consists of a cube and a pyramid. What is the correct method to find total volume?"
    difficulty: hard
    learning_objective: "6.4.3"
    tp_level: 5
    kbat: true
    answer:
      type: multiple_choice
      value: "C"
      options:
        A: "Multiply volumes"
        B: "Subtract volumes"
        C: "Add volumes"
        D: "Average volumes"
      working: |
        Step 1: Composite solids are additive.
        Step 2: Volume = cube + pyramid
      distractors:
        - value: "A"
          feedback: "Volumes are not multiplied."
        - value: "B"
          feedback: "No subtraction unless hollow."
        - value: "D"
          feedback: "Averaging is incorrect."
    marks: 3
    hints:
      - level: 1
        text: "Think of combining two solid blocks."

  - id: Q8
    text: "TP6: Which change increases cylinder volume most effectively?"
    difficulty: hard
    learning_objective: "6.4.3"
    tp_level: 6
    kbat: true
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "Increase radius"
        B: "Increase height"
        C: "Decrease radius"
        D: "No change"
      working: |
        Step 1: Volume = πr²h
        Step 2: Radius is squared factor
        Step 3: Most impact = radius
    marks: 4
    hints:
      - level: 1
        text: "Which variable is squared?"