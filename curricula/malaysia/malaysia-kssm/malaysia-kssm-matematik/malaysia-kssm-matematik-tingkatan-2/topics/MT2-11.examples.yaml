topic_id: MT2-11
provenance: ai-assisted
description: "Worked examples for Isometric Transformations covering Translation, Reflection, Rotation, Isometry, and Rotational Symmetry."

worked_examples:
  # --- 11.2 Translation ---
  - id: WE-01
    topic: "Translation"
    difficulty: easy
    real_world_analogy: "Imagine sliding a plate of Nasi Lemak across a smooth table. The plate stays facing the same way and doesn't flip or turn; it only shifts position."
    misconception_alert: "Students often forget that moving left and down must be represented with negative values in the vector."
    scenario: "Point $P(2, 3)$ is translated by vector $\\begin{pmatrix} -4 \\\\ 2 \\end{pmatrix}$. Determine the coordinates of image $P'$."
    working: |
      1. Identify original coordinates: $x = 2, y = 3$.
      2. Identify vector components: $a = -4, b = 2$.
      3. Apply x-translation: $x' = 2 + (-4) = -2$.
      4. Apply y-translation: $y' = 3 + 2 = 5$.
      5. Final answer: $P'(-2, 5)$.

  # --- 11.3 Reflection ---
  - id: WE-02
    topic: "Reflection"
    difficulty: medium
    real_world_analogy: "Think of the reflection of the Tuanku Mizan Zainal Abidin Mosque on Putrajaya Lake. The image is inverted but remains the same size."
    misconception_alert: "Students often assume the distance from object to axis is different from image to axis. They must be equal and perpendicular."
    scenario: "Reflect point $Q(3, 4)$ in the line $x = 1$. Determine image $Q'$."
    working: |
      1. Find distance from point to axis: $3 - 1 = 2$.
      2. Move same distance to the opposite side of axis.
      3. New x-coordinate: $x' = 1 - 2 = -1$.
      4. y-coordinate unchanged: $y' = 4$.
      5. Final answer: $Q'(-1, 4)$.

  # --- 11.4 Rotation ---
  - id: WE-03
    topic: "Rotation"
    difficulty: medium
    real_world_analogy: "Rotating a key inside a lock. The center stays fixed while the rest rotates around it."
    misconception_alert: "Students often mix clockwise and anticlockwise rules. 90° CW ≠ 90° ACW."
    scenario: "Point $R(5, 2)$ is rotated 90° anticlockwise about the origin. Find $R'$."
    working: |
      1. Use rule: $(x, y) \\rightarrow (-y, x)$.
      2. Substitute values: $(5, 2)$.
      3. New x: $-2$, new y: $5$.
      4. Final answer: $R'(-2, 5)$.

  # --- 11.5 Isometry & Congruence ---
  - id: WE-04
    topic: "Isometry and Congruence"
    difficulty: hard
    real_world_analogy: "Two identical floor tiles will always fit perfectly even if you slide, flip, or rotate them."
    misconception_alert: "Students confuse similarity with congruence. Isometry always preserves size AND shape."
    scenario: "Triangle $ABC$ is the image of triangle $BCD$ under an isometry. Given $\\angle BDC = 35°$ and $\\angle CBD = 15°$, find $\\angle BAC$."
    working: |
      1. Under isometry, shapes are congruent.
      2. Corresponding angles are equal.
      3. In triangle $BCD$: $180° - 35° - 15° = 130°$.
      4. Therefore $\\angle BAC = 130°$.

  # --- 11.6 Rotational Symmetry ---
  - id: WE-05
    topic: "Rotational Symmetry"
    difficulty: medium
    real_world_analogy: "A ceiling fan with 3 blades looks the same every 120° rotation."
    misconception_alert: "Students confuse line symmetry with rotational symmetry."
    scenario: "Find the order of rotational symmetry of a regular hexagon."
    working: |
      1. A regular polygon has symmetry equal to number of sides.
      2. Hexagon has 6 sides.
      3. Therefore order = 6.