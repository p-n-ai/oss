  - id: WE-01
    topic: "Understanding Functions"
    difficulty: easy
    real_world_analogy: "Consider a vending machine where you input a number (money) and receive a specific item (output). The machine only gives one item for each valid input."
    misconception_alert: "Students often think that a function can give multiple outputs for one input. In reality, a function assigns exactly one output for each input."
    scenario: "Identify if the relationship given by the set of ordered pairs {(1, 2), (2, 3), (3, 4), (1, 5)} represents a function."
    working: |
      Step 1: Understand the definition of a function, which is a relation where each input has exactly one output.
      Step 2: Check the ordered pairs for repeated inputs. Here, input '1' is paired with outputs '2' and '5'.
      Step 3: Since input '1' has two different outputs, the relation is not a function.

  - id: WE-02
    topic: "Building and Graphing Linear Functions"
    difficulty: medium
    real_world_analogy: "Imagine tracking the distance you travel at a constant speed over time. The distance increases linearly as time passes."
    misconception_alert: "Students may confuse the slope with the y-intercept or misinterpret the scale of the graph."
    scenario: "Construct a table of values and draw the graph for the function y = 2x + 1."
    working: |
      Step 1: Choose values for x, e.g., x = -1, 0, 1, 2.
      Step 2: Calculate corresponding y values using y = 2x + 1: 
              - If x = -1, y = 2(-1) + 1 = -1.
              - If x = 0, y = 2(0) + 1 = 1.
              - If x = 1, y = 2(1) + 1 = 3.
              - If x = 2, y = 2(2) + 1 = 5.
      Step 3: Plot the points (-1, -1), (0, 1), (1, 3), and (2, 5) on the graph and draw a straight line through them.

  - id: WE-03
    topic: "Interpreting and Solving Problems with Graphs of Functions"
    difficulty: hard
    real_world_analogy: "Think of a roller coaster where the height of the ride changes with time. The graph of this ride can help us understand speed changes and identify peaks and valleys."
    misconception_alert: "Students might misinterpret the peak as the starting point or confuse intervals of increase and decrease."
    scenario: "Given the graph of a quadratic function representing the height of a ball thrown into the air, determine the maximum height and the time it takes to reach that height."
    working: |
      Step 1: Identify the vertex of the parabola on the graph, which represents the maximum height.
      Step 2: Note the coordinates of the vertex, e.g., (3, 9), where 3 is the time in seconds, and 9 is the height in meters.
      Step 3: Conclude that the maximum height is 9 meters, and it is reached at 3 seconds.