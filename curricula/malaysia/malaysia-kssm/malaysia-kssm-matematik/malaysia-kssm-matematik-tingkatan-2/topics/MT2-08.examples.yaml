topic_id: MT2-08
provenance: ai-assisted
worked_examples:
  - id: WE-01
    topic: "Identifying Functions"
    difficulty: easy
    learning_objective: "8.1.2"
    tp_level: 2
    real_world_analogy: "Think of a vending machine. When you press one button (input), you should get exactly one drink (output). If one button gives two different drinks, the machine is faulty — that is NOT a function."
    misconception_alert: "Students often think that if two different inputs give the same output, it is not a function. This is incorrect — many-to-one mappings are allowed. The real issue is when ONE input gives multiple outputs."
    scenario: "Determine whether the set of ordered pairs $\\{(1, 5), (2, 10), (3, 5), (4, 20)\\}$ represents a function. Justify your answer."
    working: |
      1. Identify the inputs (domain): $\\{1, 2, 3, 4\\}$.
      2. Identify the outputs: $\\{5, 10, 20\\}$.
      3. Check each mapping:
         - Input 1 maps to 5
         - Input 2 maps to 10
         - Input 3 maps to 5
         - Input 4 maps to 20
      4. Verify the function rule:
         - Each input must have exactly one output.
         - No input appears with different outputs.
      5. Note that inputs 1 and 3 share the same output (5), which is allowed.
      6. Conclusion: This relation is a function.

  - id: WE-02
    topic: "Constructing Tables and Graphs of Functions"
    difficulty: medium
    learning_objective: "8.2.1"
    tp_level: 3
    real_world_analogy: "Imagine kicking a football. The height increases, reaches a peak, and then decreases — forming a curved path. This shape represents a quadratic function."
    misconception_alert: "Students often forget brackets when squaring negative numbers. For example, $(-2)^2 = 4$, but $-2^2 = -4$. This mistake leads to incorrect graph values."
    scenario: "Construct a table of values for the function $y = x^2 - 3$ for $-2 \\le x \\le 2$, and list the coordinates."
    working: |
      1. Substitute each value of $x$ into the function $y = x^2 - 3$.

      2. For $x = -2$:
         $y = (-2)^2 - 3$
         $y = 4 - 3$
         $y = 1$

      3. For $x = -1$:
         $y = (-1)^2 - 3$
         $y = 1 - 3$
         $y = -2$

      4. For $x = 0$:
         $y = (0)^2 - 3$
         $y = 0 - 3$
         $y = -3$

      5. For $x = 1$:
         $y = (1)^2 - 3$
         $y = 1 - 3$
         $y = -2$

      6. For $x = 2$:
         $y = (2)^2 - 3$
         $y = 4 - 3$
         $y = 1$

      7. List the coordinates:
         $(-2, 1), (-1, -2), (0, -3), (1, -2), (2, 1)$

      8. These points can now be plotted on a Cartesian plane to form a smooth curve.

  - id: WE-03
    topic: "Solving Real-World Problems Using Graphs"
    difficulty: hard
    learning_objective: "8.2.3"
    tp_level: 6
    real_world_analogy: "Imagine comparing two mobile data plans. One has a fixed monthly fee but cheaper usage, while another has no fee but higher usage cost. The point where both cost the same is where their graphs intersect."
    misconception_alert: "Students may solve each equation separately but forget that the solution occurs when both costs are equal — at the intersection point."
    scenario: "A company charges RM 30 plus RM 0.10 per minute ($y = 0.1x + 30$). Another company charges RM 0.25 per minute ($y = 0.25x$). Find the number of minutes $x$ when both costs are the same."
    working: |
      1. Write both equations:
         Company A: $y = 0.1x + 30$
         Company B: $y = 0.25x$

      2. Set the equations equal:
         $0.1x + 30 = 0.25x$

      3. Subtract $0.1x$ from both sides:
         $0.25x - 0.1x = 30$

      4. Simplify:
         $0.15x = 30$

      5. Divide both sides by 0.15:
         $x = \\frac{30}{0.15}$

      6. Calculate:
         $x = 200$

      7. Verify:
         Company A: $y = 0.1(200) + 30 = 20 + 30 = 50$
         Company B: $y = 0.25(200) = 50$

      8. Conclusion:
         Both plans cost the same at 200 minutes.