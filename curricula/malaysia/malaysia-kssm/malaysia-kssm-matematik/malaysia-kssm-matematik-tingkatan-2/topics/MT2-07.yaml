prerequisites:
  required:
    - "Plotting points on a Cartesian plane"
    - "Identifying x-axis, y-axis, and origin (0, 0)"
    - "Understanding basic Pythagoras theorem"
  recommended:
    - "Basic square root operations"
    - "Understanding of coordinate quadrants"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce Cartesian plane and coordinates (15 min)"
    - "Step 2: Explain distance concept using grid movement (20 min)"
    - "Step 3: Derive distance formula using Pythagoras theorem (25 min)"
    - "Step 4: Introduce midpoint concept using averaging idea (15 min)"
    - "Step 5: Derive midpoint formula step-by-step (20 min)"
    - "Step 6: Apply both formulas in mixed problem solving (20 min)"

  common_misconceptions:
    - misconception: "Students treat midpoint as a single averaged number instead of a coordinate pair."
      remediation: "Emphasize that midpoint must always produce (x, y) by averaging x-values and y-values separately."

    - misconception: "Students forget that distance uses squared differences."
      remediation: "Reinforce that distance comes from Pythagoras theorem, requiring squares before square root."

  engagement_hooks:
    - "Use a school map and calculate straight-line distance between two classrooms."
    - "Show how navigation apps use coordinates to measure shortest travel distance."

