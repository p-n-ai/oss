topic_id: MT2-12
provenance: ai-assisted

questions:

  # --- 12.1.1 Ungrouped Data (Mean, Median, Mode) ---
  - id: Q1
    text: "A group of students recorded their daily pocket money: RM5, RM8, RM3, RM7, RM5. Calculate the mean and determine the median."
    difficulty: easy
    learning_objective: "12.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "Mean = RM5.60, Median = RM5"
      working: |
        Sum = 5 + 8 + 3 + 7 + 5 = 28
        Mean = 28 ÷ 5 = 5.60
        Sorted data = 3, 5, 5, 7, 8
        Median = 3rd value = 5
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct computation of mean with working shown."
      - marks: 1
        criteria: "Correct median after proper sorting."
    hints:
      - level: 1
        text: "First find total sum, then divide. For median, remember: NO SORT = NO MEDIAN. Line them up smallest to largest first."

  # --- 12.1.2 Effect of Uniform Change ---
  - id: Q2
    text: "The mean of a data set is 12. If every value is multiplied by 3, what is the new mean?"
    difficulty: medium
    learning_objective: "12.1.2"
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: "36"
      options:
        A: "12"
        B: "15"
        C: "36"
        D: "144"
      working: |
        Mean scales with multiplication factor.
        New mean = 12 × 3 = 36
      distractors:
        - value: "12"
          feedback: "You ignored the transformation. If every value triples, the mean must also triple."
        - value: "15"
          feedback: "You added instead of multiplying. The keyword is MULTIPLIED."
        - value: "144"
          feedback: "You squared the effect incorrectly. No exponent operation is involved."
    marks: 1
    hints:
      - level: 1
        text: "Think: if everything becomes 3 times bigger, what happens to the average?"

  # --- 12.1.4 Grouped Data (Modal Class) ---
  - id: Q3
    text: |
      The table shows student marks:

      10–19: 3
      20–29: 7
      30–39: 7
      40–49: 2

      Identify the modal class.
    difficulty: medium
    learning_objective: "12.1.4"
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: "20–29 and 30–39"
      options:
        A: "10–19"
        B: "20–29"
        C: "20–29 and 30–39"
        D: "40–49"
      working: |
        Modal class = highest frequency.
        Highest frequency = 7
        Two classes share it: 20–29 and 30–39
      distractors:
        - value: "20–29"
          feedback: "You only selected one. There is a tie for highest frequency."
        - value: "7"
          feedback: "That is frequency, not class interval."
        - value: "10–19"
          feedback: "This is not the highest frequency group."
    marks: 1
    hints:
      - level: 1
        text: "Look for the BIGGEST frequency. If two groups tie, BOTH are modal classes."

  # --- 12.1.5 Choosing Best Measure (Outliers) ---
  - id: Q4
    text: "A company records salaries (RM): 2000, 2200, 2100, 2500, 12000. Which measure best represents the data? Justify."
    difficulty: hard
    learning_objective: "12.1.5"
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: "Median, because the extreme value (12000) distorts the mean."
      working: |
        Identify outlier: 12000
        Mean becomes skewed upward
        Median remains stable representation
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct selection of median."
      - marks: 1
        criteria: "Justification referencing outlier effect."
    hints:
      - level: 1
        text: "One value is a GIANT. Which measure gets pulled by giants, and which stays in the middle?"

  # --- 12.1.7 KBAT Reasoning (Decision Making) ---
  - id: Q5
    text: "Two players have the same mean score of 150. Player A has range 40, Player B has range 120. Who is more consistent and should be selected? Explain."
    difficulty: hard
    learning_objective: "12.1.7"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "Player A, because smaller range indicates more consistent performance."
      working: |
        Mean equal → compare consistency
        Range A < Range B
        Therefore A is more stable
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct choice of Player A."
      - marks: 1
        criteria: "Explanation using consistency/range."
    hints:
      - level: 1
        text: "Same average? Then look at spread. Who is more stable: tight scores or wild swings?"