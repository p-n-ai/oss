topic_id: MT2-12
provenance: ai-generated

questions:
  # Learning Objective: 12.1.1
  - id: Q1
    text: "Diberikan set data: 4, 8, 6, 9, 7, 8, 5. Tentukan mod, min dan median bagi set data ini."
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "Mod: 8, Min: 6.71, Median: 7"
      working: |
        Mod adalah nilai yang paling kerap muncul, iaitu 8.
        Min dikira dengan jumlah semua nilai dibahagi dengan bilangan nilai: (4+8+6+9+7+8+5)/7 = 6.71.
        Setelah menyusun data sebagai 4, 5, 6, 7, 8, 8, 9, median adalah nilai tengah, iaitu 7.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan mod dengan betul."
      - marks: 1
        criteria: "Menentukan min dengan betul."
      - marks: 1
        criteria: "Menentukan median dengan betul."
    hints:
      - level: 1
        text: "Mod adalah nilai yang paling kerap muncul dalam set data."

  # Learning Objective: 12.1.2
  - id: Q2
    text: "Bagaimana perubahan satu nilai ekstrem dalam set data berikut boleh mempengaruhi nilai min dan median? Diberikan set data asal: 3, 5, 7, 8, 9."
    difficulty: medium
    learning_objective: LO2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Penambahan nilai ekstrem seperti 20 akan meningkatkan min tetapi tidak mempengaruhi median jika data asal mempunyai bilangan ganjil."
      working: |
        Min asal adalah (3+5+7+8+9)/5 = 6.4.
        Jika tambah nilai ekstrem 20, min baru ialah (3+5+7+8+9+20)/6 = 8.67.
        Median asal ialah 7, dan dengan penambahan nilai ekstrem, median masih kekal 7.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menjelaskan kesan pada min dengan betul."
      - marks: 1
        criteria: "Menjelaskan kesan pada median dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Median tidak dipengaruhi oleh nilai ekstrem jika bilangan nilai ganjil."

  # Learning Objective: 12.1.3
  - id: Q3
    text: "Kumpulkan data berikut ke dalam jadual kekerapan: 2, 3, 3, 4, 4, 4, 5, 5."
    difficulty: medium
    learning_objective: LO3
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Nilai: 2, 3, 4, 5; Kekerapan: 1, 2, 3, 2"
      working: |
        Nilai 2 muncul 1 kali, nilai 3 muncul 2 kali, nilai 4 muncul 3 kali, dan nilai 5 muncul 2 kali.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menyenaraikan nilai dengan betul."
      - marks: 1
        criteria: "Menyenaraikan kekerapan dengan betul."
    hints:
      - level: 1
        text: "Susun data dari nilai terkecil ke terbesar sebelum mengira kekerapan."

  # Learning Objective: 12.1.4
  - id: Q4
    text: "Diberikan jadual kekerapan berikut, tentukan kelas mod dan min: Kelas 10-20, 21-30, 31-40; Kekerapan: 3, 6, 4."
    difficulty: medium
    learning_objective: LO4
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "Kelas mod: 21-30, Min: 25.5"
      working: |
        Kelas mod adalah kelas dengan kekerapan tertinggi, iaitu 21-30.
        Min dikira dengan (10+20)/2 * 3 + (21+30)/2 * 6 + (31+40)/2 * 4 / 13.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan kelas mod dengan betul."
      - marks: 2
        criteria: "Mengira min dengan betul."
    hints:
      - level: 1
        text: "Kelas mod adalah kelas dengan kekerapan tertinggi."

  # Learning Objective: 12.1.5
  - id: Q5
    text: "Set data berikut mempunyai nilai ekstrem. Apakah sukatan kecenderungan memusat yang paling sesuai untuk menggambarkan set data ini: 1, 2, 2, 2, 100?"
    difficulty: medium
    learning_objective: LO5
    tp_level: 4
    kbat: true
    answer:
      type: multiple_choice
      value: "A"
      options:
        - "A: Median"
        - "B: Min"
        - "C: Mod"
      working: |
        Median adalah pilihan terbaik kerana ia tidak dipengaruhi oleh nilai ekstrem seperti min, dan mod kurang sesuai kerana ia hanya menunjukkan nilai paling kerap.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Memilih sukatan kecenderungan memusat yang sesuai."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Nilai ekstrem mempengaruhi min lebih daripada median."