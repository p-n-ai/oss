performance_standards:
  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of translation, reflection and rotation."
  - level: 2
    descriptor_en: "Demonstrate the understanding of translation, reflection and rotation."
  - level: 3
    descriptor_en: "Apply the understanding of transformations to perform simple tasks."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of transformations in simple routine problem solving."
  - level: 5
