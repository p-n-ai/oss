prerequisites:
  required:
    - "MT1-Coordinates"
    - "MT1-Polygons"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce transformations and one-to-one correspondence (15 minutes)"
    - "Step 2: Explore translation using vectors and grids (20 minutes)"
    - "Step 3: Investigate reflection using mirrors and axes (20 minutes)"
    - "Step 4: Understand rotation with centre, angle, and direction (20 minutes)"
    - "Step 5: Connect transformations to isometry and congruence (15 minutes)"
    - "Step 6: Determine rotational symmetry and its order (15 minutes)"
  common_misconceptions:
    - misconception: "Students think transformations change the size of objects."
      remediation: "Emphasise that isometric transformations preserve distance and size."
    - misconception: "Students confuse clockwise and anticlockwise rotation."
      remediation: "Use clock-face visualisation to reinforce direction."
    - misconception: "Students mix up object and image."
      remediation: "Label original as object and transformed figure as image consistently."
  engagement_hooks:
    - "Use batik patterns to identify translations and reflections."
    - "Ask students to create logos using transformations."
    - "Use mirror activities in class to demonstrate reflection."

quality_level: 3
