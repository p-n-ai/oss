topic_id: MT2-10
provenance: ai-assisted
questions:
  - id: Q1
    text: "Define the term 'Gradient' in the context of a straight line and state the ratio used to calculate it."
    difficulty: easy
    learning_objective: "10.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: free_text
      value: "Gradient is the degree of steepness. It is the ratio of vertical distance to horizontal distance."
      working: |
        Gradient describes how steep a line is.
        Formula: Gradient = Vertical Distance / Horizontal Distance.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct definition of gradient."
      - marks: 1
        criteria: "Correct ratio stated."
    hints:
      - level: 1
        text: "Think about how 'steep' something is — height compared to width."

  - id: Q2
    text: "Which of the following correctly represents the formula for gradient?"
    difficulty: easy
    learning_objective: "10.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "A"
      options:
        A: "$m = \\frac{y_2 - y_1}{x_2 - x_1}$"
        B: "$m = \\frac{x_2 - x_1}{y_2 - y_1}$"
        C: "$m = y_2 - x_1$"
        D: "$m = x_2 - y_1$"
      working: |
        Gradient is change in y over change in x.
        So the correct formula is (y₂ - y₁)/(x₂ - x₁).
      distractors:
        - value: "B"
          feedback: "You reversed the ratio. Gradient is vertical over horizontal, not the other way around."
        - value: "C"
          feedback: "This is not a ratio. Gradient requires division."
        - value: "D"
          feedback: "You mixed coordinates incorrectly. Use y-values together and x-values together."
    marks: 2
    hints:
      - level: 1
        text: "Remember: vertical change is y, horizontal change is x."

  - id: Q3
    text: "Match each type of line with its gradient."
    difficulty: medium
    learning_objective: "10.1.3"
    tp_level: 3
    kbat: false
    answer:
      type: structured
      value: |
        Positive slope → Line rises to the right
        Negative slope → Line falls to the right
        Zero slope → Horizontal line
        Undefined slope → Vertical line
      working: |
        Positive = upward right
        Negative = downward right
        Zero = flat
        Undefined = vertical
    marks: 4
    rubric:
      - marks: 4
        criteria: "All matches correct."
    hints:
      - level: 1
        text: "Imagine walking along the graph from left to right."

  - id: Q4
    text: "Calculate the gradient of the straight line passing through points P(-3, 4) and Q(2, -1)."
    difficulty: medium
    learning_objective: "10.1.4"
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "-1"
      working: |
        m = (y₂ - y₁)/(x₂ - x₁)
        = (-1 - 4)/(2 - (-3))
        = -5/5 = -1
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct substitution."
      - marks: 1
        criteria: "Correct final answer."
    hints:
      - level: 1
        text: "Be careful with negative numbers when subtracting."

  - id: Q5
    text: "The y-intercept is 6 and the x-intercept is -3. Find the gradient."
    difficulty: medium
    learning_objective: "10.1.4"
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "2"
      working: |
        m = -(y-intercept / x-intercept)
        = -(6 / -3)
        = 2
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct formula used."
      - marks: 1
        criteria: "Correct substitution."
      - marks: 1
        criteria: "Correct answer."
    hints:
      - level: 1
        text: "Don't forget the negative sign outside the fraction."

  - id: Q6
    text: "Given that the gradient of a line through M(1, k) and N(-2, 3) is -2, find k."
    difficulty: hard
    learning_objective: "10.1.5"
    tp_level: 5
    kbat: true
    answer:
      type: exact
      value: "-3"
      working: |
        -2 = (3 - k)/(-2 - 1)
        -2 = (3 - k)/-3
        6 = 3 - k
        k = -3
    marks: 4
    rubric:
      - marks: 4
        criteria: "Correct algebraic solution."
    hints:
      - level: 1
        text: "Substitute into the gradient formula and solve step by step."

  - id: Q7
    text: "A roof has a total span of 21 m and height of 5 m. If symmetrical, calculate its gradient and explain why steeper roofs are used in heavy rainfall areas."
    difficulty: hard
    learning_objective: "10.1.5"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "Gradient ≈ 0.476. Steeper roofs allow water to flow off quickly, preventing accumulation."
      working: |
        Horizontal = 21/2 = 10.5
        Gradient = 5/10.5 ≈ 0.476
        Steeper slope helps water drain faster.
    marks: 5
    rubric:
      - marks: 2
        criteria: "Correct gradient calculation."
      - marks: 3
        criteria: "Logical real-world explanation."
    hints:
      - level: 1
        text: "Use half the span for one side of the roof."