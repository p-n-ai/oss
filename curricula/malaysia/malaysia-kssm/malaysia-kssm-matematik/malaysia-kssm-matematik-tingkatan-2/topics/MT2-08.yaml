id: MT2-08
official_ref: "Bab 8"
name: "Graphs of Functions"
name_en: "Graphs of Functions"
subject_grade_id: malaysia-kssm-matematik-tingkatan-2
subject_id: malaysia-kssm-matematik
syllabus_id: malaysia-kssm
country_id: malaysia
language: en
difficulty: beginner
tier: core

content_standards:
  - id: "8.1"
    text_en: "Functions"
  - id: "8.2"
    text_en: "Graphs of Functions"

learning_objectives:
  - id: "8.1.1"
    content_standard_id: "8.1"
    text_en: "Explain the meaning of functions."
    bloom: understand

  - id: "8.1.2"
    content_standard_id: "8.1"
    text_en: "Identify functions and provide justifications based on representations including ordered pairs, tables, graphs and equations."
    bloom: analyze

  - id: "8.2.1"
    content_standard_id: "8.2"
    text_en: "Construct tables of values for linear and non-linear functions and draw graphs using a given scale."
    bloom: apply

  - id: "8.2.2"
    content_standard_id: "8.2"
    text_en: "Interpret graphs of functions."
    bloom: analyze

  - id: "8.2.3"
    content_standard_id: "8.2"
    text_en: "Solve problems involving graphs of functions including points of intersection."
    bloom: apply

performance_standards:
  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of functions."
  - level: 2
    descriptor_en: "Demonstrate the understanding of graphs of functions."
  - level: 3
    descriptor_en: "Apply the understanding of functions to construct tables and draw graphs."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of functions in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of functions in the context of complex routine problem solving."
  - level: 6
    descriptor_en: "Apply appropriate knowledge and skills of functions in the context of non-routine problem solving."

prerequisites:
  required:
    - "MT1-06"
  recommended:
    - "MT1-08"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce functions as input-output machines and relate to real-life situations (15 min)"
    - "Step 2: Identify functions using ordered pairs, tables, graphs and equations (20 min)"
    - "Step 3: Construct tables of values for different types of functions including y = ax^n (25 min)"
    - "Step 4: Plot and draw graphs accurately using scales (25 min)"
    - "Step 5: Interpret graphs and solve problems including intersection points (20 min)"

  common_misconceptions:
    - misconception: "All relations are functions."
      remediation: "Use the vertical line test to show that a function must assign only one output to each input."

    - misconception: "Functions cannot have the same output for different inputs."
      remediation: "Explain that many-to-one relationships are valid functions, but one-to-many are not."

    - misconception: "Graphs are just drawings without meaning."
      remediation: "Guide students to interpret trends, direction, and real-life meaning from graphs."

  engagement_hooks:
    - "Use BMI charts to show how weight is a function of height."
    - "Explore food delivery pricing where total cost depends on number of items."
    - "Analyze bus schedules to see how arrival time depends on departure time."

quality_level: 3
provenance: ai-assisted
ai_teaching_notes: "MT2-08.teaching.md"
assessments_file: "MT2-08.assessments.yaml"
examples_file: "MT2-08.examples.yaml"