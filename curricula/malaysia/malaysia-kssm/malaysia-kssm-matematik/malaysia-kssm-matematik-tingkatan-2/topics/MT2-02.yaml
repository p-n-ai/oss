performance_standards:
  - level: 1
    descriptor_en: "Demonstrate basic knowledge of expansion and factorisation."
  - level: 2
    descriptor_en: "Demonstrate understanding of expansion and factorisation."
  - level: 3
    descriptor_en: "Apply understanding of expansion and factorisation to perform simple tasks."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of expansion and factorisation in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of expansion and factorisation in the context of complex routine problem solving."
  - level: 6
    descriptor_en: "Apply appropriate knowledge and skills of expansion and factorisation in the context of non-routine problem solving in a creative manner."

prerequisites:
  required:
    - "MT1-05"
  recommended:
    - "MT1-01"

mastery:
  minimum_score: 0.75
  assessment_count: 5
  spaced_repetition:
    initial_interval_days: 2
    multiplier: 2.0

teaching:
  sequence:
    - "Step 1: Concept of Expansion & Expanding Two Algebraic Expressions (30 min)"
    - "Step 2: Combined Operations Involving Expansion & Problem Solving (25 min)"
    - "Step 3: Understanding Factors & Factorising Algebraic Expressions (HCF, Perfect Squares, Cross Multiplication) (40 min)"
    - "Step 4: Problem Solving Involving Factorisation & Grouping 4-Term Expressions (20 min)"
    - "Step 5: Addition, Subtraction, Multiplication & Division of Algebraic Fractions (35 min)"
  common_misconceptions:
    - misconception: "Illegal cancellation, e.g., canceling x in (x+4)/x to get 4."
      remediation: "Use 'Factor Only' rule. Cancellation is only possible for factors in brackets, never terms with +/- signs."
    - misconception: "Losing the negative sign during distribution, e.g., -(x-5) becoming -x-5."
      remediation: "Deploy 'Bracket Bodyguard'. Treat the minus as a -1 multiplier for EVERY item inside."
    - misconception: "Fake Perfect Squares: (x+3)^2 = x^2 + 9."
      remediation: "Deploy 'Rainbow Check-Back'. Always write out the twin brackets side-by-side."
  engagement_hooks:
    - "The Secret Code Hacker: Algebraic expressions are encrypted messages; factorisation is the key to decrypting them."
    - "Architecture of Floor Plans: Use expansion to calculate the total area of a modular house based on x-dimensions."

quality_level: 3
provenance: ai-assisted
ai_teaching_notes: "MT2-02.teaching.md"
assessments_file: "MT2-02.assessments.yaml"
examples_file: "MT2-02.examples.yaml"
