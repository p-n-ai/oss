  - level: 3
    descriptor_en: "Apply the understanding of speed and acceleration to perform calculations."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of speed and acceleration in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of speed and acceleration in the context of complex routine problem solving."
