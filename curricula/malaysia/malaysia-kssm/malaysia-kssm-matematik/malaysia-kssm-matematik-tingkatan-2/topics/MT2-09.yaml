prerequisites:
  required:
    - "MT1-04"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce speed as a rate using distance-time contexts and real-life examples (20 min)"
    - "Step 2: Differentiate uniform and non-uniform speed using tables and graphs (15 min)"
    - "Step 3: Perform calculations involving speed and average speed with unit conversions (25 min)"
    - "Step 4: Introduce acceleration and deceleration as rate of change of speed (20 min)"
    - "Step 5: Solve real-world problems involving motion, including multi-step and non-routine tasks (30 min)"

  common_misconceptions:
    - misconception: "Confusing speed with distance or time."
      remediation: "Reinforce the formula Speed = Distance ÷ Time using visual triangle models."
    - misconception: "Assuming average speed is the mean of speeds."
      remediation: "Emphasize that Average Speed = Total Distance ÷ Total Time."
    - misconception: "Misinterpreting deceleration as a different concept from acceleration."
      remediation: "Clarify that deceleration is negative acceleration (reduction of speed)."

  engagement_hooks:
    - "Discuss real-life speed limits and their importance in road safety."
    - "Analyze the motion of vehicles such as motorcycles or cars in daily Malaysian contexts."
    - "Explore how athletes control speed and acceleration in sports like cycling or sprinting."

quality_level: 3
provenance: ai-assisted
