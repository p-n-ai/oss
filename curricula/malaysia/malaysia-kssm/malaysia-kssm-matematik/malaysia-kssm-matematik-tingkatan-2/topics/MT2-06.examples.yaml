id: MT2-06
topic_id: MT2-06
worked_examples:
  - id: WE-01
    topic: "Geometric Properties of 3D Shapes"
    learning_objective: "6.1.1"
    difficulty: easy
    real_world_analogy: "Think of a birthday party cone hat. It has one sharp apex and a circular base."
    misconception_alert: "Students often think a sphere has vertices because of the 'north and south poles' on a globe. A vertex only exists where edges meet — a sphere has no edges at all."
    scenario: "Identify the 3D shape that has one circular base, one apex, and one curved surface."
    working: |
      Step 1: Identify key properties:
      - 1 circular base
      - 1 apex
      - 1 curved surface

      Step 2: Compare with known shapes:
      - Cylinder: 2 circular bases, no apex
      - Pyramid: polygon base, not circular
      - Cone: 1 circular base + 1 apex

      Step 3: Conclusion: The shape is a **Cone**.

  - id: WE-02
    topic: "Nets of Three-Dimensional Shapes"
    learning_objective: "6.2.1"
    difficulty: easy
    real_world_analogy: "Think of unwrapping a Milo tin label. When flattened, you see the 2D net before it becomes a cylinder."
    misconception_alert: "Students think all 3D shapes can be perfectly flattened. A sphere cannot form a true net without distortion."
    scenario: "A net consists of 2 circles and 1 rectangle. What 3D shape is formed?"
    working: |
      Step 1: Identify components:
      - 2 circles → top and bottom bases
      - 1 rectangle → curved surface

      Step 2: Imagine folding the rectangle around the circles.

      Step 3: The shape formed is a **Cylinder**.

  - id: WE-03
    topic: "Surface Area of a Cylinder"
    learning_objective: "6.3.1"
    difficulty: medium
    real_world_analogy: "Wrapping a Milo tin with gift paper — you must cover top, bottom, and curved surface."
    misconception_alert: "The 'Naked Cylinder' trap: students often forget to include BOTH circular bases in total surface area."
    scenario: "Find the total surface area of a closed cylinder with radius $7\\text{ cm}$ and height $10\\text{ cm}$. Use $\\pi = \\frac{22}{7}$."
    working: |
      Step 1: Formula:
      $A = 2\\pi r^2 + 2\\pi rh$

      Step 2: Substitute values:
      $A = 2 \\times \\frac{22}{7} \\times 7^2 + 2 \\times \\frac{22}{7} \\times 7 \\times 10$

      Step 3: Base area:
      $2 \\times \\frac{22}{7} \\times 49 = 308\\text{ cm}^2$

      Step 4: Curved surface:
      $2 \\times \\frac{22}{7} \\times 7 \\times 10 = 440\\text{ cm}^2$

      Step 5: Total:
      $308 + 440 = 748\\text{ cm}^2$

      Step 6: Final answer:
      $748\\text{ cm}^2$

  - id: WE-04
    topic: "Volume of a Cone"
    learning_objective: "6.4.2"
    difficulty: medium
    real_world_analogy: "An ice cream cone shows how much space is inside the cone shell."
    misconception_alert: "The 'Slant Height Trap': volume uses vertical height, NOT slant height."
    scenario: "Find the volume of a cone with radius $7\\text{ cm}$ and height $12\\text{ cm}$. Use $\\pi = \\frac{22}{7}$."
    working: |
      Step 1: Formula:
      $V = \\frac{1}{3}\\pi r^2 h$

      Step 2: Substitute:
      $V = \\frac{1}{3} \\times \\frac{22}{7} \\times 7^2 \\times 12$

      Step 3: Expand:
      $V = \\frac{1}{3} \\times \\frac{22}{7} \\times 49 \\times 12$

      Step 4: Simplify:
      $V = \\frac{1}{3} \\times 22 \\times 7 \\times 12$

      Step 5: Final:
      $V = 616\\text{ cm}^3$

  - id: WE-05
    topic: "Volume of Composite Solids"
    learning_objective: "6.4.3"
    difficulty: hard
    real_world_analogy: "A Nasi Lemak packet shaped like a cube base with a pyramid on top — compute each part separately."
    misconception_alert: "Students confuse which height belongs to which shape. Always separate variables for cube and pyramid clearly."
    scenario: "A solid consists of a cube of side $10\\text{ cm}$ and a pyramid on top with height $6\\text{ cm}$. Find total volume."
    working: |
      Step 1: Cube volume:
      $V_1 = 10 \\times 10 \\times 10 = 1000\\text{ cm}^3$

      Step 2: Pyramid volume:
      Base area = $10 \\times 10 = 100\\text{ cm}^2$

      $V_2 = \\frac{1}{3} \\times 100 \\times 6 = 200\\text{ cm}^3$

      Step 3: Total volume:
      $V = 1000 + 200 = 1200\\text{ cm}^3$

      Step 4: Final answer:
      $1200\\text{ cm}^3$