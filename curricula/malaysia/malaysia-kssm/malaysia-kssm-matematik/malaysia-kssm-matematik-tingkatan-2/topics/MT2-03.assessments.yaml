  - id: Q11
    # EXAM: UASA Bahagian A (OAP)
    text: "Given the formula $y = 5x + 2$, identify which variable is the subject of the formula."
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 3.1.1
    answer:
      type: exact
      value: "y"
      working: |
        The subject of a formula is the single variable isolated on one side of the equals sign with a coefficient of 1.
        In y = 5x + 2, 'y' is the subject.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly identifies y as the subject."
    hints:
      - level: 1
        text: "The subject of a formula is the letter that stands completely alone on one side of the equal sign."

  - id: Q12
    # EXAM: UASA Bahagian A (OAP)
    text: "Given $v = u + at$, calculate the value of $v$ when $u = 5$, $a = 2$, and $t = 10$."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.3
    answer:
      type: exact
      value: "25"
      working: |
        Substitute u=5, a=2, t=10 into the formula:
        v = 5 + (2)(10)
        v = 5 + 20
        v = 25
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly substitutes values."
      - marks: 1
        criteria: "Calculates the final value of 25."
    hints:
      - level: 1
        text: "Replace letters with their numbers. Remember BODMAS: do the multiplication (a * t) before the addition!"

  - id: Q13
    # EXAM: UASA Bahagian B (OPB)
    text: "Express $v$ as the subject of the formula: $w = \\frac{v - u}{3}$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "v = 3w + u"
      working: |
        Move 3 by multiplying both sides: 3w = v - u
        Move -u by adding to both sides: 3w + u = v
        v = 3w + u
    marks: 2
    rubric:
      - marks: 1
        criteria: "Multiplies by 3 to clear the denominator."
      - marks: 1
        criteria: "Accurately isolates v. Accept v = u + 3w."
    hints:
      - level: 1
        text: "Clear the fraction first by multiplying the 3 to the other side."

  - id: Q14
    # EXAM: UASA Bahagian C (Subjektif)
    text: "Given $p = q + pr$, express $p$ in terms of $q$ and $r$."
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "p = \\frac{q}{1 - r}"
      working: |
        Move all 'p' terms to one side:
        p - pr = q
        Factorise 'p' as a common factor:
        p(1 - r) = q
        Divide by the bracket to isolate p:
        p = q / (1 - r)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Groups the 'p' terms on one side."
      - marks: 1
        criteria: "Factorises 'p' successfully: p(1 - r)."
      - marks: 1
        criteria: "Divides to establish the final subject form."
    hints:
      - level: 1
        text: "If the target variable appears twice, move both terms to the same side and factorise it out using brackets."

  - id: Q15
    # EXAM: UASA Bahagian C (Subjektif)
    text: "The surface area of a closed cylinder is given by $A = 2\\pi j^2 + 2\\pi jt$. Express the height, $t$, as the subject of the formula."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "t = \\frac{A - 2\\pi j^2}{2\\pi j}"
      working: |
        Isolate the term with t:
        2\pi jt = A - 2\pi j^2
        Divide by 2\pi j to make t the subject:
        t = (A - 2\pi j^2) / (2\pi j)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Subtracts 2\\pi j^2 to isolate the 't' term."
      - marks: 1
        criteria: "Divides accurately by 2\\pi j."
      - marks: 1
        criteria: "Final correct expression. Accept equivalent forms like A / 2\\pi j - j."
    hints:
      - level: 1
        text: "Treat terms without 't' as constants. Move them to the other side by subtraction first."
