topic_id: MT2-03
provenance: ai-assisted
questions:
  - id: Q1
    text: "The perimeter of a rectangle is given by $P = 2l + 2w$. If $l = 7$ and $w = 4$, find $P$."
    difficulty: easy
    tp_level: 3
    kbat: false
    learning_objective: 3.1.3
    answer:
      type: exact
      value: "22"
      working: |
        Substitute l = 7 and w = 4:
        P = 2(7) + 2(4)
        P = 14 + 8
        P = 22
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct substitution into formula."
      - marks: 1
        criteria: "Correct final value of 22."
    hints:
      - level: 1
        text: "Use the 'Bubble Wrap Rule'! Replace each variable with its given value inside brackets before calculating."
  - id: Q2
    text: "Write a formula for total cost $C$ if each notebook costs RM $m$ and you buy $n$ notebooks."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.1
    answer:
      type: exact
      value: "C = mn"
      working: |
        Total cost equals unit price multiplied by quantity.
        Therefore C = m * n
        C = mn
    marks: 1
    rubric:
      - marks: 1
        criteria: "Forms the formula C = mn correctly. Accept equivalent forms like mn = C or C = nm."
    hints:
      - level: 1
        text: "Think: total cost is the price per item multiplied by the number of items."
  - id: Q3
    text: "Make $x$ the subject of the formula: $y = 3x - 8$."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "x = (y + 8) / 3"
      working: |
        y = 3x - 8
        y + 8 = 3x
        x = (y + 8) / 3
    marks: 2
    rubric:
      - marks: 1
        criteria: "Applies inverse operations correctly on both sides by adding 8."
      - marks: 1
        criteria: "Presents correct subject form for x by dividing by 3."
    hints:
      - level: 1
        text: "Use the 'Reverse BODMAS Shield'! Defeat the weakest links first (the subtraction) before tackling the multiplication."
  - id: Q4
    text: "Given the formula $L = \\pi j^2$, make $j$ the subject of the formula."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "j = \\sqrt{L / \\pi}"
      working: |
        L = \pi j^2
        j^2 = L / \pi
        j = \sqrt{L / \pi}
    marks: 3
    rubric:
      - marks: 1
        criteria: "Rearranges equation to isolate j^2 by dividing both sides by pi."
      - marks: 1
        criteria: "Applies square root to the entire opposite side."
      - marks: 1
        criteria: "States the final correct formula for j."
    hints:
      - level: 1
        text: "First isolate $j^2$ by removing $\\pi$. Then remember that the opposite of squaring is finding the square root. Beware of the Partial Root Trap!"
  - id: Q5
    text: "A taxi fare formula is $F = 4 + 1.8d$, where $F$ is fare in RM and $d$ is distance in km. If a passenger pays RM22, find the distance travelled."
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: 3.1.4
    answer:
      type: exact
      value: "10"
      working: |
        22 = 4 + 1.8d
        18 = 1.8d
        d = 18 / 1.8
        d = 10
    marks: 4
    rubric:
      - marks: 1
        criteria: "Substitutes fare value correctly into formula."
      - marks: 1
        criteria: "Rearranges equation correctly."
      - marks: 1
        criteria: "Computes d accurately."
      - marks: 1
        criteria: "States final distance in km."
    hints:
      - level: 1
        text: "Substitute the known value of F first. Then, use the Reverse BODMAS shield to isolate the term with d."
  - id: Q6
    text: "Naufal has $r$ sweets. He distributes the sweets equally to his five friends. $S$ is the number of sweets received by each of his friends. Which of the following formulae is true based on this situation?"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.1
    answer:
      type: multiple_choice
      value: "D"
      working: |
        Total sweets = r.
        Number of friends = 5.
        Sweets per friend (S) = Total sweets / Number of friends = r / 5.
      distractors:
        - value: "A"
          feedback: "This multiplies the total sweeps by 5. Distributing equally means dividing."
        - value: "B"
          feedback: "Adding friends to the sweets doesn't calculate the distribution."
        - value: "C"
          feedback: "This divides the number of friends by the sweets. It must be the item being shared divided by the people receiving it."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option D."
    hints:
      - level: 1
        text: "Distributing equally means you have to use division. Which variable represents the total amount being shared?"
  - id: Q7
    text: "Given that a rectangular field has length equals to $(2x + 3)$ m and width equals to $(y + 2)$ m. It is given that the perimeter of the field is 38 m. If $x - y = 4$, calculate the values of $x$ and $y$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.4
    answer:
      type: multiple_choice
      value: "B"
      working: |
        Perimeter = 2(Length) + 2(Width) = 38
        2(2x + 3) + 2(y + 2) = 38
        4x + 6 + 2y + 4 = 38
        4x + 2y + 10 = 38
        4x + 2y = 28 -> divide by 2 -> 2x + y = 14
        
        Simultaneous equations:
        Eq 1: 2x + y = 14
        Eq 2: x - y = 4
        Add Eq 1 and Eq 2: 3x = 18 -> x = 6
        Substitute x=6 into Eq 2: 6 - y = 4 -> y = 2.
      distractors:
        - value: "A"
          feedback: "You might have added the constants incorrectly when expanding the perimeter formula."
        - value: "C"
          feedback: "You swapped the values of x and y. Always check your answers against the original equation x - y = 4."
        - value: "D"
          feedback: "Check your algebraic expansion. Did you remember to distribute the 2 to BOTH terms inside the brackets?"
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option B."
    hints:
      - level: 1
        text: "Create an equation using the perimeter formula first. Then solve using simultaneous equations with $x - y = 4$."
  - id: Q8
    text: "Given that $20 / a^2 - c = 6b$, calculate the positive value of $a$ if $b = 5$ and $c = -2b$."
    difficulty: medium
    tp_level: 4
    kbat: false
    learning_objective: 3.1.3
    answer:
      type: multiple_choice
      value: "A"
      working: |
        If b = 5, then c = -2(5) = -10.
        Substitute into formula: 
        20 / a^2 - (-10) = 6(5)
        20 / a^2 + 10 = 30
        20 / a^2 = 20
        a^2 = 1
        a = \sqrt{1} = 1.
      distractors:
        - value: "B"
          feedback: "Make sure you calculate c = -2(5) = -10 correctly and remember the Bubble Wrap Rule: subtracting a negative makes it positive."
        - value: "C"
          feedback: "You might have moved the terms incorrectly. Remember, 20 / a^2 = 20 means a^2 = 1."
        - value: "D"
          feedback: "Check your substitution. 6b becomes 6(5) = 30."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option A."
    hints:
      - level: 1
        text: "Calculate the exact numerical value of 'c' first, then use the 'Bubble Wrap Rule' when substituting it into the main equation to avoid Sign Traps!"
  - id: Q9
    text: "Express $m$ as the subject of the formula: $n + 10m^2 = 4$."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "m = \\sqrt{(4 - n) / 10}"
      working: |
        n + 10m^2 = 4
        Subtract n from both sides:
        10m^2 = 4 - n
        Divide by 10:
        m^2 = (4 - n) / 10
        Square root both sides:
        m = \sqrt{(4 - n) / 10}
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly isolates m^2 as (4 - n) / 10."
      - marks: 1
        criteria: "Applies square root to the entire opposite side."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: When removing the square, the square root bracket must cover the ENTIRE opposite side, including the denominator!"
  - id: Q10
    text: "Given $2m \\div (\\frac{m}{3n}) = 3m - 9$. Express $m$ in terms of $n$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "m = 2n + 3"
      working: |
        Convert division to multiplication by flipping the fraction:
        2m * (3n / m) = 3m - 9
        Cancel the variable m:
        6n = 3m - 9
        Rearrange to make m the subject:
        3m = 6n + 9
        Divide by 3:
        m = 2n + 3
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly applies 'keep, change, flip' to cancel the m variables on the left."
      - marks: 1
        criteria: "Rearranges the equation to group m terms and constant terms."
      - marks: 1
        criteria: "Divides correctly to form the final subject m = 2n + 3."
    hints:
      - level: 1
        text: "Flip the fraction you are dividing by to turn it into multiplication. Notice how you can use 'Factor-Only Cancellation' on the 'm' immediately!"
  - id: Q11
    text: "Given the formula $y = 5x + 2$, identify which variable is the subject of the formula."
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 3.1.1
    answer:
      type: exact
      value: "y"
      working: |
        The subject of a formula is the single variable isolated on one side of the equals sign with a coefficient of 1. 
        In y = 5x + 2, 'y' is the subject.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly identifies y as the subject."
    hints:
      - level: 1
        text: "The 'VIP' subject of a formula is the letter that stands completely alone on one side of the equal sign with a coefficient of 1."
  - id: Q12
    text: "Given $v = u + at$, calculate the value of $v$ when $u = 5$, $a = 2$, and $t = 10$."
    difficulty: easy
    tp_level: 3
    kbat: false
    learning_objective: 3.1.3
    answer:
      type: exact
      value: "25"
      working: |
        Substitute u=5, a=2, t=10 into the formula:
        v = 5 + (2)(10)
        v = 5 + 20
        v = 25
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly substitutes values."
      - marks: 1
        criteria: "Calculates the final value of 25."
    hints:
      - level: 1
        text: "Use the 'Bubble Wrap Rule' to replace letters with their numbers in brackets. Remember BODMAS: do the multiplication before the addition!"
  - id: Q13
    text: "Express $v$ as the subject of the formula: $w = \\frac{v - u}{3}$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "v = 3w + u"
      working: |
        Move 3 by multiplying both sides:
        3w = v - u
        Move -u by adding to both sides:
        3w + u = v
        v = 3w + u
    marks: 2
    rubric:
      - marks: 1
        criteria: "Multiplies by 3 to clear the denominator."
      - marks: 1
        criteria: "Accurately isolates v. Accept v = u + 3w."
    hints:
      - level: 1
        text: "Use the 'Reverse BODMAS Shield'. Clear the fraction first by multiplying the 3 to the other side."
  - id: Q14
    text: "Given $p = q + pr$, express $p$ in terms of $q$ and $r$."
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "p = \\frac{q}{1 - r}"
      working: |
        Move all 'p' terms to one side:
        p - pr = q
        Factorise 'p' as a common factor:
        p(1 - r) = q
        Divide by the bracket to isolate p:
        p = q / (1 - r)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Groups the 'p' terms on one side."
      - marks: 1
        criteria: "Factorises 'p' successfully: p(1 - r)."
      - marks: 1
        criteria: "Divides to establish the final subject form."
    hints:
      - level: 1
        text: "Move all the terms with the target variable to the same side. Pull 'p' out, and do a 'Rainbow Check-Back' to make sure your factorisation is correct before dividing."
  - id: Q15
    text: "The surface area of a closed cylinder is given by $A = 2\\pi j^2 + 2\\pi jt$. Express the height, $t$, as the subject of the formula."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "t = \\frac{A - 2\\pi j^2}{2\\pi j}"
      working: |
        Isolate the term with t:
        2\pi jt = A - 2\pi j^2
        Divide by 2\pi j to make t the subject:
        t = (A - 2\pi j^2) / (2\pi j)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Subtracts 2\\pi j^2 to isolate the 't' term."
      - marks: 1
        criteria: "Divides accurately by 2\\pi j."
      - marks: 1
        criteria: "Final correct expression."
    hints:
      - level: 1
        text: "Treat terms without 't' as constants. Move them to the other side by subtraction first using the Reverse BODMAS shield."
