topic_id: MT2-03
provenance: ai-assisted
questions:
  - id: Q1
    text: "The perimeter of a rectangle is given by $P = 2l + 2w$. If $l = 7$ and $w = 4$, find $P$."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.3
    answer:
      type: exact
      value: "22"
      working: |
        Substitute l = 7 and w = 4:
        P = 2(7) + 2(4)
        P = 14 + 8
        P = 22
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct substitution into formula."
      - marks: 1
        criteria: "Correct final value of 22."
    hints:
      - level: 1
        text: "Replace each variable with its given value before calculating."

  - id: Q2
    text: "Write a formula for total cost $C$ if each notebook costs RMm and you buy n notebooks."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.1
    answer:
      type: exact
      value: "C = mn"
      working: |
        Total cost equals unit price multiplied by quantity.
        Therefore C = m * n
        C = mn
    marks: 1
    rubric:
      - marks: 1
        criteria: "Forms the formula C = mn correctly. Accept equivalent forms like mn = C or C = nm."
    hints:
      - level: 1
        text: "Think: cost per item multiplied by number of items."

  - id: Q3
    text: "Make $x$ the subject of the formula: $y = 3x - 8$."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "x = (y + 8) / 3"
      working: |
        y = 3x - 8
        y + 8 = 3x
        x = (y + 8) / 3
    marks: 2
    rubric:
      - marks: 1
        criteria: "Applies inverse operations correctly on both sides by adding 8."
      - marks: 1
        criteria: "Presents correct subject form for x by dividing by 3. Accept equivalent forms like (y + 8) / 3 = x."
    hints:
      - level: 1
        text: "Undo -8 first, then undo multiplication by 3."

  - id: Q4
    text: "Given the formula $L = \\pi j^2$, make $j$ the subject of the formula."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "j = \\sqrt{L / \\pi}"
      working: |
        L = \pi j^2
        j^2 = L / \pi
        j = \sqrt{L / \pi}
    marks: 3
    rubric:
      - marks: 1
        criteria: "Rearranges equation to isolate j^2 by dividing both sides by \\pi."
      - marks: 1
        criteria: "Applies square root to the entire opposite side."
      - marks: 1
        criteria: "States the final correct formula for j. Accept equivalent reversed equation."
    hints:
      - level: 1
        text: "First isolate j^2 by removing \\pi. Then remember that the opposite of squaring is finding the square root."

  - id: Q5
    text: "A taxi fare formula is $F = 4 + 1.8d$, where $F$ is fare in RM and $d$ is distance in km. If a passenger pays RM22, find the distance travelled."
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: 3.1.4
    answer:
      type: exact
      value: "10"
      working: |
        22 = 4 + 1.8d
        18 = 1.8d
        d = 18 / 1.8
        d = 10
    marks: 4
    rubric:
      - marks: 1
        criteria: "Substitutes fare value correctly into formula."
      - marks: 1
        criteria: "Rearranges equation correctly."
      - marks: 1
        criteria: "Computes d accurately."
      - marks: 1
        criteria: "States final distance in km."
    hints:
      - level: 1
        text: "First isolate the term with d by subtracting 4 from both sides."

  ### ---------------------------------------------------------
  ### UASA NATIONAL EXAM EXEMPLARS
  ### ---------------------------------------------------------
  - id: Q6
    # EXAM: UASA Bahagian A (OAP)
    text: >-
      Naufal has r sweets. He distributes the sweets equally to his five friends.
      S is the number of sweets received by each of his friends. Which of the following
      formulae is true based on this situation?

      A) S = 5r
      B) S = 5 + r
      C) S = 5 / r
      D) S = r / 5
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 3.1.1
    answer:
      type: multiple_choice
      value: "D"
      working: |
        Total sweets = r.
        Number of friends = 5.
        Sweets per friend (S) = Total sweets / Number of friends = r / 5.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option D."
    hints:
      - level: 1
        text: "Distributing equally means you have to use division."

  - id: Q7
    # EXAM: UASA Bahagian A (OAP)
    text: >-
      Given that a rectangular field has length equals to $(2x + 3)$ m and width equals
      to $(y + 2)$ m. It is given that the perimeter of the field is 38 m.
      If $x - y = 4$, calculate the values of $x$ and $y$.

      A) x = 8, y = 4
      B) x = 6, y = 2
      C) x = 4, y = 8
      D) x = 2, y = 6
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.4
    answer:
      type: multiple_choice
      value: "B"
      working: |
        Perimeter = 2(Length) + 2(Width) = 38
        2(2x + 3) + 2(y + 2) = 38
        4x + 6 + 2y + 4 = 38
        4x + 2y + 10 = 38
        4x + 2y = 28 -> divide by 2 -> 2x + y = 14
        Simultaneous equations:
        Eq 1: 2x + y = 14
        Eq 2: x - y = 4
        Add Eq 1 and Eq 2: 3x = 18 -> x = 6
        Substitute x=6 into Eq 2: 6 - y = 4 -> y = 2.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option B."
    hints:
      - level: 1
        text: "Create an equation using the perimeter formula first. Then solve using simultaneous equations with x - y = 4."

  - id: Q8
    # EXAM: UASA Bahagian A (OAP)
    text: >-
      Given that $20 / a^2 - c = 6b$, calculate the values of $a$ if $b = 5$ and $c = -2b$.

      A) 1, -1
      B) 2, -2
      C) 3, -3
      D) 4, -4
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.3
    answer:
      type: multiple_choice
      value: "A"
      working: |
        If b = 5, then c = -2(5) = -10.
        Substitute into formula: 20 / a^2 - (-10) = 6(5)
        20 / a^2 + 10 = 30
        20 / a^2 = 20
        a^2 = 1
        a = sqrt(1) = 1 or -1.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly selects option A."
    hints:
      - level: 1
        text: "Calculate the exact numerical value of 'c' first, then substitute both 'b' and 'c' into the main equation."

  - id: Q9
    # EXAM: UASA Bahagian B (OPB)
    text: >-
      It is given that $n + 10m^2 = 4$. Complete the calculation steps in the answer
      space with the correct options to express $m$ as the subject of the formula.
      Options: $(4 - n) / 10$, $\sqrt{4 - n} / 10$, $4/10 - n$, $\sqrt{(4 - n) / 10}$
      Step 1: $m^2$ = (a)
      Step 2: $m$ = (b)
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "(a) (4 - n) / 10, (b) sqrt((4 - n) / 10)"
      working: |
        n + 10m^2 = 4
        Subtract n from both sides: 10m^2 = 4 - n
        Divide by 10: m^2 = (4 - n) / 10
        Square root both sides: m = sqrt((4 - n) / 10)
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifies Step 1 as (4 - n) / 10."
      - marks: 1
        criteria: "Correctly identifies Step 2 as sqrt((4 - n) / 10)."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: When moving the square, the square root bracket must cover the ENTIRE opposite side."

  - id: Q10
    # EXAM: UASA Bahagian C (Subjektif)
    text: >-
      Given $2m \div (m / 3n) = 3m - 9$.
      (i) Express $m$ in terms of $n$.
      (ii) Calculate the value of $m$ when $n = 12$.
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.2
    answer:
      type: exact
      value: "(i) m = 2n + 3, (ii) m = 27"
      working: |
        (i) Convert division to multiplication:
        2m * (3n / m) = 3m - 9
        Cancel m: 6n = 3m - 9
        Rearrange to make m the subject: 3m = 6n + 9
        Divide by 3: m = 2n + 3
        (ii) Substitute n = 12 into formula:
        m = 2(12) + 3 = 24 + 3 = 27.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correctly applies 'keep, change, flip' to cancel the m variables."
      - marks: 1
        criteria: "Isolates m successfully to form m = 2n + 3. Accept m = 3 + 2n or reversed equation."
      - marks: 1
        criteria: "Substitutes n = 12 correctly into the rearranged formula."
      - marks: 1
        criteria: "Calculates the correct final value of 27."
    hints:
      - level: 1
        text: "For part (i), flip the fraction you are dividing by to turn it into multiplication and cancel the 'm' on the left side first."

