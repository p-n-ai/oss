questions:
  # Learning Objective 8.1.1
  - id: Q1
    text: 'Jelaskan konsep pemodelan matematik dan berikan satu contoh kehidupan sebenar di mana pemodelan ini boleh digunakan.'
    difficulty: medium
    learning_objective: 8.1.1
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Pemodelan matematik adalah proses menggunakan matematik untuk menggambarkan, menganalisis, dan menyelesaikan masalah dunia sebenar. Contoh: Meramal pertumbuhan populasi menggunakan fungsi eksponen.'
      working: |
        1. Kenalpasti masalah dunia sebenar yang boleh dimodelkan secara matematik.
        2. Pilih jenis fungsi yang sesuai untuk model tersebut.
        3. Gunakan fungsi terpilih untuk menganalisis dan meramal hasil.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menjelaskan konsep pemodelan matematik.'
      - marks: 1
        criteria: 'Memberikan contoh kehidupan sebenar.'
      - marks: 1
        criteria: 'Menghubungkan contoh dengan pemodelan matematik.'
    hints:
      - level: 1
        text: 'Fikirkan bagaimana matematik boleh membantu menyelesaikan masalah sehari-hari.'
      - level: 2
        text: 'Apakah masalah yang memerlukan ramalan atau analisis yang tepat?'

  # Learning Objective 8.1.2
  - id: Q2
    text: 'Sebuah syarikat memerlukan model untuk meramal keuntungan masa hadapan berdasarkan keuntungan masa lalu yang meningkat secara linear. Fungsi keuntungan diberikan oleh $P(t) = 5000t + 20000$, di mana $t$ adalah masa dalam tahun. Hitung keuntungan selepas 3 tahun.'
    difficulty: medium
    learning_objective: 8.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '35000'
      working: |
        1. Gunakan fungsi $P(t) = 5000t + 20000$.
        2. Gantikan $t = 3$: $P(3) = 5000 \times 3 + 20000 = 15000 + 20000 = 35000$.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Substitusi nilai $t = 3$ ke dalam fungsi.'
      - marks: 1
        criteria: 'Mengira keuntungan dengan tepat.'
    hints:
      - level: 1
        text: 'Gantikan nilai $t$ dalam fungsi untuk mencari keuntungan.'
      - level: 2
        text: 'Pastikan untuk menyelesaikan operasi perkalian sebelum penambahan.'

  - id: Q3
    text: 'Sebuah bakteria membiak secara eksponen. Jumlah bakteria pada masa $t$ diberikan oleh fungsi $N(t) = 100 \times e^{0.3t}$. Berapakah jumlah bakteria selepas 5 jam? (Gunakan $e \approx 2.718$)'
    difficulty: medium
    learning_objective: 8.1.2
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: '448'
      working: |
        1. Gunakan fungsi $N(t) = 100 \times e^{0.3t}$.
        2. Substitusi $t = 5$: $N(5) = 100 \times e^{1.5} = 100 \times (2.718)^{1.5}$.
        3. Hitung $e^{1.5} \approx 4.4817$, jadi $N(5) \approx 100 \times 4.4817 = 448$.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Substitusi nilai $t = 5$ ke dalam fungsi.'
      - marks: 1
        criteria: 'Mengira $e^{1.5}$ dengan betul.'
      - marks: 1
        criteria: 'Mengira jumlah bakteria dengan tepat.'
    hints:
      - level: 1
        text: 'Gunakan kalkulator untuk menghitung nilai eksponen.'
      - level: 2
        text: 'Pastikan anda mengalikan hasil eksponen dengan 100.'

  - id: Q4
    text: 'Diberikan fungsi kuadratik $f(x) = x^2 - 4x + 4$. Tentukan bilakah fungsi ini mencapai nilai minimum, dan apakah nilai minimum tersebut.'
    difficulty: medium
    learning_objective: 8.1.2
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: 'Minimum pada $x = 2$, nilai minimum ialah 0.'
      working: |
        1. Fungsi kuadratik dalam bentuk $ax^2 + bx + c$ mempunyai titik minimum pada $x = -\frac{b}{2a}$.
        2. Di sini, $a = 1$, $b = -4$, jadi $x = -\frac{-4}{2 \times 1} = 2$.
        3. Substitusi $x = 2$ ke dalam fungsi: $f(2) = 2^2 - 4(2) + 4 = 0$.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menentukan $x = -\frac{b}{2a}$ dengan betul.'
      - marks: 1
        criteria: 'Substitusi $x = 2$ ke dalam fungsi.'
      - marks: 1
        criteria: 'Mengira nilai minimum dengan tepat.'
    hints:
      - level: 1
        text: 'Gunakan formula untuk mencari vertex fungsi kuadratik.'
      - level: 2
        text: 'Setelah menentukan $x$, substitusikan kembali ke dalam fungsi.'

  - id: Q5
    text: 'Seorang pelajar ingin memodelkan jumlah simpanan dalam akaun bank yang memberi faedah tahunan sebanyak 5%. Jika pelajar tersebut menyimpan RM1000 pada permulaan, modelkan persamaan yang menggambarkan nilai simpanan selepas $t$ tahun.'
    difficulty: medium
    learning_objective: 8.1.2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: '$A(t) = 1000(1.05)^t$'
      working: |
        1. Mulakan dengan jumlah awal RM1000.
        2. Faedah tahunan sebanyak 5% boleh dimodelkan sebagai pengganda 1.05.
        3. Oleh itu, nilai simpanan selepas $t$ tahun adalah $A(t) = 1000(1.05)^t$.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Kenal pasti pengganda faedah tahunan.'
      - marks: 1
        criteria: 'Menggunakan pengganda dalam persamaan eksponen.'
    hints:
      - level: 1
        text: 'Fikirkan bagaimana faedah tahunan mempengaruhi jumlah simpanan setiap tahun.'
      - level: 2
        text: 'Persamaan eksponen sering melibatkan pangkat tahun dan pengganda faedah.'