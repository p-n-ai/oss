topic_id: MT5-08
provenance: curriculum-audit
questions:
  # TP1: Demonstrate basic knowledge (8.1.1) - OAP
  - id: Q1
    text: "Which of the following is the correct first step in the mathematical modeling process?"
    difficulty: easy
    learning_objective: "8.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "Identifying and defining the problems"
      working: |
        Step 1: Refer to the 6-step modeling cycle.
        Step 2: The cycle always begins with understanding the real-world scenario.
      distractors:
        - value: "Making assumptions"
          feedback: "Assumptions come second! You cannot assume anything until you know exactly what problem you are trying to solve."
        - value: "Applying mathematics to solve problems"
          feedback: "This is Step 3. If you jump here immediately, your math might not fit the real-world context."
        - value: "Reporting the findings"
          feedback: "This is the final step (Step 6). You need a solution before you can report it!"

  # TP2: Demonstrate understanding (8.1.1) - OPB
  - id: Q2
    text: "Match the modeling component to its correct description: 
    (A) Refining the model, (B) Making assumptions.
    1. Simplifying the problem by neglecting minor factors.
    2. Modifying the model after verifying it against real-world data."
    difficulty: medium
    learning_objective: "8.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: mapping
      value: {"A": 2, "B": 1}
      working: |
        Step 1: Identify that 'Assumptions' are used to simplify.
        Step 2: Identify that 'Refining' is the act of improving the model after the first result.

  # TP3: Simple Tasks (8.1.2) - Subjective
  - id: Q3
    text: "A car consumes petrol at a constant rate. For a 405 km journey, it uses 45 liters. Formulate a linear function $y = kx$ to represent the petrol needed ($y$) for any distance ($x$)."
    difficulty: medium
    learning_objective: "8.1.2"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "y = 1/9x"
      working: |
        Step 1: Use the linear form $y = kx$.
        Step 2: Substitute $y = 45$ and $x = 405$: $45 = k(405)$.
        Step 3: Solve for $k$: $k = 45/405 = 1/9$.
        Step 4: The model is $y = \frac{1}{9}x$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct substitution of values into the linear equation."
      - marks: 1
        criteria: "Final correct simplified linear function."
    hints:
      - level: 1
        text: "Think about the 'rate.' If 405km uses 45L, how many km can you go with just 1L?"
      - level: 2
        text: "Divide the liters by the distance to find your constant 'k'."

  # TP4: Real-life Linear Context (8.1.2) - Subjective (Rice Price Scenario)
  - id: Q4
    text: "Store A sells 10kg rice for RM25.95 and is 2km away. Store B sells it for RM23.99 and is 6km away. If petrol cost is RM2.08/liter and the car rate is 17.6km/liter, determine if driving to Store B is worth it for TWO packs of rice. Show your calculation."
    difficulty: hard
    learning_objective: "8.1.2"
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Yes, it is worth it as the savings (RM3.92) is greater than the petrol cost (RM1.42), saving RM2.50."
      working: |
        Step 1: Savings = $2 \times (25.95 - 23.99) = RM3.92$.
        Step 2: Distance to B (two ways) = $6 \times 2 = 12$ km.
        Step 3: Petrol used = $12 / 17.6 = 0.341$ liters.
        Step 4: Petrol cost = $0.341 \times 2.08 = RM1.42$.
        Step 5: Net gain = $3.92 - 1.42 = RM2.50$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Calculate total savings for 2 packs."
      - marks: 1
        criteria: "Calculate total two-way distance to Store B."
      - marks: 1
        criteria: "Calculate total petrol cost for the trip."
      - marks: 1
        criteria: "Justify the decision based on net savings."
    hints:
      - level: 1
        text: "First, find out how much money you save on the rice alone. Don't forget you are buying TWO packs!"
      - level: 2
        text: "Now calculate the 'burn.' A trip to the store means going there AND coming back. How many km is that?"

  # TP5/6: Quadratic/Exponential Modeling & Refinement (8.1.2) - Subjective
  - id: Q5
    text: "A hydrologist models a river depth using $y = -0.0136x^2 + 0.408x$. If the actual measured depth at 15m from the bank is 3.5m, but the model predicts 3.06m, what is the next step in the modeling process? Suggest one way to refine this model."
    difficulty: hard
    learning_objective: "8.1.2"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "The next step is 'Refining the mathematical model.' One can refine it by taking more data points or considering a different function if the riverbed is not a perfect parabola."
      working: |
        Step 1: Compare predicted (3.06m) vs actual (3.5m).
        Step 2: Identify the need for improvement because the error is significant.
        Step 3: State the component 'Refining' and provide a logical refinement strategy.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identify the next step as 'Refining the model'."
      - marks: 2
        criteria: "Provide a valid justification/method for refinement (e.g., more data, changing assumptions)."
    hints:
      - level: 1
        text: "Look at the 6-step cycle. If the 'Verification' shows the answer is not accurate enough, where do you go back to?"
      - level: 2
        text: "Think about the river. Is a perfect U-shape realistic for every part of the river? How could you make the math more complex to match reality?"