  # Learning Objective 3.1.1
  - id: Q1
    text: 'Jelaskan maksud risiko dan mengapa perlindungan insurans penting dalam kehidupan seharian.'
    difficulty: medium
    learning_objective: 3.1.1
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Risiko adalah kemungkinan berlakunya kejadian yang tidak diingini yang boleh menyebabkan kerugian. Perlindungan insurans penting untuk melindungi diri dan aset daripada kerugian kewangan akibat risiko tersebut.'
      working: |
        1. Definisi Risiko: Kemungkinan berlakunya kejadian tidak diingini.
        2. Kepentingan Insurans: Melindungi daripada kerugian kewangan akibat risiko.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menjelaskan maksud risiko.'
      - marks: 2
        criteria: 'Menghuraikan kepentingan perlindungan insurans.'
    hints:
      - level: 1
        text: 'Fikirkan tentang peristiwa yang tidak dijangka dan kesannya ke atas kewangan.'

