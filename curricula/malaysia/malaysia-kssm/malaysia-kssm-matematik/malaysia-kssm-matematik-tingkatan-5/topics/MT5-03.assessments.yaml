  # Learning Objective 3.1.2
  - id: Q3
    text: 'Kira jumlah premium tahunan jika kadar premium insurans ialah 2.5% daripada nilai insurans RM200,000.'
    difficulty: medium
    learning_objective: 3.1.2
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: 'RM5000'
      working: |
        1. Kadar premium = 2.5%
        2. Nilai insurans = RM200,000
        3. Premium tahunan = 2.5% x RM200,000 = RM5,000
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menulis formula untuk mengira premium.'
      - marks: 2
        criteria: 'Mengira jumlah premium dengan betul.'
    hints:
      - level: 1
        text: 'Gunakan formula kadar x nilai untuk mencari jumlah premium.'

  # Learning Objective 3.1.2
  - id: Q4
    text: 'Nyatakan perbezaan antara premium dan deduktibel dalam insurans.'
    difficulty: medium
    learning_objective: 3.1.2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Premium adalah bayaran berkala yang dibayar untuk mendapatkan perlindungan insurans. Deduktibel adalah jumlah yang perlu dibayar sendiri oleh pemegang polisi sebelum insurans mula membayar tuntutan.'
      working: |
        1. Premium: Bayaran berkala untuk perlindungan.
        2. Deduktibel: Jumlah dibayar sebelum tuntutan insurans.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menjelaskan maksud premium.'
      - marks: 2
        criteria: 'Menjelaskan maksud deduktibel.'
    hints:
      - level: 1
        text: 'Pertimbangkan premium sebagai kos untuk mendapatkan insurans dan deduktibel sebagai kos apabila membuat tuntutan.'

  # Learning Objective 3.1.3
  - id: Q5
    text: 'Seorang pemegang polisi mempunyai insurans kesihatan dengan deduktibel RM1000 dan ko-insurans 20%. Jika bil perubatan adalah RM5000, berapakah jumlah yang perlu dibayar oleh pemegang polisi?'
    difficulty: medium
    learning_objective: 3.1.3
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: 'RM1800'
      working: |
        1. Deduktibel: RM1000
        2. Bil perubatan: RM5000
        3. Jumlah selepas deduktibel: RM5000 - RM1000 = RM4000
        4. Bahagian ko-insurans (20%): 0.20 x RM4000 = RM800
        5. Jumlah yang perlu dibayar: RM1000 + RM800 = RM1800
    marks: 4
    rubric:
      - marks: 1
        criteria: 'Mengira jumlah bil selepas deduktibel.'
      - marks: 2
        criteria: 'Mengira bahagian ko-insurans.'
      - marks: 1
        criteria: 'Menjumlahkan deduktibel dan ko-insurans.'
    hints:
      - level: 1
        text: 'MISCONCEPTION ALERT: Deduktibel dibayar dahulu sebelum mengira ko-insurans.'