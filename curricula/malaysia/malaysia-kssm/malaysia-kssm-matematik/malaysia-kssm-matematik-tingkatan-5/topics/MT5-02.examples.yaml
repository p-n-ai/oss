description: "Worked examples for Matriks"
worked_examples:
  - id: WE-01
    topic: "Mewakilkan maklumat dalam bentuk matriks"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "2.1.1 (apply): Mewakilkan maklumat situasi sebenar dalam bentuk matriks."
    real_world_analogy: "Mengatur susunan meja di dalam kelas mengikut baris dan lajur."
    misconception_alert: "Kesalahan biasa ialah menukar baris dengan lajur dalam matriks."
    scenario: "Seorang guru ingin mewakili bilangan pelajar dalam tiga kelas yang berbeza pada hari Isnin dan Selasa. Kelas A mempunyai 20 pelajar pada hari Isnin dan 18 pelajar pada hari Selasa, Kelas B mempunyai 22 dan 21 pelajar, manakala Kelas C mempunyai 19 dan 20 pelajar."
    working: |
      Step 1: Kenal pasti maklumat yang diberikan dalam bentuk baris dan lajur.
      Step 2: Baris mewakili kelas, manakala lajur mewakili hari.
      Step 3: Bentukkan matriks 3x2:
              \[
              \begin{bmatrix}
              20 & 18 \\
              22 & 21 \\
              19 & 20
              \end{bmatrix}
              \]

  - id: WE-02
    topic: "Menambah dan menolak matriks"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: "2.2.1 (apply): Menambah dan menolak matriks."
    real_world_analogy: "Menggabungkan dua kumpulan data seperti jumlah barang di dua kedai."
    misconception_alert: "Pelajar sering salah dalam mengira elemen yang sama kedudukan dalam kedua-dua matriks."
    scenario: "Kedai X dan Y menjual tiga jenis buah-buahan: epal, oren, dan pisang. Kedai X menjual 30 epal, 45 oren, dan 25 pisang. Kedai Y menjual 20 epal, 35 oren, dan 30 pisang. Berapa jumlah buah yang dijual oleh kedua-dua kedai?"
    working: |
      Step 1: Wakilkan jumlah jualan buah oleh Kedai X dan Y dalam matriks masing-masing:
              \[
              \text{Kedai X:} \begin{bmatrix} 30 \\ 45 \\ 25 \end{bmatrix}, \quad \text{Kedai Y:} \begin{bmatrix} 20 \\ 35 \\ 30 \end{bmatrix}
              \]
      Step 2: Tambahkan matriks kedua-dua kedai:
              \[
              \begin{bmatrix} 30 \\ 45 \\ 25 \end{bmatrix} + \begin{bmatrix} 20 \\ 35 \\ 30 \end{bmatrix} = \begin{bmatrix} 50 \\ 80 \\ 55 \end{bmatrix}
              \]
      Step 3: Jumlah buah yang dijual oleh kedua-dua kedai ialah 50 epal, 80 oren, dan 55 pisang.

  - id: WE-03
    topic: "Mendarab dua matriks"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: "2.2.3 (apply): Mendarab dua matriks."
    real_world_analogy: "Mengira kos keseluruhan dengan mendarabkan harga dan kuantiti barang."
    misconception_alert: "Kesalahan umum ialah tidak mematuhi peraturan darab matriks: bilangan lajur matriks pertama mesti sama dengan bilangan baris matriks kedua."
    scenario: "Pengedar mempunyai dua produk, A dan B, dan dua pelanggan, X dan Y. Harga produk A ialah RM10 dan produk B ialah RM15. Pelanggan X membeli 3 unit A dan 1 unit B, manakala pelanggan Y membeli 2 unit A dan 4 unit B. Hitung jumlah jualan."
    working: |
      Step 1: Wakilkan harga dan kuantiti dalam bentuk matriks:
              \[
              \text{Harga:} \begin{bmatrix} 10 & 15 \end{bmatrix}, \quad \text{Kuantiti:} \begin{bmatrix} 3 & 2 \\ 1 & 4 \end{bmatrix}
              \]
      Step 2: Darabkan matriks harga dengan matriks kuantiti:
              \[
              \begin{bmatrix} 10 & 15 \end{bmatrix} \times \begin{bmatrix} 3 & 2 \\ 1 & 4 \end{bmatrix} = \begin{bmatrix} (10 \times 3 + 15 \times 1) & (10 \times 2 + 15 \times 4) \end{bmatrix}
              \]
      Step 3: Selesaikan pengiraan:
              \[
              = \begin{bmatrix} 30 + 15 & 20 + 60 \end{bmatrix} = \begin{bmatrix} 45 & 80 \end{bmatrix}
              \]
      Step 4: Jumlah jualan kepada pelanggan X ialah RM45 dan kepada pelanggan Y ialah RM80.