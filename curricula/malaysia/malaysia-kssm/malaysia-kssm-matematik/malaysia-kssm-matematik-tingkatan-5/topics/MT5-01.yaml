teaching:
  sequence:
    - "Step 1: Introduce direct variation with real-life proportional contexts such as ingredient scaling and pay-by-hour situations (15 min)"
    - "Step 2: Derive and interpret direct and joint variation equations by identifying the constant of variation k (20 min)"
    - "Step 3: Contrast inverse variation with direct variation using speed-time and seesaw balancing contexts (20 min)"
    - "Step 4: Synthesize combined variation relationships and solve multi-step routine and non-routine problems (25 min)"
  common_misconceptions:
    - misconception: "Assuming every linear relation of the form y = mx + c is a direct variation."
      remediation: "Highlight that direct variation must have the form y = kx and pass through the origin."
    - misconception: "Treating inverse variation as a negative linear relationship."
      remediation: "Use tables and graphs to show that inverse variation forms a reciprocal pattern, not a straight line."
    - misconception: "Forgetting to determine the constant of variation before substituting new values."
      remediation: "Enforce a three-step protocol: write the variation relation, solve for k, then calculate the target value."
  engagement_hooks:
    - "Discuss how a chef scales ingredients for 10 guests versus 100 guests to model direct variation."
    - "Explore how two people balance a seesaw by changing their weights and distances to model inverse variation."
    - "Analyze how fuel use can depend on more than one factor, such as distance and load, to introduce combined variation."

