teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Percukaian dan tujuannya (DSKP 4.1.1) - 15 min"
    - "Langkah 2: Meneroka pelbagai jenis cukai (Pendapatan, Jalan, Pintu, Tanah, Jualan/Perkhidmatan) serta kesan Pengelakan Cukai (DSKP 4.1.2) - 20 min"
    - "Langkah 3: Pengiraan cukai langkah demi langkah termasuk pelepasan cukai, rebat, dan PCB (DSKP 4.1.3) - 30 min"
    - "Langkah 4: Penyelesaian masalah senario percukaian yang kompleks dan projek mini (DSKP 4.1.4) - 25 min"
  
  common_misconceptions:
    - misconception: "Pelajar menganggap cukai adalah denda atau derma pilihan."
      remediation: "Tekankan bahawa cukai adalah wajib dan digunakan untuk membiayai infrastruktur awam seperti sekolah dan hospital."
    - misconception: "Keliru antara pelepasan cukai dan rebat cukai."
      remediation: "Jelaskan bahawa pelepasan ditolak daripada pendapatan bercukai, manakala rebat ditolak daripada jumlah cukai yang perlu dibayar."
    - misconception: "Menganggap pengelakan cukai adalah kesalahan kecil."
      remediation: "Tunjukkan penalti undang-undang dan denda khusus di bawah Akta Cukai Pendapatan dan Akta Pengangkutan Jalan."

  engagement_hooks:
    - "Bincangkan bagaimana cukai membiayai jalan raya yang digunakan pelajar untuk ke sekolah hari ini."
    - "Analisis bil elektrik sebenar untuk mengenal pasti caj cukai perkhidmatan 6%."
    - "Bandingkan senario taksiran cukai bersama berbanding taksiran berasingan untuk pasangan suami isteri."

