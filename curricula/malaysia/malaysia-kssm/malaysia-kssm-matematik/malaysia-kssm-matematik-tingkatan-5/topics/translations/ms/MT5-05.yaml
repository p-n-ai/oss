teaching:
  sequence:
    - "Langkah 1: Teroka kekongruenan menggunakan 'Mobilisasi Minda 1' dan '2' untuk membezakan bentuk dan segi tiga (25 min)"
    - "Langkah 2: Perkenalkan keserupaan geometri dan pembesaran melalui 'Mobilisasi Minda 3' dan '4' (30 min)"
    - "Langkah 3: Terbitkan dan sahkan hubungan luas-faktor skala (Luas imej = k² × Luas objek) (20 min)"
    - "Langkah 4: Laksanakan gabungan transformasi AB (B diikuti oleh A) dan uji Sifat Kalis Tukar Tertib (30 min)"
    - "Langkah 5: Takrifkan teselasi dan reka corak menggunakan transformasi isometri (Translasi, Putaran, Pantulan) (25 min)"
  common_misconceptions:
    - misconception: "Keliru antara kekongruenan dan keserupaan."
      remediation: "Tekankan bahawa bentuk kongruen mesti mempunyai saiz yang sama, manakala bentuk serupa hanya memerlukan sisi yang berkadaran."
    - misconception: "Menganggap sudut bertambah semasa pembesaran."
      remediation: "Tunjukkan bahawa walaupun panjang sisi berubah, sudut yang sepadan kekal tidak berubah (invariant)."
    - misconception: "Menggunakan tertib yang salah dalam gabungan transformasi."
      remediation: "Tegaskan peraturan 'Abjad Terbalik': Transformasi AB bermaksud transformasi B dilakukan dahulu."
  engagement_hooks:
    - "Perhatikan struktur Jambatan Angkat Terengganu untuk mengenal pasti komponen kongruen dalam kejuruteraan."
    - "Reka logo digital menggunakan gabungan transformasi dalam GeoGebra, serupa dengan aktiviti 'Terokai Matematik'."
    - "Analisis teselasi gaya Escher dalam rekaan Batik tradisional Malaysia."
