    - "Langkah 4: Sintesis hubungan ubahan bergabung dan selesaikan masalah rutin dan bukan rutin pelbagai langkah (25 min)"
  common_misconceptions:
    - misconception: "Menganggap setiap hubungan linear berbentuk y = mx + c ialah ubahan langsung."
      remediation: "Tekankan bahawa ubahan langsung mesti berbentuk y = kx dan melalui titik asalan."
    - misconception: "Menganggap ubahan songsang sebagai hubungan linear negatif."
      remediation: "Gunakan jadual dan graf untuk menunjukkan bahawa ubahan songsang membentuk corak salingan, bukannya garis lurus."
    - misconception: "Terlupa menentukan pemalar ubahan sebelum menggantikan nilai baharu."
      remediation: "Kuatkuasakan protokol tiga langkah: tulis hubungan ubahan, cari nilai k, kemudian hitung nilai sasaran."
  engagement_hooks:
    - "Bincangkan bagaimana seorang cef menskalakan ramuan untuk 10 orang tetamu berbanding 100 orang bagi memodelkan ubahan langsung."
    - "Terokai bagaimana dua orang mengimbangi jongkang-jongket dengan mengubah berat dan jarak untuk memodelkan ubahan songsang."
    - "Analisis bagaimana penggunaan bahan api boleh bergantung pada lebih daripada satu faktor, seperti jarak dan beban, untuk memperkenalkan ubahan bergabung."

