topic_id: MT5-07
provenance: "kssm-textbook-aligned"
description: "Contoh kerja berperingkat untuk Sukatan Serakan Data Terkumpul."
worked_examples:
  - id: WE-01
    topic: "Membina Histogram dan Poligon Kekerapan"
    difficulty: easy
    learning_objective: "7.1.1"
    tp_level: 2
    kbat: false
    real_world_analogy: "Bayangkan sebuah 'Stesen Gred Durian'. Anda tidak akan menimbang setiap biji durian secara individu untuk laporan; anda mengumpulnya ke dalam bakul 1kg–2kg, 2kg–3kg, dan seterusnya untuk melihat kategori berat mana yang paling banyak."
    misconception_alert: "Perangkap Ruang! Murid sering menggunakan had kelas (cth: 10-14, 15-19) pada paksi-x, menyebabkan ada ruang antara palang. Sentiasa gunakan Sempadan Atas dan Bawah (cth: 9.5, 14.5, 19.5) supaya palang menjadi 'bestie' — bersentuhan tanpa ruang."
    scenario: "Data berikut menunjukkan ketinggian (cm) bagi 20 orang murid dalam kelas silat. Bina jadual kekerapan dengan selang kelas 5 cm bermula dari $145 - 149$, kemudian lukis histogram untuk mewakili data tersebut: $153, 168, 163, 157, 158, 161, 165, 162, 145, 150, 158, 156, 166, 163, 152, 155, 158, 173, 148, 164$."
    working: |
      1. Tentukan bilangan dan saiz kelas: Julat adalah $173 - 145 = 28$. Dengan saiz kelas 5, kita dapat selang: $145-149, 150-154, 155-159, 160-164, 165-169, 170-174$.
      2. Cari Sempadan Kelas untuk paksi-x:
         - Untuk $145-149$: Sempadan Bawah = $144.5$, Sempadan Atas = $149.5$.
         - Untuk $150-154$: Sempadan Bawah = $149.5$, Sempadan Atas = $154.5$.
      3. Hitung Kekerapan ($f$):
         - $145-149: 2$
         - $150-154: 3$
         - $155-159: 6$
         - $160-164: 5$
         - $165-169: 3$
         - $170-174: 1$
      4. Plot Histogram: paksi-x = Sempadan ($144.5, 149.5...$), paksi-y = Bilangan murid ($2, 3, 6...$).
      5. Lukis palang: Tinggi palang mengikut kekerapan, lebar mengikut saiz kelas (5).

  - id: WE-02
    topic: "Membina Ogif dan Mencari Kuartil"
    difficulty: medium
    learning_objective: "7.1.3"
    tp_level: 3
    kbat: false
    real_world_analogy: "Mendaki 'Bukit Longgokan'. Semasa anda berjalan melalui selang kelas, anda terus menambah bilangan orang yang telah anda lalui. Ogif menunjukkan berapa ramai orang yang berada 'di bawah' tahap tertentu pada bila-bila masa."
    misconception_alert: "Ogif Terapung! Jika anda tidak memulakan lengkung anda pada Sempadan Bawah kelas pertama dengan kekerapan longgokan $0$, graf anda akan kelihatan seperti terapung di udara. Sentiasa bermula dari 'tanah' ($0$)."
    scenario: "Sebuah pesta makanan merekodkan kandungan garam (mg) bagi 60 jenis snek. Berdasarkan jadual kekerapan (100-149: 4, 150-199: 11, 200-249: 15, 250-299: 21, 300-349: 8, 350-399: 1), bina satu ogif dan tentukan Julat Antara Kuartil."
    working: |
      1. Tambah 'kelas permulaan' dengan kekerapan 0: $50-99 (f=0)$.
      2. Hitung Kekerapan Longgokan ($cf$):
         - $99.5: 0$
         - $149.5: 4$
         - $199.5: 4+11=15$
         - $249.5: 15+15=30$
         - $299.5: 30+21=51$
         - $349.5: 51+8=59$
         - $399.5: 59+1=60$
      3. Plot Ogif: paksi-x = Sempadan Atas, paksi-y = $cf$.
      4. Cari $Q_1$ (Kedudukan $1/4 \times 60 = 15$): Dari $y=15$, gerak mendatar ke lengkung, kemudian turun ke paksi-x. $Q_1 = 199.5$ mg.
      5. Cari $Q_3$ (Kedudukan $3/4 \times 60 = 45$): Dari $y=45$, gerak mendatar ke lengkung, kemudian turun. $Q_3 \approx 284.5$ mg.
      6. Hitung Julat Antara Kuartil: $Q_3 - Q_1 = 284.5 - 199.5 = 85$ mg.

  - id: WE-03
    topic: "Menghitung Varians dan Sisihan Piawai"
    difficulty: hard
    learning_objective: "7.2.1"
    tp_level: 4
    kbat: false
    real_world_analogy: "Fikirkan tentang 'Semakan Ketekalan' bagi dua gerai teh tarik. Jika Gerai A menuang tepat 250ml setiap kali, Sisihan Piawainya ialah $0$ (Ketekalan sempurna). Jika Gerai B menuang 200ml kadangkala dan 300ml pada waktu lain, Sisihan Piawainya adalah tinggi (Sangat tidak tekal!)."
    misconception_alert: "Ralat 'Mesin Min'. Murid sering mengira min dengan mencari purata titik tengah sahaja. Anda MESTI mendarab setiap titik tengah ($x$) dengan kekerapannya ($f$) terlebih dahulu: $\\bar{x} = \\sum fx / \\sum f$."
    scenario: "Hitung sisihan piawai bagi penggunaan air harian (liter) bagi 100 buah keluarga di mana $\\sum f = 100$, $\\sum fx = 18{,}334$, dan $\\sum fx^2 = 3{,}425{,}133.75$."
    working: |
      1. Hitung Min ($\bar{x}$):
         $\bar{x} = \frac{\sum fx}{\sum f} = \frac{18334}{100} = 183.34$ liter.
      2. Gunakan formula Varians ($\sigma^2$):
         $\sigma^2 = \frac{\sum fx^2}{\sum f} - (\bar{x})^2$
      3. Gantikan nilai ke dalam formula:
         $\sigma^2 = \frac{3425133.75}{100} - (183.34)^2$
         $\sigma^2 = 34251.3375 - 33613.5556 = 637.7819$
      4. Hitung Sisihan Piawai ($\sigma$):
         $\sigma = \sqrt{\sigma^2} = \sqrt{637.7819} = 25.25$ liter (kepada 2 tempat perpuluhan).
      5. Kesimpulan: Purata serakan penggunaan air daripada min ialah $25.25$ liter.
