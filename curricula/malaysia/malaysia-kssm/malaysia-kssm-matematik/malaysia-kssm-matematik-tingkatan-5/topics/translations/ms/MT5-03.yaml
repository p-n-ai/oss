teaching:
  sequence:
    - "Pengenalan kepada Insurans: Bincangkan maksud risiko sebagai musibah yang tidak boleh dielakkan dan pemindahan risiko kepada organisasi (20 min)"
    - "Jenis Insurans: Bezakan antara Insurans Hayat (kematian, hilang upaya, penyakit kritikal) dan Insurans Am (motor, kebakaran, perubatan, kemalangan, perjalanan) (25 min)"
    - "Mengira Premium: Gunakan Jadual Kadar untuk mengira premium bagi insurans hayat, motor, dan perubatan (30 min)"
    - "Menyelesaikan Masalah Insurans: Menguasai aplikasi prinsip deduktibel dan ko-insurans/insurans bersama (35 min)"
  
  common_misconceptions:
    - misconception: "Insurans adalah alat pelaburan untuk mendapatkan keuntungan."
      remediation: "Tekankan prinsip indeminiti yang memastikan pemegang polisi dipulihkan kepada kedudukan kewangan asal, bukan untuk mendapat untung."
    - misconception: "Deduktibel adalah sama dengan premium."
      remediation: "Jelaskan bahawa premium adalah kos untuk perlindungan, manakala deduktibel ialah kos yang ditanggung sendiri oleh pemegang polisi sebelum membuat tuntutan."
    - misconception: "Insurans hayat melindungi semua perbelanjaan perubatan."
      remediation: "Bezakan antara insurans hayat (kematian/hilang upaya) dengan insurans perubatan dan kesihatan (kemasukan hospital/pembedahan)."

  engagement_hooks:
    - "Minta murid mengenal pasti risiko harian seperti kecederaan semasa bersukan atau kemalangan bas sekolah untuk memahami keperluan insurans."
    - "Gunakan skim perlindungan kesihatan nasional MySalam sebagai contoh inisiatif kerajaan dalam menyediakan perlindungan percuma kepada rakyat."
    - "Bincangkan senario kemalangan jalan raya untuk mengenal pasti siapa pihak pertama, kedua, dan ketiga dalam tuntutan insurans motor."

