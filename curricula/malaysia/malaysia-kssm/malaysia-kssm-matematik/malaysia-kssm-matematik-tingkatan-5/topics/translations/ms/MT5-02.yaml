teaching:
  sequence:
    - "Langkah 1: Perkenalkan matriks melalui jadual dunia sebenar seperti jualan, jadual dan rekod inventori."
    - "Langkah 2: Takrifkan peringkat matriks dan kenal pasti unsur tertentu menggunakan tatatanda baris dan lajur."
    - "Langkah 3: Tetapkan syarat kesamaan matriks dengan memadankan peringkat dan unsur sepadan."
    - "Langkah 4: Tunjukkan penambahan, penolakan dan pendaraban skalar bagi matriks."
    - "Langkah 5: Ajar pendaraban matriks menggunakan peraturan baris darab lajur serta tekankan syarat kewujudannya."
    - "Langkah 6: Teroka matriks identiti dan sifat pendarabannya."
    - "Langkah 7: Terangkan matriks songsang bagi matriks 2 x 2 dan kaitkannya dengan penyelesaian persamaan serentak."
    - "Langkah 8: Aplikasikan kaedah matriks dalam penyelesaian masalah rutin dan bukan rutin pelbagai langkah."
  common_misconceptions:
    - misconception: "Pelajar cuba menambah atau menolak matriks yang mempunyai peringkat berbeza."
      remediation: "Tekankan bahawa penambahan dan penolakan hanya boleh dilakukan apabila setiap unsur mempunyai pasangan pada kedudukan yang sama."
    - misconception: "Pelajar mendarab unsur sepadan semasa mendarab dua matriks."
      remediation: "Gunakan anak panah jejak baris-darab-lajur untuk menunjukkan bahawa pendaraban matriks tidak sama dengan penambahan."
    - misconception: "Pelajar percaya setiap matriks segi empat sama mempunyai matriks songsang."
      remediation: "Tunjukkan bahawa matriks 2 x 2 tidak mempunyai songsang apabila penentunya sama dengan sifar."
  engagement_hooks:
    - "Gunakan rekod inventori sekolah untuk menunjukkan bagaimana matriks menyusun data stok dengan pantas."
    - "Bincangkan bagaimana matriks muncul dalam kriptografi dan mesej berkod."
    - "Kaitkan matriks dengan tugasan analisis data seperti membandingkan jualan atau jadual pengangkutan."

