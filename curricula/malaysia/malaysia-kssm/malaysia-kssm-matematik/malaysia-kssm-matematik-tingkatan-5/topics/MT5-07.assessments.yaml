questions:
  # Learning Objective 7.1.1
  - id: Q1
    text: 'Bina satu histogram bagi set data terkumpul berikut: Kelas (10-20, 20-30, 30-40, 40-50) dengan kekerapan (5, 15, 10, 20).'
    difficulty: medium
    learning_objective: 7.1.1
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: 'Histogram with correct bars'
      working: |
        1. Tentukan lebar setiap kelas.
        2. Lukis paksi x dan y.
        3. Label paksi x dengan kelas data dan paksi y dengan kekerapan.
        4. Lukis bar untuk setiap kelas berdasarkan kekerapan.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menentukan lebar setiap kelas dengan betul."
      - marks: 1
        criteria: "Melukis paksi x dan y dengan betul."
      - marks: 1
        criteria: "Melabel paksi x dan y dengan betul."
      - marks: 1
        criteria: "Melukis bar berdasarkan kekerapan dengan betul."
    hints:
      - level: 1
        text: "Mulakan dengan menentukan lebar setiap kelas."
      - level: 2
        text: "Lukis paksi x dan y dan labelkan dengan kelas data dan kekerapan."
      - level: 3
        text: "Lukis bar berdasarkan kekerapan untuk setiap kelas."

  # Learning Objective 7.1.2
  - id: Q2
    text: 'Bandingkan dan tafsirkan serakan dua set data terkumpul berikut menggunakan poligon kekerapan: Set A (10-20, 30-40, 50-60) dengan kekerapan (5, 10, 15), dan Set B (10-20, 30-40, 50-60) dengan kekerapan (10, 5, 20).'
    difficulty: medium
    learning_objective: 7.1.2
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: 'Set B mempunyai lebih banyak serakan pada kelas terakhir berbanding Set A.'
      working: |
        1. Lukis poligon kekerapan untuk Set A dan Set B.
        2. Bandingkan kekerapan setiap kelas antara keduanya.
        3. Buat kesimpulan berdasarkan perbandingan.
    marks: 5
    rubric:
      - marks: 2
        criteria: "Melukis poligon kekerapan untuk Set A dengan betul."
      - marks: 2
        criteria: "Melukis poligon kekerapan untuk Set B dengan betul."
      - marks: 1
        criteria: "Membuat kesimpulan yang tepat berdasarkan perbandingan."
    hints:
      - level: 1
        text: "Lukis poligon kekerapan untuk kedua-dua set data."
      - level: 2
        text: "Bandingkan kekerapan setiap kelas antara Set A dan Set B."
      - level: 3
        text: "Perhatikan perbezaan kekerapan di kelas terakhir."

  # Learning Objective 7.1.3
  - id: Q3
    text: 'Bina ogif bagi set data terkumpul berikut dan tentukan kuartil pertama: Kelas (5-10, 10-15, 15-20, 20-25) dengan kekerapan (4, 8, 12, 16).'
    difficulty: medium
    learning_objective: 7.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '9'
      working: |
        1. Kira kekerapan terkumpul.
        2. Lukis ogif berdasarkan kekerapan terkumpul.
        3. Tentukan kuartil pertama dari ogif.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Mengira kekerapan terkumpul dengan betul."
      - marks: 1
        criteria: "Melukis ogif dengan betul."
      - marks: 2
        criteria: "Menentukan kuartil pertama dengan betul."
    hints:
      - level: 1
        text: "Mulakan dengan mengira kekerapan terkumpul."
      - level: 2
        text: "Lukis ogif menggunakan kekerapan terkumpul."
      - level: 3
        text: "Cari nilai kuartil pertama dari ogif."

  # Learning Objective 7.2.1
  - id: Q4
    text: 'Tentukan varians bagi set data terkumpul berikut: Kelas (15-25, 25-35, 35-45) dengan kekerapan (6, 14, 10).'
    difficulty: medium
    learning_objective: 7.2.1
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: '50'
      working: |
        1. Tentukan titik tengah setiap kelas.
        2. Kira purata dengan menggunakan titik tengah dan kekerapan.
        3. Kira jumlah kuasa dua perbezaan dari purata.
        4. Bahagikan dengan jumlah kekerapan untuk mendapatkan varians.
    marks: 5
    rubric:
      - marks: 1
        criteria: "Menentukan titik tengah setiap kelas dengan betul."
      - marks: 1
        criteria: "Mengira purata dengan betul."
      - marks: 2
        criteria: "Mengira jumlah kuasa dua perbezaan dari purata dengan betul."
      - marks: 1
        criteria: "Mengira varians dengan betul."
    hints:
      - level: 1
        text: "Mulakan dengan mengira titik tengah setiap kelas."
      - level: 2
        text: "Gunakan titik tengah untuk mengira purata."
      - level: 3
        text: "Kira jumlah kuasa dua perbezaan dari purata."

  # Learning Objective 7.2.2
  - id: Q5
    text: 'Bina dan tafsirkan plot kotak bagi set data terkumpul berikut: Kelas (20-30, 30-40, 40-50) dengan kekerapan (10, 20, 10).'
    difficulty: medium
    learning_objective: 7.2.2
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: 'Plot kotak menunjukkan data lebih tertumpu di sekitar kelas kedua.'
      working: |
        1. Kira nilai kuartil dan julat antara kuartil.
        2. Lukis plot kotak berdasarkan nilai yang dikira.
        3. Tafsirkan plot kotak berdasarkan kedudukan median dan hujung kotak.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Mengira nilai kuartil dengan betul."
      - marks: 1
        criteria: "Lukis plot kotak dengan betul berdasarkan nilai kuartil."
      - marks: 2
        criteria: "Mentafsir plot kotak dengan betul."
    hints:
      - level: 1
        text: "Kira nilai kuartil berdasarkan kekerapan."
      - level: 2
        text: "Gunakan nilai kuartil untuk melukis plot kotak."
      - level: 3
        text: "Perhatikan kedudukan median dan hujung kotak untuk tafsiran."