topic_id: MT5-07
provenance: ai-generated

questions:
  # Learning Objective 7.1.1
  - id: Q1
    text: "Bina histogram dan poligon kekerapan bagi data terkumpul berikut: \\( 5-9: 4, 10-14: 8, 15-19: 12, 20-24: 6 \\)."
    difficulty: medium
    learning_objective: LO1
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Histogram dan poligon kekerapan yang betul"
      working: |
        1. Plotkan histogram dengan kelas 5-9, 10-14, 15-19, dan 20-24 dengan ketinggian masing-masing 4, 8, 12, dan 6.
        2. Lukis poligon kekerapan dengan menyambungkan titik tengah setiap bar histogram.
    marks: 5
    rubric:
      - marks: 2
        criteria: "Histogram dibina dengan betul."
      - marks: 3
        criteria: "Poligon kekerapan dilukis dengan tepat."
    hints:
      - level: 1
        text: "Pastikan anda menentukan titik tengah setiap kelas untuk membina poligon kekerapan."

  # Learning Objective 7.1.2
  - id: Q2
    text: "Bandingkan dan tafsirkan dua set data terkumpul berikut menggunakan histogram: Set A: \\( 5-9: 3, 10-14: 7, 15-19: 11, 20-24: 5 \\); Set B: \\( 5-9: 4, 10-14: 6, 15-19: 9, 20-24: 8 \\)."
    difficulty: medium
    learning_objective: LO2
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Set A lebih seragam manakala Set B mempunyai serakan yang lebih besar."
      working: |
        1. Bina histogram untuk kedua-dua set.
        2. Perhatikan ketinggian bar untuk setiap kelas.
        3. Set A menunjukkan taburan yang lebih puncak manakala Set B lebih lebar.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Histogram untuk kedua-dua set dibina dengan betul."
      - marks: 2
        criteria: "Tafsiran serakan dan perbandingan antara dua set adalah tepat."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Jangan hanya melihat jumlah bar, lihat juga ketinggian dan lebar taburan."

  # Learning Objective 7.1.3
  - id: Q3
    text: "Bina ogif bagi data terkumpul berikut dan tentukan kuartil pertama, kedua, dan ketiga: \\( 0-4: 5, 5-9: 10, 10-14: 15, 15-19: 20 \\)."
    difficulty: medium
    learning_objective: LO3
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Ogif yang betul dengan Q1=5.5, Q2=10, Q3=14.5"
      working: |
        1. Kira kekerapan terkumpul.
        2. Plotkan ogif menggunakan kekerapan terkumpul.
        3. Tentukan kuartil berdasarkan ogif yang telah dibina.
    marks: 6
    rubric:
      - marks: 3
        criteria: "Ogif dibina dengan kekerapan terkumpul yang betul."
      - marks: 3
        criteria: "Kuartil pertama, kedua, dan ketiga ditentukan dengan tepat."
    hints:
      - level: 1
        text: "Untuk menentukan kuartil, cari nilai pada 25%, 50%, dan 75% jumlah kekerapan."

  # Learning Objective 7.2.1
  - id: Q4
    text: "Hitung julat, julat antara kuartil, varians, dan sisihan piawai bagi data terkumpul berikut: \\( 20-24: 5, 25-29: 8, 30-34: 12, 35-39: 10 \\)."
    difficulty: medium
    learning_objective: LO4
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Julat=19, Julat antara kuartil=10, Varians=25, Sisihan piawai=5"
      working: |
        1. Tentukan nilai maksimum dan minimum untuk julat.
        2. Tentukan kuartil pertama dan ketiga untuk julat antara kuartil.
        3. Kira varians dan sisihan piawai menggunakan formula.
    marks: 8
    rubric:
      - marks: 2
        criteria: "Julat dikira dengan betul."
      - marks: 2
        criteria: "Julat antara kuartil dikira dengan tepat."
      - marks: 2
        criteria: "Varians dikira dengan tepat."
      - marks: 2
        criteria: "Sisihan piawai dihitung dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan menggunakan nilai titik tengah untuk pengiraan varians dan sisihan piawai."

  # Learning Objective 7.2.5
  - id: Q5
    text: "Rancang dan laksanakan satu projek mini untuk mengkaji kesan waktu belajar terhadap prestasi akademik pelajar menggunakan sukatan kecenderungan memusat dan serakan. Huraikan dapatan kajian anda."
    difficulty: medium
    learning_objective: LO5
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: "Projek mini dengan analisis dan kesimpulan yang menyeluruh."
      working: |
        1. Kumpulkan data waktu belajar dan prestasi pelajar.
        2. Gunakan min, median, mod untuk analisis kecenderungan memusat.
        3. Gunakan julat, varians, sisihan piawai untuk analisis serakan.
        4. Tafsirkan dapatan dan buat kesimpulan berkenaan hubungan antara waktu belajar dan prestasi akademik.
    marks: 10
    rubric:
      - marks: 3
        criteria: "Perancangan projek yang jelas dan teratur."
      - marks: 3
        criteria: "Penggunaan sukatan kecenderungan memusat dan serakan yang tepat."
      - marks: 4
        criteria: "Tafsiran dan kesimpulan kajian yang jelas dan menyeluruh."
    hints:
      - level: 1
        text: "Fokus pada bagaimana data dapat menunjukkan tren atau pola yang berkaitan dengan prestasi akademik."