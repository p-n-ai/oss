provenance: "kssm-textbook-dskp-aligned"
questions:
  # --- 7.1 Dispersion ---
  - id: Q1
    text: "In a frequency table, if the class interval for a set of data is $150 - 154$, determine the upper boundary of this class."
    difficulty: easy
    learning_objective: "7.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "154.5"
      working: |
        Step 1: Identify the upper limit of the current class ($154$) and the lower limit of the next class ($155$).
        Step 2: Calculate the midpoint between them: $(154 + 155) / 2 = 154.5$.
      distractors:
        - value: "154.0"
          feedback: "This is the upper limit. Remember, the boundary is the midpoint between the current limit and the next class limit."
        - value: "149.5"
          feedback: "This is the lower boundary. The question asks for the upper boundary."
        - value: "155.0"
          feedback: "This is the lower limit of the subsequent class."
    marks: 1
    hints:
      - "The upper boundary is the value halfway between the end of this class and the start of the next."
      - "Look at the gap between 154 and 155. What number sits exactly in the middle?"

  - id: Q2
    text: "A set of grouped data has class midpoints at $147, 152, 157,$ and $162$. If you were to construct a frequency polygon, what are the midpoints required for the classes before and after this set to ensure the polygon starts and ends on the horizontal axis?"
    difficulty: medium
    learning_objective: "7.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: subjective
      value: "142 and 167"
      working: |
        Step 1: Determine the class size by finding the difference between consecutive midpoints: $152 - 147 = 5$.
        Step 2: Subtract the class size from the first midpoint: $147 - 5 = 142$.
        Step 3: Add the class size to the last midpoint: $162 + 5 = 167$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifying the class size as 5 units."
      - marks: 1
        criteria: "Correctly calculating both 142 and 167."
    hints:
      - "A frequency polygon must start and end with zero frequency. How many units are between each existing midpoint?"
      - "If the 'jump' between points is 5, go back one jump from 147 and forward one jump from 162."

  - id: Q3
    text: "Compare two histograms representing the test marks of Group Arif and Group Bestari. Group Arif's histogram is bell-shaped with most data at the center, while Group Bestari is uniform (flat) across all marks. Which group has a wider dispersion of marks? Justify your answer."
    difficulty: hard
    learning_objective: "7.1.2"
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Group Bestari has a wider dispersion because the frequencies are spread evenly across all classes, whereas Group Arif's data is concentrated around the mean."
      working: |
        Step 1: Analyze distribution shapes. Arif = Bell-shaped (concentrated), Bestari = Uniform (spread out).
        Step 2: Relate shape to dispersion. Concentrated data = low dispersion; spread data = high dispersion.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identifying Group Bestari as having wider dispersion."
      - marks: 2
        criteria: "Providing justification based on the uniform vs. bell-shaped distribution patterns."
    hints:
      - "Look at the 'spread' of the bars. In which graph are the marks more 'all over the place' instead of huddling in the middle?"
      - "Remember that bell-shaped means most people scored similarly. Uniform means scores were scattered across the whole range."

  - id: Q4
    text: "Match the following positions on an Ogive with their corresponding statistical measures."
    difficulty: medium
    learning_objective: "7.1.3"
    tp_level: 2
    kbat: false
    answer:
      type: opb
      value: "A-2, B-1, C-3"
      working: "A: $1/4(N)$ is Q1. B: $1/2(N)$ is Median. C: $3/4(N)$ is Q3."
      mapping:
        - "A: $1/4$ of total frequency"
        - "B: $1/2$ of total frequency"
        - "C: $3/4$ of total frequency"
      options:
        - "1: Median (Q2)"
        - "2: First Quartile (Q1)"
        - "3: Third Quartile (Q3)"
    marks: 3
    hints:
      - "Quarter (1/4) sounds like which quartile? Half (1/2) sounds like which center measure?"

  # --- 7.2 Measures of Dispersion ---
  - id: Q5
    text: "The variance ($\\sigma^2$) of a set of grouped data is calculated as $229.19$. Calculate the standard deviation ($\\sigma$) correct to two decimal places."
    difficulty: easy
    learning_objective: "7.2.1"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "15.14"
      working: |
        Step 1: Identify that Standard Deviation ($\sigma$) is the square root of Variance ($\sigma^2$).
        Step 2: $\sigma = \sqrt{229.19} = 15.13902...$
        Step 3: Round to 2 decimal places: $15.14$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct use of the square root operation."
      - marks: 1
        criteria: "Correct final value rounded to 2 decimal places."
    hints:
      - "How do you 'undo' a square ($^2$) in math? Check your calculator for the symbol."
      - "Don't forget to round carefully! Look at the third decimal digit."

  - id: Q6
    text: "In a box plot, the median line is positioned closer to the right side of the box, and the left whisker is significantly longer than the right whisker. Describe the shape of the data distribution."
    difficulty: medium
    learning_objective: "7.2.2"
    tp_level: 4
    kbat: true
    answer:
      type: multiple_choice
      value: "Left-skewed distribution"
      working: |
        Step 1: If the left whisker is longer and the median is towards the right, the data is pulled towards the lower values.
        Step 2: This represents a left-skewed (negative skew) distribution.
      distractors:
        - value: "Symmetric distribution"
          feedback: "In a symmetric distribution, the median would be in the center and whiskers would be equal length."
        - value: "Right-skewed distribution"
          feedback: "Right-skewed would have a longer right whisker and the median would be closer to the left."
        - value: "Uniform distribution"
          feedback: "Box plots don't visually represent 'uniform' frequency like histograms do; they focus on quartile spread."
    marks: 1
    hints:
      - "Whiskers show how far the data is 'stretched'. If it's stretched to the left (lower numbers), where is the skew?"

  - id: Q7
    text: "Machine P produces components with a standard deviation of $0.64$ cm, while Machine Q produces them with a standard deviation of $0.70$ cm. If both machines have the same mean diameter, which machine is more consistent in its production?"
    difficulty: medium
    learning_objective: "7.2.3"
    tp_level: 5
    kbat: true
    answer:
      type: subjective
      value: "Machine P"
      working: |
        Step 1: Compare the standard deviations: $0.64 < 0.70$.
        Step 2: A smaller standard deviation indicates that the data points are closer to the mean, representing higher consistency.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Choosing Machine P."
      - marks: 1
        criteria: "Explaining that a smaller standard deviation means higher consistency or less dispersion."
    hints:
      - "Standard deviation measures 'spread'. If you want consistency, do you want a big spread or a tiny spread?"

  - id: Q8
    text: "Design a mini-project layout to investigate the BMI (Body Mass Index) distribution among students. List the four essential graphical or statistical representations required in your final report as per the DSKP."
    difficulty: hard
    learning_objective: "7.2.5"
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "The report must involve: 1. Frequency Table (Data organization), 2. Histogram/Frequency Polygon (Graphical representation), 3. Measures of Central Tendency (Mean/Median), and 4. Measures of Dispersion (Standard Deviation/Box Plot)."
      working: |
        Step 1: Refer to DSKP notes for 7.2.5. 
        Step 2: Include organization, graphical representation, and data analysis (centrality and dispersion).
    marks: 4
    rubric:
      - marks: 4
        criteria: "Correctly listing all 4 components required for a comprehensive statistical investigation."
    hints:
      - "Think about the journey of data: from a raw list, to a table, to a graph, and finally to the calculated 'consistency' numbers."