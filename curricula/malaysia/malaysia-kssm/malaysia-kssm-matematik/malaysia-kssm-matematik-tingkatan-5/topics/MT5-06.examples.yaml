description: "Worked examples for Nisbah dan Graf Fungsi Trigonometri"
worked_examples:
  - id: WE-01
    topic: "Nilai Sinus, Kosinus dan Tangen dalam Sukuan II, III, dan IV"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "6.1.1 - Membuat dan menentusahkan konjektur tentang nilai sinus, kosinus dan tangen sudut dalam sukuan II, III dan IV dengan sudut rujukan sepadan."
    real_world_analogy: "Bayangkan merentasi sebuah bulatan dari titik permulaan, mengukur lengkungan pada setiap sukuan. Setiap posisi diwakili oleh nilai sinus, kosinus dan tangen."
    misconception_alert: "Pelajar sering terkeliru bahawa nilai sinus, kosinus, dan tangen dalam sukuan II, III, dan IV adalah sama dengan sukuan I, tanpa menyedari perubahan tanda."
    scenario: "Tentukan nilai sinus bagi sudut 150°."
    working: |
      Step 1: Kenal pasti sukuan bagi sudut 150°. Ia terletak dalam sukuan II.
      Step 2: Cari sudut rujukan: 180° - 150° = 30°.
      Step 3: Nilai sinus dalam sukuan II adalah positif. Oleh itu, sin 150° = sin 30° = 0.5.
  - id: WE-02
    topic: "Graf Fungsi Trigonometri"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: "6.2.1 - Melukis graf fungsi trigonometri, 𝑦 = sin 𝑥, 𝑦 = kos 𝑥 dan 𝑦 = tan 𝑥 bagi 0° ≤ x ≤ 360° dan membandingbezakan ciri-ciri graf fungsi tersebut."
    real_world_analogy: "Fikirkan tentang pergerakan ayunan pendulum, di mana gerakan naik-turun menyerupai graf sinus atau kosinus."
    misconception_alert: "Pelajar mungkin keliru antara graf sinus dan kosinus, terutamanya titik permulaan dan titik puncak."
    scenario: "Lukiskan graf fungsi y = cos x bagi 0° ≤ x ≤ 360°."
    working: |
      Step 1: Lukiskan paksi x dan y. Paksi x dari 0° hingga 360°.
      Step 2: Tandakan titik-titik penting: cos 0° = 1, cos 90° = 0, cos 180° = -1, cos 270° = 0, cos 360° = 1.
      Step 3: Sambungkan titik-titik ini dengan lengkung halus untuk melengkapkan graf.
  - id: WE-03
    topic: "Masalah Melibatkan Graf Fungsi Trigonometri"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: "6.2.3 - Menyelesaikan masalah yang melibatkan graf fungsi sinus, kosinus dan tangen."
    real_world_analogy: "Memahami pola ombak di pantai boleh dibandingkan dengan perubahan graf fungsi trigonometri yang berulang."
    misconception_alert: "Kesalahan umum adalah menganggap perubahan dalam graf tidak mempengaruhi semua titik pada graf."
    scenario: "Sebuah ombak di pantai diwakili oleh persamaan y = 2 sin (3x). Tentukan bilangan puncak gelombang dalam satu kitaran penuh (0° hingga 360°)."
    working: |
      Step 1: Kenal pasti bentuk persamaan: y = a sin (bx).
      Step 2: Nilai b = 3 menunjukkan bahawa kitaran lengkap berlaku lebih pantas, iaitu 360°/3 = 120° per kitaran.
      Step 3: Dalam 360°, terdapat 360°/120° = 3 kitaran penuh. Oleh itu, terdapat 3 puncak gelombang.