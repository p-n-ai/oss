topic_id: MT5-06
provenance: curriculum-aligned
description: "Step-by-step worked examples for Ratios and Graphs of Trigonometric Functions based on KSSM Form 5."
worked_examples:
  - id: WE-01
    topic: "Trigonometric Ratios in Quadrants II, III, and IV"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "6.1.2"
    real_world_analogy: "The 'Bow-Tie' Mirror. Imagine the x-axis is a mirror. An angle in the 2nd or 3rd quadrant is just a reflection of a small 'mini-me' angle (reference angle) hugging the mirror's surface."
    misconception_alert: "The 'Y-Axis Hug' Trap! Students often calculate reference angles from the vertical y-axis. Remember: Always measure from the horizontal x-axis!"
    scenario: "Determine the value of $\\cos 210^\\circ$ without using a calculator, expressing it in surd form."
    working: |
      1. Identify the quadrant: $210^\circ$ is between $180^\circ$ and $270^\circ$, so it is in **Quadrant III**.
      2. Apply the 'Add Sugar To Coffee' rule: In Quadrant III, only Tangent is positive. Therefore, $\cos 210^\circ$ must be **negative**.
      3. Find the corresponding reference angle $\alpha$:
         $\alpha = 210^\circ - 180^\circ$
         $\alpha = 30^\circ$
      4. Relate to the reference angle: $\cos 210^\circ = -\cos 30^\circ$.
      5. Substitute the special angle value: $\cos 30^\circ = \frac{\sqrt{3}}{2}$.
      6. Final Answer: $\cos 210^\circ = -\frac{\sqrt{3}}{2}$.

  - id: WE-02
    topic: "Sketching Trigonometric Graphs"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: "6.2.1"
    real_world_analogy: "The 'Wall of Mystery' (Asymptotes). Think of the Tangent graph like a car trying to drive through a wall at $90^\circ$. It can go higher and higher, but it can never touch or cross that line!"
    misconception_alert: "The 'Pointy Wave' Mistake. Do not draw Sine and Cosine waves as triangles with straight lines. They must be smooth, rounded 'S' curves."
    scenario: "Sketch the graph of $y = \\sin x$ for the range $0^\\circ \\leq x \\leq 360^\\circ$."
    working: |
      1. Create a coordinate table for five key points:
         At $x = 0^\circ, y = \sin 0^\circ = 0$
         At $x = 90^\circ, y = \sin 90^\circ = 1$ (Maximum)
         At $x = 180^\circ, y = \sin 180^\circ = 0$
         At $x = 270^\circ, y = \sin 270^\circ = -1$ (Minimum)
         At $x = 360^\circ, y = \sin 360^\circ = 0$
      2. Draw the axes: Label the y-axis from -1 to 1 and the x-axis with the 90-degree intervals.
      3. Plot the five key points on the grid.
      4. Connect the points: Draw a smooth, continuous wave starting at the origin, peaking at $90^\circ$, crossing at $180^\circ$, dipping at $270^\circ$, and ending at $360^\circ$.

  - id: WE-03
    topic: "Effects of Constants a, b, and c on Graphs"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: "6.2.2"
    real_world_analogy: "The 'Graphic Equalizer'. Parameter 'a' is the Volume (Amplitude), 'b' is the Speed (Frequency/Period), and 'c' is the Elevator (Vertical Shift)."
    misconception_alert: "The 'B-Value Period' Trap! A larger 'b' does NOT mean a longer graph. It means the graph is squashed! Period = $360^\\circ / b$."
    scenario: "Describe the transformation and state the new period and amplitude for the function $y = 3 \\cos 2x - 1$."
    working: |
      1. Compare with the general form $y = a \cos bx + c$.
      2. Identify $a = 3$: The **Amplitude** is now 3. The graph is vertically stretched (it goes higher and lower).
      3. Identify $b = 2$: The period changes.
         New Period = $360^\circ / b = 360^\circ / 2 = 180^\circ$.
         This means two complete cycles fit within $360^\circ$.
      4. Identify $c = -1$: The whole graph is shifted **1 unit downwards**.
      5. Determine the new Maximum and Minimum:
         Max = $a + c = 3 + (-1) = 2$
         Min = $-a + c = -3 + (-1) = -4$

  - id: WE-04
    topic: "Solving Real-World Problems (Tidal Waves)"
    difficulty: hard
    tp_level: 6
    kbat: true
    learning_objective: "6.2.3"
    real_world_analogy: "The Langkawi Tide. Just like a clock repeats every 12 hours, the depth of the sea at a jetty goes up and down in a perfect mathematical wave."
    misconception_alert: "Forgetting the 'C' value in models. In real life, the sea depth is never 0 at the center line; the '+ c' represents the average depth of the water."
    scenario: "The depth of water at a tidal station in Langkawi is modeled by $y = 3 \\sin(30x) + 5$, where $x$ is hours after midnight. Find the depth of water at 2:00 AM."
    working: |
      1. Understand the variables: $x$ represents time. At 2:00 AM, $x = 2$.
      2. Substitute $x = 2$ into the function:
         $y = 3 \sin(30 \times 2) + 5$
      3. Calculate the angle inside the sine function:
         $30 \times 2 = 60^\circ$
      4. Find the sine value: $\sin 60^\circ \approx 0.866$.
      5. Multiply by amplitude $a$:
         $3 \times 0.866 = 2.598$
      6. Apply vertical shift $c$:
         $2.598 + 5 = 7.598$
      7. Final Answer: The water depth is approximately **7.60 meters**.