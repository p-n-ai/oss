topic_id: MT5-04
provenance: ai-generated
description: "Worked examples for Matematik Pengguna: Percukaian"
worked_examples:
  - id: WE-01
    topic: "Tujuan Percukaian"
    difficulty: easy
    real_world_analogy: "Mengumpulkan dana untuk membina taman awam seperti cara kerajaan mengumpul cukai untuk menyediakan kemudahan awam."
    misconception_alert: "Pelajar sering menyangka semua cukai adalah sama, tetapi sebenarnya, cukai digunakan untuk tujuan yang berbeza seperti pembangunan infrastruktur dan pendidikan."
    scenario: "Ali ingin memahami mengapa dia harus membayar cukai pendapatan setiap tahun."
    working: |
      Step 1: Fahami bahawa cukai adalah sumber pendapatan utama kerajaan.
      Step 2: Ali perlu tahu bahawa cukai digunakan untuk menyediakan perkhidmatan awam seperti kesihatan, pendidikan, dan infrastruktur.
      Step 3: Oleh itu, dengan membayar cukai, Ali secara tidak langsung menyumbang kepada pembangunan negara dan kesejahteraan umum.

  - id: WE-02
    topic: "Kesan Pengelakan Cukai"
    difficulty: medium
    real_world_analogy: "Mengelak membayar tiket letak kereta dan akibatnya mendapat denda yang lebih tinggi."
    misconception_alert: "Ramai yang berfikir bahawa mengelak cukai tidak mempunyai akibat yang serius, tetapi sebenarnya ia boleh membawa kepada denda dan tindakan undang-undang."
    scenario: "Siti cuba mengelak membayar cukai jualan dengan tidak melaporkan semua jualannya."
    working: |
      Step 1: Kenal pasti bahawa mengelak cukai adalah melanggar undang-undang.
      Step 2: Fahami bahawa tindakan ini boleh menyebabkan Siti dikenakan denda yang tinggi.
      Step 3: Siti juga boleh menghadapi tindakan undang-undang yang lebih serius, seperti penjara, jika didapati bersalah.
      Step 4: Oleh itu, adalah lebih baik untuk melaporkan semua jualan dengan jujur untuk mengelakkan akibat yang lebih buruk.

  - id: WE-03
    topic: "Pengiraan Cukai Pendapatan"
    difficulty: hard
    real_world_analogy: "Mengira diskaun pada barangan semasa jualan akhir tahun."
    misconception_alert: "Pelajar mungkin keliru dengan potongan cukai dan mengira jumlah cukai yang salah."
    scenario: "Encik Lim mempunyai pendapatan tahunan RM60,000. Berapakah cukai pendapatan yang perlu dibayar jika kadar cukai adalah 10% selepas potongan RM10,000?"
    working: |
      Step 1: Tentukan pendapatan kena cukai dengan mengurangkan potongan daripada pendapatan tahunan: RM60,000 - RM10,000 = RM50,000.
      Step 2: Hitung cukai berdasarkan kadar 10% daripada pendapatan kena cukai: RM50,000 x 10% = RM5,000.
      Step 3: Oleh itu, jumlah cukai pendapatan yang perlu dibayar oleh Encik Lim adalah RM5,000.