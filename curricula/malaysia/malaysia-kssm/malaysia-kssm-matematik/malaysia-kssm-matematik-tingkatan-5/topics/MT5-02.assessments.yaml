questions:
  # Learning Objective 2.1.1
  - id: Q1
    text: 'Satu kedai menjual tiga jenis barangan: A, B, dan C. Jumlah jualan setiap barang dalam dua hari berturut-turut adalah seperti berikut: Hari 1: A - 50 unit, B - 30 unit, C - 20 unit; Hari 2: A - 40 unit, B - 35 unit, C - 25 unit. Wakilkan maklumat ini dalam bentuk matriks.'
    difficulty: medium
    learning_objective: 2.1.1
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '[[50, 30, 20], [40, 35, 25]]'
      working: |
        Letakkan jumlah unit yang dijual untuk setiap barang dalam baris yang berasingan bagi setiap hari.
        Hari 1: Baris pertama [50, 30, 20]
        Hari 2: Baris kedua [40, 35, 25]
        Bentuk matriks: [[50, 30, 20], [40, 35, 25]]
    marks: 3
    rubric:
      - marks: 2
        criteria: "Matriks diwakilkan dengan susunan baris yang betul tetapi ada kesilapan dalam satu nilai."
      - marks: 1
        criteria: "Matriks diwakilkan dengan susunan baris yang betul tetapi lebih dari satu nilai salah."
    hints:
      - level: 1
        text: "Bayangkan setiap baris mewakili satu hari dan setiap lajur mewakili satu jenis barang."

  # Learning Objective 2.1.2
  - id: Q2
    text: 'Diberi matriks $M = \begin{bmatrix} 2 & 3 \\ 5 & 7 \end{bmatrix}$. Apakah peringkat matriks ini dan apakah unsur pada baris kedua, lajur pertama?'
    difficulty: medium
    learning_objective: 2.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '2, 5'
      working: |
        Matriks $M$ mempunyai 2 baris dan 2 lajur, maka peringkatnya ialah 2x2.
        Unsur pada baris kedua, lajur pertama ialah 5.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan peringkat matriks dengan betul."
      - marks: 2
        criteria: "Menentukan peringkat dan satu unsur dengan betul."
    hints:
      - level: 1
        text: "Peringkat matriks adalah bilangan baris dan lajur."
      - level: 2
        text: "Unsur pada baris kedua, lajur pertama adalah yang terletak di kedudukan (2,1)."

  # Learning Objective 2.1.3
  - id: Q3
    text: 'Tentukan sama ada matriks $A = \begin{bmatrix} 1 & 2 \\ 3 & 4 \end{bmatrix}$ dan $B = \begin{bmatrix} 1 & 2 \\ 3 & 5 \end{bmatrix}$ adalah sama.'
    difficulty: medium
    learning_objective: 2.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: 'Tidak sama'
      working: |
        Untuk dua matriks sama, semua unsur mesti sama dan terletak pada kedudukan yang sama.
        Matriks $A$ dan $B$ tidak sama kerana unsur pada kedudukan (2,2) berbeza: $A_{2,2} = 4$, $B_{2,2} = 5$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengenal pasti bahawa satu unsur tidak sama."
    hints:
      - level: 1
        text: "Bandingkan setiap unsur satu persatu untuk memastikan semua unsur sama."

  # Learning Objective 2.2.1
  - id: Q4
    text: 'Hitungkan hasil tambah bagi matriks $C = \begin{bmatrix} 1 & 3 \\ 4 & 6 \end{bmatrix}$ dan $D = \begin{bmatrix} 5 & 7 \\ 2 & 8 \end{bmatrix}$.'
    difficulty: medium
    learning_objective: 2.2.1
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '\begin{bmatrix} 6 & 10 \\ 6 & 14 \end{bmatrix}'
      working: |
        Tambahkan unsur sepadan dalam $C$ dan $D$:
        $C_{11} + D_{11} = 1 + 5 = 6$
        $C_{12} + D_{12} = 3 + 7 = 10$
        $C_{21} + D_{21} = 4 + 2 = 6$
        $C_{22} + D_{22} = 6 + 8 = 14$
        Hasil tambah: $\begin{bmatrix} 6 & 10 \\ 6 & 14 \end{bmatrix}$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira satu baris dengan betul."
      - marks: 2
        criteria: "Mengira dua baris tetapi ada satu kesilapan."
    hints:
      - level: 1
        text: "Tambahkan unsur yang terletak di kedudukan yang sama dalam kedua-dua matriks."

  # Learning Objective 2.2.5
  - id: Q5
    text: 'Tentukan matriks songsang bagi matriks $E = \begin{bmatrix} 2 & 3 \\ 1 & 2 \end{bmatrix}$.'
    difficulty: medium
    learning_objective: 2.2.5
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: '\begin{bmatrix} 2 & -3 \\ -1 & 2 \end{bmatrix}'
      working: |
        Formula untuk matriks songsang: $\frac{1}{ad-bc} \begin{bmatrix} d & -b \\ -c & a \end{bmatrix}$
        Untuk $E = \begin{bmatrix} 2 & 3 \\ 1 & 2 \end{bmatrix}$, $a = 2$, $b = 3$, $c = 1$, $d = 2$.
        $ad-bc = (2)(2) - (3)(1) = 4 - 3 = 1$.
        Matriks songsang: $\frac{1}{1} \begin{bmatrix} 2 & -3 \\ -1 & 2 \end{bmatrix} = \begin{bmatrix} 2 & -3 \\ -1 & 2 \end{bmatrix}$.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Mengira determinan dengan betul."
      - marks: 3
        criteria: "Menggunakan formula matriks songsang dengan betul tetapi ada kesilapan kecil dalam pengiraan."
    hints:
      - level: 1
        text: "Ingat formula untuk matriks songsang untuk matriks 2x2."
      - level: 2
        text: "Matriks songsang melibatkan pertukaran tempat unsur dan menukar tanda unsur lain."