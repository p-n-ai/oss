questions:
  # Learning Objective: Mewakilkan maklumat situasi sebenar dalam bentuk matriks
  - id: Q1
    text: "Seorang peniaga menjual dua jenis produk, A dan B. Pada hari pertama, dia menjual 30 unit produk A dan 50 unit produk B. Pada hari kedua, dia menjual 40 unit produk A dan 30 unit produk B. Wakilkan maklumat jualan ini dalam bentuk matriks."
    difficulty: medium
    learning_objective: 2.1.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "\\begin{bmatrix} 30 & 50 \\\\ 40 & 30 \\end{bmatrix}"
      working: |
        The sales data can be represented as a 2x2 matrix where each row represents a day and each column represents the number of products sold:
        \[
        \begin{bmatrix} 
        30 & 50 \\
        40 & 30 
        \end{bmatrix}
        \]
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifies the matrix form"
      - marks: 1
        criteria: "Correctly places the values for each product and day"
    hints:
      - level: 1
        text: "Consider the days as rows and the products as columns."

  # Learning Objective: Menambah dan menolak matriks
  - id: Q2
    text: "Diberi matriks $A = \\begin{bmatrix} 2 & 5 \\\\ 3 & 4 \\end{bmatrix}$ dan $B = \\begin{bmatrix} 1 & 3 \\\\ 2 & 2 \\end{bmatrix}$. Hitung $A + B$."
    difficulty: medium
    learning_objective: 2.2.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "\\begin{bmatrix} 3 & 8 \\\\ 5 & 6 \\end{bmatrix}"
      working: |
        Add corresponding elements of matrices A and B:
        \[
        A + B = \begin{bmatrix} 2+1 & 5+3 \\\\ 3+2 & 4+2 \end{bmatrix} = \begin{bmatrix} 3 & 8 \\\\ 5 & 6 \end{bmatrix}
        \]
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly adds the first row"
      - marks: 1
        criteria: "Correctly adds the second row"
    hints:
      - level: 1
        text: "Add the elements at the same position from both matrices."

  # Learning Objective: Mendarab dua matriks
  - id: Q3
    text: "Diberi matriks $C = \\begin{bmatrix} 1 & 2 \\\\ 0 & 1 \\end{bmatrix}$ dan $D = \\begin{bmatrix} 3 & 1 \\\\ 4 & 2 \\end{bmatrix}$. Hitung $CD$."
    difficulty: medium
    learning_objective: 2.2.3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "\\begin{bmatrix} 11 & 5 \\\\ 4 & 2 \\end{bmatrix}"
      working: |
        Multiply matrices C and D:
        \[
        CD = \begin{bmatrix} (1)(3) + (2)(4) & (1)(1) + (2)(2) \\\\ (0)(3) + (1)(4) & (0)(1) + (1)(2) \end{bmatrix} = \begin{bmatrix} 11 & 5 \\\\ 4 & 2 \end{bmatrix}
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly calculates the first row, first column"
      - marks: 1
        criteria: "Correctly calculates the first row, second column"
      - marks: 1
        criteria: "Correctly calculates the second row"
    hints:
      - level: 1
        text: "Multiply rows of the first matrix by columns of the second matrix."

  # Learning Objective: Menerangkan ciri-ciri matriks identiti
  - id: Q4
    text: "Apakah ciri-ciri matriks identiti 2x2?"
    difficulty: medium
    learning_objective: 2.2.4
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Matriks identiti 2x2 ialah matriks $I = \\begin{bmatrix} 1 & 0 \\\\ 0 & 1 \\end{bmatrix}$, di mana ia mempunyai elemen 1 pada diagonal utama dan elemen 0 di tempat lain."
      working: |
        The identity matrix is characterized by having 1s on the main diagonal and 0s elsewhere:
        \[
        I = \begin{bmatrix} 1 & 0 \\ 0 & 1 \end{bmatrix}
        \]
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies the diagonal elements as 1"
      - marks: 1
        criteria: "Identifies the non-diagonal elements as 0"
    hints:
      - level: 1
        text: "Consider what happens when a matrix is multiplied by the identity matrix."

  # Learning Objective: Menerangkan maksud matriks songsang dan seterusnya menentukan matriks songsang bagi suatu matriks 2 × 2
  - id: Q5
    text: "Cari matriks songsang bagi matriks $E = \\begin{bmatrix} 2 & 1 \\\\ 3 & 2 \\end{bmatrix}$."
    difficulty: medium
    learning_objective: 2.2.5
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "\\begin{bmatrix} 2 & -1 \\\\ -3 & 2 \\end{bmatrix}"
      working: |
        To find the inverse of matrix E, use the formula for a 2x2 matrix:
        \[
        E^{-1} = \frac{1}{ad-bc} \begin{bmatrix} d & -b \\\\ -c & a \end{bmatrix}
        \]
        where $a=2$, $b=1$, $c=3$, $d=2$. Thus,
        \[
        E^{-1} = \frac{1}{(2)(2)-(1)(3)} \begin{bmatrix} 2 & -1 \\\\ -3 & 2 \end{bmatrix} = \begin{bmatrix} 2 & -1 \\\\ -3 & 2 \end{bmatrix}
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly identifies determinant"
      - marks: 1
        criteria: "Correctly inverts the matrix elements"
      - marks: 1
        criteria: "Correctly applies the inverse formula"
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Remember that the determinant is calculated as $ad-bc$, not $ab-cd$."