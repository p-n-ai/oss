topic_id: MT5-04
provenance: "curriculum-architect-audit"
questions:
  # --- Subchapter 4.1.1: Purpose of Taxation ---
  - id: Q1
    type: "opb" # True/False
    text: "Determine whether the following statement is True or False: 'One of the purposes of taxation is as a government policy implementation tool to encourage a caring society through tax relief for parents\' medical expenses.'"
    difficulty: "easy"
    learning_objective: "4.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: "exact"
      value: "True"
      working: |
        Step 1: Identify the four main purposes of taxation: Source of revenue, Policy tool, Control of goods/services, and Financial tool.
        Step 2: Reference Source regarding policy implementation.
        Step 3: Confirm that medical expense relief is a specific example of using tax as a policy tool.
    marks: 1
    hints:
      - level: 1
        text: "Review the 'Purposes of Taxation' diagram. Is using tax to encourage specific behaviors (like caring for parents) considered a policy tool?"

  # --- Subchapter 4.1.2: Types of Taxes & Evasion ---
  - id: Q2
    type: "oap"
    text: "Mr. Ganesh owns a residential house in Subang Jaya. Every year, he receives a bill from the Subang Jaya Municipal Council (MPSJ) to cover municipal expenses such as rubbish collection and drain cleaning. Which tax is this?"
    difficulty: "easy"
    learning_objective: "4.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: "multiple_choice"
      value: "a"
      working: |
        Step 1: Identify the collecting authority (MPSJ = Local Authority).
        Step 2: Identify the purpose (Municipal services/rubbish collection).
        Step 3: Match to 'Property Assessment Tax' (Cukai Pintu) as defined in Source.
      distractors:
        - value: "b"
          feedback: "Incorrect. Quit Rent (Cukai Tanah) is paid to the State Land Office, not the local municipal council. Think about who cleans the drains in your neighborhood."
        - value: "c"
          feedback: "Incorrect. Service Tax is charged on services like hotels or telecommunications, not on property ownership."
        - value: "d"
          feedback: "Incorrect. Income tax is paid to LHDN based on earnings, not to a municipal council based on house ownership."
    options:
      a: "Property Assessment Tax"
      b: "Quit Rent"
      c: "Service Tax"
      d: "Income Tax"
    marks: 1
    hints:
      - level: 1
        text: "Which authority is collecting the tax? Source tells us that Local Authorities (like MPSJ) collect a specific type of tax for rubbish and drain services."

  # --- Subchapter 4.1.3: Calculations (Road Tax) ---
  - id: Q3
    type: "subjective"
    text: "Alan owns a private car in Peninsular Malaysia with an engine capacity of $1,997$ cc. Based on the provided rates, the base rate for $1,801$ cc to $2,000$ cc is $RM280.00$ with a progressive rate of $RM0.50$ for each cc exceeding $1,800$ cc. Calculate his total road tax."
    difficulty: "medium"
    learning_objective: "4.1.3"
    tp_level: 4
    kbat: false
    answer:
      type: "exact"
      value: "378.50"
      working: |
        Step 1: Identify the base rate for the 1801-2000 cc bracket = $RM280.00$.
        Step 2: Calculate the excess cc: $1,997 - 1,800 = 197$ cc.
        Step 3: Calculate progressive tax: $197 \times RM0.50 = RM98.50$.
        Step 4: Total road tax = $RM280.00 + RM98.50 = RM378.50$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly identifies the base rate of RM280."
      - marks: 1
        criteria: "Calculates the excess cc (197) and the progressive tax (RM98.50) correctly."
      - marks: 1
        criteria: "Final sum of RM378.50 is accurate."
    hints:
      - level: 1
        text: "The tax has two parts. First, find the 'Base Rate' for Alan's 1997cc car in the table. What is the amount for the 1801-2000cc tier?"
      - level: 2
        text: "Now find the excess. Alan's car is 1997cc, and the progressive rate starts after 1800cc. Subtract 1800 from 1997, then multiply that balance by RM0.50."

  # --- Subchapter 4.1.4: Problem Solving (Joint vs Separate) ---
  - id: Q4
    type: "subjective"
    text: "Mr. Raj and his wife both have taxable incomes. Under 'Joint Assessment', their combined chargeable income is $RM87,500$ resulting in a tax payable of $RM8,275$. Under 'Separate Assessment', Mr. Raj pays $RM125.60$ and his wife pays $RM714.40$. (a) Calculate the total tax under separate assessment. (b) Which assessment method should they choose to save money? Justify your answer."
    difficulty: "hard"
    learning_objective: "4.1.4"
    tp_level: 5
    kbat: true
    answer:
      type: "free_text"
      value: "(a) RM840.00. (b) Separate Assessment, because they save RM7,435.00."
      working: |
        Step 1: Total Separate Tax = $RM125.60 + RM714.40 = RM840.00$.
        Step 2: Compare with Joint Tax ($RM8,275.00$).
        Step 3: Calculate savings: $RM8,275 - RM840 = RM7,435$.
        Step 4: Conclusion: Separate assessment is better as it significantly reduces the total tax burden.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Calculates separate assessment total correctly (RM840)."
      - marks: 1
        criteria: "Makes a clear choice (Separate Assessment)."
      - marks: 2
        criteria: "Justifies the choice by showing the numerical difference/savings (RM7,435)."
    hints:
      - level: 1
        text: "First, add up the two individual taxes from the separate assessment. Is the total higher or lower than the RM8,275 joint tax?"
      - level: 2
        text: "To justify your answer, you must show exactly how much money the couple 'saves' by picking the cheaper option. Subtract the smaller total from the larger one."

  # --- TP6: Creative Non-Routine Project ---
  - id: Q5
    type: "free_text"
    text: "Projek Mini: 'The Family Tax Consultant'. Find an electricity bill for your home. Identify the 'Service Tax' (Cukai Perkhidmatan) charged. If the current rate is 6%, calculate what the total bill would be if the government decided to increase the rate to 8% for usage exceeding 600 kWh. Show your full breakdown."
    difficulty: "hard"
    learning_objective: "4.1.4"
    tp_level: 6
    kbat: true
    answer:
      type: "free_text"
      value: "Student's calculation depends on their specific bill values."
      working: |
        Step 1: Identify usage > 600 kWh.
        Step 2: Calculate amount for that usage.
        Step 3: Apply 8% tax instead of 6%.
        Step 4: Compare totals.
    marks: 5
    rubric:
      - marks: 2
        criteria: "Accurately identifies the taxable portion of the bill from a real or simulated source."
      - marks: 3
        criteria: "Correctly performs the 8% calculation and explains the financial impact on the household."
    hints:
      - level: 1
        text: "Look at Source for an example of how Mr. Khor's electricity bill is taxed. Only usage exceeding 600 kWh is taxed. Does your bill exceed 600 kWh?"