id: MT5-07
official_ref: "7.0"
name_en: "Measures of Dispersion for Grouped Data"
subject_grade_id: malaysia-kssm-matematik-tingkatan-5
subject_id: malaysia-kssm-matematik
syllabus_id: malaysia-kssm
country_id: malaysia
language: en
difficulty: advanced
tier: core

content_standards:
  - id: "7.1"
    text_en: "Dispersion"
  - id: "7.2"
    text_en: "Measures of Dispersion"

learning_objectives:
  - id: "7.1.1"
    text_en: "Construct histogram and frequency polygon for a set of grouped data."
    bloom: apply
  - id: "7.1.2"
    text_en: "Compare and interpret the dispersions of two or more sets of grouped data based on histogram and frequency polygon, hence make conclusion."
    bloom: analyze
  - id: "7.1.3"
    text_en: "Construct an ogive for a set of grouped data and determine the quartiles."
    bloom: apply
  - id: "7.2.1"
    text_en: "Determine range, interquartile range, variance and standard deviation as a measure to describe dispersion for grouped data."
    bloom: apply
  - id: "7.2.2"
    text_en: "Construct and interpret a box plot for a set of grouped data."
    bloom: apply
  - id: "7.2.3"
    text_en: "Compare and interpret two or more sets of grouped data, based on measures of dispersion hence make conclusion."
    bloom: analyze
  - id: "7.2.4"
    text_en: "Solve problems involving measures of dispersion for grouped data."
    bloom: apply
  - id: "7.2.5"
    text_en: "Design and conduct a mini-project involving statistical investigations based on measures of central tendency and measures of dispersion and hence interpret and communicate research findings."
    bloom: create

performance_standards:
  - tp_level: 1
    descriptor: "Demonstrate basic knowledge of dispersion and measures of dispersion of grouped data."
  - tp_level: 2
    descriptor: "Demonstrate the understanding of dispersion and measures of dispersion of grouped data."
  - tp_level: 3
    descriptor: "Apply the understanding of dispersion and measures of dispersion of grouped data to perform simple tasks."
  - tp_level: 4
    descriptor: "Apply appropriate knowledge and skills about measures of dispersion of grouped data in the context of simple routine problem solving."
  - tp_level: 5
    descriptor: "Apply appropriate knowledge and skills to the measures of dispersion of grouped data in the context of complex routine problem solving."
  - tp_level: 6
    descriptor: "Apply appropriate knowledge and skills to the measures of dispersion of grouped data in the context of non-routine problem solving in a creative manner."

prerequisites:
  required:
    - "Measures of Dispersion for Ungrouped Data (Form 4 Bab 8)"
    - "Measures of Central Tendency (Form 2 Bab 12)"
    - "Construction of Frequency Tables"

teaching:
  sequence:
    - "Step 1: Organizing raw data into frequency tables and identifying class intervals, limits, and boundaries (Textbook pp. 198-200)."
    - "Step 2: Constructing and interpreting Histograms and Frequency Polygons to visualize data distribution (Learning Standards 7.1.1, 7.1.2)."
    - "Step 3: Plotting Ogives and using them to determine cumulative frequency, quartiles, and percentiles (Learning Standard 7.1.3)."
    - "Step 4: Calculating numerical measures: Range, Interquartile Range, Variance, and Standard Deviation (Learning Standard 7.2.1)."
    - "Step 5: Constructing Box Plots and comparing multiple data sets (Learning Standards 7.2.2, 7.2.3)."
    - "Step 6: Problem solving and execution of the statistical mini-project (Learning Standards 7.2.4, 7.2.5)."
  
  common_misconceptions:
    - misconception: "Confusing class limits with class boundaries during graph construction."
      remediation: "Explicitly show that boundaries (midpoints between limits) are used for contiguous bars in histograms."
    - misconception: "Assuming the range is the most reliable measure of dispersion."
      remediation: "Compare range with standard deviation using data with outliers to show sensitivity."
    - misconception: "Plotting cumulative frequency against midpoints instead of upper boundaries for ogives."
      remediation: "Emphasize that an ogive represents data 'up to' a point, hence upper boundaries must be used."

  engagement_hooks:
    - "Analyzing real-world Covid-19 daily cases data to understand how 'flattening the curve' relates to measures of dispersion."
    - "Comparing the consistency of two different brands of batteries through standard deviation analysis."

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

ai_teaching_notes: "MT5-07.teaching.md"
assessments_file: "MT5-07.assessments.yaml"
examples_file: "MT5-07.examples.yaml"
