teaching:
  sequence:
    - "Step 1: Introduce matrices through real-world tables such as sales, schedules and inventory records."
    - "Step 2: Define matrix order and identify specific elements using row and column notation."
    - "Step 3: Establish the conditions for matrix equality by matching order and corresponding elements."
    - "Step 4: Demonstrate addition, subtraction and scalar multiplication of matrices."
    - "Step 5: Teach matrix multiplication using the row-by-column rule and emphasize the condition for existence."
    - "Step 6: Explore the identity matrix and its multiplicative property."
    - "Step 7: Explain inverse matrices for 2 x 2 matrices and connect them to solving simultaneous equations."
    - "Step 8: Apply matrix methods in multi-step routine and non-routine problem solving."
  common_misconceptions:
    - misconception: "Students try to add or subtract matrices with different orders."
      remediation: "Reinforce that matrix addition and subtraction are only possible when every element has a matching partner in the same position."
    - misconception: "Students multiply corresponding elements when multiplying two matrices."
      remediation: "Use row-by-column tracing arrows to show that matrix multiplication is not the same as addition."
    - misconception: "Students believe every square matrix has an inverse."
      remediation: "Show that a 2 x 2 matrix has no inverse when the determinant is zero."
  engagement_hooks:
    - "Use school inventory records to show how matrices organize stock data quickly."
    - "Discuss how matrices appear in cryptography and coded messages."
    - "Connect matrices to data analysis tasks such as comparing sales or transport schedules."

