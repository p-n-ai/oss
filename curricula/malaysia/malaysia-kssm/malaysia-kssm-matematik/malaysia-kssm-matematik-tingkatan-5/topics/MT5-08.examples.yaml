worked_examples:
  - id: WE-01
    topic: "Linear Function Modeling"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: "8.1.1 Menerangkan pemodelan matematik"
    real_world_analogy: "Comparing the cost of buying multiple apples to determine the total cost."
    misconception_alert: "Students might confuse the slope with the y-intercept."
    scenario: "A fruit vendor sells apples at RM2 each. Model the total cost, C, to purchase x apples."
    working: |
      Step 1: Identify the constant rate. The cost per apple is RM2.
      Step 2: Formulate the linear function. C = 2x, where C is the total cost and x is the number of apples.
      Step 3: Interpret the model. For example, if x = 5, then C = 2(5) = RM10.
      
  - id: WE-02
    topic: "Quadratic Function Modeling"
    difficulty: medium
    tp_level: 2
    kbat: true
    learning_objective: "8.1.2 Menyelesaikan masalah kehidupan sebenar melalui pemodelan matematik"
    real_world_analogy: "Calculating the trajectory of a ball thrown into the air."
    misconception_alert: "Students may misinterpret the vertex as the starting point."
    scenario: "A ball is thrown upward with an initial velocity of 20 m/s from a height of 5 meters. Model the height, h, of the ball after t seconds."
    working: |
      Step 1: Identify the initial conditions. Initial velocity = 20 m/s, initial height = 5 meters.
      Step 2: Use the quadratic formula for motion: h(t) = -4.9t^2 + 20t + 5.
      Step 3: Find the height at t = 2 seconds. h(2) = -4.9(2)^2 + 20(2) + 5 = 25.4 meters.
      
  - id: WE-03
    topic: "Exponential Function Modeling"
    difficulty: hard
    tp_level: 3
    kbat: true
    learning_objective: "8.1.2 Menyelesaikan masalah kehidupan sebenar melalui pemodelan matematik"
    real_world_analogy: "Modeling the growth of a bacteria population over time."
    misconception_alert: "Students might confuse exponential growth with linear growth."
    scenario: "A bacteria culture doubles every 3 hours. If there are initially 100 bacteria, model the population size, P, after t hours."
    working: |
      Step 1: Identify the growth factor. The population doubles, so the growth factor is 2.
      Step 2: Formulate the exponential function. P(t) = 100 * 2^(t/3).
      Step 3: Calculate the population size after 9 hours. P(9) = 100 * 2^(9/3) = 100 * 2^3 = 800 bacteria.