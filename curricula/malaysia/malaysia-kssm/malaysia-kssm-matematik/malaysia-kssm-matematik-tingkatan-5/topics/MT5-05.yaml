teaching:
  sequence:
    - "Step 1: Explore congruency using 'Mind Mobilisation 1' and '2' to distinguish shapes and triangles (25 min)"
    - "Step 2: Introduce geometric similarity and enlargement through 'Mind Mobilisation 3' and '4' (30 min)"
    - "Step 3: Derive and verify the area-scale factor relationship (Area of image = k² × Area of object) (20 min)"
    - "Step 4: Execute combined transformations AB (B followed by A) and test for the Commutative Law (30 min)"
    - "Step 5: Define tessellations and design patterns using isometric transformations (Translation, Rotation, Reflection) (25 min)"
  common_misconceptions:
    - misconception: "Confusion between congruency and similarity."
      remediation: "Emphasize that congruent shapes must have identical size, while similar shapes only require proportional sides."
    - misconception: "Assuming angles increase during enlargement."
      remediation: "Demonstrate that while side lengths change, corresponding angles remain invariant."
    - misconception: "Applying combined transformations in the wrong order."
      remediation: "Strictly enforce the 'Reverse Alphabet' rule: Transformation AB means B is performed first."
  engagement_hooks:
    - "Observe the Terengganu Drawbridge structure to identify congruent components in engineering."
    - "Design a digital logo using combined transformations in GeoGebra, similar to the 'Exploring Mathematics' activity."
    - "Analyze Escher-style tessellations in traditional Malaysian Batik designs."
