    - "Step 1: Introduction to Taxation and its purpose (DSKP 4.1.1) - 15 min"
    - "Step 2: Exploring types of taxes (Income, Road, Property, Quit, Sales/Service) and Evasion (DSKP 4.1.2) - 20 min"
