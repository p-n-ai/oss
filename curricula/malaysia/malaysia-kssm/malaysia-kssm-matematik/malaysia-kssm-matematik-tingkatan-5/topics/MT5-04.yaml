  common_misconceptions:
    - misconception: "Students think taxes are penalties or optional donations."
      remediation: "Emphasize that taxes are compulsory and fund essential public infrastructure like schools and hospitals."
    - misconception: "Confusion between tax relief and tax rebate."
      remediation: "Explain that relief is deducted from chargeable income, while rebate is deducted from the final tax payable."
    - misconception: "Thinking tax evasion is a minor offense."
      remediation: "Highlight the specific legal penalties and fines defined in the Income Tax and Road Transport Acts."

  engagement_hooks:
    - "Discuss how taxes fund the roads students used to get to school today."
    - "Analyze a real-world electricity bill to identify the 6% service tax charge."
    - "Compare joint vs. separate tax assessment scenarios for a fictional married couple."

