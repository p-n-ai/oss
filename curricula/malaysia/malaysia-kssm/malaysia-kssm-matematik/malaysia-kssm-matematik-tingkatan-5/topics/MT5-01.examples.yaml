description: "Worked examples for Ubahan"
worked_examples:
  - id: WE-01
    topic: "Ubahan Langsung"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "1.1.1 (understand): Menerangkan maksud ubahan langsung."
    real_world_analogy: "Consider how the cost of apples is directly proportional to the number of apples you buy."
    misconception_alert: "A common mistake is to think that all relationships between variables are direct, but only those where a constant ratio exists are direct variations."
    scenario: "Jika 5 biji epal berharga RM10, berapakah harga untuk 8 biji epal?"
    working: |
      Step 1: Nyatakan hubungan ubahan langsung: Harga (H) adalah langsung dengan bilangan epal (E), maka H = kE.
      Step 2: Cari nilai k menggunakan maklumat yang diberikan: RM10 = k * 5, jadi k = 2.
      Step 3: Gantikan nilai k untuk mencari harga bagi 8 biji epal: H = 2 * 8 = RM16.
      
  - id: WE-02
    topic: "Ubahan Songsang"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: "1.2.2 (apply): Menentukan hubungan antara dua pemboleh ubah bagi suatu ubahan songsang."
    real_world_analogy: "Think of a seesaw; when one side goes up, the other goes down, similar to inverse variation."
    misconception_alert: "Students often forget that in inverse variation, as one variable increases, the other decreases."
    scenario: "Sebuah mesin boleh menyiapkan kerja dalam 6 jam. Jika dua mesin yang sama digunakan, berapa jam diperlukan untuk menyiapkan kerja yang sama?"
    working: |
      Step 1: Nyatakan hubungan ubahan songsang: Masa (M) adalah songsang dengan bilangan mesin (B), maka M = k/B.
      Step 2: Cari nilai k menggunakan maklumat yang diberikan: 6 = k/1, jadi k = 6.
      Step 3: Gantikan nilai k untuk mencari masa bagi 2 mesin: M = 6/2 = 3 jam.
      
  - id: WE-03
    topic: "Ubahan Bergabung"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: "1.3.2 (apply): Menyelesaikan masalah yang melibatkan ubahan bergabung."
    real_world_analogy: "Imagine filling a tank with water where the flow rate and time together determine the total volume."
    misconception_alert: "Students might confuse combined variation with direct or inverse alone, forgetting that it involves both types."
    scenario: "Kelajuan (v) sebuah kereta adalah berkadar langsung dengan kuasa enjin (P) dan songsang dengan rintangan angin (R). Jika v = 60 apabila P = 120 dan R = 3, hitung v apabila P = 150 dan R = 2."
    working: |
      Step 1: Nyatakan hubungan ubahan bergabung: v = k * P/R.
      Step 2: Cari nilai k menggunakan maklumat yang diberikan: 60 = k * 120/3, jadi k = 1.5.
      Step 3: Gantikan nilai k untuk mencari kelajuan baru: v = 1.5 * 150/2 = 112.5 km/j.