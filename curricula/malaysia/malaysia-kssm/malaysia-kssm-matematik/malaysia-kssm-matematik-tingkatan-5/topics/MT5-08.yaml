teaching:
  sequence:
    - "Step 1: Define mathematical modeling as a representation of real-world scenarios to predict behavior (15 min)"
    - "Step 2: Introduce the 6-step modeling process: identifying problems, making assumptions, applying math, verifying solutions, refining the model, and reporting findings (20 min)"
    - "Step 3: Solve real-life linear modeling problems (e.g., fuel consumption or constant travel rates) (20 min)"
    - "Step 4: Analyze quadratic and exponential modeling scenarios (e.g., river depth profiles or compound interest) (25 min)"
    - "Step 5: Facilitate a mini project where students must model a creative non-routine problem to reach TP6 (30 min)"
  common_misconceptions:
    - misconception: "All real-world problems can be solved with simple linear models."
      remediation: "Demonstrate scenarios where growth is rapid (exponential) or paths are curved (quadratic) to show the necessity of varied functions."
    - misconception: "The first answer obtained from a mathematical model is always the final solution."
      remediation: "Emphasize the 'Refining the mathematical model' step where assumptions are checked against real-world constraints."
  engagement_hooks:
    - "Discuss the SMART tunnel's operation modes to show how mathematical modeling manages flood water and traffic in Kuala Lumpur."
    - "Analyze the price of rice at different grocery stores to determine if the drive is worth the savings, illustrating cost-benefit modeling."
    - "Explore how the Covid-19 pandemic epidemiological curve was flattened using Movement Control Orders (MCO) based on predictive models."
