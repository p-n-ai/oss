description: "Worked examples for Congruency, Enlargement and Combined Transformations"
worked_examples:
  ### 5.1 Congruency (TP2 - Easy)
  - id: WE-01
    topic: "Congruency"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "5.1.1: Differentiate between congruent and non-congruent shapes based on sides and angles."
    real_world_analogy: "Think of the windows on the Terengganu Drawbridge. They are all made from the same mold; if you take one and slide or rotate it, it fits perfectly onto another. They are congruent."
    misconception_alert: "Don't be fooled by orientation! A triangle is still congruent to another if its sides and angles match, even if it has been flipped or rotated."
    scenario: "Determine if $\\triangle ABC$ and $\\triangle PQR$ are congruent. $\\triangle ABC$ has sides $5\\text{ cm}, 12\\text{ cm}, 13\\text{ cm}$ and a right angle. $\\triangle PQR$ has sides $5\\text{ cm}, 12\\text{ cm}, 13\\text{ cm}$ and a right angle, but it is rotated $90^{\\circ}$."
    working: |
      1. Identify the sides of $\triangle ABC$: $AB=5, BC=12, AC=13$.
      2. Identify the sides of $\triangle PQR$: $PQ=5, QR=12, PR=13$.
      3. Compare corresponding sides: $AB=PQ$, $BC=QR$, and $AC=PR$. All are equal.
      4. Compare corresponding angles: Both triangles have a $90^{\\circ}$ angle.
      5. Conclusion: Since all corresponding sides and angles are equal, the triangles are congruent despite the rotation.
    
  ### 5.2 Enlargement (TP4 - Medium)
  - id: WE-02
    topic: "Enlargement"
    difficulty: medium
    tp_level: 4
    kbat: true
    learning_objective: "5.2.4: Make and verify conjecture on the relation between area of the image and area of the object of an enlargement."
    real_world_analogy: "Imagine a square mosaic tile. If you double the length and width ($k=2$), you don't just get two tiles' worth of area; you need $2^2 = 4$ tiles to fill the new space!"
    misconception_alert: "The $k^2$ Trap! Many students think that if the sides double, the area doubles. Remember: Area of image = $k^2 \\times$ Area of object."
    scenario: "A logo with an area of $20\\text{ cm}^2$ is enlarged with a scale factor of $k = -3$. Calculate the area of the enlarged image logo."
    working: |
      1. State the formula: $\text{Area of image} = k^2 \\times \\text{Area of object}$.
      2. Substitute the values: $\text{Area of image} = (-3)^2 \\times 20$.
      3. Calculate the square of the scale factor: $(-3) \\times (-3) = 9$.
      4. Final calculation: $9 \\times 20 = 180\\text{ cm}^2$.
      5. Note: The negative scale factor means the image is inverted, but the area remains positive.

  ### 5.3 Combined Transformations (TP5 - Hard)
  - id: WE-03
    topic: "Combined Transformations"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: "5.3.4: Solve problems involving combined transformation."
    real_world_analogy: "A dance move sequence labeled 'AB' where B is 'Slide Left' and A is 'Spin'. You MUST do the Slide (B) before the Spin (A) to end up at the right spot on stage."
    misconception_alert: "The Reverse Alphabet Trap! In a combined transformation $AB$, transformation $B$ is always performed FIRST, followed by transformation $A$."
    scenario: "Point $M(1, 4)$ undergoes combined transformation $RS$. $S$ is a reflection in the line $x = 3$ and $R$ is a translation $\\begin{pmatrix} 2 \\\\ -1 \\\\end{pmatrix}$. Find the final image of $M$."
    working: |
      1. Identify the order: In $RS$, perform $S$ first, then $R$.
      2. Step 1 (Transformation $S$): Reflect $M(1, 4)$ in the line $x = 3$. 
         Distance from $x=1$ to $x=3$ is 2 units. Move 2 units right from $x=3$ to get $x=5$. 
         The first image $M'$ is $(5, 4)$.
      3. Step 2 (Transformation $R$): Apply translation $\\begin{pmatrix} 2 \\\\ -1 \\\\end{pmatrix}$ to $M'(5, 4)$.
         $x = 5 + 2 = 7$
         $y = 4 - 1 = 3$
      4. Final Answer: The coordinate of the final image $M''$ is $(7, 3)$.

  ### 5.4 Tessellation (TP6 - Hard)
  - id: WE-04
    topic: "Tessellation"
    difficulty: hard
    tp_level: 6
    kbat: true
    learning_objective: "5.4.2: Design tessellation involving isometric transformation."
    real_world_analogy: "Malaysian Batik patterns! A single small motif is repeated through reflection and translation to cover the whole cloth without any empty gaps."
    misconception_alert: "A pattern is only a tessellation if there are ZERO gaps and ZERO overlaps. If the shapes don't fit perfectly, it's just a regular drawing."
    scenario: "Explain how a single equilateral triangle can be used to create a tessellation using only rotation and translation."
    working: |
      1. Start with one equilateral triangle (Shape P).
      2. Perform a $60^{\\circ}$ rotation of Shape P about one of its vertices to create an adjacent triangle.
      3. Repeat this rotation 5 more times to form a regular hexagon.
      4. Use translation to repeat this hexagonal unit across the plane.
      5. Verification: Since the interior angles at the meeting point ($60^{\\circ} \\times 6$) sum up to $360^{\\circ}$, there are no gaps or overlaps.