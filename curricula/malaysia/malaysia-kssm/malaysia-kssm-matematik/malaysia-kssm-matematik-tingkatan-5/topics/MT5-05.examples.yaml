topic_id: MT5-05
provenance: ai-generated
description: "Worked examples for Kekongruenan, Pembesaran dan Gabungan Transformasi"
worked_examples:
  - id: WE-01
    topic: "Kekongruenan"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "5.1.1 (analyze): Membezakan antara bentuk kongruen dan bukan kongruen berdasarkan sisi dan sudut."
    real_world_analogy: "Think of two identical jigsaw puzzle pieces; they are congruent because they fit perfectly on top of each other."
    misconception_alert: "Students often confuse congruency with similarity. Remember, congruent shapes are identical in size and shape."
    scenario: "Anda mempunyai dua segitiga, segitiga ABC dan segitiga DEF. Segitiga ABC mempunyai sisi yang sama panjang dan sudut yang sama besar dengan segitiga DEF. Adakah kedua-dua segitiga ini kongruen?"
    working: |
      Step 1: Perhatikan bahawa segitiga ABC dan DEF mempunyai sisi yang sama panjang.
      Step 2: Periksa sudut dalam kedua-dua segitiga; mereka adalah sama besar.
      Step 3: Oleh kerana kedua-dua sisi dan sudut adalah sama, segitiga ABC dan DEF adalah kongruen.

  - id: WE-02
    topic: "Pembesaran"
    difficulty: medium
    tp_level: 3
    kbat: true
    learning_objective: "5.2.2 (understand): Membuat perkaitan antara keserupaan dengan pembesaran dan seterusnya memerihalkan pembesaran menggunakan pelbagai perwakilan."
    real_world_analogy: "A photograph enlarged to fit a poster size retains the same proportions as the original."
    misconception_alert: "Students might think that the angles change during enlargement, but they remain the same."
    scenario: "Sebuah gambar segi empat tepat dengan panjang 4 cm dan lebar 3 cm diperbesar dengan faktor skala 2. Apakah dimensi imej yang diperbesar?"
    working: |
      Step 1: Tentukan faktor pembesaran, yang dalam kes ini adalah 2.
      Step 2: Gandakan panjang asal (4 cm) dengan faktor pembesaran: 4 cm x 2 = 8 cm.
      Step 3: Gandakan lebar asal (3 cm) dengan faktor pembesaran: 3 cm x 2 = 6 cm.
      Step 4: Oleh itu, dimensi imej yang diperbesar adalah 8 cm panjang dan 6 cm lebar.

  - id: WE-03
    topic: "Gabungan Transformasi"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: "5.3.4 (apply): Menyelesaikan masalah yang melibatkan gabungan transformasi."
    real_world_analogy: "Consider a dance routine where a movement sequence involves a twist followed by a slide, each transformation is applied in sequence."
    misconception_alert: "Students might think the order of transformations doesn't matter, but it does affect the final outcome."
    scenario: "Anda mempunyai titik P pada koordinat (1, 2). Lakukan putaran 90 darjah mengikut arah jam di sekitar titik asal, diikuti dengan translasi sebanyak (3, 1). Apakah koordinat titik P selepas gabungan transformasi ini?"
    working: |
      Step 1: Lakukan putaran titik P (1, 2) sebanyak 90 darjah mengikut arah jam di sekitar titik asal. Koordinat baru menjadi (2, -1).
      Step 2: Lakukan translasi sebanyak (3, 1) kepada titik baru (2, -1). Tambah koordinat: (2 + 3, -1 + 1).
      Step 3: Hasilnya, koordinat titik P selepas gabungan transformasi ini adalah (5, 0).