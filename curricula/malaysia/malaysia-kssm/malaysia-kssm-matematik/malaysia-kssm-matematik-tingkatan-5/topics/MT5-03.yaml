generated_at: "2026-04-20T16:34:00Z"

teaching:
  sequence:
    - "Introduction to Insurance: Discuss the definition of risk as a disaster that cannot be avoided and the transfer of risk to organizations (20 min)"
    - "Types of Insurance: Distinguish between Life Insurance (death, disability, critical illness) and General Insurance (motor, fire, medical, accident, travel) (25 min)"
    - "Calculating Premiums: Use Rate Schedules to calculate premiums for life, motor, and medical insurance (30 min)"
    - "Solving Insurance Problems: Master the application of deductibles and the co-insurance/joint-insurance principle (35 min)"
  
  common_misconceptions:
    - misconception: "Insurance is an investment tool for gaining profit."
      remediation: "Emphasize that the principle of indemnity ensures the policyholder is restored to the pre-loss condition, not to gain profit."
    - misconception: "A deductible is the same as a premium."
      remediation: "Explain that the premium is the cost for protection, while the deductible is the out-of-pocket cost paid only when making a claim."
    - misconception: "Life insurance covers all medical expenses."
      remediation: "Clarify the difference between life insurance (death/disability) and medical/health insurance (hospitalization/surgery)."

  engagement_hooks:
    - "Ask students to identify the risks they face daily, like getting injured playing football or a school bus accident, to ground the concept of risk."
    - "Use the MySalam national health protection scheme as a localized example of how the government provides free insurance to citizens."
    - "Discuss a scenario where a car accident occurs and students must identify who is the first, second, and third party in the insurance claim."

