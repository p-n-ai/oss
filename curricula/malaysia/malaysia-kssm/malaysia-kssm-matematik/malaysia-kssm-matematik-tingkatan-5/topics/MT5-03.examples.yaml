topic_id: MT5-03
provenance: ai-generated
description: "Worked examples for Matematik Pengguna: Insurans"
worked_examples:
  - id: WE-01
    topic: "Introduction to Insurance Risks and Types"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 3.1.1
    real_world_analogy: "Imagine insurance as a safety net that catches you when unexpected things happen, like a broken window that insurance helps to fix."
    misconception_alert: "Students often think insurance is only for accidents, but it covers a wide range of events."
    scenario: "Ahmad is considering buying insurance for his new car. He wants to understand what types of risks can be covered by insurance."
    working: |
      Step 1: Identify the types of risks Ahmad might face such as theft, accidents, and natural disasters.
      Step 2: Explain that insurance provides financial protection against these risks.
      Step 3: Discuss the two main categories of insurance: life insurance and general insurance, and relate to Ahmad's car insurance as a type of general insurance.

  - id: WE-02
    topic: "Calculating Insurance Premiums"
    difficulty: medium
    tp_level: 3
    kbat: true
    learning_objective: 3.1.2
    real_world_analogy: "Paying insurance premiums is like paying a subscription fee for a service that promises to help you in difficult times."
    misconception_alert: "A common mistake is thinking that the premium is the total cost of insurance, but it might not cover all scenarios due to deductibles."
    scenario: "Siti's car insurance policy states a premium of RM1,200 per year. Calculate her monthly premium."
    working: |
      Step 1: Understand that the annual premium is divided over 12 months.
      Step 2: Use the formula for monthly premium: Annual Premium ÷ 12.
      Step 3: Calculate: RM1,200 ÷ 12 = RM100.
      Step 4: Conclude that Siti pays RM100 per month for her car insurance.

  - id: WE-03
    topic: "Solving Insurance Deductible Problems"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 3.1.3
    real_world_analogy: "A deductible is like an entry fee to a theme park; you must pay it before enjoying the rides, just as you have to pay a deductible before insurance covers the rest."
    misconception_alert: "Students often confuse deductible and premium, thinking both reduce the cost of insurance claims."
    scenario: "Ali's health insurance has a deductible of RM500. If he incurs medical expenses of RM3,000, how much will the insurance cover?"
    working: |
      Step 1: Identify the total medical expenses: RM3,000.
      Step 2: Recognize that Ali must pay the deductible first: RM500.
      Step 3: Calculate the amount insurance will cover: Total expenses - Deductible = RM3,000 - RM500 = RM2,500.
      Step 4: Conclude that the insurance will cover RM2,500 of Ali's medical expenses.