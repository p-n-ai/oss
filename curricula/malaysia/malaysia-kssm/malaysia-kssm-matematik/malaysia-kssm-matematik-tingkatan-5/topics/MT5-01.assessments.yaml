topic_id: MT5-01
provenance: ai-generated

questions:
  # Group by learning objective 1.1.1
  - id: Q1
    text: 'Jelaskan maksud ubahan langsung dan berikan satu contoh dalam kehidupan harian.'
    difficulty: medium
    learning_objective: 1.1.1
    tp_level: 2
    kbat: true
    answer:
      type: free_text
      value: 'Ubahan langsung ialah satu hubungan di mana dua pemboleh ubah berubah pada kadar yang sama. Contoh: Jarak dan masa bergerak dengan kelajuan yang tetap.'
      working: |
        - Ubahan langsung bermaksud apabila satu pemboleh ubah meningkat, pemboleh ubah lain juga meningkat pada kadar yang sama.
        - Contoh: Jika anda memandu dengan kelajuan tetap, lebih lama anda memandu, lebih jauh anda akan pergi.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Memberikan definisi asas ubahan langsung."
      - marks: 1
        criteria: "Memberikan contoh yang relevan."
      - marks: 1
        criteria: "Mengaitkan dengan situasi kehidupan harian."
    hints:
      - level: 1
        text: "Fikirkan tentang situasi di mana dua perkara bertambah secara serentak."
      - level: 2
        text: "Contoh: Kelajuan dan masa ketika memandu kereta."

  # Group by learning objective 1.1.2
  - id: Q2
    text: 'Jika $y$ berubah secara langsung dengan $x$ dan $y = 15$ apabila $x = 3$, cari nilai $y$ apabila $x = 7$.'
    difficulty: medium
    learning_objective: 1.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '35'
      working: |
        - Diberi bahawa $y = kx$, dan apabila $x = 3$, $y = 15$.
        - Maka, $15 = k \times 3 \implies k = 5$.
        - Oleh itu, apabila $x = 7$, $y = 5 \times 7 = 35$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan nilai pemalar $k$ dengan betul."
      - marks: 1
        criteria: "Menggantikan nilai $x$ yang baru ke dalam persamaan."
      - marks: 1
        criteria: "Mengira nilai $y$ dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan anda mencari nilai k sebelum mencari nilai y yang baru."
      - level: 2
        text: "Gunakan formula y = kx dan gantikan nilai yang diketahui."

  # Group by learning objective 1.1.3
  - id: Q3
    text: 'Dalam suatu ubahan tercantum, $y$ berubah secara langsung dengan $x$ dan secara songsang dengan $z$. Jika $y = 10$ apabila $x = 4$ dan $z = 5$, cari nilai $y$ apabila $x = 8$ dan $z = 10$.'
    difficulty: medium
    learning_objective: 1.1.3
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: '8'
      working: |
        - Diberikan $y = \frac{kx}{z}$.
        - Apabila $x = 4$ dan $z = 5$, $y = 10 \implies 10 = \frac{k \times 4}{5}$.
        - Oleh itu, $k = 12.5$.
        - Apabila $x = 8$ dan $z = 10$, $y = \frac{12.5 \times 8}{10} = 8$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menentukan bentuk persamaan yang betul."
      - marks: 1
        criteria: "Mengira nilai pemalar $k$ dengan betul."
      - marks: 1
        criteria: "Menggantikan nilai $x$ dan $z$ yang baru ke dalam persamaan."
      - marks: 1
        criteria: "Mengira nilai $y$ dengan betul."
    hints:
      - level: 1
        text: "Perhatikan hubungan tercantum yang melibatkan ketiga-tiga pemboleh ubah."
      - level: 2
        text: "Cari nilai k terlebih dahulu sebelum mencari nilai y yang baru."

  # Group by learning objective 1.2.2
  - id: Q4
    text: 'Jika $a$ berubah secara songsang dengan $b$, dan $a = 20$ apabila $b = 5$, cari nilai $a$ apabila $b = 10$.'
    difficulty: medium
    learning_objective: 1.2.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '10'
      working: |
        - Diberikan $a = \frac{k}{b}$.
        - Apabila $a = 20$ dan $b = 5$, $20 = \frac{k}{5} \implies k = 100$.
        - Oleh itu, apabila $b = 10$, $a = \frac{100}{10} = 10$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan bentuk persamaan songsang yang betul."
      - marks: 1
        criteria: "Mengira nilai pemalar $k$ dengan betul."
      - marks: 1
        criteria: "Menggantikan nilai $b$ yang baru ke dalam persamaan."
    hints:
      - level: 1
        text: "Ingat bahawa hubungan songsang bermaksud apabila satu pemboleh ubah meningkat, yang lain menurun."
      - level: 2
        text: "Gunakan formula a = k/b dan cari nilai k terlebih dahulu."

  # Group by learning objective 1.3.2
  - id: Q5
    text: 'Selesaikan masalah berikut: Jika $p$ berubah secara langsung dengan $q$ dan secara songsang dengan $r$, dan $p = 24$ apabila $q = 6$ dan $r = 4$, cari nilai $p$ apabila $q = 9$ dan $r = 6$.'
    difficulty: medium
    learning_objective: 1.3.2
    tp_level: 5
    kbat: true
    answer:
      type: exact
      value: '18'
      working: |
        - Diberi bahawa $p = \frac{kq}{r}$.
        - Apabila $q = 6$ dan $r = 4$, $p = 24 \implies 24 = \frac{k \times 6}{4}$.
        - Oleh itu, $k = 16$.
        - Apabila $q = 9$ dan $r = 6$, $p = \frac{16 \times 9}{6} = 18$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menentukan bentuk persamaan bergabung yang betul."
      - marks: 1
        criteria: "Mengira nilai pemalar $k$ dengan betul."
      - marks: 1
        criteria: "Menggantikan nilai $q$ dan $r$ yang baru ke dalam persamaan."
      - marks: 1
        criteria: "Mengira nilai $p$ dengan betul."
    hints:
      - level: 1
        text: "Hubungan bergabung melibatkan kedua-dua ubahan langsung dan songsang."
      - level: 2
        text: "Cari k dahulu sebelum mencari nilai p yang baru."