questions:
  # Learning Objective 6.1.1
  - id: Q1
    text: 'Diberi sudut $150^\circ$, tentukan nilai sinus, kosinus, dan tangen sudut tersebut.'
    difficulty: medium
    learning_objective: LO1
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: 'sin(150^\circ) = \frac{1}{2}, \cos(150^\circ) = -\frac{\sqrt{3}}{2}, \tan(150^\circ) = -\frac{1}{\sqrt{3}}'
      working: |
        - Sudut rujukan bagi $150^\circ$ ialah $180^\circ - 150^\circ = 30^\circ$.
        - Oleh itu, $\sin(150^\circ) = \sin(30^\circ) = \frac{1}{2}$.
        - $\cos(150^\circ) = -\cos(30^\circ) = -\frac{\sqrt{3}}{2}$.
        - $\tan(150^\circ) = -\tan(30^\circ) = -\frac{1}{\sqrt{3}}$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan sudut rujukan yang betul."
      - marks: 1
        criteria: "Mengira nilai sinus dan kosinus dengan betul."
      - marks: 1
        criteria: "Mengira nilai tangen dengan betul."
    hints:
      - level: 1
        text: 'Ingat bahawa sudut rujukan bagi sukuan II ialah $180^\circ - \text{sudut asal}$.'
      - level: 2
        text: 'Gunakan nilai fungsi trigonometri untuk $30^\circ$.'

  # Learning Objective 6.1.3
  - id: Q2
    text: 'Cari sudut antara $0^\circ$ hingga $360^\circ$ yang mempunyai $\sin \theta = -\frac{\sqrt{2}}{2}$.'
    difficulty: medium
    learning_objective: LO2
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: '225^\circ, 315^\circ'
      working: |
        - $\sin \theta = -\frac{\sqrt{2}}{2}$ menunjukkan $\theta$ berada di sukuan III atau IV.
        - Sudut rujukan bagi $\sin^{-1}(\frac{\sqrt{2}}{2})$ ialah $45^\circ$.
        - Di sukuan III, $\theta = 180^\circ + 45^\circ = 225^\circ$.
        - Di sukuan IV, $\theta = 360^\circ - 45^\circ = 315^\circ$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan sudut rujukan dengan betul."
      - marks: 1
        criteria: "Menentukan sudut dalam sukuan III dan IV dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan bahawa nilai negatif menunjukkan sudut berada di sukuan III atau IV."
      - level: 2
        text: "Cari sudut rujukan terlebih dahulu."

  # Learning Objective 6.2.1
  - id: Q3
    text: 'Lukis graf fungsi $y = \sin x$ bagi $0^\circ \leq x \leq 360^\circ$.'
    difficulty: medium
    learning_objective: LO3
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: 'Graf sinus dengan puncak pada $90^\circ$, $270^\circ$ adalah minima.'
      working: |
        - Graf sinus bermula dari titik asal $(0,0)$.
        - Memuncak pada $(90^\circ, 1)$.
        - Kembali ke titik asal pada $(180^\circ, 0)$.
        - Di minima pada $(270^\circ, -1)$.
        - Berakhir pada $(360^\circ, 0)$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menunjukkan bentuk gelombang sinus."
      - marks: 1
        criteria: "Menandakan puncak dan minima dengan betul."
      - marks: 1
        criteria: 'Melukis graf dari $0^\circ$ ke $360^\circ$ dengan betul.'
    hints:
      - level: 1
        text: "Perhatikan bahawa graf sinus berbentuk gelombang."
      - level: 2
        text: 'Graf sinus mempunyai puncak pada $90^\circ$ dan minima pada $270^\circ$.'

  # Learning Objective 6.2.2
  - id: Q4
    text: 'Kaji kesan pemalar $a$ terhadap graf fungsi $y = a \cos x$ dan nyatakan generalisasi kesannya.'
    difficulty: medium
    learning_objective: LO4
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Pemalar $a$ mengubah amplitud graf fungsi. Semakin besar nilai $a$, semakin tinggi amplitud graf."
      working: |
        - Apabila $a > 1$, amplitud graf meningkat.
        - Apabila $0 < a < 1$, amplitud graf menurun.
        - $a$ tidak mengubah tempoh atau kedudukan graf.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menerangkan perubahan amplitud dengan betul."
      - marks: 1
        criteria: "Menggeneralisasi kesan pemalar $a$ dengan tepat."
    hints:
      - level: 1
        text: "Fokus pada bagaimana $a$ mempengaruhi ketinggian puncak dan lembah graf."
      - level: 2
        text: "Amplitud ialah jarak dari garis tengah ke puncak graf."

  # Learning Objective 6.2.3
  - id: Q5
    text: 'Selesaikan masalah: Bagi fungsi $y = \tan x$, cari nilai $x$ antara $0^\circ$ hingga $360^\circ$ apabila $y = \sqrt{3}$.'
    difficulty: medium
    learning_objective: LO5
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '60^\circ, 240^\circ'
      working: |
        - $\tan x = \sqrt{3}$ menunjukkan $x$ berada di sukuan I dan III.
        - Sudut rujukan bagi $\tan^{-1}(\sqrt{3})$ ialah $60^\circ$.
        - Di sukuan I, $x = 60^\circ$.
        - Di sukuan III, $x = 180^\circ + 60^\circ = 240^\circ$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan sudut rujukan dengan betul."
      - marks: 1
        criteria: "Menentukan sudut dalam sukuan I dan III dengan betul."
    hints:
      - level: 1
        text: 'Ingat bahawa $\tan x$ mempunyai nilai positif di sukuan I dan III.'
      - level: 2
        text: 'Cari sudut rujukan terlebih dahulu untuk $\tan^{-1}(\sqrt{3})$.'