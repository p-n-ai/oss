questions:
  # Learning Objective 6.1.1 (analyze)
  - id: Q1
    text: 'Tentukan nilai sinus bagi sudut $120^\circ$ dan jelaskan bagaimana nilai ini berkaitan dengan sudut rujukan sepadan.'
    difficulty: medium
    learning_objective: 6.1.1
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: '0.866'
      working: |
        Sudut $120^\circ$ berada dalam sukuan II. Sudut rujukan sepadan ialah $180^\circ - 120^\circ = 60^\circ$. Nilai sinus bagi $60^\circ$ ialah $0.866$. Oleh itu, sinus bagi $120^\circ$ ialah $0.866$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan sudut rujukan sepadan."
      - marks: 1
        criteria: "Mengetahui nilai sinus bagi sudut rujukan."
      - marks: 1
        criteria: "Menerangkan hubungan nilai sinus dengan sudut rujukan."
    hints:
      - level: 1
        text: 'Ingat bahawa sudut dalam sukuan II adalah $180^\circ - x$.'

  # Learning Objective 6.1.2 (apply)
  - id: Q2
    text: 'Hitungkan nilai kosinus bagi sudut $240^\circ$.'
    difficulty: medium
    learning_objective: 6.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '-0.5'
      working: |
        Sudut $240^\circ$ berada dalam sukuan III. Sudut rujukan sepadan ialah $240^\circ - 180^\circ = 60^\circ$. Nilai kosinus bagi $60^\circ$ ialah $0.5$. Oleh kerana sudut tersebut berada dalam sukuan III, nilai kosinus adalah negatif, jadi kosinus bagi $240^\circ$ ialah $-0.5$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan sudut rujukan sepadan."
      - marks: 1
        criteria: "Mengira nilai kosinus berdasarkan sukuan."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Jangan lupa bahawa kosinus adalah negatif dalam sukuan III."

  # Learning Objective 6.1.3 (apply)
  - id: Q3
    text: 'Cari sudut dalam julat $0^\circ \leq x < 360^\circ$ jika $\tan x = -1$.'
    difficulty: medium
    learning_objective: 6.1.3
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: '135^\circ, 315^\circ'
      options:
        - '45^\circ, 225^\circ'
        - '135^\circ, 315^\circ'
        - '90^\circ, 270^\circ'
        - '180^\circ, 360^\circ'
      working: |
        Tan $x = -1$ bermaksud sudut tersebut berada dalam sukuan II atau IV. Sudut rujukan ialah $45^\circ$. Oleh itu, sudut yang mungkin ialah $180^\circ - 45^\circ = 135^\circ$ dan $360^\circ - 45^\circ = 315^\circ$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan sudut rujukan yang betul."
      - marks: 1
        criteria: "Menentukan sudut dalam sukuan II dan IV."
    hints:
      - level: 1
        text: "Ingat bahawa tangen adalah negatif dalam sukuan II dan IV."

  # Learning Objective 6.2.1 (apply)
  - id: Q4
    text: 'Lukis graf fungsi $y = \cos x$ bagi $0^\circ \leq x \leq 360^\circ$.'
    difficulty: medium
    learning_objective: 6.2.1
    tp_level: 4
    kbat: false
    answer:
      type: free_text
      value: 'Graf sinusoidal dengan puncak pada $0^\circ$, $180^\circ$, dan $360^\circ$.'
      working: |
        Graf $y = \cos x$ bermula dari 1 pada $0^\circ$, turun ke -1 pada $180^\circ$, dan kembali ke 1 pada $360^\circ$. Bentuk graf menyerupai gelombang sinusoidal.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan titik maksimum dan minimum."
      - marks: 1
        criteria: "Melukis bentuk sinusoidal yang betul."
      - marks: 1
        criteria: "Labelkan titik penting pada paksi x."
    hints:
      - level: 1
        text: 'Pertimbangkan bentuk asas graf kosinus dari $0^\circ$ ke $360^\circ$.'

  # Learning Objective 6.2.2 (create)
  - id: Q5
    text: 'Kaji kesan perubahan pemalar $a$ dalam fungsi $y = a\sin x$ dengan $a > 0$.'
    difficulty: medium
    learning_objective: 6.2.2
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: 'Peningkatan nilai $a$ meningkatkan amplitud graf.'
      working: |
        Fungsi $y = a\sin x$ menunjukkan bahawa $a$ adalah amplitud fungsi. Apabila $a$ meningkat, amplitud graf juga meningkat, menyebabkan graf menegak lebih tinggi dan lebih rendah dari paksi x.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenalpasti peranan $a$ dalam persamaan."
      - marks: 1
        criteria: "Menjelaskan hubungan antara $a$ dan amplitud."
      - marks: 1
        criteria: "Memberikan contoh perubahan graf dengan nilai $a$ yang berbeza."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Jangan keliru antara amplitud dan frekuensi."