questions:
  # Learning Objective 5.1.1 (analyze)
  - id: Q1
    text: 'Dua segi tiga, $\triangle ABC$ dan $\triangle DEF$, adalah kongruen. Jika $AB = 5 \text{ cm}$, $BC = 7 \text{ cm}$, dan $\angle ABC = 60^\circ$, tentukan panjang $DE$ dan $EF$, serta $\angle DEF$.'
    difficulty: medium
    learning_objective: LO1
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: 'DE = 5 \text{ cm}, EF = 7 \text{ cm}, \angle DEF = 60^\circ'
      working: |
        Since $\triangle ABC$ and $\triangle DEF$ are congruent, corresponding sides and angles are equal. Therefore, $DE = AB = 5 \text{ cm}$, $EF = BC = 7 \text{ cm}$, and $\angle DEF = \angle ABC = 60^\circ$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly identifies one pair of corresponding sides."
      - marks: 1
        criteria: "Correctly identifies both pairs of corresponding sides."
      - marks: 1
        criteria: "Correctly identifies corresponding angles."
    hints:
      - level: 1
        text: "Review the properties of congruent triangles."
      - level: 2
        text: "MISCONCEPTION ALERT: Ensure to match corresponding sides and angles."

  # Learning Objective 5.1.3 (apply)
  - id: Q2
    text: 'Diberikan dua segi tiga, $\triangle XYZ$ dan $\triangle PQR$. Jika $XY = PR$, $YZ = PQ$, dan $\angle XYZ = \angle PQR$, adakah kedua-dua segi tiga ini kongruen? Jelaskan jawapan anda.'
    difficulty: medium
    learning_objective: LO3
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Ya, kerana dua sisi dan sudut di antara mereka adalah sama (SAS)."
      working: |
        By the Side-Angle-Side (SAS) congruence criterion, if two sides and the included angle are equal in both triangles, they are congruent. Thus, $\triangle XYZ \cong \triangle PQR$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identifies correct congruence criterion."
      - marks: 1
        criteria: "Justifies using SAS criterion correctly."
    hints:
      - level: 1
        text: "Recall the criteria for triangle congruence."
      - level: 2
        text: "MISCONCEPTION ALERT: Ensure the angle is included between the two sides."

  # Learning Objective 5.2.2 (understand)
  - id: Q3
    text: "Bagaimana keserupaan segi empat sama boleh diterangkan melalui pembesaran?"
    difficulty: medium
    learning_objective: LO4
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Keserupaan segi empat sama boleh diterangkan dengan pembesaran yang mengekalkan nisbah panjang sisi yang sama."
      working: |
        Similar figures maintain the same shape but differ in size. For squares, this can be achieved by enlarging or reducing the side lengths proportionally.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Describes similarity in basic terms."
      - marks: 1
        criteria: "Explains how enlargement retains side length ratio."
    hints:
      - level: 1
        text: "Consider how side lengths change in similar figures."
      - level: 2
        text: "MISCONCEPTION ALERT: Similar figures have proportional, not equal, side lengths."

  # Learning Objective 5.3.4 (apply)
  - id: Q4
    text: 'Selesaikan masalah berikut: Gabungan dua transformasi dilakukan pada segitiga ABC. Transformasi pertama adalah putaran $90^\circ$ mengikut arah jam sekitar titik asal, diikuti oleh pembesaran dengan faktor skala 2. Tentukan koordinat imej bagi titik $A(2, 3)$.'
    difficulty: medium
    learning_objective: LO8
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "(6, -4)"
      working: |
        First, apply the rotation: $(2, 3) \to (3, -2)$ after rotating $90^\circ$ clockwise. Then apply the enlargement: $(3, -2) \to (6, -4)$ by multiplying each coordinate by the scale factor 2.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly applies rotation transformation."
      - marks: 1
        criteria: "Correctly applies enlargement transformation."
      - marks: 1
        criteria: "Correctly finds the final coordinates."
    hints:
      - level: 1
        text: "Apply each transformation step-by-step."
      - level: 2
        text: "MISCONCEPTION ALERT: Double-check the direction of rotation."

  # Learning Objective 5.4.2 (create)
  - id: Q5
    text: "Rancang satu teselasi yang melibatkan transformasi isometri menggunakan segi empat tepat."
    difficulty: medium
    learning_objective: LO11
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Gunakan pantulan dan translasi untuk mencipta pola teselasi dengan segi empat tepat yang berulang tanpa ruang kosong."
      working: |
        To design the tessellation, start with a rectangle. Reflect the rectangle across one of its sides, then translate it along a plane to fill the space without gaps.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Identifies appropriate transformations."
      - marks: 1
        criteria: "Describes the process of tessellating with rectangles."
      - marks: 1
        criteria: "Ensures the tessellation fills space without gaps."
    hints:
      - level: 1
        text: "Consider how shapes can cover a plane completely."
      - level: 2
        text: "MISCONCEPTION ALERT: Ensure no gaps or overlaps in tessellation."