  # Learning Objective: 5.1.1 (analyze)
  - id: Q1
    text: 'Dua segi tiga, $\triangle ABC$ dan $\triangle DEF$, mempunyai ukuran sisi yang sama tetapi sudut berbeza. Adakah kedua-dua segi tiga ini adalah kongruen? Jelaskan.'
    difficulty: medium
    learning_objective: 5.1.1
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: 'Tidak, segi tiga ini tidak kongruen kerana walaupun sisi adalah sama, sudut tidak sama.'
      working: |
        Untuk dua segi tiga menjadi kongruen, kedua-dua sisi dan sudut mesti sama. Dalam kes ini, walaupun sisi sama, sudut berbeza, maka kedua-dua segi tiga tidak kongruen.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Mengenal pasti bahawa sisi sama.'
      - marks: 1
        criteria: 'Menjelaskan bahawa sudut mesti sama untuk kekongruenan.'
      - marks: 1
        criteria: 'Kesimpulan yang tepat bahawa segi tiga tidak kongruen.'
    hints:
      - level: 1
        text: 'MISCONCEPTION ALERT: Adakah hanya sisi yang sama sudah mencukupi untuk kongruensi?'
      - level: 2
        text: 'Pertimbangkan hubungan antara sisi dan sudut dalam segi tiga kongruen.'

  # Learning Objective: 5.1.3 (apply)
  - id: Q2
    text: 'Diberi dua segi tiga, $\triangle PQR$ dan $\triangle XYZ$, dengan ukuran $PQ = 5 \text{cm}$, $QR = 7 \text{cm}$, $RP = 6 \text{cm}$, $XY = 5 \text{cm}$, $YZ = 7 \text{cm}$, dan $ZX = 6 \text{cm}$. Tentukan sama ada kedua-dua segi tiga ini kongruen.'
    difficulty: medium
    learning_objective: 5.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: 'Ya, kedua-dua segi tiga adalah kongruen.'
      working: |
        Ukuran sisi segi tiga adalah sama: $PQ = XY$, $QR = YZ$, dan $RP = ZX$. Oleh itu, $\triangle PQR \equiv \triangle XYZ$ berdasarkan kriteria SSS (Side-Side-Side).
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Menggunakan kriteria SSS untuk menentukan kongruensi.'
      - marks: 1
        criteria: 'Menentukan bahawa kedua-dua segi tiga adalah kongruen.'
    hints:
      - level: 1
        text: 'Periksa sama ada ketiga-tiga sisi dari kedua-dua segi tiga adalah sama.'

  # Learning Objective: 5.2.3 (apply)
  - id: Q3
    text: 'Suatu objek berbentuk segi empat tepat dengan panjang 4 cm dan lebar 3 cm dibesarkan dengan faktor skala 2. Tentukan panjang dan lebar imej yang terbentuk.'
    difficulty: medium
    learning_objective: 5.2.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: 'Panjang: 8 cm, Lebar: 6 cm'
      working: |
        Panjang imej = $4 \text{cm} \times 2 = 8 \text{cm}$.
        Lebar imej = $3 \text{cm} \times 2 = 6 \text{cm}$.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Mengira panjang imej dengan betul.'
      - marks: 1
        criteria: 'Mengira lebar imej dengan betul.'
    hints:
      - level: 1
        text: 'Gunakan faktor skala untuk membesarkan panjang dan lebar asal.'

  # Learning Objective: 5.3.1 (apply)
  - id: Q4
    text: 'Diberikan titik A(2, 3). Tentukan koordinat imej titik ini selepas gabungan transformasi translasi oleh vektor $\begin{pmatrix} 3 \\ 2 \end{pmatrix}$ diikuti putaran 90 darjah lawan arah jam dengan pusat di asal (0,0).'
    difficulty: medium
    learning_objective: 5.3.1
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: 'Koordinat imej: (-1, 5)'
      working: |
        Selepas translasi, A' = (2+3, 3+2) = (5, 5).
        Selepas putaran 90 darjah lawan arah jam, A'' = (-y, x) = (-5, 5).
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menentukan koordinat selepas translasi dengan betul.'
      - marks: 1
        criteria: 'Menentukan koordinat selepas putaran dengan betul.'
      - marks: 1
        criteria: 'Menghasilkan koordinat imej akhir dengan tepat.'
    hints:
      - level: 1
        text: 'Lakukan translasi terlebih dahulu sebelum putaran.'
      - level: 2
        text: 'Putaran 90 darjah lawan arah jam menukar (x, y) kepada (-y, x).'

  # Learning Objective: 5.4.2 (create)
  - id: Q5
    text: 'Reka satu teselasi menggunakan transformasi isometri dengan bentuk segi empat tepat. Nyatakan jenis transformasi yang digunakan.'
    difficulty: medium
    learning_objective: 5.4.2
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: 'Teselasi yang dibina menggunakan translasi dan pantulan dengan bentuk segi empat tepat.'
      working: |
        Bentuk segi empat tepat diulang dalam corak grid menggunakan translasi. Pantulan boleh digunakan untuk membina simetri dalam teselasi.
    marks: 4
    rubric:
      - marks: 1
        criteria: 'Menggunakan sekurang-kurangnya satu bentuk segi empat tepat.'
      - marks: 1
        criteria: 'Menggunakan translasi dalam teselasi.'
      - marks: 1
        criteria: 'Menggunakan pantulan dalam teselasi.'
      - marks: 1
        criteria: 'Menerangkan jenis transformasi dengan jelas.'
    hints:
      - level: 1
        text: 'MISCONCEPTION ALERT: Ingat bahawa teselasi boleh menggunakan lebih dari satu jenis transformasi.'
      - level: 2
        text: 'Pertimbangkan bagaimana bentuk berulang dalam corak grid.'