id: "MT3-06"
questions:
  - id: "MT3-06-Q01"
    type: "multiple_choice"
    text: "Based on the properties of circles, if an angle at the circumference and a central angle are subtended by the same arc, what is the relationship between them?"
    difficulty: "easy"
    learning_objective: "6.1.1"
    tp_level: 1
    answer:
      type: "multiple_choice"
      value: "The central angle is twice the angle at the circumference."
      working: |
        Step 1: Identify the angles subtended by the same arc.
        Step 2: Apply Theorem: Central angle = 2 × Circumference angle.
      distractors:
        - value: "They are equal."
          feedback: "This only applies if both angles are at the circumference and subtended by the same arc. The central angle is always larger."
        - value: "The angle at the circumference is twice the central angle."
          feedback: "You have the relationship reversed! Remember the 'Parent-Child' rule: the Center (Parent) is always bigger/double."
    marks: 1

  - id: "MT3-06-Q02"
    type: "subjective"
    text: "In a circle with centre $O$, the angle at the circumference $\angle ACB = 40^\circ$. Calculate the value of the central angle $\angle AOB$ subtended by the same arc $AB$."
    difficulty: "medium"
    learning_objective: "6.1.1"
    tp_level: 3
    answer:
      type: "exact"
      value: "80^\circ"
      working: |
        Step 1: State the relationship: $\angle AOB = 2 \times \angle ACB$.
        Step 2: Substitute value: $\angle AOB = 2 \times 40^\circ$.
        Step 3: Calculate: $\angle AOB = 80^\circ$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct application of the central angle theorem."
      - marks: 1
        criteria: "Final answer with correct units."
    hints:
      - "Look at the arc $AB$. One angle is at the centre ($O$) and one is on the edge. Which one is doubled?"
      - "Try multiplying the given circumference angle by 2."

  - id: "MT3-06-Q03"
    type: "mapping"
    text: "Match the following circle properties to their correct descriptions."
    difficulty: "easy"
    learning_objective: "6.2.1"
    tp_level: 2
    answer:
      type: "multiple_choice"
      value: "Cyclic Quadrilateral -> All four vertices lie on the circumference; Opposite Angles -> Sum up to 180 degrees."
      working: "Identify definitions from Textbook p. 144-145."
    marks: 2

  - id: "MT3-06-Q04"
    type: "subjective"
    text: "$ABCD$ is a cyclic quadrilateral. Given that $\angle ABC = 75^\circ$ and $\angle BCD = 110^\circ$, find the value of $\angle ADC$."
    difficulty: "medium"
    learning_objective: "6.2.2"
    tp_level: 3
    answer:
      type: "exact"
      value: "105^\circ"
      working: |
        Step 1: Identify opposite angles in cyclic quadrilateral $ABCD$. $\angle ABC$ is opposite to $\angle ADC$.
        Step 2: Apply theorem: $\angle ABC + \angle ADC = 180^\circ$.
        Step 3: Calculate: $\angle ADC = 180^\circ - 75^\circ = 105^\circ$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Identify that opposite angles are supplementary."
      - marks: 1
        criteria: "Correct subtraction from 180."
    hints:
      - "Recall that in a cyclic quadrilateral, the 'magic number' for opposite angles is 180."
      - "Which angle sits directly across from $\angle ABC$? Use that to subtract from 180."

  - id: "MT3-06-Q05"
    type: "subjective"
    text: "Line $PQR$ is a tangent to a circle at point $Q$. $OQ$ is the radius of the circle. Determine the size of $\angle OQR$ and explain why."
    difficulty: "easy"
    learning_objective: "6.3.2"
    tp_level: 2
    answer:
      type: "exact"
      value: "90^\circ"
      working: |
        Step 1: Identify the line as a tangent and $OQ$ as the radius.
        Step 2: Apply the Tangent-Radius theorem: The radius is perpendicular to the tangent at the point of tangency.
    marks: 2
    rubric:
      - marks: 1
        criteria: "State 90 degrees."
      - marks: 1
        criteria: "Reason: Radius is perpendicular to tangent."
    hints:
      - "Think about the '90-degree handshake' rule from our notes."

  - id: "MT3-06-Q06"
    type: "subjective"
    text: "A gear system consists of two circles with common tangents. Using the concept of 'Common Tangents' (Textbook p. 157), if two circles are touching each other at one point, how many common tangents can be drawn in total?"
    difficulty: "hard"
    learning_objective: "6.3.3"
    tp_level: 4
    answer:
      type: "exact"
      value: "3"
      working: |
        Step 1: Visualize two circles touching externally.
        Step 2: Identify two outer common tangents.
        Step 3: Identify one internal common tangent passing through the point of contact.
    marks: 3
    rubric:
      - marks: 2
        criteria: "Identify all 3 tangent paths."
      - marks: 1
        criteria: "Correct final count."
    hints:
      - "Don't just look at the outside. Is there a line that can touch both circles right where they meet?"

  - id: "MT3-06-Q07"
    type: "subjective"
    text: "A designer is creating a logo using a circle and a triangle where one side of the triangle is a tangent. If the angle in the alternate segment is $65^\circ$, what is the angle between the tangent and the chord? (TP5 Routine Complex)"
    difficulty: "hard"
    learning_objective: "6.4.1"
    tp_level: 5
    answer:
      type: "exact"
      value: "65^\circ"
      working: |
        Step 1: Apply Alternate Segment Theorem.
        Step 2: The angle between the tangent and chord is equal to the angle in the alternate segment.
    marks: 2
    hints:
      - "This is the 'Mirror Reflection' rule. If it is 65 inside, what must it be outside?"
