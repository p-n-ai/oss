worked_examples:
  # --- LO 8.1.1: Understanding Locus (TP2) ---
  - id: WE-01
    topic: "Introduction to Locus"
    difficulty: easy
    real_world_analogy: "Think of a 'Ghost Trail'. If you wave a sparkler in the dark, the glowing line you see is the 'locus' of the sparkler's tip."
    misconception_alert: "Students often think a locus is just the final destination point. Remind them: The locus is the *entire path* or set of all possible points that fit the rule."
    scenario: "A piece of colored sticker is pasted on the tire of a bicycle. Describe and sketch the locus generated by the sticker when the bicycle is pedalled stationary on a stand."
    working: |
      Step 1: Identify the fixed point. The axle (center) of the bicycle wheel is the fixed point.
      Step 2: Identify the condition. The sticker stays at a constant distance from the axle as the wheel rotates.
      Step 3: Apply the definition. According to textbook page 200, a trace formed by a set of points satisfying a condition is a locus.
      Step 4: Determine the shape. A set of points at a constant distance from a fixed point forms a circle.
      Step 5: Conclusion. The locus of the sticker is a circle.
    
  # --- LO 8.2.1: Locus Equidistant from Two Points (TP3) ---
  - id: WE-02
    topic: "Locus Equidistant from Two Fixed Points"
    difficulty: medium
    real_world_analogy: "The 'Fair Boundary Line'. Imagine two friends standing apart. If you want to walk exactly between them so you aren't closer to one than the other, you must walk a straight line right down the middle."
    misconception_alert: "Students often forget that this locus must be perpendicular (90 degrees) to the line connecting the two points. They might just draw any line in the middle."
    scenario: "Two goalposts, P and Q, are 8 meters apart. Construct the locus of a ball that is always equidistant from both goalposts."
    working: |
      Step 1: Mark two fixed points, P and Q, to represent the goalposts.
      Step 2: Use a pair of compasses. Set the width to more than half the distance of PQ (e.g., 5m).
      Step 3: Place the compass tip on P and draw an arc above and below the line PQ.
      Step 4: Keeping the same width, place the compass tip on Q and draw arcs that intersect the first two arcs.
      Step 5: Use a ruler to draw a straight line through the two intersection points.
      Step 6: Generalization. This line is the 'perpendicular bisector' of PQ (Textbook page 206).
    
  # --- LO 8.2.2: Loci satisfying two or more conditions (TP4) ---
  - id: WE-03
    topic: "Intersection of Loci"
    difficulty: hard
    real_world_analogy: "The 'Treasure Map' (X marks the spot). If the treasure is 3m from a tree AND 3m from a rock, the treasure is only at the specific points where those two circles cross."
    misconception_alert: "Students often draw the two loci but forget to clearly mark the intersection point with the required symbol ⊗."
    scenario: "On a square grid with sides of 1 unit, draw locus X for a point 3 units from point A, and locus Y for a point equidistant from lines AB and AD. Mark the intersection."
    working: |
      Step 1: Identify Condition 1. Locus X is a fixed distance (3 units) from fixed point A. This is a circle/arc.
      Step 2: Draw Locus X. Use a compass centered at A with a radius of 3 units.
      Step 3: Identify Condition 2. Locus Y is equidistant from two intersecting lines, AB and AD.
      Step 4: Apply Generalization. According to page 211, the locus of points equidistant from two intersecting lines is the 'angle bisector'.
      Step 5: Draw Locus Y. Since it is a square corner (90 degrees), the angle bisector is the diagonal line of the grid starting from A.
      Step 6: Mark the intersection. Find where the arc (Locus X) and the diagonal (Locus Y) meet. Mark it clearly with the symbol ⊗.

  # --- LO 8.2.3: Solve problems involving loci (TP5/6) ---
  - id: WE-04
    topic: "Real-World Problem Solving"
    difficulty: hard
    real_world_analogy: "The 'Safe Zone' for a goat. If a goat is tied to a corner with a rope, it can only eat the grass within the reach of that rope—no further!"
    misconception_alert: "In rectangular field problems, students often draw a full circle. Remind them that the locus is limited by the physical boundaries (the fence)."
    scenario: "A goat is tied to corner Q of a rectangular fenced grass field PQRS (6m x 8m) with a 7m rope. Shade the region reachable by the goat."
    working: |
      Step 1: Understand the problem. The goat is at a fixed point (Q) and its maximum distance is the rope length (7m).
      Step 2: Plan. The locus is a circle with radius 7m, but it is restricted inside the rectangle PQRS.
      Step 3: Compare distances. The rope (7m) is longer than the side QR (6m) but shorter than the side QP (8m).
      Step 4: Construction. Draw an arc of radius 7m centered at Q. 
      Step 5: Boundary Check. The arc will cross the fence line PS and RS.
      Step 6: Shading. Shade the area inside the arc that is also inside the rectangle. This is the 'grazing region' (Textbook page 217).