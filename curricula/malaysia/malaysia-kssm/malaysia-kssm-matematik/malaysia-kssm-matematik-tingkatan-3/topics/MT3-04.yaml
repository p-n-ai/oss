teaching:
    sequence:
        - 'Step 1: Introduce the concept of scale using real-life examples like maps and models (15 min)'
        - 'Step 2: Guide students through interpreting scales such as 1:100 or 1:50 (20 min)'
        - 'Step 3: Teach calculation of real dimensions from scaled drawings and vice versa (25 min)'
        - 'Step 4: Hands-on activity creating a scaled drawing of a classroom object (30 min)'
        - 'Step 5: Solve real-world problems using scaled drawings (20 min)'
    common_misconceptions:
        - misconception: Scale equals size
          remediation: Use multiple examples to illustrate that scale is a ratio, not size
        - misconception: Incorrect scale ratio interpretation
          remediation: Reinforce scale direction with visual aids and consistent examples
