teaching:
  sequence:
    - "Step 1: Introduce the concept of scale using real-life examples like maps and models (15 min)"
    - "Step 2: Guide students through interpreting scales such as 1:n or 1:1/n (20 min)"
    - "Step 3: Teach calculation of real dimensions from scaled drawings and vice versa (25 min)"
    - "Step 4: Hands-on activity creating a scaled drawing on various grid sizes (30 min)"
    - "Step 5: Solve real-world and non-routine problems involving scale drawings (20 min)"
  
  common_misconceptions:
    - misconception: "Scale equals physical size"
      remediation: "Use multiple examples to illustrate that scale is a ratio of proportions, not the actual size of the paper."
    - misconception: "Incorrect scale ratio direction (Inversion Trap)"
      remediation: "Reinforce that 1:n where n > 1 is a reduction, and n < 1 is an enlargement using visual aids."

  engagement_hooks:
    - "Discuss the use of scale in designing iconic skyscrapers like the Merdeka 118 or architectural blueprints."
    - "Explore how mobile navigation apps (Google Maps) dynamically change scale when zooming in and out."

