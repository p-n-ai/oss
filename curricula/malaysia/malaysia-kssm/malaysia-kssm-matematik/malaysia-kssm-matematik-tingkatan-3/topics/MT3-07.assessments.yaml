questions:
  # --- Subchapter 7.1: Orthogonal Projections ---
  - id: Q1
    text: "Which of the following describes an orthogonal projection?"
    difficulty: easy
    learning_objective: "7.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "An image formed on a plane when the projected line from an object is perpendicular to the plane."
      working: |
        Step 1: Recall the definition of 'orthogonal' which means at right angles (90 degrees).
        Step 2: Compare with DSKP/Textbook definition on page 171.
      distractors:
        - value: "A three-dimensional sketch of an object seen from a specific corner."
          feedback: "That sounds more like a perspective drawing. Orthogonal projections are strictly 2D images formed perpendicular to a plane."
        - value: "The shadow of an object cast by a light source at an inclined angle."
          feedback: "If the angle is inclined, it is not 'orthogonal'. The projection must be perpendicular (normal) to the plane."
    marks: 1
    hints:
      - "Think about the word 'Orthogonal'. What angle does it imply?"
      - "Check page 171 of your textbook. Look for the relationship between the projected line and the plane."

  - id: Q2
    text: "State whether the following statement is TRUE or FALSE: 'The length of the projected side in an orthogonal projection is always equal to or shorter than the actual length of the side of the object.'"
    difficulty: medium
    learning_objective: "7.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "TRUE"
      working: |
        Step 1: Analyze Brainstorming 2 (page 179).
        Step 2: If a side is parallel to the plane, length is equal. If it is inclined, the projection is shorter.
      distractors: []
    marks: 1
    hints:
      - "Imagine a pencil held parallel to the floor vs. held at an angle. Which shadow is longer?"
      - "Look at the 'Results of findings' table on page 180 regarding side lengths."

  - id: Q3
    text: "A cylinder with a diameter of $4\\text{ cm}$ and height of $6\\text{ cm}$ is placed on a horizontal plane. Draw the orthogonal projection as viewed from the side (vertical plane)."
    difficulty: medium
    learning_objective: "7.1.1"
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "A rectangle with a width of 4 cm and a height of 6 cm."
      working: |
        Step 1: Identify the viewing direction (side view).
        Step 2: The 'normal' to the vertical plane from the cylinder's curved surface forms a rectangle.
        Step 3: Dimensions: Diameter becomes width (4 cm), Height remains height (6 cm).
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct shape (Rectangle)."
      - marks: 2
        criteria: "Correct labels and dimensions ($4\\text{ cm} \\times 6\\text{ cm}$)."
      - marks: 3
        criteria: "All solid lines drawn neatly (no hidden edges for this view)."
    hints:
      - "If you look at a tin of beans directly from the side, do you see a circle or a flat rectangle?"
      - "Check Example 5(b) on page 176 for the exact visual reference."

  # --- Subchapter 7.2: Plans and Elevations ---
  - id: Q4
    text: "When drawing a side elevation using the four-quadrant method, which type of line is used to represent an edge that is hidden from view?"
    difficulty: easy
    learning_objective: "7.2.1"
    tp_level: 3
    kbat: false
    answer:
      type: multiple_choice
      value: "Dashed line"
      working: |
        Step 1: Refer to 'TIPS' on page 184.
        Step 2: Hidden sides = dashed lines; Visible sides = thick solid lines.
      distractors:
        - value: "Thin solid line"
          feedback: "Thin solid lines are used for construction and projection lines, not for the object's edges."
        - value: "Thick solid line"
          feedback: "Thick solid lines are only for edges that you can actually see from that direction."
    marks: 1
    hints:
      - "Think about the 'X-ray' rule mentioned in your teaching notes. How do we draw what's hidden?"
      - "Look at the 'TIPS' box on page 184."

  - id: Q5
    text: "Sketch the three-dimensional object synthesized from a Plan (square), a Front Elevation (triangle), and a Side Elevation (triangle)."
    difficulty: hard
    learning_objective: "7.2.2"
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: "A right pyramid with a square base."
      working: |
        Step 1: Analyze the Plan - the base is a square.
        Step 2: Analyze Elevations - both are triangles, meaning the sides slope to a single vertex.
        Step 3: Combine: Square base + triangular sides = Pyramid.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Identify the object as a pyramid."
      - marks: 4
        criteria: "Sketch clearly shows the 3D perspective with dashed lines for hidden back edges."
    hints:
      - "If the bottom is a square but the front and side views look like the Great Pyramid of Giza, what is it?"
      - "Refer to page 188, Example 10 for how to connect vertices to create the solid."

  - id: Q6
    text: "A project requires building a study hut in an area of $5\\text{ m} \\times 5\\text{ m}$. If the cost of building materials is $\\text{RM } 2.50$ per $1\\text{ cm}^3$ of a scale model, calculate the total cost for a model prism with a base area of $20\\text{ cm}^2$ and height of $10\\text{ cm}$."
    difficulty: hard
    learning_objective: "7.2.3"
    tp_level: 6
    kbat: true
    answer:
      type: exact
      value: "500"
      working: |
        Step 1: Calculate volume of the model: $\\text{Base Area} \\times \\text{Height} = 20 \\times 10 = 200\\text{ cm}^3$.
        Step 2: Multiply by cost per unit: $200 \\times 2.50 = 500$.
        Step 3: Total cost = RM 500.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correct calculation of volume ($200\\text{ cm}^3$)."
      - marks: 3
        criteria: "Correct final cost calculation with RM unit."
    hints:
      - "First, find the total space (volume) the model takes up in $\\text{cm}^3$."
      - "Now, if each 'cube' of $\\text{cm}^3$ costs RM 2.50, how much for 200 of them?"
      - "This relates to the STEM project on page 195 and the problem solving in Example 11."