topic_id: "MT3-04"
provenance: "curriculum-audit-rewrite"
questions:
  # TP1 - Learning Objective 4.1.1 (OPB/True-False)
  - id: Q1
    text: "True or False: A scale drawing always represents an object in a smaller size than its actual size."
    difficulty: "easy"
    learning_objective: "4.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: "multiple_choice"
      value: "False"
      working: |
        - Scale $1:n$ where $n > 1$: Reduction (smaller).
        - Scale $1:n$ where $n < 1$: Enlargement (bigger).
        - Scale $1:n$ where $n = 1$: Same size.
        Since it can be bigger or the same size, the statement 'always smaller' is False.
      distractors:
        - value: "True"
          feedback: "Remember the 'Enlargement Trap'! If the scale is $1 : 0.5$, the drawing is actually twice as large as the real object."
    marks: 1
    hints:
      - level: 1
        text: "Think about blueprints of tiny computer chips. Would we draw them smaller or bigger to see the details?"

  # TP2 - Learning Objective 4.1.2 (OAP/Multiple Choice)
  - id: Q2
    text: "A scale of $1 : 200,000$ means $1 \text{ cm}$ on the map represents how many kilometers in real life?"
    difficulty: "easy"
    learning_objective: "4.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: "multiple_choice"
      value: "2 km"
      working: |
        1. Ratio is $1 \text{ cm} : 200,000 \text{ cm}$.
        2. Convert cm to m: $200,000 / 100 = 2,000 \text{ m}$.
        3. Convert m to km: $2,000 / 1,000 = 2 \text{ km}$.
      distractors:
        - value: "20 km"
          feedback: "Check your zero counting! You might have subdivided incorrectly. $100,000 \text{ cm} = 1 \text{ km}$."
        - value: "0.2 km"
          feedback: "Check the decimal point move. $200,000 \text{ cm}$ is $2 \text{ km}$, not $0.2 \text{ km}$."
    marks: 2
    hints:
      - level: 1
        text: "How many centimeters are in $1 \text{ meter}$? And how many meters in $1 \text{ kilometer}$?"

  # TP3 - Learning Objective 4.1.3 (Subjective/Exact Value)
  - id: Q3
    text: "A rectangular room has a length of $5.2 \text{ m}$. On a scale drawing, it is represented by a length of $10.4 \text{ cm}$. Determine the scale used in the form $1 : n$."
    difficulty: "medium"
    learning_objective: "4.1.3"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "1:50"
      working: |
        1. Convert actual length to cm: $5.2 \text{ m} \times 100 = 520 \text{ cm}$.
        2. Set up ratio $\text{Drawing} : \text{Object} \Rightarrow 10.4 : 520$.
        3. Simplify to $1 : n$ by dividing both by $10.4$: $10.4 / 10.4 : 520 / 10.4 = 1 : 50$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correct unit conversion (520 cm)."
      - marks: 1
        criteria: "Correct final scale (1:50)."
    hints:
      - level: 1
        text: "First, dress the numbers in the same outfit! Convert $5.2 \text{ m}$ to $\text{cm}$ before you compare them."

  # TP3 - Learning Objective 4.1.4 (OAP/Drawing Context)
  - id: Q4
    text: "An object has a length of $6 \text{ cm}$. If it is drawn using a scale of $1 : \frac{1}{3}$, what is the length of the scale drawing?"
    difficulty: "medium"
    learning_objective: "4.1.4"
    tp_level: 3
    kbat: false
    answer:
      type: "multiple_choice"
      value: "18 cm"
      working: |
        1. Scale $1 : n$, where $n = 1/3$.
        2. $\text{Drawing} / \text{Object} = 1 / (1/3) = 3$.
        3. $\text{Drawing} = 3 \times \text{Object} = 3 \times 6 \text{ cm} = 18 \text{ cm}$.
      distractors:
        - value: "2 cm"
          feedback: "You might have treated the scale as $1:3$ (reduction). $1:1/3$ is an enlargement!"
        - value: "6 cm"
          feedback: "The scale is not $1:1$. The drawing size must change."
    marks: 2
    hints:
      - level: 1
        text: "If $n$ is a fraction less than 1, the drawing will be BIGGER than the object. Are you enlarging or shrinking?"

  # TP4 - Learning Objective 4.1.5 (Subjective/Routine Problem Solving)
  - id: Q5
    text: "The distance between Bintulu and Miri on a map is $4 \text{ cm}$ with a scale of $1 \text{ cm} : 50 \text{ km}$. If an airplane flies at a speed of $80 \text{ km/h}$, calculate the time taken to travel between the two towns in hours and minutes."
    difficulty: "medium"
    learning_objective: "4.1.5"
    tp_level: 4
    kbat: true
    answer:
      type: "free_text"
      value: "2 hours 30 minutes"
      working: |
        1. Actual distance = $4 \text{ cm} \times 50 \text{ km/cm} = 200 \text{ km}$.
        2. $\text{Time} = \text{Distance} / \text{Speed} = 200 \text{ km} / 80 \text{ km/h} = 2.5 \text{ hours}$.
        3. $0.5 \text{ hours} = 0.5 \times 60 = 30 \text{ minutes}$.
        4. Total Time = 2 hours 30 minutes.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Correct actual distance (200 km)."
      - marks: 2
        criteria: "Correct time conversion to hours and minutes."
    hints:
      - level: 1
        text: "Find the real distance first! Then, remember your speed formula: Distance divided by Speed equals Time."

  # TP5 - Learning Objective 4.1.5 (Subjective/Complex Routine)
  - id: Q6
    text: "A rectangular garden on a map with scale $1 : 400$ has a length of $5 \text{ cm}$ and width of $3 \text{ cm}$. Calculate the actual area of the garden in square meters ($m^2$)."
    difficulty: "hard"
    learning_objective: "4.1.5"
    tp_level: 5
    kbat: true
    answer:
      type: "exact"
      value: "240"
      working: |
        1. Actual length = $5 \text{ cm} \times 400 = 2000 \text{ cm} = 20 \text{ m}$.
        2. Actual width = $3 \text{ cm} \times 400 = 1200 \text{ cm} = 12 \text{ m}$.
        3. Actual Area = $20 \text{ m} \times 12 \text{ m} = 240 \text{ m}^2$.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Correct conversion of both dimensions to meters."
      - marks: 2
        criteria: "Correct calculation of area in m^2."
    hints:
      - level: 1
        text: "Don't just square the scale! Convert the length and width to meters first, then multiply them to get the area."

  # TP6 - Learning Objective 4.1.5 (Subjective/Non-Routine Problem Solving)
  - id: Q7
    text: "Puan Farah wants to tile her living room. The scale drawing of her room is $15 \text{ cm} \times 20 \text{ cm}$ with a scale of $1 : 50$. She can choose tiles measuring $30 \text{ cm} \times 30 \text{ cm}$ at RM2.80 each or $50 \text{ cm} \times 50 \text{ cm}$ at RM6.00 each. Which tile should she choose to save more money? Justify your choice."
    difficulty: "hard"
    learning_objective: "4.1.5"
    tp_level: 6
    kbat: true
    answer:
      type: "free_text"
      value: "Option B (50cm tiles) is cheaper (RM1,800 vs RM2,380)."
      working: |
        1. Actual dimensions: $15 \times 50 = 750 \text{ cm}$, $20 \times 50 = 1000 \text{ cm}$.
        2. Option A (30cm):
           - Tiles along length: $750 / 30 = 25$.
           - Tiles along width: $1000 / 30 \approx 33.3 \Rightarrow 34$.
           - Total tiles = $25 \times 34 = 850$.
           - Cost = $850 \times 2.80 = RM2,380$.
        3. Option B (50cm):
           - Tiles along length: $750 / 50 = 15$.
           - Tiles along width: $1000 / 50 = 20$.
           - Total tiles = $15 \times 20 = 300$.
           - Cost = $300 \times 6 = RM1,800$.
        4. Comparison: $RM1,800 < RM2,380$.
    marks: 6
    rubric:
      - marks: 2
        criteria: "Correct actual dimensions calculated."
      - marks: 2
        criteria: "Correct tile count and cost for Option A."
      - marks: 2
        criteria: "Correct tile count and cost for Option B and logical conclusion."
    hints:
      - level: 1
        text: "You need to find the actual dimensions of the room first. Then see how many of each tile type fit into that length and width!"