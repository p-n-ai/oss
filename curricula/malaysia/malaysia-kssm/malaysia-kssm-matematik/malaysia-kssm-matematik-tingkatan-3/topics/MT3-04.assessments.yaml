topic_id: MT3-04
provenance: ai-generated

questions:
  # Learning Objective 4.1.1
  - id: Q1
    text: "Suatu lukisan berskala mempunyai skala 1:50. Panjang sebenar sebuah objek ialah 5 meter. Apakah panjang objek tersebut pada lukisan berskala?"
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "10 cm"
      working: |
        Panjang sebenar = 5 meter = 500 cm.
        Skala = 1:50, maka Panjang pada lukisan = 500 cm ÷ 50 = 10 cm.
    marks: 2
    rubric:
      - marks: 2
        criteria: "Jawapan betul dengan pengiraan lengkap."
      - marks: 1
        criteria: "Jawapan betul tanpa pengiraan lengkap atau kesilapan kecil dalam pengiraan."
    hints:
      - level: 1
        text: "Pastikan anda menukar meter kepada sentimeter dahulu."

  # Learning Objective 4.1.2
  - id: Q2
    text: "Lukisan sebuah bilik berukuran 4 cm panjang dan 3 cm lebar. Jika skala lukisan itu ialah 1:25, apakah ukuran sebenar bilik tersebut dalam meter?"
    difficulty: medium
    learning_objective: LO2
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "1 meter panjang dan 0.75 meter lebar"
      working: |
        Panjang sebenar = 4 cm × 25 = 100 cm = 1 meter.
        Lebar sebenar = 3 cm × 25 = 75 cm = 0.75 meter.
    marks: 3
    rubric:
      - marks: 3
        criteria: "Jawapan lengkap dan betul dengan unit yang tepat."
      - marks: 2
        criteria: "Jawapan betul tetapi salah satu unit panjang atau lebar salah."
      - marks: 1
        criteria: "Pengiraan betul tetapi jawapan akhir salah."
    hints:
      - level: 1
        text: "Gunakan skala untuk menukar ukuran lukisan kepada ukuran sebenar."

  # Learning Objective 4.1.3
  - id: Q3
    text: "Sebuah objek pada lukisan berskala diwakili oleh panjang 8 cm. Panjang sebenar objek tersebut ialah 4 meter. Apakah skala lukisan tersebut?"
    difficulty: medium
    learning_objective: LO3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "1:50"
      working: |
        Panjang sebenar = 4 meter = 400 cm.
        Skala = Panjang lukisan : Panjang sebenar
              = 8 cm : 400 cm
              = 1 : 50.
    marks: 2
    rubric:
      - marks: 2
        criteria: "Skala betul dengan pengiraan lengkap."
      - marks: 1
        criteria: "Skala betul tetapi pengiraan kurang lengkap atau salah unit."
    hints:
      - level: 1
        text: "Tukar panjang sebenar kepada sentimeter sebelum mengira skala."

  # Learning Objective 4.1.4
  - id: Q4
    text: "Lukis sebuah segitiga sama sisi berskala 1:20, jika panjang sisi segitiga sebenar adalah 3 meter."
    difficulty: medium
    learning_objective: LO4
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Lukisan segitiga dengan setiap sisi 15 cm."
      working: |
        Panjang sisi sebenar = 3 meter = 300 cm.
        Panjang sisi pada lukisan = 300 cm ÷ 20 = 15 cm.
        Lukiskan segitiga sama sisi dengan setiap sisi 15 cm.
    marks: 4
    rubric:
      - marks: 4
        criteria: "Lukisan tepat dengan ukuran dan skala yang betul."
      - marks: 3
        criteria: "Lukisan betul tetapi terdapat kesilapan kecil dalam ukuran."
      - marks: 2
        criteria: "Lukisan lengkap tetapi skala tidak betul."
      - marks: 1
        criteria: "Lukisan tidak lengkap atau salah ukuran."
    hints:
      - level: 1
        text: "Tukar panjang sebenar ke dalam sentimeter dahulu sebelum melukis."

  # Learning Objective 4.1.5
  - id: Q5
    text: "Sebuah peta menunjukkan jarak antara dua bandar adalah 12 cm. Jika skala peta itu ialah 1:1000000, apakah jarak sebenar antara kedua-dua bandar tersebut dalam kilometer?"
    difficulty: medium
    learning_objective: LO5
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "120 km"
      working: |
        Skala = 1:1000000 means 1 cm represents 1000000 cm.
        Jarak sebenar = 12 cm × 1000000 cm = 12000000 cm.
        Tukar kepada kilometer: 12000000 cm ÷ 100000 = 120 km.
    marks: 3
    rubric:
      - marks: 3
        criteria: "Jarak sebenar betul dengan pengiraan dan unit yang lengkap."
      - marks: 2
        criteria: "Jawapan betul tetapi unit salah atau pengiraan kurang lengkap."
      - marks: 1
        criteria: "Pengiraan ada tetapi jawapan akhir salah."
    hints:
      - level: 1
        text: "Tukar ukuran peta kepada ukuran sebenar menggunakan skala dan pastikan tukar unit kepada kilometer."