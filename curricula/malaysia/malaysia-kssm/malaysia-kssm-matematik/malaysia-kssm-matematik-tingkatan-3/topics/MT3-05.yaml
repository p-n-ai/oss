teaching_sequence:
  - "Step 1: Use labeled triangle diagrams to identify opposite, adjacent, and hypotenuse relative to a specific acute angle."
  - "Step 2: Use grid paper or digital tools to verify constant ratios for fixed angles (Defining Sine, Cosine, Tangent)."
  - "Step 3: Observe the impact of increasing/decreasing angle size on ratio values (e.g., Sine increases as angle approaches 90°)."
  - "Step 4: Practice calculating values for specific angles (30°, 45°, 60°) using surd forms and unit triangles."
  - "Step 5: Apply SOH-CAH-TOA to solve routine and non-routine real-world problems (Architecture/Navigation)."

common_misconceptions:
  - misconception: "Adjacent and opposite sides are fixed regardless of the angle's position."
    remediation: "Use diagrams with two different acute angles (x and y) to show how 'opposite' for x is 'adjacent' for y."
  - misconception: "Trigonometric ratios can be applied to any triangle."
    remediation: "Emphasize that these ratios are strictly defined for right-angled triangles; for non-right triangles, other methods like sine/cosine rules are needed (Form 4)."
  - misconception: "Increasing the angle doubles the value of the trigonometric ratio (proportionality)."
    remediation: "Compare sin 15° and sin 30° using calculators or tables to show the relationship is non-linear."

engagement_hooks:
  - "How engineers use trigonometry to ensure the structural stability of the Petronas Twin Towers."
  - "Calculating the width of a river or the height of a flagpole without physically crossing or climbing them."
  - "The role of trigonometry in GPS satellite signals and aircraft navigation."

