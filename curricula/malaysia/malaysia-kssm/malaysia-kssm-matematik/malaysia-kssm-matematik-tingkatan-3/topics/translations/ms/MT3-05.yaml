prerequisites:
  required:
    - "MT1-13" # Teorem Pythagoras (Tingkatan 1)
    - "Identifikasi asas segi tiga bersudut tegak"

teaching_sequence:
  - "Langkah 1: Menggunakan rajah segi tiga berlabel untuk mengenal pasti sisi bertentangan, sisi bersebelahan, dan hipotenus berdasarkan sudut tirus tertentu."
  - "Langkah 2: Menggunakan kertas grid atau alat digital untuk mengesahkan nisbah malar bagi sudut tetap (Mentakrifkan Sin, Kos, Tan)."
  - "Langkah 3: Memerhati kesan perubahan saiz sudut terhadap nilai nisbah (contoh: nilai Sin meningkat apabila sudut mendekati 90°)."
  - "Langkah 4: Berlatih mengira nilai untuk sudut khas (30°, 45°, 60°) menggunakan bentuk surd dan segi tiga unit."
  - "Langkah 5: Mengaplikasikan SOH-CAH-TOA untuk menyelesaikan masalah rutin dan bukan rutin dalam dunia sebenar (Seni bina/Navigasi)."

common_misconceptions:
  - misconception: "Sisi bersebelahan dan bertentangan adalah tetap tanpa mengira kedudukan sudut."
    remediation: "Gunakan rajah dengan dua sudut tirus berbeza (x dan y) untuk menunjukkan bagaimana 'sisi bertentangan' bagi x adalah 'sisi bersebelahan' bagi y."
  - misconception: "Nisbah trigonometri boleh digunakan pada mana-mana jenis segi tiga."
    remediation: "Tegaskan bahawa nisbah ini hanya ditakrifkan untuk segi tiga bersudut tegak; bagi segi tiga lain, kaedah seperti petua sinus/kosinus diperlukan (Tingkatan 4)."
  - misconception: "Meningkatkan saiz sudut akan menggandakan nilai nisbah trigonometri (kadar terus)."
    remediation: "Bandingkan nilai sin 15° dan sin 30° menggunakan kalkulator untuk menunjukkan hubungan tersebut adalah tidak linear."

engagement_hooks:
  - "Bagaimana jurutera menggunakan trigonometri untuk memastikan kestabilan struktur Menara Berkembar Petronas."
  - "Mengira lebar sungai atau ketinggian tiang bendera tanpa perlu menyeberang atau memanjatnya secara fizikal."
  - "Peranan trigonometri dalam isyarat satelit GPS dan navigasi pesawat udara."

