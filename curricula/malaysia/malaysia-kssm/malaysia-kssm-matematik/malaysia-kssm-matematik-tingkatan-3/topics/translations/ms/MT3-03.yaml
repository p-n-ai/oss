teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada jenis Simpanan dan Pelaburan (3.1.1) - 20 min"
    - "Langkah 2: Mengira Faedah Mudah dan Faedah Kompaun (3.1.2) - 30 min"
    - "Langkah 3: Mengira ROI dan faktor yang mempengaruhi pulangan (3.1.3) - 30 min"
    - "Langkah 4: Menganalisis Risiko, Pulangan, dan Kecairan (3.1.4) - 25 min"
    - "Langkah 5: Strategi Pemurataan Kos Ringgit untuk saham (3.1.5) - 20 min"
    - "Langkah 6: Penyelesaian masalah Simpanan dan Pelaburan (3.1.6) - 30 min"
    - "Langkah 7: Maksud dan Pengurusan Kredit dan Hutang (3.2.1) - 20 min"
    - "Langkah 8: Kelebihan, kekurangan, dan kesan pembayaran kad kredit (3.2.2, 3.2.3) - 30 min"
    - "Langkah 9: Pengiraan bayaran balik pinjaman dan ansuran (3.2.5) - 30 min"
    - "Langkah 10: Penyelesaian masalah kad kredit dan pinjaman (3.2.4, 3.2.6) - 30 min"
  common_misconceptions:
    - misconception: "Simpanan dan pelaburan adalah perkara yang sama."
      remediation: "Tekankan bahawa simpanan biasanya mempunyai risiko rendah dan kecairan tinggi, manakala pelaburan bertujuan untuk pulangan lebih tinggi tetapi membawa risiko."
    - misconception: "Faedah kompaun dikira hanya berdasarkan prinsipal asal."
      remediation: "Jelaskan bahawa faedah kompaun dikira berdasarkan prinsipal asal dan juga faedah yang terkumpul daripada tempoh sebelumnya."
    - misconception: "Membayar jumlah minimum kad kredit sudah memadai untuk melunaskan hutang."
      remediation: "Tunjukkan bahawa pembayaran minimum akan menyebabkan caj faedah yang tinggi ke atas baki dan memanjangkan tempoh hutang."
  engagement_hooks:
    - "Bincangkan bagaimana menyimpan 10% daripada pendapatan bulanan boleh membina masa depan kewangan yang selamat."
    - "Analisis senario kehidupan sebenar seperti memilih antara pakej pinjaman kereta yang berbeza daripada pelbagai bank."
    - "Teroka manfaat strategi pemurataan kos ringgit dalam pelaburan saham untuk mengurangkan risiko turun naik pasaran."

