teaching:
  sequence:
    - "Langkah 1: Temui hubungan antara sudut pada lilitan dan sudut pusat menggunakan geometri dinamik (Buku Teks m/s 131-140)."
    - "Langkah 2: Siasat sifat sisi empat kitaran dan sifat penambah bagi sudut pedalaman yang bertentangan (Buku Teks m/s 144-149)."
    - "Langkah 3: Takrifkan tangen dan sahkan hubungan 90 darjah antara tangen dan jejari pada titik ketangenan (Buku Teks m/s 150-152)."
    - "Langkah 4: Analisis sifat dua tangen dari satu titik luaran dan teorem tembereng selang-seli (Buku Teks m/s 153-156)."
    - "Langkah 5: Selesaikan masalah bukan rutin yang kompleks menggabungkan sudut, sisi empat kitaran, dan tangen sepunya (Buku Teks m/s 160-164)."

  common_misconceptions:
    - misconception: "Keliru antara sudut pusat dengan sudut pada lilitan apabila mereka berkongsi lengkok yang sama."
      remediation: "Gunakan GeoGebra untuk visualisasikan bahawa sudut pusat sentiasa dua kali ganda sudut lilitan."
    - misconception: "Mengandaikan sebarang sisi empat di dalam bulatan ialah sisi empat kitaran."
      remediation: "Tekankan bahawa keempat-empat bucu mesti menyentuh lilitan untuk menjadi kitaran."
    - misconception: "Salah anggap garis perentas (melalui dua titik) sebagai garis tangen (menyentuh satu titik sahaja)."
      remediation: "Gunakan objek bulat fizikal dan pembaris untuk menunjukkan satu titik sentuhan."

  engagement_hooks:
    - "Fasa Bulan: Gunakan aktiviti 'Meneroka Matematik' untuk memodelkan bentuk bulan seperti sabit dan buncit menggunakan sifat bulatan (Buku Teks m/s 167)."
    - "Keselamatan Kejuruteraan: Analisis bagaimana tangen digunakan untuk mereka bentuk laluan keluar kereta di bulatan untuk keselamatan maksimum."
    - "Trajektori Sukan: Hitung titik pelepasan dan sudut bola keranjang atau lontar peluru menggunakan tangen kepada laluan gerakan bulat."

