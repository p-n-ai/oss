teaching:
  sequence:
    - 'Langkah 1: Konsep anggaran dan penghampiran dalam situasi harian (Muka Surat 32) (15 min)'
    - 'Langkah 2: Menentukan bilangan angka bererti bagi integer dan perpuluhan (Muka Surat 33-34) (25 min)'
    - 'Langkah 3: Membundarkan nombor kepada angka bererti tertentu (Muka Surat 35-36) (20 min)'
    - 'Langkah 4: Mengenal dan menukar nombor tunggal kepada bentuk piawai (A x 10^n) (Muka Surat 37-39) (30 min)'
    - 'Langkah 5: Melaksanakan operasi tambah, tolak, darab, dan bahagi dalam bentuk piawai (Muka Surat 40-42) (40 min)'
    - 'Langkah 6: Penyelesaian masalah dunia sebenar dan aplikasi bukan rutin (TP4-TP6) (Muka Surat 43-47) (45 min)'

common_misconceptions:
  - misconception: "Semua digit sifar dianggap sebagai angka bererti."
    remediation: "Jelaskan bahawa sifar di hadapan perpuluhan (contoh: 0.005) bukan angka bererti; ia hanya menentukan nilai tempat (Muka Surat 34)."
  - misconception: "Indeks positif dan negatif dalam bentuk piawai mewakili arah pergerakan perpuluhan yang sama."
    remediation: "Pastikan pelajar faham indeks positif untuk nombor besar (>10) dan indeks negatif untuk nombor kecil (<1) (Muka Surat 37)."
  - misconception: "Menambah atau menolak nombor bentuk piawai dengan indeks berbeza secara terus."
    remediation: "Ajar kaedah pemfaktoran atau penukaran indeks kepada kuasa yang sama sebelum melakukan operasi (Muka Surat 40)."

engagement_hooks:
  - "Gunakan jarak astronomi (tahun cahaya ke km) untuk menunjukkan kenapa menulis berbilion sifar adalah tidak efisien (Muka Surat 30)."
  - "Bincangkan saiz nanometer (0.000 000 001 meter) dalam teknologi peranti untuk memberi konteks kepada nilai bentuk piawai yang kecil (Muka Surat 38)."

