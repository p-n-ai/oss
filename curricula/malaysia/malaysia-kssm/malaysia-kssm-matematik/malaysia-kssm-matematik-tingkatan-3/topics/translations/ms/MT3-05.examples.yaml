topic_id: "MT3-05"
provenance: "curriculum-aligned-rewrite"
description: "Contoh kerja bagi Nisbah Trigonometri yang memfokuskan pada segi tiga bersudut tegak."
worked_examples:
  - id: "WE-01"
    topic: "Mengenal pasti Sisi Bertentangan, Sisi Bersebelahan dan Hipotenus"
    difficulty: "easy"
    learning_objective: "5.1.1"
    tp_level: 1
    real_world_analogy: "Bayangkan awak berdiri di penjuru sebuah bilik (sudut rujukan). Dinding yang berada tepat di depan awak ialah 'Sisi Bertentangan'. Dinding yang awak sedang sandar ialah 'Sisi Bersebelahan'. Garisan paling panjang dari awak ke penjuru bilik yang paling jauh ialah 'Hipotenus'."
    misconception_alert: "Pelajar sering keliru dan menganggap sisi 'bawah' sentiasa sisi bersebelahan. Ingat: label sisi akan berubah jika kita tukar sudut rujukan!"
    scenario: "Dalam sebuah segi tiga bersudut tegak $ABC$ dengan $\angle B = 90^\circ$, kenal pasti sisi-sisi berdasarakan $\angle ACB$."
    working: |
      1. Kenal pasti sudut rujukan: $\angle ACB$ (atau sudut $C$).
      2. Cari sisi yang berada tepat di hadapan sudut $C$: Ini ialah sisi $AB$. Maka, $AB = \text{Sisi bertentangan}$.
      3. Cari sisi terpanjang yang bertentangan dengan sudut $90^\circ$: Ini ialah sisi $AC$. Maka, $AC = \text{Hipotenus}$.
      4. Cari sisi baki yang menyentuh sudut $C$: Ini ialah sisi $BC$. Maka, $BC = \text{Sisi bersebelahan}$.

  - id: "WE-02"
    topic: "Mentakrifkan Sinus, Kosinus dan Tangen"
    difficulty: "medium"
    learning_objective: "5.1.2"
    tp_level: 2
    real_world_analogy: "Fikirkan tentang sebuah tanjakan (ramp). 'Kecondongan' (Tangen) ialah nisbah antara berapa tinggi tanjakan itu (Bertentangan) berbanding berapa jauh ia merentasi lantai (Bersebelahan)."
    misconception_alert: "Jangan keliru dengan formula! Gunakan mnemonik SOH-CAH-TOA sebagai panduan emas: Sinus=D/H, Kosinus=S/H, Tangen=D/S."
    scenario: "Sebuah segi tiga bersudut tegak mempunyai sisi bertentangan $8\text{ cm}$, sisi bersebelahan $15\text{ cm}$, dan hipotenus $17\text{ cm}$. Cari nilai $\sin \theta$, $\cos \theta$, and $\tan \theta$."
    working: |
      1. Senaraikan nilai: $D = 8$, $S = 15$, $H = 17$.
      2. Guna SOH: $\sin \theta = \frac{D}{H} = \frac{8}{17}$.
      3. Guna CAH: $\cos \theta = \frac{S}{H} = \frac{15}{17}$.
      4. Guna TOA: $\tan \theta = \frac{D}{S} = \frac{8}{15}$.

  - id: "WE-03"
    topic: "Sudut Khas (30°, 45°, 60°) Tanpa Kalkulator"
    difficulty: "medium"
    learning_objective: "5.1.5"
    tp_level: 3
    real_world_analogy: "Bayangkan memotong sepotong sandwic segi empat tepat secara menyerong. Dua segi tiga yang terhasil mempunyai sudut $45^\circ$. Kerana kedua-dua sisi sandwic itu sama panjang, maka nisbahnya (Tangen) adalah tepat 1!"
    misconception_alert: "Pelajar selalu lupa kedudukan punca kuasa ($\sqrt{3}$). Untuk $30^\circ$, sisi bertentangan ialah $1$ dan hipotenus ialah $2$. Guna Teorem Pythagoras untuk ingat bahawa sisi bersebelahan ialah $\sqrt{3}$."
    scenario: "Hitung nilai $\cos 60^\circ + \sin 30^\circ$ tanpa menggunakan kalkulator."
    working: |
      1. Imbas kembali nilai khas: $\cos 60^\circ = \frac{1}{2}$.
      2. Imbas kembali nilai khas: $\sin 30^\circ = \frac{1}{2}$.
      3. Gantikan ke dalam ungkapan: $\frac{1}{2} + \frac{1}{2}$.
      4. Jawapan akhir: $1$.

  - id: "WE-04"
    topic: "Mengira Panjang Sisi Menggunakan Nisbah"
    difficulty: "hard"
    learning_objective: "5.1.6"
    tp_level: 4
    real_world_analogy: "Sebuah layang-layang terbang dengan tali sepanjang $50\text{ m}$. Jika tali itu membentuk sudut $30^\circ$ dengan tanah, berapa tinggikah layang-layang itu? Awak menggunakan tali (Hipotenus) untuk mencari tinggi (Bertentangan)."
    misconception_alert: "Sentiasa pastikan kalkulator anda dalam mod 'DEG' sebelum mengira. Juga, pastikan awak pilih nisbah yang betul; jika ada Hipotenus dan mahu cari Bertentangan, awak MESTI guna Sinus."
    scenario: "Dalam $\triangle PQR$, $\angle Q = 90^\circ$ and $\angle PRQ = 30^\circ$. Jika hipotenus $PR = 12\text{ cm}$, cari panjang $PQ$."
    working: |
      1. Kenal pasti nilai diberi: $\theta = 30^\circ$, $H = 12$.
      2. Kenal pasti sisi yang dicari: $PQ$ ialah Sisi Bertentangan ($D$).
      3. Pilih nisbah: Kerana kita ada $H$ and mahu $D$, guna SOH: $\sin \theta = \frac{D}{H}$.
      4. Gantikan nilai: $\sin 30^\circ = \frac{PQ}{12}$.
      5. Pindahkan nilai: $PQ = 12 \times \sin 30^\circ$.
      6. Selesaikan: $PQ = 12 \times 0.5 = 6\text{ cm}$.

  - id: "WE-05"
    topic: "Penyelesaian Masalah Dunia Sebenar (Sudut Dongak)"
    difficulty: "hard"
    learning_objective: "5.1.7"
    tp_level: 5
    real_world_analogy: "Seorang juruukur menggunakan 'Tiodolit' untuk mengukur tinggi bangunan dari jauh. Dengan mengetahui jarak dan sudut, trigonometri melakukan kerja 'memanjat' untuk mereka!"
    misconception_alert: "Dalam masalah melibatkan 'tinggi', pelajar sering lupa untuk menyemak sama ada ketinggian aras mata pemerhati perlu ditambah kepada jawapan akhir atau tidak."
    scenario: "Seorang juruukur berdiri $100\text{ m}$ dari tapak sebuah menara. Sudut dongak ke puncak menara ialah $40^\circ$. Hitung tinggi menara tersebut."
    working: |
      1. Fahami masalah: Kita ada Sisi Bersebelahan ($100\text{ m}$) dan mahu mencari Sisi Bertentangan (tinggi).
      2. Pilih nisbah: Guna TOA: $\tan \theta = \frac{D}{S}$.
      3. Bina persamaan: $\tan 40^\circ = \frac{\text{tinggi}}{100}$.
      4. Pindahkan nilai: $\text{tinggi} = 100 \times \tan 40^\circ$.
      5. Kira menggunakan kalkulator: $\text{tinggi} = 100 \times 0.8391 = 83.91\text{ m}$.
      6. Jawapan akhir: Tinggi menara tersebut ialah $83.91\text{ m}$ (dibundarkan kepada 2 tempat perpuluhan).
