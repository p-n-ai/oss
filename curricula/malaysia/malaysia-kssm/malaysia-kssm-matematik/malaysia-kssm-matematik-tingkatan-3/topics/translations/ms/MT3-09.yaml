content_standards:
  - id: "9.1"
    text: "Garis Lurus"

learning_objectives:
  - id: 9.1.1
    content_standard_id: "9.1"
    text: "Membuat perkaitan antara persamaan, y = mx + c, dengan kecerunan dan pintasan-y, dan seterusnya membuat generalisasi tentang persamaan garis lurus."
    bloom: understand
  - id: 9.1.2
    content_standard_id: "9.1"
    text: "Menyiasat dan mentafsir persamaan garis lurus dalam bentuk lain seperti ax + by = c dan x/a + y/b = 1, serta menukarkan kepada bentuk y = mx + c dan sebaliknya."
    bloom: apply
  - id: 9.1.3
    content_standard_id: "9.1"
    text: "Menyiasat dan membuat inferens tentang hubungan antara titik pada garis lurus dengan persamaan garis lurus tersebut."
    bloom: analyze
  - id: 9.1.4
    content_standard_id: "9.1"
    text: "Menyiasat dan membuat inferens tentang hubungan antara persamaan garis lurus yang selari."
    bloom: analyze
  - id: 9.1.5
    content_standard_id: "9.1"
    text: "Menentukan persamaan suatu garis lurus."
    bloom: apply
  - id: 9.1.6
    content_standard_id: "9.1"
    text: "Menentukan titik persilangan bagi dua garis lurus."
    bloom: apply
  - id: 9.1.7
    content_standard_id: "9.1"
    text: "Menyelesaikan masalah yang melibatkan garis lurus."
    bloom: apply

