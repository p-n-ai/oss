performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang persamaan garis lurus."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang garis lurus."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang garis lurus untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang garis lurus dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang garis lurus dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang garis lurus dalam konteks penyelesaian masalah bukan rutin secara kreatif."

teaching:
  sequence:
    - "Langkah 1: Pengenalan y=mx+c (20 min)"
    - "Langkah 2: Menukar Bentuk Persamaan (30 min)"
    - "Langkah 3: Titik pada Garis & Keselarian (30 min)"
    - "Langkah 4: Mencari Persamaan & Persilangan (40 min)"
    - "Langkah 5: Penyelesaian Masalah Kontekstual (30 min)"
  common_misconceptions:
    - misconception: "Gagal memencilkan 'y' sebelum mengenal pasti kecerunan m (cth: dalam 2y=4x+1, pelajar kata m=4)."
      remediation: "Wajibkan peraturan 'y Single'. Kecerunan hanya muncul apabila y duduk seorang diri dengan pekali 1."
    - misconception: "Keliru pintasan dalam format x/a + y/b = 1."
      remediation: "Guna 'Hukum Bawah'. Nombor tepat di bawah x ialah tempat ia memotong paksi-x."
    - misconception: "Menganggap pintasan-y yang sama bermaksud garis selari."
      remediation: "Fokus hanya pada kecerunan 'm'. Keselarian tentang kecondongan, bukan kedudukan pintasan."
  engagement_hooks:
    - "Menara Jam Condong Teluk Intan: Analisis kenapa ia condong dan kira 'kecerunan' menara tersebut berbanding garisan tegak."
    - "Standard Keselamatan Tangga: Siasat kecerunan (kecondongan) tangga awam yang paling selamat (Standard JKR)."
    - "Geometri Jubin Lantai: Perhatikan corak garisan jubin di sekolah dan bagaimana ia mengikut persamaan garis selari."

