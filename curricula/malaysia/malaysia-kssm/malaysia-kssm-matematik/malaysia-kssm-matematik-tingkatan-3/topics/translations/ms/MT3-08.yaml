prerequisites:
  required:
    - "Kefahaman asas tentang titik, garis, dan jarak dalam geometri 2D"
    - "Kemahiran menggunakan alat geometri (pembaris dan jangka lukis)"

teaching:
  sequence:
    - "Langkah 1: Pengenalan konsep lokus menggunakan pergerakan dunia nyata seperti bandul yang berayun atau buah yang jatuh (15 min)"
    - "Langkah 2: Meneroka lima jenis asas lokus berdasarkan titik tetap dan garis tetap (20 min)"
    - "Langkah 3: Aktiviti tangan (hands-on) membina lokus menggunakan alat geometri dan perisian dinamik seperti GeoGebra (25 min)"
    - "Langkah 4: Menentukan persilangan lokus dan menyelesaikan masalah kompleks dengan pelbagai syarat (20 min)"
  
  common_misconceptions:
    - misconception: "Lokus hanya berkaitan dengan bentuk bulatan."
      remediation: "Berikan pelbagai contoh seperti garis selari (lokus dari satu garis) dan pembahagi dua sama sudut (lokus dari garis bersilang)."
    - misconception: "Lokus dianggap sebagai satu titik tunggal, bukan set titik."
      remediation: "Gunakan animasi untuk menunjukkan 'surihan' atau lintasan yang ditinggalkan oleh titik yang bergerak mengikut syarat tertentu."
    - misconception: "Keliru antara 'berjarak sama dari dua titik' dengan 'garis selari'."
      remediation: "Bandingkan secara eksplisit pembinaan pembahagi dua sama serenjang dengan pembinaan garis selari."

  engagement_hooks:
    - "Perancangan Bandar: Bagaimana arkitek menentukan lokasi hospital yang berjarak sama dari dua kawasan perumahan utama."
    - "Sains Sukan: Menganalisis lintasan (trajektori) bola keranjang atau sepakan bola sepak sebagai lokus melengkung."
    - "Teknologi Harian: Menerangkan bagaimana pengelap cermin kereta menggunakan lokus untuk membersihkan kawasan maksimum."

