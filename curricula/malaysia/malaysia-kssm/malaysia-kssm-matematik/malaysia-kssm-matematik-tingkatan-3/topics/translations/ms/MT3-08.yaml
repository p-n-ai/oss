  - id: "8.2.1"
    text: "Memerihal lokus bagi titik yang berjarak (i) tetap dari satu titik tetap, (ii) sama dari dua titik tetap, (iii) tetap dari satu garis lurus, (iv) sama dari dua garis lurus yang selari, dan (v) sama dari dua garis lurus yang bersilang, dan seterusnya membina lokus tersebut."
    bloom: apply
