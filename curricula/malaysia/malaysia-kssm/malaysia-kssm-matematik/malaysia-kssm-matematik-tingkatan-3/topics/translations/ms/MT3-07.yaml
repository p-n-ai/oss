teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada satah (mengufuk, mencancang, condong) dan normal kepada satah [m/s 170]."
    - "Langkah 2: Mentakrif dan mengenal pasti unjuran ortogonal berdasarkan arah pandangan [m/s 171]."
    - "Langkah 3: Membanding dan membezakan dimensi objek dengan unjuran ortogonalnya [m/s 179]."
    - "Langkah 4: Melukis pelan (pandangan atas) dan dongakan (pandangan depan/sisi) mengikut skala penuh [m/s 182]."
    - "Langkah 5: Mengintegrasikan pelan dan dongakan menggunakan kaedah empat sukuan [m/s 183]."
    - "Langkah 6: Mensintesis dan melakar objek 3D daripada pelan dan dongakan 2D [m/s 187]."
    - "Langkah 7: Menyelesaikan masalah kompleks yang melibatkan gabungan pepejal dan ukuran [m/s 190]."

common_misconceptions:
  - misconception: "Menganggap unjuran ortogonal sebagai lukisan perspektif 3D."
    remediation: "Gunakan model fizikal untuk menunjukkan bahawa unjuran sentiasa dalam 2D dan berserenjang dengan satah [m/s 171-172]."
  - misconception: "Gagal menggunakan garis sempang untuk tepi yang terlindung."
    remediation: "Tekankan bahagian 'TIP' pada muka surat 184 mengenai garis padu tebal vs. garis sempang."
  - misconception: "Skala yang tidak konsisten antara pandangan yang berbeza."
    remediation: "Kukuhkan teknik lukisan berskala dan konsistensi perkadaran dari muka surat 182."

engagement_hooks:
  - "Bangunan Berlian (Putrajaya): Terokai bagaimana seni bina uniknya kelihatan dari pelbagai arah [m/s 168]."
  - "Seni Bina Sejarah: Bagaimana Mimar Sinan menggunakan pelan sebagai penanda aras reka bentuk masjid [m/s 169]."
  - "Projek STEM: Mereka bentuk dan membina 'rumah impian' atau 'pondok bacaan' menggunakan model skala [m/s 195]."

