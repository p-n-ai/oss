teaching:
  sequence:
    - "Langkah 1: Perkenalkan konsep skala menggunakan contoh kehidupan sebenar seperti peta dan model (15 min)"
    - "Langkah 2: Bimbing murid mentafsir skala dalam bentuk 1:n atau 1:1/n (20 min)"
    - "Langkah 3: Ajar pengiraan ukuran sebenar daripada lukisan berskala dan sebaliknya (25 min)"
    - "Langkah 4: Aktiviti praktikal melukis lukisan berskala pada pelbagai saiz grid (30 min)"
    - "Langkah 5: Selesaikan masalah dunia sebenar dan bukan rutin yang melibatkan lukisan berskala (20 min)"
  
  common_misconceptions:
    - misconception: "Skala sama dengan saiz fizikal"
      remediation: "Gunakan pelbagai contoh untuk menunjukkan bahawa skala adalah nisbah perkadaran, bukan saiz fizikal kertas atau lukisan tersebut."
    - misconception: "Salah tafsir arah nisbah skala (Perangkap Inversi)"
      remediation: "Tegaskan bahawa 1:n di mana n > 1 adalah pengecilan, dan n < 1 adalah pembesaran dengan bantuan visual yang konsisten."

  engagement_hooks:
    - "Bincangkan penggunaan skala dalam mereka bentuk pencakar langit ikonik seperti Merdeka 118 atau pelan cetak biru seni bina."
    - "Terokai bagaimana aplikasi navigasi (Google Maps) mengubah skala secara dinamik apabila pengguna melakukan 'zoom in' dan 'zoom out'."

quality_level: 3
