topic_id: "MT3-05"
provenance: "curriculum-aligned-rewrite"
questions:
  # 5.1.1 - TP1: Identifikasi (OAP)
  - id: Q1
    text: "Dalam sebuah segi tiga bersudut tegak $PQR$ di mana $\angle Q = 90^\circ$, jika kita merujuk kepada sudut $\angle PRQ$, manakah merupakan 'sisi bertentangan'?"
    difficulty: "easy"
    learning_objective: "5.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: "multiple_choice"
      value: "PQ"
      working: |
        Langkah 1: Kenal pasti sudut rujukan, iaitu $\angle PRQ$ (atau sudut $R$).
        Langkah 2: Cari sisi yang berada tepat di hadapan sudut $R$ tersebut.
        Langkah 3: Sisi $PQ$ adalah sisi bertentangan. Sisi $QR$ ialah sisi bersebelahan. $PR$ ialah hipotenus.
      distractors:
        - value: "QR"
          feedback: "Ini ialah sisi yang 'duduk' di sebelah sudut tersebut. Ingat, sisi 'bertentangan' ialah sisi yang berada jauh di depan sudut rujukan!"
        - value: "PR"
          feedback: "PR ialah sisi terpanjang yang bertentangan dengan $90^\circ$, maka ia adalah Hipotenus. Hipotenus tidak pernah berubah tempat."
    marks: 1
    hints:
      - level: 1
        text: "Bayangkan awak berdiri di bucu R. Pandang terus ke depan melintasi segi tiga itu. Dinding mana yang awak nampak?"

  # 5.1.2 - TP2: Mentakrif Nisbah (OPB)
  - id: Q2
    text: "Padankan nisbah trigonometri berikut dengan takrifan sisi yang betul."
    difficulty: "easy"
    learning_objective: "5.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: "mapping"
      value:
        "Sinus": "Sisi Bertentangan / Hipotenus"
        "Kosinus": "Sisi Bersebelahan / Hipotenus"
        "Tangen": "Sisi Bertentangan / Sisi Bersebelahan"
      working: |
        Gunakan formula mnemonik SOH-CAH-TOA:
        SOH: $\sin = \text{Depan}/\text{Hipo}$
        CAH: $\cos = \text{Sebelah}/\text{Hipo}$
        TOA: $\tan = \text{Depan}/\text{Sebelah}$
    marks: 3
    hints:
      - level: 1
        text: "Pernah dengar tentang 'SOH-CAH-TOA'? Itu adalah kod rahsia untuk nisbah ini!"

  # 5.1.3 - TP4: Kesan Perubahan Sudut (OAP)
  - id: Q3
    text: "Apabila saiz suatu sudut tirus $\theta$ meningkat dari $10^\circ$ ke $80^\circ$, apakah yang berlaku kepada nilai $\cos \theta$?"
    difficulty: "medium"
    learning_objective: "5.1.3"
    tp_level: 4
    kbat: true
    answer:
      type: "multiple_choice"
      value: "Nilai akan berkurang"
      working: |
        Langkah 1: Ingat bahawa apabila sudut meningkat, sisi bersebelahan menjadi lebih pendek berbanding hipotenus.
        Langkah 2: Oleh kerana $\cos = \text{Sisi Bersebelahan} / \text{Hipotenus}$, pengangka yang lebih kecil menghasilkan nisbah yang lebih kecil.
        Langkah 3: Maka, nilai menghampiri 0 apabila sudut menghampiri $90^\circ$.
      distractors:
        - value: "Nilai akan meningkat"
          feedback: "Hati-hati! Ini benar untuk Sinus dan Tangen, tetapi Kosinus bersifat 'pemalu'—ia mengecil apabila sudut membesar."
        - value: "Nilai kekal tetap"
          feedback: "Nisbah hanya kekal tetap jika saiz sudut tidak berubah. Jika sudut bergerak, nisbah pun mesti berubah!"
    marks: 1
    hints:
      - level: 1
        text: "Fikirkan tentang nisbah 'CAH'. Jika sudut terbuka lebih luas, adakah 'lantai' (sisi bersebelahan) jadi makin panjang atau pendek?"

  # 5.1.5 - TP3: Sudut Khas (Subjektif)
  - id: Q4
    text: "Hitung nilai $2 \sin 30^\circ + \tan 45^\circ$ tanpa menggunakan kalkulator."
    difficulty: "medium"
    learning_objective: "5.1.5"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "2"
      working: |
        Langkah 1: Tentukan $\sin 30^\circ$. Merujuk jadual sudut khas, $\sin 30^\circ = 0.5$ atau $1/2$.
        Langkah 2: Tentukan $\tan 45^\circ$. Kerana sisi bertentangan dan bersebelahan adalah sama panjang, $\tan 45^\circ = 1$.
        Langkah 3: Gantikan: $2(0.5) + 1 = 1 + 1 = 2$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Gantian betul bagi kedua-dua nilai sudut khas."
      - marks: 1
        criteria: "Nilai akhir yang dipermudahkan adalah betul."
    hints:
      - level: 1
        text: "Berapakah nilai $\sin 30^\circ$? Ia tepat separuh! Sekarang, apa pula nisbah bila dua sisi sama panjang dalam segi tiga $45^\circ$?"

  # 5.1.7 - TP5: Masalah Rutin Kompleks (Subjektif)
  - id: Q5
    text: "Sebuah tangga sepanjang 5 meter disandarkan pada dinding. Kaki tangga itu berada 3 meter dari tapak dinding. Hitung sudut $\theta$ antara tangga dengan lantai."
    difficulty: "hard"
    learning_objective: "5.1.7"
    tp_level: 5
    kbat: true
    answer:
      type: "free_text"
      value: "53.13"
      working: |
        Langkah 1: Kenal pasti sisi diberi. Hipotenus (tangga) = 5m. Sisi bersebelahan (lantai) = 3m.
        Langkah 2: Pilih nisbah. Sisi Bersebelahan dan Hipotenus melibatkan Kosinus (CAH).
        Langkah 3: Bina persamaan: $\cos \theta = 3/5 = 0.6$.
        Langkah 4: Cari sudut: $\theta = \cos^{-1}(0.6) \approx 53.13^\circ$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Mengenal pasti nisbah trigonometri yang betul (Kosinus)."
      - marks: 1
        criteria: "Gantian yang betul ke dalam formula kosinus."
      - marks: 1
        criteria: "Penggunaan fungsi trigonometri songsang ($\cos^{-1}$)."
      - marks: 1
        criteria: "Jawapan akhir betul kepada 2 tempat perpuluhan bersama unit."
    hints:
      - level: 1
        text: "Lukis segi tiga itu. Awak ada panjang tangga (condong) dan jarak di lantai. SOH-CAH-TOA mana yang guna 'A' (Adjacent) dan 'H' (Hypotenuse)?"
      - level: 2
        text: "Untuk cari sudut, awak perlu guna butang 'Shift' atau 'Inverse' pada kalkulator. Cari simbol $\cos^{-1}$."

  # 5.1.7 - TP6: Masalah Bukan Rutin (Subjektif)
  - id: Q6
    text: "Seorang juruukur berdiri di titik A dan mengukur sudut dongak ke puncak menara sebagai $30^\circ$. Selepas berjalan 20 meter mendekati menara ke titik B, sudut dongak menjadi $60^\circ$. Hitung tinggi menara tersebut."
    difficulty: "hard"
    learning_objective: "5.1.7"
    tp_level: 6
    kbat: true
    answer:
      type: "free_text"
      value: "17.32"
      working: |
        Langkah 1: Biarkan tinggi menara sebagai $h$ dan jarak awal dari B ke menara sebagai $x$.
        Langkah 2: Dari titik B: $\tan 60^\circ = h/x \implies h = x\sqrt{3}$.
        Langkah 3: Dari titik A: $\tan 30^\circ = h/(x+20) \implies h = (x+20)(1/\sqrt{3})$.
        Langkah 4: Samakan $h$: $x\sqrt{3} = (x+20)/\sqrt{3} \implies 3x = x+20 \implies 2x = 20 \implies x = 10$.
        Langkah 5: Hitung $h$: $h = 10\sqrt{3} \approx 17.32$ meter.
    marks: 6
    rubric:
      - marks: 2
        criteria: "Membentuk dua persamaan trigonometri menggunakan tangen dengan betul."
      - marks: 2
        criteria: "Berjaya melakukan penggantian algebra untuk menghapuskan satu pemboleh ubah."
      - marks: 2
        criteria: "Tinggi akhir dihitung dengan betul beserta unit."
    hints:
      - level: 1
        text: "Soalan ini melibatkan dua segi tiga yang berkongsi tinggi yang sama. Cuba tuliskan tinggi 'h' dalam dua cara berbeza menggunakan Tangen."
