topic_id: MT3-01
provenance: ai-assisted
worked_examples:
  - id: WE-01
    topic: "Understanding Index Notation"
    scenario: "Express the repeated multiplication in index form: $5 \times 5 \times 5$."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 1.1.1
    real_world_analogy: >-
      Think of index form as a cheat code for writing long lists of the exact same clone. If you have 3 identical clones of the number 5, the 'base' is the clone itself (5), and the 'index' is the total headcount of how many clones exist (3).
    misconception_alert: >-
      CRITICAL TRAP: Students frequently multiply the base by the index! Warn them aggressively that $5^3$ is NOT $5 \times 3 = 15$. It means 5 multiplied by itself three times ($5 \times 5 \times 5 = 125$).
    working: |
      Step 1: Identify the main number being repeated (this is the 'base'). The base is 5.
      Step 2: Count how many times the base is multiplied by itself. It appears 3 times.
      Step 3: Write the base, and place the count as a small superscript number at the top right.
      Final Answer: $5^3$

  - id: WE-02
    topic: "Laws of Indices - Multiplication"
    scenario: "Simplify the following expression: $2^3 \times 2^2$."
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 1.2.1
    real_world_analogy: >-
      Imagine two groups of people who share the exact same DNA (base 2). The first group has 3 people, and the second group has 2 people. When they combine in a room, you don't multiply the people; you just count the total headcount by adding them: 3 + 2 = 5.
    misconception_alert: >-
      CRITICAL TRAP: Students often multiply the indices instead of adding them! Remind them that for multiplication of the SAME base, the indices are added ($3 + 2$), not multiplied ($3 \times 2$). Also, ensure they don't accidentally multiply the bases to get $4^5$.
    working: |
      Step 1: Verify that both terms have the exact same base. Both bases are 2.
      Step 2: Apply the multiplication law of indices: $a^m \times a^n = a^{m+n}$.
      Step 3: Keep the base identical as 2, and add the indices together: $3 + 2 = 5$.
      Final Answer: $2^5$

  - id: WE-03
    topic: "Solving Index Equations"
    scenario: "Find the value of $x$ for the following equation: $3^x \times 9 = 81$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 1.2.7
    real_world_analogy: >-
      To compare their power, everyone in the equation must speak the same language! Right now, 3, 9, and 81 are speaking different languages. We need to convert 9 and 81 into their 'base 3' dictionary form before they can communicate and be solved.
    misconception_alert: >-
      CRITICAL TRAP: Students will try to divide 81 by 9 directly or multiply 3 by 9. That is mathematically illegal when unknown indices are involved! You MUST change everything into the same prime base first.
    working: |
      Step 1: Convert all numbers to the smallest common prime base (base 3). We know that $9 = 3^2$ and $81 = 3^4$.
      Step 2: Substitute these back into the original equation: $3^x \times 3^2 = 3^4$.
      Step 3: Combine the left side using the multiplication law of indices (add the indices): $3^{x+2} = 3^4$.
      Step 4: Since the bases are exactly the same on both sides (base 3), their indices must be exactly equal. Drop the bases to form a simple linear equation: $x + 2 = 4$.
      Step 5: Solve for $x$ by subtracting 2 from both sides: $x = 4 - 2$.
      Final Answer: $x = 2$