worked_examples:
  - id: WE-01
    topic: "Understanding Index Form"
    difficulty: easy
    real_world_analogy: "Think of index form as packing identical boxes. If each box contains 3 apples, and you have 4 boxes, you can express it as 3 to the power of 4."
    misconception_alert: "Students often confuse the base with the index, thinking 3^4 means adding 3 four times instead of multiplying."
    scenario: "Express the repeated multiplication as an index: 5 * 5 * 5."
    working: |
      Step 1: Identify the base, which is the number being multiplied repeatedly. Here, it is 5.
      Step 2: Count how many times the base is multiplied. Here, 5 is used three times.
      Step 3: Write the expression in index form: 5^3.

  - id: WE-02
    topic: "Laws of Indices - Multiplication"
    difficulty: medium
    real_world_analogy: "Imagine stacking identical boxes. If you have a stack of 3 boxes and another stack of 2 boxes, combining them follows the rule of adding indices."
    misconception_alert: "A common mistake is multiplying the indices rather than adding them when bases are the same."
    scenario: "Simplify the expression: 2^3 * 2^2."
    working: |
      Step 1: Identify that the base is the same for both terms, which is 2.
      Step 2: Apply the multiplication law of indices: add the indices (3 + 2).
      Step 3: Write the result: 2^(3+2) = 2^5 = 32.

  - id: WE-03
    topic: "Solving Problems with Indices"
    difficulty: hard
    real_world_analogy: "Solving complex index problems is like calculating compound interest where repeated multiplication over time must be simplified."
    misconception_alert: "Students might incorrectly apply laws of indices, especially with negative or fractional indices."
    scenario: "Simplify: (3^4 * 3^-2) / 3^3."
    working: |
      Step 1: Apply the multiplication law of indices: 3^4 * 3^-2 = 3^(4-2) = 3^2.
      Step 2: Now simplify the division: 3^2 / 3^3 = 3^(2-3).
      Step 3: Simplify further: 3^(2-3) = 3^-1 = 1/3.