prerequisites:
  required:
    - "MT1-01"
    - "MT1-02"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to Savings and Investment types (3.1.1) - 20 min"
    - "Step 2: Calculating Simple and Compound Interest (3.1.2) - 30 min"
    - "Step 3: Calculating ROI and factors affecting returns (3.1.3) - 30 min"
    - "Step 4: Analyzing Risk, Return, and Liquidity (3.1.4) - 25 min"
    - "Step 5: Ringgit Cost Averaging strategy for shares (3.1.5) - 20 min"
    - "Step 6: Problem solving for Savings and Investments (3.1.6) - 30 min"
    - "Step 7: Meaning and Management of Credit and Debt (3.2.1) - 20 min"
    - "Step 8: Credit Card advantages, disadvantages, and impact of payments (3.2.2, 3.2.3) - 30 min"
    - "Step 9: Loan repayment and installment calculations (3.2.5) - 30 min"
    - "Step 10: Problem solving for credit cards and loans (3.2.4, 3.2.6) - 30 min"
  common_misconceptions:
    - misconception: "Savings and investments are the same."
      remediation: "Highlight that savings generally have lower risk and higher liquidity compared to investments which aim for higher returns but carry more risk."
    - misconception: "Compound interest is calculated only on the initial principal."
      remediation: "Explain that compound interest is calculated based on the original principal and also the accumulated interest from previous periods."
    - misconception: "Paying only the minimum credit card amount will settle the debt."
      remediation: "Show that minimum payments lead to high interest charges on the balance and extend the debt period."
  engagement_hooks:
    - "Discuss how saving 10% of monthly income can build a safe financial future."
    - "Analyze real-life scenarios like choosing between different car loan packages from various banks."
    - "Explore the benefits of the ringgit cost averaging strategy in stock investment."

