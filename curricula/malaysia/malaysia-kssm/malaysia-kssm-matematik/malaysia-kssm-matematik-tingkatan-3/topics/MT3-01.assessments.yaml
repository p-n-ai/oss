questions:
  # Group by learning objective 1.1.1
  - id: Q1
    text: 'Express $3 \times 3 \times 3 \times 3$ in index form and identify the base and index.'
    difficulty: medium
    learning_objective: 1.1.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: '3^4'
      working: |
        $3 \times 3 \times 3 \times 3$ can be written as $3^4$, where 3 is the base and 4 is the index.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Correctly writes $3 \times 3 \times 3 \times 3$ as $3^4$.'
      - marks: 1
        criteria: 'Correctly identifies 3 as the base and 4 as the index.'
    hints:
      - level: 1
        text: 'Count the number of times 3 is multiplied by itself.'

  # Group by learning objective 1.1.2
  - id: Q2
    text: 'Convert $2^5$ into an ordinary numerical expression.'
    difficulty: medium
    learning_objective: 1.1.2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: '32'
      working: |
        $2^5$ means $2 \times 2 \times 2 \times 2 \times 2 = 32$.
    marks: 1
    rubric:
      - marks: 1
        criteria: 'Correctly evaluates $2^5$ to 32.'
    hints:
      - level: 1
        text: 'Calculate $2 \times 2$, and continue multiplying by 2 until done.'

  # Group by learning objective 1.2.1
  - id: Q3
    text: 'Simplify $(3^4) \times (3^2)$ using the laws of indices.'
    difficulty: medium
    learning_objective: 1.2.1
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: '3^6'
      working: |
        Using the law of indices, $(a^m) \times (a^n) = a^{m+n}$, we have $(3^4) \times (3^2) = 3^{4+2} = 3^6$.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Applies the correct law of indices to add the indices.'
      - marks: 1
        criteria: 'Correctly calculates $3^6$.'
    hints:
      - level: 1
        text: 'MISCONCEPTION ALERT: Remember, multiply bases, add indices.'

  # Group by learning objective 1.2.4
  - id: Q4
    text: 'Evaluate $5^0$ and explain why any non-zero number to the power of 0 is 1.'
    difficulty: medium
    learning_objective: 1.2.4
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: '1'
      working: |
        Any number to the power of 0 is 1 because as we decrease the index by 1, we divide by the base, and dividing by the base eventually scales to 1.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Correctly evaluates $5^0$ as 1.'
      - marks: 1
        criteria: 'Provides a logical explanation for why any non-zero number to the power of 0 is 1.'
    hints:
      - level: 1
        text: 'Consider what happens when you reduce the power by 1 each time.'

  # Group by learning objective 1.2.5
  - id: Q5
    text: 'Express $\sqrt[3]{8}$ using a fractional index and simplify.'
    difficulty: medium
    learning_objective: 1.2.5
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: '2'
      working: |
        $\sqrt[3]{8}$ can be written as $8^{1/3}$. Since $8 = 2^3$, we have $8^{1/3} = (2^3)^{1/3} = 2^{3 \times (1/3)} = 2^1 = 2$.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Correctly expresses $\sqrt[3]{8}$ as $8^{1/3}$.'
      - marks: 1
        criteria: 'Simplifies $8^{1/3}$ to $2$.'
      - marks: 1
        criteria: 'Correctly interprets the fractional index.'
    hints:
      - level: 1
        text: 'Express 8 as a power of 2 first.'
      - level: 2
        text: 'Apply the property $(a^m)^n = a^{m \times n}$.'