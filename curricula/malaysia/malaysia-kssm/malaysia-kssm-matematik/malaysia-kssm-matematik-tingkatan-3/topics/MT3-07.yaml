teaching:
  sequence:
    - "Step 1: Introduction to planes (horizontal, vertical, inclined) and normals to a plane [p.170]."
    - "Step 2: Defining and identifying orthogonal projections based on viewing direction [p.171]."
    - "Step 3: Comparing and contrasting object dimensions with their orthogonal projections [p.179]."
    - "Step 4: Drawing plans (top view) and elevations (front/side views) to full scale [p.182]."
    - "Step 5: Integrating plans and elevations using the four-quadrant method [p.183]."
    - "Step 6: Synthesising and sketching 3D objects from 2D plans and elevations [p.187]."
    - "Step 7: Solving complex problems involving combined solids and measurements [p.190]."

common_misconceptions:
  - misconception: "Viewing orthogonal projections as 3D perspective drawings."
    remediation: "Use physical models to demonstrate that projections are always 2D and perpendicular to the plane [p.171-172]."
  - misconception: "Failing to use dashed lines for hidden edges."
    remediation: "Highlight the 'TIPS' section on page 184 regarding thick solid lines vs. dashed lines."
  - misconception: "Inconsistent scaling between different views."
    remediation: "Reinforce scale drawing techniques and proportional consistency from page 182."

