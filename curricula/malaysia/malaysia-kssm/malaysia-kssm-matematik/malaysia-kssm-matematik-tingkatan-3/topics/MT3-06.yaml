teaching:
    sequence:
        - 'Step 1: Introduce the concept of angles in a circle and their properties (15 min)'
        - 'Step 2: Explain and demonstrate the relationship between angles on the circumference and central angles (20 min)'
        - 'Step 3: Discuss cyclic quadrilaterals and their angle properties (15 min)'
        - 'Step 4: Explore the properties of tangents to a circle and related angle calculations (20 min)'
        - 'Step 5: Solve real-world problems involving angles and tangents in circles (20 min)'
    common_misconceptions:
        - misconception: Students often think all angles in a circle are equal
          remediation: Clarify the difference between central and inscribed angles and their specific properties
        - misconception: Confusion between tangent and secant lines
          remediation: Use diagrams to clearly differentiate between tangents and secants
        - misconception: Assuming all quadrilaterals inscribed in circles are squares
          remediation: Provide examples of different cyclic quadrilaterals and their properties
engagement_hooks:
