teaching:
  sequence:
    - "Step 1: Introduce properties of angles at the circumference and central angles using dynamic geometry tools."
    - "Step 2: Investigate relationship between arc length and angle size at circumference and centre ."
    - "Step 3: Define cyclic quadrilaterals and explore supplementary relationship of opposite angles ."
    - "Step 4: Introduce tangents, identifying the 90-degree angle with the radius at the point of tangency ."
    - "Step 5: Analyze properties of two tangents from an external point and angles in alternate segments ."
    - "Step 6: Integrate all concepts to solve complex non-routine problems involving both angles and tangents ."

  common_misconceptions:
    - misconception: "Confusing the relationship between central angles and angles at the circumference."
      remediation: "Use dynamic software (GeoGebra) to show that the central angle is always twice the circumference angle when subtended by the same arc ."
    - misconception: "Assuming any quadrilateral drawn inside a circle is a cyclic quadrilateral."
      remediation: "Verify that all four vertices must lie exactly on the circumference ."
    - misconception: "Thinking a tangent line can pass through two points on a circle."
      remediation: "Physically demonstrate using a straight edge that a tangent touches the circle at exactly one point of tangency ."

  engagement_hooks:
    - "Design a safe roundabout: How do engineers use tangents and circle properties to calculate exit angles for traffic flow?"
    - "Moon Phases: Use the 'Exploring Mathematics' activity to draw and explain the geometry behind the crescent and gibbous moon ."
    - "Sports Trajectory: Analyze the angle of a golf ball or basketball using tangents to determine the point of release."

