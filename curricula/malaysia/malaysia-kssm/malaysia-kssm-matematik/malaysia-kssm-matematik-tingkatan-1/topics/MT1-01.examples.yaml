worked_examples:
  - id: WE-01
    topic: "Mengenal dan Memerihalkan Nombor Nisbah"
    difficulty: easy
    real_world_analogy: "Consider a pizza divided into equal parts. Each part represents a fraction of the whole pizza, similar to how rational numbers represent parts of a whole."
    misconception_alert: "Students often confuse a rational number with a whole number. Remember, rational numbers can be fractions or decimals."
    scenario: "Kamal cuts a pizza into 8 equal slices and eats 3 slices. Represent the part of the pizza Kamal ate as a rational number."
    working: |
      Step 1: Define the total number of slices as the denominator, which is 8.
      Step 2: Define the number of slices eaten by Kamal as the numerator, which is 3.
      Step 3: Express the part of the pizza eaten as a fraction: \(\frac{3}{8}\).

  - id: WE-02
    topic: "Membanding dan Menyusun Pecahan Positif dan Pecahan Negatif"
    difficulty: medium
    real_world_analogy: "Imagine you are comparing the heights of two mountains, one above sea level and one below sea level. The mountain above sea level is a positive fraction, while the one below is negative."
    misconception_alert: "Students may assume negative fractions are larger because of their absolute value. Remember, negative fractions are always less than positive ones."
    scenario: 'Compare and arrange the following fractions in ascending order: \(-\frac{1}{4}, \frac{2}{3}, \frac{1}{2}\).'
    working: |
      Step 1: Identify the signs of the fractions. \(-\frac{1}{4}\) is negative, \(\frac{2}{3}\) and \(\frac{1}{2}\) are positive.
      Step 2: Realize that negative fractions are smaller than positive ones.
      Step 3: Compare the positive fractions: \(\frac{2}{3} > \frac{1}{2}\).
      Step 4: Arrange the fractions in ascending order: \(-\frac{1}{4}, \frac{1}{2}, \frac{2}{3}\).

  - id: WE-03
    topic: "Membuat Pengiraan Melibatkan Gabungan Operasi Asas Aritmetik bagi Nombor Nisbah"
    difficulty: hard
    real_world_analogy: "Think about managing money where you have debts (negative amounts) and savings (positive amounts). Calculating your net worth involves adding and subtracting these amounts."
    misconception_alert: "A common mistake is to overlook the order of operations when performing calculations involving multiple operations."
    scenario: 'Calculate the result of \(\frac{3}{4} - \frac{2}{3} \times \left( -\frac{3}{5} \right) + \frac{1}{2}\).'
    working: |
      Step 1: Apply the multiplication first according to the order of operations: \(\frac{2}{3} \times \left( -\frac{3}{5} \right) = -\frac{6}{15}\).
      Step 2: Simplify \(-\frac{6}{15}\) to \(-\frac{2}{5}\).
      Step 3: Substitute back into the expression: \(\frac{3}{4} - \left( -\frac{2}{5} \right) + \frac{1}{2}\).
      Step 4: Convert all fractions to have a common denominator, e.g., 20.
      Step 5: Calculate: \(\frac{15}{20} + \frac{8}{20} + \frac{10}{20}\).
      Step 6: Add the fractions: \(\frac{15}{20} + \frac{8}{20} = \frac{23}{20}\).
      Step 7: Add the last fraction: \(\frac{23}{20} + \frac{10}{20} = \frac{33}{20}\).
      Step 8: Express the result as a mixed number: \(1 \frac{13}{20}\).