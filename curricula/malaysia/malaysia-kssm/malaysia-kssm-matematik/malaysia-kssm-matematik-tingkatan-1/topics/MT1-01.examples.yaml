description: "Worked examples for Nombor Nisbah"
worked_examples:
  - id: WE-01
    topic: "Mengenal dan memerihalkan nombor nisbah"
    difficulty: easy
    real_world_analogy: "Consider a pizza that can be divided into equal slices. Each slice represents a part of the whole, similar to a fraction."
    misconception_alert: "Students often think that a larger denominator means a larger fraction, but it's actually the opposite."
    scenario: "In a pizza party, there are 8 slices of pizza. If you eat 3 slices, what fraction of the pizza have you eaten?"
    working: |
      Step 1: Determine the total number of slices, which is 8.
      Step 2: Determine the number of slices eaten, which is 3.
      Step 3: Write the fraction representing the part of the pizza eaten as 3/8.
      
  - id: WE-02
    topic: "Membuat pengiraan yang melibatkan gabungan operasi asas aritmetik bagi nombor nisbah"
    difficulty: medium
    real_world_analogy: "Imagine you are shopping and need to calculate discounts on items. The discounts can be seen as fractions of the original prices."
    misconception_alert: "Students might add fractions without finding a common denominator, leading to incorrect results."
    scenario: "Sara bought 1/2 meter of fabric and then bought another 3/4 meter. How much fabric does she have in total?"
    working: |
      Step 1: Identify the fractions: 1/2 and 3/4.
      Step 2: Find a common denominator. The least common multiple of 2 and 4 is 4.
      Step 3: Convert 1/2 to 2/4.
      Step 4: Add the fractions: 2/4 + 3/4 = 5/4.
      Step 5: Convert the improper fraction to a mixed number: 5/4 = 1 1/4 meters.

  - id: WE-03
    topic: "Menyelesaikan masalah yang melibatkan pecahan positif dan pecahan negatif"
    difficulty: hard
    real_world_analogy: "Think of a bank account where deposits and withdrawals can be represented as positive and negative fractions of total funds."
    misconception_alert: "Students may forget to apply the negative sign when dealing with subtractions, which can lead to incorrect calculations."
    scenario: "Ali has 7/8 of a cake. He gave away 1/3 of the cake to his friend. What fraction of the cake does Ali have left?"
    working: |
      Step 1: Identify the fractions: 7/8 (cake Ali has) and 1/3 (cake given away).
      Step 2: Find a common denominator for 8 and 3, which is 24.
      Step 3: Convert fractions: 7/8 = 21/24 and 1/3 = 8/24.
      Step 4: Subtract the fractions: 21/24 - 8/24 = 13/24.
      Step 5: Ali has 13/24 of the cake left.