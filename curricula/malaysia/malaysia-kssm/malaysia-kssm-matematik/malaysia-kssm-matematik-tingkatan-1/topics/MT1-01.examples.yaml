worked_examples:
  - id: "WE-01"
    topic: "Integers in Real-Life Situations"
    difficulty: "easy"
    real_world_analogy: "Think of a condominium lift. Aras G is 0. Floors above are positive (+1, +2), and basement parking levels are negative (-1, -2)."
    misconception_alert: "Students often think -2 is larger than -1 because 2 is larger than 1. Remind them that in the basement, B2 is deeper (lower) than B1."
    scenario: "A submarine is located 250 m below sea level. Represent this position as an integer."
    working: |
      1. Identify the reference point: Sea level is represented by the integer 0.
      2. Determine the direction: 'Below sea level' indicates a negative direction.
      3. Combine the sign and the magnitude: The magnitude is 250.
      4. Final Answer: $-250$.
    learning_objective: "1.1.1"

  - id: "WE-02"
    topic: "Basic Arithmetic Operations involving Integers"
    difficulty: "medium"
    real_world_analogy: "The 'Friend of my Enemy' rule. Adding a negative number is like losing money (subtraction). Subtracting a negative number is like having a debt cancelled (addition)."
    misconception_alert: "The Double Negative Panic. Students often forget that $-(-x)$ becomes $+x$. Force the rewrite of the signs first."
    scenario: "Evaluate the following: $-8 + (-2) - (-10)$."
    working: |
      1. Rewrite the expression by simplifying the double signs:
         $-8 - 2 + 10$
      2. Perform the operation from left to right:
         Calculate $-8 - 2 = -10$
      3. Substitute back into the expression:
         $-10 + 10$
      4. Final Calculation: 
         $-10 + 10 = 0$
      5. Final Answer: $0$.
    learning_objective: "1.2.1"

  - id: "WE-03"
    topic: "Combined Operations of Positive and Negative Fractions"
    difficulty: "medium"
    real_world_analogy: "BODMAS is like a VIP line at a concert. Brackets, Multiplication, and Division get to go first before Addition and Subtraction."
    misconception_alert: "The 'Naked Numerator' Trap. When subtracting fractions with negative signs, students often fail to distribute the sign to the whole numerator."
    scenario: "Calculate the value of: $\\frac{1}{2} + \\left( -\\frac{3}{4} \\right) \\times \\frac{2}{3}$."
    working: |
      1. Identify the order of operations: Multiplication must be performed before addition.
      2. Multiply the fractions:
         $-\\frac{3}{4} \\times \\frac{2}{3} = -\\frac{3 \\times 2}{4 \\times 3}$
      3. Simplify the product:
         $-\\frac{6}{12} = -\\frac{1}{2}$
      4. Rewrite the full expression with the result:
         $\\frac{1}{2} + \\left( -\\frac{1}{2} \\right)$
      5. Simplify signs:
         $\\frac{1}{2} - \\frac{1}{2}$
      6. Final Answer: $0$.
    learning_objective: "1.3.3"

  - id: "WE-04"
    topic: "Solving Problems involving Rational Numbers"
    difficulty: "hard"
    real_world_analogy: "Managing a bank account. Deposits are positive, while withdrawals and bank fees are negative rational numbers."
    misconception_alert: "Skipping the 'Verification' step. In non-routine problems, students often provide a number without checking if it makes sense in the context (e.g., negative length)."
    scenario: "Luqman's credit card account showed a balance of RM230 (debt). He bought 3 books costing RM120 each. A week later, he was charged RM3 in interest and he made a payment of RM400. What is his final account balance?"
    working: |
      1. Represent the debt as a negative integer: $-230$.
      2. Calculate total book expenses: $3 \\times (-120) = -360$.
      3. Represent interest charged as a negative value: $-3$.
      4. Represent payment made as a positive value: $+400$.
      5. Form the combined operation:
         $-230 + (-360) + (-3) + 400$
      6. Solve step-by-step:
         $-230 - 360 = -590$
         $-590 - 3 = -593$
         $-593 + 400 = -193$
      7. Interpret the result: The balance is $-193$, which means a debt of RM193.
      8. Final Answer: RM193 (debt).
    learning_objective: "1.5.3"