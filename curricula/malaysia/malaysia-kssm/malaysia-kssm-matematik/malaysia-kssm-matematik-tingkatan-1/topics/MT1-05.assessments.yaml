topic_id: MT1-05
provenance: ai-generated
questions:
  - id: Q1
    text: "Sofea takes a certain amount of time, denoted by the letter $k$, to travel from her house to the school every day. Does the variable $k$ have a fixed value or a varied value? Justify your answer."
    difficulty: easy
    learning_objective: "5.1.1"
    tp_level: 2
    answer:
      type: free_text
      value: "Varied value"
      working: |
        The travelling time $k$ is a quantity that changes over time based on traffic, weather, or speed. 
        According to page 106, a variable has a varied value if the represented quantity changes over time.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifying it as a 'varied value'."
      - marks: 1
        criteria: "Justification stating that the time taken changes daily/over time."
    hints:
      - level: 1
        text: "Think about whether a daily commute takes the exact same number of minutes and seconds every single day, or if it fluctuates."

  - id: Q2
    text: "Write an algebraic expression for the following situation: The total cost of buying $m$ pens at RM 2 each and $n$ pencils at RM 1 each."
    difficulty: easy
    learning_objective: "5.1.2"
    tp_level: 3
    answer:
      type: exact
      value: "2m + n"
      working: |
        1. Cost of pens: $2 \times m = 2m$
        2. Cost of pencils: $1 \times n = n$
        3. Total cost: $2m + n$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly formulating the cost for the pens (2m) or pencils (n)."
      - marks: 1
        criteria: "Correct final expression: 2m + n (Accept n + 2m)."
    hints:
      - level: 1
        text: "Multiply the price of one item by the total number of items. Then, add the two totals together."

  - id: Q3
    text: "In the algebraic term $-8xy^2$, state the coefficient of $-x$."
    difficulty: easy
    learning_objective: "5.1.4"
    tp_level: 2
    answer:
      type: exact
      value: "8y^2"
      working: |
        Using the 'Cover-up' method:
        The term $-8xy^2$ can be rewritten as $(-x) \times (8y^2)$. 
        If we cover the $-x$, the remaining part is $8y^2$.
    marks: 2
    rubric:
      - marks: 2
        criteria: "Correct coefficient (8y^2)."
      - marks: 1
        criteria: "Identified correct variables but made a sign error (e.g., -8y^2)."
    hints:
      - level: 1
        text: "Rewrite the term as a product of $-x$ and the remaining factors. What is left over?"

  - id: Q11
    text: "Simplify: $(3xy - 2) - 2(xy - 5)$"
    difficulty: medium
    learning_objective: "5.2.1"
    tp_level: 3
    answer:
      type: multiple_choice
      value: "xy + 8"
      working: |
        Step 1 (Expand): $3xy - 2 - 2(xy) - 2(-5) = 3xy - 2 - 2xy + 10$
        Step 2 (Group Like Terms): $(3xy - 2xy) + (-2 + 10)$
        Step 3 (Simplify): $xy + 8$
      distractors:
        - value: "xy - 12"
          feedback: "You likely made a sign error when multiplying $-2$ by $-5$. Remember, a negative times a negative is a positive ($+10$)."
        - value: "5xy + 8"
          feedback: "Check your subtraction of like terms. $3xy - 2xy$ should be $1xy$, not $5xy$."
        - value: "xy - 7"
          feedback: "It looks like you combined the $-2$ and $-5$ before expanding. You must multiply the constant outside the bracket first."
    marks: 1
    hints:
      - level: 1
        text: "Expand the second bracket first. Be very careful with the negative sign in front of the 2; it must distribute to both terms inside."

  - id: Q15
    text: "Azhar's mother's age was four times Azhar's age last year. If Azhar is $n$ years old now, state his mother's age in seven years' time in terms of $n$."
    difficulty: hard
    learning_objective: "5.1.2"
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "4n + 4"
      working: |
        1. Azhar's age last year: $n - 1$
        2. Mother's age last year: $4(n - 1) = 4n - 4$
        3. Mother's age now: $(4n - 4) + 1 = 4n - 3$
        4. Mother's age in 7 years: $(4n - 3) + 7 = 4n + 4$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly deduces mother's age last year: 4(n - 1)."
      - marks: 1
        criteria: "Correctly formulates mother's current age: 4n - 3."
      - marks: 1
        criteria: "Final correct expression: 4n + 4."
    hints:
      - level: 1
        text: "Start by defining Azhar's age 'last year'. Then multiply that by 4 to get the mother's age 'last year'."
      - level: 2
        text: "Now, bring the mother's age to the 'present' by adding 1, and then jump to the 'future' by adding 7."

  - id: Q16
    text: "A ribbon of length $p$ cm is cut into three parts. The lengths of the first and second parts are $x$ cm and $2x$ cm respectively. (a) Write an expression for the length of the third part. (b) If $x = 10$ and the length of the second part is four times the length of the third part, calculate the value of $p$."
    difficulty: hard
    learning_objective: "5.2.1"
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "(a) p - 3x, (b) 35"
      working: |
        (a) Third part = Total ($p$) - First ($x$) - Second ($2x$) = $p - 3x$.
        (b) If $x = 10$, Second part = $2(10) = 20$.
        Second part (20) = $4 \times$ Third part. So, Third part = $20/4 = 5$.
        Using part (a): $5 = p - 3(10) \Rightarrow 5 = p - 30 \Rightarrow p = 35$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correct expression for (a): p - 3x."
      - marks: 1
        criteria: "Identifies numerical value of 2nd and 3rd parts (20 and 5)."
      - marks: 1
        criteria: "Substitution: 5 = p - 30."
      - marks: 1
        criteria: "Final value for p = 35."
    hints:
      - level: 1
        text: "For part (a), think of the ribbon as a whole. If you remove the first two pieces, what is left?"
      - level: 2
        text: "For part (b), solve for the 'known' numbers first. Since you know $x=10$, you can find the actual length of the second piece."
