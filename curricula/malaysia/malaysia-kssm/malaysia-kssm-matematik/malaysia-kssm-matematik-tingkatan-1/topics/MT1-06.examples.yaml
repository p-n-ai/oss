topic_id: MT1-06
provenance: ai-assisted
worked_examples:
  - id: WE-01
    topic: "Linear Equations in One Variable (6.1)"
    scenario: "Ahmad has a box containing an unknown number of apples ($x$). He gives 6 apples to his friend. Now, he only has 10 apples left in the box. Formulate and solve the linear equation to find the original number of apples."
    difficulty: easy
    tp_level: 3
    kbat: false
    learning_objective: 6.1.3
    real_world_analogy: "Think of an equation like a scale. If you add or remove apples from one side, you have to do the exact same thing to the other side to keep it perfectly balanced."
    misconception_alert: "Students might see the minus sign and think they need to subtract 6 from 10. Emphasize the 'Kaedah Pematahbalikan' (Backtracking): if we subtracted 6 to get to 10, we must ADD 6 to go backwards to the original amount."
    working: |
      Step 1: Translate the story into an equation. 
      Unknown apples (x) minus 6 equals 10. 
      Equation: x - 6 = 10
      
      Step 2: Think of the equation like a balancing scale. Right now, the left side is "lighter" by 6. To isolate x and find its true weight, we must do the opposite of subtracting 6.
      
      Step 3: Add 6 to BOTH sides to keep the scale perfectly balanced.
      x - 6 + 6 = 10 + 6
      x = 16
      
      Final Answer: Ahmad originally had 16 apples.

  - id: WE-02
    topic: "Solving Linear Equations with Brackets (6.1)"
    scenario: "Cikgu bought 2 identical pencil cases. Inside each pencil case, there are an unknown number of blue pens ($x$) and exactly 4 red pens. In total, Cikgu has 22 pens. Solve the equation $2(x + 4) = 22$ to find out how many blue pens are in each case."
    difficulty: medium
    tp_level: 4
    kbat: true
    learning_objective: 6.1.4
    real_world_analogy: "Think of the bracket like a combo meal. If you order 2 combo meals, you must multiply the 2 by every single item inside the combo."
    misconception_alert: "When expanding the bracket, students often multiply the 2 with 'x' but forget to multiply the 2 with the '4'. Remind them that the '2' outside applies to EVERYTHING inside the pencil case."
    working: |
      Step 1: We have the equation 2(x + 4) = 22. 
      First, we need to "open" the pencil cases. Multiply the 2 outside the bracket by every item inside the bracket.
      2(x) + 2(4) = 22
      2x + 8 = 22
      
      Step 2: Now we use the balance method. We have a +8 on the left side. To remove it, we must subtract 8 from BOTH sides.
      2x + 8 - 8 = 22 - 8
      2x = 14
      
      Step 3: "2x" means 2 multiplied by x. To leave x completely alone, we do the opposite: divide BOTH sides by 2.
      x = 14 / 2
      x = 7
      
      Final Answer: There are 7 blue pens in each pencil case.

  - id: WE-03
    topic: "Equations with Variables on Both Sides"
    scenario: "Two delivery companies are competing. Company A charges RM3 per kg plus a RM2 flat fee ($3x + 2$). Company B charges RM5 per kg but gives a RM4 discount ($5x - 4$). At what package weight ($x$) will both companies charge the exact same price? Solve $3x + 2 = 5x - 4$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 6.1.4
    real_world_analogy: "Think of a tug-of-war. The team with the more powerful 'x' will pull the smaller 'x' over to their side."
    misconception_alert: "Students often make sign errors when grouping variables. If they move 5x to the left, they might forget to make it negative (-5x). Teach them to always move the SMALLER variable (3x) towards the LARGER variable (5x) to avoid negative numbers."
    working: |
      Step 1: We start with variables on both sides: 3x + 2 = 5x - 4.
      Our goal is to group all the "x" terms on one side and all the numbers on the other side. 
      
      Step 2: Let's move the smaller variable (3x) to the right side to keep things positive. Subtract 3x from BOTH sides.
      3x - 3x + 2 = 5x - 3x - 4
      2 = 2x - 4
      
      Step 3: Now, group the regular numbers on the left side. We need to remove the -4 from the right side, so we add 4 to BOTH sides.
      2 + 4 = 2x - 4 + 4
      6 = 2x
      
      Step 4: Finally, to find the value of a single x, divide both sides by 2.
      6 / 2 = x
      3 = x
      
      Final Answer: Both companies will charge the exact same price when the package weighs 3 kg.
