questions:
  # --- SUBCHAPTER 7.1: Inequalities ---
  - id: Q1
    text: "Fill in the blank with the symbol '$<$' or '$>$' so that it becomes a true statement: $-8 \\text{ ___ } -3$"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 7.1.1
    answer:
      type: exact
      value: "<"
      working: |
        1. Locate -8 and -3 on a number line.
        2. -8 lies to the left of -3.
        3. Numbers further to the left are smaller. Therefore, $-8 < -3$.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly identifies the '$<$' symbol."
    hints:
      - level: 1
        text: "Think of a number line or temperature. Is $-8$ degrees colder (less) or warmer (greater) than $-3$ degrees?"

  - id: Q2
    text: "Describe the following relationship using an inequality symbol: The height, $h$ cm, of passengers allowed to ride the roller coaster must be 110 cm or more."
    difficulty: easy
    tp_level: 2
    learning_objective: 7.1.1
    answer:
      type: exact
      value: "h \\geq 110"
      working: |
        '110 cm or more' means 110 is the minimum.
        This includes 110 and any value higher.
        Symbol: $\geq$. Result: $h \geq 110$.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly uses the 'greater than or equal to' symbol."
    hints:
      - level: 1
        text: "Since they can be exactly 110 cm or taller, you need the symbol that includes 'equal to' as well as 'greater than'."

  - id: Q3
    text: "Given the inequality $12 < 15$, state the converse property of this inequality."
    difficulty: medium
    tp_level: 2
    learning_objective: 7.1.2
    answer:
      type: exact
      value: "15 > 12"
      working: |
        Converse property: If $a < b$, then $b > a$.
        Here $a = 12$ and $b = 15$.
        Converse: $15 > 12$.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correctly reverses the values and flips the symbol."
    hints:
      - level: 1
        text: "The converse property means reading the relationship backwards: if A is less than B, then B is..."

  - id: Q4
    text: "Based on the transitive property of inequalities, if $-5 < 0$ and $0 < 4$, what conclusion can you make?"
    difficulty: medium
    tp_level: 2
    learning_objective: 7.1.2
    answer:
      type: exact
      value: "-5 < 4"
      working: |
        Transitive property: If $a < b$ and $b < c$, then $a < c$.
        $a = -5, b = 0, c = 4$.
        Result: $-5 < 4$.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Forms the inequality bridging the smallest and largest values."
    hints:
      - level: 1
        text: "Connect the ends: if the first number is smaller than the middle, and the middle is smaller than the last, how does the first compare to the last?"

  - id: Q5
    text: "Consider the inequality $4 > -2$. If you multiply both sides by $-3$, what is the new inequality?"
    difficulty: medium
    tp_level: 3
    learning_objective: 7.1.2
    answer:
      type: exact
      value: "-12 < 6"
      working: |
        1. Multiply 4 by -3: $-12$.
        2. Multiply -2 by -3: $6$.
        3. Multiplier is negative, so flip $>$ to $<$.
        Result: $-12 < 6$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Calculates correct values on both sides (-12 and 6)."
      - marks: 1
        criteria: "Flips the inequality symbol correctly."
    hints:
      - level: 1
        text: "Remember the 'Big Flip' rule! What happens to the symbol when you multiply by a negative number?"

  # --- SUBCHAPTER 7.2: Linear Inequalities in One Variable ---
  - id: Q6
    text: "Form a linear inequality: Maximum capacity of a lift is 15 people. Use $p$ to represent people."
    difficulty: easy
    tp_level: 2
    learning_objective: 7.2.1
    answer:
      type: exact
      value: "p \\leq 15"
      working: |
        Maximum means 15 or less.
        Symbol: $\leq$. Result: $p \leq 15$.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Uses the correct symbol for maximum capacity."
    hints:
      - level: 1
        text: "If the limit is 15, can there be 16 people? No. Can there be exactly 15? Yes."

  - id: Q7
    text: "Solve the linear inequality: $3x - 5 > 10$"
    difficulty: medium
    tp_level: 3
    learning_objective: 7.2.2
    answer:
      type: exact
      value: "x > 5"
      working: |
        1. Add 5: $3x > 15$.
        2. Divide by 3: $x > 5$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Isolates the variable term correctly."
      - marks: 1
        criteria: "Solves for x with correct symbol."
    hints:
      - level: 1
        text: "Solve it like an equation! Move the constant first, then divide by the coefficient."

  - id: Q8
    text: "Solve: $-2y \\geq 14$"
    difficulty: medium
    tp_level: 3
    learning_objective: 7.2.2
    answer:
      type: exact
      value: "y \\leq -7"
      working: |
        1. Divide by -2.
        2. Flip $\geq$ to $\leq$ because divider is negative.
        3. $y \leq -7$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Calculates the value -7 correctly."
      - marks: 1
        criteria: "Flips symbol from $\geq$ to $\leq$."
    hints:
      - level: 1
        text: "Watch out! You are dividing by a negative number. What must you do to the sign?"

  - id: Q9
    text: "Solve simultaneous inequalities: $x - 3 \\leq 5$ and $2x > 8$"
    difficulty: hard
    tp_level: 4
    learning_objective: 7.2.3
    answer:
      type: exact
      value: "4 < x \\leq 8"
      working: |
        1. $x - 3 \leq 5 \rightarrow x \leq 8$.
        2. $2x > 8 \rightarrow x > 4$.
        3. Intersection: $4 < x \leq 8$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Solves first inequality correctly."
      - marks: 1
        criteria: "Solves second inequality correctly."
      - marks: 1
        criteria: "Combines them to show the common range."
    hints:
      - level: 1
        text: "Solve both separately, then draw them on a number line to see where they overlap."

  - id: Q10
    text: "Aminah has RM 50. She buys a book for RM 12 and pens for RM 4 each. Determine the maximum number of pens she can buy."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 7.2.2
    answer:
      type: exact
      value: "9"
      working: |
        1. Let $p$ be pens. $12 + 4p \leq 50$.
        2. $4p \leq 38$.
        3. $p \leq 9.5$.
        4. Maximum integer pens = 9.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Forms correct inequality $12 + 4p \leq 50$."
      - marks: 1
        criteria: "Solves algebra to get $p \leq 9.5$."
      - marks: 1
        criteria: "Interprets integer result in context."
    hints:
      - level: 1
        text: "Total cost must be $\leq$ 50. Can she buy half a pen? No, so round down to the nearest whole number."

  - id: Q11
    text: "Given $-\\frac{1}{5}x \\geq -\\frac{3}{5}$. If $x$ is a positive integer, state the values of $x$."
    difficulty: medium
    tp_level: 3
    learning_objective: 7.2.2
    answer:
      type: multiple_choice
      value: "A"
      working: |
        1. Multiply by -5: $x \leq 3$.
        2. Positive integers $\leq 3$ are 1, 2, 3.
      distractors:
        - value: "B"
          feedback: "You might have excluded 3. 'Equal to' means 3 is included."
        - value: "C"
          feedback: "Remember that 0 is not a positive integer."
        - value: "D"
          feedback: "You forgot to flip the inequality sign! Multiplying by -5 flips $\geq$ to $\leq$."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Selects option A."
    hints:
      - level: 1
        text: "Flip the sign! Also, check the definition of 'positive integer'—does it include 0?"

  - id: Q12
    text: "Match integer sets to ranges:\n(i) $x = -1, 0, 1, 2, 3$\n(ii) $x = 1, 2$"
    difficulty: medium
    tp_level: 3
    learning_objective: 7.2.1
    answer:
      type: exact
      value: "(i) -1 \\leq x \\leq 3, (ii) 1 \\leq x < 3"
      working: |
        (i) Includes endpoints -1 and 3: $\leq$ and $\leq$.
        (ii) Includes 1 but excludes 3: $\leq$ and $<$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly matches (i) with inclusive boundaries."
      - marks: 1
        criteria: "Correctly matches (ii) with one strict boundary."
    hints:
      - level: 1
        text: "If the list includes the boundary number, use $\leq$. If it stops just before, use $<$."
