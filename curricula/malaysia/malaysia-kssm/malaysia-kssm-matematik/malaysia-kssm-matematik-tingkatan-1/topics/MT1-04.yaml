prerequisites:
  required:
    - "MT1-01"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to Ratios & Visualizing 3-part mixtures (2 days)"
    - "Step 2: Equivalent Ratios & The 'Simplest Form' decluttering (3 days)"
    - "Step 3: Conversion from Ratios to Rates (2 days)"
    - "Step 4: Mastery of Proportions via Cross-Multiplication (3 days)"
    - "Step 5: Solving 3-ratio combined problems (3 days)"
    - "Step 6: Real-world Estimation & Population Modeling (4 days)"
  common_misconceptions:
    - misconception: "Adding a constant to both parts results in an equivalent ratio (e.g., $1:2 = 2:3$ by adding 1)."
      remediation: "Use the 'Saltiness of Soup' analogy: adding salt and water in diff proportions changes the taste."
    - misconception: "Confusing Rate with Ratio."
      remediation: "Clarify that Ratios compare the same units, while Rates compare different units (e.g., sen/kWh)."
    - misconception: "The 'Upside Down' Trap in Proportions."
      remediation: "Always align units horizontally: $\\frac{A_1}{B_1} = \\frac{A_2}{B_2}$."
  engagement_hooks:
    - "The Bubur Pulut Hitam recipe: 'Is the sweetness the same if we cook 10 pots? (Equivalent Ratios)'"
    - "The Telco Plan Battle: 'Which data plan gives more GB per Ringgit? (Rates)'"
    - "Estimation of National Populations using tagging and sampling ratios."

quality_level: 2
