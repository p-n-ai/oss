prerequisites:
  required:
    - "MT1-01"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Represent ratios in the form a : b : c and find equivalent ratios (4.1.1, 4.1.2)."
    - "Step 2: Simplify ratios and explore the specific relationship with rates (4.1.3, 4.2.1)."
    - "Step 3: Define proportions and solve for unknown values using unitary or cross-multiplication (4.3.1, 4.3.2)."
    - "Step 4: Connect multiple ratios and solve rate-related values (4.4.1, 4.4.2, 4.4.3)."
    - "Step 5: Apply ratios to percentages and solve multi-step problems involving fractions/decimals (4.5.1, 4.5.2, 4.5.3)."
  common_misconceptions:
    - misconception: "Assuming ratios and fractions are identical in all contexts."
      remediation: "Clarify that while ratios can be expressed as fractions, they compare parts to parts or parts to wholes differently."
    - misconception: "Ignoring units when comparing quantities in a ratio."
      remediation: "Emphasize that ratios compare quantities of the same kind measured in the same unit."
    - misconception: "Misordering quantities in a proportion calculation."
      remediation: "Use visual mapping to ensure numerators and denominators correspond correctly."
  engagement_hooks:
    - "Analyze the 'Vitruvian Man' by Leonardo da Vinci to explore human body proportions."
    - "Scale a traditional Malaysian recipe for Black Glutinous Rice Porridge for different group sizes."
    - "Use marine biology contexts like estimating seahorse populations using capture-mark-release-recapture."

quality_level: 2
