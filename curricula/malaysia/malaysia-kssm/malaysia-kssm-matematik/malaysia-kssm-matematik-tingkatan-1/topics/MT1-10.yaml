performance_standards:
  - level: 1
    descriptor_en: "Demonstrate basic knowledge of perimeter and area."
  - level: 2
    descriptor_en: "Demonstrate understanding of methods for estimating perimeter and area of various shapes."
  - level: 3
    descriptor_en: "Apply understanding to derive area formulae for triangles, parallelograms, kites and trapeziums."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills to solve routine problems involving perimeter and area."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills to make and verify conjectures about the relationship between perimeter and area."
  - level: 6
    descriptor_en: "Apply appropriate knowledge and skills to solve non-routine problems involving combinations of shapes and cost-efficiency scenarios."

prerequisites:
  required:
    - "MT-G5-Perimeter"
    - "MT1-04"

bloom_levels:
  - "apply"
  - "analyze"
  - "evaluate"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Explore perimeter by measuring classroom objects and swimming pool boundaries (Textbook p. 226)."
    - "Step 2: Practice estimation using thread for curved lines and grid paper for irregular shapes (Exploration Activity 1)."
    - "Step 3: Solve perimeter problems in real-world contexts like fencing a shopping mall parking area (Textbook p. 228)."
    - "Step 4: Estimate area using 1-unit square grids and horizontal line methods (Textbook p. 231)."
    - "Step 5: Hands-on derivation: Convert parallelograms and triangles into rectangles to discover area formulas (Exploration Activities 2-5)."
    - "Step 6: Master composite shapes: Calculate area for combined plots of land featuring different crops (Textbook p. 237)."
    - "Step 7: Investigation: Discover why a square provides the maximum area for a fixed perimeter (Exploration Activity 6)."
    - "Step 8: Final Challenge: Solve non-routine TP6 problems involving missing side lengths and cost-efficiency (Textbook p. 244)."
  common_misconceptions:
    - misconception: "Confusing perimeter (boundary) with area (surface region)."
      remediation: "Use the 'Fence vs. Grass' analogy: perimeter is the fence length, area is the grass inside."
    - misconception: "Thinking that shapes with the same perimeter must have the same area."
      remediation: "Perform Exploration Activity 6 to show how area changes while perimeter is fixed at 36 cm."
    - misconception: "Forgetting that height in triangles and parallelograms must be the perpendicular height, not the slant height."
      remediation: "Highlight the right-angle symbol in formulas: Area = $\\frac{1}{2} \\times base \\times perpendicular\\ height$."
  engagement_hooks:
    - "The Rice Producer's Secret: Discuss how the vast paddy fields in Kedah (Jelapang Padi Malaysia) use perimeter for irrigation borders and area for harvest yield (Textbook p. 224)."
    - "The Rhind Papyrus Mystery: Share the historical fact that ancient Egyptians made a mistake in their quadrilateral area formula in 1650 B.C. (Textbook p. 225)."
    - "The Exhibition Designer: Challenge students to plan a booth for 'Hari Wawasan' using exactly 20m of red ribbon to maximize space (Textbook p. 245)."

quality_level: 2
provenance: "curriculum-expert-verified"

