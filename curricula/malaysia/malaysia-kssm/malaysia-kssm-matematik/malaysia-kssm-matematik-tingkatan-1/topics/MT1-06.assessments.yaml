topic_id: MT1-06
provenance: ai-assisted-validated
questions:
  ##### ---------------------------------------------------------
  ##### SUBCHAPTER 6.1: Linear Equations in One Variable
  ##### ---------------------------------------------------------
  - id: MT1-06-Q01
    text: "Classify the following mathematical sentence: $x + 5 = 10$"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 6.1.1
    answer:
      type: multiple_choice
      value: "Linear equation in one variable"
      working: |
        1. Check variables: Only one variable ($x$).
        2. Check power: The highest power of $x$ is 1.
        3. Check equality: Contains an '=' sign.
      distractors:
        - value: "Algebraic expression"
          feedback: "An expression does not have an '=' sign. Since this has an equal sign, it is an equation!"
        - value: "Linear inequality"
          feedback: "Inequalities use symbols like $>$ or $<$. This uses $=$, making it an equation."
        - value: "Non-linear equation"
          feedback: "Linear means the power of the variable is exactly 1. There are no $x^2$ terms here."
    marks: 1
    hints:
      - level: 1
        text: "Look at the symbol between the two sides. Does it show a relationship of equality?"

  - id: MT1-06-Q02
    text: "Determine if this statement is TRUE or FALSE: 'The equation $k^2 + 1 = 6$ is a linear equation in one variable.'"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: 6.1.1
    answer:
      type: exact
      value: "FALSE"
      working: |
        A linear equation must have the highest power of the variable as 1. 
        In $k^2 + 1 = 6$, the variable $k$ has a power of 2.
    marks: 1
    hints:
      - level: 1
        text: "Check the 'power' (exponent) of the letter $k$. For an equation to be 'linear', what must that power be?"

  - id: MT1-06-Q03
    text: "Solve the following linear equation: $3x - 4 = 11$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 6.1.3
    answer:
      type: exact
      value: "5"
      working: |
        1. Apply equality concept (Add 4 to both sides): $3x - 4 + 4 = 11 + 4$
        2. Simplify: $3x = 15$
        3. Apply equality concept (Divide both sides by 3): $3x/3 = 15/3$
        4. Final result: $x = 5$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly isolates the $3x$ term to get $3x = 15$."
      - marks: 1
        criteria: "Correct final value for $x$."
    hints:
      - level: 1
        text: "Imagine a scale. To get $3x$ alone, we need to remove the $-4$. What is the opposite of subtracting 4?"

  ##### ---------------------------------------------------------
  ##### SUBCHAPTER 6.2: Linear Equations in Two Variables
  ##### ---------------------------------------------------------
  - id: MT1-06-Q04
    text: "Stationery shop sells books for $RM15$ each and pens for $RM2$ each. Damia spends a total of $RM50$ to buy $b$ books and $p$ pens. Form a linear equation to represent this."
    difficulty: medium
    tp_level: 2
    kbat: false
    learning_objective: 6.2.2
    answer:
      type: exact
      value: "15b + 2p = 50"
      working: |
        Cost of books: $15 \times b = 15b$
        Cost of pens: $2 \times p = 2p$
        Total Cost: $15b + 2p = 50$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifies terms $15b$ and $2p$."
      - marks: 1
        criteria: "Correct equation structure equal to 50."
    hints:
      - level: 1
        text: "Think about the total bill. If you buy $b$ items at $RM15$ each, how do you write that cost?"

  ##### ---------------------------------------------------------
  ##### SUBCHAPTER 6.3: Simultaneous Linear Equations
  ##### ---------------------------------------------------------
  - id: MT1-06-Q05
    text: "Solve using the elimination method: \n $3p + 2q = 16$ \n $p - 2q = 0$"
    difficulty: hard
    tp_level: 3
    kbat: false
    learning_objective: 6.3.2
    answer:
      type: exact
      value: "(4, 2)"
      working: |
        Eq 1: $3p + 2q = 16$
        Eq 2: $p - 2q = 0$
        1. Add equations (since signs of $2q$ are different): $(3p + p) + (2q - 2q) = 16 + 0$
        2. $4p = 16 \rightarrow p = 4$
        3. Substitute $p=4$ into Eq 2: $4 - 2q = 0 \rightarrow 2q = 4 \rightarrow q = 2$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly adds equations to eliminate $q$."
      - marks: 1
        criteria: "Correct value for $p$."
      - marks: 1
        criteria: "Correct value for $q$."
    hints:
      - level: 1
        text: "Look at the '2q' in both equations. They have different signs ($+2q$ and $-2q$). Should you add or subtract the equations to make $q$ vanish?"

  ##### ---------------------------------------------------------
  ##### UASA NATIONAL EXAM EXEMPLARS & KBAT
  ##### ---------------------------------------------------------
  - id: MT1-06-Q06
    text: "Solve: $4(b + 1) = \\frac{b}{2} - 1$"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: 6.1.3
    answer:
      type: multiple_choice
      value: "-10/7"
      working: |
        1. Expand: $4b + 4 = b/2 - 1$
        2. Multiply all terms by 2: $8b + 8 = b - 2$
        3. Move variables: $8b - b = -2 - 8$
        4. Simplify: $7b = -10 \rightarrow b = -10/7$
      distractors:
        - value: "-4/9"
          feedback: "You might have made an error in moving the $+4$ or multiplying the whole equation by 2. Check your signs!"
        - value: "-10/9"
          feedback: "Check your subtraction: $8b - b$ is $7b$, not $9b$. You might have accidentally added the terms."
        - value: "-2/7"
          feedback: "Did you forget to multiply the $-1$ on the right side by 2? Every term must be treated equally!"
    marks: 1
    hints:
      - level: 1
        text: "First, expand the brackets. Then, multiply every single term by 2 to get rid of that fraction!"

  - id: MT1-06-Q07
    text: "Aina spends $x$ hours exercising and $y$ hours reading. Total time is 11 hours. One week, she halved her exercise and spent an additional 3 hours reading. The new total was 12 hours. Find $x$ and $y$."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 6.3.3
    answer:
      type: exact
      value: "x = 4, y = 7"
      working: |
        Eq 1: $x + y = 11$
        Eq 2: $x/2 + (y + 3) = 12 \rightarrow x/2 + y = 9$
        From Eq 1: $y = 11 - x$
        Substitute into Eq 2: $x/2 + 11 - x = 9$
        $-x/2 = -2 \rightarrow x = 4$
        $y = 11 - 4 = 7$
    marks: 4
    rubric:
      - marks: 1
        criteria: "Correct Equation 1 ($x + y = 11$)."
      - marks: 1
        criteria: "Correct Equation 2 ($x/2 + y = 9$)."
      - marks: 1
        criteria: "Correct value for $x$."
      - marks: 1
        criteria: "Correct value for $y$."
    hints:
      - level: 1
        text: "Be careful with 'additional 3 hours'. It means her reading time is now $y + 3$. Build your two equations first!"

  - id: MT1-06-Q08
    text: "At a T-junction, the traffic flow rate (vehicles/hour) follows the rule $x + y = 500$, where $x$ is cars and $y$ is motorcycles. If a new rule states cars must be 3 times the number of motorcycles to prevent congestion, calculate the required number of cars."
    difficulty: hard
    tp_level: 6
    kbat: true
    learning_objective: 6.3.3
    answer:
      type: exact
      value: "375"
      working: |
        1. Condition 1: $x + y = 500$
        2. Condition 2 (Creative synthesis): $x = 3y$
        3. Substitute (2) into (1): $3y + y = 500$
        4. $4y = 500 \rightarrow y = 125$
        5. Find cars ($x$): $x = 3(125) = 375$
    marks: 4
    rubric:
      - marks: 2
        criteria: "Successfully translates the '3 times' condition into the equation $x = 3y$."
      - marks: 2
        criteria: "Solves the simultaneous system to find cars = 375."
    hints:
      - level: 1
        text: "This is a TP6 non-routine problem. You have two rules that must be true at the same time. How can you write 'cars are 3 times motorcycles' as an equation?"
