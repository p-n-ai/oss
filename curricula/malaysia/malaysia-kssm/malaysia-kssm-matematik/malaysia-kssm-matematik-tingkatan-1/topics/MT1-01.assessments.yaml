  # 1.2 Integers (TP5 - Complex Routine)
  - id: "Q7"
    text: "A shop made a profit of RM16,800 in the first year and a loss of RM6,500 each year for the next two years. In the fourth year, the loss was twice the loss of the second year. Calculate the total profit or loss after four years."
    difficulty: "hard"
    learning_objective: "1.2.6"
    tp_level: 5
    kbat: true
    answer:
      type: "exact"
      value: "-9200"
      working: |
        1. Year 1: $+16800$.
        2. Year 2 & 3: $2 \times (-6500) = -13000$.
        3. Year 4: $2 \times (-6500) = -13000$.
        4. Total: $16800 - 13000 - 13000 = -9200$.
        5. Result: A loss of RM9,200.
    marks: 5
    rubric:
      - marks: 2
        criteria: "Represent profits as positive and losses as negative integers."
      - marks: 2
        criteria: "Calculate the fourth-year loss correctly."
      - marks: 1
        criteria: "Find the final net result correctly."
    hints:
      - level: 1
        text: "Assign + for profit and - for loss. How much was the total loss for years 2, 3, and 4 combined?"

  # 1.5 Rational Numbers (TP6 - Non-Routine)
  - id: "Q8"
    text: "Noriah donates $\\frac{3}{8}$ of her RM120 savings. She then buys shoes for RM25.60. Using rational number operations, explain if her remaining balance is enough to buy a book costing RM50."
    difficulty: "hard"
    learning_objective: "1.5.3"
    tp_level: 6
    kbat: true
    answer:
      type: "free_text"
      value: "No, she only has RM49.40 left."
      working: |
        1. Donation: $\frac{3}{8} \times 120 = 45$.
        2. Remaining after donation: $120 - 45 = 75$.
        3. After shoes: $75 - 25.60 = 49.40$.
        4. Comparison: $49.40 < 50.00$.
    marks: 6
    rubric:
      - marks: 2
        criteria: "Calculate donation amount correctly."
      - marks: 2
        criteria: "Calculate remaining balance after both expenses."
      - marks: 2
        criteria: "Provide logical reasoning comparing balance to book price."
    hints:
      - level: 1
        text: "Calculate her balance step-by-step. Does she have more or less than RM50 at the end?"