questions:
  # Learning Objective: 1.1.3 (apply)
  - id: Q1
    text: "Letakkan integer 5 dan -3 pada garis nombor. Apakah integer yang paling hampir dengan sifar?"
    difficulty: medium
    learning_objective: 1.1.3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "5"
      working: |
        Pada garis nombor, integer -3 terletak di sebelah kiri sifar manakala integer 5 terletak di sebelah kanan sifar. Integer 5 lebih besar dan lebih hampir kepada sifar.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengenal pasti kedudukan integer pada garis nombor."
      - marks: 1
        criteria: "Menentukan integer yang paling hampir dengan sifar."
    hints:
      - level: 1
        text: "Ingat bahawa integer positif terletak di sebelah kanan sifar dan integer negatif di sebelah kiri."

  # Learning Objective: 1.1.4 (analyze)
  - id: Q2
    text: "Susun integer berikut mengikut tertib menaik: -7, 3, -1, 0, 5."
    difficulty: medium
    learning_objective: 1.1.4
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "-7, -1, 0, 3, 5"
      working: |
        Untuk menyusun integer mengikut tertib menaik:
        - Integer negatif lebih kecil daripada integer positif.
        - Susunan: -7, -1, 0, 3, 5.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenal pasti integer negatif dan positif."
      - marks: 1
        criteria: "Mengenal pasti kedudukan sifar."
      - marks: 1
        criteria: "Susunan akhir yang betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Integer negatif lebih kecil daripada sifar dan integer positif."

  # Learning Objective: 1.2.1 (apply)
  - id: Q3
    text: "Hitungkan hasil bagi $(-8) + 5$ menggunakan garis nombor."
    difficulty: medium
    learning_objective: 1.2.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "-3"
      working: |
        Pada garis nombor:
        - Mulakan dari -8.
        - Bergerak 5 unit ke kanan.
        - Kedudukan akhir adalah -3.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan kedudukan awal pada garis nombor."
      - marks: 1
        criteria: "Mengira pergerakan dan kedudukan akhir yang betul."
    hints:
      - level: 1
        text: "Memulakan dari -8, bergerak ke kanan sebanyak 5 langkah."

  # Learning Objective: 1.3.2 (analyze)
  - id: Q4
    text: "Bandingkan dan susun pecahan berikut mengikut tertib menurun: $-\frac{1}{2}$, $\frac{3}{4}$, $-\frac{3}{4}$, $\frac{1}{4}$."
    difficulty: medium
    learning_objective: 1.3.2
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "$\frac{3}{4}, \frac{1}{4}, -\frac{1}{2}, -\frac{3}{4}$"
      working: |
        Untuk menyusun pecahan mengikut tertib menurun:
        - Pecahan positif lebih besar daripada pecahan negatif.
        - Susunan: $\frac{3}{4}, \frac{1}{4}, -\frac{1}{2}, -\frac{3}{4}$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenal pasti tanda positif dan negatif."
      - marks: 1
        criteria: "Menyusun pecahan positif."
      - marks: 1
        criteria: "Menyusun pecahan negatif."
    hints:
      - level: 1
        text: "Pecahan positif adalah lebih besar daripada pecahan negatif."

  # Learning Objective: 1.3.4 (apply)
  - id: Q5
    text: "Selesaikan masalah berikut: Ali mempunyai $\frac{3}{5}$ bahagian kek. Dia memberi $\frac{1}{5}$ bahagian kepada Amir. Berapakah bahagian kek yang tinggal?"
    difficulty: medium
    learning_objective: 1.3.4
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "$\frac{2}{5}$"
      working: |
        Ali bermula dengan $\frac{3}{5}$ bahagian kek. Selepas memberi $\frac{1}{5}$ kepada Amir:
        $\frac{3}{5} - \frac{1}{5} = \frac{2}{5}$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengenali pecahan yang perlu ditolak."
      - marks: 1
        criteria: "Melakukan pengiraan penolakan dengan betul."
    hints:
      - level: 1
        text: "Fokus pada operasi penolakan pecahan yang serupa."