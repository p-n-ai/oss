  # 1.1 Integers (TP3 - Subjective)
  - id: "Q2"
    text: "Arrange the following integers in ascending order: -3, 5, -1, 0, 4."
    difficulty: "medium"
    learning_objective: "1.1.4"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "-3, -1, 0, 4, 5"
      working: |
        1. Identify the smallest negative number: -3.
        2. Identify the next negative number closer to zero: -1.
        3. Place zero.
        4. Arrange positive numbers: 4, then 5.
        5. Final order: -3, -1, 0, 4, 5.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Correctly identify -3 as the smallest value."
      - marks: 1
        criteria: "Correctly place negative numbers and zero in the sequence."
      - marks: 1
        criteria: "Complete the full sequence correctly."
    hints:
      - level: 1
        text: "Imagine a number line. Which number is furthest to the left?"
      - level: 2
        text: "Remember the 'Debt Logic': is it better to owe RM3 (-3) or RM1 (-1)? Use that to find the smaller number."

  # 1.2 Operations (TP3 - Subjective)
  - id: "Q3"
    text: "Calculate the value of: $6 \\times (-2) + 4 \\div 2$."
    difficulty: "medium"
    learning_objective: "1.2.3"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "-10"
      working: |
        1. Perform multiplication: $6 \times (-2) = -12$.
        2. Perform division: $4 \div 2 = 2$.
        3. Combine results: $-12 + 2 = -10$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Perform multiplication correctly using sign rules."
      - marks: 1
        criteria: "Perform division correctly."
      - marks: 1
        criteria: "Apply the order of operations (BODMAS) to get the final answer."
    hints:
      - level: 1
        text: "Which operations should you do first? Remember the priority of multiplication and division over addition!"

  # 1.3 Fractions (TP3 - OPB)
  - id: "Q4"
    text: "State whether the following statement is TRUE or FALSE: $-\\frac{3}{4}$ is larger than $-\\frac{1}{2}$."
    difficulty: "medium"
    learning_objective: "1.3.2"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "FALSE"
      working: |
        1. Equate denominators: $-\frac{3}{4}$ and $-\frac{2}{4}$.
        2. Compare: $-3$ is smaller than $-2$ on a number line.
        3. Therefore, $-\frac{3}{4} < $-\frac{1}{2}$.
    marks: 2
    hints:
      - level: 1
        text: "Try equating the denominators first. Is $-\\frac{3}{4}$ further left or right compared to $-\\frac{2}{4}$ on the number line?"

  # 1.4 Decimals (TP4 - Subjective/Simple Routine)
  - id: "Q5"
    text: "Aisah bought a shirt for RM19.90 and two pairs of trousers for the same price. She paid RM55 and received RM5.40 in change. Calculate the price of one pair of trousers."
    difficulty: "medium"
    learning_objective: "1.4.4"
    tp_level: 4
    kbat: true
    answer:
      type: "exact"
      value: "14.85"
      working: |
        1. Total spent = $55.00 - 5.40 = 49.60$.
        2. Cost of 2 trousers = $49.60 - 19.90 = 29.70$.
        3. Price of 1 trouser = $29.70 \div 2 = 14.85$.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Calculate total expenditure correctly."
      - marks: 1
        criteria: "Subtract shirt price to find cost of trousers."
      - marks: 2
        criteria: "Divide by 2 to find the correct unit price."
    hints:
      - level: 1
        text: "Start by finding out how much Aisah actually spent. If she gave RM55 and got RM5.40 back, what was the total bill?"

