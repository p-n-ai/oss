topic_id: MT1-01
provenance: ai-generated

questions:
  # Learning objective 1.1.2 (understand): Mengenal dan memerihalkan integer
  - id: Q1
    text: "Nyatakan sama ada setiap nombor berikut ialah integer: -5, 0.75, 3, -2.1, 7."
    difficulty: medium
    learning_objective: 1.1.2
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "-5, 3, 7"
      working: |
        Integer adalah nombor bulat yang boleh positif, negatif, atau sifar. Oleh itu, -5, 3, dan 7 adalah integer, manakala 0.75 dan -2.1 bukan integer.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenalpasti satu nombor sebagai integer dengan betul."
      - marks: 2
        criteria: "Mengenalpasti dua nombor sebagai integer dengan betul."
      - marks: 3
        criteria: "Mengenalpasti semua integer dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Ingat bahawa integer tidak mempunyai bahagian perpuluhan."

  # Learning objective 1.1.4 (analyze): Membanding dan menyusun integer mengikut tertib
  - id: Q2
    text: "Susun integer berikut mengikut tertib menaik: -3, 5, -1, 0, 4."
    difficulty: medium
    learning_objective: 1.1.4
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "-3, -1, 0, 4, 5"
      working: |
        Untuk menyusun integer mengikut tertib menaik, mula dengan nombor yang paling kecil. Dalam senarai ini, -3 adalah yang paling kecil, diikuti oleh -1, 0, 4, dan akhirnya 5.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyusun dua nombor pertama dengan betul."
      - marks: 2
        criteria: "Menyusun hingga nombor ketiga dengan betul."
      - marks: 3
        criteria: "Menyusun semua nombor dengan betul."
    hints:
      - level: 1
        text: "Bandingkan setiap nombor dengan melihat kedudukannya pada garis nombor."

  # Learning objective 1.2.1 (apply): Menambah dan menolak integer menggunakan garis nombor atau kaedah lain yang sesuai 
  - id: Q3
    text: "Hitung hasil operasi $-7 + 5 - 3$."
    difficulty: medium
    learning_objective: 1.2.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "-5"
      working: |
        Mula dengan $-7 + 5$: 
        $-7 + 5 = -2$.
        Kemudian, $-2 - 3 = -5$.
        Oleh itu, jawapan adalah $-5$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Kira $-7 + 5$ dengan betul."
      - marks: 2
        criteria: "Kira $-2 - 3$ dengan betul selepas langkah pertama."
      - marks: 3
        criteria: "Mengira keseluruhan operasi dengan betul."
    hints:
      - level: 1
        text: "Cuba pecahkan setiap operasi satu per satu dan gunakan garis nombor jika perlu."

  # Learning objective 1.2.3 (apply): Membuat pengiraan yang melibatkan gabungan operasi asas aritmetik bagi integer mengikut tertib operasi
  - id: Q4
    text: 'Kira hasil operasi berikut: $6 \times (-2) + 4 \div 2$.'
    difficulty: medium
    learning_objective: 1.2.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "-10"
      working: |
        Mengikut tertib operasi, lakukan pendaraban dan pembahagian dahulu:
        $6 \times (-2) = -12$.
        $4 \div 2 = 2$.
        Kemudian, $-12 + 2 = -10$.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Kira hasil $6 \times (-2)$ dengan betul.'
      - marks: 2
        criteria: 'Kira hasil $4 \div 2$ dengan betul.'
      - marks: 3
        criteria: "Mengira keseluruhan operasi dengan betul."
    hints:
      - level: 1
        text: "Ingat untuk mendahulukan operasi pendaraban dan pembahagian sebelum penambahan dan penolakan."

  # Learning objective 1.5.1 (understand): Mengenal dan memerihalkan nombor nisbah
  - id: Q5
    text: 'Antara nombor berikut, yang manakah adalah nombor nisbah? $\frac{1}{2}, \sqrt{2}, 0.333, -8$'
    difficulty: medium
    learning_objective: 1.5.1
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "A, C, D"
      options:
        A: '$\frac{1}{2}$'
        B: '$\sqrt{2}$'
        C: '0.333'
        D: '-8'
      working: |
        Nombor nisbah adalah nombor yang boleh dinyatakan sebagai pecahan dua integer. $\frac{1}{2}$ dan -8 adalah jelas pecahan atau integer, manakala 0.333 adalah perpuluhan yang boleh dinyatakan sebagai pecahan (333/1000). $\sqrt{2}$ tidak boleh dinyatakan sebagai pecahan dua integer.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Memilih dua nombor nisbah dengan betul."
      - marks: 2
        criteria: "Memilih semua nombor nisbah dengan betul."
    hints:
      - level: 1
        text: "Periksa sama ada setiap nombor boleh dinyatakan sebagai pecahan dua integer."