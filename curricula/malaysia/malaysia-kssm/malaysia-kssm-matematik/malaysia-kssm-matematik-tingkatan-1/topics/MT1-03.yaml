    descriptor_en: "Demonstrate the basic knowledge of squares, square roots, cubes and cube roots."
  - level: 2
    descriptor_en: "Demonstrate the understanding of squares, square roots, cubes and cube roots."
  - level: 3
    descriptor_en: "Apply the understanding of squares, square roots, cubes and cube roots to perform simple tasks."
  - level: 4
