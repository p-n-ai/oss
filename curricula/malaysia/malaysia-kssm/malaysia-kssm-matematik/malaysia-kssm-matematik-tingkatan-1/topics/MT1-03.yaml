prerequisites:
  required:
    - id: MT1-02
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Identifying Perfect Squares & Area of Squares (2 days)"
    - "Step 2: Operations with Square Roots (2 days)"
    - "Step 3: Estimation of Squares/Roots (2 days)"
    - "Step 4: Identifying Perfect Cubes & Volume of Cubes (2 days)"
    - "Step 5: Operations with Cube Roots (2 days)"
    - "Step 6: Combined Operations (BEDMAS/BODMAS) (3 days)"
    - "Step 7: Real-world Design Challenges (3 days)"
  common_misconceptions:
    - misconception: "Squared ($x^2$) means $x \times 2$."
      remediation: "Use the 'Area of a Square' visual: a $3 \times 3$ square has 9 units, not 6."
    - misconception: "Thinking negative numbers have real square roots (at this level)."
      remediation: "Remind them: 'What same number times itself gives a negative?' Impossible for now!"
    - misconception: "Incorrect decimal placement ($\sqrt{0.04} = 0.02$ error)."
      remediation: "Show $\sqrt{0.04} = \sqrt{\frac{4}{100}} = \frac{2}{10} = 0.2$."
  engagement_hooks:
    - "The Floor Tiler: 'If you have 50 tiles, what is the largest square you can make? (Perfect Squares)'"
    - "The Magic Tank: 'If this cube tank holds 64 litres, what are its dimensions?'"
    - "Architecture Challenge: 'Designing a Square Garden with estimated side lengths.'"

quality_level: 2
