name: "KUASA DUA, PUNCA KUASA DUA, KUASA TIGA DAN PUNCA KUASA TIGA"
name_en: "Squares, Square Roots, Cubes and Cube Roots"
subject_id: malaysia-kssm-matematik-tingkatan-1
