teaching:
  sequence:
    - "Step 1: Introduction to Squares and Perfect Squares using visual grids (3.1.1, 3.1.2)"
    - "Step 2: Inverse operations: Connecting Squares to Square Roots (3.1.3)"
    - "Step 3: Calculating Squares and Square Roots (3.1.4, 3.1.5, 3.1.6)"
    - "Step 4: Mastery of generalisation and estimation for square roots (3.1.7, 3.1.8)"
    - "Step 5: Transitioning to 3D: Explaining Cubes and Perfect Cubes (3.2.1, 3.2.2)"
    - "Step 6: Relationship between Cubes and Cube Roots (3.2.3, 3.2.5)"
    - "Step 7: Technology use and estimation for cube roots (3.2.4, 3.2.6, 3.2.7)"
    - "Step 8: Mastery of combined operations and multi-step word problems (3.2.9, 3.1.9, 3.2.8)"
common_misconceptions:
  - misconception: "Square root is equivalent to dividing by two."
    remediation: "Use visual area models to show that square root finds the side length, not half the area."
  - misconception: "Assuming only integers can be perfect squares or cubes."
    remediation: "Demonstrate square roots of decimals (e.g., 0.6 x 0.6 = 0.36) and fractions."
  - misconception: "Confusing the sign of square roots and cube roots (e.g., thinking cube root of a negative is positive)."
    remediation: "Show that (-2) x (-2) x (-2) = -8, reinforcing that cube roots preserve the sign."
engagement_hooks:
  - "Challenge students to find square numbers in their house layout or tiles."
  - "Relate perfect cubes to the volume of salt crystals or Rubik's cubes."
  - "Discuss the 'Square Root of Two' as the first irrational number discovered by the Pythagoreans."
