topic_id: MT1-13
provenance: ai-generated
description: "Worked examples for Teorem Pythagoras"
worked_examples:
  - id: WE-01
    topic: "Mengenal pasti dan mendefinisikan hipotenus"
    difficulty: easy
    real_world_analogy: "Berjalan dari satu titik ke titik lain secara lurus adalah lebih pendek daripada mengambil jalan berbentuk 'L'."
    misconception_alert: "Ramai pelajar keliru antara hipotenus dan sisi-sisi lain dalam segi tiga bersudut tegak. Hipotenus ialah sisi yang paling panjang."
    scenario: "Dalam sebuah segi tiga bersudut tegak, sisi a dan b adalah 3 cm dan 4 cm. Tentukan panjang hipotenus."
    working: |
      Step 1: Kenal pasti hipotenus sebagai sisi terpanjang dalam segi tiga bersudut tegak.
      Step 2: Gunakan Teorem Pythagoras: $c^2 = a^2 + b^2$.
      Step 3: Substitusi nilai: $c^2 = 3^2 + 4^2 = 9 + 16 = 25$.
      Step 4: Cari nilai c: $c = \sqrt{25} = 5$.
      Step 5: Jadi, panjang hipotenus ialah 5 cm.

  - id: WE-02
    topic: "Menentukan hubungan antara sisi segi tiga bersudut tegak"
    difficulty: medium
    real_world_analogy: "Menggunakan tangga untuk mencapai tempat lebih tinggi, di mana tangga adalah hipotenus dan dinding serta tanah adalah sisi segi tiga."
    misconception_alert: "Pelajar sering terlupa untuk mengkuadratkan sisi sebelum menambahkannya."
    scenario: "Sebuah tangga bersandar pada dinding setinggi 6 m dan kaki tangga berada 8 m dari dinding. Berapakah panjang tangga?"
    working: |
      Step 1: Tentukan bahawa tangga adalah hipotenus segi tiga bersudut tegak.
      Step 2: Gunakan Teorem Pythagoras: $c^2 = a^2 + b^2$.
      Step 3: Substitusi nilai: $c^2 = 6^2 + 8^2 = 36 + 64 = 100$.
      Step 4: Cari nilai c: $c = \sqrt{100} = 10$.
      Step 5: Panjang tangga ialah 10 m.

  - id: WE-03
    topic: "Menyelesaikan masalah yang melibatkan Teorem Pythagoras"
    difficulty: hard
    real_world_analogy: "Menyusuri jalan pintas melalui taman yang berbentuk segi tiga untuk mengurangkan jarak perjalanan."
    misconception_alert: "Kesalahan yang kerap berlaku ialah tidak memastikan bahawa segi tiga adalah bersudut tegak sebelum menggunakan Teorem Pythagoras."
    scenario: "Ali ingin berjalan dari sudut A ke sudut C melalui sudut B di sebuah taman berbentuk segi tiga bersudut tegak. Panjang AB adalah 5 m dan BC adalah 12 m. Berapakah jarak langsung dari A ke C?"
    working: |
      Step 1: Kenal pasti bahawa AC adalah hipotenus.
      Step 2: Gunakan Teorem Pythagoras: $AC^2 = AB^2 + BC^2$.
      Step 3: Substitusi nilai: $AC^2 = 5^2 + 12^2 = 25 + 144 = 169$.
      Step 4: Cari nilai AC: $AC = \sqrt{169} = 13$.
      Step 5: Jarak langsung dari A ke C ialah 13 m.