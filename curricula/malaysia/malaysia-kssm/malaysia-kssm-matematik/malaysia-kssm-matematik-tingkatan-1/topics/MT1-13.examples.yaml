description: "Worked examples for Pythagorean Theorem"
worked_examples:
  - id: WE-01
    learning_objective: "13.1.1"
    topic: "Identifying the Hypotenuse"
    difficulty: easy
    real_world_analogy: "Think of a mamak stall at a street corner. Walking along the two sidewalks makes an L-shaped route, but cutting across the corner diagonally is the single longest straight path. That diagonal path is like the hypotenuse."
    misconception_alert: "Students often think the slanted side is always the hypotenuse. The hypotenuse is defined by position: it is always opposite the 90-degree angle."
    scenario: "In a right-angled triangle $PQR$, the right angle is at vertex $Q$. Identify which side ($PQ$, $QR$, or $PR$) is the hypotenuse."
    working: |
      Step 1: Locate the right angle. It is at vertex $Q$.
      Step 2: Find the side opposite vertex $Q$.
      Step 3: The side that does not touch vertex $Q$ is $PR$.
      Step 4: Conclusion: Side $PR$ is the hypotenuse.

  - id: WE-02
    learning_objective: "13.1.3"
    topic: "Calculating the Hypotenuse"
    difficulty: medium
    real_world_analogy: "TV screens are measured diagonally. The width and height are the two shorter sides, and the diagonal is the hypotenuse."
    misconception_alert: "Students often add the two side lengths directly instead of adding their squares."
    scenario: "A right-angled triangle has two shorter sides measuring $6 \\text{ cm}$ and $8 \\text{ cm}$. Calculate the length of the hypotenuse, $x$."
    working: |
      Step 1: State the theorem: $c^2 = a^2 + b^2$.
      Step 2: Substitute the known sides: $x^2 = 6^2 + 8^2$.
      Step 3: Calculate the squares: $x^2 = 36 + 64$.
      Step 4: Add the values: $x^2 = 100$.
      Step 5: Take the square root of both sides: $x = \\sqrt{100}$.
      Step 6: Final answer: $x = 10 \\text{ cm}$.

  - id: WE-03
    learning_objective: "13.1.3"
    topic: "Calculating a Shorter Side"
    difficulty: medium
    real_world_analogy: "A ladder leaning against a wall. If you know the ladder length and how high it reaches, you can find how far the base is from the wall."
    misconception_alert: "Students often forget to subtract when the hypotenuse is already known."
    scenario: "A right-angled triangle has a hypotenuse of $13 \\text{ cm}$ and one side of $12 \\text{ cm}$. Find the length of the unknown side, $y$."
    working: |
      Step 1: Use the subtraction form of the theorem: $a^2 = c^2 - b^2$.
      Step 2: Substitute the known values: $y^2 = 13^2 - 12^2$.
      Step 3: Calculate the squares: $y^2 = 169 - 144$.
      Step 4: Subtract the values: $y^2 = 25$.
      Step 5: Take the square root of both sides: $y = \\sqrt{25}$.
      Step 6: Final answer: $y = 5 \\text{ cm}$.

  - id: WE-04
    learning_objective: "13.1.3"
    topic: "Combined Geometric Shapes"
    difficulty: hard
    real_world_analogy: "Imagine Spider-Man climbing across two connected walls. You solve the first triangle to get the shared side, then use that side in the second triangle."
    misconception_alert: "Students often try to calculate everything at once. For combined shapes, solve one triangle first to find the shared side needed for the next triangle."
    scenario: "In a diagram, triangle $ABC$ and triangle $ACD$ are both right-angled. For $ABC$, $AB = 3 \\text{ cm}$ and $BC = 4 \\text{ cm}$. For $ACD$, the right angle is at $C$ and $CD = 12 \\text{ cm}$. Find the length of $AD$."
    working: |
      Step 1: Focus on triangle $ABC$ first to find the shared side $AC$.
      Step 2: $AC^2 = AB^2 + BC^2$.
      Step 3: $AC^2 = 3^2 + 4^2 = 9 + 16 = 25$.
      Step 4: $AC = \\sqrt{25} = 5 \\text{ cm}$.
      Step 5: Now focus on triangle $ACD$ using the new value of $AC$.
      Step 6: $AD^2 = AC^2 + CD^2$.
      Step 7: $AD^2 = 5^2 + 12^2 = 25 + 144 = 169$.
      Step 8: $AD = \\sqrt{169}$.
      Step 9: Final answer: $AD = 13 \\text{ cm}$.

  - id: WE-05
    learning_objective: "13.2.1"
    topic: "The Converse of Pythagoras' Theorem"
    difficulty: medium
    real_world_analogy: "This is the detective test. If the side lengths fit the equation, then the triangle hides a perfect 90-degree corner."
    misconception_alert: "Students often pick the wrong side for $c$. Always identify the longest side first because that is the only side that can be the potential hypotenuse."
    scenario: "A triangle has side lengths of $7 \\text{ cm}$, $24 \\text{ cm}$, and $25 \\text{ cm}$. Determine if this is a right-angled triangle."
    working: |
      Step 1: Identify the longest side: $c = 25$.
      Step 2: Calculate the square of the longest side: $25^2 = 625$.
      Step 3: Calculate the sum of the squares of the other two sides: $7^2 + 24^2$.
      Step 4: $49 + 576 = 625$.
      Step 5: Compare the results: $625 = 625$.
      Step 6: Conclusion: Since $a^2 + b^2 = c^2$, the triangle is right-angled.
