questions:
  # Questions for LO 3.1.3
  - id: Q1
    text: "Jika $x^2 = 49$, apakah nilai $x$?"
    difficulty: medium
    learning_objective: 3.1.3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: 'x = 7 \text{ atau } x = -7'
      working: |
        Untuk mencari $x$, kita perlu mencari punca kuasa dua bagi 49.
        $x^2 = 49$
        Maka, $x = \pm \sqrt{49}$
        $x = \pm 7$
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menjawab sama ada $x = 7$ atau $x = -7$."
      - marks: 1
        criteria: "Menjawab kedua-dua nilai $x = 7$ dan $x = -7$."
    hints:
      - level: 1
        text: "Ingat bahawa $x^2 = 49$ bermakna $x$ boleh menjadi positif atau negatif."
      - level: 2
        text: "MISCONCEPTION ALERT: Jangan lupa bahawa punca kuasa dua mempunyai dua nilai; positif dan negatif."

  # Questions for LO 3.1.9
  - id: Q2
    text: "Ali mempunyai sekeping tanah berbentuk persegi. Jika luas tanah tersebut ialah 144 m², berapakah panjang setiap sisi tanah tersebut?"
    difficulty: medium
    learning_objective: 3.1.9
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '12 \text{ m}'
      working: |
        Luas persegi diberi oleh formula $s^2 = \text{luas}$. 
        Oleh itu, $s^2 = 144$. 
        Maka, $s = \sqrt{144} = 12$ m.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menulis persamaan $s^2 = 144$."
      - marks: 1
        criteria: "Mengira panjang sisi sebagai 12 m."
    hints:
      - level: 1
        text: "Luas persegi adalah $s^2$, di mana $s$ adalah panjang sisi."
      - level: 2
        text: "Cari punca kuasa dua bagi 144 untuk mendapatkan panjang sisi."

  # Questions for LO 3.2.2
  - id: Q3
    text: "Antara nombor berikut, yang manakah merupakan kuasa tiga sempurna? A) 8 B) 15 C) 27 D) 64"
    difficulty: medium
    learning_objective: 3.2.2
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "A, C, D"
      working: |
        $8 = 2^3$, $27 = 3^3$, $64 = 4^3$. 
        Oleh itu, 8, 27, dan 64 adalah kuasa tiga sempurna.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Memilih satu nombor yang betul."
      - marks: 2
        criteria: "Memilih dua nombor yang betul."
      - marks: 3
        criteria: "Memilih semua nombor yang betul."
    hints:
      - level: 1
        text: "Ingat bahawa kuasa tiga sempurna adalah hasil darab nombor dengan dirinya dua kali lagi."
      - level: 2
        text: "Periksa setiap nombor dan tentukan sama ada ia boleh dinyatakan sebagai $n^3$ untuk beberapa integer $n$."

  # Questions for LO 3.2.4
  - id: Q4
    text: "Tentukan kuasa tiga bagi nombor 5."
    difficulty: medium
    learning_objective: 3.2.4
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "125"
      working: |
        Kuasa tiga bagi nombor 5 adalah $5^3 = 5 \times 5 \times 5 = 125$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menulis persamaan $5^3$ dengan betul."
      - marks: 1
        criteria: "Mengira jawapan akhir sebagai 125."
    hints:
      - level: 1
        text: "Kuasa tiga bermaksud darabkan nombor dengan dirinya sendiri dua kali lagi."
      - level: 2
        text: 'Lakukan pengiraan $5 \times 5 \times 5$ secara berperingkat.'

  # Questions for LO 3.2.8
  - id: Q5
    text: "Selesaikan masalah berikut: Jika $x^3 = 343$, apakah nilai $x$?"
    difficulty: medium
    learning_objective: 3.2.8
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "x = 7"
      working: |
        Untuk mencari $x$, kita perlu mencari punca kuasa tiga bagi 343.
        $x^3 = 343$
        Maka, $x = \sqrt[3]{343} = 7$
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Menulis persamaan $x = \sqrt[3]{343}$.'
      - marks: 1
        criteria: "Mengira jawapan akhir sebagai 7."
    hints:
      - level: 1
        text: "Ingat bahawa $x^3 = 343$ bermaksud kita perlu mencari punca kuasa tiga."
      - level: 2
        text: "Lihat kepada nombor 343 dan cuba lihat jika ia adalah kuasa tiga suatu nombor."