learning_objectives:
    - id: "11.1.1"
      text: "Menerangkan maksud set."
      text_en: "Explain the meaning of set."
      bloom: understand
    - id: "11.1.2"
      text: "Menghuraikan suatu set dengan menggunakan: (i) perihalan, (ii) penyenaraian, dan (iii) tatatanda pembina set."
      text_en: "Describe a set using: (i) description, (ii) listing, and (iii) set-builder notation."
      bloom: understand
    - id: "11.1.3"
      text: "Mengenal pasti sama ada suatu objek adalah unsur kepada suatu set dan mewakilkan hubungan tersebut dengan simbol."
      text_en: "Identify whether an object is an element of a set and represent the relationship with symbols."
      bloom: remember
    - id: "11.1.4"
      text: "Menentukan bilangan unsur bagi suatu set dan mewakilkan bilangan unsur dengan simbol."
      text_en: "Determine the number of elements in a set and represent the number of elements with a symbol."
      bloom: apply
    - id: "11.1.5"
      text: "Membanding beza dan menerangkan sama ada dua atau lebih set adalah sama, dan seterusnya membuat generalisasi tentang kesamaan set."
      text_en: "Compare and explain whether two or more sets are equal, and then make a generalization about the equality of sets."
      bloom: analyze
    - id: "11.2.1"
      text: "Mengenal pasti dan menghuraikan set semesta dan pelengkap bagi suatu set."
      text_en: "Identify and describe the universal set and the complement of a set."
      bloom: understand
    - id: "11.2.2"
      text: "Mewakilkan (i) hubungan suatu set dengan set semesta, dan (ii) pelengkap bagi suatu set dengan gambar rajah Venn."
      text_en: "Represent (i) the relationship of a set with the universal set, and (ii) the complement of a set with Venn diagrams."
      bloom: apply
    - id: "11.2.3"
      text: "Mengenal pasti dan menghuraikan subset yang mungkin bagi suatu set."
      text_en: "Identify and describe possible subsets of a set."
      bloom: understand
    - id: "11.2.4"
      text: "Mewakilkan suatu subset dengan gambar rajah Venn."
      text_en: "Represent a subset with a Venn diagram."
      bloom: apply
    - id: "11.2.5"
      text: "Mewakilkan perkaitan antara set, subset, set semesta dan pelengkap bagi suatu set dengan gambar rajah Venn."
      text_en: "Represent the relationship between set, subset, universal set, and complement of a set with Venn diagrams."
      bloom: apply
