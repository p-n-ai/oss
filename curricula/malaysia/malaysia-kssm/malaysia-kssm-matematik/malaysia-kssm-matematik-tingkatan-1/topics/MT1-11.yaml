mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduce the idea of a set using classification of everyday objects such as recyclable materials (15 min)."
    - "Step 2: Describe sets using description, listing, and set-builder notation with textbook-style examples (20 min)."
    - "Step 3: Identify elements of sets and use symbols such as $\\in$ and $\\notin$ correctly (15 min)."
    - "Step 4: Determine the number of elements and compare equal sets where order does not matter (20 min)."
    - "Step 5: Explore universal sets and complements using classroom and household contexts (20 min)."
    - "Step 6: Represent subsets, complements, and set relationships using Venn diagrams (20 min)."
  common_misconceptions:
    - misconception: "Thinking that the order of elements changes the identity of a set."
      remediation: "Show that $\\{a, b, c\\}$ and $\\{c, b, a\\}$ are equal because sets are unordered collections."
    - misconception: "Thinking the empty set $\\phi$ is the same as a set containing zero $\\{0\\}$."
      remediation: "Contrast the two carefully: $\\phi$ has no element at all, while $\\{0\\}$ has one element, namely $0$."
    - misconception: "Confusing the symbol $\\in$ with the symbol $\\subset$."
      remediation: "Use side-by-side examples to show that $2 \\in A$ refers to an element, while $B \\subset A$ refers to one set being contained in another."
    - misconception: "Repeating elements when listing a set."
      remediation: "Use words like 'MALAYSIA' to show that repeated letters are only listed once in a set."
  engagement_hooks:
    - "Classify recyclable household waste such as paper, plastic, and glass to introduce the idea of sets."
    - "Use the colours of the Jalur Gemilang to practise describing sets in words, listing form, and set-builder notation."
    - "Run a 'Mamak Stall' challenge where students identify subsets such as all drinks, iced drinks, or spicy foods."

