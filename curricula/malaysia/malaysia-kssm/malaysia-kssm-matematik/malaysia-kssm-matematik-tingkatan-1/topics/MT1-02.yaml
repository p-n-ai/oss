teaching:
  sequence:
    - "Step 1: Exploration of factors through division and identifying whole number divisors (Textbook p. 32)"
    - "Step 2: Identifying prime factors and mastering prime factorisation methods: repeated division and factor trees (Textbook pp. 33-34)"
    - "Step 3: Determining common factors and HCF using listing, repeated division, and prime factorisation (Textbook pp. 35-36)"
    - "Step 4: Solving real-world problems involving maximum quantities/sizes (HCF) (Textbook p. 37)"
    - "Step 5: Exploring multiples and common multiples through sequences and digital spreadsheets (Textbook pp. 38-39)"
    - "Step 6: Determining LCM using listing, repeated division, and prime factorisation (Textbook pp. 40-41)"
    - "Step 7: Applying LCM to solve problems involving synchronized events or minimum cycles (Textbook p. 42)"
common_misconceptions:
  - misconception: "Confusing factors with multiples (thinking factors are larger than the original number)."
    remediation: "Use the 'Divider vs. Multiplier' rule: Factors divide the number into smaller whole parts; Multiples are the results of multiplying the number to get bigger results."
  - misconception: "Believing that 1 is a prime factor because it is a factor of all numbers."
    remediation: "Reinforce that prime factors must be prime numbers. Since 1 is not a prime number, it cannot be a prime factor."
  - misconception: "Thinking the HCF must be larger than the LCM because 'Highest' sounds bigger than 'Lowest'."
    remediation: "Clarify that 'Highest' refers to the largest common divisor, while 'Lowest' refers to the smallest common multiple."
engagement_hooks:
  - "The Tiling Challenge: How can a construction worker use HCF to find the largest square tile size to perfectly cover a floor without any leftovers? (Textbook p. 30)"
  - "The Rhythm Master: Explore how LCM helps musicians understand complex drum rhythms or when different flashing neon lights will blink together again! (Textbook pp. 31, 42)"
  - "The Sieve of Eratosthenes: Discover how an ancient Greek mathematician created a 'filter' to find every prime number up to any limit (Textbook p. 31)."
  - "Bakery Logistics: Help a shopkeeper use factors and multiples to pack 7 cakes into 12 boxes equally for social media orders (Textbook p. 45)."