teaching:
  sequence:
    - 'Step 1: Introduce the concept of factors using simple numbers like 6 and 12 (15 min)'
    - 'Step 2: Demonstrate prime factorization using factor trees (20 min)'
    - 'Step 3: Guide students to find common factors and determine HCF (20 min)'
    - 'Step 4: Explain multiples and find the LCM using lists or grids (20 min)'
  common_misconceptions:
    - misconception: Factors are larger than the number
      remediation: Reinforce that factors are divisors, smaller or equal to the number
    - misconception: Prime factorization can vary
      remediation: Use examples to show the uniqueness of prime factorization
engagement_hooks:
  - Use scenarios like distributing items equally among friends to illustrate factors
  - Discuss setting up seating arrangements for an event to explain multiples
