learning_objectives:
  - id: "2.1.1"
    content_standard_id: "2.1"
    text_en: "Determine and list the factors of whole numbers, and hence make generalisation about factors."
    bloom: understand
  - id: "2.1.2"
    content_standard_id: "2.1"
    text_en: "Determine and list the prime factors of a whole number, and hence represent the number in the form of prime factorisation."
    bloom: apply
  - id: "2.1.3"
    content_standard_id: "2.1"
    text_en: "Explain and determine the common factors of whole numbers."
    bloom: understand
  - id: "2.1.4"
    content_standard_id: "2.1"
    text_en: "Determine the HCF of two and three whole numbers."
    bloom: apply
  - id: "2.1.5"
    content_standard_id: "2.1"
    text_en: "Solve problems involving HCF."
    bloom: apply
  - id: "2.2.1"
    content_standard_id: "2.2"
    text_en: "Explain and determine the common multiples of whole numbers."
    bloom: understand
  - id: "2.2.2"
    content_standard_id: "2.2"
    text_en: "Determine the LCM of two and three whole numbers."
    bloom: apply
  - id: "2.2.3"
    content_standard_id: "2.2"
    text_en: "Solve problems involving LCM."
    bloom: apply

performance_standards:
  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of prime numbers, factors and multiples."
  - level: 2
    descriptor_en: "Demonstrate the understanding of prime numbers, factors and multiples."
  - level: 3
    descriptor_en: "Apply the understanding of prime numbers, factors and multiples to perform simple tasks involving HCF and LCM."
  - level: 4
    descriptor_en: "Apply the knowledge and skills of prime numbers, factors and multiples in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply the knowledge and skills of prime numbers, factors and multiples in the context of complex routine problem solving."
  - level: 6
    descriptor_en: "Apply the knowledge and skills of prime numbers, factors and multiples in the context of non-routine problem solving."

prerequisites:
  required:
    - "MT1-01"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Identifying Factors & The Rectangular Array visual (2 days)"
    - "Step 2: Prime Factors & Factor Trees (3 days)"
    - "Step 3: Finding HCF via Repeated Division (3 days)"
    - "Step 4: Identifying Multiples & Common Multiples (2 days)"
    - "Step 5: Finding LCM & Real-World Periodic Events (3 days)"
    - "Step 6: UASA Problem Solving Strategy (HCF vs LCM) (3 days)"
  common_misconceptions:
    - misconception: "Confusing Factors with Multiples."
      remediation: "Use the 'Slicing vs. Stacking' analogy: Factors slice a number down; Multiples stack it up."
    - misconception: "Thinking 1 is a prime factor."
      remediation: "Reiterate that 1 is neither prime nor composite; prime factors must be prime numbers."
    - misconception: "Always picking the LARGER number for HCF."
      remediation: "Explain that a 'Factor' must be smaller than or equal to the number ($HCF \\leq \\text{Smallest Number}$)."
  engagement_hooks:
    - "The Tiling Mystery: 'What is the largest square tile that can perfectly cover a 12m x 18m floor?' (HCF)"
    - "The Bus Station Sync: 'Three buses leave at diff intervals... when will they next meet?' (LCM)"
    - "Prime Factor Trees: 'Every number has a unique DNA (prime factors). Let's map it!'"

quality_level: 2
provenance: ai-assisted
ai_teaching_notes: "MT1-02.teaching.md"
assessments_file: "MT1-02.assessments.yaml"
examples_file: "MT1-02.examples.yaml"