id: "MT1-01"
examples:
  - id: "WE-01"
    topic: "Integer dalam Situasi Kehidupan Sebenar"
    difficulty: "easy"
    real_world_analogy: "Fikirkan tentang lif di kondominium. Aras G ialah 0. Tingkat di atas ialah positif (+1, +2), dan tingkat tempat letak kereta bawah tanah (basement) ialah negatif (-1, -2)."
    misconception_alert: "Pelajar sering fikir -2 lebih besar daripada -1 kerana 2 > 1. Ingatkan mereka bahawa di basement, tingkat B2 adalah lebih rendah (lebih dalam) daripada B1."
    scenario: "Sebuah kapal selam berada 250 m di bawah aras laut. Wakilkan kedudukan ini sebagai satu integer."
    working: |
      1. Kenal pasti titik rujukan: Aras laut diwakili oleh integer 0.
      2. Tentukan arah: 'Di bawah aras laut' menunjukkan arah negatif.
      3. Gabungkan tanda dan magnitud: Magnitudnya ialah 250.
      4. Jawapan Akhir: $-250$.
    learning_objective: "1.1.1"

  - id: "WE-02"
    topic: "Operasi Asas Aritmetik Melibatkan Integer"
    difficulty: "medium"
    real_world_analogy: "Logik 'Hutang'. Menambah nombor negatif ibarat menambah hutang (penolakan). Menolak nombor negatif ibarat hutang dipadamkan atau dibatalkan (penambahan)."
    misconception_alert: "Panik Negatif Berganda. Pelajar sering lupa bahawa $-(-x)$ menjadi $+x$. Paksa mereka tulis semula tanda operasi terlebih dahulu sebelum mengira."
    scenario: "Nilaikan yang berikut: $-8 + (-2) - (-10)$."
    working: |
      1. Tulis semula ungkapan dengan mempermudahkan tanda berkembar:
         $-8 - 2 + 10$
      2. Lakukan operasi dari kiri ke kanan:
         Hitung $-8 - 2 = -10$
      3. Gantikan kembali ke dalam ungkapan:
         $-10 + 10$
      4. Pengiraan Akhir: 
         $-10 + 10 = 0$
      5. Jawapan Akhir: $0$.
    learning_objective: "1.2.1"

  - id: "WE-03"
    topic: "Gabungan Operasi Pecahan Positif dan Negatif"
    difficulty: "medium"
    real_world_analogy: "Tertib Operasi (BODMAS/PEMDAS) ibarat barisan VIP di konsert. Kurungan, Darab, dan Bahagi dapat masuk dahulu sebelum Tambah dan Tolak."
    misconception_alert: "Perangkap 'Pengangka Telanjang'. Apabila menolak pecahan yang mempunyai tanda negatif, pelajar sering gagal mengagihkan tanda itu kepada keseluruhan pengangka."
    scenario: "Hitung nilai bagi: $\\frac{1}{2} + \\left( -\\frac{3}{4} \\right) \\times \\frac{2}{3}$."
    working: |
      1. Kenal pasti tertib operasi: Pendaraban mesti dilakukan sebelum penambahan.
      2. Darabkan pecahan tersebut:
         $-\\frac{3}{4} \\times \\frac{2}{3} = -\\frac{3 \\times 2}{4 \\times 3}$
      3. Permudahkan hasil darab:
         $-\\frac{6}{12} = -\\frac{1}{2}$
      4. Tulis semula ungkapan penuh dengan hasil tadi:
         $\\frac{1}{2} + \\left( -\\frac{1}{2} \\right)$
      5. Permudahkan tanda:
         $\\frac{1}{2} - \\frac{1}{2}$
      6. Jawapan Akhir: $0$.
    learning_objective: "1.3.3"

  - id: "WE-04"
    topic: "Menyelesaikan Masalah Melibatkan Nombor Nisbah"
    difficulty: "hard"
    real_world_analogy: "Menguruskan akaun bank. Deposit ialah nombor nisbah positif, manakala pengeluaran dan caj bank ialah nombor nisbah negatif."
    misconception_alert: "Melangkau langkah 'Refleksi/Semakan'. Dalam masalah bukan rutin, pelajar sering memberi nombor tanpa menyemak sama ada ia logik dalam konteks (cth: baki negatif bermaksud hutang)."
    scenario: "Tunggakan kad kredit Luqman ialah RM230. Dia menggunakan kad itu untuk membeli 3 buah buku yang berharga RM120 setiap satu. Seminggu kemudian, akaunnya dikenakan faedah RM3 dan Luqman membuat bayaran RM400. Adakah Luqman telah menjelaskan hutangnya?"
    working: |
      1. Wakilkan tunggakan sebagai integer negatif: $-230$.
      2. Hitung jumlah perbelanjaan buku: $3 \\times (-120) = -360$.
      3. Wakilkan caj faedah sebagai nilai negatif: $-3$.
      4. Wakilkan bayaran balik sebagai nilai positif: $+400$.
      5. Bentukkan gabungan operasi:
         $-230 + (-360) + (-3) + 400$
      6. Selesaikan langkah demi langkah:
         $-230 - 360 = -590$
         $-590 - 3 = -593$
         $-593 + 400 = -193$
      7. Tafsirkan keputusan: Baki akaun ialah $-193$. Ini bermakna Luqman masih berhutang RM193.
      8. Jawapan Akhir: Belum jelas (Masih berhutang RM193).
    learning_objective: "1.5.3"
