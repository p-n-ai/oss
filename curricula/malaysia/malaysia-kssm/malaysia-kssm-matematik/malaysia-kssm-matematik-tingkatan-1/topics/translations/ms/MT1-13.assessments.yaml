topic_id: MT1-13
provenance: ai-generated

questions:
  - id: Q1
    text: "Dalam sebuah segi tiga bersudut tegak $ABC$ yang diberi, jika sudut tegak berada pada bucu $B$, sisi manakah yang didefinisikan sebagai hipotenus?"
    difficulty: easy
    learning_objective: 13.1.1
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "Sisi $AC$"
      working: |
        Langkah 1: Kenal pasti kedudukan sudut 90 darjah pada bucu $B$.
        Langkah 2: Cari sisi yang bertentangan secara terus dengan sudut tersebut.
        Langkah 3: Sisi yang bertentangan dengan bucu $B$ ialah sisi $AC$.
      options:
        - "Sisi $AC$"
        - "Sisi $AB$"
        - "Sisi $BC$"
        - "Sisi yang paling pendek"
      distractors:
        - value: "Sisi $AB$"
          feedback: "Ini ialah sisi yang bersebelahan dengan sudut tegak, bukan bertentangan dengannya."
        - value: "Sisi $BC$"
          feedback: "Sisi ini membantu membentuk sudut tegak, jadi ia bukan hipotenus."
        - value: "Sisi yang paling pendek"
          feedback: "Hipotenus sentiasa sisi yang paling panjang, bukan yang paling pendek."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Mengenal pasti sisi $AC$ sebagai hipotenus dengan betul."
    hints:
      - level: 1
        text: "Cari sisi yang bertentangan dengan simbol petak kecil yang menandakan 90 darjah."

  - id: Q2
    text: "Bagi sebuah segi tiga bersudut tegak dengan sisi $p$, $q$ dan hipotenus $r$, apakah hubungan yang betul?"
    difficulty: easy
    learning_objective: 13.1.2
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "$r^2 = p^2 + q^2$"
      working: |
        Langkah 1: Kenal pasti hipotenus sebagai $r$.
        Langkah 2: Aplikasikan teorem: kuasa dua hipotenus = jumlah kuasa dua dua sisi yang lain.
        Langkah 3: Gantikan nilai: $r^2 = p^2 + q^2$.
      options:
        - "$r^2 = p^2 + q^2$"
        - "$r = p + q$"
        - "$p^2 = r^2 + q^2$"
        - "$r^2 = p^2 - q^2$"
      distractors:
        - value: "$r = p + q$"
          feedback: "Ini perangkap linear. Teorem Pythagoras menggunakan kuasa dua, bukan jumlah panjang terus."
        - value: "$p^2 = r^2 + q^2$"
          feedback: "Hipotenus ialah sisi yang berdiri seorang diri dalam persamaan, bukan salah satu sisi pendek."
        - value: "$r^2 = p^2 - q^2$"
          feedback: "Untuk mencari hipotenus, anda menambah kuasa dua sisi yang lain, bukan menolak."
    marks: 1
    rubric:
      - marks: 1
        criteria: "Memilih hubungan Pythagoras yang betul."
    hints:
      - level: 1
        text: "Hipotenus berada seorang diri dalam persamaan dan dikuasakan dua."

  - id: Q3
    text: "Hitungkan panjang sisi yang tidak diketahui $x$ bagi sebuah segi tiga bersudut tegak yang mempunyai hipotenus $26 \\text{ cm}$ dan satu sisi lain $24 \\text{ cm}$."
    difficulty: medium
    learning_objective: 13.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "10"
      working: |
        Langkah 1: Gunakan bentuk penolakan teorem kerana hipotenus telah diketahui.
        Langkah 2: $x^2 = 26^2 - 24^2$.
        Langkah 3: $x^2 = 676 - 576 = 100$.
        Langkah 4: $x = \\sqrt{100} = 10 \\text{ cm}$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menggunakan bentuk penolakan teorem dengan betul."
      - marks: 1
        criteria: "Mengira beza kuasa dua dengan betul."
      - marks: 1
        criteria: "Mengaplikasikan punca kuasa dua untuk mendapatkan jawapan akhir."
    hints:
      - level: 1
        text: "Oleh sebab anda sudah tahu sisi terpanjang, adakah anda patut tambah atau tolak kuasa dua sisi itu?"
      - level: 2
        text: "Selepas dapat $x^2$, apakah operasi yang memberi nilai $x$ sahaja?"

  - id: Q4
    text: "Sebuah tangga sepanjang $2.5 \\text{ m}$ disandarkan pada dinding tegak. Kaki tangga itu berada $1.5 \\text{ m}$ dari dinding. Cari tinggi dinding yang dicapai oleh tangga itu."
    difficulty: medium
    learning_objective: 13.1.4
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "2"
      working: |
        Langkah 1: Kenal pasti tangga sebagai hipotenus.
        Langkah 2: Gunakan teorem: $h^2 = 2.5^2 - 1.5^2$.
        Langkah 3: $h^2 = 6.25 - 2.25 = 4$.
        Langkah 4: $h = \\sqrt{4} = 2 \\text{ m}$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenal pasti tangga sebagai hipotenus."
      - marks: 1
        criteria: "Menggantikan nilai dengan betul."
      - marks: 1
        criteria: "Mengira tinggi sebagai 2 m."
    hints:
      - level: 1
        text: "Lukis situasi itu. Adakah tangga ialah sisi yang condong atau sisi tegak biasa?"

  - id: Q5
    text: "Sebuah segi tiga mempunyai sisi 9 cm, 40 cm, dan 41 cm. Tentukan sama ada ia segi tiga bersudut tegak dan berikan justifikasi anda."
    difficulty: medium
    learning_objective: 13.2.1
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: "Ya, ia ialah segi tiga bersudut tegak kerana 9^2 + 40^2 = 81 + 1600 = 1681 dan 41^2 = 1681. Oleh sebab nilai itu sama, akas teorem Pythagoras dipenuhi."
      working: |
        Langkah 1: Kenal pasti sisi paling panjang sebagai 41 cm.
        Langkah 2: Kira kuasa dua sisi paling panjang: 41^2 = 1681.
        Langkah 3: Kira jumlah kuasa dua sisi yang lain: 9^2 + 40^2 = 81 + 1600 = 1681.
        Langkah 4: Bandingkan nilai. Oleh sebab sama, segi tiga itu bersudut tegak.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Mengenal pasti sisi paling panjang dengan betul."
      - marks: 1
        criteria: "Mengira 41^2 dengan betul."
      - marks: 1
        criteria: "Mengira jumlah kuasa dua dua sisi yang lain dengan betul."
      - marks: 1
        criteria: "Menyatakan kesimpulan yang betul."
    hints:
      - level: 1
        text: "Gunakan kaedah detektif. Kuasa duakan nombor paling besar dahulu, kemudian jumlahkan kuasa dua dua nombor lain."

  - id: Q6
    text: "Seorang tukang kayu ingin membina sebuah bangku. Kayu penyokong yang digunakan panjangnya 15 cm. Jika dia mahu membentuk sudut 90 darjah, tetapi ukuran yang diberi pada rangka hanya 15 cm dan 10 cm, terangkan mengapa susunan itu mungkin tidak membentuk sudut tegak yang sempurna."
    difficulty: hard
    learning_objective: 13.2.2
    tp_level: 6
    kbat: true
    answer:
      type: free_text
      value: "Susunan itu mungkin tidak membentuk sudut tegak kerana jika 15 cm ialah hipotenus, pasangan sisi lain yang sepadan untuk pola 3-4-5 berskala ialah 9 cm dan 12 cm. Nilai 15 cm dan 10 cm tidak memenuhi hubungan akas teorem Pythagoras."
      working: |
        Langkah 1: Bandingkan ukuran yang diberi dengan pola 3-4-5 berskala.
        Langkah 2: Jika hipotenus ialah 15 cm, sisi lain sepatutnya berada dalam nisbah yang sepadan.
        Langkah 3: Ukuran 15 cm dan 10 cm tidak membentuk set sisi yang memenuhi $a^2 + b^2 = c^2$ dengan betul.
        Langkah 4: Oleh itu, sudut itu bukan 90 darjah.
    marks: 5
    rubric:
      - marks: 1
        criteria: "Mengenal pasti bahawa hubungan sisi perlu diuji dengan akas."
      - marks: 2
        criteria: "Menjelaskan bahawa ukuran yang diberi tidak sepadan dengan pola bersudut tegak."
      - marks: 1
        criteria: "Menghubungkan penjelasan dengan akas teorem Pythagoras."
      - marks: 1
        criteria: "Memberikan kesimpulan yang jelas tentang sudut."
    hints:
      - level: 1
        text: "Fikirkan pola 3-4-5. Jika satu sisi 15 cm, apakah dua sisi lain yang sepatutnya menyertainya?"
