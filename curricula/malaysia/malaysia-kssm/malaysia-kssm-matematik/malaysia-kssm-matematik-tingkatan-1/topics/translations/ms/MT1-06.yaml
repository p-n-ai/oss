teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Persamaan Linear & Neraca Imbangan (3 hari)"
    - "Langkah 2: Menyelesaikan Persamaan dengan Satu pemboleh ubah (Pindah & Songsang) (4 hari)"
    - "Langkah 3: Persamaan Linear dalam Dua Pemboleh Ubah & Set Penyelesaian (3 hari)"
    - "Langkah 4: Melukis Graf Garis Lurus (3 hari)"
    - "Langkah 5: Menyelesaikan Persamaan Serentak (Pengantian/Penghapusan) (5 hari)"
    - "Langkah 6: Masalah Dunia Sebenar Persamaan Serentak (4 hari)"
  common_misconceptions:
    - misconception: "Ralat Tukar Tanda ($x + 5 = 10 \\Rightarrow x = 10 + 5$)."
      remediation: "Gunakan analogi 'Portal': Apabila nombor melalui portal '=', tandanya MESTI bertukar kepada songsangan."
    - misconception: "Ralat Kedudukan Pemboleh Ubah ($2x = 8 \\Rightarrow x = 8 - 2$)."
      remediation: "Jelaskan bahawa hubungan itu adalah pendaraban ($2 \\times x$), maka songsangannya adalah pembahagian ($8 / 2$)."
    - misconception: "Anggap Persamaan Serentak HANYA ada satu penyelesaian."
      remediation: "Gunakan visual 'Garis Geometri': Garis selari tidak bertemu (Tiada penyelesaian), Garis sama (Penyelesaian infinit)."
  engagement_hooks:
    - "Misteri Gaji: 'Jika gaji asas anda $x$ dan anda dapat RM10 bonus bagi setiap jam $jam$, bagaimana kita nak modelkan RM500?'"
    - "Teka-teki Umur: 'Saya 5 tahun lebih tua daripada anda, tapi dalam 2 tahun jumlah umur kita ialah 30. Berapakah umur saya?'"
    - "Neraca Imbangan: 'Jika anda ambil 2kg dari kiri, anda MESTI ambil 2kg dari kanan atau neraca akan senget!'"

