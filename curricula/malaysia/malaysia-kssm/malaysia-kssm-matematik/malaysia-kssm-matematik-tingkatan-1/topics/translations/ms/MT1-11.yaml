teaching:
  sequence:
    - "Langkah 1: Perkenalkan idea set menggunakan pengelasan objek harian seperti bahan kitar semula (15 min)."
    - "Langkah 2: Huraikan set menggunakan kaedah perihalan, penyenaraian, dan tatatanda pembina set dengan contoh ala buku teks (20 min)."
    - "Langkah 3: Kenal pasti unsur suatu set dan gunakan simbol seperti $\\in$ dan $\\notin$ dengan betul (15 min)."
    - "Langkah 4: Tentukan bilangan unsur dan bandingkan set yang sama apabila turutan unsur tidak penting (20 min)."
    - "Langkah 5: Teroka set semesta dan pelengkap menggunakan konteks bilik darjah dan rumah (20 min)."
    - "Langkah 6: Wakilkan subset, pelengkap, dan hubungan antara set dengan gambar rajah Venn (20 min)."
  common_misconceptions:
    - misconception: "Menganggap turutan unsur mengubah identiti sesuatu set."
      remediation: "Tunjukkan bahawa $\\{a, b, c\\}$ dan $\\{c, b, a\\}$ ialah set yang sama kerana set ialah himpunan tak tertib."
    - misconception: "Menganggap set kosong $\\phi$ sama dengan set yang mengandungi sifar $\\{0\\}$."
      remediation: "Bandingkan kedua-duanya secara jelas: $\\phi$ tidak mempunyai unsur langsung, manakala $\\{0\\}$ mempunyai satu unsur iaitu $0$."
    - misconception: "Keliru antara simbol $\\in$ dengan simbol $\\subset$."
      remediation: "Gunakan contoh bersebelahan untuk menunjukkan bahawa $2 \\in A$ merujuk kepada unsur, manakala $B \\subset A$ merujuk kepada satu set yang terkandung dalam set lain."
    - misconception: "Mengulang unsur yang sama semasa menyenaraikan set."
      remediation: "Gunakan perkataan seperti 'MALAYSIA' untuk menunjukkan bahawa huruf yang berulang hanya disenaraikan sekali dalam set."
  engagement_hooks:
    - "Kelaskan bahan kitar semula di rumah seperti kertas, plastik, dan kaca untuk memperkenalkan idea set."
    - "Gunakan warna-warna Jalur Gemilang untuk mempraktikkan penghuraian set dalam bentuk perkataan, penyenaraian, dan tatatanda pembina set."
    - "Jalankan cabaran 'Kedai Mamak' di mana pelajar mengenal pasti subset seperti semua minuman, minuman berais, atau makanan pedas."

