worked_examples:
  ##### ---------------------------------------------------------
  ##### SUBTOPIK 6.1: Persamaan Linear dalam Satu Pemboleh Ubah
  ##### ---------------------------------------------------------
  - id: WE-01
    topic: "Persamaan Linear dalam Satu Pemboleh Ubah (6.1)"
    difficulty: easy
    learning_objective: 6.1.3
    scenario: "Ahmad mempunyai sebuah kotak yang mengandungi sebilangan epal ($x$). Dia memberi 6 biji epal kepada kawannya. Sekarang, dia hanya mempunyai 10 biji epal yang tinggal dalam kotak. Berapakah bilangan epal yang dia ada pada mulanya?"
    real_world_analogy: "Fikirkan persamaan seperti sebuah neraca penimbang. Jika anda mengeluarkan 6 biji epal dari dulang kiri, anda mesti menambah 6 biji epal kembali untuk mencari berat asal, sambil melakukan perkara yang sama pada dulang kanan supaya ia kekal seimbang."
    misconception_alert: "Perangkap 'Operasi Berlawanan'! Pelajar sering melihat tanda tolak dan berfikir mereka perlu tolak lagi (10 - 6). Ingatkan mereka bahawa untuk 'membatalkan' penolakan, kita mesti melakukan operasi berlawanan: penambahan."
    working: |
      1. Bentuk persamaan daripada cerita: $x - 6 = 10$
      2. Aplikasikan konsep kesamaan (Tambah 6 di kedua-dua belah): $x - 6 + 6 = 10 + 6$
      3. Permudahkan kedua-dua belah: $x + 0 = 16$
      4. Jawapan Akhir: $x = 16$

  - id: WE-02
    topic: "Menyelesaikan Persamaan dengan Kurungan (6.1)"
    difficulty: medium
    learning_objective: 6.1.4
    scenario: "Cikgu membeli 2 bekas pen yang serupa. Di dalam setiap bekas, terdapat sebilangan pen biru ($x$) yang tidak diketahui dan tepat 4 batang pen merah. Secara keseluruhan, Cikgu mempunyai 22 batang pen. Selesaikan $2(x + 4) = 22$ untuk mencari bilangan pen biru."
    real_world_analogy: "Fikirkan kurungan seperti 'Set Kombo'. Jika anda memesan 2 set (1 Burger + 4 Nugget), anda akan mendapat 2 Burger DAN 8 Nugget. Anda mesti mendarabkan nombor di luar dengan SETIAP item di dalam."
    misconception_alert: "Perangkap 'Sebutan Terlupa'! Semasa mengembangkan $2(x + 4)$, pelajar sering menulis $2x + 4$, dan terlupa untuk mendarabkan 2 dengan 4. Nombor di luar kurungan adalah 'salam' yang mesti diberikan kepada semua orang di dalam."
    working: |
      1. Kembangkan kurungan (Darab 2 dengan $x$ dan 2 by 4): $2x + 8 = 22$
      2. Aplikasikan konsep kesamaan (Tolak 8 dari kedua-dua belah): $2x + 8 - 8 = 22 - 8$
      3. Permudahkan: $2x = 14$
      4. Aplikasikan konsep kesamaan (Bahagi kedua-dua belah dengan 2): $2x / 2 = 14 / 2$
      5. Jawapan Akhir: $x = 7$

  ##### ---------------------------------------------------------
  ##### SUBTOPIK 6.2: Persamaan Linear dalam Dua Pemboleh Ubah
  ##### ---------------------------------------------------------
  - id: WE-03
    topic: "Penyelesaian yang Mungkin untuk Dua Pemboleh Ubah (6.2)"
    difficulty: medium
    learning_objective: 6.2.3
    scenario: "Di sebuah gerai, jumlah harga untuk sebungkus Nasi Lemak ($x$) dan segelas Teh Tarik ($y$) ialah $RM5$. Cari tiga pasangan harga yang mungkin bagi $x$ dan $y$."
    real_world_analogy: "Bayangkan sebuah jongkang-jongket di mana jumlah berat mestilah 5kg. Jika Nasi Lemak menjadi lebih berat, Teh Tarik mestilah menjadi lebih ringan untuk mengekalkan jumlah yang sama!"
    misconception_alert: "Perangkap 'Jawapan Unik'! Pelajar sering berfikir hanya ada satu jawapan yang 'betul'. Dalam persamaan dengan dua pemboleh ubah, terdapat pasangan penyelesaian yang tidak terhingga yang boleh berfungsi."
    working: |
      1. Bentuk persamaan: $x + y = 5$
      2. Kes Ujian 1 (Andaikan Nasi Lemak $x = 2$): $2 + y = 5 \rightarrow y = 5 - 2 = 3$. Pasangan: $(2, 3)$
      3. Kes Ujian 2 (Andaikan Nasi Lemak $x = 3$): $3 + y = 5 \rightarrow y = 5 - 3 = 2$. Pasangan: $(3, 2)$
      4. Kes Ujian 3 (Andaikan Nasi Lemak $x = 4$): $4 + y = 5 \rightarrow y = 5 - 4 = 1$. Pasangan: $(4, 1)$
      5. Keputusan Akhir: Tiga pasangan yang mungkin ialah $(2, 3)$, $(3, 2)$, dan $(4, 1)$.

  ##### ---------------------------------------------------------
  ##### SUBTOPIK 6.3: Persamaan Linear Serentak
  ##### ---------------------------------------------------------
  - id: WE-04
    topic: "Kaedah Penghapusan (6.3)"
    difficulty: hard
    learning_objective: 6.3.2
    scenario: "Selesaikan persamaan serentak berikut untuk mencari titik persilangan: \n $x + 2y = 9$ \n $3x - 2y = 15$"
    real_world_analogy: "Fikirkan ini sebagai helah 'Vanish' (hilang). Jika kita mempunyai $+2y$ dan $-2y$ dan kita menambahnya bersama, pemboleh ubah $y$ akan hilang sepenuhnya, meninggalkan hanya $x$ untuk diselesaikan!"
    misconception_alert: "Perangkap 'Kekeliruan Tanda'! Pelajar sering menolak apabila mereka melihat tanda yang berbeza. Ingat Peraturan Emas: 'Tanda Berbeza? TAMBAH persamaan tersebut. Tanda Sama? TOLAK persamaan tersebut.'"
    working: |
      1. Labelkan persamaan: (1) $x + 2y = 9$ dan (2) $3x - 2y = 15$
      2. Memandangkan sebutan $y$ mempunyai tanda berbeza ($+2y$ dan $-2y$), tambah (1) dan (2): $(x + 3x) + (2y - 2y) = 9 + 15$
      3. Permudahkan: $4x = 24$
      4. Selesaikan untuk $x$: $x = 24 / 4 = 6$
      5. Gantikan $x = 6$ ke dalam Pers (1): $6 + 2y = 9$
      6. Selesaikan untuk $y$: $2y = 9 - 6 \rightarrow 2y = 3 \rightarrow y = 1.5$
      7. Jawapan Akhir: $x = 6, y = 1.5$ (Titik persilangan ialah $(6, 1.5)$)

  - id: WE-05
    topic: "Pemboleh Ubah di Kedua-dua Belah (KBAT)"
    difficulty: hard
    learning_objective: 6.1.4
    scenario: "Syarikat A mengenakan RM3 per kg ditambah yuran tetap RM2 ($3x + 2$). Syarikat B mengenakan RM5 per kg tetapi memberi diskaun RM4 ($5x - 4$). Pada berat pakej ($x$) berapakah caj kedua-dua syarikat adalah sama?"
    real_world_analogy: "Fikirkan tentang acara Tarik Tali. Kedua-dua belah mempunyai pasukan 'x' dan pasukan 'nombor'. Kita mahu menggerakkan semua pemain 'x' ke satu sisi tali dan semua nombor ke sisi yang lain."
    misconception_alert: "Perangkap 'Nombor Negatif'! Menggerakkan pemboleh ubah yang besar kepada yang lebih kecil menghasilkan negatif (contoh: $3x - 5x = -2x$). Untuk mengelakkan pening, sentiasa gerakkan sebutan $x$ yang LEBIH KECIL ke arah yang LEBIH BESAR."
    working: |
      1. Samakan kedua-dua persamaan: $3x + 2 = 5x - 4$
      2. Gerakkan $x$ yang lebih kecil (Tolak $3x$ dari kedua-dua belah): $3x - 3x + 2 = 5x - 3x - 4$
      3. Permudahkan: $2 = 2x - 4$
      4. Gerakkan nombor (Tambah 4 di kedua-dua belah): $2 + 4 = 2x - 4 + 4$
      5. Permudahkan: $6 = 2x$
      6. Bahagi kedua-dua belah dengan 2: $6 / 2 = 2x / 2$
      7. Jawapan Akhir: $x = 3$ kg.
