  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5
teaching:
  sequence:
    - "Langkah 1: Mengenal pasti faktor melalui aktiviti penerokaan pembahagian tepat (Buku Teks ms 32)"
    - "Langkah 2: Mencari faktor perdana dan melakukan pemfaktoran perdana menggunakan kaedah pokok faktor atau pembahagian berulang (Buku Teks ms 33-34)"
    - "Langkah 3: Menentukan faktor sepunya dan mencari FSTB bagi dua atau tiga nombor (Buku Teks ms 35-36)"
    - "Langkah 4: Aplikasi FSTB dalam masalah pembahagian sama rata atau saiz maksimum (Buku Teks ms 37)"
    - "Langkah 5: Meneroka gandaan dan gandaan sepunya menggunakan hamparan elektronik (Buku Teks ms 38-39)"
    - "Langkah 6: Menentukan GSTK melalui penyenaraian, pembahagian berulang, atau pemfaktoran perdana (Buku Teks ms 40-41)"
    - "Langkah 7: Aplikasi GSTK dalam masalah kitaran masa atau bilangan minimum (Buku Teks ms 42)"
common_misconceptions:
  - misconception: "Menganggap angka 1 adalah faktor perdana kerana ia faktor bagi semua nombor."
    remediation: "Jelaskan bahawa walaupun 1 adalah faktor bagi semua nombor, ia bukan nombor perdana. Faktor perdana mestilah terdiri daripada nombor perdana sahaja (Buku Teks ms 32, 33)."
  - misconception: "Keliru antara FSTB (nombor lebih kecil) dan GSTK (nombor lebih besar)."
    remediation: "Gunakan analogi: Faktor adalah 'pembahagi' (divider) maka hasilnya kecil; Gandaan adalah 'hasil darab' (product) maka hasilnya besar."
  - misconception: "Menganggap semua nombor ganjil adalah nombor perdana."
    remediation: "Tunjukkan 'Saringan Eratosthenes' untuk membuktikan nombor ganjil seperti 9 dan 15 mempunyai faktor selain 1 dan diri sendiri (Buku Teks ms 31)."
engagement_hooks:
  - "Cabaran Jubin: Bagaimana FSTB membantu jurubina menentukan saiz jubin segi empat sama terbesar untuk menutupi lantai tanpa baki? (Buku Teks ms 30)"
  - "Rhythm Master: Gunakan GSTK untuk memahami rentak muzik atau menentukan bila dua lampu neon akan berkelip serentak lagi! (Buku Teks ms 31, 42)"
  - "Tugasan Kedai Kek: Selesaikan masalah logistik memotong 7 biji kek secara adil untuk 12 kotak media sosial menggunakan konsep faktor (Buku Teks ms 45)."
