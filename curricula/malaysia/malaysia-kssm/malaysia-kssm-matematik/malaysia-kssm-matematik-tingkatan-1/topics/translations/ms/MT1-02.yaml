content_standards:
  - id: "2.1"
    text: "Faktor, faktor perdana dan faktor sepunya terbesar (FSTB)"
  - id: "2.2"
    text: "Gandaan, gandaan sepunya dan gandaan sepunya terkecil (GSTK)"

learning_objectives:
  - id: "2.1.1"
    content_standard_id: "2.1"
    text: "Menentu dan menyenaraikan faktor bagi nombor bulat, dan seterusnya membuat generalisasi tentang faktor."
    bloom: understand
  - id: "2.1.2"
    content_standard_id: "2.1"
    text: "Menentu dan menyenaraikan faktor perdana bagi suatu nombor bulat dan seterusnya mengungkapkan nombor tersebut dalam bentuk pemfaktoran perdana."
    bloom: apply
  - id: "2.1.3"
    content_standard_id: "2.1"
    text: "Menerangkan dan menentukan faktor sepunya bagi nombor bulat."
    bloom: understand
  - id: "2.1.4"
    content_standard_id: "2.1"
    text: "Menentukan FSTB bagi dua dan tiga nombor bulat."
    bloom: apply
  - id: "2.1.5"
    content_standard_id: "2.1"
    text: "Menyelesaikan masalah yang melibatkan FSTB."
    bloom: apply
  - id: "2.2.1"
    content_standard_id: "2.2"
    text: "Menerangkan dan menentukan gandaan sepunya bagi nombor bulat."
    bloom: understand
  - id: "2.2.2"
    content_standard_id: "2.2"
    text: "Menentukan GSTK bagi dua dan tiga nombor bulat."
    bloom: apply
  - id: "2.2.3"
    content_standard_id: "2.2"
    text: "Menyelesaikan masalah yang melibatkan GSTK."
    bloom: apply

performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang nombor perdana, faktor dan gandaan."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang nombor perdana, faktor dan gandaan."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang nombor perdana, faktor dan gandaan untuk melaksanakan tugasan mudah yang melibatkan FSTB dan GSTK."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor perdana, faktor dan gandaan dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor perdana, faktor dan gandaan dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor perdana, faktor dan gandaan dalam konteks penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required:
    - "MT1-01"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Mengenal Pasti Faktor & Visual Susunan Segi Empat (2 hari)"
    - "Langkah 2: Faktor Perdana & Pokok Faktor (3 hari)"
    - "Langkah 3: Mencari FSTB melalui Pembahagian Berulang (3 hari)"
    - "Langkah 4: Mengenal Pasti Gandaan & Gandaan Sepunya (2 hari)"
    - "Langkah 5: Mencari GSTK & Acara Berkala dalam Dunia Sebenar (3 hari)"
    - "Langkah 6: Strategi Penyelesaian Masalah UASA (FSTB vs GSTK) (3 hari)"
  common_misconceptions:
    - misconception: "Keliru antara Faktor dan Gandaan."
      remediation: "Gunakan analogi 'Hiris vs Timbun': Faktor menghiris nombor menjadi kecil; Gandaan menimbun nombor menjadi besar."
    - misconception: "Anggap 1 ialah faktor perdana."
      remediation: "Tegaskan semula bahawa 1 bukan nombor perdana atau gubahan; faktor perdana mestilah nombor perdana."
    - misconception: "Sentiasa pilih nombor yang BESAR untuk FSTB."
      remediation: "Jelaskan bahawa 'Faktor' mestilah lebih kecil atau sama dengan nombor asal ($FSTB \\leq \\text{Nombor Terkecil}$)."
  engagement_hooks:
    - "Misteri Jubin: 'Apakah saiz jubin segi empat sama terbesar yang boleh menutup lantai 12m x 18m?' (FSTB)"
    - "Pertemuan Bas: 'Tiga bas bertolak pada selang masa berbeza... bila mereka akan bertemu lagi?' (GSTK)"
    - "Pokok Faktor Perdana: 'Setiap nombor ada DNA unik (faktor perdana). Mari kita petakannya!'"

