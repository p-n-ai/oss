performance_standards:
  - level: 1
    descriptor: "Menunjukkan pengetahuan asas tentang garis dan sudut."
  - level: 2
    descriptor: "Menunjukkan kefahaman tentang garis dan sudut."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang garis dan sudut untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang garis dan sudut dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang garis dan sudut dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang garis dan sudut dalam konteks penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required:
    - "primary-school-geometry"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada garis, sudut, dan penentuan kekongruenan (SK 8.1.1 - 8.1.2)"
    - "Langkah 2: Meneroka sifat garis lurus, sudut refleks, dan pasangan sudut khas (SK 8.1.3 - 8.1.5)"
    - "Langkah 3: Pembinaan geometri bagi garis dan sudut beserta rasional (SK 8.1.6 - 8.1.7)"
    - "Langkah 4: Menganalisis sudut pada garis bersilang (SK 8.2)"
    - "Langkah 5: Menguasai garis selari, garis rentas lintang, dan sudut sepadan/selang-seli/pedalaman (SK 8.3.1 - 8.3.4)"
    - "Langkah 6: Aplikasi dunia sebenar: Sudut dongak dan sudut tunduk (SK 8.3.5 - 8.3.6)"
  common_misconceptions:
    - misconception: "Semua sudut mesti diukur bermula dari skala luar jangka sudut (protractor)."
      remediation: "Tunjukkan cara memilih skala sifar yang selari dengan lengan tapak sudut tersebut."
    - misconception: "Sudut yang kongruen mestilah mempunyai orientasi dan panjang lengan yang sama."
      remediation: "Jelaskan bahawa kekongruenan hanya merujuk kepada saiz sudut, tanpa mengira panjang lengan atau putaran."
    - misconception: "Garis selari hanya wujud dalam kedudukan menegak atau mendatar sahaja."
      remediation: "Berikan contoh garis selari yang condong dalam objek harian seperti pagar tangga."
  engagement_hooks:
    - "Bincangkan kejuruteraan struktur dan keindahan visual Jambatan Pulau Pinang dan Menara Berkembar Petronas."
    - "Teroka ketepatan geometri yang diperlukan dalam rekaan corak batik tradisional Melayu."
    - "Kaji bagaimana juruukur menggunakan sudut dongak untuk mengira ketinggian mercu tanda tanpa perlu memanjatnya."

