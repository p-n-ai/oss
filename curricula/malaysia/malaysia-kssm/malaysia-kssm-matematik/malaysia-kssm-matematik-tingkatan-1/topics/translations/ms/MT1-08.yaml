    bloom: understand
  - id: "8.1.5"
    content_standard_id: "8.1"
    text: "Menyelesaikan masalah yang melibatkan sudut pelengkap, sudut penggenap dan sudut konjugat."
    bloom: apply
  - id: "8.1.6"
    content_standard_id: "8.1"
    text: "Membina (i) tembereng garis, (ii) pembahagi dua sama serenjang suatu tembereng garis, (iii) garis serenjang kepada suatu garis lurus, (iv) garis selari dan menerangkan rasional langkah-langkah pembinaan."
    bloom: create
  - id: "8.1.7"
    content_standard_id: "8.1"
    text: "Membina sudut dan pembahagi dua sama sudut serta menerangkan rasional langkah-langkah pembinaan."
    bloom: create
  - id: "8.2.1"
    content_standard_id: "8.2"
