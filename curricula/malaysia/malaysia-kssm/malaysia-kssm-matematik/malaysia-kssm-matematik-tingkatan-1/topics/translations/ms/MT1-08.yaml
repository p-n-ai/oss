    bloom: understand
  - id: "8.1.2"
    content_standard_id: "8.1"
    text: "Menganggar dan mengukur saiz tembereng garis dan sudut serta menerangkan cara anggaran diperoleh."
    bloom: apply
  - id: "8.1.3"
    content_standard_id: "8.1"
    text: "Mengenal, membanding beza dan menerangkan sifat sudut pada garis lurus, sudut refleks, dan sudut putaran lengkap."
    bloom: understand
  - id: "8.1.4"
    content_standard_id: "8.1"
