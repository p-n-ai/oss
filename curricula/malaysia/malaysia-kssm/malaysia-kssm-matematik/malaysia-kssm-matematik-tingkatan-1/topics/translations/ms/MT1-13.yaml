teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada hipotenus sebagai sisi terpanjang bertentangan dengan sudut tegak (Muka Surat 294)."
    - "Langkah 2: Meneroka hubungan luas segi empat sama pada sisi segi tiga bersudut tegak (Muka Surat 295)."
    - "Langkah 3: Memformalkan rumus Teorem Pythagoras: c^2 = a^2 + b^2 (Muka Surat 296)."
    - "Langkah 4: Menghitung sisi yang tidak diketahui dalam segi tiga tunggal dan gabungan (Muka Surat 297)."
    - "Langkah 5: Penyelesaian masalah dunia sebenar menggunakan kaedah 4-langkah (Muka Surat 298)."
    - "Langkah 6: Memahami Akas Teorem Pythagoras untuk mengesahkan sudut tegak (Muka Surat 300)."
    - "Langkah 7: Aplikasi tahap penguasaan dan cabaran (Muka Surat 304)."
  common_misconceptions:
    - misconception: "Menganggap hipotenus sentiasa sisi menegak atau mendatar."
      remediation: "Tekankan bahawa hipotenus sentiasa sisi yang bertentangan dengan sudut 90 darjah, tanpa mengira orientasi (Muka Surat 294)."
    - misconception: "Mengaplikasikan teorem pada segi tiga yang bukan bersudut tegak."
      remediation: "Jelaskan bahawa teorem ini hanya sah jika salah satu sudut ialah tepat 90 darjah (Muka Surat 300)."
    - misconception: "Lupa untuk melakukan punca kuasa dua pada langkah akhir pengiraan panjang sisi."
      remediation: "Sentiasa semak sama ada jawapan akhir mempunyai unit dan skala yang logik berbanding sisi lain (Muka Surat 297)."
