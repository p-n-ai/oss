topic_id: MT1-13
provenance: ai-generated
description: "Contoh kerja untuk Teorem Pythagoras"
worked_examples:
  - id: WE-01
    learning_objective: "13.1.1"
    topic: "Mengenal Pasti Hipotenus"
    difficulty: easy
    real_world_analogy: "Bayangkan sebuah kedai mamak di penjuru jalan. Berjalan ikut dua kaki lima menghasilkan laluan berbentuk L, tetapi memotong penjuru secara menyerong ialah laluan lurus paling panjang. Laluan pepenjuru itu seperti hipotenus."
    misconception_alert: "Pelajar sering fikir sisi yang senget mestilah hipotenus. Hipotenus ditentukan oleh kedudukan: ia sentiasa bertentangan dengan sudut 90 darjah."
    scenario: "Dalam sebuah segi tiga bersudut tegak $PQR$, sudut tegak berada pada bucu $Q$. Kenal pasti sisi manakah ($PQ$, $QR$, atau $PR$) yang merupakan hipotenus."
    working: |
      Langkah 1: Kenal pasti kedudukan sudut tegak. Ia berada pada bucu $Q$.
      Langkah 2: Cari sisi yang bertentangan dengan bucu $Q$.
      Langkah 3: Sisi yang tidak menyentuh bucu $Q$ ialah $PR$.
      Langkah 4: Kesimpulan: Sisi $PR$ ialah hipotenus.

  - id: WE-02
    learning_objective: "13.1.3"
    topic: "Menghitung Panjang Hipotenus"
    difficulty: medium
    real_world_analogy: "Skrin TV diukur secara pepenjuru. Lebar dan tinggi ialah dua sisi pendek, manakala pepenjuru itu ialah hipotenus."
    misconception_alert: "Pelajar sering menambah dua panjang sisi secara terus dan bukan menambah kuasa dua sisi."
    scenario: "Sebuah segi tiga bersudut tegak mempunyai dua sisi pendek berukuran $6 \\text{ cm}$ dan $8 \\text{ cm}$. Hitungkan panjang hipotenus, $x$."
    working: |
      Langkah 1: Nyatakan teorem: $c^2 = a^2 + b^2$.
      Langkah 2: Gantikan sisi yang diketahui: $x^2 = 6^2 + 8^2$.
      Langkah 3: Kira kuasa dua: $x^2 = 36 + 64$.
      Langkah 4: Tambahkan nilai: $x^2 = 100$.
      Langkah 5: Ambil punca kuasa dua bagi kedua-dua belah: $x = \\sqrt{100}$.
      Langkah 6: Jawapan akhir: $x = 10 \\text{ cm}$.

  - id: WE-03
    learning_objective: "13.1.3"
    topic: "Menghitung Panjang Sisi Pendek"
    difficulty: medium
    real_world_analogy: "Tangga yang bersandar pada dinding. Jika anda tahu panjang tangga dan ketinggian yang dicapai, anda boleh cari jarak kaki tangga dari dinding."
    misconception_alert: "Pelajar sering lupa untuk menolak apabila hipotenus sudah diketahui."
    scenario: "Sebuah segi tiga bersudut tegak mempunyai hipotenus $13 \\text{ cm}$ dan satu sisi lain sepanjang $12 \\text{ cm}$. Cari panjang sisi yang tidak diketahui, $y$."
    working: |
      Langkah 1: Gunakan bentuk penolakan teorem: $a^2 = c^2 - b^2$.
      Langkah 2: Gantikan nilai yang diketahui: $y^2 = 13^2 - 12^2$.
      Langkah 3: Kira kuasa dua: $y^2 = 169 - 144$.
      Langkah 4: Tolakkan nilai: $y^2 = 25$.
      Langkah 5: Ambil punca kuasa dua bagi kedua-dua belah: $y = \\sqrt{25}$.
      Langkah 6: Jawapan akhir: $y = 5 \\text{ cm}$.

  - id: WE-04
    learning_objective: "13.1.3"
    topic: "Gabungan Bentuk Geometri"
    difficulty: hard
    real_world_analogy: "Bayangkan Spider-Man melintas dua dinding yang bersambung. Anda selesaikan segi tiga pertama untuk dapatkan sisi kongsi, kemudian gunakan sisi itu dalam segi tiga kedua."
    misconception_alert: "Pelajar sering cuba kira semuanya sekali gus. Bagi gabungan bentuk, selesaikan satu segi tiga dahulu untuk dapatkan sisi kongsi yang diperlukan oleh segi tiga seterusnya."
    scenario: "Dalam sebuah rajah, segi tiga $ABC$ dan segi tiga $ACD$ adalah bersudut tegak. Bagi $ABC$, $AB = 3 \\text{ cm}$ dan $BC = 4 \\text{ cm}$. Bagi $ACD$, sudut tegak berada pada $C$ dan $CD = 12 \\text{ cm}$. Cari panjang $AD$."
    working: |
      Langkah 1: Fokus pada segi tiga $ABC$ terlebih dahulu untuk mencari sisi kongsi $AC$.
      Langkah 2: $AC^2 = AB^2 + BC^2$.
      Langkah 3: $AC^2 = 3^2 + 4^2 = 9 + 16 = 25$.
      Langkah 4: $AC = \\sqrt{25} = 5 \\text{ cm}$.
      Langkah 5: Sekarang fokus pada segi tiga $ACD$ menggunakan nilai baharu $AC$.
      Langkah 6: $AD^2 = AC^2 + CD^2$.
      Langkah 7: $AD^2 = 5^2 + 12^2 = 25 + 144 = 169$.
      Langkah 8: $AD = \\sqrt{169}$.
      Langkah 9: Jawapan akhir: $AD = 13 \\text{ cm}$.

  - id: WE-05
    learning_objective: "13.2.1"
    topic: "Akas Teorem Pythagoras"
    difficulty: medium
    real_world_analogy: "Ini ialah ujian detektif. Jika panjang sisi memenuhi persamaan, maka segi tiga itu menyembunyikan sudut 90 darjah yang sempurna."
    misconception_alert: "Pelajar sering memilih sisi yang salah untuk $c$. Sentiasa kenal pasti sisi paling panjang terlebih dahulu kerana hanya sisi itu yang boleh menjadi calon hipotenus."
    scenario: "Sebuah segi tiga mempunyai panjang sisi $7 \\text{ cm}$, $24 \\text{ cm}$, dan $25 \\text{ cm}$. Tentukan sama ada ini adalah segi tiga bersudut tegak."
    working: |
      Langkah 1: Kenal pasti sisi paling panjang: $c = 25$.
      Langkah 2: Kira kuasa dua sisi paling panjang: $25^2 = 625$.
      Langkah 3: Kira jumlah kuasa dua dua sisi yang lain: $7^2 + 24^2$.
      Langkah 4: $49 + 576 = 625$.
      Langkah 5: Bandingkan keputusan: $625 = 625$.
      Langkah 6: Kesimpulan: Oleh sebab $a^2 + b^2 = c^2$, maka segi tiga ini adalah bersudut tegak.
