questions:
  # --- 4.1 Nisbah ---
  - id: Q1
    text: "Sebuah pasukan terdiri daripada 12 pemain bola sepak, 8 pemain bola tampar, dan 4 pemain bola keranjang. Wakilkan hubungan pemain bola sepak kepada pemain bola tampar kepada pemain bola keranjang dalam bentuk $a : b : c$ dalam bentuk termudah."
    difficulty: "easy"
    learning_objective: "4.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: "exact"
      value: "3 : 2 : 1"
      working: |
        Langkah 1: Tulis nisbah awal berdasarkan kuantiti yang diberi: 12 : 8 : 4.
        Langkah 2: Cari Faktor Sepunya Terbesar (FSTB) bagi 12, 8, dan 4, iaitu 4.
        Langkah 3: Bahagikan setiap bahagian dengan 4: (12/4) : (8/4) : (4/4) = 3 : 2 : 1.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengenal pasti nisbah awal 12 : 8 : 4 dengan betul."
      - marks: 1
        criteria: "Memudahkan nisbah kepada 3 : 2 : 1."
    hints:
      - level: 1
        text: "Mula-mula, tulis nombor mengikut urutan yang disebut: Bola Sepak : Bola Tampar : Bola Keranjang."
      - level: 2
        text: "Ada tak nombor yang boleh bahagi 12, 8, dan 4 dengan tepat? Cuba bahagi dengan faktor sepunya terbesar untuk memudahkan nisbah."

  - id: Q2
    text: "Padankan pasangan nisbah setara yang berikut."
