  # --- 4.3 Kadaran ---
  - id: Q4
    text: "Kos tenaga elektrik ialah 43.6 sen bagi 2 kilowatt-jam (kWj). Berapakah kos bagi 30 kWj?"
    difficulty: "medium"
    learning_objective: "4.3.2"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "654 sen"
      working: |
        Langkah 1: Bentuk satu kadaran: $\frac{43.6 \text{ sen}}{2 \text{ kWj}} = \frac{x \text{ sen}}{30 \text{ kWj}}$.
        Langkah 2: Pendaraban silang: $2x = 43.6 \times 30$.
        Langkah 3: Selesaikan untuk x: $x = \frac{1308}{2} = 654$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Membentuk persamaan kadaran yang betul."
      - marks: 1
        criteria: "Langkah pendaraban silang yang betul."
      - marks: 1
        criteria: "Jawapan akhir dengan unit yang betul."
    hints:
      - level: 1
        text: "Fikirkan perkaitan ini: jika 2 kWj berharga jumlah tertentu, 30 kWj mestilah berharga lebih mengikut kadaran yang sama."
      - level: 2
        text: "Cuba gunakan kaedah unitari dulu: cari kos untuk 1 kWj dengan membahagi 43.6 dengan 2."

  # --- 4.4 Nisbah, Kadar dan Kadaran ---
  - id: Q5
    text: "Seorang pekebun menggunakan kaedah tangkap, tanda, lepas dan tangkap semula untuk menganggarkan populasi siput. Dia menandakan 24 ekor siput. Kemudian, dia menangkap semula 30 ekor siput dan mendapati 5 ekor adalah bertanda. Anggarkan jumlah populasi siput tersebut."
    difficulty: "hard"
    learning_objective: "4.4.4"
    tp_level: 5
    kbat: true
    answer:
      type: "exact"
      value: "144"
      working: |
        Langkah 1: Gunakan kadaran $\frac{\text{Bilangan siput bertanda}}{\text{Jumlah populasi}} = \frac{\text{Bertanda dalam tangkapan semula}}{\text{Jumlah ditangkap semula}}$.
        Langkah 2: $\frac{24}{x} = \frac{5}{30}$.
        Langkah 3: Permudahkan $\frac{5}{30}$ kepada $\frac{1}{6}$.
        Langkah 4: $\frac{24}{x} = \frac{1}{6} \implies x = 24 \times 6 = 144$.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Mengenal pasti hubungan antara sampel bertanda dengan jumlah populasi dengan betul."
      - marks: 2
        criteria: "Menyelesaikan kadaran untuk mencari anggaran akhir."
    hints:
      - level: 1
        text: "Nisbah siput bertanda kepada jumlah populasi sepatutnya sama dengan nisbah siput bertanda dalam sampel kedua kepada jumlah sampel kedua tersebut."

  # --- 4.5 Perkaitan dengan Peratusan ---
  - id: Q6
    text: "Leonardo da Vinci mengkaji hubungan nisbah pada tubuh manusia. Salah satu nisbah yang digunakan ialah $\\frac{\\text{tinggi kepala}}{\\text{tinggi keseluruhan tubuh}} = \\frac{2}{5}$. Jika tinggi keseluruhan seseorang ialah 175 cm, berapakah anggaran tinggi kepalanya?"
    difficulty: "hard"
    learning_objective: "4.5.3"
    tp_level: 6
    kbat: true
    answer:
      type: "exact"
      value: "70 cm"
      working: |
        Langkah 1: Bentuk kadaran: $\frac{2}{5} = \frac{x}{175}$.
        Langkah 2: Selesaikan untuk x: $x = \frac{2 \times 175}{5}$.
        Langkah 3: $x = \frac{350}{5} = 70$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Membentuk kadaran berdasarkan nisbah Vitruvian."
      - marks: 2
        criteria: "Mengira tinggi kepala dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa nisbah $\\frac{2}{5}$ membandingkan kepala kepada tinggi keseluruhan. Jika tinggi keseluruhan ialah 175, berapa kali ganda ia lebih besar daripada 5?"
