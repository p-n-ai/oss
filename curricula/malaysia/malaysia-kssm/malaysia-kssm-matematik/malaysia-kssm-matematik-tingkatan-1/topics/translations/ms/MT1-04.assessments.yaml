    learning_objective: "4.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: "free_text"
      value: "6:9 = 2:3, 6:90 = 1:15, 9:60 = 3:20"
      working: |
        - 6:9 boleh dibahagi dengan 3 -> 2:3.
        - 6:90 boleh dibahagi dengan 6 -> 1:15.
        - 9:60 boleh dibahagi dengan 3 -> 3:20.
    marks: 3
    rubric:
      - marks: 3
        criteria: "Memadankan ketiga-tiga pasangan nisbah setara dengan betul."
    hints:
      - level: 1
        text: "Nisbah setara adalah seperti pecahan setara. Cuba mudahkan nisbah yang lebih besar di sebelah kiri."

