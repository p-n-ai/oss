    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Pemboleh Ubah & Analogi 'Pesanan Mamak' (2 hari)"
    - "Langkah 2: Membentuk Ungkapan daripada Cerita Dunia Sebenar (3 hari)"
    - "Langkah 3: Penggantian & Menghitung 'Bil Akhir' (2 hari)"
    - "Langkah 4: Mengenal Pasti Sebutan & Peraturan 'Pekali Ghaib' (2 hari)"
    - "Langkah 5: Mengisih Sebutan Serupa vs Tidak Serupa (Isih Barang Dapur) (2 hari)"
    - "Langkah 6: Penambahan & Penolakan (Kumpulkan Jenis Sama) (3 hari)"
    - "Langkah 7: Pendaraban & Pembahagian Ungkapan Satu Sebutan (3 hari)"
  common_misconceptions:
    - misconception: "Ralat pendaraban tersirat (Anggap $3x$ adalah $3+x$ atau $30+x$)."
      remediation: "Jelaskan $3x$ bermaksud 3 beg berisi $x$. Jika $x=5$, $3 \\times 5 = 15$, bukan 35."
    - misconception: "Menggabungkan sebutan tidak serupa (cth: $2a + 3b = 5ab$)."
      remediation: "Gunakan analogi 'Bakul Buah': 2 epal + 3 pisang $\\neq$ 5 'epal-pisang'."
    - misconception: "Ralat tanda semasa penolakan (Perangkap 'Kurungan Negatif')."
      remediation: "Beritahu mereka untuk 'tukar suis' bagi setiap sebutan di dalam kurungan bila ada tolak di luar."
  engagement_hooks:
    - "Pesanan Mamak: 'Jika 1 Roti Canai ialah $r$ dan 1 Teh Tarik ialah $t$... macam mana nak tulis bil untuk 3 Roti dan 2 Teh?'"
    - "Cabaran Alkemis Dapur: Memetakan barang dapur kepada pemboleh ubah algebra."
    - "Beg Misteri: 'Satu beg ada $x$ guli. Kalau saya tambah 5 dan kemudian gandakan dua, ada berapa semuanya?'"

