teaching:
  sequence:
    - "Langkah 1: Teroka perimeter dengan mengukur objek bilik darjah dan sempadan kolam renang (Buku Teks ms. 226)."
    - "Langkah 2: Latihan penganggaran menggunakan benang untuk garis lengkung dan kertas grid (Aktiviti Penerokaan 1)."
    - "Langkah 3: Selesaikan masalah perimeter dalam konteks dunia sebenar seperti memagari kawasan letak kereta (Buku Teks ms. 228)."
    - "Langkah 4: Anggar luas menggunakan grid segi empat sama 1-unit dan kaedah garis mengufuk (Buku Teks ms. 231)."
    - "Langkah 5: Penerbitan rumus: Tukar segi empat selari dan segi tiga kepada segi empat tepat untuk menemui rumus luas (Aktiviti Penerokaan 2-5)."
    - "Langkah 6: Kuasai bentuk gabungan: Hitung luas untuk plot tanah yang ditanam dengan pelbagai tanaman (Buku Teks ms. 237)."
    - "Langkah 7: Penyiasatan: Temui sebab mengapa bentuk segi empat sama memberikan luas maksimum bagi perimeter yang tetap (Aktiviti Penerokaan 6)."
    - "Langkah 8: Cabaran Akhir: Selesaikan masalah TP6 bukan rutin melibatkan panjang sisi yang hilang dan kecekapan kos (Buku Teks ms. 244)."
  common_misconceptions:
    - misconception: "Keliru antara perimeter (sempadan) dengan luas (wilayah permukaan)."
      remediation: "Gunakan analogi 'Pagar vs Rumput': perimeter ialah panjang pagar, luas ialah rumput di dalamnya."
    - misconception: "Beranggapan bahawa bentuk dengan perimeter yang sama mesti mempunyai luas yang sama."
      remediation: "Jalankan Aktiviti Penerokaan 6 untuk menunjukkan bagaimana luas berubah walaupun perimeter tetap pada 36 cm."
    - misconception: "Terlupa bahawa tinggi dalam segi tiga dan segi empat selari mestilah tinggi tegak, bukan tinggi condong."
      remediation: "Tekankan simbol sudut tegak dalam rumus: Luas = $\\frac{1}{2} \\times tapak \\times tinggi\\ tegak$."
  engagement_hooks:
    - "Rahsia Pengeluar Padi: Bincangkan bagaimana sawah padi yang luas di Kedah (Jelapang Padi Malaysia) menggunakan perimeter untuk sempadan pengairan dan luas untuk hasil tuaian (Buku Teks ms. 224)."
    - "Misteri Papirus Rhind: Kongsi fakta sejarah bahawa orang Mesir kuno melakukan kesilapan dalam rumus luas sisi empat mereka pada 1650 S.M. (Buku Teks ms. 225)."
    - "Pereka Pameran: Cabar pelajar untuk merancang tapak pameran 'Hari Wawasan' menggunakan tepat 20m reben merah untuk memaksimumkan ruang (Buku Teks ms. 245)."

