performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang integer, pecahan dan perpuluhan."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang nombor nisbah."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang nombor nisbah untuk melaksanakan operasi asas."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor nisbah dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor nisbah dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor nisbah dalam konteks penyelesaian masalah bukan rutin secara kreatif."

prerequisites:
  required: [] # Padan dengan Master EN
  recommended: [] # Padan dengan Master EN

mastery:
  minimum_score: 0.75 # Padan dengan Master EN
  assessment_count: 3 # Padan dengan Master EN
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Integer & Visual Lif (3 hari)"
    - "Langkah 2: Operasi Integer & Logik Hutang 'Pasar Malam' (4 hari)"
    - "Langkah 3: Pecahan Positif/Negatif pada Garis Nombor (3 hari)"
    - "Langkah 4: Perpuluhan Positif/Negatif (3 hari)"
    - "Langkah 5: Semakan Master Nombor Nisbah & Tertib Operasi (4 hari)"
  common_misconceptions:
    - misconception: "Sifar bukan integer."
      remediation: "Jelaskan bahawa 0 ialah lubang di tanah (neutral) tetapi tetap integer yang sah."
    - misconception: "Bahagi dengan sifar ialah 0."
      remediation: "Tunjukkan ralat kalkulator; pembahagian dengan sifar adalah tidak tertakrif (Semakan definisi nombor nisbah)."
    - misconception: "-10 lebih besar daripada -2."
      remediation: "Gunakan analogi suhu atau analogi hutang (hutang RM10 vs hutang RM2)."
  engagement_hooks:
    - "Eskap Lif: 'Anda mula di Tingkat 3, turun 5 tingkat, anda di mana?'"
    - "Penyelam Laut Dalam: 'Penyelam di -15m... jika dia naik 5m, adakah dia lebih dalam atau cetek?'"
    - "Projek Garis Nombor Isi Rumah: 'Memetakan barang di rumah guna kedudukan negatif/positif.'"

