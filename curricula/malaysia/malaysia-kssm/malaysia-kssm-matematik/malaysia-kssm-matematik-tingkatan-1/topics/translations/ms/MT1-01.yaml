performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang integer, pecahan dan perpuluhan."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang nombor nisbah."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang nombor nisbah untuk melaksanakan operasi asas dan gabungan operasi asas aritmetik."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor nisbah dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor nisbah dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nombor nisbah dalam konteks penyelesaian masalah bukan rutin."

prerequisites:
  required: []
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Perkenalkan konsep nombor nisbah dengan contoh mudah (15 minit)"
    - "Langkah 2: Tunjukkan cara meletakkan nombor nisbah pada garis nombor (10 minit)"
    - "Langkah 3: Latih operasi asas dengan nombor nisbah menggunakan bahan manipulatif (20 minit)"
    - "Langkah 4: Selesaikan masalah kehidupan sebenar yang melibatkan nombor nisbah (15 minit)"
    - "Langkah 5: Ulang kaji dan nilai kefahaman melalui kuiz (10 minit)"
  common_misconceptions:
    - misconception: "Semua pecahan adalah nombor nisbah"
      remediation: "Tekankan syarat bahawa penyebut tidak boleh sifar"
    - misconception: "Nombor nisbah sentiasa positif"
      remediation: "Berikan contoh nombor nisbah negatif, seperti -3/4"
  engagement_hooks:
    - "Bincangkan bagaimana nombor nisbah digunakan dalam kadar pertukaran mata wang"
    - "Terokai penggunaan pecahan dalam resipi masakan dan pembahagian makanan"
    - "Kaitkan dengan statistik sukan, seperti purata pukulan dalam besbol"

quality_level: 2
provenance: ai-assisted
