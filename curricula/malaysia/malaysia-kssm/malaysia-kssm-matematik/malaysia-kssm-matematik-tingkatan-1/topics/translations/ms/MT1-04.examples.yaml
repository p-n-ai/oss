topic_id: MT1-04
provenance: ai-generated
description: "Contoh kerja langkah demi langkah bagi Nisbah, Kadar dan Kadaran menggunakan konteks buku teks."

worked_examples:
  - id: WE-01
    topic: "Memudahkan Nisbah"
    learning_objective: "4.1.3"
    difficulty: "easy"
    real_world_analogy: "Bayangkan memudahkan nisbah seperti 'mengemas' bilik yang bersepah. Kita membuang 'barang-barang lebihan' (faktor sepunya) sehingga hanya hubungan yang paling penting sahaja yang tinggal, tetapi saiz bilik (nilai asal) tetap tidak berubah."
    misconception_alert: "Pelajar sering lupa untuk menukar unit terlebih dahulu. Anda tidak boleh memudahkan $800 \\text{ g} : 1.8 \\text{ kg}$ sebagai $800 : 1.8$. Kedua-duanya mesti berada dalam 'bahasa' (unit) yang sama dahulu!"
    scenario: "Anis menyediakan larutan pembersih DIY dengan mencampurkan 800 g cuka dengan 1.8 kg air. Ungkapkan nisbah cuka kepada air dalam bentuk termudah."
    working: |
      1. Tukar kedua-dua kuantiti kepada unit yang sama (gram):
         $1.8 \text{ kg} = 1.8 \times 1000 = 1800 \text{ g}$
      2. Tulis nisbah tersebut: $800 : 1800$
      3. Kenal pasti Faktor Sepunya Terbesar (FSTB) bagi 800 dan 1800. Cuba bahagi dengan 100 dahulu:
         $\frac{800}{100} : \frac{1800}{100} = 8 : 18$
      4. Bahagikan dengan baki faktor sepunya, iaitu 2:
         $\frac{8}{2} : \frac{18}{2} = 4 : 9$
      5. Jawapan Akhir: Bentuk termudah ialah $4 : 9$.

  - id: WE-02
    topic: "Menentukan Nilai yang Tidak Diketahui dalam Kadaran"
    learning_objective: "4.3.2"
    difficulty: "medium"
    real_world_analogy: "Kadaran adalah seperti sebuah jongkang-jongket yang seimbang. Jika kita menambah berat (meningkatkan nilai) di satu pihak, kita mesti menambah berat yang berkadar tepat di pihak yang satu lagi supaya ia tidak senget."
    misconception_alert: "Perangkap 'Terbalik'! Pelajar selalu meletakkan nilai $x$ di kedudukan yang salah. Pastikan unit anda sepadan secara mendatar: $\\frac{\\text{sen}}{\\text{kWj}} = \\frac{\\text{sen}}{\\text{kWj}}$."
    scenario: "Bagi sebuah isi rumah di Malaysia, kos elektrik ialah 43.6 sen bagi 2 kilowatt-jam (kWj). Menggunakan kaedah kadaran, hitung kos bagi 30 kWj."
    working: |
      1. Biarkan kos bagi 30 kWj sebagai $x$ sen.
      2. Bentukkan kadaran: $\frac{43.6 \text{ sen}}{2 \text{ kWj}} = \frac{x \text{ sen}}{30 \text{ kWj}}$
      3. Gunakan pendaraban silang: $2 \times x = 43.6 \times 30$
      4. Hitung bahagian kanan: $2x = 1308$
      5. Pencilkan $x$ dengan membahagi kedua-dua belah dengan 2: $x = \frac{1308}{2}$
      6. Hitung nilai akhir: $x = 654$
      7. Jawapan Akhir: Kosnya ialah 654 sen (atau RM6.54).

  - id: WE-03
    topic: "Menyelesaikan Masalah dan Membuat Anggaran"
    learning_objective: "4.4.4"
    difficulty: "hard"
    real_world_analogy: "Bayangkan merasa sedikit 'hirupan' sup untuk memeriksa sama ada ia cukup masin. Rasa masin (nisbah) dalam satu sudu itu mewakili rasa masin keseluruhan periuk. Begitulah cara kita menganggarkan populasi besar menggunakan sampel kecil!"
    misconception_alert: "Gagal mengesahkan kitaran penyelesaian masalah 4-langkah. Pelajar sering berhenti sebaik sahaja mendapat nilai $x$, tetapi untuk soalan TP5/6, anda mesti menyemak sama ada anggaran itu masuk akal dalam konteks asal."
    scenario: "Seorang ahli biologi marin ingin menganggarkan populasi kuda laut (*Hippocampus kuda*) di sebuah muara sungai. Dia menangkap dan menandakan 24 ekor kuda laut. Dua minggu kemudian, dia menangkap semula 30 ekor kuda laut dan mendapati 5 ekor daripadanya bertanda. Anggarkan jumlah populasi kuda laut tersebut."
    working: |
      1. **Fahami:** Kita perlu mencari jumlah populasi ($P$) menggunakan nisbah kuda laut bertanda.
      2. **Rancang:** Bentukkan kadaran di mana $\frac{\text{Bertanda dalam Jumlah}}{\text{Jumlah Populasi}} = \frac{\text{Bertanda dalam Sampel}}{\text{Saiz Sampel}}$
      3. **Laksana:**
         $\frac{24}{P} = \frac{5}{30}$
      4. Permudahkan pecahan di sebelah kanan: $\frac{5}{30} = \frac{1}{6}$
      5. Sekarang persamaannya ialah: $\frac{24}{P} = \frac{1}{6}$
      6. Lakukan pendaraban silang: $1 \times P = 24 \times 6$
      7. Hitung hasilnya: $P = 144$
      8. **Semak:** Jika populasi ialah 144, nisbah bertanda ialah $24/144 = 1/6$, yang sepadan dengan nisbah sampel kita $5/30$.
      9. Jawapan Akhir: Anggaran populasi ialah 144 ekor kuda laut.
