learning_objectives:
  - id: "9.1.1"
    content_standard_id: "9.1"
    text: "Menyatakan hubung kait antara bilangan sisi, bucu dan pepenjuru poligon."
    bloom: remember
  - id: "9.1.2"
    content_standard_id: "9.1"
    text: "Melukis poligon, melabel bucu poligon dan menamakan poligon tersebut berdasarkan bucu yang telah dilabel."
    bloom: apply
  - id: "9.2.1"
    content_standard_id: "9.2"
    text: "Mengenal dan menyenaraikan sifat geometri bagi pelbagai jenis segi tiga. Seterusnya mengkelaskan segi tiga berdasarkan sifat geometri."
    bloom: analyze
  - id: "9.2.2"
    content_standard_id: "9.2"
    text: "Membuat dan mengesahkan konjektur tentang (i) hasil tambah sudut pedalaman, (ii) hasil tambah sudut pedalaman dan sudut peluaran bersebelahan, (iii) hubungan antara sudut peluaran dan hasil tambah sudut pedalaman yang bertentangan suatu segi tiga."
    bloom: evaluate
  - id: "9.2.3"
    content_standard_id: "9.2"
    text: "Menyelesaikan masalah yang melibatkan segi tiga."
    bloom: apply
  - id: "9.3.1"
    content_standard_id: "9.3"
    text: "Menghuraikan sifat geometri bagi pelbagai jenis sisi empat. Seterusnya mengkelaskan sisi empat berdasarkan sifat geometri."
    bloom: analyze
  - id: "9.3.2"
    content_standard_id: "9.3"
    text: "Membuat dan mengesahkan konjektur tentang (i) hasil tambah sudut pedalaman suatu sisi empat, (ii) hasil tambah sudut pedalaman dan sudut peluaran bersebelahan suatu sisi empat, dan (iii) hubungan antara sudut yang bertentangan dalam segi empat selari."
    bloom: evaluate
  - id: "9.3.3"
    content_standard_id: "9.3"
    text: "Menyelesaikan masalah yang melibatkan sisi empat."
    bloom: apply
  - id: "9.3.4"
    content_standard_id: "9.3"
    text: "Menyelesaikan masalah yang melibatkan gabungan segi tiga dan sisi empat."
    bloom: apply

performance_standards:
  - level: 1
    descriptor: "Memamerkan pengetahuan asas tentang poligon."
  - level: 2
    descriptor: "Memamerkan kefahaman tentang segi tiga dan sisi empat."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang garis dan sudut untuk melaksanakan tugasan mudah yang berkaitan dengan sudut pedalaman dan sudut peluaran segi tiga dan sisi empat."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang segi tiga dan sisi empat dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang segi tiga dan sisi empat dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang segi tiga dan sisi empat dalam konteks penyelesaian masalah bukan rutin secara kreatif."

