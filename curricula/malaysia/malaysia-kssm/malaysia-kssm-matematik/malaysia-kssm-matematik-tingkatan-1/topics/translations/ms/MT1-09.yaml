teaching:
  sequence:
    - "Langkah 1: Takrifkan poligon dan teroka hubungan antara sisi, bucu, dan pepenjuru menggunakan GeoGebra (Muka Surat 202-203)."
    - "Langkah 2: Latihan melukis dan melabel poligon dari segi tiga hingga dekagon (Muka Surat 204)."
    - "Langkah 3: Kelaskan segi tiga mengikut sisi dan sudut; siasat paksi simetri (Muka Surat 205-207)."
    - "Langkah 4: Sahkan konjektur untuk hasil tambah sudut segi tiga dan hubungan sudut peluaran (Muka Surat 208-209)."
    - "Langkah 5: Kelaskan sisi empat (segi empat sama, segi empat tepat, rombus, dll.) dan sifat uniknya (Muka Surat 212-213)."
    - "Langkah 6: Siasat sifat sudut sisi empat dan segi empat selari (Muka Surat 214-215)."
    - "Langkah 7: Selesaikan masalah kompleks yang melibatkan gabungan bentuk geometri (Muka Surat 217-218)."
  common_misconceptions:
    - misconception: "Menganggap pepenjuru ialah sebarang garis di dalam poligon."
      remediation: "Jelaskan bahawa pepenjuru mesti menyambungkan dua bucu yang tidak bersebelahan."
    - misconception: "Mengandaikan semua segi tiga mempunyai sekurang-kurangnya satu paksi simetri."
      remediation: "Tunjukkan segi tiga tak sama kaki yang tidak mempunyai sebarang paksi simetri."
    - misconception: "Keliru antara sifat rombus dan segi empat sama."
      remediation: "Tekankan bahawa walaupun kedua-duanya mempunyai empat sisi yang sama panjang, hanya segi empat sama yang mesti mempunyai empat sudut pedalaman 90 darjah."
  engagement_hooks:
    - "Perhatikan 'reka bentuk yang cantik dan mengagumkan' bagi poligon dalam seni bina Masjid Putra (Muka Surat 200)."
    - "Cabaran 'Arkitek Bijak': Kenapa sarang lebah mempunyai bentuk heksagon? (Muka Surat 202)."

