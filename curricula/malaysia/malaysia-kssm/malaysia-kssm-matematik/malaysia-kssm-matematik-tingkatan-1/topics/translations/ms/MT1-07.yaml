performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang ketaksamaan linear dalam satu pemboleh ubah."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang ketaksamaan linear dalam satu pemboleh ubah."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang ketaksamaan linear dalam satu pemboleh ubah untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ketaksamaan linear dalam satu pemboleh ubah dalam konteks penyelesaian masalah rutin yang mudah."
