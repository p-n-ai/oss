    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ketaksamaan linear dalam satu pemboleh ubah dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ketaksamaan linear dalam satu pemboleh ubah dalam konteks penyelesaian masalah bukan rutin."

prerequisites:
  required:
    - "MT1-05"
    - "MT1-06"
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Simbol ($>$, $<$, dsb.) & Garis Nombor (2 hari)"
    - "Langkah 2: Sifat Ketaksamaan (Transitif & Akas) (2 hari)"
    - "Langkah 3: Aritmetik Asas dengan Ketaksamaan (Tambah/Tolak) (2 hari)"
    - "Langkah 4: Pantulan Tanda (Darab/Bahagi dengan Negatif) (3 hari)"
    - "Langkah 5: Menyelesaikan Ketaksamaan Linear dalam Satu Pemboleh Ubah (3 hari)"
    - "Langkah 6: Ketaksamaan Linear Serentak (Persilangan) (4 hari)"
  common_misconceptions:
    - misconception: "Terlupa menterbalikkan tanda ketaksamaan apabila mendarab atau membahagi dengan nombor negatif."
      remediation: "Gunakan analogi 'Pantulan Cermin': Negatif menyongsangkan susunan dunia (cth: $10 > 5$ tetapi $-10 < -5$)."
    - misconception: "Keliru antara '>' dengan '$\\geq$' (termasuk atau tidak termasuk titik hujung)."
      remediation: "Gunakan analogi 'Tiang Pagar': Adakah julat kita termasuk tiang itu ($=$) atau hanya ruang sehingga ke tiang tersebut?"
    - misconception: "Perangkap 'Hanya Satu Jawapan' (Melayan ketaksamaan seperti persamaan)."
      remediation: "Sentiasa tekankan 'Julat/Rantau penyelesaian'. Tunjukkan kawasan berlorek pada garis nombor."
  engagement_hooks:
    - "Had Ketinggian Roller Coaster: 'Anda mestilah sekurang-kurangnya 140cm untuk naik ($h \\geq 140$).'"
    - "Bajet Membeli-belah: 'RM50 untuk beli hadiah. Jika satu hadiah berharga $k$, berapakah had bajet anda?'"
    - "Julat Suhu: 'Hidup dalam Zon Goldilocks (Terlalu panas vs Terlalu sejuk).'"

