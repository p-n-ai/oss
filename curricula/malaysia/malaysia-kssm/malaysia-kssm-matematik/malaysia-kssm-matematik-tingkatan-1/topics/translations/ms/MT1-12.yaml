teaching:
  sequence:
    - "Langkah 1: Mendefinisikan soalan statistik dan mengenal pasti kaedah pengumpulan data (Temu bual, Tinjauan, Pemerhatian, Eksperimen)"
    - "Langkah 2: Mengelas data kepada Kategori dan Numerik (Diskret vs Selanjar) serta menyusun data dalam jadual kekerapan"
    - "Langkah 3: Membina dan menjustifikasikan perwakilan bagi data tak terkumpul: Carta palang, Carta pai, Graf garis, Plot titik, dan Plot batang-dan-daun"
    - "Langkah 4: Berlatih menukar satu perwakilan data kepada bentuk lain yang sesuai dengan justifikasi yang kukuh"
    - "Langkah 5: Mentafsir perwakilan data yang lebih kompleks termasuk Histogram dan Poligon Kekerapan untuk membuat inferens"
    - "Langkah 6: Membincangkan etika dalam perwakilan data, memfokuskan kepada skala yang konsisten dan paparan yang tepat untuk mengelakkan kekeliruan"
  common_misconceptions:
    - misconception: "Keliru antara data numerik diskret dan selanjar."
      remediation: "Jelaskan bahawa data diskret ialah unit keseluruhan (contoh: bilangan orang), manakala data selanjar diukur pada skala (contoh: jisim atau suhu)."
    - misconception: "Menganggap sebarang skala pada paksi mencancang boleh diterima untuk carta palang."
      remediation: "Tekankan bahawa skala mesti bermula dari 0 dan konsisten untuk mewakili data secara beretika dan mengelakkan tafsiran yang mengelirukan."
    - misconception: "Percaya bahawa sektor carta pai tidak perlu berjumlah 100% atau 360 darjah."
      remediation: "Ajar murid untuk menyemak jumlah peratusan atau jumlah sudut sektor bagi memastikan perwakilan adalah tepat secara matematik."
  engagement_hooks:
    - "Siasat bagaimana jurulatih sukan menggunakan plot titik untuk menilai prestasi pemain."
    - "Analisis bagaimana perniagaan menggunakan perwakilan data untuk mengesan keuntungan dan kerugian dari masa ke masa menggunakan graf garis."
    - "Teroka peranan data dalam sains alam sekitar, seperti memantau pengeluaran sisa atau pertumbuhan pokok di hutan hujan."

quality_level: 2
