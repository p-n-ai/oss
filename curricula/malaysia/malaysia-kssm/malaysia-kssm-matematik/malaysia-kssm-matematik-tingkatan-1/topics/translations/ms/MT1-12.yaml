content_standards:
  - id: "12.1"
    text: "Pengumpulan data dan pengurusan data"
    learning_objectives:
      - id: "12.1.1"
        text: "Menjana soalan statistik dan mengumpul data yang relevan."
        bloom: create
      - id: "12.1.2"
        text: "Mengklasifikasikan data kepada data kategori atau data numerik dan membina jadual kekerapan."
        bloom: understand
      - id: "12.1.3"
        text: "Membina perwakilan data bagi data tak terkumpul dan menjustifikasikan kesesuaian suatu perwakilan data."
        bloom: apply
      - id: "12.1.4"
        text: "Menukar satu perwakilan data kepada perwakilan lain yang sesuai serta memberi justifikasi."
        bloom: apply
      - id: "12.1.5"
        text: "Mentafsir pelbagai perwakilan data termasuk membuat inferens atau ramalan."
        bloom: analyze
      - id: "12.1.6"
        text: "Membincangkan kepentingan mewakilkan data secara beretika bagi mengelakkan kekeliruan."
        bloom: evaluate

performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang pengumpulan, pengorganisasian dan perwakilan data."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang pengumpulan, pengorganisasian dan perwakilan data."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang perwakilan data untuk membina perwakilan data."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang perwakilan dan pentafsiran data dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang perwakilan dan pentafsiran data dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang perwakilan dan pentafsiran data dalam konteks penyelesaian masalah bukan rutin."

