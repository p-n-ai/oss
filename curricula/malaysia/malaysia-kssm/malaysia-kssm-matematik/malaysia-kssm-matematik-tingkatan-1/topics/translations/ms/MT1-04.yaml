performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang nisbah, kadar dan kadaran."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang nisbah, kadar dan kadaran."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang nisbah, kadar dan kadaran untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nisbah, kadar dan kadaran dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
