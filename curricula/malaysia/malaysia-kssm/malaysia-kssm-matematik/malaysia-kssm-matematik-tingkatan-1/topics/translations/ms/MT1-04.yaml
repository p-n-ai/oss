performance_standards:
  - level: 1
    descriptor: "Memamerkan pengetahuan asas tentang nisbah, kadar dan kadaran."
  - level: 2
    descriptor: "Memamerkan kefahaman tentang nisbah, kadar dan kadaran."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang nisbah, kadar dan kadaran untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nisbah, kadar dan kadaran dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nisbah, kadar dan kadaran dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang nisbah, kadar dan kadaran dalam konteks penyelesaian masalah bukan rutin secara kreatif."

teaching:
  sequence:
    - "Langkah 1: Mewakilkan nisbah dalam bentuk a : b : c dan mencari nisbah setara (4.1.1, 4.1.2)."
    - "Langkah 2: Memudahkan nisbah dan meneroka hubungan khusus dengan kadar (4.1.3, 4.2.1)."
    - "Langkah 3: Mendefinisikan kadaran dan mencari nilai yang tidak diketahui (4.3.1, 4.3.2)."
    - "Langkah 4: Menghubungkan pelbagai nisbah dan menyelesaikan nilai berkaitan kadar (4.4.1, 4.4.2, 4.4.3)."
    - "Langkah 5: Mengaplikasikan nisbah kepada peratusan dan menyelesaikan masalah pelbagai langkah (4.5.1, 4.5.2, 4.5.3)."
  common_misconceptions:
    - misconception: "Menganggap nisbah dan pecahan adalah identik dalam semua konteks."
      remediation: "Jelaskan bahawa walaupun nisbah boleh ditulis sebagai pecahan, ia membandingkan bahagian kepada bahagian atau bahagian kepada keseluruhan secara berbeza."
    - misconception: "Mengabaikan unit semasa membandingkan kuantiti dalam nisbah."
      remediation: "Tekankan bahawa nisbah membandingkan kuantiti yang sama jenis dalam unit yang sama."
    - misconception: "Salah susunan kuantiti dalam pengiraan kadaran."
      remediation: "Gunakan pemetaan visual untuk memastikan pengangka dan penyebut sepadan dengan betul."
  engagement_hooks:
    - "Menganalisis 'Vitruvian Man' oleh Leonardo da Vinci untuk meneroka perkadaran tubuh manusia."
    - "Mengira kuantiti bahan dalam resipi Bubur Pulut Hitam untuk saiz hidangan yang berbeza."
    - "Menggunakan konteks biologi marin seperti menganggarkan populasi kuda laut menggunakan kaedah tangkap-tanda-lepas-tangkap semula."

