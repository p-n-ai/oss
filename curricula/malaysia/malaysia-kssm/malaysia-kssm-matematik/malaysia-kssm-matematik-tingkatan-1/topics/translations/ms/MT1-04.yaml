mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Nisbah & Visualisasi Campuran 3-bahagian (2 hari)"
    - "Langkah 2: Nisbah Setara & 'Bentuk Termudah' (3 hari)"
    - "Langkah 3: Penukaran daripada Nisbah kepada Kadar (2 hari)"
    - "Langkah 4: Penguasaan Kadaran melalui Pendaraban Silang (3 hari)"
    - "Langkah 5: Menyelesaikan Masalah Gabungan 3-Nisbah (3 hari)"
    - "Langkah 6: Anggaran Dunia Sebenar & Permodelan Populasi (4 hari)"
  common_misconceptions:
    - misconception: "Menambah pemalar kepada kedua-dua bahagian menghasilkan nisbah setara (cth: $1:2 = 2:3$ dengan tambah 1)."
      remediation: "Gunakan analogi 'Kemanisan Sup': tambah garam dan air dalam kadar berbeza mengubah rasa."
    - misconception: "Keliru antara Kadar dengan Nisbah."
      remediation: "Jelaskan bahawa Nisbah membandingkan unit yang sama, manakala Kadar membandingkan unit yang berbeza (cth: sen/kWj)."
    - misconception: "Perangkap 'Terbalik' dalam Kadaran."
      remediation: "Sentiasa selaraskan unit secara mendatar: $\\frac{A_1}{B_1} = \\frac{A_2}{B_2}$."
  engagement_hooks:
    - "Resipi Bubur Pulut Hitam: 'Adakah kemasannya sama jika masak 10 periuk? (Nisbah Setara)'"
    - "Pelan Telco: 'Pelan data mana yang bagi lebih GB per Ringgit? (Kadar)'"
    - "Anggaran Populasi Negara Menggunakan Penandaan dan Nisbah Sampel."

