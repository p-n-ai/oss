ai_teaching_notes: "MT1-03.teaching.md"
mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5
teaching:
  sequence:
    - "Langkah 1: Pengenalan Kuasa Dua dan Kuasa Dua Sempurna menggunakan grid visual (3.1.1, 3.1.2)"
    - "Langkah 2: Operasi songsang: Menghubungkan Kuasa Dua dengan Punca Kuasa Dua (3.1.3)"
    - "Langkah 3: Menghitung Kuasa Dua dan Punca Kuasa Dua (3.1.4, 3.1.5, 3.1.6)"
    - "Langkah 4: Penguasaan generalisasi dan penganggaran punca kuasa dua (3.1.7, 3.1.8)"
    - "Langkah 5: Transisi ke 3D: Menerangkan Kuasa Tiga dan Kuasa Tiga Sempurna (3.2.1, 3.2.2)"
    - "Langkah 6: Hubungan antara Kuasa Tiga dan Punca Kuasa Tiga (3.2.3, 3.2.5)"
    - "Langkah 7: Penggunaan teknologi dan penganggaran punca kuasa tiga (3.2.4, 3.2.6, 3.2.7)"
    - "Langkah 8: Penguasaan operasi bergabung dan masalah kontekstual mencabar (3.2.9, 3.1.9, 3.2.8)"
common_misconceptions:
  - misconception: "Punca kuasa dua adalah sama dengan bahagi dua."
    remediation: "Gunakan model luas visual untuk menunjukkan punca kuasa dua mencari panjang sisi, bukan separuh luas."
  - misconception: "Menganggap hanya nombor bulat boleh menjadi kuasa dua atau kuasa tiga sempurna."
    remediation: "Tunjukkan punca kuasa bagi perpuluhan (cth: 0.6 x 0.6 = 0.36) dan pecahan."
  - misconception: "Keliru tentang tanda bagi punca kuasa dua dan punca kuasa tiga (cth: berfikir punca kuasa tiga nombor negatif adalah positif)."
    remediation: "Tunjukkan bahawa (-2) x (-2) x (-2) = -8, mengukuhkan bahawa punca kuasa tiga mengekalkan tanda asal."
engagement_hooks:
  - "Cabar murid mencari nombor kuasa dua dalam susunan jubin di rumah atau sekolah."
  - "Hubungkan kuasa tiga sempurna dengan isi padu hablur garam atau kiub Rubik."
  - "Bincangkan 'Punca Kuasa Dua Bagi Dua' sebagai nombor tidak rasional pertama yang ditemui oleh pengikut Pythagoras."
