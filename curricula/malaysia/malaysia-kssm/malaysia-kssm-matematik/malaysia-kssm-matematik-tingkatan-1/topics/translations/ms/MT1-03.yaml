performance_standards:
  - level: 1
    descriptor: "Mempamerkan pengetahuan asas tentang kuasa dua, punca kuasa dua, kuasa tiga dan punca kuasa tiga."
  - level: 2
    descriptor: "Mempamerkan kefahaman tentang kuasa dua, punca kuasa dua, kuasa tiga dan punca kuasa tiga."
  - level: 3
    descriptor: "Mengaplikasikan kefahaman tentang kuasa dua, punca kuasa dua, kuasa tiga dan punca kuasa tiga untuk melaksanakan tugasan mudah."
  - level: 4
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang kuasa dua, punca kuasa dua, kuasa tiga dan punca kuasa tiga dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang kuasa dua, punca kuasa dua, kuasa tiga dan punca kuasa tiga dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    descriptor: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang kuasa dua, punca kuasa dua, kuasa tiga dan punca kuasa tiga dalam konteks penyelesaian masalah bukan rutin secara kreatif."

