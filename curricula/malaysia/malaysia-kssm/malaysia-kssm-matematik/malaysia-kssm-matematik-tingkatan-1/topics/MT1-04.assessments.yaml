questions:
  # Learning Objective 4.1.1
  - id: Q1
    text: "Sebuah pasukan terdiri daripada 12 pemain bola sepak, 8 pemain bola tampar dan 4 pemain bola keranjang. Nyatakan nisbah pemain bola sepak kepada pemain bola tampar kepada pemain bola keranjang."
    difficulty: medium
    learning_objective: 4.1.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "3:2:1"
      working: |
        Nisbah pemain bola sepak kepada pemain bola tampar kepada pemain bola keranjang:
        \[
        \frac{12}{4} : \frac{8}{4} : \frac{4}{4} = 3:2:1
        \]
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengira nisbah setiap pasangan kuantiti."
      - marks: 1
        criteria: "Menulis nisbah dalam bentuk termudah."
    hints:
      - level: 1
        text: "Kira nisbah setiap pasangan kuantiti berbanding nilai terkecil."
      - level: 2
        text: "Bahagikan setiap kuantiti dengan nombor terkecil, iaitu 4."

  # Learning Objective 4.1.3
  - id: Q2
    text: "Ungkapkan nisbah 24:36 dalam bentuk termudah."
    difficulty: medium
    learning_objective: 4.1.3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "2:3"
      working: |
        Faktor sepunya terbesar bagi 24 dan 36 ialah 12.
        \[
        \frac{24}{12} : \frac{36}{12} = 2:3
        \]
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan faktor sepunya terbesar bagi kedua-dua nombor."
      - marks: 1
        criteria: "Membahagikan kedua-dua nombor dengan faktor sepunya terbesar."
    hints:
      - level: 1
        text: "Cari faktor sepunya terbesar bagi 24 dan 36."
      - level: 2
        text: "Bahagikan kedua-dua nombor dengan faktor sepunya terbesar."

  # Learning Objective 4.2.1
  - id: Q3
    text: "Jika nisbah antara dua kuantiti ialah 5:9 dan kadar bagi kuantiti pertama ialah 20 unit, tentukan kadar bagi kuantiti kedua."
    difficulty: medium
    learning_objective: 4.2.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "36 unit"
      working: |
        Nisbah 5:9 bermakna setiap 5 unit kuantiti pertama, ada 9 unit kuantiti kedua.
        Jika kuantiti pertama ialah 20 unit, gunakan kadaran:
        \[
        \frac{5}{9} = \frac{20}{x} \implies 5x = 180 \implies x = 36
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Membentuk persamaan berdasarkan nisbah dan kadar yang diberi."
      - marks: 1
        criteria: "Menggunakan kadaran untuk mencari nilai x."
      - marks: 1
        criteria: "Mengira kadar bagi kuantiti kedua."
    hints:
      - level: 1
        text: "Gunakan persamaan nisbah untuk membentuk kadaran."
      - level: 2
        text: "Bahagikan untuk mencari nilai x."

  # Learning Objective 4.3.2
  - id: Q4
    text: "Dalam kadaran 3:4:5, jika nilai kuantiti pertama ialah 18, tentukan nilai kuantiti ketiga."
    difficulty: medium
    learning_objective: 4.3.2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "30"
      working: |
        Nisbah bagi kuantiti pertama kepada ketiga ialah 3:5.
        Jadi, jika kuantiti pertama ialah 18, gunakan kadaran:
        \[
        \frac{3}{5} = \frac{18}{x} \implies 3x = 90 \implies x = 30
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenal pasti nisbah yang berkaitan."
      - marks: 1
        criteria: "Membentuk persamaan kadaran."
      - marks: 1
        criteria: "Mengira nilai kuantiti ketiga."
    hints:
      - level: 1
        text: "Cari nisbah kuantiti pertama kepada ketiga."
      - level: 2
        text: "Gunakan kadaran untuk mencari nilai kuantiti ketiga."

  # Learning Objective 4.5.2
  - id: Q5
    text: "Jika sebuah beg mengandungi 60 gula-gula dan nisbah gula-gula merah kepada gula-gula biru ialah 2:3, tentukan peratusan gula-gula merah."
    difficulty: medium
    learning_objective: 4.5.2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "40%"
      working: |
        Jika nisbah gula-gula merah kepada gula-gula biru ialah 2:3, bilangan gula-gula merah ialah:
        \[
        \frac{2}{5} \times 60 = 24
        \]
        Peratusan gula-gula merah ialah:
        \[
        \frac{24}{60} \times 100\% = 40\%
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira bilangan gula-gula merah."
      - marks: 1
        criteria: "Mengira peratusan gula-gula merah."
      - marks: 1
        criteria: "Menulis jawapan dalam bentuk peratusan."
    hints:
      - level: 1
        text: "Tentukan bilangan gula-gula merah menggunakan nisbah."
      - level: 2
        text: "Hitung peratusan berdasarkan jumlah gula-gula keseluruhan."