questions:
  # --- 4.1 Ratios ---
  - id: Q1
    text: "A team consists of 12 football players, 8 volleyball players, and 4 basketball players. Represent the relationship of football players to volleyball players to basketball players in the form of $a : b : c$ in simplest form."
    difficulty: "easy"
    learning_objective: "4.1.1"
    tp_level: 2
    kbat: false
    answer:
      type: "exact"
      value: "3 : 2 : 1"
      working: |
        Step 1: Write the initial ratio based on the given quantities: 12 : 8 : 4.
        Step 2: Find the Highest Common Factor (HCF/FSTB) of 12, 8, and 4, which is 4.
        Step 3: Divide each part by 4: (12/4) : (8/4) : (4/4) = 3 : 2 : 1.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Correctly identifying the initial ratio of 12 : 8 : 4."
      - marks: 1
        criteria: "Simplifying the ratio to 3 : 2 : 1."
    hints:
      - level: 1
        text: "Start by writing the numbers in the order they are mentioned: Football : Volleyball : Basketball."
      - level: 2
        text: "Is there a number that can divide 12, 8, and 4 exactly? Try dividing them by the largest common factor to simplify."

  - id: Q2
    text: "Match the following pairs of equivalent ratios."
    difficulty: "easy"
    learning_objective: "4.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: "free_text"
      value: "6:9 = 2:3, 6:90 = 1:15, 9:60 = 3:20"
      working: |
        - 6:9 can be divided by 3 -> 2:3.
        - 6:90 can be divided by 6 -> 1:15.
        - 9:60 can be divided by 3 -> 3:20.
    marks: 3
    rubric:
      - marks: 3
        criteria: "Correctly matching all three pairs of equivalent ratios."
    hints:
      - level: 1
        text: "Equivalent ratios are like equivalent fractions. Try simplifying the larger ratios on the left."

  # --- 4.2 Rates ---
  - id: Q3
    text: "Which of the following describes a 'rate'?"
    difficulty: "medium"
    learning_objective: "4.2.1"
    tp_level: 1
    kbat: false
    answer:
      type: "multiple_choice"
      value: "A car travels 285 km in 3 hours."
      working: |
        A rate is a special ratio that compares two quantities with different units (distance and time).
      distractors:
        - value: "A ratio of 500 g to 9 kg."
          feedback: "This is a ratio because both involve mass and can be converted to the same unit (grams)."
        - value: "Comparing 2 weeks to 14 days."
          feedback: "This is a comparison of time in the same kind of unit, making it a ratio, not a rate."
        - value: "A ratio of 3 boys to 4 girls."
          feedback: "This compares quantities of the same kind (people), so it is a standard ratio."
    marks: 1

  # --- 4.3 Proportions ---
  - id: Q4
    text: "Electricity costs 43.6 sen for 2 kilowatt-hours (kWh). How much does 30 kWh cost?"
    difficulty: "medium"
    learning_objective: "4.3.2"
    tp_level: 3
    kbat: false
    answer:
      type: "exact"
      value: "654 sen"
      working: |
        Step 1: Form a proportion: $\frac{43.6 \text{ sen}}{2 \text{ kWh}} = \frac{x \text{ sen}}{30 \text{ kWh}}$.
        Step 2: Cross-multiply: $2x = 43.6 \times 30$.
        Step 3: Solve for x: $x = \frac{1308}{2} = 654$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Forming the correct proportion equation."
      - marks: 1
        criteria: "Correct cross-multiplication step."
      - marks: 1
        criteria: "Final answer with correct units."
    hints:
      - level: 1
        text: "Think about the relationship: if 2 kWh costs a certain amount, 30 kWh must cost more in the same proportion."
      - level: 2
        text: "Try using the unitary method first: find the cost for 1 kWh by dividing 43.6 by 2."

  # --- 4.4 Ratios, Rates and Proportions ---
  - id: Q5
    text: "A farmer uses the capture, mark, release and recapture method to estimate a snail population. He marks 24 snails. Later, he recaptures 30 snails and finds that 5 are marked. Estimate the total snail population."
    difficulty: "hard"
    learning_objective: "4.4.4"
    tp_level: 5
    kbat: true
    answer:
      type: "exact"
      value: "144"
      working: |
        Step 1: Use the proportion $\frac{\text{Number of marked snails}}{\text{Total population}} = \frac{\text{Marked in recapture}}{\text{Total recaptured}}$.
        Step 2: $\frac{24}{x} = \frac{5}{30}$.
        Step 3: Simplify $\frac{5}{30}$ to $\frac{1}{6}$.
        Step 4: $\frac{24}{x} = \frac{1}{6} \implies x = 24 \times 6 = 144$.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Correctly identifying the relationship between the marked samples and the total population."
      - marks: 2
        criteria: "Solving the proportion to find the final estimate."
    hints:
      - level: 1
        text: "The ratio of marked snails to the total population should be the same as the ratio of marked snails in the second sample to the total of the second sample."

  # --- 4.5 Relationship with Percentages ---
  - id: Q6
    text: "Leonardo da Vinci studied human body proportions. One of the ratios used was $\\frac{\\text{height of head}}{\\text{height of the whole body}} = \\frac{2}{5}$. If a person's total height is 175 cm, what is the estimated height of their head?"
    difficulty: "hard"
    learning_objective: "4.5.3"
    tp_level: 6
    kbat: true
    answer:
      type: "exact"
      value: "70 cm"
      working: |
        Step 1: Set up the proportion: $\frac{2}{5} = \frac{x}{175}$.
        Step 2: Solve for x: $x = \frac{2 \times 175}{5}$.
        Step 3: $x = \frac{350}{5} = 70$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Setting up the proportion based on the Vitruvian ratio."
      - marks: 2
        criteria: "Calculating the correct head height."
    hints:
      - level: 1
        text: "Remember that the ratio $\\frac{2}{5}$ compares the head to the total height. If the total height is 175, how many times larger is it than 5?"