    bloom: understand
  - id: "8.1.2"
    content_standard_id: "8.1"
    text_en: "Estimate and measure the size of line segments and angles, and explain how the estimation is obtained."
    bloom: apply
  - id: "8.1.3"
    content_standard_id: "8.1"
    text_en: "Recognise, compare and explain the properties of angles on a straight line, reflex angles, and one whole turn angles."
    bloom: understand
  - id: "8.1.4"
    content_standard_id: "8.1"
    text_en: "Describe the properties of complementary angles, supplementary angles and conjugate angles."
    bloom: understand
  - id: "8.1.5"
    content_standard_id: "8.1"
    text_en: "Solve problems involving complementary angles, supplementary angles and conjugate angles."
    bloom: apply
  - id: "8.1.6"
    content_standard_id: "8.1"
    text_en: "Construct (i) line segments, (ii) perpendicular bisectors of line segments, (iii) perpendicular line to a straight line, (iv) parallel lines and explain the rationale of construction steps."
    bloom: create
  - id: "8.1.7"
    content_standard_id: "8.1"
    text_en: "Construct angles and angle bisectors, and explain the rationale of construction steps."
    bloom: create
  - id: "8.2.1"
    content_standard_id: "8.2"
    text_en: "Identify, explain and draw vertically opposite angles and adjacent angles at intersecting lines, including perpendicular lines."
    bloom: understand
  - id: "8.2.2"
    content_standard_id: "8.2"
    text_en: "Determine the values of angles related to intersecting lines, given the values of other angles."
    bloom: apply
  - id: "8.2.3"
    content_standard_id: "8.2"
    text_en: "Solve problems involving angles related to intersecting lines."
    bloom: apply
  - id: "8.3.1"
    content_standard_id: "8.3"
    text_en: "Recognise, explain and draw parallel lines and transversals."
    bloom: understand
  - id: "8.3.2"
    content_standard_id: "8.3"
    text_en: "Recognise, explain and draw corresponding angles, alternate angles and interior angles."
    bloom: understand
  - id: "8.3.3"
    content_standard_id: "8.3"
    text_en: "Determine whether two straight lines are parallel based on the properties of angles related to transversals."
    bloom: analyze
  - id: "8.3.4"
    content_standard_id: "8.3"
    text_en: "Determine the values of angles related to parallel lines and transversals, given the values of other angles."
    bloom: apply
  - id: "8.3.5"
    content_standard_id: "8.3"
    text_en: "Recognise and represent angles of elevation and angles of depression in real-life situations."
    bloom: understand
  - id: "8.3.6"
    content_standard_id: "8.3"
    text_en: "Solve problems involving angles related to parallel lines and transversals."
