        - 'Step 4: Construct line segments and angles using geometric tools (30 min)'
        - 'Step 5: Solve problems involving complementary and supplementary angles (25 min)'
    common_misconceptions:
        - misconception: All angles are measured from the top of the protractor.
          remediation: Demonstrate using both scales and practice with various angles.
        - misconception: Congruent angles have to be in the same orientation.
          remediation: Use physical manipulatives to show angles in different orientations.
