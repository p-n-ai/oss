performance_standards:
  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of lines and angles."
  - level: 2
    descriptor_en: "Demonstrate the understanding of lines and angles."
  - level: 3
    descriptor_en: "Apply the understanding of lines and angles to perform simple tasks."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of lines and angles in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of lines and angles in the context of complex routine problem solving."
  - level: 6
    descriptor_en: "Apply appropriate knowledge and skills of lines and angles in the context of non-routine problem solving."

prerequisites:
  required:
    - "primary-school-geometry"

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to lines, angles, and congruence determination (SK 8.1.1 - 8.1.2)"
    - "Step 2: Exploring properties of straight lines, reflex angles, and special angle pairs (SK 8.1.3 - 8.1.5)"
    - "Step 3: Geometric constructions of lines and angles with rationale (SK 8.1.6 - 8.1.7)"
    - "Step 4: Analyzing angles at intersecting lines (SK 8.2)"
    - "Step 5: Master parallel lines, transversals, and corresponding/alternate/interior angles (SK 8.3.1 - 8.3.4)"
    - "Step 6: Real-world application: Angles of elevation and depression (SK 8.3.5 - 8.3.6)"
  common_misconceptions:
    - misconception: "All angles must be measured starting from the outer scale of a protractor."
      remediation: "Demonstrate how to choose the zero-mark scale that aligns with the base arm of the angle."
    - misconception: "Congruent angles must have the same orientation and arm length."
      remediation: "Explain that congruence only refers to the size of the angle, regardless of arm length or rotation."
    - misconception: "Parallel lines are only vertical or horizontal."
      remediation: "Show various examples of slanted parallel lines in everyday objects like stair railings."
  engagement_hooks:
    - "Discuss the structural engineering and visual beauty of the Penang Bridge and Petronas Towers."
    - "Explore the geometric precision required in traditional Malay batik pattern designs."
    - "Examine how surveyors use angles of elevation to measure heights of landmarks without climbing them."

bloom_levels:
  - understand
  - apply
  - analyze
  - create

quality_level: 2
provenance: curriculum-expert-verified

assessments_file: "MT1-08.assessments.yaml"
ai_teaching_notes: "MT1-08.teaching.md"
examples_file: "MT1-08.examples.yaml"
