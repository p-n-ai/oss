questions:
  # Learning Objective 13.1.1
  - id: Q1
    text: "Dalam sebuah segi tiga bersudut tegak, sisi yang bertentangan dengan sudut tepat dipanggil sebagai apa?"
    difficulty: medium
    learning_objective: 13.1.1
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "Hipotenus"
      options:
        - "Hipotenus"
        - "Sisi bersebelahan"
        - "Sisi bertentangan"
    marks: 1
    rubric:
      - marks: 1
        criteria: "Jawapan yang betul dipilih."
    hints:
      - level: 1
        text: "Ingat bahawa hipotenus ialah sisi terpanjang dalam segi tiga bersudut tegak."

  # Learning Objective 13.1.2
  - id: Q2
    text: "Nyatakan Teorem Pythagoras bagi segi tiga bersudut tegak dengan panjang sisi $a$, $b$, dan hipotenus $c$."
    difficulty: medium
    learning_objective: 13.1.2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "a^2 + b^2 = c^2"
      working: |
        Berdasarkan Teorem Pythagoras, hubungan antara panjang sisi dalam segi tiga bersudut tegak adalah $a^2 + b^2 = c^2$, di mana $c$ adalah hipotenus.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menyatakan hubungan asas antara sisi tanpa menyebut hipotenus."
      - marks: 2
        criteria: "Menyatakan hubungan dengan betul dan menyebut hipotenus."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan anda mengenal pasti sisi mana yang merupakan hipotenus."

  # Learning Objective 13.1.3
  - id: Q3
    text: 'Diberi sebuah segi tiga bersudut tegak dengan sisi tegak $3 \text{ cm}$ dan $4 \text{ cm}$. Hitungkan panjang hipotenus.'
    difficulty: medium
    learning_objective: 13.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '5 \text{ cm}'
      working: |
        Menggunakan Teorem Pythagoras, $c^2 = a^2 + b^2$. Di mana $a = 3 \text{ cm}$ dan $b = 4 \text{ cm}$.
        \[
        c^2 = 3^2 + 4^2 = 9 + 16 = 25
        \]
        \[
        c = \sqrt{25} = 5 \text{ cm}
        \]
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menunjukkan penggunaan Teorem Pythagoras tetapi dengan kiraan salah."
      - marks: 2
        criteria: "Mengira hipotenus dengan betul."
    hints:
      - level: 1
        text: "Gunakan $c^2 = a^2 + b^2$ untuk mencari panjang hipotenus."

  # Learning Objective 13.1.4
  - id: Q4
    text: 'Sebuah tangga bersandar pada dinding dengan kaki tangga $6 \text{ m}$ dari dinding. Jarak dari tanah ke titik tangga bersandar ialah $8 \text{ m}$. Berapakah panjang tangga tersebut?'
    difficulty: medium
    learning_objective: 13.1.4
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: '10 \text{ m}'
      working: |
        Menggunakan Teorem Pythagoras, $c^2 = a^2 + b^2$. Di mana $a = 6 \text{ m}$ dan $b = 8 \text{ m}$.
        \[
        c^2 = 6^2 + 8^2 = 36 + 64 = 100
        \]
        \[
        c = \sqrt{100} = 10 \text{ m}
        \]
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menggunakan Teorem Pythagoras tetapi dengan salah satu nilai sisi."
      - marks: 2
        criteria: "Menggunakan nilai yang betul tetapi salah dalam pengiraan akhir."
      - marks: 3
        criteria: "Mengira panjang tangga dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan tangga, dinding, dan tanah membentuk segi tiga bersudut tegak."

  # Learning Objective 13.2.1
  - id: Q5
    text: 'Adakah segi tiga dengan sisi $5 \text{ cm}$, $12 \text{ cm}$, dan $13 \text{ cm}$ adalah segi tiga bersudut tegak? Jelaskan jawapan anda.'
    difficulty: medium
    learning_objective: 13.2.1
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Ya, segi tiga tersebut adalah segi tiga bersudut tegak kerana $5^2 + 12^2 = 13^2$."
      working: |
        Untuk menentukan sama ada segi tiga tersebut bersudut tegak, kita gunakan Teorem Pythagoras.
        \[
        5^2 + 12^2 = 25 + 144 = 169
        \]
        \[
        13^2 = 169
        \]
        Oleh itu, $5^2 + 12^2 = 13^2$, segi tiga ini adalah segi tiga bersudut tegak.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menunjukkan penggunaan Teorem Pythagoras tetapi dengan pengiraan salah."
      - marks: 2
        criteria: "Mengira dengan betul tetapi tidak menyatakan kesimpulan."
      - marks: 3
        criteria: "Mengira dengan betul dan menyatakan kesimpulan yang tepat."
    hints:
      - level: 1
        text: "Bandingkan $a^2 + b^2$ dengan $c^2$ untuk menentukan jenis segi tiga."