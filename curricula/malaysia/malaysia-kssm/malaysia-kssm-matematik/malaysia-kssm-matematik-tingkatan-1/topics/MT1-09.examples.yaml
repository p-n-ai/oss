topic_id: MT1-09
provenance: curriculum-expert-verified
description: "Scaffolded worked examples for Basic Polygons, focusing on geometric properties and angle conjectures."
worked_examples:
  - id: WE-01
    topic: "Relationship between sides, vertices, and diagonals"
    difficulty: easy
    learning_objective: "9.1.1"
    real_world_analogy: "Think of an 'Arkitek Bijak' (Smart Architect) designing a building. The corners are the vertices, the walls are the sides, and the internal support beams connecting non-neighboring corners are the diagonals."
    misconception_alert: "Students often mistake 'adjacent vertices' (neighbors) for diagonals. Remember: A diagonal MUST skip at least one neighbor!"
    scenario: "An architect is designing a room in the shape of a regular heptagon. Calculate the total number of diagonals needed for the floor support structure."
    working: |
      1. Identify the number of sides for a heptagon: $n = 7$.
      2. Recall the number of vertices is equal to the number of sides: $Vertices = 7$.
      3. Use the diagonal formula: $\frac{n(n - 3)}{2}$.
      4. Substitute $n = 7$: $\frac{7(7 - 3)}{2}$
      5. Subtract inside the bracket: $\frac{7(4)}{2}$
      6. Multiply: $\frac{28}{2}$
      7. Divide to find the final answer: $14$ diagonals.

  - id: WE-02
    topic: "Exterior angles of triangles"
    difficulty: medium
    learning_objective: "9.2.2"
    real_world_analogy: "The 'Jalan Terus' (Keep Walking) Rule. Imagine you are walking along one side of a triangle and you keep going straight past the corner. The turn you have to make to get back onto the next side is the exterior angle."
    misconception_alert: "The 'Opposite Trap': Students often add the wrong angles. The exterior angle is ONLY equal to the sum of the TWO interior angles that are NOT touching it."
    scenario: "In $\\triangle PQR$, the side $QR$ is extended to point $S$. If $\\angle P = 62^\\circ$ and $\\angle Q = 48^\\circ$, find the value of the exterior angle $\\angle PRS$."
    working: |
      1. Identify the relationship: Exterior angle = Sum of two opposite interior angles.
      2. The two opposite interior angles are $\angle P$ and $\angle Q$.
      3. Set up the equation: $\angle PRS = 62^\circ + 48^\circ$.
      4. Add the values: $62 + 48 = 110$.
      5. Final Answer: $\angle PRS = 110^\circ$.

  - id: WE-03
    topic: "Combinations of triangles and quadrilaterals"
    difficulty: hard
    learning_objective: "9.3.4"
    real_world_analogy: "Like the 'magnificent designs' of the Putra Mosque dome, complex shapes are just puzzles made of simpler triangles and squares joined together."
    misconception_alert: "The 'Hidden $90^\\circ$' mistake. When a square is part of a combined shape, students often forget to 'see' the $90^\\circ$ interior angles unless they are explicitly written."
    scenario: "A graphic designer combines a square $ABCD$ and an equilateral triangle $ADE$ such that they share the side $AD$. If the triangle is attached to the outside of the square, calculate the size of $\\angle EAB$."
    working: |
      1. Analyze the properties of Square $ABCD$: Every interior angle is $90^\circ$. Therefore, $\angle DAB = 90^\circ$.
      2. Analyze the properties of Equilateral Triangle $ADE$: Every interior angle is $60^\circ$. Therefore, $\angle EAD = 60^\circ$.
      3. Identify the total angle $\angle EAB$: Since the triangle is outside, the angles are adjacent at vertex $A$.
      4. Set up the sum: $\angle EAB = \angle EAD + \angle DAB$.
      5. Substitute the known values: $\angle EAB = 60^\circ + 90^\circ$.
      6. Final Calculation: $150^\circ$.
      7. Final Answer: $\angle EAB = 150^\circ$.