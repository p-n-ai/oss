mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to Symbols ($>$, $<$, etc.) & The Number Line (2 days)"
    - "Step 2: Properties of Inequality (Transitive & Converse) (2 days)"
    - "Step 3: Basic Arithmetic with Inequalities (Addition/Subtraction) (2 days)"
    - "Step 4: The Sign Flip (Multiplying/Dividing by Negatives) (3 days)"
    - "Step 5: Solving Linear Inequalities in One Variable (3 days)"
    - "Step 6: Simultaneous Linear Inequalities (The Intersection) (4 days)"
  common_misconceptions:
    - misconception: "Forgetting to flip the inequality sign when multiplying or dividing by a negative number."
      remediation: "Use the 'Mirror Reflection' analogy: Negatives reverse the world order (e.g., $10 > 5$ but $-10 < -5$)."
    - misconception: "Confusing '>' with '$\geq$' (including or excluding the endpoint)."
      remediation: "Use the 'Fence Post' analogy: Does our range include the actual fence ($=$) or just the space up to it?"
    - misconception: "The 'Only One Answer' trap (Treating inequalities like equations)."
      remediation: "Always emphasize 'Range/Region of solutions'. Show them shaded areas on number lines."
  engagement_hooks:
    - "Roller Coaster Height Limit: 'You must be at least 140cm to ride ($h \geq 140$).'"
    - "Shopping Budget: 'RM50 to buy gifts. If a gift costs $k$, what is your budget limit?'"
    - "Temperature Range: 'Living in the Goldilocks Zone (Too hot vs Too cold).'"

