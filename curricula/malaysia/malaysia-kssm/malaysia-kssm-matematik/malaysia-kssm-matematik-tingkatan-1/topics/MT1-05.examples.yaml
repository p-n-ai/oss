worked_examples:
  - id: WE-01
    topic: "Variables and Algebraic Expressions"
    learning_objective: "5.1.2"
    difficulty: easy
    real_world_analogy: "Imagine a blue paper bag at a 'Hari Sukan' event. You can't see inside, so the unknown number of marbles is your variable, $x$. Adding marbles is $+$, taking them out is $-$, and sharing them with friends is division."
    misconception_alert: "Students often confuse a variable (an unknown quantity like $x$) with a constant (a fixed number like 3). Remind them that $x$ represents a quantity that we don't know yet, whereas 3 is always exactly 3."
    scenario: "A bag contains an unknown number of wooden blocks, $x$. 3 blocks are added into the bag. Then, all the blocks in the bag are divided equally between 2 students. Write an algebraic expression for the number of blocks each student receives."
    working: |
      1. Identify the initial unknown amount:
         The bag starts with $x$ blocks.
      2. Translate the first action ('3 blocks are added'):
         Adding means we use the addition operator ($+$).
         The expression becomes: $x + 3$
      3. Translate the second action ('divided equally between 2 students'):
         The entire group of blocks $(x + 3)$ is shared.
         In algebra, division for the whole expression is represented as a fraction bar.
      4. Final Answer:
         $\frac{x + 3}{2}$

  - id: WE-02
    topic: "Addition and Subtraction of Algebraic Expressions"
    learning_objective: "5.2.1"
    difficulty: medium
    real_world_analogy: "Think of sorting items at a Mamak stall. You can group Roti Canai ($p$) with other Roti Canai, and Teh Tarik ($q$) with Teh Tarik, but you cannot combine them into a single 'Roti-Teh' item. They must stay separate!"
    misconception_alert: "The 'Negative Switch' Trap: When a minus sign is in front of a bracket, every single term inside must flip its sign. $-(p + 3q - 2)$ becomes $-p - 3q + 2$. Don't just change the first term!"
    scenario: "Simplify the following algebraic expression by adding and subtracting the like terms: $(6p + 2q + 10) - (p + 3q - 2)$."
    working: |
      1. Remove the first bracket (no sign in front means it stays the same):
         $6p + 2q + 10$
      2. Remove the second bracket by distributing the negative sign:
         $-(p)$ becomes $-p$
         $-(+3q)$ becomes $-3q$
         $-(-2)$ becomes $+2$
         Combined: $6p + 2q + 10 - p - 3q + 2$
      3. Group the 'Like Terms' (terms with the same variable):
         Variables ($p$): $6p - p$
         Variables ($q$): $2q - 3q$
         Constants: $10 + 2$
      4. Simplify the coefficients:
         For $p$: $(6 - 1)p = 5p$
         For $q$: $(2 - 3)q = -1q$ or simply $-q$
         For constants: $10 + 2 = 12$
      5. Final Answer:
         $5p - q + 12$

  - id: WE-03
    topic: "Multiplication and Division of Algebraic Expressions"
    learning_objective: "5.2.3"
    difficulty: hard
    real_world_analogy: "Unpacking and Packing: Think of algebraic terms as packed boxes. To divide, you first 'unpack' them into their basic factors (like $y^2 = y \\times y$), cross out the items that appear on both the top and bottom, and then 'repack' what is left."
    misconception_alert: "Students often cancel powers incorrectly. For example, dividing $y^2$ by $y$ and thinking the $y$ disappears entirely. Always expand the powers into repeated multiplication first to see exactly what remains."
    scenario: "Calculate the quotient of $21xy \\times 6x \\div 14y^2z$ and state the answer in its simplest fraction form."
    working: |
      1. Write the operation as a single fraction:
         $\frac{21xy \times 6x}{14y^2z}$
      2. Expand all terms into their basic factors (Repeated Multiplication):
         $\frac{21 \times x \times y \times 6 \times x}{14 \times y \times y \times z}$
      3. Simplify the numerical coefficients:
         Divide 21 and 14 by their common factor, 7: $21 \div 7 = 3$ and $14 \div 7 = 2$.
         Divide 6 on top by the 2 remaining on the bottom: $6 \div 2 = 3$ and $2 \div 2 = 1$.
         Multiply the remaining numbers on top: $3 \times 3 = 9$.
      4. Eliminate common variable factors (Cross-cancellation):
         One $y$ on top cancels one $y$ on the bottom.
         Remaining on top: $x \times x = x^2$.
         Remaining on bottom: $y \times z = yz$.
      5. Recombine the remaining factors into the final answer:
         $\frac{9x^2}{yz}$
