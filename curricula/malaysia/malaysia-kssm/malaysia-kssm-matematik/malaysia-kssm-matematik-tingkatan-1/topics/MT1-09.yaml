learning_objectives:
  - id: "9.1.1"
    content_standard_id: "9.1"
    text_en: "State the relationship between the number of sides, vertices and diagonals of polygons."
    bloom: remember
  - id: "9.1.2"
    content_standard_id: "9.1"
    text_en: "Draw polygons, label vertices of polygons and name the polygons based on the labelled vertices."
    bloom: apply
  - id: "9.2.1"
    content_standard_id: "9.2"
    text_en: "Recognise and list geometric properties of various types of triangles. Hence classify triangles based on geometric properties."
    bloom: analyze
  - id: "9.2.2"
    content_standard_id: "9.2"
    text_en: "Make and verify conjectures about (i) the sum of interior angles, (ii) the sum of interior angle and adjacent exterior angle, (iii) the relation between exterior angle and the sum of the opposite interior angles of a triangle."
    bloom: evaluate
  - id: "9.2.3"
    content_standard_id: "9.2"
    text_en: "Solve problems involving triangles."
    bloom: apply
  - id: "9.3.1"
    content_standard_id: "9.3"
    text_en: "Describe the geometric properties of various types of quadrilaterals. Hence classify quadrilaterals based on the geometric properties."
    bloom: analyze
  - id: "9.3.2"
    content_standard_id: "9.3"
    text_en: "Make and verify the conjectures about (i) the sum of interior angles of a quadrilateral, (ii) the sum of interior angle and adjacent exterior angle of a quadrilateral, and (iii) the relationship between the opposite angles in a parallelogram."
    bloom: evaluate
  - id: "9.3.3"
    content_standard_id: "9.3"
    text_en: "Solve problems involving quadrilaterals."
    bloom: apply
  - id: "9.3.4"
    content_standard_id: "9.3"
    text_en: "Solve problems involving the combinations of triangles and quadrilaterals."
    bloom: apply

performance_standards:
  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of polygons."
  - level: 2
    descriptor_en: "Demonstrate the understanding of triangles and quadrilaterals."
  - level: 3
    descriptor_en: "Apply the understanding of lines and angles to perform simple tasks related to the interior and exterior angles of triangles and quadrilaterals."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of triangles and quadrilaterals in the context of simple routine problem solving."
  - level: 5
    descriptor_en: "Apply appropriate knowledge and skills of triangles and quadrilaterals in the context of complex routine problem solving."
  - level: 6
    descriptor_en: "Apply appropriate knowledge and skills of triangles and quadrilaterals in the context of non-routine problem solving."

prerequisites:
  required:
    - "MT1-08"

bloom_levels:
  - remember
  - apply
  - analyze
  - evaluate

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Define polygons and explore the relationship between sides, vertices, and diagonals using GeoGebra (Pages 202-203)."
    - "Step 2: Practice drawing and labeling polygons from triangles to decagons (Page 204)."
    - "Step 3: Classify triangles by sides and angles; investigate axes of symmetry (Pages 205-207)."
    - "Step 4: Verify conjectures for triangle angle sums and exterior angle relationships (Pages 208-209)."
    - "Step 5: Classify quadrilaterals (square, rectangle, rhombus, etc.) and their unique properties (Pages 212-213)."
    - "Step 6: Investigate angle properties of quadrilaterals and parallelograms (Pages 214-215)."
    - "Step 7: Solve complex problems involving combined geometric shapes (Pages 217-218)."
  common_misconceptions:
    - misconception: "Thinking a diagonal is any line inside a polygon."
      remediation: "Clarify that a diagonal must connect two non-adjacent vertices."
    - misconception: "Assuming all triangles have at least one axis of symmetry."
      remediation: "Show scalene triangles which have no axes of symmetry."
    - misconception: "Confusing the properties of a rhombus and a square."
      remediation: "Highlight that while both have four equal sides, only the square must have four 90-degree interior angles."
  engagement_hooks:
    - "Observe the 'magnificent designs' of polygons in the architecture of Putra Mosque (Page 200)."
    - "The 'Smart Architect' challenge: Why does a honeycomb use a hexagonal shape? (Page 202)."

quality_level: 2
provenance: curriculum-expert-verified

ai_teaching_notes: "MT1-09.teaching.md"
assessments_file: "MT1-09.assessments.yaml"
examples_file: "MT1-09.examples.yaml"