ai_teaching_notes: MT1-01.teaching.md
teaching:
    sequence:
        - 'Step 1: Introduce the concept of rational numbers with simple examples (15 min)'
        - 'Step 2: Demonstrate placing rational numbers on a number line (10 min)'
        - 'Step 3: Practice basic operations with rational numbers using manipulatives (20 min)'
        - 'Step 4: Solve real-life problems involving rational numbers (15 min)'
        - 'Step 5: Review and assess understanding through a quiz (10 min)'
    common_misconceptions:
        - misconception: All fractions are rational numbers
          remediation: Emphasize the condition that the denominator cannot be zero
        - misconception: Rational numbers are always positive
          remediation: Provide examples of negative rational numbers, like -3/4
engagement_hooks:
    - Discuss how rational numbers are used in currency exchange rates
    - Explore the use of fractions in cooking recipes and dividing food portions
    - Connect to sports statistics, like batting averages in baseball
mastery:
    minimum_score: 0.75
    assessment_count: 3
    spaced_repetition:
        initial_interval_days: 3
        multiplier: 2.5
