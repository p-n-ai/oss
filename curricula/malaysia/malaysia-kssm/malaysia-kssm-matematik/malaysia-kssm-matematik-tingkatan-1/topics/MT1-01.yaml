  - level: 1
    descriptor_en: "Demonstrate the basic knowledge of integers, fractions and decimals."
  - level: 2
    descriptor_en: "Demonstrate the understanding of rational numbers."
  - level: 3
    descriptor_en: "Apply the understanding of rational numbers to perform basic operations and combined basic arithmetic operations."
  - level: 4
    descriptor_en: "Apply appropriate knowledge and skills of rational numbers in the context of simple routine problem solving."
  - level: 5
