ai_teaching_notes: MT1-01.teaching.md
teaching:
    sequence:
        - 'Step 1: Introduce positive and negative numbers with real-life examples (10 min)'
        - 'Step 2: Explain and describe integers using a number line (15 min)'
        - 'Step 3: Demonstrate arithmetic operations with integers using number line (20 min)'
        - 'Step 4: Discuss and apply arithmetic laws with examples (15 min)'
        - 'Step 5: Solve problems involving fractions and decimals on a number line (20 min)'
    common_misconceptions:
        - misconception: Students may think negative numbers are always smaller than zero
          remediation: Use a number line to show negative numbers' relative positions
        - misconception: Confusion between fraction and decimal representation
          remediation: Provide examples showing equivalence and conversion methods
        - misconception: Belief that multiplication always results in a larger number
          remediation: Show examples of multiplication with fractions and negative numbers
engagement_hooks:
    - Discuss temperatures in different regions to illustrate positive and negative numbers
    - Use bank account balances to explain positive and negative values
    - Discuss sports scores to demonstrate integer operations
mastery:
    minimum_score: 0.75
    assessment_count: 3
    spaced_repetition:
        initial_interval_days: 3
        multiplier: 2.5
