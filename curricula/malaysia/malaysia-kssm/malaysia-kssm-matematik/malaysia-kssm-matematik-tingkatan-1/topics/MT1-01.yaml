prerequisites:
  required: []
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to Integers & The Elevator Visual (3 days)"
    - "Step 2: Operations with Integers & The 'Pasar Malam' debt logic (4 days)"
    - "Step 3: Positive/Negative Fractions on a Number Line (3 days)"
    - "Step 4: Positive/Negative Decimals (3 days)"
    - "Step 5: Master Review of Rational Numbers & Order of Operations (4 days)"
  common_misconceptions:
    - misconception: "Zero is not an integer."
      remediation: "Clarify that 0 is a hole in the ground (neutral) but is still a valid integer."
    - misconception: "Dividing by zero is 0."
      remediation: "Show the calculator error; division by zero is undefined (Rational number definition check)."
    - misconception: "-10 is larger than -2."
      remediation: "Use the temperature analogy or debt analogy ($10 debt vs $2 debt)."
  engagement_hooks:
    - "The Elevator Escape: 'You start at Level 3, go down 5 floors, where are you?'"
    - "The Deep Sea Diver: 'A diver is at -15m... if he goes up 5m, is he deeper or shallower?'"
    - "Household Number Line Project: 'Mapping items at home using negative/positive positions.'"

quality_level: 2
