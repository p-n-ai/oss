prerequisites:
  required:
    - id: MT1-05
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Step 1: Introduction to Linear Equations & The Balance Scale (3 days)"
    - "Step 2: Solving Equations with One variable (Move & Inverse) (4 days)"
    - "Step 3: Linear Equations in Two Variables & Solution Sets (3 days)"
    - "Step 4: Drawing Straight Line Graphs (3 days)"
    - "Step 5: Solving Simultaneous Equations (Substitution/Elimination) (5 days)"
    - "Step 6: Real-world Simultaneous Problems (4 days)"
  common_misconceptions:
    - misconception: "The Sign Switch Error ($x + 5 = 10 \Rightarrow x = 10 + 5$)."
      remediation: "Use the 'Portal' analogy: When a number goes through the '=' portal, its sign MUST flip to inverse."
    - misconception: "Variable Placement Error ($2x = 8 \Rightarrow x = 8 - 2$)."
      remediation: "Clarify that the relationship is multiplication ($2 \times x$), so the inverse must be division ($8 / 2$)."
    - misconception: "Simultaneous equations MUST only have one solution."
      remediation: "Use the 'Geometric Line' visual: Parallel lines never meet (No solution), Same lines (Infinite solutions)."
  engagement_hooks:
    - "The Salary Mystery: 'If your base pay is $x$ and you get RM10 bonus for every hour $h$, how do we model RM500?'"
    - "The Age Riddle: 'I am 5 years older than you, but in 2 years our total age is 30. How old am I?'"
    - "Balance Scale: 'If you take 2kg off the left, you MUST take 2kg off the right or the scale tips!'"

quality_level: 2
