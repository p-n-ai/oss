questions:
  # Learning Objective 2.1.1
  - id: Q1
    text: "Senaraikan semua faktor bagi nombor 36."
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "[1, 2, 3, 4, 6, 9, 12, 18, 36]"
      working: |
        Faktor bagi 36 adalah nombor yang membahagikan 36 tanpa baki:
        - 1, kerana $36 \div 1 = 36$
        - 2, kerana $36 \div 2 = 18$
        - 3, kerana $36 \div 3 = 12$
        - 4, kerana $36 \div 4 = 9$
        - 6, kerana $36 \div 6 = 6$
        - 9, kerana $36 \div 9 = 4$
        - 12, kerana $36 \div 12 = 3$
        - 18, kerana $36 \div 18 = 2$
        - 36, kerana $36 \div 36 = 1$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Senaraikan sekurang-kurangnya 5 faktor yang betul."
      - marks: 2
        criteria: "Senaraikan semua 9 faktor yang betul."
    hints:
      - level: 1
        text: "Ingat bahawa faktor adalah nombor yang membahagi nombor asal tanpa baki."

  # Learning Objective 2.1.2
  - id: Q2
    text: "Tentukan faktor perdana bagi nombor 60 dan ungkapkan dalam bentuk pemfaktoran perdana."
    difficulty: medium
    learning_objective: LO2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "2^2 \times 3 \times 5"
      working: |
        60 boleh dibahagikan oleh faktor perdana:
        - $60 \div 2 = 30$
        - $30 \div 2 = 15$
        - $15 \div 3 = 5$
        - $5 \div 5 = 1$
        Maka, pemfaktoran perdana bagi 60 adalah $2^2 \times 3 \times 5$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Tentukan satu faktor perdana yang betul."
      - marks: 2
        criteria: "Ungkapkan faktor perdana dengan satu kesilapan kecil dalam pemfaktoran."
      - marks: 3
        criteria: "Ungkapkan faktor perdana dengan betul sepenuhnya."
    hints:
      - level: 1
        text: "Mula dengan membahagikan nombor oleh faktor perdana terkecil."

  # Learning Objective 2.1.3
  - id: Q3
    text: "Nyatakan faktor sepunya terbesar (FSTB) bagi 48 dan 64."
    difficulty: medium
    learning_objective: LO3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "16"
      working: |
        Faktor bagi 48: [1, 2, 3, 4, 6, 8, 12, 16, 24, 48]
        Faktor bagi 64: [1, 2, 4, 8, 16, 32, 64]
        Faktor sepunya: [1, 2, 4, 8, 16]
        FSTB adalah 16.
