  # Learning Objective 2.2.2
  - id: Q4
    text: "Cari gandaan sepunya terkecil (GSTK) bagi 15 dan 20."
    difficulty: medium
    learning_objective: LO4
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "60"
      working: |
        Gandaan bagi 15: [15, 30, 45, 60, 75, ...]
        Gandaan bagi 20: [20, 40, 60, 80, ...]
        Gandaan sepunya: [60, ...]
        Oleh itu, GSTK adalah 60.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Betul menyenaraikan gandaan tetapi salah menentukan GSTK."
      - marks: 2
        criteria: "Menentukan GSTK dengan betul."
    hints:
      - level: 1
        text: "Mula dengan menyenaraikan gandaan kedua-dua nombor hingga anda menemukan yang sama."

  # Learning Objective 2.2.3
  - id: Q5
    text: "Seorang pengeluar membuat bungkusan yang mengandungi 12 biskut atau 18 gula-gula. Berapa bilangan minimum bungkusan setiap jenis yang perlu digabungkan supaya terdapat sama banyak biskut dan gula-gula?"
    difficulty: medium
    learning_objective: LO5
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "6 bungkusan biskut dan 4 bungkusan gula-gula"
      working: |
        GSTK bagi 12 dan 18 adalah 36.
        36 biskut memerlukan 36/12 = 3 bungkusan biskut.
        36 gula-gula memerlukan 36/18 = 2 bungkusan gula-gula.
        Untuk mencapai GSTK dengan bilangan yang sama:
        - 12 biskut per bungkusan dan 18 gula-gula per bungkusan.
        - $12 \times 6 = 72$ biskut dan $18 \times 4 = 72$ gula-gula.
        Jadi, 6 bungkusan biskut dan 4 bungkusan gula-gula diperlukan.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menggunakan konsep GSTK tetapi salah dalam pengiraan."
      - marks: 2
        criteria: "Betul menentukan GSTK tetapi salah dalam menyusun bungkusan."
      - marks: 3
        criteria: "Menggunakan GSTK dan menentukan bungkusan dengan betul."
    hints:
      - level: 1
        text: "Cari GSTK bagi bilangan biskut dan gula-gula dahulu sebelum menentukan jumlah bungkusan."