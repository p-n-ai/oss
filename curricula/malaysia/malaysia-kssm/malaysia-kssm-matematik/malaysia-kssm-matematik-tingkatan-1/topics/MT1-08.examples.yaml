topic_id: MT1-08
provenance: curriculum-expert-verified
description: "Scaffolded worked examples for Lines and Angles (Garis dan Sudut)"
worked_examples:
  - id: WE-01
    topic: "Congruence of Line Segments"
    difficulty: easy
    learning_objective: "8.1.1"
    real_world_analogy: "Think of two identical pencils from the same brand. If you put them side-by-side, they match perfectly because their lengths are exactly the same."
    misconception_alert: "Students often think lines are congruent just because they look parallel or similar. Congruence ($Kekongruenan$) ONLY depends on the exact measurement of length."
    scenario: "Adik has two wooden sticks. Stick $A$ measures $15$ cm and Stick $B$ also measures $15$ cm. Are these two sticks congruent? Explain the rationale."
    working: |
      1. Identify the length of the first segment: $Length$ $A = 15$ cm.
      2. Identify the length of the second segment: $Length$ $B = 15$ cm.
      3. Compare the two lengths: $15$ cm $= 15$ cm.
      4. Conclusion: Since the lengths are identical, the line segments are congruent ($kongruen$).

  - id: WE-02
    topic: "Complementary and Supplementary Angles"
    difficulty: medium
    learning_objective: "8.1.5"
    real_world_analogy: "A right angle is like a square corner of a book. Complementary angles are two friends who share that corner to make exactly $90^\circ$."
    misconception_alert: "Students often flip the two: remember that 'C' in Complementary comes before 'S' in Supplementary, just like $90^\circ$ comes before $180^\circ$."
    scenario: "In a construction plan, two angles are complementary ($sudut$ $pelengkap$). If one angle is $35^\circ$, find the value of the other angle, $x$."
    working: |
      1. Identify the property: Complementary angles sum up to $90^\circ$.
      2. Set up the equation: $x + 35^\circ = 90^\circ$.
      3. Subtract $35^\circ$ from both sides: $x = 90^\circ - 35^\circ$.
      4. Calculate the final value: $x = 55^\circ$.

  - id: WE-03
    topic: "Angles Related to Intersecting Lines"
    difficulty: medium
    learning_objective: "8.2.2"
    real_world_analogy: "Think of an 'X' shape made by two crossing paths. If you stand in one angle, the person directly opposite you in the 'X' is in an identical angle."
    misconception_alert: "Students often think all four angles in an intersection are equal. This is only true if the lines are perpendicular ($90^\circ$)."
    scenario: "Two straight lines intersect. If one of the angles is $110^\circ$, find the value of its adjacent angle ($sudut$ $bersebelahan$), $y$."
    working: |
      1. Identify the property: Adjacent angles on a straight line sum up to $180^\circ$.
      2. Set up the equation: $y + 110^\circ = 180^\circ$.
      3. Subtract $110^\circ$ from both sides: $y = 180^\circ - 110^\circ$.
      4. Calculate the final value: $y = 70^\circ$.

  - id: WE-04
    topic: "Parallel Lines and Transversals"
    difficulty: hard
    learning_objective: "8.3.4"
    real_world_analogy: "Imagine the parallel railings of the Penang Bridge. If a support beam crosses them, it creates a 'Z' shape (Alternate Angles) where the inner corners are identical."
    misconception_alert: "The 'C' shape (Interior Angles) are NOT equal; they add up to $180^\circ$. Only 'Z' (Alternate) and 'F' (Corresponding) shapes show equal angles."
    scenario: "Two parallel lines are intersected by a transversal. An interior angle is $(2x)^\circ$ and its corresponding interior angle on the same side is $120^\circ$. Find the value of $x$."
    working: |
      1. Identify the property: Interior angles ($sudut$ $pedalaman$) on parallel lines sum up to $180^\circ$.
      2. Set up the algebraic equation: $2x + 120 = 180$.
      3. Subtract $120$ from both sides: $2x = 180 - 120$.
      4. Simplify: $2x = 60$.
      5. Divide both sides by $2$: $x = 60 \div 2$.
      6. Final Answer: $x = 30$.