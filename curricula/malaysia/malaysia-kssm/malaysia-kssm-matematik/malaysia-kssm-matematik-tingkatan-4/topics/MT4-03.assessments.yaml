topic_id: MT4-03
provenance: ai-generated

questions:
  # Learning Objective: 3.1.1
  - id: Q1
    text: 'Tentukan nilai kebenaran bagi pernyataan berikut: "Semua pelajar di kelas ini pandai."'
    difficulty: medium
    learning_objective: 3.1.1
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "A"
      working: |
        Jika terdapat sekurang-kurangnya seorang pelajar yang tidak pandai, maka pernyataan itu adalah palsu. Jika semua pelajar memang pandai, maka pernyataan ini adalah benar.
    marks: 2
    rubric:
      - marks: 2
        criteria: "Menentukan nilai kebenaran dengan memberikan alasan yang betul."
      - marks: 1
        criteria: "Menentukan nilai kebenaran tanpa alasan."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Ingat bahawa 'semua' bermakna tiada pengecualian."
      - level: 2
        text: "Pertimbangkan situasi di mana seorang pelajar tidak pandai."

  # Learning Objective: 3.1.3
  - id: Q2
    text: 'Tentukan nilai kebenaran bagi pernyataan majmuk: "Jika hari hujan, maka tanah basah dan langit cerah."'
    difficulty: medium
    learning_objective: 3.1.3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "Palsu"
      working: |
        Pernyataan ini adalah majmuk kerana mengandungi dua klausa: "tanah basah" dan "langit cerah". Jika hujan, tanah basah adalah benar, tetapi langit cerah adalah palsu. Oleh itu, pernyataan majmuk ini adalah palsu.
    marks: 2
    rubric:
      - marks: 2
        criteria: "Menentukan nilai kebenaran dengan justifikasi yang tepat."
      - marks: 1
        criteria: "Menentukan nilai kebenaran tetapi dengan alasan yang kurang tepat."
    hints:
      - level: 1
        text: "Pertimbangkan kedua-dua klausa dalam pernyataan majmuk."
      - level: 2
        text: "Bagaimana mungkin langit cerah jika hari hujan?"

  # Learning Objective: 3.1.4
  - id: Q3
    text: 'Bina pernyataan dalam bentuk implikasi bagi situasi berikut: "Semua kucing boleh memanjat pokok."'
    difficulty: medium
    learning_objective: 3.1.4
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Jika seekor haiwan adalah kucing, maka ia boleh memanjat pokok."
      working: |
        Diberikan bahawa semua kucing mempunyai kebolehan memanjat pokok, implikasi yang sesuai adalah: "Jika seekor haiwan adalah kucing, maka ia boleh memanjat pokok."
    marks: 3
    rubric:
      - marks: 3
        criteria: "Membina pernyataan implikasi dengan struktur yang betul."
      - marks: 2
        criteria: "Membina pernyataan implikasi dengan sedikit kesalahan struktur."
      - marks: 1
        criteria: "Membina pernyataan yang tidak lengkap."
    hints:
      - level: 1
        text: "Ingat format implikasi: 'Jika p, maka q'."
      - level: 2
        text: "Misalnya, 'Jika sesuatu adalah kucing, maka ia...'."

  # Learning Objective: 3.1.6
  - id: Q4
    text: 'Selesaikan masalah ini menggunakan penaakulan logik: "Ali, Ben, dan Chan mengambil bahagian dalam pertandingan. Jika Ali menang, Ben akan sedih. Ali tidak menang. Apakah emosi Ben?"'
    difficulty: medium
    learning_objective: 3.1.6
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "Tidak sedih"
      working: |
        Berdasarkan pernyataan implikasi: "Jika Ali menang, Ben akan sedih." Diketahui bahawa Ali tidak menang, maka tidak ada alasan bagi Ben untuk sedih.
    marks: 3
    rubric:
      - marks: 3
        criteria: "Menggunakan penaakulan logik dengan tepat untuk menyelesaikan masalah."
      - marks: 2
        criteria: "Menggunakan penaakulan logik tetapi dengan kesalahan kecil."
      - marks: 1
        criteria: "Kesimpulan yang betul tanpa penjelasan logik."
    hints:
      - level: 1
        text: "Fokus pada pernyataan implikasi dan fakta yang diberikan."
      - level: 2
        text: "Apa berlaku jika Ali tidak menang berdasarkan pernyataan yang diberikan?"

  # Learning Objective: 3.2.3
  - id: Q5
    text: 'Bentuk hujah deduktif yang sah: "Semua manusia memerlukan oksigen untuk hidup. Anna adalah manusia. Oleh itu, ..."'
    difficulty: medium
    learning_objective: 3.2.3
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Anna memerlukan oksigen untuk hidup."
      working: |
        Berdasarkan premis deduktif: "Semua manusia memerlukan oksigen untuk hidup" dan fakta bahawa "Anna adalah manusia", kita boleh membuat kesimpulan bahawa "Anna memerlukan oksigen untuk hidup."
    marks: 3
    rubric:
      - marks: 3
        criteria: "Membentuk hujah deduktif yang lengkap dan tepat."
      - marks: 2
        criteria: "Hujah deduktif dengan sedikit kesalahan."
      - marks: 1
        criteria: "Hujah deduktif yang tidak lengkap."
    hints:
      - level: 1
        text: "Ingat bahawa deduktif melibatkan pengambilan kesimpulan langsung dari premis."
      - level: 2
        text: "Apa yang perlu semua manusia, termasuk Anna, untuk hidup?"