topic_id: MT4-03
provenance: ai-generated
description: "Worked examples for PENAAKULAN LOGIK"
worked_examples:
  - id: WE-01
    topic: "Maksud Pernyataan dan Nilai Kebenaran"
    difficulty: easy
    real_world_analogy: "Memeriksa sama ada lampu isyarat merah, kuning, atau hijau sebelum melintas jalan."
    misconception_alert: "Pelajar sering keliru antara pernyataan yang benar dan salah apabila tidak mempertimbangkan konteks sepenuhnya."
    scenario: "Tentukan nilai kebenaran pernyataan: 'Semua pelajar di dalam kelas memakai baju biru.'"
    working: |
      Step 1: Periksa setiap pelajar dalam kelas untuk melihat warna baju mereka.
      Step 2: Jika terdapat walau seorang pelajar yang tidak memakai baju biru, maka pernyataan itu adalah salah.
      Step 3: Jika semua pelajar memakai baju biru, maka pernyataan itu adalah benar. Jawapan: Nilai kebenaran adalah salah jika ada pelajar tidak memakai baju biru.

  - id: WE-02
    topic: "Pernyataan Implikasi dan Songsangan"
    difficulty: medium
    real_world_analogy: "Jika kita menanam benih, maka pokok akan tumbuh, tetapi ini tidak bermakna jika pokok tumbuh, kita pasti menanam benih."
    misconception_alert: "Pelajar sering salah faham bahawa implikasi songsangan adalah sama dengan implikasi asal."
    scenario: "Jika hujan, jalan akan basah. Bina pernyataan songsangan dan tentukan nilai kebenaran."
    working: |
      Step 1: Pernyataan asal: Jika hujan, maka jalan akan basah.
      Step 2: Pernyataan songsangan: Jika jalan basah, maka hujan.
      Step 3: Tentukan nilai kebenaran pernyataan songsangan dengan memeriksa situasi lain seperti penyiraman air ke jalan. Jawapan: Songsangan adalah tidak semestinya benar kerana jalan boleh basah tanpa hujan.

  - id: WE-03
    topic: "Hujah Deduktif dan Induktif"
    difficulty: hard
    real_world_analogy: "Menggunakan bukti DNA untuk menentukan sama ada seseorang adalah suspek dalam kes jenayah adalah seperti hujah deduktif."
    misconception_alert: "Pelajar kadang-kadang menyamakan hujah deduktif dengan induktif tanpa mempertimbangkan struktur dan bukti yang terlibat."
    scenario: "Bina hujah deduktif untuk menentukan sama ada seorang pelajar layak mendapat anugerah berdasarkan kriteria tertentu."
    working: |
      Step 1: Kenal pasti kriteria: Pelajar mesti mendapat A dalam semua subjek dan terlibat dalam aktiviti kokurikulum.
      Step 2: Kumpulkan maklumat: Semak rekod akademik dan rekod kokurikulum pelajar tersebut.
      Step 3: Analisis maklumat: Jika pelajar memenuhi kedua-dua kriteria, maka pelajar layak untuk anugerah tersebut. Jika tidak, pelajar tidak layak. Jawapan: Hujah deduktif menunjukkan pelajar layak jika dan hanya jika memenuhi semua kriteria.