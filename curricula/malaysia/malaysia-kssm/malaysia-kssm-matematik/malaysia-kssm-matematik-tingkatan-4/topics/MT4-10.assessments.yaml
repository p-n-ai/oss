questions:
  # Group by learning objective
  - id: Q1
    text: 'Apakah langkah pertama yang perlu diambil dalam proses pengurusan kewangan yang berkesan?'
    difficulty: medium
    learning_objective: 10.1.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Menetapkan matlamat kewangan yang jelas."
      working: |
        Langkah pertama dalam pengurusan kewangan ialah menetapkan matlamat kewangan yang jelas untuk mengarahkan aliran kewangan ke arah yang diinginkan.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menjawab menetapkan matlamat kewangan."
      - marks: 2
        criteria: "Menjawab menetapkan matlamat kewangan yang jelas dan terperinci."
    hints:
      - level: 1
        text: "Pertimbangkan apa yang anda ingin capai dengan wang anda."

  - id: Q2
    text: 'Pilih pernyataan yang benar mengenai pengurusan kewangan yang berkesan.'
    difficulty: medium
    learning_objective: 10.1.1
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: "B. Mengkaji dan menilai aliran tunai secara berkala."
      working: |
        Pengurusan kewangan yang berkesan melibatkan pengkajian dan penilaian aliran tunai secara berkala untuk memastikan matlamat kewangan dicapai.
    marks: 2
    rubric:
      - marks: 2
        criteria: "Memilih pernyataan yang benar mengenai pengurusan kewangan."
    hints:
      - level: 1
        text: "Fokus pada tindakan yang membantu menilai keadaan kewangan semasa."

  - id: Q3
    text: 'Anda ingin membeli sebuah kereta dalam masa 5 tahun. Apakah elemen yang perlu dimasukkan dalam pelan kewangan anda?'
    difficulty: medium
    learning_objective: 10.1.2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Anggaran kos kereta, tabungan bulanan, pelaburan, jangka masa, dan risiko."
      working: |
        Untuk mencapai matlamat ini, masukkan anggaran kos kereta, jumlah yang boleh disimpan setiap bulan, pilihan pelaburan, jangka masa, dan risiko kewangan yang mungkin dihadapi.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menjawab satu elemen dengan betul."
      - marks: 2
        criteria: "Menjawab dua hingga tiga elemen dengan betul."
      - marks: 3
        criteria: "Menjawab kesemua elemen dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan semua aspek kewangan yang terlibat dalam pembelian kereta."

  - id: Q4
    text: 'Seorang pelajar ingin menabung untuk laptop baharu dalam masa 2 tahun. Jika harga laptop adalah RM3000, berapakah jumlah bulanan yang perlu disimpan tanpa faedah?'
    difficulty: medium
    learning_objective: 10.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "RM125"
      working: |
        Jumlah tabungan bulanan = Total harga laptop / (Bilangan bulan)
        Jumlah tabungan bulanan = RM3000 / (2 tahun x 12 bulan/tahun) = RM125
    marks: 2
    rubric:
      - marks: 2
        criteria: "Mengira jumlah bulanan yang tepat."
    hints:
      - level: 1
        text: "Bahagikan jumlah harga laptop dengan jumlah bulan."

  - id: Q5
    text: 'Nyatakan satu risiko yang boleh menghalang pencapaian matlamat kewangan jangka panjang.'
    difficulty: medium
    learning_objective: 10.1.2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Inflasi."
      working: |
        Inflasi boleh mengurangkan nilai wang simpanan dari masa ke masa, menjadikannya lebih sukar untuk mencapai matlamat kewangan jangka panjang.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menyatakan risiko umum tanpa penjelasan."
      - marks: 2
        criteria: "Menyatakan dan menjelaskan risiko inflasi."
    hints:
      - level: 1
        text: "Fikirkan tentang faktor yang boleh menurunkan nilai simpanan anda."