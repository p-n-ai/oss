topic_id: "MT4-06"
provenance: "curriculum-aligned-rewrite"
description: "Worked examples for Linear Inequalities in Two Variables focusing on representation, shading regions, and solving systems."
worked_examples:
  - id: "WE-01"
    topic: "Representing Situations as Linear Inequalities"
    difficulty: "easy"
    learning_objective: "6.1.1"
    tp_level: 2
    real_world_analogy: "Think of a 'Height Limit' sign at a parking garage. If the limit is 2.1m, your car height ($h$) must be $h \leq 2.1$. The sign is a boundary that you cannot cross."
    misconception_alert: "Students often think 'at most' means 'greater than' because the word 'most' sounds like 'more'. Always remember: 'at most' is a ceiling—you can't go higher, so use $\leq$."
    scenario: "Taufik wants to buy some reference books and exercise books. The price of a reference book is RM14 and an exercise book is RM9. The maximum amount he can spend is RM100. Represent this situation as a linear inequality."
    working: |
      1. Define the variables: Let $x$ = number of reference books and $y$ = number of exercise books.
      2. Calculate the cost of reference books: $14 \times x = 14x$.
      3. Calculate the cost of exercise books: $9 \times y = 9y$.
      4. Total cost = $14x + 9y$.
      5. Identify the constraint: 'Maximum' means the total cannot exceed RM100, but it can be exactly RM100. Use the symbol $\leq$.
      6. Final Inequality: $14x + 9y \leq 100$.

  - id: "WE-02"
    topic: "Determining and Shading the Region"
    difficulty: "medium"
    learning_objective: "6.1.3"
    tp_level: 3
    real_world_analogy: "Imagine a fence. If the rule is 'stay inside the fence', the fence itself is the boundary. If the rule says 'don't touch the fence', we draw it with a dashed line."
    misconception_alert: "Students often forget that the line type changes. If the symbol is $>$ or $<$, the line MUST be dashed. If it has an equal sign ($\geq$ or $\leq$), the line is solid."
    scenario: "Draw the graph and shade the region representing the inequality $y > \frac{2}{3}x + 2$."
    working: |
      1. Convert the inequality to an equation to find the boundary line: $y = \frac{2}{3}x + 2$.
      2. Find the y-intercept: When $x = 0$, $y = \frac{2}{3}(0) + 2 = 2$. Point is $(0, 2)$.
      3. Find the x-intercept: When $y = 0$, $0 = \frac{2}{3}x + 2 \rightarrow -2 = \frac{2}{3}x \rightarrow x = -3$. Point is $(-3, 0)$.
      4. Identify the line type: The symbol is $>$, which does not include 'equal to'. Draw a **dashed line** through $(-3, 0)$ and $(0, 2)$.
      5. Determine the region: Since $y >$, shade the region **above** the dashed line.

  - id: "WE-03"
    topic: "Solving Systems of Linear Inequalities"
    difficulty: "hard"
    learning_objective: "6.2.4"
    tp_level: 5
    real_world_analogy: "Think of this as finding a 'Safe Zone' where two different rules apply at the same time. You must follow Rule A AND Rule B. Only the area where both rules are happy is the solution."
    misconception_alert: "When dealing with two or more inequalities, students often shade only one. The solution is ONLY the 'Common Region' (Rantau Sepunya) where all shaded areas overlap."
    scenario: "Madam Carol is selecting pupils for a choir competition. The total number of pupils is at most 20. The number of girls ($x$) must be at least twice the number of boys ($y$). If 5 boys are selected, what is the maximum number of girls allowed?"
    working: |
      1. Formulate the system of inequalities:
         - Total pupils: $x + y \leq 20$
         - Ratio: $x \geq 2y$
      2. Substitute the given value: Madam Carol selects 5 boys, so $y = 5$.
      3. Test the first constraint ($x + y \leq 20$):
         - $x + 5 \leq 20$
         - Subtract 5 from both sides: $x \leq 15$.
      4. Test the second constraint ($x \geq 2y$):
         - $x \geq 2(5)$
         - $x \geq 10$.
      5. Combine the limits: The number of girls must be at least 10 ($x \geq 10$) and at most 15 ($x \leq 15$).
      6. Conclusion: The maximum number of girls that can be produced/selected is 15.