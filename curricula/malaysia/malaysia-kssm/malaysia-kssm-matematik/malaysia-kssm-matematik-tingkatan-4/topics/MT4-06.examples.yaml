  - id: WE-01
    topic: "Representing Linear Inequalities"
    difficulty: easy
    real_world_analogy: "Imagine a person who cannot carry more than 10 kg. This can be represented as an inequality where the total weight must be less than or equal to 10 kg."
    misconception_alert: "Students often confuse the inequality symbols, mistaking '<' for '>' and vice versa."
    scenario: "A fruit vendor has apples (x kg) and bananas (y kg). The total weight of fruits must not exceed 15 kg. Represent this scenario as a linear inequality."
    working: |
      Step 1: Identify the total weight constraint. The total weight of apples and bananas should not exceed 15 kg.
      Step 2: Express the situation in terms of an inequality: x + y ≤ 15.
      Step 3: The inequality x + y ≤ 15 represents the condition where the combined weight of apples and bananas is at most 15 kg.

  - id: WE-02
    topic: "Analyzing Solutions to a Linear Inequality"
    difficulty: medium
    real_world_analogy: "Consider a bus that can seat a maximum of 40 passengers. We can represent the number of passengers as an inequality."
    misconception_alert: "Students may think that all points on the line are solutions, but only those within the shaded region satisfy the inequality."
    scenario: "Determine if the point (8, 5) is within the solution set for the inequality 3x + 2y < 30."
    working: |
      Step 1: Substitute x = 8 and y = 5 into the inequality: 3(8) + 2(5).
      Step 2: Calculate the left-hand side: 24 + 10 = 34.
      Step 3: Compare 34 with 30. Since 34 is not less than 30, the point (8, 5) does not satisfy the inequality 3x + 2y < 30.

  - id: WE-03
    topic: "Solving a System of Linear Inequalities"
    difficulty: hard
    real_world_analogy: "Imagine planning a party with budget constraints. You have to ensure food and decoration costs do not exceed a certain budget."
    misconception_alert: "Students often forget that the solution is the intersection of the regions satisfying each inequality in the system."
    scenario: "A company produces two products, A and B. The production constraints are: 2x + 3y ≤ 60 and x + y ≥ 20. Find the feasible region and determine if producing 10 units of A and 15 units of B is feasible."
    working: |
      Step 1: Graph the first inequality 2x + 3y ≤ 60.
      Step 2: Graph the second inequality x + y ≥ 20.
      Step 3: Identify the intersection of the two regions. This intersection is the feasible region.
      Step 4: Check if the point (10, 15) lies within this region. Substitute x = 10 and y = 15 into both inequalities.
      Step 5: For 2x + 3y ≤ 60: 2(10) + 3(15) = 20 + 45 = 65, which does not satisfy the inequality.
      Step 6: Conclusion: Producing 10 units of A and 15 units of B is not feasible within the given constraints.