questions:
  # Learning objective 7.1.1: Melukis graf jarak-masa
  - id: Q1
    text: 'Rajah menunjukkan perjalanan seorang pelari dalam 2 jam. Lakarkan graf jarak-masa jika pelari itu mengekalkan halaju sepanjang masa.'
    difficulty: medium
    learning_objective: 7.1.1
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Graf yang menunjukkan garis lurus yang menaik secara seragam."
      working: |
        Pelari bergerak dengan halaju tetap, jadi graf jarak-masa adalah garis lurus yang menunjukkan kenaikan jarak yang seragam dari masa ke masa.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Graf menunjukkan garis lurus."
      - marks: 2
        criteria: "Graf menunjukkan kenaikan jarak yang seragam."
      - marks: 3
        criteria: "Graf menunjukkan kenaikan linear dan diperlabelkan dengan betul."
    hints:
      - level: 1
        text: "Ingatlah bahawa halaju tetap bermaksud jarak bertambah secara sekata."

  # Learning objective 7.1.2: Mentafsir graf jarak-masa
  - id: Q2
    text: 'Graf jarak-masa menunjukkan sebuah kereta bergerak dari titik A ke B dalam 3 jam. Apakah kelajuan purata kereta tersebut?'
    difficulty: medium
    learning_objective: 7.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: 'Kelajuan purata = $\frac{\text{Jarak keseluruhan}}{\text{Masa keseluruhan}}$'
      working: |
        Kelajuan purata boleh dikira dengan formula $\frac{\text{Jarak keseluruhan}}{\text{Masa keseluruhan}}$. Jika jarak dari A ke B adalah 150 km, maka $v = \frac{150 \text{ km}}{3 \text{ jam}} = 50 \text{ km/j}$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menggunakan formula kelajuan purata dengan betul."
      - marks: 2
        criteria: "Mengira kelajuan purata dengan betul."
    hints:
      - level: 1
        text: 'Gunakan formula kelajuan purata: $\frac{\text{Jarak}}{\text{Masa}}$.'

  # Learning objective 7.1.3: Menyelesaikan masalah graf jarak-masa
  - id: Q3
    text: 'Seorang pelari bergerak dengan kelajuan tetap 10 m/s. Berapakah jarak yang dilalui selepas 5 minit?'
    difficulty: medium
    learning_objective: 7.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "3000 m"
      working: |
        Jarak = Kelajuan x Masa. Masa = 5 minit = 300 saat. Jadi, Jarak = 10 m/s x 300 s = 3000 m.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menukar masa dari minit ke saat dengan betul."
      - marks: 2
        criteria: "Menggunakan formula Jarak = Kelajuan x Masa dengan betul."
      - marks: 3
        criteria: "Mengira jarak dengan betul."
    hints:
      - level: 1
        text: "Pastikan untuk menukar masa ke dalam saat sebelum menggunakan formula."

  # Learning objective 7.2.1: Melukis graf laju-masa
  - id: Q4
    text: 'Lukiskan graf laju-masa untuk sebuah kenderaan yang memulakan pergerakan dari keadaan pegun dan mencapai kelajuan 20 m/s dalam masa 10 saat.'
    difficulty: medium
    learning_objective: 7.2.1
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Graf menunjukkan garis lurus menaik dari (0,0) ke (10,20)."
      working: |
        Kenderaan memulakan pergerakan dari keadaan pegun, jadi graf bermula dari titik asal (0,0). Garis menaik secara linear ke (10,20) menunjukkan percepatan tetap.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Graf bermula dari titik asal (0,0)."
      - marks: 2
        criteria: "Graf menunjukkan garis lurus menaik."
      - marks: 3
        criteria: "Graf mencapai (10,20) dan diperlabelkan dengan betul."
    hints:
      - level: 1
        text: "Percepatan tetap menghasilkan garis lurus dalam graf laju-masa."

  # Learning objective 7.2.2: Membuat perkaitan luas di bawah graf laju-masa dengan jarak
  - id: Q5
    text: 'Graf laju-masa menunjukkan sebuah kereta bergerak dengan halaju tetap 15 m/s selama 4 saat. Berapakah jarak yang dilalui kereta itu?'
    difficulty: medium
    learning_objective: 7.2.2
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: "60 m"
      working: |
        Jarak yang dilalui adalah sama dengan luas di bawah graf laju-masa. Luas tersebut boleh dikira sebagai kawasan segiempat tepat: 15 m/s x 4 s = 60 m.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengenal pasti bahawa jarak adalah luas di bawah graf."
      - marks: 2
        criteria: "Mengira luas segiempat tepat dengan betul."
      - marks: 3
        criteria: "Menyatakan jarak dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan untuk mengaitkan luas di bawah graf dengan jarak."