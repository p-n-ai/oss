questions:
  # LO 7.1.1 - Melukis graf jarak-masa
  - id: Q1
    text: "Lukis graf jarak-masa bagi sebuah kereta yang bergerak dengan laju seragam 60 km/j selama 3 jam."
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Graf jarak-masa dengan garis lurus dari (0,0) ke (3,180)."
      working: |
        Kereta bergerak dengan laju 60 km/j, jadi dalam 3 jam, ia akan bergerak 60 km/j * 3 jam = 180 km.
        Oleh itu, titik akhir graf adalah pada (3, 180) dengan garis lurus dari (0, 0).
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan jarak keseluruhan yang dilalui."
      - marks: 1
        criteria: "Melukis garis lurus yang betul."
      - marks: 1
        criteria: "Menetapkan titik akhir graf dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan laju kereta dan masa pergerakan untuk menentukan jarak."

  # LO 7.1.2 - Mentafsir graf jarak-masa
  - id: Q2
    text: "Graf jarak-masa menunjukkan sebuah bas berhenti selama 30 minit sebelum meneruskan perjalanan. Terangkan gerakan bas tersebut."
    difficulty: medium
    learning_objective: LO2
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Bas berhenti selama 30 minit apabila graf mendatar, sebelum meneruskan perjalanan."
      working: |
        Graf mendatar menunjukkan tiada perubahan dalam jarak, menandakan bas berhenti.
        Selepas 30 minit, graf mula menaik semula menunjukkan bas meneruskan perjalanan.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyedari bahagian mendatar menunjukkan bas berhenti."
      - marks: 1
        criteria: "Mengetahui tempoh masa bas berhenti."
      - marks: 1
        criteria: "Menghuraikan pergerakan selepas berhenti."
    hints:
      - level: 1
        text: "Graf mendatar menunjukkan tiada perubahan jarak. Apakah maksudnya dalam konteks ini?"

  # LO 7.1.3 - Menyelesaikan masalah yang melibatkan graf jarak-masa
  - id: Q3
    text: "Sebuah lori bergerak dengan laju seragam 80 km/j selama 4 jam dan berhenti selama 1 jam sebelum meneruskan perjalanan dengan laju seragam 60 km/j selama 3 jam lagi. Hitung jumlah jarak yang dilalui oleh lori."
    difficulty: medium
    learning_objective: LO3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "500 km"
      working: |
        Jarak semasa bergerak pertama: 80 km/j * 4 jam = 320 km.
        Jarak semasa bergerak kedua: 60 km/j * 3 jam = 180 km.
        Jumlah jarak = 320 km + 180 km = 500 km.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira jarak pergerakan pertama dengan betul."
      - marks: 1
        criteria: "Mengira jarak pergerakan kedua dengan betul."
      - marks: 1
        criteria: "Menjumlahkan kedua-dua jarak dengan betul."
    hints:
      - level: 1
        text: "Hitung jarak untuk setiap segmen pergerakan secara berasingan dan jumlahkan."

  # LO 7.2.1 - Melukis graf laju-masa
  - id: Q4
    text: "Lukis graf laju-masa bagi sebuah kereta yang bergerak dengan laju 90 km/j selama 2 jam, kemudian berhenti selama 1 jam, dan terus bergerak dengan laju 70 km/j selama 2 jam lagi."
    difficulty: medium
    learning_objective: LO4
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Graf laju-masa dengan dua segmen mendatar pada 90 dan 70 km/j, dan satu segmen mendatar pada 0 km/j."
      working: |
        Pertama, lukis garis mendatar pada 90 km/j dari t=0 hingga t=2.
        Kemudian, lukis garis mendatar pada 0 km/j dari t=2 hingga t=3.
        Akhir sekali, lukis garis mendatar pada 70 km/j dari t=3 hingga t=5.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Melukis segmen pertama dengan betul pada 90 km/j."
      - marks: 1
        criteria: "Melukis segmen kedua dengan betul pada 0 km/j."
      - marks: 1
        criteria: "Melukis segmen ketiga dengan betul pada 70 km/j."
    hints:
      - level: 1
        text: "Setiap segmen masa mewakili satu kelajuan yang berbeza. Pastikan segmen mendatar."

  # LO 7.2.2 - Membuat perkaitan antara luas di bawah graf laju-masa dengan jarak
  - id: Q5
    text: "Graf laju-masa bagi sebuah motosikal menunjukkan pergerakan selama 3 jam dengan laju seragam 50 km/j. Hitung jarak yang dilalui menggunakan graf tersebut."
    difficulty: medium
    learning_objective: LO5
    tp_level: 2
    kbat: true
    answer:
      type: exact
      value: "150 km"
      working: |
        Luas di bawah graf laju-masa mewakili jarak yang dilalui.
        Luas segi empat tepat = panjang * lebar = 50 km/j * 3 jam = 150 km.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyedari bahawa luas di bawah graf mewakili jarak."
      - marks: 1
        criteria: "Menggunakan nilai laju dan masa yang diberikan dengan betul."
      - marks: 1
        criteria: "Mengira luas dengan betul untuk menentukan jarak."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Luas di bawah graf laju-masa bukan hanya laju kali masa. Pastikan anda mengira luas dengan betul."