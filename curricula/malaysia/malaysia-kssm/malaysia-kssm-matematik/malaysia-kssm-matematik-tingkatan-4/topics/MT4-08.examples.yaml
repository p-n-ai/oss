description: "Worked examples for SUKATAN SERAKAN DATA TAK TERKUMPUL"
worked_examples:
  - id: WE-01
    topic: "Understanding and Explaining Serakan"
    difficulty: easy
    real_world_analogy: "Imagine a group of students standing at different distances from a teacher. The spread of students represents data spread or 'serakan'."
    misconception_alert: "Students often confuse 'serakan' with 'kecenderungan memusat'. Serakan describes how spread out the data is, not the center."
    scenario: "In a class of 10 students, their heights in cm are: 150, 152, 153, 155, 157, 160, 162, 163, 165, 170. Explain the concept of serakan using this data."
    working: |
      Step 1: Observe the given data set. The heights are spread from 150 cm to 170 cm.
      Step 2: The difference between the highest and lowest value is 170 - 150 = 20 cm.
      Step 3: The range is 20 cm, representing the serakan or spread of the data.
      Conclusion: The data is fairly spread over a range of 20 cm, indicating moderate serakan.

  - id: WE-02
    topic: "Analyzing and Comparing Data Sets"
    difficulty: medium
    real_world_analogy: "Think of two different brands of chips with different levels of saltiness. Comparing their salt content helps decide which is healthier."
    misconception_alert: "Students often neglect the importance of comparing both the central tendency and the spread for a proper analysis."
    scenario: "Two groups of students took a math test. Group A scores are: 55, 60, 65, 70, 75. Group B scores are: 50, 60, 70, 80, 90. Compare the serakan of these scores."
    working: |
      Step 1: Calculate the range for Group A: 75 - 55 = 20.
      Step 2: Calculate the range for Group B: 90 - 50 = 40.
      Step 3: Compare the ranges: Group B has a larger range, indicating more serakan.
      Conclusion: Although both groups have similar central scores, Group B's scores are more spread out.

  - id: WE-03
    topic: "Applying Measures of Spread"
    difficulty: hard
    real_world_analogy: "Consider a group of marathon runners where some are much faster than others. The variability in their finish times shows the spread of their performance."
    misconception_alert: "Students might miscalculate variance and standard deviation by not squaring the differences from the mean."
    scenario: "A data set of students' test scores: 68, 70, 72, 75, 78, 80, needs analysis for variance and standard deviation."
    working: |
      Step 1: Calculate the mean: (68 + 70 + 72 + 75 + 78 + 80) / 6 = 73.83.
      Step 2: Find the squared differences from the mean and calculate variance:
              (68-73.83)^2 + (70-73.83)^2 + (72-73.83)^2 + (75-73.83)^2 + (78-73.83)^2 + (80-73.83)^2 / 6 = 17.14.
      Step 3: Calculate the standard deviation: √17.14 ≈ 4.14.
      Conclusion: The standard deviation is 4.14, indicating a moderate spread of scores around the mean.