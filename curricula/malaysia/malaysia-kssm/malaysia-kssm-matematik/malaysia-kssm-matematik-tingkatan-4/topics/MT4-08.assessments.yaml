questions:
  # --- 8.1.1 Dispersion (TP1) ---
  - id: Q1
    text: "Which of the following statements best describes the concept of dispersion in statistics?"
    difficulty: easy
    learning_objective: "8.1.1"
    tp_level: 1
    marks: 1
    answer:
      type: multiple_choice
      value: "It measures how the values in a data set are scattered or spread out."
      working: |
        Dispersion (serakan) refers to the spread of data around a central value. 
        It is small if data is close together and large if data is widely spread.
      distractors:
        - value: "It identifies the middle value of a sorted data set."
          feedback: "That is the definition of the Median, a measure of central tendency, not dispersion."
        - value: "It represents the most frequent value in a data set."
          feedback: "That is the definition of the Mode. Dispersion is about 'spread', not 'frequency'."
        - value: "It calculates the average of all values in a data set."
          feedback: "That is the definition of the Mean. You are confusing central tendency with dispersion."

  # --- 8.1.2 Compare/Interpret Dispersion (TP3) ---
  - id: Q2
    text: "The dot plots show the scores of 20 pupils in a Science quiz and a Mathematics quiz. Compare the dispersion of the two quizzes and state which quiz has a wider spread."
    difficulty: medium
    learning_objective: "8.1.2"
    tp_level: 3
    kbat: true
    marks: 2
    answer:
      type: free_text
      value: "The Science quiz has a wider dispersion because its range is larger ($15 - 8 = 7$) compared to the Mathematics quiz ($15 - 9 = 6$)."
      working: |
        Step 1: Calculate range for Science: $15 - 8 = 7$.
        Step 2: Calculate range for Maths: $15 - 9 = 6$.
        Step 3: Compare values: $7 > 6$.
        Conclusion: Science has larger dispersion.
    rubric:
      - marks: 1
        criteria: "Calculates the difference in values (range) for both sets of data correctly."
      - marks: 1
        criteria: "Makes a correct conclusion based on the comparison of the spread."
    hints:
      - level: 1
        text: "Look at the lowest and highest points on the horizontal axis for both plots. Which one 'stretches' further?"

  # --- 8.2.1 Measures of Dispersion (TP2) ---
  - id: Q3
    text: "Determine the interquartile range for the set of data: $4, 4, 6, 8, 10, 13, 15, 16, 20, 22, 23$."
    difficulty: medium
    learning_objective: "8.2.1"
    tp_level: 2
    marks: 3
    answer:
      type: exact
      value: "14"
      working: |
        Step 1: The data is already in ascending order. $N = 11$.
        Step 2: Find the median (6th value) = 13.
        Step 3: Find $Q_1$ (middle of the first 5 values) = 6.
        Step 4: Find $Q_3$ (middle of the last 5 values) = 20.
        Step 5: $IQR = Q_3 - Q_1 = 20 - 6 = 14$.
    rubric:
      - marks: 1
        criteria: "Correctly identifies the first quartile ($Q_1$) and third quartile ($Q_3$)."
      - marks: 2
        criteria: "Applies the formula $Q_3 - Q_1$ to get the correct final value."
    hints:
      - level: 1
        text: "First, find the median to split the data into two halves. Then, find the 'middle of the halves'."

  # --- 8.2.4 Effect of Data Changes (TP4) ---
  - id: Q4
    text: "The variance of a set of data is $2.5$. If every value in the set is multiplied by $3$, what is the new variance?"
    difficulty: medium
    learning_objective: "8.2.4"
    tp_level: 4
    marks: 1
    answer:
      type: multiple_choice
      value: "22.5"
      working: |
        Rule: New Variance = $k^2 \times \text{Original Variance}$.
        $k = 3$.
        New Variance = $3^2 \times 2.5 = 9 \times 2.5 = 22.5$.
      distractors:
        - value: "7.5"
          feedback: "You only multiplied by $k$. Remember, variance is 'Square Land'—you must multiply by $k^2$!"
        - value: "2.5"
          feedback: "The variance only remains unchanged if you add or subtract a constant. Multiplication always changes the spread."
        - value: "5.5"
          feedback: "It looks like you added $3$ instead of multiplying. Check the operation in the question again."

  # --- 8.2.5 Compare with Central Tendency (TP5) ---
  - id: Q5
    text: "Two athletes, A and B, recorded their times (in seconds) for five 100m sprint trials. Both have a mean time of $12.5s$. Athlete A has a standard deviation of $0.15s$ while Athlete B has $0.45s$. Who is the more consistent athlete?"
    difficulty: medium
    learning_objective: "8.2.5"
    tp_level: 5
    kbat: true
    marks: 2
    answer:
      type: free_text
      value: "Athlete A is more consistent because their standard deviation is smaller ($0.15 < 0.45$)."
      working: |
        Lower standard deviation = lower dispersion = more consistent performance.
    rubric:
      - marks: 1
        criteria: "Identifies Athlete A correctly."
      - marks: 1
        criteria: "Justifies the choice by linking a smaller standard deviation to higher consistency."
    hints:
      - level: 1
        text: "In statistics, 'consistent' means the data doesn't vary much from the average. Which standard deviation shows 'less mess'?"

  # --- 8.2.6 Problem Solving (TP6) ---
  - id: Q6
    text: "A set of $10$ numbers has a mean of $18$ and a variance of $38$. If a new number, $19$, is added to the set, calculate the new variance of the set."
    difficulty: hard
    learning_objective: "8.2.6"
    tp_level: 6
    kbat: true
    marks: 5
    answer:
      type: exact
      value: "35.36"
      working: |
        Step 1: Find old $\sum x = 10 \times 18 = 180$.
        Step 2: Find old $\sum x^2$: $38 = \frac{\sum x^2}{10} - 18^2 \rightarrow \sum x^2 = (38 + 324) \times 10 = 3620$.
        Step 3: New $\sum x = 180 + 19 = 199$. New $N = 11$. New mean = $199/11 = 18.09$.
        Step 4: New $\sum x^2 = 3620 + 19^2 = 3620 + 361 = 3981$.
        Step 5: New Variance = $\frac{3981}{11} - 18.09^2 = 361.91 - 327.25 = 34.66$ (Accept $34.6$ to $35.4$ based on rounding).
    rubric:
      - marks: 1
        criteria: "Calculates the original sum of squares ($\sum x^2$) correctly."
      - marks: 1
        criteria: "Calculates the new sum ($\sum x$) and new sum of squares ($\sum x^2$) after adding the number."
      - marks: 1
        criteria: "Determines the new mean correctly."
      - marks: 2
        criteria: "Applies the variance formula correctly to find the final value."
    hints:
      - level: 1
        text: "You need to find the total sum of squares ($\sum x^2$) for the original set before you can add the new value. Use the variance formula in reverse!"