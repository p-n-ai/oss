topic_id: MT4-08
provenance: ai-generated

questions:
  # Learning Objective 8.1.1
  - id: Q1
    text: "Jelaskan maksud serakan dalam konteks statistik."
    difficulty: medium
    learning_objective: 8.1.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Serakan adalah ukuran penyebaran atau variasi data dalam satu set data."
      working: |
        Serakan menunjukkan sejauh mana data tersebar daripada nilai pusat seperti min, median dan mod. Ukuran serakan yang biasa digunakan termasuk julat, varians dan sisihan piawai.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Memberikan definisi asas serakan."
      - marks: 1
        criteria: "Mengaitkan serakan dengan ukuran penyebaran data."
    hints:
      - level: 1
        text: "Fikirkan bagaimana data tersebar di sekitar nilai pusat."

  # Learning Objective 8.1.2
  - id: Q2
    text: 'Bandingkan serakan dua set data berikut menggunakan plot batang-dan-daun dan buat kesimpulan.\n\nSet A: 5, 7, 8, 12, 13\nSet B: 3, 4, 9, 11, 15'
    difficulty: medium
    learning_objective: 8.1.2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Set B mempunyai serakan yang lebih besar kerana julatnya lebih besar."
      working: |
        Plot batang-dan-daun untuk Set A: 5, 7, 8, 12, 13
        Plot batang-dan-daun untuk Set B: 3, 4, 9, 11, 15
        Julat Set A: 13 - 5 = 8
        Julat Set B: 15 - 3 = 12
        Kesimpulan: Set B mempunyai serakan lebih besar.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menghasilkan plot batang-dan-daun dengan betul."
      - marks: 1
        criteria: "Mengira julat untuk kedua-dua set data."
      - marks: 1
        criteria: "Menyatakan kesimpulan yang tepat berdasarkan julat."
    hints:
      - level: 1
        text: "Perhatikan julat data untuk kedua-dua set."

  # Learning Objective 8.2.1
  - id: Q3
    text: "Hitung julat antara kuartil bagi data berikut: 15, 18, 22, 26, 29, 31, 35."
    difficulty: medium
    learning_objective: 8.2.1
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "11"
      working: |
        Susun data: 15, 18, 22, 26, 29, 31, 35
        Kuartil Pertama (Q1): 18
        Kuartil Ketiga (Q3): 29
        Julat antara kuartil (IQR) = Q3 - Q1 = 29 - 18 = 11
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyusun data dalam urutan menaik."
      - marks: 1
        criteria: "Menentukan Q1 dan Q3 dengan betul."
      - marks: 1
        criteria: "Mengira julat antara kuartil dengan tepat."
    hints:
      - level: 1
        text: "Gunakan formula IQR = Q3 - Q1."

  # Learning Objective 8.2.2
  - id: Q4
    text: "Terangkan kelebihan menggunakan sisihan piawai berbanding julat dalam menghuraikan serakan data."
    difficulty: medium
    learning_objective: 8.2.2
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Sisihan piawai memberikan maklumat lebih terperinci tentang penyebaran data kerana ia mengambil kira semua nilai dalam set data."
      working: |
        Julat hanya mengukur perbezaan antara nilai maksimum dan minimum dan boleh dipengaruhi oleh nilai ekstrem. Sisihan piawai, sebaliknya, mengukur penyebaran data secara keseluruhan dan kurang dipengaruhi oleh nilai ekstrem.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyatakan bahawa sisihan piawai mengambil kira semua nilai."
      - marks: 1
        criteria: "Menjelaskan bahawa julat boleh dipengaruhi oleh nilai ekstrem."
      - marks: 1
        criteria: "Mengaitkan kelebihan sisihan piawai dalam konteks serakan."
    hints:
      - level: 1
        text: "Fikirkan bagaimana setiap ukuran menangani nilai ekstrem."

  # Learning Objective 8.2.3
  - id: Q5
    text: "Bina plot kotak untuk data berikut dan tafsirkan: 10, 12, 15, 18, 20, 25, 30."
    difficulty: medium
    learning_objective: 8.2.3
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "Plot kotak menunjukkan median adalah 18, julat antara kuartil adalah 10, dan data tidak mempunyai pencilan."
      working: |
        Data: 10, 12, 15, 18, 20, 25, 30
        Kuartil Pertama (Q1): 12
        Median: 18
        Kuartil Ketiga (Q3): 22
        IQR = Q3 - Q1 = 10
        Plot kotak menggambarkan median, Q1, Q3, dan tiada pencilan.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Mengira Q1, median dan Q3 dengan betul."
      - marks: 1
        criteria: "Menentukan julat antara kuartil."
      - marks: 1
        criteria: "Menggambarkan plot kotak dengan elemen yang tepat."
      - marks: 1
        criteria: "Mentafsirkan plot kotak dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa plot kotak menunjukkan lima angka ringkasan."