teaching:
  sequence:
    - "Step 1: Introduction to quadratic expressions and identifying coefficients a, b, and c (Textbook p. 2-5)."
    - "Step 2: Defining quadratic functions and many-to-one relationships using vertical line tests (Textbook p. 5-10)."
    - "Step 3: Analyzing shape (a), symmetry (b), and y-intercept (c) changes via simulation (Textbook p. 11-14)."
    - "Step 4: Modeling real-world situations into quadratic forms (Textbook p. 15)."
    - "Step 5: Visualizing and solving for roots via graphing and factorization (Textbook p. 16-23)."
    - "Step 6: Mastering graph sketching and complex problem solving (Textbook p. 23-29)."
common_misconceptions:
  - misconception: "Confusing quadratic expressions with linear ones due to the presence of 'x'."
    remediation: "Emphasize that a quadratic MUST have a power of 2 as the highest power."
  - misconception: "Thinking the value of 'c' changes the width or shape of the parabola."
    remediation: "Demonstrate that 'c' only shifts the graph vertically (y-intercept)."
  - misconception: "Misidentifying the axis of symmetry as the roots of the equation."
    remediation: "Clarify that the axis of symmetry is the center-line x = -b/2a, while roots are x-intercepts."
engagement_hooks:
  - "Relate the parabolic curve to the trajectory of a badminton shuttlecock or a football free kick."
  - "Discuss the architectural mathematics behind curved bridge structures like those in Putrajaya."
