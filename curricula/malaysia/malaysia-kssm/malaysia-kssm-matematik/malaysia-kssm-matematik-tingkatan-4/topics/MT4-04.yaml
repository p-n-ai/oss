teaching_metadata:
  sequence:
    - "Step 1: Introduce intersection of sets using Venn diagrams and common elements (20 min)"
    - "Step 2: Explore union of sets and the concept of combining all elements (20 min)"
    - "Step 3: Master combined operations, emphasizing the order of operations and brackets (25 min)"
  common_misconceptions:
    - misconception: "Confusing intersection (∩) with union (∪)."
      remediation: "Use visual mnemonic: 'n' for 'and' (intersection) and 'u' for 'unite' (union)."
    - misconception: "Forgetting the universal set when determining the complement."
      remediation: "Always draw a rectangle for the universal set and identify elements outside the target set."
  engagement_hooks:
    - "Relate set operations to social media filters (e.g., finding friends who like BOTH football and gaming)."
    - "Use a 'School Club' scenario where students visualize membership overlaps between different activities."
