  - id: WE-01
    topic: "Graf Jarak-Masa"
    difficulty: easy
    real_world_analogy: "Imagine you are riding a bicycle along a straight road. The distance you cover over time can be represented on a graph."
    misconception_alert: "Students often confuse distance with speed. Remember, distance is how far you travel, whereas speed is how fast you are traveling."
    scenario: "Ali rides his bicycle at a constant speed along a straight path. He rides 4 km in 1 hour. Draw the distance-time graph for 3 hours."
    working: |
      Step 1: Identify the variables. The x-axis represents time (hours) and the y-axis represents distance (km).
      Step 2: Plot the initial point (0 hours, 0 km) on the graph.
      Step 3: For each hour, Ali covers 4 km. Plot the points (1, 4), (2, 8), and (3, 12) on the graph.
      Step 4: Draw a straight line through these points. This is the distance-time graph.
      Step 5: The slope of the line represents a constant speed of 4 km/h.

  - id: WE-02
    topic: "Graf Laju-Masa"
    difficulty: medium
    real_world_analogy: "Think of a car journey where you accelerate, maintain speed, and then decelerate. This change in speed over time is shown in a speed-time graph."
    misconception_alert: "Students might confuse the area under the graph with speed. It actually represents the distance traveled."
    scenario: "A car accelerates uniformly from rest to 60 km/h in 10 seconds, maintains this speed for 20 seconds, and then decelerates to rest in 10 seconds. Draw the speed-time graph and calculate the total distance traveled."
    working: |
      Step 1: Identify the stages of motion: acceleration, constant speed, and deceleration.
      Step 2: Plot the speed-time graph: start from (0, 0), rise to (10, 60), maintain at (30, 60), and fall back to (40, 0).
      Step 3: Calculate the area under the graph: 
        - Triangle during acceleration: (1/2) * 10 * 60 = 300 km
        - Rectangle during constant speed: 20 * 60 = 1200 km
        - Triangle during deceleration: (1/2) * 10 * 60 = 300 km
      Step 4: Add these areas to find total distance: 300 + 1200 + 300 = 1800 km

  - id: WE-03
    topic: "Menyelesaikan Masalah Graf Laju-Masa"
    difficulty: hard
    real_world_analogy: "Consider a marathon runner who has to pace themselves differently at various stages of a race. Understanding speed-time graphs can help in strategizing the race."
    misconception_alert: "Students often overlook the significance of the total area under the graph, which provides insights into the total distance."
    scenario: "A runner starts with a jog at 5 m/s for 10 seconds, increases speed to 10 m/s for the next 10 seconds, and finally sprints at 15 m/s for 5 seconds. Calculate the total distance covered during the entire run."
    working: |
      Step 1: Plot the speed-time graph with the given speeds and time intervals.
      Step 2: Calculate the area under each segment of the graph to find distances:
        - First segment (rectangle): 5 m/s * 10 s = 50 m
        - Second segment (rectangle): 10 m/s * 10 s = 100 m
        - Third segment (rectangle): 15 m/s * 5 s = 75 m
      Step 3: Sum the areas to get the total distance: 50 m + 100 m + 75 m = 225 m