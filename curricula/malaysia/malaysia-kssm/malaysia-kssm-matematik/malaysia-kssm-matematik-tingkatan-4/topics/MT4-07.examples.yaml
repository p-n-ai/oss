worked_examples:
  - id: WE-01
    topic: "Melukis dan Mentafsir Graf Jarak-Masa"
    difficulty: easy
    real_world_analogy: "Imagine timing how long it takes to walk to school and noting the distance covered at various times."
    misconception_alert: "Students often confuse the axes, plotting time on the vertical axis instead of the horizontal axis."
    scenario: "Siti berjalan dari rumah ke sekolah yang berjarak 3 km. Dia mengambil masa 30 minit untuk sampai. Lukis graf jarak-masa dan tafsirkan gerakannya."
    working: |
      Step 1: Plot time on the horizontal axis and distance on the vertical axis.
      Step 2: Mark the point where Siti starts from home at (0, 0).
      Step 3: Mark the point where Siti reaches school at (30, 3).
      Step 4: Draw a straight line connecting these two points.
      Step 5: Interpretation: The graph shows a constant speed since the line is straight, indicating uniform movement.

  - id: WE-02
    topic: "Menyelesaikan Masalah Menggunakan Graf Jarak-Masa"
    difficulty: medium
    real_world_analogy: "Think of a bus trip where you stop to rest, and then continue at a different speed."
    misconception_alert: "Students might assume speed is constant if they're not careful with sections of the graph that are horizontal."
    scenario: "Ali memandu sejauh 100 km ke bandar. Dia berhenti rehat setelah 40 km selama 30 minit sebelum meneruskan perjalanan. Lukis dan tafsirkan graf jarak-masa."
    working: |
      Step 1: Plot time on the horizontal axis and distance on the vertical axis.
      Step 2: Draw a line from (0, 0) to (1, 40) to represent the first part of the journey.
      Step 3: Draw a horizontal line from (1, 40) to (1.5, 40) to represent the rest period.
      Step 4: Continue the line from (1.5, 40) to (3, 100) to complete the journey.
      Step 5: Interpretation: The graph shows two segments with different slopes, indicating different speeds, and a horizontal segment indicating a rest period.

  - id: WE-03
    topic: "Membuat Perkaitan dan Mentafsir Graf Laju-Masa"
    difficulty: hard
    real_world_analogy: "Consider a cycling race where the cyclist speeds up, maintains speed, and then slows down."
    misconception_alert: "Students may overlook the fact that the area under the speed-time graph represents distance."
    scenario: "Seorang pelumba basikal bergerak dengan laju 5 m/s selama 20 saat, kemudian memecut hingga 10 m/s dalam masa 10 saat, dan akhirnya memperlahankan hingga berhenti dalam 5 saat. Lukis dan tafsirkan graf laju-masa serta hitung jarak yang dilalui."
    working: |
      Step 1: Plot time on the horizontal axis and speed on the vertical axis.
      Step 2: Draw a horizontal line at 5 m/s from (0, 0) to (20, 5).
      Step 3: Draw a line increasing from (20, 5) to (30, 10) to represent acceleration.
      Step 4: Draw a line decreasing from (30, 10) to (35, 0) to represent deceleration.
      Step 5: Calculate the total distance by finding the area under each section:
        - Rectangle (0 to 20s): 5 m/s * 20 s = 100 m
        - Trapezium (20 to 30s): 0.5 * (5 + 10) * 10 s = 75 m
        - Triangle (30 to 35s): 0.5 * 10 * 5 s = 25 m
      Step 6: Sum the areas: 100 m + 75 m + 25 m = 200 m
      Step 7: Interpretation: The graph shows different phases of motion, and the total distance covered is 200 meters.