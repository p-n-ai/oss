topic_id: MT4-05
provenance: ai-generated

questions:
  # Learning Objective 5.1.1
  - id: Q1
    text: 'Tentukan sama ada graf berikut merupakan rangkaian dan terangkan jawapan anda.'
    difficulty: medium
    learning_objective: 5.1.1
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Graf ini merupakan rangkaian kerana ia terdiri daripada nod dan arka yang menghubungkan nod-nod tersebut.'
      working: |
        Untuk menentukan sama ada graf adalah rangkaian, kita perlu memastikan terdapat nod dan arka yang menghubungkannya. 
        Contoh: Jika graf mempunyai nod A, B, C dan arka AB, BC, maka ia adalah rangkaian.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengidentifikasi nod dan arka dalam graf."
      - marks: 2
        criteria: "Memberi penjelasan kenapa graf tersebut adalah rangkaian."
    hints:
      - level: 1
        text: "Pastikan graf mempunyai nod dan arka."

  # Learning Objective 5.1.2
  - id: Q2
    text: 'Bandingkan graf terarah dengan graf tak terarah dari segi struktur dan maklumat yang disampaikan.'
    difficulty: medium
    learning_objective: 5.1.2
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: 'Graf terarah mempunyai arka yang mempunyai arah, menunjukkan hubungan satu arah. Graf tak terarah tidak mempunyai arah pada arka, menunjukkan hubungan dua arah.'
      working: |
        Dalam graf terarah, setiap arka mempunyai arah tertentu, menunjukkan hubungan atau aliran dari satu nod ke nod lain. 
        Sebaliknya, dalam graf tak terarah, arka tidak mempunyai arah, menunjukkan hubungan dua hala.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyatakan ciri graf terarah."
      - marks: 1
        criteria: "Menyatakan ciri graf tak terarah."
      - marks: 1
        criteria: "Membandingkan kedua-dua jenis graf."
    hints:
      - level: 1
        text: "Perhatikan arah arka dalam graf terarah."

  # Learning Objective 5.1.3
  - id: Q3
    text: 'Lukiskan subgraf dan pokok bagi graf berikut yang mempunyai nod A, B, C, D dan arka AB, BC, CD, DA.'
    difficulty: medium
    learning_objective: 5.1.3
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: 'Subgraf: Nod A, B, C dan arka AB, BC. Pokok: Nod A, B, C, D dan arka AB, BC, CD.'
      working: |
        Subgraf adalah sebahagian dari graf asal. Pilih beberapa nod dan arka yang menghubungkannya. 
        Pokok adalah graf yang menghubungkan semua nod tanpa membentuk kitaran. Pilih arka yang menghubungkan semua nod.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Melukis subgraf dengan betul."
      - marks: 2
        criteria: "Melukis pokok dengan betul."
    hints:
      - level: 1
        text: "Subgraf hanya perlu sebahagian dari graf asal. Pokok mesti menghubungkan semua nod."

  # Learning Objective 5.1.4
  - id: Q4
    text: 'Diberikan maklumat: Alice berkawan dengan Bob, dan Bob berkawan dengan Charlie. Lukiskan ini sebagai rangkaian.'
    difficulty: medium
    learning_objective: 5.1.4
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: 'Nod: Alice, Bob, Charlie. Arka: Alice-Bob, Bob-Charlie.'
      working: |
        Setiap orang menjadi nod dalam graf. Hubungan persahabatan menjadi arka yang menghubungkan nod.
        Alice dan Bob dihubungkan dengan arka, dan Bob dan Charlie dihubungkan dengan arka lain.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mewakilkan setiap individu sebagai nod."
      - marks: 1
        criteria: "Menghubungkan nod-nod yang berkaitan dengan arka."
    hints:
      - level: 1
        text: "Setiap hubungan diwakili sebagai arka antara dua nod."

  # Learning Objective 5.1.5
  - id: Q5
    text: 'Selesaikan masalah berikut: Cari laluan terpendek dari nod A ke nod D dalam graf berpemberat yang mempunyai arka AB (2), BC (3), CD (1), dan AD (4).'
    difficulty: medium
    learning_objective: 5.1.5
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: 'Laluan terpendek: A-B-C-D, dengan panjang 6.'
      working: |
        Melalui laluan A-B-C-D, beratnya adalah 2 + 3 + 1 = 6. Laluan A-D mempunyai berat 4, tetapi tidak lebih pendek. 
        Laluan ini adalah yang terpendek.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menentukan berat setiap laluan."
      - marks: 2
        criteria: "Mengira jumlah berat bagi setiap laluan."
      - marks: 1
        criteria: "Memilih laluan dengan berat terpendek."
    hints:
      - level: 1
        text: "Periksa semua laluan dari A ke D dan bandingkan jumlah beratnya."