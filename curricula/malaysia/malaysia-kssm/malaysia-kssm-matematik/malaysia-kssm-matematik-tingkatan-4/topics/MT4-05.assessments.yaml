questions:
  # 5.1.1 - Recognize and explain a network as a graph
  - id: Q1
    text: "A simple graph has 8 edges. Calculate the sum of degrees for all vertices in this graph."
    difficulty: easy
    learning_objective: "5.1.1"
    tp_level: 1
    kbat: false
    answer:
      type: multiple_choice
      value: "16"
      working: |
        Step 1: Identify the formula for sum of degrees, which is $\sum d(v) = 2E$.
        Step 2: Substitute the number of edges ($E = 8$).
        Step 3: $\sum d(v) = 2(8) = 16$.
      distractors:
        - value: "8"
          feedback: "You only counted each edge once. Remember, each edge connects two vertices, so it contributes 2 to the total sum of degrees."
        - value: "4"
          feedback: "You divided the number of edges by 2. The formula is $2 \times E$, not $E/2$."
        - value: "10"
          feedback: "It seems you added 2 to the number of edges. Use the multiplication formula $\sum d(v) = 2E$."
    hints:
      - level: 1
        text: "Check the relationship between the number of edges and the sum of degrees in your textbook on page 131."
      - level: 2
        text: "Remember the 'Handshake Rule': every edge touches two points. If there are 8 edges, how many 'touches' are there in total?"

  # 5.1.2 - Compare and contrast graph types
  - id: Q2
    text: "Determine if the following statement is TRUE or FALSE: 'In a weighted graph, the edges must always represent physical distance between two locations.'"
    difficulty: medium
    learning_objective: "5.1.2"
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "FALSE"
      working: |
        Step 1: Recall the definition of a weighted graph.
        Step 2: Identify that 'weights' can represent various values such as cost, time, or current, not just distance.
    hints:
      - level: 1
        text: "Look at the 'Weighted Graph' table on page 137. What are the other examples of edge values besides distance?"

  # 5.1.3 - Identify and draw subgraphs and trees
  - id: Q3
    text: "A graph has 6 vertices. What is the exact number of edges required to form a tree for this graph?"
    difficulty: medium
    learning_objective: "5.1.3"
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "5"
      working: |
        Step 1: Identify the property of a tree related to vertices ($n$) and edges ($e$).
        Step 2: Use the formula $e = n - 1$.
        Step 3: $e = 6 - 1 = 5$.
    marks: 1
    rubric:
      - marks: 1
        criteria: "Correct number of edges based on the n-1 rule."
    hints:
      - level: 1
        text: "A tree is a simple graph where all vertices are connected without loops or cycles. How many lines do you need to connect 6 dots without making a circle?"

  # 5.1.4 - Represent information in the form of networks
  - id: Q4
    text: "Represent the following social connection as a network: Edmund plays Badminton and Chess. Azwan plays Football and Sepak Takraw. Rajan plays Chess and Football. Use types of games as vertices."
    difficulty: medium
    learning_objective: "5.1.4"
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Vertices: {Badminton, Chess, Football, Sepak Takraw}. Edges: {Edmund connects Badminton-Chess, Azwan connects Football-Sepak Takraw, Rajan connects Chess-Football}."
      working: |
        Step 1: Define vertices as the unique games mentioned.
        Step 2: Define edges as the individuals who link two games together.
        Step 3: Draw the connections: Badminton—(Edmund)—Chess—(Rajan)—Football—(Azwan)—Sepak Takraw.
    marks: 4
    rubric:
      - marks: 2
        criteria: "Correct identification of all 4 unique game vertices."
      - marks: 2
        criteria: "Correct edge connections representing the individuals."
    hints:
      - level: 1
        text: "Start by listing down every unique game mentioned. These will be your dots (vertices)."
      - level: 2
        text: "If one person plays two games, draw a line between those two games. That line represents that person."

  # 5.1.5 - Solve problems involving networks
  - id: Q5
    text: "A courier needs to deliver a package from Town A to Town D. Route A-B-D costs RM15 (20 mins). Route A-C-D costs RM12 (45 mins). If the courier has a time constraint and must arrive in less than 30 minutes, which route is the optimal choice? Justify your answer."
    difficulty: hard
    learning_objective: "5.1.5"
    tp_level: 5
    kbat: true
    answer:
      type: free_text
      value: "Route A-B-D is the optimal choice. Although it costs RM3 more, it is the only route that satisfies the time constraint of < 30 minutes (20 mins vs 45 mins)."
      working: |
        Step 1: Analyze weights for Route 1 (A-B-D): Cost=15, Time=20.
        Step 2: Analyze weights for Route 2 (A-C-D): Cost=12, Time=45.
        Step 3: Apply the constraint (Time < 30). Only Route 1 satisfies this.
        Step 4: Conclude that cost optimization is secondary to the mandatory time constraint.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Identification of weights for both routes."
      - marks: 1
        criteria: "Correct application of the time constraint."
      - marks: 2
        criteria: "Logical justification for choosing the more expensive but faster route."
    hints:
      - level: 1
        text: "Sometimes 'optimal' doesn't mean cheapest. Look at the 'constraint' mentioned in the question. What is the most important factor here?"