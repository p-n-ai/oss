questions:
  # Learning Objective 4.1.1: Menentu dan menghuraikan persilangan set menggunakan pelbagai perwakilan
  - id: Q1
    text: "Diberikan dua set $A = \\{1, 2, 3, 4\\}$ dan $B = \\{3, 4, 5, 6\\}$. Tentukan persilangan set $A$ dan $B$."
    difficulty: medium
    learning_objective: 4.1.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "{3, 4}"
      working: |
        Persilangan set $A$ dan $B$ adalah elemen-elemen yang ada dalam kedua-dua set. 
        Oleh itu, persilangan $A \cap B = \\{3, 4\\}$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan satu elemen yang betul dalam persilangan."
      - marks: 1
        criteria: "Menentukan semua elemen dalam persilangan dengan betul."
    hints:
      - level: 1
        text: "Cari elemen yang ada dalam kedua-dua set $A$ dan $B$."

  # Learning Objective 4.1.2: Menentukan pelengkap bagi persilangan set
  - id: Q2
    text: "Jika $U = \\{1, 2, 3, 4, 5, 6\\}$ adalah set semesta, tentukan pelengkap bagi persilangan set $A = \\{1, 2, 3\\}$ dan $B = \\{3, 4, 5\\}$."
    difficulty: medium
    learning_objective: 4.1.2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "{1, 2, 4, 5, 6}"
      working: |
        Mula-mula, tentukan persilangan $A \cap B = \\{3\\}$.
        Pelengkap kepada persilangan tersebut dalam set semesta $U$ ialah $U - (A \cap B) = \\{1, 2, 4, 5, 6\\}$.
    marks: 3
    rubric:
      - marks: 1
        criteria: 'Menentukan persilangan $A \cap B$ dengan betul.'
      - marks: 1
        criteria: "Menentukan elemen pelengkap dengan betul."
      - marks: 1
        criteria: "Menulis jawapan akhir dengan betul dalam set semesta."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Jangan lupa untuk mengeluarkan elemen persilangan dari set semesta."

  # Learning Objective 4.1.3: Menyelesaikan masalah yang melibatkan persilangan set
  - id: Q3
    text: "Di dalam sebuah kelas, 18 orang pelajar suka Matematik, 15 orang suka Sains, dan 10 orang suka kedua-dua subjek. Berapakah jumlah pelajar yang suka sekurang-kurangnya satu subjek?"
    difficulty: medium
    learning_objective: 4.1.3
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "23"
      working: |
        Gunakan formula $n(A \cup B) = n(A) + n(B) - n(A \cap B)$.
        $n(A \cup B) = 18 + 15 - 10 = 23$.
        Jadi, terdapat 23 pelajar yang suka sekurang-kurangnya satu subjek.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira bilangan pelajar yang suka Matematik dan Sains dengan betul."
      - marks: 1
        criteria: "Menggunakan formula gabungan dengan betul."
      - marks: 1
        criteria: "Menulis jawapan akhir dengan betul."
    hints:
      - level: 1
        text: 'Guna formula $n(A \cup B) = n(A) + n(B) - n(A \cap B)$.'

  # Learning Objective 4.2.1: Menentu dan menghuraikan kesatuan set menggunakan pelbagai perwakilan
  - id: Q4
    text: "Diberikan dua set $C = \\{a, b, c\\}$ dan $D = \\{b, c, d, e\\}$. Tentukan kesatuan set $C$ dan $D$."
    difficulty: medium
    learning_objective: 4.2.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "{a, b, c, d, e}"
      working: |
        Kesatuan set $C \cup D$ adalah elemen-elemen yang ada dalam sekurang-kurangnya satu set.
        Oleh itu, $C \cup D = \\{a, b, c, d, e\\}$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menentukan elemen-elemen dalam kesatuan dengan betul."
      - marks: 1
        criteria: "Menulis semua elemen tanpa pengulangan."
    hints:
      - level: 1
        text: "Gabungkan elemen-elemen dari kedua-dua set tanpa mengulangi elemen."

  # Learning Objective 4.3.3: Menyelesaikan masalah yang melibatkan gabungan operasi set
  - id: Q5
    text: 'Jika $E = \\{x | x < 5\\}$ dan $F = \\{x | x \geq 3\\}$, tentukan $E \cap F$ dan kemudian cari pelengkapnya dalam set semesta $U = \\{x | x \leq 7\\}$.'
    difficulty: medium
    learning_objective: 4.3.3
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: "{3, 4}, {5, 6, 7}"
      working: |
        Tentukan persilangan $E \cap F = \\{3, 4\\}$ kerana elemen tersebut memenuhi kedua-dua syarat $x < 5$ dan $x \geq 3$.
        Pelengkap dalam set semesta $U$ ialah $U - (E \cap F) = \\{5, 6, 7\\}$.
    marks: 4
    rubric:
      - marks: 1
        criteria: 'Menentukan $E \cap F$ dengan betul.'
      - marks: 1
        criteria: 'Menentukan pelengkap $E \cap F$ dalam $U$ dengan betul.'
      - marks: 1
        criteria: "Menulis persilangan dan pelengkap dengan betul."
      - marks: 1
        criteria: "Memahami dan menerapkan konsep set semesta dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan syarat untuk kedua-dua persilangan dan pelengkap dalam konteks set semesta."