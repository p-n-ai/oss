id: "MT4-07"
official_ref: "7.0"
name_en: "Graphs of Motion"
description: "Analysis of object movement through distance-time and speed-time graphs, focusing on gradients as rates of change and area under graphs as distance."
ai_teaching_notes: "MT4-07.teaching.md"
assessments_file: "MT4-07.assessments.yaml"
examples_file: "MT4-07.examples.yaml"

content_standards:
  - id: "MT4-07-7-1"
    text_en: "Distance-Time Graphs"
    learning_objectives:
      - id: "MT4-07-7-1-1"
        text_en: "Draw distance-time graphs."
        tp: 1
      - id: "MT4-07-7-1-2"
        text_en: "Interpret distance-time graphs and describe the motion based on the graphs."
        tp: 2
      - id: "MT4-07-7-1-3"
        text_en: "Solve problems involving distance-time graphs."
        tp: 4
  - id: "MT4-07-7-2"
    text_en: "Speed-Time Graphs"
    learning_objectives:
      - id: "MT4-07-7-2-1"
        text_en: "Draw speed-time graphs."
        tp: 1
      - id: "MT4-07-7-2-2"
        text_en: "Make a relationship between the area under speed-time graph and the distance travelled, and hence determine the distance."
        tp: 3
      - id: "MT4-07-7-2-3"
        text_en: "Interpret speed-time graphs and describe the movement based on the graphs."
        tp: 2
      - id: "MT4-07-7-2-4"
        text_en: "Solve problems involving speed-time graphs."
        tp: 5

pedagogical_sequence:
  - "Identify that the vertical axis represents distance or speed and the horizontal axis represents time."
  - "Understand that the gradient of a distance-time graph represents speed."
  - "Recognize zero gradient in distance-time graphs as a stationary state."
  - "Relate the area under a speed-time graph to the total distance travelled."
  - "Interpret the gradient of a speed-time graph as acceleration (positive) or deceleration (negative)."
  - "Apply the 4-step problem-solving strategy (Understand, Plan, Solve, Verify) for complex routine and non-routine problems."

misconceptions:
  - misconception: "Confusing the horizontal line in distance-time graphs (stationary) with speed-time graphs (uniform speed)."
    remediation: "Directly compare Diagram 1 and Diagram 2 to show how the Y-axis label changes the entire meaning of a flat line."
  - misconception: "Calculating speed/distance without converting time units (minutes to hours)."
    remediation: "Enforce a 'Unit Check' before any calculation; if speed is in km/h, time MUST be in hours."
  - misconception: "Assuming a negative gradient in a speed-time graph means moving backwards."
    remediation: "Clarify that negative gradient here indicates deceleration, while the object continues to move in the same direction."

engagement_hooks:
  - "Analyze the world record 100m sprint of national Paralympic hero Mohamad Ridzuan Puzi."
  - "The 'Pocket Rocketman' Challenge: How the speed of track cycling champion Azizulhasni Awang changes during a race."
  - "Real-world transportation data: Estimating flight duration from KLIA2 to Miri using graphs."

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

prerequisites:
  - "Form 1: Basic linear equations and plotting coordinates on a grid."
  - "Form 2: Relationship between speed, distance, and time (Speed = Distance / Time)."
  - "General: Calculation of area for rectangles, triangles, and trapeziums."

sync_checked: true
