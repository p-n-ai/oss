questions:
  # Learning Objective 9.1.1
  - id: Q1
    text: "Dalam satu kotak terdapat 3 bola merah dan 2 bola biru. Senaraikan semua peristiwa bergabung yang mungkin apabila dua bola dipilih secara rawak."
    difficulty: medium
    learning_objective: 9.1.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "MM, MB, BM, BB"
      working: |
        Terdapat dua jenis bola, merah (M) dan biru (B). Apabila dua bola dipilih:
        1. Pilihan pertama: 3 M dan 2 B.
        2. Pilihan kedua: 2 M dan 1 B (jika M dipilih dahulu) atau 3 M dan 1 B (jika B dipilih dahulu).
        Jadi, peristiwa bergabung yang mungkin: MM, MB, BM, BB.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menyenaraikan dua peristiwa yang betul."
      - marks: 1
        criteria: "Menyenaraikan semua peristiwa bergabung yang mungkin."
    hints:
      - level: 1
        text: "Ingat bahawa urutan pemilihan bola adalah penting."
  
  # Learning Objective 9.2.2
  - id: Q2
    text: "Dua dadu dilambung serentak. Apakah kebarangkalian bahawa salah satu dadu menunjukkan nombor 6?"
    difficulty: medium
    learning_objective: 9.2.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "11/36"
      working: |
        Kebarangkalian satu dadu menunjukkan 6 adalah 1/6.
        Oleh itu, kebarangkalian salah satu dadu menunjukkan nombor 6 adalah:
        P(A atau B) = P(A) + P(B) - P(A dan B)
        = 1/6 + 1/6 - 1/36
        = 11/36
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira kebarangkalian satu dadu menunjukkan 6."
      - marks: 1
        criteria: "Menggunakan rumus P(A atau B) dengan betul."
      - marks: 1
        criteria: "Mengira kebarangkalian akhir dengan betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Pastikan untuk tolak kebarangkalian kedua-dua dadu menunjukkan 6."

  # Learning Objective 9.2.3
  - id: Q3
    text: "Dalam satu permainan, jika anda memenangi pusingan pertama, kebarangkalian anda memenangi pusingan kedua adalah 0.7. Jika anda kalah dalam pusingan pertama, kebarangkalian anda memenangi pusingan kedua adalah 0.4. Apakah kebarangkalian anda memenangi pusingan kedua?"
    difficulty: medium
    learning_objective: 9.2.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "0.55"
      working: |
        Diberi:
        P(Menang P1) = 0.5, P(Menang P2 | Menang P1) = 0.7
        P(Kalah P1) = 0.5, P(Menang P2 | Kalah P1) = 0.4
        Kebarangkalian memenangi pusingan kedua adalah:
        P(Menang P2) = P(Menang P2 | Menang P1) × P(Menang P1) + P(Menang P2 | Kalah P1) × P(Kalah P1)
        = 0.7 × 0.5 + 0.4 × 0.5
        = 0.35 + 0.2
        = 0.55
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menentukan kebarangkalian memenangi pusingan pertama."
      - marks: 1
        criteria: "Menggunakan rumus kebarangkalian bersyarat dengan betul."
      - marks: 1
        criteria: "Menentukan kebarangkalian akhir dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan dua senario: menang dan kalah dalam pusingan pertama."

  # Learning Objective 9.3.2
  - id: Q4
    text: "Apakah kebarangkalian sekurang-kurangnya satu daripada dua kad yang dipilih dari dek 52 kad adalah hati?"
    difficulty: medium
    learning_objective: 9.3.2
    tp_level: 4
    kbat: true
    answer:
      type: exact
      value: "0.6243"
      working: |
        Kebarangkalian tiada kad hati dipilih:
        P(Tiada hati) = (39/52) × (38/51)
        = 0.5588
        Oleh itu, kebarangkalian sekurang-kurangnya satu hati dipilih:
        P(Sekurang-kurangnya satu hati) = 1 - P(Tiada hati)
        = 1 - 0.5588
        = 0.4412
        = 0.6243
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira kebarangkalian tiada kad hati dipilih."
      - marks: 1
        criteria: "Menggunakan konsep pelengkap untuk kebarangkalian."
      - marks: 1
        criteria: "Mengira kebarangkalian akhir dengan tepat."
    hints:
      - level: 1
        text: "Gunakan pelengkap dan kira kebarangkalian tiada kad hati dipilih dahulu."

  # Learning Objective 9.4.1
  - id: Q5
    text: "Ali dan Abu bermain dadu. Jika Ali mendapat nombor ganjil, dia menang. Jika Abu mendapat nombor lebih besar dari 4, dia menang. Apakah kebarangkalian kedua-dua mereka menang?"
    difficulty: medium
    learning_objective: 9.4.1
    tp_level: 4
    kbat: false
    answer:
      type: exact
      value: "1/12"
      working: |
        Kebarangkalian Ali menang (nombor ganjil): P(Ali) = 3/6 = 1/2
        Kebarangkalian Abu menang (nombor lebih besar dari 4): P(Abu) = 2/6 = 1/3
        Kebarangkalian kedua-duanya menang:
        P(Ali dan Abu) = P(Ali) × P(Abu)
        = (1/2) × (1/3)
        = 1/6
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira kebarangkalian Ali menang."
      - marks: 1
        criteria: "Mengira kebarangkalian Abu menang."
      - marks: 1
        criteria: "Mengira kebarangkalian kedua-duanya menang dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan kebarangkalian setiap pemain menang secara terpisah dahulu."