topic_id: MT4-05
provenance: ai-generated
description: "Worked examples for RANGKAIAN DALAM TEORI GRAF"
worked_examples:
  - id: WE-01
    topic: "Mengenal dan menerangkan rangkaian sebagai graf"
    difficulty: easy
    real_world_analogy: "Bayangkan rangkaian jalan raya di sebuah bandar di mana setiap jalan adalah satu hubungan antara dua lokasi."
    misconception_alert: "Pelajar sering menyangka setiap titik mesti mempunyai bilangan tepi yang sama, tetapi tidak semestinya."
    scenario: "Anda diminta untuk mengenal pasti rangkaian jalan di dalam kawasan perumahan baru sebagai graf."
    working: |
      Step 1: Kenal pasti lokasi utama seperti rumah, taman, dan kedai sebagai nod dalam graf.
      Step 2: Hubungkan setiap nod dengan jalan yang wujud di antara mereka sebagai tepi.
      Step 3: Pastikan semua lokasi dan jalan diwakili dengan betul dalam graf. Graf selesai apabila semua hubungan dijelaskan.

  - id: WE-02
    topic: "Membanding beza graf terarah dengan graf tak terarah"
    difficulty: medium
    real_world_analogy: "Fikirkan tentang aliran trafik di mana jalan sehala mewakili graf terarah dan jalan dua hala mewakili graf tak terarah."
    misconception_alert: "Kesilapan biasa ialah menganggap semua graf boleh menjadi terarah atau tak terarah dengan mudah, tetapi sifat hubungan menentukan arahnya."
    scenario: "Bandingkan antara rangkaian trafik yang menggunakan graf terarah dengan sistem komunikasi dua hala yang menggunakan graf tak terarah."
    working: |
      Step 1: Kenal pasti sifat hubungan dalam setiap situasi. Untuk trafik, hubungan adalah sehala; untuk komunikasi, ia adalah dua hala.
      Step 2: Lakarkan graf terarah untuk aliran trafik di mana setiap jalan menunjukkan arah aliran.
      Step 3: Lukiskan graf tak terarah untuk komunikasi di mana setiap sambungan adalah dua hala, dan tiada arah perlu ditentukan.

  - id: WE-03
    topic: "Menyelesaikan masalah yang melibatkan rangkaian"
    difficulty: hard
    real_world_analogy: "Bayangkan mencari laluan terpendek untuk penghantaran barang dari satu tempat ke tempat lain melalui jaringan jalan."
    misconception_alert: "Pelajar mungkin tersilap memilih laluan yang kelihatan terpendek secara visual tanpa mempertimbangkan pemberat sebenar pada tepi."
    scenario: "Cari laluan terpendek dari kilang ke kedai menggunakan rangkaian jalan yang mempunyai jarak berlainan antara titik."
    working: |
      Step 1: Tentukan semua nod dan tepi serta jarak antara setiap nod dalam rangkaian.
      Step 2: Gunakan algoritma Dijkstra untuk mengira jarak terpendek dari kilang ke setiap nod lain.
      Step 3: Jejaki laluan dari kilang ke kedai dengan jarak terkumpul paling rendah untuk mendapatkan laluan terpendek.