worked_examples:
  # Objektif Pembelajaran 7.1.1: Melukis graf jarak-masa (TP1)
  - id: WE-01
    topic: "Melukis Graf Jarak-Masa"
    learning_objective: "MT4-07-7-1-1"
    difficulty: "easy"
    real_world_analogy: "Bayangkan 'progress bar' dalam video YouTube. Apabila masa (Paksi-X) berjalan, 'jarak' cerita (Paksi-Y) bertambah. Jika anda 'pause' video, masa tetap berjalan tetapi jarak cerita tidak berubah (garis mendatar)."
    misconception_alert: "Pelajar sering tertukar paksi. Ingat: Masa adalah pemboleh ubah tidak bersandar dan sentiasa berada di Paksi-X (mendatar). Jarak bergantung kepada masa, jadi ia berada di Paksi-Y (mencancang)."
    scenario: "Azreen sedang berlatih berbasikal untuk menjadi seperti jaguh negara, Azizulhasni Awang. Dalam satu sesi latihan, dia mencatatkan jarak 10 km dalam 30 minit pertama dan mencapai jarak keseluruhan 20 km pada minit ke-60. Lukiskan graf jarak-masa untuk perjalanan Azreen."
    working: |
      1. Kenal pasti koordinat daripada senario:
         - Waktu mula: $(0 \text{ min}, 0 \text{ km})$
         - Selepas 30 minit: $(30, 10)$
         - Selepas 60 minit: $(60, 20)$
      2. Lukis paksi: 
         - Paksi mengufuk: Masa (minit) dengan skala 30 minit setiap unit.
         - Paksi mencancang: Jarak (km) dengan skala 10 km setiap unit.
      3. Plot titik-titik:
         - Plot titik O pada $(0,0)$.
         - Plot titik A pada $(30,10)$.
         - Plot titik B pada $(60,20)$.
      4. Sambungkan titik: Lukis garis lurus dari $(0,0)$ melalui $(30,10)$ ke $(60,20)$.
      5. Tafsiran: Oleh sebab garis itu lurus, Azreen berbasikal dengan laju seragam.

  # Objektif Pembelajaran 7.1.3: Menyelesaikan masalah graf jarak-masa (TP4)
  - id: WE-02
    topic: "Mengira Laju dan Mengendalikan Tempoh Pegun"
    learning_objective: "MT4-07-7-1-3"
    difficulty: "medium"
    real_world_analogy: "Fikirkan pemandu GrabCar yang sedang menunggu di lampu isyarat. Jam (masa) terus berdetik, tetapi odometer (jarak) tidak bertambah. Ini mewujudkan 'garis mendatar' pada graf perjalanan anda."
    misconception_alert: "Garis mengufuk dalam graf jarak-masa TIDAK bermaksud objek itu hilang atau bergerak dengan laju malar. Ia bermaksud objek itu pegun (laju = 0)."
    scenario: "Encik Selva memandu sejauh 240 km dari Kuala Lumpur ke Kuantan. Dia berhenti rehat selepas 1 jam memandu (80 km) selama 30 minit. Dia kemudian melengkapkan baki perjalanannya dalam masa 1.5 jam. Hitung laju purata keseluruhan perjalanan dalam $km \ j^{-1}$."
    working: |
      1. Kenal pasti jumlah jarak: $240 \text{ km}$.
      2. Kenal pasti jumlah masa dalam peringkat:
         - Memandu sebelum rehat: $1 \text{ jam}$
         - Tempoh rehat: $30 \text{ minit} = \frac{30}{60} = 0.5 \text{ jam}$
         - Peringkat akhir: $1.5 \text{ jam}$
      3. Hitung Jumlah Masa: $1 + 0.5 + 1.5 = 3 \text{ jam}$.
      4. Gunakan formula Laju Purata: $\text{Laju Purata} = \frac{\text{Jumlah Jarak}}{\text{Jumlah Masa}}$
      5. Gantikan nilai: $\text{Laju Purata} = \frac{240 \text{ km}}{3 \text{ jam}}$
      6. Jawapan Akhir: $80 \text{ km} \ j^{-1}$.

  # Objektif Pembelajaran 7.2.2: Luas di bawah graf laju-masa (TP3)
  - id: WE-03
    topic: "Menentukan Jarak daripada Graf Laju-Masa"
    learning_objective: "MT4-07-7-2-2"
    difficulty: "medium"
    real_world_analogy: "Bayangkan anda sedang mengecat dinding. 'Laju' ialah lebar berus anda, dan 'Masa' ialah sejauh mana anda meleretkan berus itu. Jumlah 'Luas' yang dilitupi cat mewakili jumlah 'Jarak' yang anda lalui."
    misconception_alert: "Pelajar sering lupa menyemak unit masa. Jika laju dalam $km \ j^{-1}$ tetapi masa dalam 'minit', anda MESTI membahagi minit dengan 60 sebelum mengira luas."
    scenario: "Sebuah motosikal bergerak dengan laju seragam $20 \ m \ s^{-1}$ selama 15 saat. Ia kemudian mengalami nyahpecutan seragam sehingga berhenti dalam masa 5 saat. Hitung jumlah jarak yang dilalui."
    working: |
      1. Kenal pasti bentuk di bawah graf laju-masa:
         - Bahagian 1 (0-15s): Segi empat tepat (Laju seragam).
         - Bahagian 2 (15-20s): Segi tiga (Nyahpecutan).
      2. Kira Luas Segi Empat Tepat: $\text{Tapak} \times \text{Tinggi} = 15 \text{ s} \times 20 \ m \ s^{-1} = 300 \text{ m}$.
      3. Kira Luas Segi Tiga: $\frac{1}{2} \times \text{Tapak} \times \text{Tinggi} = \frac{1}{2} \times (20 - 15) \text{ s} \times 20 \ m \ s^{-1}$
      4. Permudahkan pengiraan segi tiga: $0.5 \times 5 \text{ s} \times 20 \ m \ s^{-1} = 50 \text{ m}$.
      5. Jumlah Jarak = $\text{Luas 1} + \text{Luas 2} = 300 \text{ m} + 50 \text{ m}$.
      6. Jawapan Akhir: $350 \text{ m}$.

  # Objektif Pembelajaran 7.2.4: Menyelesaikan masalah graf laju-masa (TP5)
  - id: WE-04
    topic: "Menyelesaikan Masalah Gerakan Kompleks"
    learning_objective: "MT4-07-7-2-4"
    difficulty: "hard"
    real_world_analogy: "Perlumbaan pelari pecut: Permulaan yang bertenaga (pecutan), mengekalkan kelajuan maksimum (laju seragam), dan memperlahankan diri selepas garisan penamat (nyahpecutan)."
    misconception_alert: "Dalam graf laju-masa, kecerunan negatif bermaksud 'Nyahpecutan', bukan bergerak ke belakang! Objek masih bergerak ke hadapan, cuma semakin perlahan."
    scenario: "Sebuah kereta memecut dari keadaan pegun sehingga mencapai laju $v \ m \ s^{-1}$ dalam masa 10 saat. Kereta itu mengekalkan laju ini selama 20 saat. Jumlah jarak yang dilalui dalam 30 saat itu ialah 500 m. Hitung nilai $v$."
    working: |
      1. Kenal pasti bentuk di bawah graf: Trapezium.
         - Sisi selari: $a = 20 \text{ s}$ (bahagian laju seragam), $b = 30 \text{ s}$ (jumlah masa).
         - Tinggi: $h = v \ m \ s^{-1}$.
      2. Bentukkan formula luas: $\text{Jarak} = \frac{1}{2} \times (a + b) \times h$.
      3. Gantikan nilai yang diketahui: $500 = \frac{1}{2} \times (20 + 30) \times v$.
      4. Permudahkan dalam kurungan: $500 = \frac{1}{2} \times 50 \times v$.
      5. Selesaikan pengiraan: $500 = 25v$.
      6. Cari nilai $v$: $v = \frac{500}{25}$.
      7. Jawapan Akhir: $v = 20 \ m \ s^{-1}$.
