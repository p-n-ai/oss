teaching:
  sequence:
    - "Langkah 1: Perkenalkan konsep asas nombor (2, 8, 10, dan lain-lain) menggunakan carta nilai tempat dan gambar rajah konkrit."
    - "Langkah 2: Tunjukkan kaedah penukaran antara asas (Asas 10 ke asas lain dan sebaliknya) menggunakan nilai tempat dan pembahagian."
    - "Langkah 3: Ajar kaedah pintas untuk menukar antara Asas 2 dan Asas 8 menggunakan pengumpulan."
    - "Langkah 4: Berlatih operasi tambah dan tolak dalam pelbagai asas menggunakan Bentuk Lazim dan kaedah Penukaran Asas."
    - "Langkah 5: Aplikasikan konsep untuk menyelesaikan masalah dunia sebenar yang melibatkan teknologi dan senario kehidupan harian."
common_misconceptions:
  - misconception: "Semua asas menggunakan digit yang sama seperti sistem perpuluhan (0-9)."
    remediation: "Tekankan bahawa setiap asas 'n' hanya menggunakan digit dari 0 sehingga (n-1). Contohnya, Asas 2 hanya menggunakan 0 dan 1."
  - misconception: "Operasi aritmetik (kumpul semula dan pinjam) mengikut peraturan asas 10 dalam semua sistem."
    remediation: "Kukuhkan bahawa nilai kumpul semula atau nilai pinjam adalah sama dengan asas yang digunakan (contohnya, dalam asas 5, kumpul semula 1 mewakili nilai 5)."
  - misconception: "Menukar antara asas adalah proses rawak tanpa asas matematik."
    remediation: "Kukuhkan kaitan antara nilai tempat dan proses pengumpulan untuk membuktikan logik penukaran."
engagement_hooks:
  - "Bincangkan bagaimana komputer menggunakan binari (asas 2) dan heksadesimal (asas 16) untuk memproses data dan storan."
  - "Teroka sumbangan sejarah Brahmagupta dalam memperkenalkan digit 0, yang menjadi asas kepada semua asas nombor."
  - "Hubungkaitkan asas nombor dengan pengekodan di sebalik skrin digital dan alamat memori dalam sains komputer."
