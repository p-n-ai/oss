teaching:
  sequence:
    - "Langkah 1: Perkenalkan ketaksamaan linear melalui situasi kehidupan sebenar (15 min)"
    - "Langkah 2: Ajar cara melukis graf ketaksamaan linear dan teknik melorek rantau (20 min)"
    - "Langkah 3: Terangkan sistem ketaksamaan linear dan pengenalpastian rantau sepunya (25 min)"
  common_misconceptions:
    - misconception: "Menganggap semua garis ketaksamaan adalah garis padu (tidak membezakan garis sempang)."
      remediation: "Tekankan perbezaan antara simbol >/< (garis sempang) dan ≥/≤ (garis padu) melalui latihan visual di papan graf."
    - misconception: "Memilih rantau berlorek secara rawak tanpa melakukan ujian titik."
      remediation: "Wajibkan penggunaan 'titik ujian' (seperti (0,0)) untuk mengesahkan sama ada rantau tersebut memuaskan ketaksamaan atau tidak."
  engagement_hooks:
    - "Gunakan senario usahawan muda di Malaysia (seperti menjual nasi lemak telur vs ayam) untuk menentukan kombinasi jualan bagi mencapai keuntungan sasaran."
    - "Bincangkan had kapasiti dan kos dalam merancang kem kepimpinan sekolah (contoh: bilangan peserta vs bajet makanan)."
