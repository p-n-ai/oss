teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada konsep serakan dan perwakilan visual menggunakan plot titik serta plot batang-dan-daun (Halaman 212-217)."
    - "Langkah 2: Menghitung sukatan serakan: Julat, Julat Antara Kuartil (JAK), Varians, dan Sisihan Piawai (Halaman 219-223)."
    - "Langkah 3: Menilai kelebihan/kekurangan sukatan serakan dan membina plot kotak (Halaman 224-227)."
    - "Langkah 4: Menyiasat kesan perubahan data, termasuk kesan pencilan, terhadap nilai sukatan serakan (Halaman 228-233)."
    - "Langkah 5: Membandingkan set data menggunakan sukatan serakan dan kecenderungan memusat untuk analisis menyeluruh (Halaman 234-235)."
    - "Langkah 6: Penyelesaian masalah dunia sebenar dan eksplorasi matematik (Halaman 236-241)."
common_misconceptions:
  - misconception: "Mengelirukan serakan dengan kecenderungan memusat."
    remediation: "Jelaskan bahawa kecenderungan memusat menghuraikan 'pusat' data (min/median), manakala serakan menghuraikan 'taburan' di sekitar pusat tersebut."
  - misconception: "Lupa untuk menguasakan dua beza nilai apabila menghitung varians."
    remediation: "Tekankan langkah-langkah formula di mana $(x - \bar{x})^2$ diperlukan sebelum mencari purata."
  - misconception: "Menganggap varians dan sisihan piawai mempunyai unit yang sama dengan data asal."
    remediation: "Terangkan bahawa sisihan piawai adalah punca kuasa dua varians, yang mengembalikan ukuran kepada unit asal data."
engagement_hooks:
  - "Gunakan data pungutan pingat Sukan SEA untuk membincangkan mengapa melihat 'jumlah pingat' sahaja tidak menunjukkan konsistensi prestasi sesebuah negara."
  - "Bandingkan gaji pekerja di syarikat yang berbeza untuk melihat syarikat mana yang mempunyai agihan gaji yang lebih 'adil' atau setara."
