quality_level: 3
provenance: "official-dskp-aligned"
teaching:
  sequence:
    - "Langkah 1: Perkenalkan konsep peristiwa bergabung dan ruang sampel menggunakan eksperimen seperti melambung syiling atau dadu (20 min)"
    - "Langkah 2: Bezakan peristiwa bersandar dan tak bersandar menggunakan senario 'dengan pemulangan' dan 'tanpa pemulangan' (25 min)"
    - "Langkah 3: Tentusahkan hukum pendaraban bagi peristiwa tak bersandar: P(A dan B) = P(A) x P(B) (20 min)"
    - "Langkah 4: Bezakan peristiwa saling eksklusif dan tidak saling eksklusif menggunakan gambar rajah Venn (25 min)"
    - "Langkah 5: Aplikasikan hukum penambahan: P(A atau B) = P(A) + P(B) - P(A dan B) (30 min)"
    - "Langkah 6: Selesaikan masalah rutin dan bukan rutin yang kompleks menggunakan gambar rajah pokok dan set (30 min)"
common_misconceptions:
  - misconception: "Menganggap semua peristiwa bergabung adalah tak bersandar."
    remediation: "Tekankan bagaimana situasi 'tanpa pemulangan' mengubah jumlah ruang sampel dan kebarangkalian peristiwa seterusnya."
  - misconception: "Gagal menolak persilangan P(A dan B) bagi peristiwa tidak saling eksklusif."
    remediation: "Gunakan gambar rajah Venn untuk menunjukkan bahawa kawasan bertindih akan dikira dua kali jika tidak ditolak."
engagement_hooks:
  - "Gunakan konsep premium industri insurans tempatan untuk menjelaskan bagaimana kebarangkalian digunakan dalam pengurusan risiko."
  - "Simulasikan perlawanan 'Gunting-Batu-Kertas' untuk menyenaraikan kesudahan dan mengira kebarangkalian menang."
