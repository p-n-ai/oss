teaching_metadata:
  sequence:
    - "Langkah 1: Perkenalkan persilangan set menggunakan gambar rajah Venn dan unsur sepunya (20 min)"
    - "Langkah 2: Teroka kesatuan set dan konsep menggabungkan semua unsur (20 min)"
    - "Langkah 3: Menguasai gabungan operasi set, menekankan tertib operasi dan kurungan (25 min)"
  common_misconceptions:
    - misconception: "Keliru antara simbol persilangan (∩) dan kesatuan (∪)."
      remediation: "Gunakan mnemonik visual: 'n' untuk 'n' dalam persilangan (unsur sama) dan 'u' untuk 'union' atau gabungan semua."
    - misconception: "Terlepas pandang set semesta apabila menentukan pelengkap."
      remediation: "Sentiasa lukis segi empat tepat untuk set semesta dan kenal pasti unsur di luar set sasaran."
  engagement_hooks:
    - "Kaitkan operasi set dengan penapis media sosial (contoh: mencari kawan yang suka KEDUA-DUA bola sepak dan permainan video)."
    - "Gunakan senario 'Kelab Sekolah' di mana murid memvisualisasikan pertindihan keahlian antara aktiviti yang berbeza."
