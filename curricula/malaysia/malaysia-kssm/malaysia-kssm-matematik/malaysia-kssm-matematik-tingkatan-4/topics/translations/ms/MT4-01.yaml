teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada ungkapan kuadratik dan mengenal pasti pekali a, b, dan c (Buku Teks ms. 2-5)."
    - "Langkah 2: Mendefinisikan fungsi kuadratik dan hubungan banyak kepada satu menggunakan ujian garis mencancang (Buku Teks ms. 5-10)."
    - "Langkah 3: Menganalisis kesan perubahan nilai a (bentuk), b (paksi simetri), dan c (pintasan-y) melalui simulasi (Buku Teks ms. 11-14)."
    - "Langkah 4: Membentuk model situasi dunia sebenar ke dalam bentuk kuadratik (Buku Teks ms. 15)."
    - "Langkah 5: Memvisualisasikan dan menyelesaikan punca melalui kaedah graf dan pemfaktoran (Buku Teks ms. 16-23)."
    - "Langkah 6: Menguasai lakaran graf dan penyelesaian masalah kompleks (Buku Teks ms. 23-29)."
common_misconceptions:
  - misconception: "Keliru antara ungkapan kuadratik dengan linear kerana kehadiran 'x'."
    remediation: "Tekankan bahawa fungsi kuadratik MESTI mempunyai kuasa 2 sebagai kuasa tertinggi."
  - misconception: "Menganggap nilai 'c' mengubah lebar atau bentuk parabola."
    remediation: "Tunjukkan bahawa 'c' hanya menggerakkan graf secara menegak (pintasan-y)."
  - misconception: "Salah mengenal pasti paksi simetri sebagai punca persamaan."
    remediation: "Jelaskan bahawa paksi simetri adalah garis tengah x = -b/2a, manakala punca adalah pintasan-x."
engagement_hooks:
  - "Mengaitkan lengkung parabola dengan trajektori bulu tangkis atau sepakan percuma bola sepak."
  - "Membincangkan matematik seni bina di sebalik struktur jambatan melengkung seperti di Putrajaya."
