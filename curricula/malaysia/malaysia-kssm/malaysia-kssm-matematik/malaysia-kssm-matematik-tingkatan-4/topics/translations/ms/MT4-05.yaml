content_standards:
  - id: "5.1"
    text: "Rangkaian"
    learning_objectives:
      - id: "5.1.1"
        text: "Mengenal dan menerangkan rangkaian sebagai graf."
        bloom: understand
        tp_mapping:
          tp1: "Mempamerkan pengetahuan asas tentang rangkaian."
          tp2: "Mempamerkan kefahaman tentang rangkaian."
      - id: "5.1.2"
        text: "Membanding beza: (i) graf terarah dengan graf tak terarah; (ii) graf berpemberat dengan graf tak berpemberat."
        bloom: analyze
        tp_mapping:
          tp3: "Mengaplikasikan kefahaman tentang rangkaian untuk melaksanakan tugasan mudah."
      - id: "5.1.3"
        text: "Mengenal dan melukis subgraf dan pokok."
        bloom: apply
        tp_mapping:
          tp3: "Mengaplikasikan kefahaman tentang rangkaian untuk melaksanakan tugasan mudah."
      - id: "5.1.4"
        text: "Mewakilkan maklumat dalam bentuk rangkaian."
        bloom: apply
        tp_mapping:
          tp4: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang rangkaian dalam konteks penyelesaian masalah rutin yang mudah."
      - id: "5.1.5"
        text: "Menyelesaikan masalah yang melibatkan rangkaian."
        bloom: analyze
        tp_mapping:
          tp5: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang rangkaian dalam konteks penyelesaian masalah rutin yang kompleks."
          tp6: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang rangkaian dalam konteks penyelesaian masalah bukan rutin secara kreatif."
