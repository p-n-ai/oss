quality_level: 3
provenance: curriculum-aligned-rewrite
teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada asas - mendefinisikan bucu ($V$), tepi ($E$), dan darjah ($d$) menggunakan graf mudah (15 min)"
    - "Langkah 2: Membandingkan jenis graf - membezakan graf terarah/tak terarah dan graf berpemberat/tak berpemberat menggunakan analogi dunia nyata (20 min)"
    - "Langkah 3: Analisis Struktur - mengajar subgraf dan ciri-ciri khusus pokok ($n-1$ tepi) (25 min)"
    - "Langkah 4: Perwakilan Rangkaian - memetakan data sosial dan pengangkutan ke dalam struktur graf yang unik (20 min)"
    - "Langkah 5: Pengoptimuman & Sintesis - menyelesaikan masalah kompleks melibatkan laluan terpendek dan kos optimum (30 min)"
  common_misconceptions:
    - misconception: "Semua graf mesti mempunyai anak panah arah."
      remediation: "Gunakan contoh rangkaian pengangkutan darat atau hubungan sosial asas untuk menunjukkan hubungan tak terarah."
    - misconception: "Sesuatu pokok boleh mengandungi gelung atau kitaran."
      remediation: "Tekankan bahawa pokok ialah graf mudah di mana setiap pasangan bucu dihubungkan oleh hanya satu tepi."
    - misconception: "Darjah bagi satu gelung dikira sebagai satu."
      remediation: "Jelaskan bahawa setiap gelung menambah 2 kepada darjah sesuatu bucu kerana ia bermula dan berakhir pada titik yang sama."
  engagement_hooks:
    - "Terokai rangkaian transit kereta api KL Sentral sebagai contoh graf tak terarah dunia nyata."
    - "Analisis sistem 'tagging' media sosial untuk melihat bagaimana maklumat tersebar melalui rangkaian."
    - "Selesaikan teka-teki jalan sesat (maze) dengan menukarkannya kepada rangkaian bucu dan tepi."
