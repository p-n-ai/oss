questions:
  # Learning Objective 2.1.1 (understand)
  - id: Q1
    text: 'Nyatakan nilai tempat dan nilai digit bagi nombor 1011_2.'
    difficulty: medium
    learning_objective: 2.1.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "Nilai tempat: 1 (unit), 0 (dua), 1 (empat), 1 (lapan); Nilai digit: 1, 0, 1, 1"
      working: |
        Nombor 1011 dalam asas 2 mempunyai nilai tempat dan nilai digit seperti berikut:
        - Digit paling kanan adalah 1 pada tempat unit (nilai 1)
        - Digit seterusnya adalah 1 pada tempat lapan (nilai 8)
        - Digit seterusnya adalah 0 pada tempat empat (nilai 0)
        - Digit paling kiri adalah 1 pada tempat lapan (nilai 8)
        Oleh itu, nilai digit dan nilai tempat adalah seperti yang dinyatakan.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyatakan satu nilai tempat dengan betul."
      - marks: 1
        criteria: "Menyatakan satu nilai digit dengan betul."
      - marks: 1
        criteria: "Menjelaskan semua nilai tempat dan nilai digit dengan betul."
    hints:
      - level: 1
        text: "Mulakan dengan digit paling kanan dan bergerak ke kiri, nyatakan nilai tempat setiap digit."

  # Learning Objective 2.1.2 (apply)
  - id: Q2
    text: "Tukar nombor 345_8 kepada nombor dalam asas 10."
    difficulty: medium
    learning_objective: 2.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "229"
      working: |
        Untuk menukar nombor dari asas 8 ke asas 10, kita guna formula berikut:
        $3 \times 8^2 + 4 \times 8^1 + 5 \times 8^0 = 192 + 32 + 5 = 229$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menulis formula asas 8 dengan betul."
      - marks: 1
        criteria: "Melakukan pengiraan bagi satu atau dua digit dengan betul."
      - marks: 1
        criteria: "Menyelesaikan keseluruhan penukaran dengan betul."
    hints:
      - level: 1
        text: "Hitung nilai setiap digit berdasarkan kuasa asas 8."

  # Learning Objective 2.1.2 (apply)
  - id: Q3
    text: "Apakah nombor 1110_2 dalam asas 8?"
    difficulty: medium
    learning_objective: 2.1.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "16"
      working: |
        Pertama, tukar nombor dari asas 2 ke asas 10:
        $1 \times 2^3 + 1 \times 2^2 + 1 \times 2^1 + 0 \times 2^0 = 8 + 4 + 2 + 0 = 14$
        Kemudian, tukar dari asas 10 ke asas 8:
        14 dibahagikan dengan 8 ialah 1 baki 6, jadi nombor dalam asas 8 adalah 16.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menukar nombor dari asas 2 ke asas 10 dengan betul."
      - marks: 1
        criteria: "Menukar nombor dari asas 10 ke asas 8 dengan betul."
      - marks: 1
        criteria: "Menyelesaikan keseluruhan proses penukaran dengan betul."
    hints:
      - level: 1
        text: "Tukar ke asas 10 dahulu sebelum ke asas 8."

  # Learning Objective 2.1.3 (apply)
  - id: Q4
    text: 'Hitungkan jumlah 1011_2 + 1101_2 dalam asas 2.'
    difficulty: medium
    learning_objective: 2.1.3
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "11000_2"
      working: |
        Tambah kedua-dua nombor biner seperti berikut:
        \[
        \begin{array}{cccc}
          & 1 & 0 & 1 & 1 \\
          + & 1 & 1 & 0 & 1 \\
        \hline
        1 & 1 & 0 & 0 & 0 \\
        \end{array}
        \]
        Hasilnya adalah 11000 dalam asas 2.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menambah dua digit pertama dengan betul."
      - marks: 1
        criteria: "Menambah dua digit seterusnya dengan betul, termasuk pembawa."
      - marks: 1
        criteria: "Mendapatkan hasil akhir dengan betul."
    hints:
      - level: 1
        text: "Tambahkan digit demi digit, jangan lupa pembawa jika ada."

  # Learning Objective 2.1.4 (apply)
  - id: Q5
    text: 'Selesaikan masalah berikut: Satu sistem komputer menggunakan asas 16 untuk alamat memori. Tukarkan 1A3_16 kepada asas 10.'
    difficulty: medium
    learning_objective: 2.1.4
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "419"
      working: |
        Tukarkan nombor dari asas 16 ke asas 10:
        $1 \times 16^2 + 10 \times 16^1 + 3 \times 16^0 = 256 + 160 + 3 = 419$
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menukar digit A ke nilai 10 dengan betul."
      - marks: 1
        criteria: "Melakukan pengiraan bagi satu atau dua digit dengan betul."
      - marks: 1
        criteria: "Menyelesaikan keseluruhan penukaran dengan betul."
    hints:
      - level: 1
        text: "Ingat, A dalam asas 16 mewakili 10 dalam asas 10."