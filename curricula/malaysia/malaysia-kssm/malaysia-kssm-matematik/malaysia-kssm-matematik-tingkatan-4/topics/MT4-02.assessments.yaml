questions:
  # LO 2.1.1 - Understand number bases
  - id: Q1
    text: "Nyatakan nombor 2314 dalam asas 5 dari segi angka, nilai tempat, dan nilai nombor."
    difficulty: medium
    learning_objective: LO1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: "2 ribuan, 3 ratusan, 1 puluhan, 4 unit; nilai nombor ialah 2×5^3 + 3×5^2 + 1×5^1 + 4×5^0"
      working: |
        Nombor 2314 dalam asas 5:
        - 2 mewakili ribuan (2×5^3)
        - 3 mewakili ratusan (3×5^2)
        - 1 mewakili puluhan (1×5^1)
        - 4 mewakili unit (4×5^0)
        Jumlah nilai nombor ialah: 2×5^3 + 3×5^2 + 1×5^1 + 4×5^0 = 2×125 + 3×25 + 1×5 + 4×1 = 319
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menjelaskan nilai tempat dengan betul."
      - marks: 1
        criteria: "Mengira nilai digit dengan betul."
      - marks: 1
        criteria: "Menjelaskan nilai nombor keseluruhan dengan betul."
    hints:
      - level: 1
        text: "Ingat bahawa setiap digit dikalikan dengan kuasa 5 bergantung kepada kedudukannya."
      - level: 2
        text: "Mulakan dengan digit paling kiri, iaitu ribuan, dan teruskan ke sebelah kanan."

  # LO 2.1.2 - Convert between bases
  - id: Q2
    text: "Tukar nombor 10110 dalam asas 2 kepada asas 10."
    difficulty: medium
    learning_objective: LO2
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "22"
      working: |
        Nombor 10110 dalam asas 2:
        1×2^4 + 0×2^3 + 1×2^2 + 1×2^1 + 0×2^0
        = 16 + 0 + 4 + 2 + 0
        = 22 dalam asas 10
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menulis dengan betul pengembangan bagi setiap digit dalam asas 2."
      - marks: 1
        criteria: "Mengira jumlah keseluruhan dengan betul."
    hints:
      - level: 1
        text: "Setiap digit dalam asas 2 dikalikan dengan kuasa 2 berdasarkan kedudukannya."
      - level: 2
        text: "Lakukan pengiraan dari kiri ke kanan."

  # LO 2.1.3 - Perform operations in different bases
  - id: Q3
    text: "Hitungkan 23_8 + 14_8 dalam asas 8."
    difficulty: medium
    learning_objective: LO3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "37_8"
      working: |
        Tambahkan nombor dalam asas 8:
        23_8
        + 14_8
        -------
        37_8
        Pengiraan langkah demi langkah:
        3 + 4 = 7
        2 + 1 = 3
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengira unit dengan betul."
      - marks: 1
        criteria: "Mengira puluhan dengan betul tanpa membawa (carry)."
    hints:
      - level: 1
        text: "Lakukan operasi penambahan digit demi digit dari kanan ke kiri."
      - level: 2
        text: "Ingat bahawa asas 8 bermaksud tiada digit lebih daripada 7."

  # LO 2.1.3 - Perform operations in different bases
  - id: Q4
    text: "Kurangkan 125_6 - 34_6 dalam asas 6."
    difficulty: medium
    learning_objective: LO3
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: "51_6"
      working: |
        Kurangkan nombor dalam asas 6:
        125_6
        - 34_6
        -------
        51_6
        Pengiraan langkah demi langkah:
        5 - 4 = 1
        2 (dengan pinjaman dari 1) - 3 = 5 (setelah pinjam)
    marks: 3
    rubric:
      - marks: 1
        criteria: "Mengira unit dengan betul."
      - marks: 2
        criteria: "Mengira puluhan dan melakukan pinjaman dengan betul."
    hints:
      - level: 1
        text: "Mulakan penolakan dari kanan ke kiri, periksa jika perlu pinjaman."
      - level: 2
        text: "Ingat bahawa asas 6 bermaksud digit maksimum ialah 5."

  # LO 2.1.4 - Solve problems involving number bases
  - id: Q5
    text: "Seorang pelajar mendapat 1001_2 markah dalam ujian dan ingin menukarnya kepada sistem markah asas 10. Berapakah markah pelajar itu dalam asas 10?"
    difficulty: medium
    learning_objective: LO4
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: "9"
      working: |
        Tukarkan nombor 1001 dalam asas 2 kepada asas 10:
        1×2^3 + 0×2^2 + 0×2^1 + 1×2^0
        = 8 + 0 + 0 + 1
        = 9 dalam asas 10
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyediakan pengembangan yang betul untuk setiap digit."
      - marks: 2
        criteria: "Mengira jumlah keseluruhan dengan betul."
    hints:
      - level: 1
        text: "Setiap digit dalam asas 2 dikalikan dengan kuasa 2 berdasarkan kedudukannya."
      - level: 2
        text: "Lakukan pengiraan dari kiri ke kanan dan jumlahkan semua nilai."