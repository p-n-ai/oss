questions:
  # Learning Objective: 6.1.1 (apply)
  - id: Q1
    text: 'Mewakilkan situasi berikut dalam bentuk ketaksamaan linear: Seorang pelajar perlu mengumpulkan sekurang-kurangnya 50 markah dalam ujian matematik dan sains. Jika markah matematik diwakili oleh $x$ dan markah sains diwakili oleh $y$, nyatakan ketaksamaan yang mewakili situasi ini.'
    difficulty: medium
    learning_objective: 6.1.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: 'x + y \geq 50'
      working: |
        Untuk mengumpulkan sekurang-kurangnya 50 markah, jumlah markah matematik dan sains mesti lebih atau sama dengan 50. Oleh itu, ketaksamaan linear adalah $x + y \geq 50$.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Menulis bentuk ketaksamaan $x + y \geq 50$ dengan betul.'
      - marks: 1
        criteria: "Memahami keperluan 'sekurang-kurangnya' dalam situasi dan menerapkannya dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan apa yang dimaksudkan dengan 'sekurang-kurangnya' dalam konteks ketaksamaan."

  # Learning Objective: 6.1.2 (analyze)
  - id: Q2
    text: 'Berdasarkan ketaksamaan $2x + 3y < 12$, tentukan jika titik (2, 3) berada dalam rantau penyelesaian.'
    difficulty: medium
    learning_objective: 6.1.2
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Titik (2, 3) tidak berada dalam rantau penyelesaian kerana $2(2) + 3(3) = 13$, yang tidak < 12.'
      working: |
        Substitusi $x = 2$ dan $y = 3$ ke dalam ketaksamaan: $2(2) + 3(3) = 4 + 9 = 13$. Oleh kerana 13 tidak kurang daripada 12, titik (2, 3) tidak berada dalam rantau penyelesaian.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Substitusi nilai $x$ dan $y$ dengan betul."
      - marks: 1
        criteria: "Mengira hasil $2x + 3y$ dengan betul."
      - marks: 1
        criteria: "Menentukan jika hasil memenuhi ketaksamaan."
    hints:
      - level: 1
        text: "Substitusi nilai $x$ dan $y$ ke dalam ketaksamaan dan periksa sama ada syarat ketaksamaan dipenuhi."

  # Learning Objective: 6.1.3 (apply)
  - id: Q3
    text: 'Lorekkan rantau yang memuaskan ketaksamaan $y \leq 2x + 1$ pada paksi kartesian.'
    difficulty: medium
    learning_objective: 6.1.3
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: 'Rantau di bawah garis $y = 2x + 1$ dilorekkan.'
      working: |
        Pertama, lukis garis $y = 2x + 1$. Kemudian, pilih titik uji seperti (0,0) untuk menentukan rantau. Substitusi (0,0) ke dalam ketaksamaan: $0 \leq 2(0) + 1$, yang benar. Oleh itu, lorekkan rantau di bawah garis tersebut.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Melukis garis $y = 2x + 1$ dengan betul."
      - marks: 1
        criteria: "Memilih titik uji yang sesuai."
      - marks: 1
        criteria: "Melorek rantau yang betul berdasarkan titik uji."
    hints:
      - level: 1
        text: "Lukis garis dahulu dan kemudian gunakan titik uji untuk menentukan rantau yang perlu dilorek."

  # Learning Objective: 6.2.1 (apply)
  - id: Q4
    text: 'Mewakilkan situasi berikut dalam bentuk sistem ketaksamaan linear: Seorang pembuat kek perlu membuat sekurang-kurangnya 20 kek coklat dan tidak lebih daripada 30 kek vanila. Jika $x$ adalah bilangan kek coklat dan $y$ adalah bilangan kek vanila, nyatakan sistem ketaksamaan.'
    difficulty: medium
    learning_objective: 6.2.1
    tp_level: 2
    kbat: false
    answer:
      type: exact
      value: 'x \geq 20, y \leq 30'
      working: |
        Untuk sekurang-kurangnya 20 kek coklat, $x \geq 20$. Untuk tidak lebih daripada 30 kek vanila, $y \leq 30$. Sistem ketaksamaan adalah $x \geq 20, y \leq 30$.
    marks: 2
    rubric:
      - marks: 1
        criteria: 'Menulis ketaksamaan $x \geq 20$ dengan betul.'
      - marks: 1
        criteria: 'Menulis ketaksamaan $y \leq 30$ dengan betul.'
    hints:
      - level: 1
        text: "Fikirkan tentang syarat 'sekurang-kurangnya' dan 'tidak lebih daripada'."

  # Learning Objective: 6.2.4 (apply)
  - id: Q5
    text: 'Seorang usahawan menjual dua jenis produk, A dan B. Dia mempunyai masa maksimum 40 jam seminggu untuk mengeluarkan produk tersebut. Produk A memerlukan 2 jam dan produk B memerlukan 1 jam untuk dikeluarkan. Tulis sistem ketaksamaan yang mewakili situasi ini dan tentukan bilangan maksimum produk A yang boleh dikeluarkan jika dia tidak mengeluarkan sebarang produk B.'
    difficulty: medium
    learning_objective: 6.2.4
    tp_level: 3
    kbat: true
    answer:
      type: exact
      value: '2x + y \leq 40; x = 20'
      working: |
        Sistem ketaksamaan adalah $2x + y \leq 40$. Jika $y = 0$, maka $2x \leq 40$. Oleh itu, $x \leq 20$. Maka, bilangan maksimum produk A yang boleh dikeluarkan adalah 20.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menulis sistem ketaksamaan dengan betul."
      - marks: 1
        criteria: "Menentukan ketaksamaan dengan tiada produk B ($y = 0$)."
      - marks: 1
        criteria: "Mengira bilangan maksimum produk A dengan betul."
    hints:
      - level: 1
        text: "Pertimbangkan masa maksimum yang tersedia dan bagaimana ia boleh digunakan sepenuhnya untuk produk A."