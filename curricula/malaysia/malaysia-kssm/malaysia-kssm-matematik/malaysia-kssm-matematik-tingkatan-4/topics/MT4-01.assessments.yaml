topic_id: MT4-01
provenance: ai-generated

questions:
  # Learning Objective 1.1.1
  - id: Q1
    text: 'Tentukan sama ada ungkapan $3x^2 - 5x + 2$ adalah ungkapan kuadratik dalam satu pemboleh ubah dan terangkan sebabnya.'
    difficulty: medium
    learning_objective: 1.1.1
    tp_level: 2
    kbat: false
    answer:
      type: free_text
      value: 'Ya, ungkapan ini adalah ungkapan kuadratik dalam satu pemboleh ubah kerana ia mempunyai bentuk $ax^2 + bx + c$.'
      working: |
        Ungkapan $3x^2 - 5x + 2$ adalah dalam bentuk $ax^2 + bx + c$ di mana $a = 3$, $b = -5$, dan $c = 2$. Oleh itu, ia adalah ungkapan kuadratik.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Mengenal pasti bahawa ungkapan adalah dalam bentuk kuadratik."
      - marks: 1
        criteria: "Memberikan penjelasan yang betul."
    hints:
      - level: 1
        text: "Periksa bentuk umum ungkapan kuadratik $ax^2 + bx + c$."

  # Learning Objective 1.1.2
  - id: Q2
    text: 'Pilih ciri-ciri berikut yang betul untuk fungsi kuadratik: (A) Graf berbentuk parabola, (B) Mempunyai satu titik puncak, (C) Simetri tentang paksi-$x$.'
    difficulty: medium
    learning_objective: 1.1.2
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice      
      value: 'A, B'
      working: |
        Fungsi kuadratik mempunyai graf berbentuk parabola dan satu titik puncak. Ia adalah simetri tentang paksi-$y$, bukan paksi-$x$.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Memilih ciri (A) dan (B) dengan betul."
      - marks: 1
        criteria: "Mengelakkan pilihan yang salah."
    hints:
      - level: 1
        text: "Ingat bahawa fungsi kuadratik mempunyai simetri tentang paksi menegak, bukan mendatar."

  # Learning Objective 1.1.3
  - id: Q3
    text: 'Analisis kesan peningkatan nilai $a$ dalam fungsi kuadratik $f(x) = ax^2 + bx + c$ terhadap bentuk graf.'
    difficulty: medium
    learning_objective: 1.1.3
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Peningkatan nilai $a$ menyebabkan parabola menjadi lebih sempit.'
      working: |
        Apabila nilai $a$ meningkat, pekali bagi $x^2$ menjadi lebih besar, menyebabkan parabola menjadi lebih sempit kerana kadar perubahan menegak meningkat.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Memahami bahawa $a$ mempengaruhi bentuk graf."
      - marks: 1
        criteria: "Menggambarkan kesan peningkatan $a$ dengan tepat."
      - marks: 1
        criteria: "Menggunakan terminologi matematik yang betul."
    hints:
      - level: 1
        text: "MISCONCEPTION ALERT: Perubahan pada $a$ tidak mengubah arah parabola jika tetap positif."

  # Learning Objective 1.1.4
  - id: Q4
    text: 'Suatu objek dilemparkan ke atas dan ketinggiannya $h$ dalam meter selepas $t$ saat diberikan oleh $h(t) = -5t^2 + 20t + 2$. Bentukkan fungsi kuadratik berdasarkan situasi ini.'
    difficulty: medium
    learning_objective: 1.1.4
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: 'Fungsi kuadratik sudah diberikan sebagai $h(t) = -5t^2 + 20t + 2$.'
      working: |
        Situasi ini mewakili pergerakan menegak objek dengan fungsi kuadratik $h(t) = -5t^2 + 20t + 2$, yang menunjukkan ketinggian bergantung kepada masa.
    marks: 2
    rubric:
      - marks: 1
        criteria: "Menggambarkan situasi sebagai fungsi kuadratik."
      - marks: 1
        criteria: "Memberikan fungsi yang tepat."
    hints:
      - level: 1
        text: "Perhatikan bahawa fungsi ketinggian telah diberikan dalam bentuk kuadratik."

  # Learning Objective 1.1.6
  - id: Q5
    text: 'Cari punca persamaan kuadratik $x^2 - 3x - 10 = 0$ dengan kaedah pemfaktoran.'
    difficulty: medium
    learning_objective: 1.1.6
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: "x = 5, x = -2"
      working: |
        Untuk memfaktorkan: 
        $x^2 - 3x - 10 = (x - 5)(x + 2) = 0$. 
        Maka, punca adalah $x = 5$ dan $x = -2$.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Memfaktorkan persamaan dengan betul."
      - marks: 2
        criteria: "Menentukan kedua-dua punca dengan tepat."
    hints:
      - level: 1
        text: "Cari dua nombor yang hasil darabnya -10 dan jumlahnya -3."