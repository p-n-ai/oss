description: "Worked examples for OPERASI SET"
worked_examples:
  - id: WE-01
    topic: "Persilangan Set"
    difficulty: easy
    real_world_analogy: "Imagine two overlapping circles representing two groups of friends. The overlapping part is the intersection, showing friends common to both groups."
    misconception_alert: "A common mistake is thinking that the intersection includes all elements from both sets, rather than only the common elements."
    scenario: "Given two sets, A = {1, 2, 3, 4} and B = {3, 4, 5, 6}, find A ∩ B."
    working: |
      Step 1: Identify elements in both sets A and B.
      Step 2: Look for common elements that appear in both sets.
      Step 3: The common elements are 3 and 4. Therefore, A ∩ B = {3, 4}.

  - id: WE-02
    topic: "Pelengkap bagi Kesatuan Set"
    difficulty: medium
    real_world_analogy: "Consider a library with two sections, fiction and non-fiction. The union of these sections is all the books in the library. The complement is any book not in the library."
    misconception_alert: "Students often forget that the complement refers to elements outside of the universal set, not just outside the union."
    scenario: "In a universal set U = {1, 2, 3, 4, 5, 6, 7, 8}, if A = {2, 4, 6} and B = {3, 4, 5}, find the complement of A ∪ B."
    working: |
      Step 1: Determine A ∪ B, which includes all elements in either A or B.
      Step 2: A ∪ B = {2, 3, 4, 5, 6}.
      Step 3: Find elements in U that are not in A ∪ B.
      Step 4: The complement of A ∪ B is {1, 7, 8}.

  - id: WE-03
    topic: "Gabungan Operasi Set"
    difficulty: hard
    real_world_analogy: "Think of different types of fruits in a fruit salad. You can combine operations like slicing, dicing, and mixing to achieve the desired salad."
    misconception_alert: "A common error is mixing up the order of operations, which leads to incorrect results."
    scenario: "Given sets X = {a, b, c, d}, Y = {b, c, e} and Z = {a, e, f}, find (X ∩ Y) ∪ (Y ∩ Z)."
    working: |
      Step 1: Find the intersection of X and Y, which is X ∩ Y = {b, c}.
      Step 2: Find the intersection of Y and Z, which is Y ∩ Z = {e}.
      Step 3: Find the union of the results from Step 1 and Step 2.
      Step 4: (X ∩ Y) ∪ (Y ∩ Z) = {b, c, e}.