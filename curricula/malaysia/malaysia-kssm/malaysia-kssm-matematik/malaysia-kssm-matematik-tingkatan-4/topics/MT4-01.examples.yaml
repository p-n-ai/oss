description: "Worked examples for FUNGSI DAN PERSAMAAN KUADRATIK DALAM SATU PEMBOLEH UBAH"
worked_examples:
  - id: WE-01
    topic: "Ciri-ciri Ungkapan Kuadratik"
    difficulty: easy
    real_world_analogy: "Consider a water fountain whose water stream forms a parabolic shape. The equation of this parabola is a quadratic equation."
    misconception_alert: "Students often confuse linear equations with quadratic ones. Remember, a quadratic has an x² term."
    scenario: "Identify the quadratic expression: 3x² + 2x - 5"
    working: |
      Step 1: Recognize that a quadratic expression is in the form ax² + bx + c.
      Step 2: In the given expression 3x² + 2x - 5, identify a = 3, b = 2, and c = -5.
      Step 3: Confirm it is quadratic because it contains the x² term.

  - id: WE-02
    topic: "Kesan Perubahan Nilai a, b dan c"
    difficulty: medium
    real_world_analogy: "Imagine adjusting a satellite dish. Changing the angle affects the strength and focus of the signal, similar to changing a, b, and c in a quadratic affects the graph's shape and position."
    misconception_alert: "Students may think changes in 'c' affect the shape of the graph, but 'c' only affects the vertical position."
    scenario: "Investigate the effect of changing a, b, and c in f(x) = ax² + bx + c where a = 2, b = -4, c = 1."
    working: |
      Step 1: Note that a = 2, so the parabola opens upwards and is narrower than a standard parabola.
      Step 2: The term b = -4 moves the vertex along the x-axis, influencing the symmetry line.
      Step 3: The term c = 1 shifts the parabola upwards by 1 unit.
      Step 4: Sketch the graph to visualize these changes and confirm understanding.

  - id: WE-03
    topic: "Menyelesaikan Masalah Persamaan Kuadratik"
    difficulty: hard
    real_world_analogy: "Think of solving a quadratic equation like finding the points where a thrown ball hits the ground, which are the roots of the equation."
    misconception_alert: "Confusing the axis of symmetry with the roots can lead to incorrect solutions."
    scenario: "Solve the quadratic equation 2x² - 4x - 6 = 0 by factoring."
    working: |
      Step 1: Rewrite the equation: 2x² - 4x - 6 = 0.
      Step 2: Factor out the greatest common factor: 2(x² - 2x - 3) = 0.
      Step 3: Factor the quadratic: 2(x - 3)(x + 1) = 0.
      Step 4: Set each factor to zero: x - 3 = 0 or x + 1 = 0.
      Step 5: Solve for x: x = 3 or x = -1.
      Step 6: Verify the solutions by substituting back into the original equation.