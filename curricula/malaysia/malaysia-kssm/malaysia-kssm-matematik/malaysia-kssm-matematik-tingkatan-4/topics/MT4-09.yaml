prerequisites:
  required:
    - "MT2-13" # Simple Probability (Form 2)
  recommended: []
mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5
ai_teaching_notes: "MT4-09.teaching.md"
assessments_file: "MT4-09.assessments.yaml"
examples_file: "MT4-09.examples.yaml"
quality_level: 3
provenance: "official-dskp-aligned"
teaching:
  sequence:
    - "Step 1: Introduce combined events and sample spaces using experiments like tossing coins or rolling dice (20 min)"
    - "Step 2: Differentiate between dependent and independent events using 'with replacement' and 'without replacement' scenarios (25 min)"
    - "Step 3: Verify the multiplication rule for independent events: P(A and B) = P(A) x P(B) (20 min)"
    - "Step 4: Distinguish between mutually exclusive and non-mutually exclusive events using Venn diagrams (25 min)"
    - "Step 5: Apply the addition rule: P(A or B) = P(A) + P(B) - P(A and B) (30 min)"
    - "Step 6: Solve complex routine and non-routine problems using tree diagrams and sets (30 min)"
common_misconceptions:
  - misconception: "Assuming all combined events are independent."
    remediation: "Highlight how 'without replacement' changes the total sample size and subsequent probabilities."
  - misconception: "Failing to subtract the intersection P(A and B) for non-mutually exclusive events."
    remediation: "Use Venn diagrams to show that the overlapping area is counted twice if not subtracted."
engagement_hooks:
  - "Use local insurance premium concepts to explain how probability affects risk management."
  - "Simulate a 'Rock-Paper-Scissors' tournament to list outcomes and calculate win probabilities."
