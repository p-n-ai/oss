id: MT4-09
official_ref: "9.0"
name: "KEBARANGKALIAN PERISTIWA BERGABUNG"
name_en: "Probability of Combined Events"
subject_id: malaysia-kssm-matematik-tingkatan-4
syllabus_id: malaysia-kssm
country_id: malaysia
language: ms
difficulty: intermediate
tier: core
content_standards:
    - id: "9.1"
      text: "Peristiwa Bergabung"
      text_en: "Combined Events"
    - id: "9.2"
      text: "Peristiwa Bersandar dan Tak Bersandar"
      text_en: "Dependent and Independent Events"
    - id: "9.3"
      text: "Peristiwa Saling Eksklusif dan Tak Saling Eksklusif"
      text_en: "Mutually Exclusive and Non-Mutually Exclusive Events"
    - id: "9.4"
      text: "Kebarangkalian Peristiwa Bergabung"
      text_en: "Probability of Combined Events"
learning_objectives:
    - id: "9.1.1"
      text: "Memerihalkan peristiwa bergabung dan menyenaraikan peristiwa bergabung yang mungkin."
      text_en: "Describe combined events and list possible combined events."
      bloom: remember
    - id: "9.2.1"
      text: "Membezakan peristiwa bersandar dan peristiwa tak bersandar."
      text_en: "Differentiate between dependent and independent events."
      bloom: understand
    - id: "9.2.2"
      text: "Membuat dan menentusahkan konjektur tentang rumus kebarangkalian peristiwa bergabung."
      text_en: "Make and verify conjectures about the formula for probability of combined events."
      bloom: apply
    - id: "9.2.3"
      text: "Menentukan kebarangkalian peristiwa bergabung bagi peristiwa bersandar dan peristiwa tak bersandar."
      text_en: "Determine the probability of combined events for dependent and independent events."
      bloom: apply
    - id: "9.3.1"
      text: "Membezakan peristiwa saling eksklusif dan peristiwa tidak saling eksklusif."
      text_en: "Differentiate between mutually exclusive and non-mutually exclusive events."
      bloom: understand
    - id: "9.3.2"
      text: "Mengesahkan rumus kebarangkalian peristiwa bergabung bagi peristiwa saling eksklusif dan peristiwa tidak saling eksklusif."
      text_en: "Verify the formula for probability of combined events for mutually exclusive and non-mutually exclusive events."
      bloom: evaluate
    - id: "9.3.3"
      text: "Menentukan kebarangkalian peristiwa bergabung bagi peristiwa saling eksklusif dan peristiwa tidak saling eksklusif."
      text_en: "Determine the probability of combined events for mutually exclusive and non-mutually exclusive events."
      bloom: apply
    - id: "9.4.1"
      text: "Menyelesaikan masalah yang melibatkan kebarangkalian peristiwa bergabung."
      text_en: "Solve problems involving probability of combined events."
      bloom: apply
prerequisites:
    required: []
    recommended: []
bloom_levels:
    - remember
    - understand
    - apply
    - evaluate
mastery:
    minimum_score: 0.75
    assessment_count: 3
    spaced_repetition:
        initial_interval_days: 3
        multiplier: 2.5
ai_teaching_notes: "MT4-09.teaching.md"
quality_level: 1
provenance: ai-assisted
teaching:
    sequence:
        - 'Step 1: Introduce the concept of combined events using dice roll examples (20 min)'
        - 'Step 2: Explain dependent and independent events with card drawing examples (25 min)'
        - 'Step 3: Distinguish between mutually exclusive and not mutually exclusive events (20 min)'
        - 'Step 4: Calculate probabilities for combined events using examples (30 min)'
        - 'Step 5: Solve real-world problems involving combined event probabilities (25 min)'
    common_misconceptions:
        - misconception: All events are mutually exclusive
          remediation: Provide clear examples and conduct hands-on activities
        - misconception: Dependent and independent events are the same
          remediation: Use visual aids and real-life examples to show differences
engagement_hooks:
    - Connect with local lottery games to discuss probability of winning
    - Use local dice games to illustrate combined event probabilities
assessments_file: MT4-09.assessments.yaml
examples_file: MT4-09.examples.yaml
