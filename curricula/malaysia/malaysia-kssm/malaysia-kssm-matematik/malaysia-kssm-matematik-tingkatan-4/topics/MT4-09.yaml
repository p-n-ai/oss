    text: "Differentiate between mutually exclusive and non-mutually exclusive events."
    bloom: understand
  - id: "9.3.2"
    text: "Verify the formula for probability of combined events for mutually exclusive and non-mutually exclusive events."
    bloom: evaluate
  - id: "9.3.3"
