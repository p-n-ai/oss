id: MT4-05
official_ref: "5.0"
name: "RANGKAIAN DALAM TEORI GRAF"
name_en: "Networks in Graph Theory"
subject_id: malaysia-kssm-matematik-tingkatan-4
syllabus_id: malaysia-kssm
country_id: malaysia
language: ms
difficulty: intermediate
tier: core
learning_objectives:
    - id: "5.1.1"
      text: "Mengenal dan menerangkan rangkaian sebagai graf."
      text_en: "Recognise and describe networks as graphs."
      bloom: understand
    - id: "5.1.2"
      text: "Membanding beza (i) Graf terarah dengan graf tak terarah. (ii) Graf berpemberat dengan graf tak berpemberat."
      text_en: "Differentiate between (i) directed graphs and undirected graphs. (ii) weighted graphs and unweighted graphs."
      bloom: analyze
    - id: "5.1.3"
      text: "Mengenal dan melukis subgraf dan pokok."
      text_en: "Recognise and draw subgraphs and trees."
      bloom: apply
    - id: "5.1.4"
      text: "Mewakilkan maklumat dalam bentuk rangkaian."
      text_en: "Represent information in the form of networks."
      bloom: apply
    - id: "5.1.5"
      text: "Menyelesaikan masalah yang melibatkan rangkaian."
      text_en: "Solve problems involving networks."
      bloom: analyze
prerequisites:
    required: []
    recommended: []
bloom_levels:
    - understand
    - analyze
    - apply
mastery:
    minimum_score: 0.75
    assessment_count: 3
    spaced_repetition:
        initial_interval_days: 3
        multiplier: 2.5
ai_teaching_notes: "MT4-05.teaching.md"
quality_level: 1
provenance: ai-assisted
teaching:
    sequence:
        - 'Step 1: Introduce basic concepts of graphs, vertices, and edges (15 min)'
        - 'Step 2: Explain directed vs undirected graphs and weighted vs unweighted graphs with examples (20 min)'
        - 'Step 3: Teach identifying and drawing subgraphs and trees from larger graphs (25 min)'
    common_misconceptions:
        - misconception: All graphs are directed
          remediation: Use clear examples of undirected graphs like social networks
        - misconception: All graphs must be weighted
          remediation: Clarify with examples of unweighted graphs, such as basic maps
engagement_hooks:
    - Explore a city map to identify routes as undirected graphs
    - Discuss social media connections as examples of real-world network graphs
assessments_file: MT4-05.assessments.yaml
examples_file: MT4-05.examples.yaml
