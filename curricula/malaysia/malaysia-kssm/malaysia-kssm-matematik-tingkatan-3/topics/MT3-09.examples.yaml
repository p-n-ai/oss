  ### WORKED EXAMPLES: Garis Lurus (Straight Lines)
  ### ---------------------------------------------------------
  - id: WE-01
    topic: "Identifying Gradient and y-intercept (9.1.1)"
    scenario: "For the straight line 2y = 8x - 10, state the gradient (kecerunan) and the y-intercept (pintasan-y)."
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: 9.1.1
    real_world_analogy: >-
      Think of the equation y = mx + c as a VIP ticket. For the numbers 'm' and 'c' to reveal their true identities, the variable 'y' MUST be alone at the front door. If 'y' has a friend (like a 2 attached to it), you must send the friend away before you can read the ticket!
    misconception_alert: >-
      A very common trap is immediately looking at the number next to 'x' and calling it the gradient. If the equation is 2y = 8x - 10, the gradient IS NOT 8! You MUST divide everything by 2 first to make 'y' completely alone.
    working: |
      Step 1: Check if 'y' is alone with a coefficient of exactly 1. 
      In 2y = 8x - 10, 'y' has a coefficient of 2.
      Step 2: Divide the ENTIRE equation by 2 to isolate 'y'.
      y = (8/2)x - (10/2)
      y = 4x - 5
      Step 3: Now compare it to the standard VIP ticket format: y = mx + c.
      m (gradient) is the number stuck to x.
      c (y-intercept) is the number floating alone at the end.
      Final Answer: Gradient = 4, y-intercept = -5

  - id: WE-02
    topic: "Forming the Equation of a Straight Line (9.1.5)"
    scenario: "Determine the equation of a straight line if its gradient is -3 and it passes through point A(2, 5)."
    difficulty: medium
    tp_level: 4
    kbat: false
    learning_objective: 9.1.5
    real_world_analogy: >-
      Building an equation is like baking a cake where you only know two ingredients (gradient and a point) but are missing the third (y-intercept). You have to mix the ingredients you do have inside the oven equation (y = mx + c) to figure out the missing piece! Once you have it, you can write the final recipe.
    misconception_alert: >-
      Don't mix up your x and y coordinates when substituting! Remember, the coordinates are always formatted alphabetically as (x, y). In point A(2, 5), x is 2 and y is 5.
    working: |
      Step 1: Write down the general oven equation: y = mx + c
      Step 2: Identify your given 'ingredients'.
      Gradient (m) = -3
      x = 2
      y = 5
      Step 3: Substitute all three values into the equation to hunt for the missing 'c'.
      5 = (-3)(2) + c
      5 = -6 + c
      Step 4: Solve for c by moving -6 to the other side.
      5 + 6 = c
      c = 11
      Step 5: Write the final recipe equation, keeping 'x' and 'y' as letters but locking in 'm' and 'c'.
      Final Answer: y = -3x + 11

  - id: WE-03
    topic: "Parallel Lines (9.1.4)"
    scenario: "Determine if Line 1 (y = 5x + 2) and Line 2 (10x - 2y = -6) are parallel."
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: 9.1.4
    real_world_analogy: >-
      Parallel lines are like two train tracks. They will never crash together as long as they are heading in the EXACT same direction (they must have the exact same gradient). If one track is slightly tilted differently, they will eventually crash!
    misconception_alert: >-
      You cannot find the gradient of Line 2 just by looking at the 10x! It is in disguise. You must rearrange the equation into y = mx + c format to reveal its true gradient before you can compare it to Line 1.
    working: |
      Step 1: Find the gradient of Line 1.
      Line 1 is already in y = mx + c format. Its gradient (m1) is 5.
      Step 2: Take Line 2 and rearrange it.
      10x - 2y = -6
      Move 10x to the other side: -2y = -10x - 6
      Divide everything by -2: y = (-10/-2)x - (6/-2)
      y = 5x + 3
      Step 3: Identify the gradient of Line 2.
      Its gradient (m2) is 5.
      Step 4: Compare both gradients. Since m1 = m2 = 5, they are parallel!
      Final Answer: Yes, the lines are parallel because they have the same gradient.
