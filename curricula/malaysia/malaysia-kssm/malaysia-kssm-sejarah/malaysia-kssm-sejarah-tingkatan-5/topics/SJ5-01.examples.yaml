topic_id: "SJ5-01"
examples:
  - id: "SJ5-01-E1"
    learning_objective_id: "12.1.4"
    title: "Langkah Rakyat Mempertahankan Kedaulatan"
    title_en: "People's Steps in Defending Sovereignty"
    question: "Kedaulatan negara adalah tanggungjawab bersama. Huraikan langkah-langkah yang boleh diambil oleh rakyat untuk mempertahankan kedaulatan negara."
    question_en: "National sovereignty is a shared responsibility. Describe the steps that can be taken by the people to defend national sovereignty."
    solution: |
      Rakyat Malaysia boleh mengambil pelbagai langkah proaktif untuk mempertahan kedaulatan negara, antaranya:
      
      1. **Memupuk Semangat Patriotisme:** Mengamalkan sikap cinta akan negara seperti mengibarkan Jalur Gemilang pada Hari Kebangsaan.
      2. **Mematuhi Undang-undang:** Menghormati perlembagaan dan tidak terlibat dengan aktiviti subversif yang menggugat kestabilan.
      3. **Menghormati Kepelbagaian Kaum (Elemen K12.1.7):** Bersikap toleransi terhadap budaya dan agama yang pelbagai demi mengekalkan keharmonian dan mengelakkan rusuhan kaum.
      4. **Bersedia Berkorban:** Sedia menyumbang tenaga seperti mendaftar dalam pasukan beruniform atau mempertahankan negara jika keselamatan diancam anasir luar.
