chapter_id: "1"
chapter_title: "Kedaulatan Negara"
synopsis:
  text: "Kedaulatan ditakrifkan sebagai kekuasaan tertinggi dan kewibawaan sesebuah negara yang bebas serta mempunyai hak untuk melaksanakan pemerintahan dan pentadbiran negara. Kedaulatan negara kita dapat dilihat dengan lebih jelas sejak zaman Kesultanan Melayu Melaka. Kemerdekaan Tanah Melayu pada 31 Ogos 1957 dan pembentukan Malaysia pada 16 September 1963 pula mengukuhkan serta memantapkan negara bangsa kita yang bebas dan berdaulat."
  page_reference: "Halaman 4"
chapter_metadata:
  inti_pati_pembelajaran:
    - "Konsep kedaulatan."
    - "Ciri negara yang berdaulat."
    - "Kepentingan mewujudkan negara berdaulat."
    - "Langkah mempertahankan kedaulatan."
  kemahiran_pemikiran_sejarah:
    - "Memahami kronologi perkembangan pemikiran berkaitan dengan konsep kedaulatan."
    - "Meneroka bukti berkaitan dengan kepentingan mewujudkan negara berdaulat dalam aspek politik, ekonomi dan sosial."
    - "Membuat interpretasi ciri yang membentuk identiti negara berdaulat."
    - "Membuat imaginasi hubung kait langkah pemerintah and rakyat mempertahankan kedaulatan negara."
    - "Membuat rasionalisasi kepentingan mengekalkan kedaulatan negara."
  elemen_kewarganegaraan_dan_sivik:
    - "Kebijaksanaan menghadapi cabaran bagi mengekalkan kedaulatan negara."
    - "Kepentingan mengekalkan kedaulatan negara."
    - "Kepentingan menghormati kepelbagaian budaya dan agama bagi mengukuhkan perpaduan bangsa Malaysia."
    - "Kepentingan menjiwai identiti negara."
subtopics:
  - subtopic_id: "1.1"
    subtopic_title: "Konsep Kedaulatan"
    page_references: "Halaman 4 - 7"
    sections:
      - section_title: "Takrif Kedaulatan Mengikut Bahasa"
        page_reference: "Halaman 4"
        items:
          - item_type: "language_definition"
            title: "Bahasa Yunani"
            description: "Kedaulatan ialah supernuus atau superanus yang bermaksud agung atau tertinggi. Perkataan ini merujuk negara yang bebas dan merdeka."
          - item_type: "language_definition"
            title: "Bahasa Arab"
            description: "Perkataan kedaulatan berasal daripada kata daulah yang bermaksud kuasa pemerintahan sesebuah kerajaan."
          - item_type: "language_definition"
            title: "Bahasa Melayu"
            description: "Kedaulatan merujuk perkataan daulat yang bermaksud kekuasaan tertinggi terhadap pemerintahan negara."
          - item_type: "language_definition"
            title: "Bahasa Inggeris"
            description: "Kedaulatan ialah sovereignty yang bermaksud negara mempunyai kuasa penuh terhadap pemerintahan."
          - item_type: "concept"
            title: "Kesimpulan Takrif"
            description: "Kedaulatan merujuk kuasa tertinggi sesebuah kerajaan bagi menjalankan pemerintahan negara yang bebas dan merdeka."
          - item_type: "information_box"
            title: "Tamadun Yunani"
            description: "Merujuk Tamadun Greek. Tamadun ini berkembang antara tahun 1000 Sebelum Masihi hingga 800 Sebelum Masihi. Greek merupakan salah satu wilayah Greece pada masa ini."
      - section_title: "Pandangan Tokoh"
        page_reference: "Halaman 5"
        items:
          - item_type: "figure_viewpoint"
            title: "Aristotle"
            description: "Kedaulatan merupakan kuasa tertinggi dalam sistem pemerintahan sesebuah negara. Kedaulatan merujuk kerajaan yang terikat oleh undang-undang."
            context: "(Ahli Falsafah Yunani)"
          - item_type: "figure_viewpoint"
            title: "Ibnu Khaldun"
            description: "Kedaulatan merupakan kekuatan dan kekuasaan sesebuah negara berasaskan semangat kekitaan bangsanya. Kekuatan semangat kekitaan yang diiringi dengan kekuatan semangat beragama menyebabkan sesuatu bangsa rela berkorban demi cita-cita yang sama."
            context: "(Ilmuwan Islam)"
          - item_type: "figure_viewpoint"
            title: "Jean Bodin"
            description: "Kedaulatan merupakan kuasa tertinggi dalam sesebuah negara. Kedaulatan mempunyai sifat kekal dan kuasa tidak terbatas untuk membuat undang-undang, mentafsir dan melaksanakannya."
            context: "(Ahli Falsafah Politik Perancis)"
          - item_type: "figure_viewpoint"
            title: "Tunku Abdul Rahman Putra al-Haj"
            description: "Kedaulatan dibina berdasarkan prinsip kebebasan dan keadilan yang sentiasa memperjuangkan kebajikan dan kesejahteraan rakyat."
            context: "(Perdana Menteri Malaysia Pertama)"
          - item_type: "figure_viewpoint"
            title: "Tun Dr. Mohamed Salleh Abas"
            description: "Kedaulatan merupakan asas negara yang merdeka, memiliki kebebasan pada peringkat antarabangsa bersama dengan hak dan kuasa untuk mengatur urusan dalam negeri tanpa telunjuk asing."
            context: "(Mantan Ketua Hakim Negara)"
      - section_title: "Jenis Kedaulatan"
        page_reference: "Halaman 6 - 7"
        items:
          - item_type: "concept"
            title: "Kedaulatan Tradisional"
            description: "Merujuk sistem pemerintahan berkuasa mutlak yang menguasai sepenuhnya segala urusan negara. Kedaulatan negara kita berpaksi pada kedaulatan Raja-raja Melayu. Kedaulatan terletak pada kekuasaan dan kewibawaan raja."
          - item_type: "concept"
            title: "Kedaulatan Moden"
            description: "Dikaitkan dengan idea kemunculan negara bangsa selepas Revolusi Keagungan di England dan Revolusi Perancis. Ia juga dikaitkan dengan hak rakyat dan kerajaan berperlembagaan."
          - item_type: "concept"
            title: "Kedaulatan Undang-undang"
            description: "Bermaksud kerajaan dan rakyat terikat oleh undang-undang yang perlu dipatuhi. Menjamin keadilan dalam kehidupan bermasyarakat serta menjadikan negara aman, stabil dan makmur."
          - item_type: "concept"
            title: "Kedaulatan Antarabangsa"
            description: "Merujuk pengiktirafan Pertubuhan Bangsa-Bangsa Bersatu (PBB) terhadap sesebuah negara yang tidak boleh dicabuli oleh negara lain."
  - subtopic_id: "1.2"
    subtopic_title: "Ciri Negara yang Berdaulat"
    page_references: "Halaman 8 - 9"
    sections:
      - section_title: "Ciri-ciri Utama"
        page_reference: "Halaman 8 - 9"
        items:
          - item_type: "concept"
            title: "Mempunyai Pemerintahan"
            description: "Pemerintahan negara berdaulat diwujudkan untuk menjaga kestabilan politik, keamanan, pertahanan dan ekonomi. Malaysia mengamalkan sistem Raja Berperlembagaan dan Demokrasi Berparlimen."
          - item_type: "concept"
            title: "Mempunyai Sempadan"
            description: "Garis pemisah antara negeri dan negara. Malaysia berkongsi sempadan darat, air dan udara dengan jiran seperti Singapura, Thailand, Indonesia, Brunei dan Filipina yang diakui PBB."
          - item_type: "map_or_chart_reference"
            title: "Peta Sempadan Malaysia"
            description: "Peta menunjukkan kedudukan Malaysia yang bersempadan dengan negara jiran di Asia Tenggara."
            context: "(Halaman 8)"
          - item_type: "concept"
            title: "Mempunyai Perundangan"
            description: "Sistem perundangan menjadi asas kepada peraturan negara untuk memelihara kesejahteraan, menjamin keadilan dan melindungi rakyat. Berpandukan Perlembagaan Persekutuan dan Parlimen."
          - item_type: "concept"
            title: "Mempunyai Rakyat"
            description: "Rakyat merupakan penduduk di sesebuah negara yang terikat kepada undang-undang. Rakyat Malaysia disatukan melalui satu bahasa, Rukun Negara, dan kebudayaan."
          - item_type: "pak21_activity"
            title: "Kerusi Panas (Hot Seat)"
            description: "Satu aktiviti di mana seorang pelajar duduk di kerusi dan bertindak sebagai pakar untuk menjawab soalan tentang ciri negara berdaulat yang dilontarkan oleh rakan sekelas."
            context: "(Aktiviti PAK-21)"
  - subtopic_id: "1.3"
    subtopic_title: "Kepentingan Mewujudkan Negara Berdaulat"
    page_references: "Halaman 10 - 11"
    sections:
      - section_title: "Kepentingan Kedaulatan"
        page_reference: "Halaman 10 - 11"
        items:
          - item_type: "concept"
            title: "Keberkesanan Pentadbiran"
            description: "Kedaulatan memberi kebebasan untuk menjalankan urusan pentadbiran tanpa campur tangan luar. Ia dilaksanakan melalui Jemaah Menteri dan disokong oleh Kerajaan Persekutuan dan Negeri."
          - item_type: "concept"
            title: "Kemakmuran Ekonomi"
            description: "Membolehkan negara melaksanakan dasar ekonomi secara bebas bagi memajukan dan meningkatkan taraf hidup rakyat dalam sektor pertanian, perindustrian dan perdagangan."
          - item_type: "concept"
            title: "Kesejahteraan Sosial"
            description: "Penting bagi negara melahirkan generasi berilmu dan berkemahiran melalui pendidikan kebangsaan, serta memupuk semangat muhibah melalui bahasa, budaya, dan sukan."
          - item_type: "concept"
            title: "Kecemerlangan Hubungan Luar Negara"
            description: "Memberikan hak untuk menjalin hubungan diplomatik. Negara dapat mengadakan perjanjian pertahanan serta menganggotai pertubuhan serantau dan antarabangsa demi imej negara."
  - subtopic_id: "1.4"
    subtopic_title: "Langkah Mempertahankan Kedaulatan"
    page_references: "Halaman 12 - 15"
    sections:
      - section_title: "Mewujudkan Kestabilan Politik dan Kemakmuran Ekonomi"
        page_reference: "Halaman 12"
        items:
          - item_type: "role_responsibility"
            title: "Peranan Pemerintah"
            description: "Mewujudkan pentadbiran yang cekap, mengelakkan rasuah, memastikan agihan ekonomi adil, dan melaksanakan undang-undang berkesan."
            context: "(Peranan Pemerintah)"
          - item_type: "role_responsibility"
            title: "Peranan Rakyat"
            description: "Memberikan kesetiaan kepada raja dan negara, menyokong dasar kerajaan, dan memupuk kerjasama semua kaum supaya agihan kekayaan dinikmati bersama."
            context: "(Peranan Rakyat)"
      - section_title: "Mengekalkan Perpaduan Kaum"
        page_reference: "Halaman 13"
        items:
          - item_type: "role_responsibility"
            title: "Peranan Pemerintah"
            description: "Menggubal dasar undang-undang yang berkaitan, memastikan keberkesanan program perpaduan (seperti sukan dan Rukun Negara), dan merangka kempen kesedaran."
            context: "(Peranan Pemerintah)"
          - item_type: "role_responsibility"
            title: "Peranan Rakyat"
            description: "Menggunakan bahasa kebangsaan, menghayati Rukun Negara, menghormati agama serta budaya pelbagai kaum, dan mengamalkan semangat perkongsian."
            context: "(Peranan Rakyat)"
      - section_title: "Memupuk Patriotisme"
        page_reference: "Halaman 14"
        items:
          - item_type: "role_responsibility"
            title: "Peranan Pemerintah"
            description: "Menganjurkan sambutan Hari Kebangsaan/Pahlawan, mewajibkan mata pelajaran Sejarah, serta menghargai tokoh negara dengan mengabadikan nama pada jalan/bangunan."
            context: "(Peranan Pemerintah)"
          - item_type: "role_responsibility"
            title: "Peranan Rakyat"
            description: "Menghormati bendera Jalur Gemilang dan Jata Negara, menyanjungi adat warisan, dan meningkatkan imej negara di persada antarabangsa."
            context: "(Peranan Rakyat)"
      - section_title: "Mengukuhkan Pertahanan Negara"
        page_reference: "Halaman 15"
        items:
          - item_type: "role_responsibility"
            title: "Peranan Pemerintah"
            description: "Menggubal dasar keselamatan, mengadakan latihan ketenteraan bersama negara luar, memodenkan aset ketenteraan dan memastikan pasukan bersiap siaga."
            context: "(Peranan Pemerintah)"
          - item_type: "role_responsibility"
            title: "Peranan Rakyat"
            description: "Peka akan isu keselamatan semasa, menyertai pasukan keselamatan (sukarelawan/Wataniah), dan sanggup berkorban demi mempertahankan negara."
            context: "(Peranan Rakyat)"
          - item_type: "pak21_activity"
            title: "Meja Bulat Serentak (Simultaneous Round Table)"
            description: "Murid secara berkumpulan mencatatkan maklum balas di atas kertas berkenaan peranan warganegara, dan kertas itu dipusingkan secara jam agar murid lain boleh menambah pandangan."
            context: "(Aktiviti PAK-21)"
chapter_conclusion:
  imbas_kembali:
    - "Konsep Kedaulatan (Takrif, Pandangan Tokoh, Jenis Kedaulatan)"
    - "Ciri Negara yang Berdaulat (Pemerintahan, Sempadan, Perundangan, Rakyat)"
    - "Kepentingan Mewujudkan Negara Berdaulat (Pentadbiran, Ekonomi, Sosial, Luar Negara)"
    - "Langkah Mempertahankan Kedaulatan (Pemerintah dan Rakyat)"
  pemahaman_dan_pemikiran_kritis:
    - question_text: "Apakah takrif kedaulatan dalam bahasa Arab?"
      question_type: "objective"
    - question_text: "Mengapakah kedaulatan penting bagi sesebuah negara?"
      question_type: "objective"
    - question_text: "(a) Jelaskan ciri negara berdaulat. (b) Huraikan langkah yang dilaksanakan untuk mempertahankan kedaulatan negara."
      question_type: "subjective"
    - question_text: "(a) Mengapakah hubungan baik dengan negara jiran perlu dipertahankan? (b) Setiap warganegara Malaysia mempunyai tanggungjawab untuk mempertahankan kedaulatan perairan negara. Bincangkan."
      question_type: "kbat"
  cakna_dan_cerminan_sejarah:
    - "Pemahaman terhadap ciri negara yang berdaulat wajar dipertingkatkan untuk melahirkan semangat menjiwai identiti negara. Kerjasama antara pemerintah dan rakyat untuk mempertahankan kedaulatan amat dituntut ke arah pembinaan negara bangsa yang kukuh demi kesejahteraan."
