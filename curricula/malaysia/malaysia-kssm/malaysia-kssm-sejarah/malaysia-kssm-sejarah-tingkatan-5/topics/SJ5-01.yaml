performance_standards:
  - level: 1
    descriptor: "Menyatakan pengetahuan yang berkaitan dengan kedaulatan negara."
    descriptor_en: "State knowledge related to national sovereignty."
  - level: 2
    descriptor: "Menjelaskan pemahaman berkaitan dengan kedaulatan negara berserta contoh."
    descriptor_en: "Explain understanding related to national sovereignty with examples."
  - level: 3
    descriptor: "Membuat kronologi maklumat berkaitan kedaulatan negara."
    descriptor_en: "Construct a chronology of information related to national sovereignty."
  - level: 4
    descriptor: "Mencerakinkan maklumat yang berkaitan dengan kedaulatan negara."
    descriptor_en: "Analyze information related to national sovereignty."
  - level: 5
    descriptor: "Menjustifikasikan kedaulatan negara dalam mempertahankan hak and maruah bangsa."
    descriptor_en: "Justify national sovereignty in defending the rights and dignity of the nation."
  - level: 6
    descriptor: "Menjana idea tentang cara mempertahankan kedaulatan negara dalam menghadapi cabaran globalisasi."
    descriptor_en: "Generate ideas on how to defend national sovereignty in facing the challenges of globalization."

prerequisites:
  required: []
  recommended: []

mastery:
  minimum_score: 0.75
  assessment_count: 3
  spaced_repetition:
    initial_interval_days: 3
    multiplier: 2.5

teaching:
  sequence:
    - "Langkah 1: Pengenalan kepada Konsep, Takrif, Pandangan Tokoh dan Jenis Kedaulatan (1.1)"
    - "Langkah 2: Mengenal pasti Ciri-ciri Negara yang Berdaulat secara perbincangan (1.2)"
    - "Langkah 3: Menganalisis Kepentingan Mewujudkan Negara Berdaulat dalam Pembangunan Negara (1.3)"
    - "Langkah 4: Membincangkan Langkah Mempertahankan Kedaulatan oleh Pemerintah dan Rakyat (1.4)"
  common_misconceptions:
    - misconception: "Kedaulatan hanya merujuk kepada sistem beraja secara eksklusif."
      remediation: "Jelaskan bahawa kedaulatan tidak hanya merujuk kepada kedaulatan tradisional, tetapi juga merangkumi kedaulatan moden, undang-undang, dan antarabangsa mengikut peredaran zaman."
    - misconception: "Sempadan negara hanya memfokuskan kepada persempadanan kawasan daratan sahaja."
      remediation: "Gunakan peta sebenar untuk menunjukkan bahawa sempadan negara turut merangkumi persempadanan maritim (perairan) dan ruang udara selaras dengan pengiktirafan antarabangsa."
  engagement_hooks:
    - "Situasi Pencerobohan: 'Apakah yang akan terjadi kepada kebebasan anda sebagai rakyat jika Malaysia kehilangan pengiktirafan kedaulatannya di peringkat antarabangsa (PBB)?'"
    - "Aktiviti 'Kerusi Panas': Seorang wakil pelajar memainkan peranan sebagai pakar tokoh sejarah (seperti Aristotle, Ibnu Khaldun, Jean Bodin) dan pelajar lain berpeluang menyoal pandangannya tentang definisi kedaulatan."

