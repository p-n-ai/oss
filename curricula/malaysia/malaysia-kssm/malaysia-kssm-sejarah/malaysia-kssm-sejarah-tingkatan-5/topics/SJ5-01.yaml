learning_objectives:
    - id: "12.1.1"
      text: "Menyatakan konsep kedaulatan."
      text_en: "Stating the concept of sovereignty."
      bloom: "remember"
      content_standard_id: "12.1"
      textbook_topic_id: "1.1"
    - id: "12.1.2"
      text: "Menerangkan ciri-ciri negara berdaulat."
      text_en: "Explaining the characteristics of a sovereign state."
      bloom: "understand"
      content_standard_id: "12.1"
      textbook_topic_id: "1.2"
    - id: "12.1.3"
      text: "Menjelaskan akan pentingnya mewujudkan negara berdaulat."
      text_en: "Explaining the importance of creating a sovereign state."
      bloom: "understand"
      content_standard_id: "12.1"
      textbook_topic_id: "1.3"
    - id: "12.1.4"
      text: "Menghuraikan langkah-langkah pemerintah dan rakyat dalam mempertahankan kedaulatan negara."
      text_en: "Describing the steps taken by the government and the people in defending national sovereignty."
      bloom: "analyze"
      content_standard_id: "12.1"
      textbook_topic_id: "1.4"
    - id: "K12.1.5"
      text: "Menerangkan kebijaksanaan dalam menghadapi cabaran mengekalkan kedaulatan negara."
      text_en: "Explaining the wisdom in facing challenges to maintain national sovereignty."
      bloom: "understand"
      content_standard_id: "12.1"
      textbook_topic_id: "1.1"
    - id: "K12.1.6"
      text: "Menjelaskan kepentingan mengekalkan kedaulatan negara."
      text_en: "Explaining the importance of maintaining national sovereignty."
      bloom: "understand"
      content_standard_id: "12.1"
      textbook_topic_id: "1.2"
    - id: "K12.1.7"
      text: "Mentafsir kepentingan menghormati kepelbagaian budaya dan agama dalam mengukuhkan perpaduan bangsa Malaysia."
      text_en: "Interpreting the importance of respecting cultural and religious diversity in strengthening the unity of the Malaysian nation."
      bloom: "evaluate"
      content_standard_id: "12.1"
      textbook_topic_id: "1.3"
    - id: "K12.1.8"
      text: "Menghuraikan kepentingan menjiwai identiti negara."
      text_en: "Describing the importance of internalizing national identity."
      bloom: "analyze"
      content_standard_id: "12.1"
      textbook_topic_id: "1.4"
