teaching:
    sequence:
        - 'Step 1: Introduce the significance of Greek and Roman civilizations with maps and timelines (15 min)'
        - 'Step 2: Discuss Greek governance and democracy through a group activity (20 min)'
        - 'Step 3: Present Roman architectural achievements using images and discussion (20 min)'
        - 'Step 4: Explain the impact of democratic principles on modern society (15 min)'
    common_misconceptions:
        - misconception: Democracy in ancient Greece was the same as modern democracy
          remediation: Use timeline comparisons to highlight differences in historical context
        - misconception: Roman architecture was only about aesthetics
          remediation: Emphasize the engineering feats and functional purposes of Roman designs
