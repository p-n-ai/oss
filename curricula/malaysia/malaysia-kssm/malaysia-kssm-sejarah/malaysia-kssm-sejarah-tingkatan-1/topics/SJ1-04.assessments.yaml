    # Learning Objective 4.1.6
    - id: "Q03"
      text: 'Mengapa kepimpinan penting dalam pembinaan sesuatu tamadun?'
      difficulty: "medium"
      learning_objective: "4.1.6"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: "Kepimpinan penting kerana ia menyediakan arah tuju, mengatur sumber, dan memastikan kestabilan dalam masyarakat."
        working: |
            Kepimpinan yang berkesan memberikan panduan dan strategi yang diperlukan untuk pembangunan tamadun, mengurus sumber dengan cekap, dan mengekalkan kestabilan politik dan sosial.
      marks: 5
      rubric:
        - marks: 2
          criteria: "Menjelaskan kepentingan arah tuju dan panduan."
        - marks: 2
          criteria: "Mengaitkan dengan pengurusan sumber dan kestabilan."
        - marks: 1
          criteria: "Memberikan contoh kepimpinan dalam sejarah tamadun."
      hints:
        - level: 1
          text: "Pertimbangkan bagaimana pemimpin dapat mempengaruhi hala tuju tamadun."
        - level: 2
          text: "Fikirkan tentang peranan pemimpin dalam mengurus sumber dan mengekalkan kestabilan."
