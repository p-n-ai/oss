        Step 1: Kenal pasti tamadun Yunani dan Rom.
        Step 2: Fahami bahawa tamadun Yunani berkembang di kawasan seperti Athens dan Sparta.
        Step 3: Ketahui bahawa tamadun Rom berkembang di kawasan seperti Rom dan Constantinople.
        Step 4: Senaraikan lokasi: Athens, Sparta, Rom, Constantinople.
