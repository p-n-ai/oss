      misconception_alert: "Pelajar mungkin berfikir demokrasi langsung sama dengan demokrasi sekarang."
      scenario: "Bincangkan bagaimana sistem pemerintahan tamadun Yunani mempengaruhi pentadbiran moden."
      working: |
        Step 1: Fahami konsep demokrasi langsung yang diamalkan di Athens.
        Step 2: Bandingkan dengan demokrasi perwakilan moden.
