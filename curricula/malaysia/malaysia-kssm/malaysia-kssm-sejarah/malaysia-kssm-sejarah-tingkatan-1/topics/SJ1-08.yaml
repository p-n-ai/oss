teaching:
    sequence:
        - 'Step 1: Introduce the cultural and social structures of pre-Islamic Arab society using a timeline (15 min)'
        - 'Step 2: Discuss the emergence of Islam and its early growth under Prophet Muhammad SAW with a map of expansion (15 min)'
        - 'Step 3: Explain the leadership qualities of Prophet Muhammad SAW through examples of his life (20 min)'
        - 'Step 4: Analyze the contributions of Islamic civilization in politics, economy, and social spheres with group discussions (20 min)'
        - 'Step 5: Explore Islamic architecture and its unique features using images and videos (15 min)'
    common_misconceptions:
        - misconception: Islam spread solely through conquest
          remediation: Highlight the role of trade, intermarriage, and diplomacy in the spread of Islam
        - misconception: Pre-Islamic Arab society was entirely chaotic
          remediation: Emphasize the complex social and economic structures that existed before Islam
