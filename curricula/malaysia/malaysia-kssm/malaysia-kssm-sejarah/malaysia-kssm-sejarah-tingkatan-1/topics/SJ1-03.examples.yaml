    - id: "WE-01"
      topic: "Maksud Zaman Prasejarah"
      difficulty: "easy"
      tp_level: 1
      kbat: false
      learning_objective: "3.1.1"
      real_world_analogy: "Menganggap Zaman Prasejarah seperti masa sebelum telefon bimbit dicipta, di mana cara komunikasi adalah berbeza."
      misconception_alert: "Pelajar sering salah anggap bahawa Zaman Prasejarah hanya merujuk kepada zaman dinosaur."
      scenario: "Apakah maksud Zaman Prasejarah?"
      working: |
        Step 1: Kenal pasti bahawa Zaman Prasejarah adalah masa sebelum wujudnya rekod bertulis.
        Step 2: Fahami bahawa ia meliputi tempoh yang sangat panjang dari awal kemunculan manusia hingga kemunculan tamadun dengan sistem tulisan.
        Step 3: Nyatakan bahawa Zaman Prasejarah merangkumi beberapa peringkat seperti Zaman Batu dan Zaman Logam.
    - id: "WE-02"
      topic: "Lokasi Zaman Prasejarah"
      difficulty: "medium"
      tp_level: 2
      kbat: false
      learning_objective: "3.1.2"
      real_world_analogy: "Bayangkan lokasi Zaman Prasejarah seperti taman tema besar dengan pelbagai bahagian yang menunjukkan cara hidup manusia dulu."
      misconception_alert: "Pelajar mungkin berfikir bahawa Zaman Prasejarah hanya berlaku di satu tempat sahaja."
      scenario: "Di manakah lokasi-lokasi penting Zaman Prasejarah?"
      working: |
        Step 1: Fahami bahawa lokasi Zaman Prasejarah terdapat di seluruh dunia.
        Step 2: Kenali lokasi-lokasi utama seperti Lembah Sungai Nil, Mesopotamia, dan kawasan sekitar Sungai Indus.
        Step 3: Sebutkan juga lokasi di Malaysia seperti Gua Niah dan Lenggong yang menyimpan bukti penting kehidupan prasejarah.
    - id: "WE-03"
      topic: "Bukti Tinggalan Zaman Prasejarah di Malaysia"
      difficulty: "hard"
      tp_level: 4
      kbat: true
      learning_objective: "3.1.5"
      real_world_analogy: "Mengandaikan bukti tinggalan Zaman Prasejarah seperti kepingan puzzle yang perlu disusun untuk memahami sejarah manusia."
      misconception_alert: "Pelajar sering menganggap tinggalan prasejarah tidak relevan kepada kehidupan moden."
      scenario: "Bincangkan bukti tinggalan Zaman Prasejarah yang terdapat di Malaysia."
      working: |-
        Step 1: Kenal pasti bahawa bukti tinggalan termasuk artifak seperti alat batu, tembikar, dan lukisan gua.
        Step 2: Teliti contoh seperti Gua Niah di Sarawak yang mengandungi sisa makanan dan alat batu.
        Step 3: Analisis kepentingan bukti ini dalam memahami kehidupan dan adaptasi manusia prasejarah.
        Step 4: Kaitkan penemuan ini dengan kesinambungan budaya dan teknologi hingga ke zaman moden.
