    # Learning Objective: 4.3.1 - Menyatakan latar belakang masyarakat Arab sebelum kedatangan Islam
    - id: "Q01"
      text: 'Apakah ciri-ciri utama masyarakat Arab sebelum kedatangan Islam?'
      difficulty: "medium"
      learning_objective: "4.3.1"
      tp_level: 3
      kbat: false
      answer:
        type: "multiple_choice"
        value: "B"
        options:
            A: "Masyarakat berstruktur berasaskan sistem feudal."
            B: "Masyarakat berpuak dan bergantung kepada sistem kabilah."
            C: "Masyarakat yang mengamalkan sistem demokrasi."
            D: "Masyarakat yang mementingkan perdagangan antarabangsa."
        working: 'Masyarakat Arab sebelum kedatangan Islam hidup dalam sistem kabilah di mana setiap kabilah mempunyai ketua yang dihormati.'
