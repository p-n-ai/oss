      learning_objective: "2.1.5"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: "Perubahan iklim, kepupusan spesies tertentu, dan perkembangan tamadun manusia."
        working: |
            Perubahan yang berlaku termasuk:
            - Pemanasan global yang mengakibatkan peningkatan suhu.
            - Kepupusan spesies seperti mamot berbulu akibat perubahan habitat.
            - Peralihan ke pertanian dan permulaan tamadun manusia.
      marks: 4
      rubric:
