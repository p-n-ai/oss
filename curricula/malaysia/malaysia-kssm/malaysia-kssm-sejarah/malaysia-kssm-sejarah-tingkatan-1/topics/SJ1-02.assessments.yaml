      tp_level: 3
      kbat: false
      answer:
        type: "free_text"
        value: "Memastikan kelangsungan biodiversiti, mengurangkan kesan perubahan iklim, dan menjamin sumber untuk generasi akan datang."
        working: |
            Kepentingan usaha memelihara dan memulihara termasuk:
