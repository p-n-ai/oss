teaching:
    sequence:
        - Memahami konsep elektrolisis dan aplikasinya (15 min)
        - Menjalankan eksperimen elektrolisis dengan larutan natrium klorida (30 min)
        - Mengkaji faktor yang mempengaruhi elektrolisis melalui eksperimen (20 min)
    common_misconceptions:
        - misconception: Semua elektrolit bertindak sama dalam elektrolisis
          remediation: Gunakan simulasi untuk menunjukkan perbezaan antara elektrolit kuat dan lemah
        - misconception: Elektrolisis menghasilkan produk yang sama di semua elektrod
          remediation: Ulang kaji peranan anod dan katod dalam elektrolisis
