topic_id: "SC5-07"
provenance: "ai-generated"
description: "Worked examples for Cahaya dan Optik"
worked_examples:
    - id: "WE-01"
      topic: "Kanta Cembung sebagai Kanta Penumpu"
      difficulty: "easy"
      tp_level: 3
      kbat: false
      learning_objective: "7.1.1"
      real_world_analogy: "Seperti bagaimana kaca pembesar dapat memfokuskan cahaya matahari pada satu titik untuk membakar kertas."
      misconception_alert: "Ramai pelajar berfikir bahawa semua kanta cembung membesarkan imej, tetapi sebenarnya ia bergantung kepada jarak objek dari kanta."
      scenario: "Jelaskan bagaimana kanta cembung berfungsi sebagai kanta penumpu."
      working: |
        Step 1: Kanta cembung adalah lebih tebal di tengah berbanding di tepi.
        Step 2: Cahaya yang datang selari dengan paksi utama akan dibiaskan menuju ke satu titik, dipanggil titik fokus.
        Step 3: Oleh itu, kanta cembung berfungsi sebagai kanta penumpu kerana ia mengumpulkan sinar cahaya ke satu titik fokus di belakang kanta.
    - id: "WE-02"
      topic: "Menentukan Panjang Fokus bagi Kanta Cembung"
      difficulty: "medium"
      tp_level: 4
      kbat: true
      learning_objective: "7.1.2"
      real_world_analogy: "Seperti bagaimana kita boleh mengukur jarak dari kaca pembesar ke titik fokus untuk mendapatkan imej yang jelas."
      misconception_alert: "Pelajar mungkin berfikir bahawa panjang fokus adalah jarak fizikal kanta, bukan jarak dari kanta ke titik fokus."
      scenario: "Bagaimana anda boleh menentukan panjang fokus bagi suatu kanta cembung menggunakan objek jauh?"
      working: |
        Step 1: Letakkan kanta cembung di antara objek jauh (seperti pokok) dan skrin.
        Step 2: Gerakkan skrin atau kanta sehingga anda mendapatkan imej yang paling tajam pada skrin.
        Step 3: Ukur jarak antara kanta dan skrin. Jarak ini adalah panjang fokus kanta cembung.
    - id: "WE-03"
      topic: "Pembentukan Imej oleh Kanta Cekung"
      difficulty: "hard"
      tp_level: 5
      kbat: true
      learning_objective: "7.1.3"
      real_world_analogy: "Seperti bagaimana cermin sisi kereta memberikan pandangan luas tetapi imej yang lebih kecil."
      misconception_alert: "Pelajar sering keliru dan berfikir bahawa kanta cekung boleh membesarkan imej, sedangkan ia mengecilkan dan menjadikan imej maya."
      scenario: "Lukiskan dan terangkan gambarajah sinar untuk menggambarkan imej yang dibentuk oleh kanta cekung."
      working: |-
        Step 1: Lukis paksi utama dan kanta cekung dengan titik fokus (F) dan titik pusat (C).
        Step 2: Lukis sinar selari dengan paksi utama menuju ke kanta. Setelah melalui kanta, sinar ini akan dibiaskan seolah-olah berasal dari titik fokus di depan kanta.
        Step 3: Lukis satu lagi sinar menuju ke pusat optik kanta. Sinar ini akan menembus tanpa pembiasan.
        Step 4: Di mana sinar-sinar dibiaskan bertemu jika dipanjangkan ke belakang adalah lokasi imej maya, tegak, dan lebih kecil dari objek.
