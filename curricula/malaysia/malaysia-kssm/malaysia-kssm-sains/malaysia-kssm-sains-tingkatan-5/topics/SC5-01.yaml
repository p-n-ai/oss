teaching:
    sequence:
        - Introduction to microorganisms and their ubiquity (15 min)
        - Hands-on experiment observing microorganisms (30 min)
        - Discussion on beneficial applications in food and medicine (20 min)
    common_misconceptions:
        - misconception: Microorganisms are all harmful.
          remediation: Highlight beneficial uses in food and medicine.
        - misconception: Antibiotics work against all microorganisms.
          remediation: Discuss specific targets of antibiotics - bacteria only, not viruses.
