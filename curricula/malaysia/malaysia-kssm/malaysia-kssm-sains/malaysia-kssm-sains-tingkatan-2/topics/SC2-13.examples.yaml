      difficulty: "easy"
      tp_level: 2
      kbat: false
      learning_objective: "13.1.1"
      real_world_analogy: "Think of a meteoroid as a small rock flying through space, like a pebble tossed across a pond."
      misconception_alert: "Students often confuse meteoroids with meteorites. A meteoroid is in space, while a meteorite is what remains after hitting the Earth's surface."
      scenario: "Explain what a meteoroid is and how it differs from a meteorite."
      working: |
        Step 1: Define a meteoroid as a small rocky or metallic body traveling through space.
        Step 2: Explain that when a meteoroid enters Earth's atmosphere and burns up, it becomes a meteor.
        Step 3: Clarify that if any part of the meteoroid survives the journey through the atmosphere and lands on Earth, it is then called a meteorite.
