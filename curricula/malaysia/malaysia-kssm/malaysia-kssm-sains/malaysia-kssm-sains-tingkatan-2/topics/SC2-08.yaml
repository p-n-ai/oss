      descriptor_en: "Student can use force and motion knowledge in simple situations."
    - level: 4
      id: "TP4"
      text: "Menganalisis pengetahuan mengenai daya dan gerakan dalam konteks penyelesaian masalah mengenai kejadian atau fenomena alam."
      text_en: "Analyze knowledge about force and motion in the context of problem solving regarding natural events or phenomena."
      descriptor: "Murid dapat menganalisis isu daya dan gerakan dalam konteks fizik."
      descriptor_en: "Student can analyze force and motion issues in the context of physics."
    - level: 5
      id: "TP5"
      text: "Menilai pengetahuan mengenai daya dan gerakan dalam konteks penyelesaian masalah dan membuat keputusan untuk melaksanakan satu tugasan."
      text_en: "Evaluate knowledge about force and motion in the context of problem solving and make decisions to carry out a task."
      descriptor: "Murid dapat menilai dan membuat keputusan mengenai isu daya dan gerakan."
      descriptor_en: "Student can evaluate and make decisions regarding force and motion issues."
    - level: 6
      id: "TP6"
      text: "Merekacipta dengan menggunakan pengetahuan dan kemahiran sains mengenai daya dan gerakan dalam konteks penyelesaian masalah dan membuat keputusan atau dalam melaksanakan satu tugasan dalam situasi baharu secara kreatif dan inovatif dengan mengambil kira nilai sosial/ekonomi/budaya masyarakat."
      text_en: "Create using science knowledge and skills about force and motion in the context of problem solving and making decisions or in carrying out a task in new situations creatively and innovatively by considering social/economic/cultural values of society."
      descriptor: "Murid dapat mencipta penyelesaian inovatif untuk isu daya dan gerakan."
      descriptor_en: "Student can create innovative solutions for force and motion issues."
prerequisites:
    required: []
    recommended: []
teaching:
    sequence:
        - 'Introduction to Forces: Discuss everyday examples of forces (15 min)'
        - 'Characteristics of Forces: Explore magnitude, direction, and application (20 min)'
        - 'Newton''s Third Law: Demonstrate action-reaction pairs (15 min)'
        - 'Buoyancy and Density: Relate to real-life examples like floating boats (20 min)'
        - 'Levers and Moments: Classify and solve lever problems (25 min)'
        - 'Pressure and Applications: Conduct experiments and discuss applications (30 min)'
    common_misconceptions:
        - misconception: Forces are needed to keep an object moving.
          remediation: Discuss Newton's First Law and use frictionless examples.
        - misconception: Heavier objects fall faster.
          remediation: Conduct experiments with objects of different masses.
