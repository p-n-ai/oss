learning_objectives:
    - id: "8.1.1"
      text: "Menghuraikan dan berkomunikasi mengenai daya."
      text_en: "Elaborate and communicate about force."
      bloom: "understand"
      content_standard_id: "8.1"
    - id: "8.1.2"
      text: "Menerangkan daya mempunyai magnitud, arah dan titik aplikasi."
      text_en: "Explain that force has magnitude, direction, and point of application."
      bloom: "understand"
      content_standard_id: "8.1"
    - id: "8.1.3"
      text: "Mengukur daya dalam unit S.I."
      text_en: "Measure force in S.I. units."
      bloom: "apply"
      content_standard_id: "8.1"
    - id: "8.1.4"
      text: "Menjelaskan dengan contoh setiap daya tindakan terdapat daya tindak balas yang sama magnitud tetapi bertentangan arah."
      text_en: "Explain with examples that every action force has a reaction force of equal magnitude but opposite direction."
      bloom: "understand"
      content_standard_id: "8.1"
    - id: "8.2.1"
      text: "Menghuraikan dan berkomunikasi mengenai kesan tindakan daya."
      text_en: "Elaborate and communicate about the effect of action force."
      bloom: "understand"
      content_standard_id: "8.2"
    - id: "8.2.2"
      text: "Menerangkan dan berkomunikasi mengenai perkaitan antara perbezaan ketumpatan dengan kesan keapungan dalam kehidupan harian."
      text_en: "Explain and communicate about the relationship between density difference and buoyancy effect in daily life."
      bloom: "understand"
      content_standard_id: "8.2"
    - id: "8.2.3"
      text: "Mengelas dan menyelesaikan masalah tuas berdasarkan kedudukan fulkrum, beban dan daya."
      text_en: "Classify and solve lever problems based on fulcrum, load, and effort positions."
      bloom: "apply"
      content_standard_id: "8.2"
    - id: "8.2.4"
      text: "Menerangkan dan berkomunikasi mengenai momen daya."
      text_en: "Explain and communicate about moment of force."
      bloom: "understand"
      content_standard_id: "8.2"
    - id: "8.2.5"
      text: "Menjalankan eksperimen dan berkomunikasi mengenai tekanan serta aplikasinya dalam kehidupan harian."
      text_en: "Conduct an experiment and communicate about pressure and its application in daily life."
      bloom: "apply"
      content_standard_id: "8.2"
    - id: "8.2.6"
      text: "Menghuraikan dan berkomunikasi mengenai tekanan gas dengan merujuk kepada teori kinetik gas."
      text_en: "Elaborate and communicate about gas pressure referring to the kinetic theory of gases."
      bloom: "understand"
      content_standard_id: "8.2"
    - id: "8.2.7"
      text: "Menerangkan dan berkomunikasi mengenai kewujudan tekanan atmosfera dan kesan altitud kepada tekanan atmosfera."
      text_en: "Explain and communicate about the existence of atmospheric pressure and the effect of altitude on atmospheric pressure."
      bloom: "understand"
      content_standard_id: "8.2"
    - id: "8.2.8"
      text: "Menerangkan kesan kedalaman terhadap tekanan cecair."
      text_en: "Explain the effect of depth on liquid pressure."
      bloom: "understand"
      content_standard_id: "8.2"
