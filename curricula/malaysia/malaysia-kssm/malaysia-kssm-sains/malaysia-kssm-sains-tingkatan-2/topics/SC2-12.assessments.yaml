questions:
    # Learning Objective 12.1.1
    - id: "Q1"
      text: 'Bandingkan jarak planet Zuhrah dan Marikh dari Matahari dalam unit astronomi (a.u).'
      difficulty: "medium"
      learning_objective: "12.1.1"
      tp_level: 3
      kbat: true
      answer:
        type: "free_text"
        value: "Zuhrah: 0.72 a.u, Marikh: 1.52 a.u"
        working: |
            Zuhrah berada pada jarak 0.72 a.u dari Matahari dan Marikh pula berada pada jarak 1.52 a.u. Bandingkan kedua-dua nilai ini untuk menentukan mana yang lebih dekat.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Menyatakan jarak Zuhrah dengan betul"
        - marks: 1
          criteria: "Menyatakan jarak Marikh dengan betul"
        - marks: 1
          criteria: "Membandingkan kedua-dua jarak dengan betul"
      hints:
        - level: 1
          text: "Ingat kembali definisi unit astronomi (a.u) yang bersamaan dengan jarak dari Bumi ke Matahari."
        - level: 2
          text: "Zuhrah sedikit lebih dekat kepada Matahari berbanding Bumi."
    # Learning Objective 12.1.2
    - id: "Q2"
      text: 'Bina satu jadual yang membandingkan saiz dan jarak planet Musytari dan Bumi dari Matahari.'
      difficulty: "medium"
      learning_objective: "12.1.2"
      tp_level: 3
      kbat: true
      answer:
        type: "free_text"
        value: "Jadual yang menunjukkan saiz Musytari lebih besar daripada Bumi dan jaraknya lebih jauh."
        working: |
            Bina jadual dengan dua lajur, satu untuk Bumi dan satu untuk Musytari. Masukkan data: Saiz (radius) Bumi: 6,371 km, Musytari: 69,911 km; Jarak Bumi dari Matahari: 1 a.u, Musytari: 5.2 a.u.
      marks: 4
      rubric:
        - marks: 1
          criteria: "Menyatakan saiz Bumi dengan betul"
        - marks: 1
          criteria: "Menyatakan saiz Musytari dengan betul"
        - marks: 1
          criteria: "Menyatakan jarak Bumi dari Matahari dengan betul"
        - marks: 1
          criteria: "Menyatakan jarak Musytari dari Matahari dengan betul"
      hints:
        - level: 1
          text: "Gunakan maklumat radius planet untuk saiz."
        - level: 2
          text: "Ingat bahawa 1 a.u. adalah jarak Bumi ke Matahari."
    # Learning Objective 12.1.3
    - id: "Q3"
      text: 'Jelaskan hubungan antara jarak planet dari Matahari dengan suhu permukaannya.'
      difficulty: "medium"
      learning_objective: "12.1.3"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: "Semakin jauh planet dari Matahari, semakin rendah suhu permukaannya."
        working: |
            Planet yang lebih dekat dengan Matahari menerima lebih banyak tenaga suria, menjadikannya lebih panas. Sebaliknya, planet yang lebih jauh menerima kurang tenaga dan lebih sejuk.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Menyatakan hubungan umum antara jarak dan suhu"
        - marks: 1
          criteria: "Memberikan contoh planet untuk menyokong jawapan"
        - marks: 1
          criteria: "Menerangkan mekanisme bagaimana jarak mempengaruhi suhu"
      hints:
        - level: 1
          text: "Fikirkan tentang bagaimana tenaga dari Matahari mempengaruhi suhu."
        - level: 2
          text: "Planet lebih dekat seperti Merkurius lebih panas berbanding Musytari."
    # Learning Objective 12.1.4
    - id: "Q4"
      text: 'Analogikan situasi di mana Bumi berada pada jarak yang sama dengan Uranus dari Matahari. Apakah kesan terhadap iklim dan kehidupan?'
      difficulty: "medium"
      learning_objective: "12.1.4"
      tp_level: 5
      kbat: true
      answer:
        type: "free_text"
        value: "Iklim akan menjadi sangat sejuk, hampir tidak ada kehidupan yang dapat bertahan."
        working: |
            Jika Bumi berada sejauh Uranus, ia akan menerima sedikit tenaga dari Matahari. Ini akan menurunkan suhu secara drastik, menyebabkan pembekuan air dan ketidakmampuan untuk menyokong kehidupan seperti yang ada sekarang.
      marks: 4
      rubric:
        - marks: 1
          criteria: "Menyatakan penurunan suhu yang ketara"
        - marks: 1
          criteria: "Menyatakan implikasi terhadap air dan iklim"
        - marks: 1
          criteria: "Menyatakan kesan terhadap kehidupan"
        - marks: 1
          criteria: "Memberikan penjelasan yang koheren"
      hints:
        - level: 1
          text: "Pertimbangkan jarak dari Matahari dan kesannya terhadap suhu."
        - level: 2
          text: "Fikirkan tentang planet sejuk seperti Uranus dan kesannya pada Bumi."
    # Learning Objective 12.1.5
    - id: "Q5"
      text: 'Menjustifikasi mengapa Bumi adalah planet yang paling sesuai untuk kehidupan dalam Sistem Suria.'
      difficulty: "medium"
      learning_objective: "12.1.5"
      tp_level: 5
      kbat: true
      answer:
        type: "free_text"
        value: "Bumi mempunyai suhu sederhana, air dalam bentuk cecair, dan atmosfera yang menyokong kehidupan."
        working: |
            Bumi berada dalam zon boleh didiami dengan suhu yang sesuai untuk air cecair, atmosfera mengandungi oksigen dan gas lain yang menyokong kehidupan, dan pelbagai ekosistem yang menyediakan sumber daya yang diperlukan.
      marks: 5
      rubric:
        - marks: 1
          criteria: "Menyatakan suhu sederhana Bumi"
        - marks: 1
          criteria: "Menyatakan ketersediaan air cecair"
        - marks: 1
          criteria: "Menyatakan komposisi atmosfera yang sesuai"
        - marks: 1
          criteria: "Menyatakan ekosistem yang menyokong kehidupan"
        - marks: 1
          criteria: "Memberikan justifikasi yang koheren"
      hints:
        - level: 1
          text: "Pertimbangkan faktor-faktor yang menyokong kehidupan seperti air dan atmosfera."
        - level: 2
          text: "Berfikir tentang peranan zon boleh didiami dalam menyokong kehidupan."
