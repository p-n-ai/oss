teaching:
    sequence:
        - 'Step 1: Introduce the concept of energy and its forms (15 min)'
        - 'Step 2: Discuss electrostatic charges with examples (20 min)'
        - 'Step 3: Explain the relationship between current, voltage, and resistance (25 min)'
        - 'Step 4: Demonstrate electric circuits using series and parallel setups (30 min)'
        - 'Step 5: Conduct an experiment on electromagnets and discuss findings (40 min)'
    common_misconceptions:
        - misconception: Students often think that only moving charges can create electricity.
          remediation: Clarify that static charges can also generate electric fields.
        - misconception: Many believe that all magnets are permanent.
          remediation: Explain the difference between permanent magnets and electromagnets.
