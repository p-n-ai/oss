    text_en: "Analyze knowledge about acids and alkalis in the context of problem solving regarding natural events or phenomena."
    descriptor: "Murid dapat menganalisis isu asid dan alkali dalam konteks kimia."
    descriptor_en: "Student can analyze acid and alkali issues in the context of chemistry."
  - level: 5
    id: "TP5"
    text: "Menilai pengetahuan mengenai asid dan alkali dalam konteks penyelesaian masalah dan membuat keputusan untuk melaksanakan satu tugasan."
    text_en: "Evaluate knowledge about acids and alkalis in the context of problem solving and make decisions to carry out a task."
    descriptor: "Murid dapat menilai dan membuat keputusan mengenai isu asid dan alkali."
    descriptor_en: "Student can evaluate and make decisions regarding acid and alkali issues."
  - level: 6
    id: "TP6"
    text: "Merekacipta dengan menggunakan pengetahuan dan kemahiran sains mengenai asid dan alkali dalam konteks penyelesaian masalah dan membuat keputusan atau dalam melaksanakan satu tugasan dalam situasi baharu secara kreatif dan inovatif dengan mengambil kira nilai sosial/ekonomi/budaya masyarakat."
    text_en: "Create using science knowledge and skills about acids and alkalis in the context of problem solving and making decisions or in carrying out a task in new situations creatively and innovatively by considering social/economic/cultural values of society."
    descriptor: "Murid dapat mencipta penyelesaian inovatif untuk isu asid dan alkali."
    descriptor_en: "Student can create innovative solutions for acid and alkali issues."
