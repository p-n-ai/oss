teaching:
    sequence:
        - Mencari maklumat daripada alat teknologi seperti teleskop
        - Membincangkan galaksi, nebula, kitar hidup bintang
        - Menyatakan kedudukan Sistem Suria dalam Galaksi Bima Sakti
        - Melawat ke Balai Cerap atau planetarium
        - Menggunakan software astronomi (Skychart, Stellarium)
    common_misconceptions:
        - misconception: "Semua bintang kelihatan sama saiznya."
          remediation: "Terangkan bahawa saiz sebenar bintang berbeza-beza dan jarak mempengaruhi saiz yang dilihat."
        - misconception: "Bintang hanya kelihatan pada waktu malam."
          remediation: "Terangkan bahawa bintang wujud pada siang hari tetapi cahaya matahari menyilaukan penglihatan."
    engagement_hooks:
        - Mengamati bintang di waktu malam
        - Membandingkan saiz Bumi dengan Galaksi Bima Sakti
        - Menggunakan perisian astronomi untuk melihat objek angkasa
