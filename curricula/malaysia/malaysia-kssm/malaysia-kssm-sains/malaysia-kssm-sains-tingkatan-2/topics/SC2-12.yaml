learning_objectives:
  - id: "12.1.1"
    text: "Membandingkan jarak planet dalam sistem suria daripada matahari dengan menggunakan astronomical unit (a.u) dan tahun cahaya."
    text_en: "Compare the distance of planets in the solar system from the sun using astronomical unit (a.u) and light year."
    bloom: "analyze"
    content_standard_id: "12.1"
  - id: "12.1.2"
    text: "Membina jadual untuk membanding dan membezakan antara planet Sistem Suria dengan Bumi."
    text_en: "Build a table to compare and distinguish between Solar System planets and Earth."
    bloom: "create"
    content_standard_id: "12.1"
  - id: "12.1.3"
    text: "Meneroka hubungan yang mungkin berdasarkan ciri planet dan memberi penjelasan tentang hubungan tersebut termasuk anomali yang mungkin wujud."
    text_en: "Explore possible relationships based on planet characteristics and provide explanations about these relationships including possible anomalies."
    bloom: "analyze"
    content_standard_id: "12.1"
  - id: "12.1.4"
    text: "Menaakul dan menganalogikan situasi hipotetikal berkaitan dengan Sistem Suria."
    text_en: "Reason and analogize hypothetical situations related to the Solar System."
    bloom: "analyze"
    content_standard_id: "12.1"
  - id: "12.1.5"
    text: "Menjustifikasi Bumi merupakan planet yang paling sesuai untuk kehidupan berdasarkan data tentang Bumi."
    text_en: "Justify that Earth is the most suitable planet for life based on data about Earth."
    bloom: "evaluate"
    content_standard_id: "12.1"
performance_standards:
  - level: 1
    id: "TP1"
    text: "Mengingat kembali pengetahuan dan kemahiran sains mengenai sistem suria."
    text_en: "Recall science knowledge and skills regarding the solar system."
    descriptor: "Murid dapat mengingat kembali fakta asas mengenai sistem suria."
    descriptor_en: "Student can recall basic facts about the solar system."
  - level: 2
    id: "TP2"
    text: "Memahami sistem suria dan dapat menjelaskan kefahaman tersebut."
    text_en: "Understand the solar system and can explain the understanding."
    descriptor: "Murid dapat menjelaskan konsep sistem suria dengan mudah."
    descriptor_en: "Student can explain the concept of the solar system easily."
  - level: 3
    id: "TP3"
    text: "Mengaplikasikan pengetahuan mengenai sistem suria dan dapat melaksanakan tugasan mudah."
    text_en: "Apply knowledge about the solar system and can carry out simple tasks."
    descriptor: "Murid dapat menggunakan pengetahuan sistem suria dalam situasi mudah."
    descriptor_en: "Student can use solar system knowledge in simple situations."
  - level: 4
    id: "TP4"
    text: "Menganalisis pengetahuan mengenai sistem suria dalam konteks penyelesaian masalah mengenai kejadian atau fenomena alam."
    text_en: "Analyze knowledge about the solar system in the context of problem solving regarding natural events or phenomena."
    descriptor: "Murid dapat menganalisis isu sistem suria dalam konteks astronomi."
    descriptor_en: "Student can analyze solar system issues in the context of astronomy."
  - level: 5
    id: "TP5"
    text: "Menilai pengetahuan mengenai sistem suria dalam konteks penyelesaian masalah dan membuat keputusan untuk melaksanakan satu tugasan."
    text_en: "Evaluate knowledge about the solar system in the context of problem solving and make decisions to carry out a task."
    descriptor: "Murid dapat menilai dan membuat keputusan mengenai isu sistem suria."
    descriptor_en: "Student can evaluate and make decisions regarding solar system issues."
  - level: 6
    id: "TP6"
    text: "Merekacipta dengan menggunakan pengetahuan dan kemahiran sains mengenai sistem suria dalam konteks penyelesaian masalah dan membuat keputusan atau dalam melaksanakan satu tugasan dalam situasi baharu secara kreatif dan inovatif dengan mengambil kira nilai sosial/ekonomi/budaya masyarakat."
    text_en: "Create using science knowledge and skills about the solar system in the context of problem solving and making decisions or in carrying out a task in new situations creatively and innovatively by considering social/economic/cultural values of society."
    descriptor: "Murid dapat mencipta penyelesaian inovatif untuk isu sistem suria."
    descriptor_en: "Student can create innovative solutions for solar system issues."
