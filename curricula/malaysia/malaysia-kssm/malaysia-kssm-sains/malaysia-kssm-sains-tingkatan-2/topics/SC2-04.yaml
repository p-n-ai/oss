teaching:
    sequence:
        - 'Step 1: Introduce infectious and non-infectious diseases with examples (30 min)'
        - 'Step 2: Discuss disease transmission methods in groups (20 min)'
        - 'Step 3: Explain the body''s defense mechanisms with diagrams (25 min)'
        - 'Step 4: Explore immunity types and vaccination benefits (30 min)'
        - 'Step 5: Brainstorm prevention strategies for infectious diseases (20 min)'
    common_misconceptions:
        - misconception: All diseases are contagious
          remediation: Use examples of genetic vs. contagious diseases
        - misconception: Vaccines can cause the disease they prevent
          remediation: Explain how vaccines work and their safety
