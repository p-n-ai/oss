topic_id: "SC2-06"
provenance: "ai-generated"
description: "Worked examples for Asid dan Alkali"
worked_examples:
    - id: "WE-01"
      topic: "Mendefinisikan secara operasi asid dan alkali"
      difficulty: "easy"
      tp_level: 1
      kbat: false
      learning_objective: "6.1.1"
      real_world_analogy: "Asid seperti jus lemon yang terasa masam, manakala alkali seperti sabun yang licin."
      misconception_alert: "Asid selalu dianggap berbahaya, tetapi tidak semua asid adalah kuat atau merbahaya."
      scenario: "Bagaimana kita boleh mendefinisikan asid dan alkali secara operasi berdasarkan deria rasa?"
      working: |
        Step 1: Kenali bahawa asid biasanya mempunyai rasa masam. Contoh: jus lemon.
        Step 2: Kenali bahawa alkali biasanya mempunyai rasa pahit atau licin. Contoh: air sabun.
        Step 3: Kesimpulan, asid dan alkali boleh didefinisikan melalui deria rasa mereka, di mana asid masam dan alkali pahit/licin.
    - id: "WE-02"
      topic: "Menunjuk cara menentukan kekuatan asid dan alkali berdasarkan nilai pH"
      difficulty: "medium"
      tp_level: 3
      kbat: true
      learning_objective: "6.1.3"
      real_world_analogy: "Seperti skala suhu mengukur panas, skala pH mengukur kekuatan asid atau alkali."
      misconception_alert: "Tidak semua cecair dengan pH rendah adalah berbahaya, dan tidak semua dengan pH tinggi adalah selamat."
      scenario: "Anda mempunyai dua larutan: satu dengan pH 3 dan satu lagi dengan pH 11. Bagaimana anda menentukan kekuatan asid dan alkali kedua-dua larutan ini?"
      working: |
        Step 1: Fahami bahawa skala pH berkisar dari 0 hingga 14, di mana pH < 7 adalah asid dan pH > 7 adalah alkali.
        Step 2: Larutan dengan pH 3 adalah asid. Semakin rendah pH, semakin kuat asid.
        Step 3: Larutan dengan pH 11 adalah alkali. Semakin tinggi pH, semakin kuat alkali.
        Step 4: Kesimpulan, larutan pertama adalah asid kuat dan larutan kedua adalah alkali kuat.
    - id: "WE-03"
      topic: "Menerangkan proses peneutralan"
      difficulty: "hard"
      tp_level: 4
      kbat: true
      learning_objective: "6.2.1"
      real_world_analogy: "Seperti menambah air kepada kopi yang terlalu pekat untuk menjadikannya lebih seimbang."
      misconception_alert: "Peneutralan tidak selalu menghasilkan larutan pH 7, ia bergantung kepada kekuatan asid dan alkali yang digunakan."
      scenario: "Anda menumpahkan cuka (asid) di atas lantai dan ingin meneutralkannya. Apakah yang perlu anda lakukan?"
      working: |-
        Step 1: Fahami bahawa peneutralan berlaku apabila asid bertindak balas dengan alkali untuk menghasilkan garam dan air.
        Step 2: Pilih alkali yang sesuai, seperti baking soda, untuk meneutralkan cuka.
        Step 3: Taburkan baking soda di atas tumpahan cuka.
        Step 4: Reaksi antara cuka dan baking soda akan menghasilkan air dan karbon dioksida, menandakan peneutralan.
        Step 5: Kesimpulan, peneutralan telah berlaku apabila gelembung gas berhenti, menunjukkan asid dan alkali telah bertindak balas sepenuhnya.
