  - id: WE-01
    topic: "Understanding Atoms and Molecules"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: "6.1.1: Merumuskan semua jirim terdiri daripada atom."
    real_world_analogy: "Think of atoms as the individual Lego blocks used to build a larger structure."
    misconception_alert: "Students often confuse atoms with molecules, thinking they are the same."
    scenario: "Explain how all matter is made up of atoms."
    working: |
      Step 1: Matter is anything that has mass and occupies space.
      Step 2: All matter is composed of tiny particles called atoms, which are the building blocks.
      Step 3: Atoms can join together to form molecules, similar to how Lego blocks join to form structures.

  - id: WE-02
    topic: "Identifying Metals, Non-metals, and Noble Gases"
    difficulty: medium
    tp_level: 2
    kbat: false
    learning_objective: "6.1.3: Mengenal pasti kedudukan logam, bukan logam dan gas nadir dalam jadual berkala."
    real_world_analogy: "Imagine the periodic table as a city map where different groups of elements live in different neighborhoods."
    misconception_alert: "Confusing the location of non-metals and noble gases in the periodic table."
    scenario: "Identify where metals, non-metals, and noble gases are located in the periodic table."
    working: |
      Step 1: Metals are located on the left and center of the periodic table.
      Step 2: Non-metals are found on the right side of the periodic table.
      Step 3: Noble gases are located in the far-right column of the periodic table.

  - id: WE-03
    topic: "Distinguishing Between Chemical and Physical Changes"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: "6.3.5: Membezakan perubahan kimia dan perubahan fizik."
    real_world_analogy: "Consider baking a cake (chemical change) versus melting ice (physical change)."
    misconception_alert: "Mistaking a physical change for a chemical change because both can involve a change in state."
    scenario: "Discuss whether the rusting of iron and the melting of ice are chemical or physical changes."
    working: |
      Step 1: Identify the changes occurring in each process.
      Step 2: Rusting of iron involves a new substance being formed, indicating a chemical change.
      Step 3: Melting of ice involves a change in state from solid to liquid but no new substance, indicating a physical change.