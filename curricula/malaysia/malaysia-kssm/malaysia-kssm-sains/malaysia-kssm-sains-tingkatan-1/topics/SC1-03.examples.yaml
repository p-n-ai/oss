  - id: WE-01
    topic: "Homeostasis in Humans and Animals"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: "3.1.1: berkomunikasi maksud homeostasis."
    real_world_analogy: "Homeostasis is like a thermostat in a house that regulates the temperature."
    misconception_alert: "Students often think homeostasis only refers to temperature regulation, but it involves multiple systems like glucose and water balance."
    scenario: "Explain what homeostasis means in the context of human biology."
    working: |
      Step 1: Homeostasis refers to the maintenance of a stable internal environment in the body.
      Step 2: It involves various systems working together to keep conditions such as temperature, pH, and glucose levels constant.
      Step 3: For example, when you are hot, you sweat to cool down, maintaining temperature balance.

  - id: WE-02
    topic: "Homeostasis in Plants"
    difficulty: medium
    tp_level: 3
    kbat: false
    learning_objective: "3.1.3: menjelaskan dengan contoh sistem yang terlibat dengan homeostasis dalam tumbuhan."
    real_world_analogy: "Plants are like factories that need to regulate their operations to produce energy efficiently."
    misconception_alert: "A common misconception is that plants do not have homeostatic mechanisms like animals, but they do, such as regulating water through stomata."
    scenario: "Describe a homeostatic process in plants and how it aids in their survival."
    working: |
      Step 1: Plants maintain water balance through stomata, which are small openings on their leaves.
      Step 2: When the plant has sufficient water, the stomata open to allow gas exchange for photosynthesis.
      Step 3: In dry conditions, stomata close to conserve water, demonstrating homeostasis by balancing water retention and gas exchange.

  - id: WE-03
    topic: "Importance of Homeostasis"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: "3.1.4: menghargai kepentingan homeostasis kepada manusia dan benda hidup."
    real_world_analogy: "Think of a computer that needs a cooling system to function properly; without it, the computer would overheat and malfunction."
    misconception_alert: "Some students may not understand that without homeostasis, living organisms cannot survive prolonged changes in their environment."
    scenario: "Evaluate why homeostasis is crucial for the survival of organisms, using examples from both humans and animals."
    working: |
      Step 1: Homeostasis allows organisms to function efficiently and adapt to environmental changes.
      Step 2: In humans, homeostasis regulates body temperature, which is crucial for enzyme activity and metabolic processes.
      Step 3: In animals, homeostasis balances energy through food intake and energy expenditure, essential for survival in changing environments.
      Step 4: Without homeostasis, organisms would not be able to maintain necessary conditions for life, leading to malfunction or death.