worked_examples:
  - id: WE-01
    topic: "Imej sahih dan imej maya"
    difficulty: easy
    tp_level: 2
    kbat: false
    learning_objective: "8.1.1 (analyze): membezakan antara imej sahih dan imej maya."
    real_world_analogy: "Seperti melihat bayangan dalam air yang tenang, imej maya tidak dapat disentuh."
    misconception_alert: "Ramai pelajar menganggap imej dalam cermin satah adalah sahih kerana ia kelihatan nyata; sebenarnya ia adalah imej maya."
    scenario: "Di dalam bilik yang cerah, Ali melihat dirinya di dalam cermin. Adakah imej yang dilihat Ali dalam cermin adalah imej sahih atau imej maya?"
    working: |
      Step 1: Kenal pasti jenis cermin yang digunakan. Dalam kes ini, ia adalah cermin satah.
      Step 2: Fahami bahawa imej dalam cermin satah tidak boleh disentuh atau diproyeksikan pada skrin; ini bermakna ia adalah imej maya.
      Step 3: Oleh itu, imej yang dilihat Ali dalam cermin adalah imej maya.

  - id: WE-02
    topic: "Ciri imej dalam cermin cekung dan cembung"
    difficulty: medium
    tp_level: 3
    kbat: true
    learning_objective: "8.1.2 (understand): berkomunikasi mengenai ciri imej dalam cermin cekung dan cermin cembung."
    real_world_analogy: "Seperti refleksi dalam sudu, cermin cekung dan cembung mengubah saiz dan bentuk imej."
    misconception_alert: "Pelajar sering keliru antara imej yang diperbesarkan dan dikecilkan, terutama antara cermin cekung dan cembung."
    scenario: "Lina menggunakan cermin cekung untuk melihat wajahnya dan mendapati imej wajahnya diperbesarkan. Jelaskan mengapa ini berlaku."
    working: |
      Step 1: Kenal pasti jenis cermin yang digunakan, iaitu cermin cekung.
      Step 2: Fahami bahawa cermin cekung boleh menghasilkan imej yang diperbesarkan apabila objek berada dekat dengan cermin, dalam jarak fokusnya.
      Step 3: Oleh itu, imej wajah Lina diperbesarkan kerana wajahnya berada dalam jarak fokus cermin cekung.

  - id: WE-03
    topic: "Pembiasan cahaya"
    difficulty: hard
    tp_level: 4
    kbat: true
    learning_objective: "8.4.3 (understand): merumuskan hubungan antara sudut tuju, i dan sudut biasan, r apabila cahaya bergerak dari medium kurang tumpat ke lebih tumpat."
    real_world_analogy: "Seperti melihat pensel dalam segelas air, pembiasan mengubah arah laluan cahaya."
    misconception_alert: "Pelajar mungkin menyangka cahaya tidak berubah arah apabila melalui medium yang berbeza ketumpatan, sedangkan ia sebenarnya membias."
    scenario: "Cahaya memasuki air dari udara dengan sudut tuju 30 darjah. Jelaskan bagaimana sudut biasan berbeza daripada sudut tuju."
    working: |
      Step 1: Fahami bahawa apabila cahaya bergerak dari medium kurang tumpat (udara) ke medium lebih tumpat (air), ia akan membias mendekati normal.
      Step 2: Gunakan hukum Snell yang menyatakan n1 * sin(i) = n2 * sin(r), di mana n adalah indeks biasan.
      Step 3: Oleh kerana n_air < n_air, sudut biasan, r, adalah lebih kecil daripada sudut tuju, i. Jadi, cahaya membias mendekati normal.