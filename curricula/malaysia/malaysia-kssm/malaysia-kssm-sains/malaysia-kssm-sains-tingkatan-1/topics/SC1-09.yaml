provenance: ai-generated
teaching:
    sequence:
        - 'Step 1: Introduce Earth''s layers and systems using diagrams and models (20 min)'
        - 'Step 2: Discuss types of rocks and their formation processes with samples (25 min)'
        - 'Step 3: Explain geological processes and geohazards with case studies (30 min)'
        - 'Step 4: Explore the geological time scale and fossil importance (25 min)'
        - 'Step 5: Discuss water systems and mineral resources, highlighting risks and benefits (30 min)'
    common_misconceptions:
        - misconception: All rocks are the same due to surface similarity
          remediation: Use hands-on examination of different rock samples to highlight differences
        - misconception: Earth's core is solid
          remediation: Explain the roles of pressure and temperature in maintaining a liquid outer core
engagement_hooks:
    - Discuss recent local geological events to connect lessons with real-world experiences
    - Explore how local geography influences community life and industry
