learning_objectives:
    - id: 5.1.1
      text: "menyatakan bahawa hampir semua benda yang wujud dalam alam adalah jirim."
      text_en: "State that almost all things that exist in nature are matter."
      bloom: remember
    - id: 5.1.2
      text: "membuktikan bahawa benda hidup dan bukan hidup mempunyai jisim dan memenuhi ruang."
      text_en: "Prove that living and non-living things have mass and occupy space."
      bloom: apply
    - id: 5.1.3
      text: "membezakan sifat fizik dan sifat kimia jirim."
      text_en: "Differentiate physical properties and chemical properties of matter."
      bloom: analyze
    - id: 5.1.4
      text: "mengelas bahan dari pelbagai ciri."
      text_en: "Classify materials from various characteristics."
      bloom: apply
    - id: 5.2.1
      text: "mengitlak bahawa jirim terdiri daripada zarah."
      text_en: "Infer that matter consists of particles."
      bloom: understand
    - id: 5.2.2
      text: "membanding dan membezakan tiga keadaan jirim berdasarkan teori kinetik dari segi susunan dan pergerakan zarah-zarah."
      text_en: "Compare and distinguish three states of matter based on kinetic theory in terms of arrangement and movement of particles."
      bloom: analyze
    - id: 5.2.3
      text: "menggunakan perhubungan ruang dan masa bagi membezakan kadar resapan dalam tiga keadaan jirim."
      text_en: "Use the relationship of space and time to differentiate the rate of diffusion in three states of matter."
      bloom: apply
    - id: 5.2.4
      text: "memerihalkan perubahan keadaan jirim dari segi pergerakan zarah-zarah akibat daripada penyerapan dan pembebasan haba berdasarkan teori kinetik."
      text_en: "Describe the change of state of matter in terms of particle movement due to absorption and release of heat based on kinetic theory."
      bloom: understand
    - id: 5.2.5
      text: "merumuskan bahawa suhu kekal semasa pembekuan, peleburan dan pendidihan."
      text_en: "Conclude that temperature remains constant during freezing, melting and boiling."
      bloom: understand
    - id: 5.2.6
      text: "merumuskan jisim kekal tidak berubah semasa perubahan fizik."
      text_en: "Conclude that mass remains unchanged during physical changes."
      bloom: understand
    - id: 5.2.7
      text: "menjelaskan dengan contoh perubahan keadaan jirim dalam kehidupan harian."
      text_en: "Explain with examples of change of state of matter in daily life."
      bloom: understand
