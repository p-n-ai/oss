teaching:
    sequence:
        - 'Step 1: Introduce the concept of matter with everyday examples (15 min)'
        - 'Step 2: Explore physical and chemical properties through hands-on activities (20 min)'
        - 'Step 3: Explain states of matter using particle diagrams and animations (25 min)'
        - 'Step 4: Discuss the kinetic theory and its application to state changes (20 min)'
        - 'Step 5: Conduct an experiment to observe temperature consistency during phase changes (15 min)'
    common_misconceptions:
        - misconception: Only solid objects are considered matter
          remediation: Explain that gases like air are also matter as they occupy space and have mass
        - misconception: Temperature changes during phase change
          remediation: Demonstrate that temperature remains constant during phase changes like melting
engagement_hooks:
    - Discuss how local foods, such as steamed rice, involve changes in states of matter
    - Explore traditional crafts like pottery to illustrate the concept of matter
