description: "Worked examples for Jirim"
worked_examples:
  - id: WE-01
    topic: "Jirim dalam Alam"
    difficulty: easy
    tp_level: 1
    kbat: false
    learning_objective: "5.1.1 menyatakan bahawa hampir semua benda yang wujud dalam alam adalah jirim."
    real_world_analogy: "Seperti air yang mengisi setiap ruang dalam botol, setiap benda memenuhi ruang di alam."
    misconception_alert: "Pelajar sering menganggap hanya benda keras adalah jirim, sedangkan udara juga adalah jirim."
    scenario: "Nyatakan bahawa hampir semua benda di sekeliling kita adalah jirim."
    working: |
      Step 1: Fahami definisi jirim sebagai sesuatu yang mempunyai jisim dan memenuhi ruang.
      Step 2: Perhatikan persekitaran anda, seperti meja, kerusi, dan udara. Semua ini adalah contoh jirim.
      Step 3: Nyatakan kesimpulan bahawa hampir semua benda yang wujud adalah jirim kerana mereka mempunyai jisim dan memenuhi ruang.

  - id: WE-02
    topic: "Sifat Fizik dan Kimia Jirim"
    difficulty: medium
    tp_level: 4
    kbat: true
    learning_objective: "5.1.3 membezakan sifat fizik dan sifat kimia jirim."
    real_world_analogy: "Seperti perbezaan antara bentuk dan rasa kek, sifat fizik dan kimia jirim juga berbeza."
    misconception_alert: "Pelajar mungkin keliru antara perubahan fizikal dan perubahan kimia."
    scenario: "Bezakan antara sifat fizik dan sifat kimia bagi air."
    working: |
      Step 1: Tentukan sifat fizik air seperti bentuk, warna, dan titik didih. Ini adalah sifat yang boleh diukur tanpa mengubah komposisi air.
      Step 2: Tentukan sifat kimia air seperti keupayaan untuk bertindak balas dengan logam. Sifat ini melibatkan perubahan kimia pada komposisi air.
      Step 3: Bezakan kedua-dua sifat dengan menekankan bahawa sifat fizik tidak mengubah komposisi jirim, manakala sifat kimia melibatkan perubahan itu.

  - id: WE-03
    topic: "Perubahan Keadaan Jirim"
    difficulty: hard
    tp_level: 5
    kbat: true
    learning_objective: "5.2.4 memerihalkan perubahan keadaan jirim dari segi pergerakan zarah-zarah."
    real_world_analogy: "Bayangkan zarah-zarah seperti orang ramai di konsert, bergerak lebih pantas apabila muzik dimainkan."
    misconception_alert: "Pelajar mungkin menganggap suhu sentiasa berubah semasa perubahan keadaan jirim."
    scenario: "Jelaskan perubahan keadaan jirim dari pepejal ke cecair dan cecair ke gas dari segi pergerakan zarah-zarah."
    working: |
      Step 1: Ketahui bahawa dalam pepejal, zarah-zarahnya tersusun rapat dan hanya bergetar pada kedudukan tetap.
      Step 2: Apabila dipanaskan, zarah-zarah mula bergerak lebih cepat dan jarak antara mereka meningkat, menyebabkan perubahan ke cecair.
      Step 3: Dalam cecair, zarah-zarah bergerak lebih bebas tetapi masih berdekatan.
      Step 4: Dengan lebih banyak haba, zarah-zarah bergerak lebih cepat dan berjauhan, berubah dari cecair ke gas.
      Step 5: Rumuskan bahawa perubahan keadaan jirim melibatkan perubahan dalam pergerakan dan susunan zarah-zarah tanpa mengubah suhu semasa fasa peralihan.