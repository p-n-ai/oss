questions:
  # Learning Objective: 6.1.1 (understand)
  - id: Q1
    text: 'Apakah bukti yang menunjukkan semua jirim terdiri daripada atom?'
    difficulty: medium
    learning_objective: 6.1.1
    tp_level: 3
    kbat: true
    answer:
      type: free_text
      value: 'Semua jirim boleh dipecahkan kepada zarah yang lebih kecil yang dikenali sebagai atom.'
      working: |
        Semua bahan boleh dipecahkan kepada unit yang lebih kecil. Contohnya, air boleh dipecahkan kepada atom oksigen dan hidrogen.
    marks: 3
    rubric:
      - marks: 2
        criteria: 'Menyatakan bahawa semua jirim terdiri daripada atom.'
      - marks: 1
        criteria: 'Memberikan contoh yang berkaitan dengan atom.'
    hints:
      - level: 1
        text: 'Fikirkan tentang komposisi asas semua bahan.'
      - level: 2
        text: 'MISCONCEPTION ALERT: Atom bukan molekul, tetapi unit terkecil yang membentuk bahan.'

  # Learning Objective: 6.1.3 (remember)
  - id: Q2
    text: 'Di manakah kedudukan logam, bukan logam, dan gas nadir dalam Jadual Berkala?'
    difficulty: medium
    learning_objective: 6.1.3
    tp_level: 2
    kbat: false
    answer:
      type: multiple_choice
      value: 'Logam di sebelah kiri, bukan logam di sebelah kanan, dan gas nadir di sebelah paling kanan.'
      options:
        - 'Logam di sebelah kiri, bukan logam di sebelah kanan, dan gas nadir di sebelah paling kanan.'
        - 'Logam di sebelah kanan, bukan logam di sebelah kiri, dan gas nadir di sebelah paling kiri.'
        - 'Logam di sebelah kanan, bukan logam di sebelah kanan, dan gas nadir di sebelah paling kanan.'
        - 'Logam di sebelah tengah, bukan logam di sebelah kiri, dan gas nadir di sebelah kanan.'
      working: |
        Logam terletak di sebelah kiri dan tengah jadual berkala, bukan logam di sebelah kanan, dan gas nadir di sebelah paling kanan.
    marks: 1
    rubric:
      - marks: 1
        criteria: 'Jawapan yang betul dan lengkap.'
    hints:
      - level: 1
        text: 'Pertimbangkan susunan unsur dalam Jadual Berkala berdasarkan sifatnya.'

  # Learning Objective: 6.1.4 (analyze)
  - id: Q3
    text: 'Bandingkan ciri-ciri fizikal logam dengan bukan logam.'
    difficulty: medium
    learning_objective: 6.1.4
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: 'Logam biasanya bersifat konduktif, berkilau, dan boleh ditempa, manakala bukan logam tidak konduktif, tidak berkilau, dan rapuh.'
      working: |
        Logam seperti besi dan tembaga adalah konduktif dan berkilau. Sebaliknya, bukan logam seperti oksigen dan sulfur tidak konduktif dan rapuh.
    marks: 4
    rubric:
      - marks: 2
        criteria: 'Menyenaraikan ciri-ciri logam.'
      - marks: 2
        criteria: 'Menyenaraikan ciri-ciri bukan logam.'
    hints:
      - level: 1
        text: 'Fikirkan tentang kekonduksian dan penampilan fizikal logam dan bukan logam.'
      - level: 2
        text: 'MISCONCEPTION ALERT: Tidak semua unsur dalam jadual berkala adalah logam.'

  # Learning Objective: 6.3.5 (analyze)
  - id: Q4
    text: 'Bagaimana anda membezakan perubahan kimia dan perubahan fizik?'
    difficulty: medium
    learning_objective: 6.3.5
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: 'Perubahan kimia melibatkan pembentukan bahan baru dengan sifat berbeza, manakala perubahan fizik tidak mengubah komposisi bahan.'
      working: |
        Contoh perubahan kimia termasuk pembakaran dan pengkarbonan, di mana bahan baru terbentuk. Perubahan fizik seperti pencairan ais tidak mengubah komposisi air.
    marks: 3
    rubric:
      - marks: 2
        criteria: 'Menyatakan ciri-ciri perubahan kimia.'
      - marks: 1
        criteria: 'Menyatakan ciri-ciri perubahan fizik.'
    hints:
      - level: 1
        text: 'Pertimbangkan sama ada bahan baru terbentuk.'
      - level: 2
        text: 'MISCONCEPTION ALERT: Perubahan fizikal tidak menghasilkan bahan baru.'

  # Learning Objective: 6.3.2 (apply)
  - id: Q5
    text: 'Tunjukkan cara pembentukan sebatian antara logam dan bukan logam dengan menggunakan contoh natrium klorida.'
    difficulty: medium
    learning_objective: 6.3.2
    tp_level: 3
    kbat: false
    answer:
      type: exact
      value: 'Natrium (logam) bertindak balas dengan klorin (bukan logam) untuk membentuk natrium klorida.'
      working: |
        Natrium yang mudah kehilangan elektron bertindak balas dengan klorin yang mudah mendapatkan elektron untuk membentuk ikatan ionik, menghasilkan natrium klorida.
    marks: 3
    rubric:
      - marks: 2
        criteria: 'Menyatakan pembentukan ikatan antara logam dan bukan logam.'
      - marks: 1
        criteria: 'Menjelaskan contoh dengan natrium klorida.'
    hints:
      - level: 1
        text: 'Fikirkan tentang bagaimana logam dan bukan logam berinteraksi.'
      - level: 2
        text: 'MISCONCEPTION ALERT: Natrium klorida bukan hasil gabungan dua logam.'