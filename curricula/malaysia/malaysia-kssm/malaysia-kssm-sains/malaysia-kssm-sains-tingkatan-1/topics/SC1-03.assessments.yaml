questions:
  # Learning Objective: 3.1.1 (understand): berkomunikasi maksud homeostasis.
  - id: Q1
    text: "Jelaskan maksud homeostasis dan mengapa ia penting untuk mengekalkan kesihatan organisma?"
    difficulty: medium
    learning_objective: 3.1.1
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Homeostasis adalah proses mengekalkan keadaan dalaman yang stabil dalam persekitaran yang berubah, penting untuk fungsi normal sel dan kesihatan keseluruhan organisma."
      working: |
        Homeostasis melibatkan mekanisme seperti pengawalan suhu badan, keseimbangan pH, dan kepekatan ion dalam darah. Ia penting kerana memastikan sel-sel berfungsi dengan baik dan mengelakkan penyakit.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyatakan definisi homeostasis."
      - marks: 1
        criteria: "Menjelaskan kepentingan homeostasis dalam satu aspek kesihatan."
      - marks: 1
        criteria: "Memberikan contoh mekanisme homeostasis."
    hints:
      - level: 1
        text: "Fikirkan tentang bagaimana badan mengawal suhu dan kandungan gula dalam darah."
      - level: 2
        text: "Pertimbangkan fungsi badan yang bergantung kepada homeostasis untuk berfungsi dengan baik."
      - level: 3
        text: "MISCONCEPTION ALERT: Homeostasis bukan hanya tentang suhu badan, tetapi juga melibatkan aspek lain seperti pH dan tekanan darah."

  # Learning Objective: 3.1.3 (understand): menjelaskan dengan contoh sistem yang terlibat dengan homeostasis dalam manusia dan haiwan.
  - id: Q2
    text: "Apakah sistem badan yang terlibat dalam pengawalan suhu badan manusia? Terangkan fungsinya."
    difficulty: medium
    learning_objective: 3.1.3
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Sistem saraf dan sistem endokrin terlibat dalam pengawalan suhu badan. Sistem saraf bertindak balas dengan cepat terhadap perubahan suhu melalui hipotalamus, manakala sistem endokrin mengeluarkan hormon seperti adrenalin untuk menyesuaikan metabolisme."
      working: |
        Hipotalamus berfungsi sebagai pusat kawalan suhu dengan mengesan perubahan dalam suhu badan dan menghantar isyarat kepada organ untuk menyesuaikannya. Hormon yang dikeluarkan oleh sistem endokrin membantu meningkatkan atau menurunkan kadar metabolisme, mempengaruhi pengeluaran haba.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyebut sekurang-kurangnya satu sistem yang terlibat."
      - marks: 1
        criteria: "Menjelaskan peranan sistem saraf."
      - marks: 1
        criteria: "Menjelaskan peranan sistem endokrin."
    hints:
      - level: 1
        text: "Fikirkan tentang bahagian otak yang mengawal suhu badan."
      - level: 2
        text: "Pertimbangkan peranan hormon dalam menyesuaikan suhu badan."
      - level: 3
        text: "MISCONCEPTION ALERT: Sistem pengawalan suhu tidak hanya bergantung kepada satu sistem sahaja."

  # Learning Objective: 3.1.3 (understand): menjelaskan dengan contoh sistem yang terlibat dengan homeostasis dalam tumbuhan.
  - id: Q3
    text: "Bagaimanakah tumbuhan mengekalkan keseimbangan air dalam tisu mereka?"
    difficulty: medium
    learning_objective: 3.1.3
    tp_level: 3
    kbat: false
    answer:
      type: free_text
      value: "Tumbuhan mengekalkan keseimbangan air melalui proses transpirasi, di mana stomata pada daun mengawal kehilangan air dan penyerapan air dari akar."
      working: |
        Stomata membuka dan menutup untuk mengawal penyejatan air. Apabila air hilang melalui transpirasi, tekanan osmosis dalam akar meningkat, menarik lebih banyak air dari tanah.
    marks: 3
    rubric:
      - marks: 1
        criteria: "Menyebut proses transpirasi."
      - marks: 1
        criteria: "Menjelaskan peranan stomata dalam pengawalan air."
      - marks: 1
        criteria: "Menjelaskan bagaimana akar menyerap air."
    hints:
      - level: 1
        text: "Fokus kepada bahagian daun dan akar tumbuhan."
      - level: 2
        text: "Pertimbangkan peranan stomata dalam pengawalan kehilangan air."
      - level: 3
        text: "MISCONCEPTION ALERT: Transpirasi bukan sahaja tentang kehilangan air tetapi juga tentang penyerapan air dari tanah."

  # Learning Objective: 3.1.4 (evaluate): menghargai kepentingan homeostasis kepada manusia dan benda hidup.
  - id: Q4
    text: "Mengapa gangguan kepada homeostasis boleh menyebabkan penyakit atau kematian dalam organisma?"
    difficulty: medium
    learning_objective: 3.1.4
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Gangguan kepada homeostasis boleh menyebabkan ketidakseimbangan dalaman yang mengganggu fungsi sel dan organ, berpotensi menyebabkan penyakit atau kematian jika tidak diperbetulkan."
      working: |
        Ketidakseimbangan seperti peningkatan gula darah yang tidak dikawal boleh menyebabkan diabetes. Kegagalan mengawal suhu boleh merosakkan protein penting dalam badan, menyebabkan kerosakan organ dan kematian.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menyatakan bahawa homeostasis penting untuk keseimbangan dalaman."
      - marks: 1
        criteria: "Menjelaskan bagaimana gangguan boleh mengganggu fungsi sel."
      - marks: 1
        criteria: "Memberikan contoh gangguan homeostasis yang menyebabkan penyakit."
      - marks: 1
        criteria: "Menghubungkan gangguan homeostasis dengan potensi kematian."
    hints:
      - level: 1
        text: "Fikirkan tentang penyakit yang disebabkan oleh ketidakseimbangan kimia dalam badan."
      - level: 2
        text: "Pertimbangkan bagaimana badan bergantung kepada keseimbangan dalaman untuk berfungsi."
      - level: 3
        text: "MISCONCEPTION ALERT: Homeostasis tidak hanya berkaitan dengan satu jenis penyakit sahaja."

  # Learning Objective: 3.1.5 (evaluate): Menghargai kepentingan homeostasis kepada manusia dan benda hidup.
  - id: Q5
    text: "Bagaimanakah perubahan persekitaran yang ekstrem boleh menjejaskan homeostasis dalam organisma?"
    difficulty: medium
    learning_objective: 3.1.5
    tp_level: 4
    kbat: true
    answer:
      type: free_text
      value: "Perubahan persekitaran yang ekstrem seperti suhu tinggi atau rendah, kekurangan air, dan pencemaran boleh mengatasi kemampuan organisme untuk mengekalkan homeostasis, membawa kepada tekanan fisiologi dan potensi kematian."
      working: |
        Suhu yang ekstrem boleh mengganggu proses enzimatik, pencemaran boleh menyebabkan toksin berlebihan dalam badan, manakala kekurangan air boleh menyebabkan dehidrasi, semuanya mengganggu homeostasis.
    marks: 4
    rubric:
      - marks: 1
        criteria: "Menyatakan bahawa perubahan persekitaran boleh menjejaskan homeostasis."
      - marks: 1
        criteria: "Menjelaskan bagaimana suhu ekstrem boleh mengganggu homeostasis."
      - marks: 1
        criteria: "Menjelaskan kesan pencemaran terhadap homeostasis."
      - marks: 1
        criteria: "Menjelaskan kesan kekurangan air terhadap homeostasis."
    hints:
      - level: 1
        text: "Pertimbangkan peranan persekitaran dalam mempengaruhi keseimbangan dalaman organisma."
      - level: 2
        text: "Fikirkan bagaimana organisma bertindak balas terhadap perubahan suhu."
      - level: 3
        text: "MISCONCEPTION ALERT: Homeostasis bukan hanya dipengaruhi oleh faktor dalaman tetapi juga oleh persekitaran luar."