prerequisites:
    required:
        - SC1-01
    recommended: []
teaching:
    sequence:
        - 'Step 1: Introduce the concept of reproduction and its importance (20 min)'
        - 'Step 2: Discuss sexual and asexual reproduction with examples (30 min)'
        - 'Step 3: Explain the human reproductive system, focusing on structure and function (40 min)'
    common_misconceptions:
        - misconception: Asexual reproduction is always better because it's faster.
          remediation: Discuss the benefits of genetic diversity in sexual reproduction.
        - misconception: Puberty starts at the same age for everyone.
          remediation: Explain individual variability and factors influencing puberty onset.
