topic_id: "SC4-01"
provenance: "ai-generated"
description: "Worked examples for Langkah Keselamatan di dalam Makmal"
worked_examples:
    - id: "WE-01"
      topic: "Peralatan Perlindungan Diri dalam Makmal"
      difficulty: "easy"
      tp_level: 1
      kbat: false
      learning_objective: "1.1.1"
      real_world_analogy: "Memakai topi keledar ketika menunggang motosikal untuk perlindungan."
      misconception_alert: "Pelajar sering menganggap semua peralatan perlindungan adalah sama dan boleh diguna sekali sahaja."
      scenario: "Anda diminta menjelaskan fungsi kacamata keselamatan di dalam makmal."
      working: |
        Step 1: Kacamata keselamatan melindungi mata daripada percikan bahan kimia.
        Step 2: Ia juga melindungi mata daripada habuk dan serpihan kecil yang mungkin terbang di udara.
        Step 3: Pastikan kacamata dipakai setiap masa semasa eksperimen dijalankan untuk keselamatan optimum.
    - id: "WE-02"
      topic: "Pengurusan Bahan Sisa Biologi"
      difficulty: "medium"
      tp_level: 2
      kbat: true
      learning_objective: "1.2.3"
      real_world_analogy: "Mengasingkan sampah untuk kitar semula di rumah bagi mengelakkan pencemaran."
      misconception_alert: "Pelajar mungkin berfikir semua sisa makmal boleh dibuang ke dalam sinki."
      scenario: "Bagaimanakah cara yang betul untuk menguruskan sisa biologi selepas eksperimen?"
      working: |
        Step 1: Kenalpasti jenis sisa biologi seperti tisu atau bahan organik lain.
        Step 2: Gunakan bekas sisa biologi yang telah dilabel dengan jelas untuk mengumpul sisa tersebut.
        Step 3: Pastikan bekas sisa biologi ditutup rapat dan simpan di tempat yang dikhaskan sebelum dibuang dengan cara yang betul.
    - id: "WE-03"
      topic: "Penggunaan Pemadam Kebakaran"
      difficulty: "hard"
      tp_level: 3
      kbat: true
      learning_objective: "1.3.2"
      real_world_analogy: "Seperti menggunakan selang air untuk memadamkan api kecil di rumah."
      misconception_alert: "Ramai pelajar keliru bagaimana menggunakan pemadam kebakaran dengan betul."
      scenario: "Jelaskan langkah-langkah untuk menggunakan pemadam kebakaran jenis ABC di makmal."
      working: |-
        Step 1: Pegang pemadam kebakaran dan tarik pin keselamatan.
        Step 2: Arahkan muncung pemadam ke arah pangkal api.
        Step 3: Tekan pemegang untuk melepaskan agen pemadam dan sapu dari sisi ke sisi hingga api padam.
