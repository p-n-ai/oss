teaching:
    sequence:
        - Introduction to alloys and their composition (20 min)
        - Conduct experiment comparing alloy and metal (30 min)
        - Discuss glass and ceramics components and uses (25 min)
        - Explain natural and synthetic polymers (25 min)
    common_misconceptions:
        - misconception: All metals are alloys
          remediation: Use clear examples and definitions to differentiate between pure metals and alloys.
        - misconception: Ceramics are fragile
          remediation: Show examples of strong, durable ceramics to illustrate their varied properties.
