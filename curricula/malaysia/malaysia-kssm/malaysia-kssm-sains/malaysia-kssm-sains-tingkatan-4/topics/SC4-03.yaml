teaching:
    sequence:
        - 'Step 1: Introduce body temperature measurement tools (15 min)'
        - 'Step 2: Demonstrate correct thermometer use (15 min)'
        - 'Step 3: Discuss normal temperature ranges (10 min)'
        - 'Step 4: Identify pulse points on the body (10 min)'
        - 'Step 5: Conduct pulse rate measurement experiment (20 min)'
    common_misconceptions:
        - misconception: Pulse can be felt anywhere on the body
          remediation: Use diagrams to show specific pulse points
        - misconception: Blood pressure is the same throughout the day
          remediation: Explain factors affecting blood pressure variations
