topic_id: "SC4-11"
provenance: "ai-generated"
questions:
    # Learning Objective: 11.1.1 (understand)
    - id: "Q01"
      text: "Jelaskan perbezaan antara jarak dan sesaran dalam konteks seorang pelajar berjalan dari rumah ke sekolah dan kembali ke rumah."
      difficulty: "medium"
      learning_objective: "11.1.1"
      tp_level: 3
      kbat: true
      answer:
        type: "free_text"
        value: "Jarak adalah jumlah laluan yang dilalui, manakala sesaran adalah jarak terpendek dari titik awal ke titik akhir."
        working: |
            Jarak mengukur keseluruhan laluan yang dilalui tanpa mengira arah, sedangkan sesaran adalah jarak lurus antara titik permulaan dan titik akhir.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Menyatakan definisi jarak dengan tepat."
        - marks: 1
          criteria: "Menyatakan definisi sesaran dengan tepat."
        - marks: 1
          criteria: "Memberikan contoh yang relevan dalam konteks pelajar berjalan."
      hints:
        - level: 1
          text: "Pertimbangkan bagaimana perjalanan ke dan dari sekolah mempengaruhi jarak dan sesaran."
        - level: 2
          text: "Jarak melibatkan keseluruhan laluan, tetapi sesaran adalah jarak lurus."
    # Learning Objective: 11.1.2 (understand)
    - id: "Q02"
      text: "Antara berikut, yang manakah merupakan unit ukuran yang betul untuk halaju? A) m/s B) km C) s D) m"
      difficulty: "medium"
      learning_objective: "11.1.2"
      tp_level: 2
      kbat: false
      answer:
        type: "multiple_choice"
        value: "A"
        working: |
            Halaju diukur dalam meter sesaat (m/s) kerana ia melibatkan jarak (meter) dibahagikan dengan masa (saat).
        options:
            A: "m/s"
            B: "km"
            C: "s"
            D: "m"
        distractors:
            - value: "B"
              feedback: "Kilometer (km) adalah unit jarak, bukan halaju."
            - value: "C"
              feedback: "Saat (s) adalah unit masa, bukan halaju."
            - value: "D"
              feedback: "Meter (m) adalah unit jarak, bukan halaju."
      marks: 2
      rubric:
        - marks: 2
          criteria: "Memilih unit ukuran yang betul untuk halaju."
      hints:
        - level: 1
          text: "Halaju melibatkan jarak dibahagikan dengan masa."
        - level: 2
          text: "Unit jarak dan masa perlu digabungkan."
    # Learning Objective: 11.1.3 (apply)
    - id: "Q03"
      text: "Seorang pemandu memandu kereta pada kelajuan 60 km/j selama 2 jam. Berapakah jarak yang telah dilalui?"
      difficulty: "medium"
      learning_objective: "11.1.3"
      tp_level: 3
      kbat: false
      answer:
        type: "exact"
        value: "120 km"
        working: |
            Jarak = laju × masa = 60 km/j × 2 j = 120 km.
      marks: 2
      rubric:
        - marks: 1
          criteria: "Menggunakan formula yang betul untuk mengira jarak."
        - marks: 1
          criteria: "Mengira jarak dengan tepat."
      hints:
        - level: 1
          text: "Gunakan formula jarak = laju × masa."
        - level: 2
          text: "Masukkan nilai laju dan masa yang diberi."
    # Learning Objective: 11.2.1 (analyze)
    - id: "Q04"
      text: "Diberikan graf halaju-masa bagi sebuah objek yang bergerak lurus. Tentukan jenis gerakan objek tersebut jika graf menunjukkan garis lurus mendatar."
      difficulty: "medium"
      learning_objective: "11.2.1"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: "Objek bergerak dengan halaju seragam."
        working: |
            Graf garis lurus mendatar menunjukkan halaju tidak berubah dengan masa, menandakan gerakan dengan halaju seragam.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Mengenal pasti graf yang menggambarkan halaju seragam."
        - marks: 2
          criteria: "Menjelaskan dengan tepat bahawa garis mendatar menunjukkan halaju tidak berubah."
      hints:
        - level: 1
          text: "Perhatikan bentuk garis pada graf."
        - level: 2
          text: "Garis mendatar menunjukkan tiada perubahan dalam halaju."
    # Learning Objective: 11.3.2 (analyze)
    - id: "Q05"
      text: "Seorang pelajar menjatuhkan sebiji bola dari tingkat dua bangunan. Lakarkan graf yang menunjukkan gerakan bola tersebut ketika jatuh bebas."
      difficulty: "medium"
      learning_objective: "11.3.2"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: "Graf berbentuk parabola ke bawah."
        working: |
            Bola yang jatuh bebas mengalami pecutan akibat daya graviti, menyebabkan kelajuannya bertambah secara berterusan. Graf kelajuan-masa akan berbentuk garisan lurus menaik, manakala graf sesaran-masa berbentuk parabola ke bawah.
      marks: 4
      rubric:
        - marks: 2
          criteria: "Menggambarkan graf kelajuan-masa dengan tepat."
        - marks: 2
          criteria: "Menggambarkan graf sesaran-masa dengan tepat."
      hints:
        - level: 1
          text: "Pertimbangkan kesan daya graviti pada bola."
        - level: 2
          text: "Ingat bahawa graf sesaran-masa untuk jatuh bebas berbentuk parabola."
