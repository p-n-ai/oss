teaching:
    sequence:
        - Introduce types of animal skeletons using models and diagrams (25 min)
        - Discuss human skeletal system with hands-on activities (30 min)
        - Explain joints and muscles function in movement with examples (20 min)
    common_misconceptions:
        - misconception: Exoskeletons are just skin.
          remediation: Use models to show the hard, protective nature of exoskeletons.
        - misconception: All bones are solid.
          remediation: Conduct experiments to show differences between compact and hollow bones.
