topic_id: "SC4-09"
provenance: "ai-generated"
questions:
    # Learning Objective: 9.1.1
    - id: "Q1"
      text: 'Beri dua contoh aloi dan nyatakan komposisi unsur dalam aloi tersebut.'
      difficulty: "medium"
      learning_objective: "9.1.1"
      tp_level: 2
      kbat: false
      answer:
        type: "free_text"
        value: 'Contoh aloi: Keluli (besi dan karbon), Gangsa (tembaga dan timah).'
        working: |
            Keluli terdiri daripada besi dan sedikit karbon untuk meningkatkan kekuatan dan ketahanan. Gangsa adalah campuran tembaga dan timah, yang menjadikannya lebih tahan terhadap kakisan.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Menyenaraikan satu contoh aloi dengan komposisinya."
        - marks: 2
          criteria: "Menyenaraikan dua contoh aloi dengan komposisinya."
      hints:
        - level: 1
          text: "Ingatlah aloi adalah campuran dua atau lebih logam."
        - level: 2
          text: "Keluli dan gangsa adalah dua aloi yang sering digunakan."
    # Learning Objective: 9.1.2
    - id: "Q2"
      text: 'Jelaskan bagaimana anda boleh menjalankan eksperimen untuk membandingkan kekerasan aloi dengan logam tulennya.'
      difficulty: "medium"
      learning_objective: "9.1.2"
      tp_level: 3
      kbat: true
      answer:
        type: "free_text"
        value: 'Gunakan ujian kekerasan dengan mesin uji kekerasan untuk menekan logam dan aloi dan bandingkan lekukan yang dihasilkan.'
        working: |
            Untuk membandingkan kekerasan, gunakan mesin uji kekerasan (seperti Rockwell atau Brinell) untuk menekan logam tulen dan aloi. Kemudian, ukur kedalaman lekukan yang dihasilkan untuk menentukan kekerasan relatif.
      marks: 4
      rubric:
        - marks: 2
          criteria: "Menjelaskan penggunaan mesin uji kekerasan."
        - marks: 2
          criteria: "Menghuraikan kaedah perbandingan lekukan antara logam tulen dan aloi."
      hints:
        - level: 1
          text: "Pertimbangkan menggunakan alat untuk mengukur kekerasan."
        - level: 2
          text: "Fokus pada kaedah dengan menggunakan ujian fizikal."
    # Learning Objective: 9.1.3
    - id: "Q3"
      text: 'Mengapa aloi sering digunakan dalam pembuatan kenderaan? Berikan justifikasi anda.'
      difficulty: "medium"
      learning_objective: "9.1.3"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: 'Aloi digunakan kerana ia lebih kuat, tahan karat, dan lebih ringan berbanding logam tulen, menjadikannya sesuai untuk struktur kenderaan.'
        working: |
            Aloi seperti keluli tahan karat dan aluminium digunakan kerana mereka memberikan kekuatan tambahan dan ketahanan terhadap kakisan, yang penting untuk keselamatan dan ketahanan kenderaan. Aloi juga lebih ringan, membantu dalam penjimatan bahan bakar.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Menyatakan satu sifat aloi yang bermanfaat."
        - marks: 2
          criteria: "Memberikan dua justifikasi penggunaan aloi dalam kenderaan."
      hints:
        - level: 1
          text: "Pertimbangkan sifat mekanikal aloi."
        - level: 2
          text: "Apakah kelebihan berat aloi terhadap penggunaan bahan bakar?"
    # Learning Objective: 9.2.2
    - id: "Q4"
      text: 'Beri dua aplikasi kaca dalam kehidupan harian dan terangkan fungsinya.'
      difficulty: "medium"
      learning_objective: "9.2.2"
      tp_level: 3
      kbat: false
      answer:
        type: "free_text"
        value: 'Kaca digunakan dalam tingkap rumah untuk pencahayaan dan pandangan, serta dalam skrin telefon pintar untuk paparan dan interaktiviti.'
        working: |
            Kaca tingkap membenarkan cahaya masuk ke dalam rumah dan memberikan pemandangan luar. Kaca pada skrin telefon pintar menyediakan permukaan yang licin untuk interaktif sentuhan dan paparan visual yang jelas.
      marks: 3
      rubric:
        - marks: 1
          criteria: "Menyenaraikan satu aplikasi kaca."
        - marks: 2
          criteria: "Menyenaraikan dua aplikasi kaca dan menerangkan fungsinya."
      hints:
        - level: 1
          text: "Fikirkan tentang tempat di mana anda melihat kaca setiap hari."
        - level: 2
          text: "Pertimbangkan peranan kaca dalam teknologi moden."
    # Learning Objective: 9.3.3
    - id: "Q5"
      text: 'Terangkan proses pemvulkanan getah dan kepentingannya dalam industri.'
      difficulty: "medium"
      learning_objective: "9.3.3"
      tp_level: 4
      kbat: true
      answer:
        type: "free_text"
        value: 'Pemvulkanan adalah proses mencampur belerang dengan getah untuk meningkatkan kekuatan dan keanjalan, penting untuk menghasilkan produk seperti tayar.'
        working: |
            Proses pemvulkanan melibatkan pemanasan getah dengan belerang, yang menyebabkan pembentukan ikatan silang antara molekul getah. Ini meningkatkan kekuatan, ketahanan terhadap suhu, dan keanjalan getah, menjadikannya ideal untuk produk seperti tayar dan sol kasut.
      marks: 4
      rubric:
        - marks: 2
          criteria: "Menjelaskan proses asas pemvulkanan."
        - marks: 2
          criteria: "Menerangkan kepentingan pemvulkanan dalam industri."
      hints:
        - level: 1
          text: "Fokus pada bagaimana belerang mempengaruhi getah."
        - level: 2
          text: "Pertimbangkan produk yang memerlukan getah yang lebih kuat."
