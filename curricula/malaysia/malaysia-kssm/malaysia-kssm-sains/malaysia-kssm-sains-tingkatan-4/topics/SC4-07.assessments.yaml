    # Learning Objective 7.1.1: Menerangkan sistem endokrin dan fungsinya.
    - id: "Q01"
      text: 'Apakah fungsi utama kelenjar tiroid dalam sistem endokrin manusia?'
      difficulty: "medium"
      learning_objective: "7.1.1"
      tp_level: 3
      kbat: false
      answer:
        type: "multiple_choice"
        value: "A"
        options:
            A: "Mengawal kadar metabolisme badan"
