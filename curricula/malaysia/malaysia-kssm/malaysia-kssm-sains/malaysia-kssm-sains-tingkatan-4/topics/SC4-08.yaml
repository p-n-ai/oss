prerequisites:
    required: []
    recommended: []
teaching:
    sequence:
        - Introduction to atomic, molecular, and ionic substances (15 min)
        - Discussion on the existence of elements in various forms (15 min)
        - Exploration of the Modern Periodic Table (20 min)
    common_misconceptions:
        - misconception: All substances are either elements or compounds.
          remediation: Use examples of mixtures and complex molecules.
        - misconception: Electrons orbit the nucleus like planets around the sun.
          remediation: Introduce quantum models with probability clouds.
