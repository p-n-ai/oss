      bloom: "understand"
      content_standard_id: "11.1"
    - id: "11.1.2"
      text: "Menjelaskan dengan contoh maksud laju, laju purata, halaju dan pecutan serta unit ukurannya dalam kehidupan harian."
      text_en: "Explain with examples of the meaning of speed, average speed, velocity and acceleration and their measurement units in daily life."
      bloom: "understand"
      content_standard_id: "11.1"
    - id: "11.1.3"
      text: "Menyelesaikan masalah yang melibatkan laju, laju purata, halaju dan pecutan dalam kehidupan harian."
      text_en: "Solve problems involving speed, average speed, velocity and acceleration in daily life."
      bloom: "apply"
      content_standard_id: "11.1"
    - id: "11.1.4"
