      text: "Mentafsir jenis gerakan dari graf gerakan linear untuk menentukan jarak, sesaran, halaju, halaju purata dan pecutan."
      text_en: "Interpret types of motion from linear motion graphs to determine distance, displacement, velocity, average velocity and acceleration."
      bloom: "analyze"
      content_standard_id: "11.2"
    - id: "11.3.1"
      text: "Menjalankan eksperimen untuk menentukan nilai pecutan graviti bumi, g."
