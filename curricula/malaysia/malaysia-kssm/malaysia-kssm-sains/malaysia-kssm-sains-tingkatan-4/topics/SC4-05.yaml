prerequisites:
    required: []
    recommended: []
teaching:
    sequence:
        - 'Step 1: Introduce genes, DNA, and chromosomes using a library analogy (20 min)'
        - 'Step 2: Explain mitosis and meiosis with visual aids and animations (25 min)'
        - 'Step 3: Discuss inheritance patterns using family pedigree charts (20 min)'
        - 'Step 4: Explore genetic mutations and their causes with examples (25 min)'
        - 'Step 5: Debate the ethical implications of genetic engineering (20 min)'
    common_misconceptions:
        - misconception: Genes and chromosomes are the same thing.
          remediation: Clarify that genes are segments of DNA, while chromosomes are structures that organize DNA.
        - misconception: Mitosis and meiosis are identical processes.
          remediation: Highlight the differences in outcomes and stages between mitosis and meiosis.
        - misconception: Mutations are always harmful.
          remediation: Explain that mutations can be beneficial, neutral, or harmful, depending on the context.
