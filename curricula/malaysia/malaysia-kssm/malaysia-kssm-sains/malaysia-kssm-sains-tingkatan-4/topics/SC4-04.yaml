        - 'Step 2: Explain energy efficiency and demonstrate with examples like LED bulbs (20 min)'
        - 'Step 3: Discuss socioscientific issues related to energy (20 min)'
    common_misconceptions:
        - misconception: All new technologies are environmentally friendly
          remediation: Compare green technology with non-environmentally friendly technologies
        - misconception: Energy efficiency is the same as renewable energy
          remediation: Clarify the difference between energy efficiency and renewable energy sources
