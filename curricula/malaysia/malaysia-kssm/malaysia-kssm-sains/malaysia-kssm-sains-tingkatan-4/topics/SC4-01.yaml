teaching:
    sequence:
        - "Introduce personal protective equipment (PPE) and their functions."
        - "Discuss waste disposal procedures and safety."
        - "Demonstrate fire extinguisher usage and conduct audits."
    common_misconceptions:
        - misconception: "All chemicals can be poured down the sink."
          remediation: "Explain pH limits and hazardous materials that require special disposal."
        - misconception: "Fire extinguishers are the same for all fires."
          remediation: "Teach classification of fires (A, B, C, D) and corresponding extinguisher types."
    engagement_hooks:
        - "Real-world accident case studies in laboratories."
        - "Importance of safety in industrial settings."
