content_standards:
    - id: "5.1"
      text: "Tindak balas endotermik dan eksotermik"
      text_en: "Endothermic and exothermic reactions"
learning_objectives:
    - id: "5.1.1"
      text: "Mendefinisikan tindak balas endotermik dan tindak balas eksotermik"
      text_en: "Define endothermic reactions and exothermic reactions"
      bloom: "remember"
      content_standard_id: "5.1"
    - id: "5.1.2"
      text: "Menghubungkaitkan haba yang diserap atau dibebaskan dalam tindak balas kimia kepada tindak balas endotermik dan tindak balas eksotermik."
      text_en: "Relate heat absorbed or released in chemical reactions to endothermic reactions and exothermic reactions."
      bloom: "understand"
      content_standard_id: "5.1"
    - id: "5.1.3"
      text: "Menjalankan eksperimen untuk membanding dan membeza tindak balas eksotermik dengan tindak balas endotermik."
      text_en: "Conduct experiments to compare and contrast exothermic reactions with endothermic reactions."
      bloom: "apply"
      content_standard_id: "5.1"
    - id: "5.1.4"
      text: "Menjelaskan dengan contoh tindak balas eksotermik dan tindak balas endotermik."
      text_en: "Explain with examples of exothermic reactions and endothermic reactions."
      bloom: "understand"
      content_standard_id: "5.1"
    - id: "5.1.5"
      text: "Mereka bentuk bahan yang menggunakan konsep tindak balas eksotermik dan endotermik bagi menyelesaikan masalah dalam kehidupan."
      text_en: "Design materials that use the concept of exothermic and endothermic reactions to solve problems in life."
      bloom: "create"
      content_standard_id: "5.1"
