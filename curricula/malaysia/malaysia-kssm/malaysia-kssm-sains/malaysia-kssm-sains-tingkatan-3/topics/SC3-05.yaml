mastery:
    minimum_score: 0.75
    assessment_count: 10
    spaced_repetition:
        initial_interval_days: 1
        multiplier: 2.5
teaching:
    sequence:
        - Pengenalan kepada konsep termokimia dan peranan tenaga dalam tindak balas kimia (10 min)
        - Demonstrasi eksperimen pembubaran ammonium nitrat dan pembakaran kertas (20 min)
        - Perbincangan perbezaan antara tindak balas endotermik dan eksotermik (15 min)
        - 'Aktiviti kumpulan: Reka bentuk alat menggunakan konsep termokimia (25 min)'
    common_misconceptions:
        - misconception: Semua tindak balas kimia menghasilkan haba
          remediation: Tunjukkan contoh tindak balas endotermik yang jelas seperti pembubaran garam dalam air
        - misconception: Endotermik bermaksud suhu meningkat
          remediation: Gunakan visualisasi graf tenaga untuk menunjukkan input tenaga
