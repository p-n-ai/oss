id: SC3-08
official_ref: "Bab 8"
name: "Keradioaktifan"
name_en: "Radioactivity"
subject_grade_id: malaysia-kssm-sains-tingkatan-3
subject_id: malaysia-kssm-sains
syllabus_id: malaysia-kssm
country_id: malaysia
language: ms
difficulty: intermediate
theme: "Tenaga Dan Kelestarian Hidup"
content_standards:
  - id: "8.1"
    text: "Sejarah penemuan keradioaktif"
    text_en: "History of radioactivity discovery"
  - id: "8.2"
    text: "Atom dan nukleus"
    text_en: "Atom and nucleus"
  - id: "8.3"
    text: "Sinaran mengion dan sinaran tidak mengion"
    text_en: "Ionizing and non-ionizing radiation"
  - id: "8.4"
    text: "Kegunaan sinaran radioaktif"
    text_en: "Uses of radioactive radiation"
learning_objectives:
  - id: "8.1.1"
    text: "Memerihalkan sejarah penemuan keradioaktifan."
    text_en: "Describe the history of the discovery of radioactivity."
    bloom: "understand"
    content_standard_id: "8.1"
  - id: "8.1.2"
    text: "Menerangkan dengan contoh maksud bahan radioaktif, keradioaktifan dan konsep separuh hayat pereputan radioaktif."
    text_en: "Explain with examples the meaning of radioactive materials, radioactivity and the concept of half-life of radioactive decay."
    bloom: "understand"
    content_standard_id: "8.1"
  - id: "8.2.1"
    text: "Melakar struktur atom yang menunjukkan keadaan stabil."
    text_en: "Sketch the structure of an atom showing a stable state."
    bloom: "apply"
    content_standard_id: "8.2"
  - id: "8.2.2"
    text: "Menerangkan pembentukan ion positif dan ion negatif."
    text_en: "Explain the formation of positive ions and negative ions."
    bloom: "understand"
    content_standard_id: "8.2"
  - id: "8.3.1"
    text: "Memerihalkan sinaran mengion dan sinaran tidak mengion."
    text_en: "Describe ionizing and non-ionizing radiation."
    bloom: "understand"
    content_standard_id: "8.3"
  - id: "8.3.2"
    text: "Membezakan tiga jenis sinaran mengion dalam reputan radioaktif."
    text_en: "Differentiate three types of ionizing radiation in radioactive decay."
    bloom: "analyze"
    content_standard_id: "8.3"
  - id: "8.3.3"
    text: "Menjelaskan dengan contoh sumber sinaran mengion dalam alam sekitar iaitu sumber semula jadi dan sumber buatan manusia."
    text_en: "Explain with examples of ionizing radiation sources in the environment, namely natural sources and human-made sources."
    bloom: "understand"
    content_standard_id: "8.3"
  - id: "8.3.4"
    text: "Membincang cara mengurus risiko terdedah kepada sinaran mengion semula jadi dan buatan manusia."
    text_en: "Discuss ways to manage risks of exposure to natural and human-made ionizing radiation."
    bloom: "evaluate"
    content_standard_id: "8.3"
  - id: "8.4.1"
    text: "Berkomunikasi tentang kegunaan sinaran radioaktif untuk kesejahteraan hidup manusia."
    text_en: "Communicate about the use of radioactive radiation for human well-being."
    bloom: "understand"
    content_standard_id: "8.4"
  - id: "8.4.2"
    text: "Mewajarkan kepentingan mengendalikan bahan radioaktif dan sisa bahan radioaktif dengan sempurna."
    text_en: "Justify the importance of handling radioactive materials and radioactive waste perfectly."
    bloom: "evaluate"
    content_standard_id: "8.4"
performance_standards:
  - level: 1
    id: "TP1"
    text: "Mengingat kembali pengetahuan dan kemahiran sains mengenai keradioaktifan."
    text_en: "Recall science knowledge and skills regarding radioactivity."
    descriptor: "Mengingat kembali pengetahuan dan kemahiran sains mengenai keradioaktifan."
    descriptor_en: "Recall science knowledge and skills regarding radioactivity."
  - level: 2
    id: "TP2"
    text: "Memahami keradioaktifan dan dapat menjelaskan kefahaman tersebut."
    text_en: "Understand radioactivity and can explain the understanding."
    descriptor: "Memahami keradioaktifan dan dapat menjelaskan kefahaman tersebut."
    descriptor_en: "Understand radioactivity and can explain the understanding."
  - level: 3
    id: "TP3"
    text: "Mengaplikasikan pengetahuan mengenai keradioaktifan dan dapat melaksanakan tugasan mudah."
    text_en: "Apply knowledge of radioactivity and can carry out simple tasks."
    descriptor: "Mengaplikasikan pengetahuan mengenai keradioaktifan dan dapat melaksanakan tugasan mudah."
    descriptor_en: "Apply knowledge of radioactivity and can carry out simple tasks."
  - level: 4
    id: "TP4"
    text: "Menganalisis pengetahuan mengenai keradioaktifan dalam konteks penyelesaian masalah mengenai kejadian atau fenomena alam."
    text_en: "Analyze knowledge of radioactivity in the context of problem solving regarding natural events or phenomena."
    descriptor: "Menganalisis pengetahuan mengenai keradioaktifan dalam konteks penyelesaian masalah mengenai kejadian atau fenomena alam."
    descriptor_en: "Analyze knowledge of radioactivity in the context of problem solving regarding natural events or phenomena."
  - level: 5
    id: "TP5"
    text: "Menilai pengetahuan mengenai keradioaktifan dalam konteks penyelesaian masalah dan membuat keputusan untuk melaksanakan satu tugasan."
    text_en: "Evaluate knowledge of radioactivity in the context of problem solving and make decisions to carry out a task."
    descriptor: "Menilai pengetahuan mengenai keradioaktifan dalam konteks penyelesaian masalah dan membuat keputusan untuk melaksanakan satu tugasan."
    descriptor_en: "Evaluate knowledge of radioactivity in the context of problem solving and make decisions to carry out a task."
  - level: 6
    id: "TP6"
    text: "Merekacipta dengan menggunakan pengetahuan dan kemahiran sains mengenai keradioaktifan dalam konteks penyelesaian masalah dan membuat keputusan atau dalam melaksanakan satu tugasan dalam situasi baru secara kreatif dan inovatif dengan mengambil kira nilai sosial/ekonomi/budaya masyarakat."
    text_en: "Create using science knowledge and skills regarding radioactivity in the context of problem solving and making decisions or in carrying out a task in a new situation creatively and innovatively by considering social/economic/cultural values of society."
    descriptor: "Merekacipta dengan menggunakan pengetahuan dan kemahiran sains mengenai keradioaktifan dalam konteks penyelesaian masalah dan membuat keputusan atau dalam melaksanakan satu tugasan dalam situasi baru secara kreatif dan inovatif dengan mengambil kira nilai sosial/ekonomi/budaya masyarakat."
    descriptor_en: "Create using science knowledge and skills regarding radioactivity in the context of problem solving and making decisions or in carrying out a task in a new situation creatively and innovatively by considering social/economic/cultural values of society."
