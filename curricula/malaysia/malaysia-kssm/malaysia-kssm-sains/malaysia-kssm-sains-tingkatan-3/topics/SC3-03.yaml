teaching:
  sequence:
    - Introduction to transport systems in simple and complex organisms.
    - Structure and function of the human circulatory system.
    - Experiment on factors affecting pulse rate.
    - Human blood components and blood groups.
    - Transpiration and transport in plants.
    - Comparison between animal and plant transport systems.
  common_misconceptions:
    - misconception: "Students think blood is only red because of oxygen."
      remediation: "Explain that blood is always red (bright red when oxygenated, dark red when deoxygenated) due to hemoglobin."
    - misconception: "Students believe xylem transports food."
      remediation: "Clarify that xylem transports water and minerals, while phloem transports food (sugars)."
  engagement_hooks:
    - "Why do you feel your heart beating faster after running?"
    - "How does a tree drink water from the ground to its highest leaves?"
    - "What happens if you receive the wrong blood type during a transfusion?"
