mastery:
    minimum_score: 0.75
    assessment_count: 10
    spaced_repetition:
        initial_interval_days: 1
        multiplier: 2.5
teaching:
    sequence:
        - 'Step 1: Introduce the human nervous system with diagrams and visuals (20 min)'
        - 'Step 2: Discuss the structure and function of sensory organs with models (30 min)'
        - 'Step 3: Explain plant responses to stimuli using time-lapse videos (25 min)'
        - 'Step 4: Conduct an experiment on plant responses to light (30 min)'
        - 'Step 5: Explore animal sensory adaptations with local examples (20 min)'
    common_misconceptions:
        - misconception: Plants do not respond to stimuli
          remediation: Use time-lapse videos to show plant movement in response to stimuli
        - misconception: All sensory responses are conscious
          remediation: Explain with examples like reflex actions that occur automatically
