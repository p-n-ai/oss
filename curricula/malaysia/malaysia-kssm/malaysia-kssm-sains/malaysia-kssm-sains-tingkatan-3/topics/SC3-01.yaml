learning_objectives:
    - id: "1.1.1"
      text: "Memerihalkan dengan lakaran struktur dan fungsi sistem saraf manusia."
      text_en: "Describe with sketches the structure and function of the human nervous system."
      bloom: "understand"
      content_standard_id: "1.1"
    - id: "1.1.2"
      text: "Membuat urutan aliran impuls dalam tindakan terkawal dan luar kawal."
      text_en: "Sequence the flow of impulses in voluntary and involuntary actions."
      bloom: "understand"
      content_standard_id: "1.1"
    - id: "1.1.3"
      text: "Mewajarkan kepentingan rangkaian sistem saraf manusia dalam kehidupan."
      text_en: "Justify the importance of the human nervous system network in life."
      bloom: "evaluate"
      content_standard_id: "1.1"
    - id: "1.2.1"
      text: "Melakar struktur organ deria dan menerangkan fungsi serta kepekaannya terhadap rangsangan."
      text_en: "Sketch the structure of sensory organs and explain their functions and sensitivity to stimuli."
      bloom: "understand"
      content_standard_id: "1.2"
    - id: "1.2.2"
      text: "Menerangkan mekanisme pendengaran dan penglihatan dengan lakaran."
      text_en: "Explain the mechanisms of hearing and vision with sketches."
      bloom: "understand"
      content_standard_id: "1.2"
    - id: "1.2.3"
      text: "Menghubungkaitkan organ deria manusia dengan kepekaan terhadap pelbagai kombinasi rangsangan."
      text_en: "Relate human sensory organs with sensitivity to various combinations of stimuli."
      bloom: "analyze"
      content_standard_id: "1.2"
    - id: "1.2.4"
      text: "Menjelaskan melalui contoh bagaimana had deria, kecacatan organ deria dan proses penuaan mempengaruhi pendengaran dan penglihatan manusia."
      text_en: "Explain with examples how sensory limits, sensory organ defects and the aging process affect human hearing and vision."
      bloom: "understand"
      content_standard_id: "1.2"
    - id: "1.2.5"
      text: "Mewajarkan bagaimana inovasi dan teknologi boleh meningkatkan keupayaan organ deria."
      text_en: "Justify how innovation and technology can enhance sensory organ capabilities."
      bloom: "evaluate"
      content_standard_id: "1.2"
    - id: "1.3.1"
      text: "Memerihalkan bahagian tumbuhan yang peka terhadap rangsangan."
      text_en: "Describe parts of plants that are sensitive to stimuli."
      bloom: "understand"
      content_standard_id: "1.3"
    - id: "1.3.2"
      text: "Mewajarkan bagaimana tumbuhan bergerak balas terhadap rangsangan untuk mendapatkan keadaan terbaik bagi tumbesaran."
      text_en: "Justify how plants respond to stimuli to obtain the best conditions for growth."
      bloom: "evaluate"
      content_standard_id: "1.3"
    - id: "1.3.3"
      text: "Menjalankan eksperimen mengkaji gerak balas tumbuhan terhadap pelbagai rangsangan."
      text_en: "Conduct experiments to study plant responses to various stimuli."
      bloom: "apply"
      content_standard_id: "1.3"
    - id: "1.4.1"
      text: "Menjelaskan dengan contoh jenis penglihatan dan pendengaran haiwan."
      text_en: "Explain with examples of types of vision and hearing in animals."
      bloom: "understand"
      content_standard_id: "1.4"
    - id: "1.4.2"
      text: "Berkomunikasi mengenai bagaimana organ deria menjamin kesinambungan haiwan di Bumi."
      text_en: "Communicate how sensory organs ensure the continuity of animals on Earth."
      bloom: "understand"
      content_standard_id: "1.4"
