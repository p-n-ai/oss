topic_id: "SC3-03"
provenance: "ai-generated"
description: "Worked examples for Pengangkutan"
worked_examples:
    - id: "WE-01"
      topic: "Fungsi sistem pengangkutan dalam organisma ringkas"
      difficulty: "easy"
      tp_level: 2
      kbat: false
      learning_objective: "3.1.1"
      real_world_analogy: "Sistem pengangkutan dalam organisma ringkas seperti surat yang dihantar terus dari satu rumah ke rumah lain tanpa perlu melalui pusat pos."
      misconception_alert: "Pelajar sering menganggap semua organisma mempunyai sistem pengangkutan yang kompleks seperti darah, namun organisma ringkas tidak mempunyai sistem sedemikian."
      scenario: "Jelaskan bagaimana organisma ringkas seperti amoeba mendapatkan nutrien dan menyingkirkan bahan buangan."
      working: |
        Step 1: Fahami bahawa organisma ringkas seperti amoeba tidak mempunyai sistem pengangkutan yang kompleks.
        Step 2: Amoeba bergantung kepada proses difusi untuk mendapatkan nutrien dan menyingkirkan bahan buangan.
        Step 3: Nutrien dan oksigen meresap masuk melalui membran sel, manakala bahan buangan bergerak keluar dengan cara yang sama.
    - id: "WE-02"
      topic: "Struktur dan fungsi jantung dalam sistem peredaran darah manusia"
      difficulty: "medium"
      tp_level: 3
      kbat: true
      learning_objective: "3.2.2"
      real_world_analogy: "Jantung seperti pam air yang mengepam air ke seluruh sistem pengairan di kebun."
      misconception_alert: "Pelajar mungkin berfikir bahawa darah hanya mengalir dalam satu arah, tetapi sebenarnya ia beredar melalui dua litar: sistemik dan pulmonari."
      scenario: "Terangkan bagaimana struktur jantung manusia berfungsi untuk mengepam darah ke seluruh badan."
      working: |
        Step 1: Kenal pasti empat ruang utama dalam jantung: dua atrium dan dua ventrikel.
        Step 2: Darah yang kurang oksigen memasuki atrium kanan melalui vena kava.
        Step 3: Darah dipam ke ventrikel kanan dan kemudian ke paru-paru melalui arteri pulmonari untuk pertukaran gas.
        Step 4: Darah beroksigen kembali ke atrium kiri melalui vena pulmonari.
        Step 5: Darah dipam ke ventrikel kiri dan kemudian ke seluruh badan melalui aorta.
        Step 6: Proses ini memastikan darah beredar melalui litar sistemik dan pulmonari.
    - id: "WE-03"
      topic: "Membandingkan sistem peredaran darah dalam haiwan dengan sistem pengangkutan dalam tumbuhan"
      difficulty: "hard"
      tp_level: 5
      kbat: true
      learning_objective: "3.5.1"
      real_world_analogy: "Sistem pengangkutan dalam tumbuhan seperti rangkaian paip yang menghantar air dari takungan ke pelbagai bahagian taman."
      misconception_alert: "Pelajar mungkin tidak menyedari bahawa walaupun tumbuhan dan haiwan mempunyai sistem pengangkutan, mekanisme dan tujuan mereka berbeza."
      scenario: "Bandingkan sistem peredaran darah dalam haiwan dengan sistem pengangkutan dalam tumbuhan."
      working: |-
        Step 1: Fahami bahawa haiwan mempunyai sistem peredaran darah yang menggunakan darah sebagai medium pengangkutan.
        Step 2: Sistem pengangkutan dalam tumbuhan terdiri daripada tisu xilem dan floem.
        Step 3: Dalam haiwan, jantung mengepam darah yang mengandungi nutrien dan oksigen ke seluruh badan.
        Step 4: Dalam tumbuhan, xilem mengangkut air dan mineral dari akar ke daun, manakala floem mengedarkan hasil fotosintesis dari daun ke bahagian lain tumbuhan.
        Step 5: Bandingkan pergerakan darah dalam haiwan yang dipacu oleh jantung dengan pergerakan air dalam tumbuhan yang bergantung pada transpirasi dan tekanan akar.
        Step 6: Kesimpulannya, kedua-dua sistem berfungsi untuk mengedarkan bahan penting tetapi dengan cara dan struktur yang berbeza.
