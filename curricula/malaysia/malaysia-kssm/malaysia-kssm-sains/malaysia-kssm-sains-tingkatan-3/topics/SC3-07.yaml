teaching:
    sequence:
        - 'Introduction to Work and Energy: Define and provide examples (15 min)'
        - 'Exploring Gravitational Potential Energy: Use real-world examples (20 min)'
        - 'Elastic Potential Energy: Calculate and discuss applications (20 min)'
        - 'Kinetic Energy in Daily Life: Explain with examples (15 min)'
        - 'Principle of Energy Conservation: Demonstrate with experiments (20 min)'
    common_misconceptions:
        - misconception: Energy is only present when objects move
          remediation: Use examples of potential energy at rest, like a book on a shelf
        - misconception: Power and energy are the same
          remediation: Highlight that power is the rate at which work is done
        - misconception: Potential energy only exists when objects move vertically
          remediation: Explain horizontal potential energy scenarios, like a compressed spring
