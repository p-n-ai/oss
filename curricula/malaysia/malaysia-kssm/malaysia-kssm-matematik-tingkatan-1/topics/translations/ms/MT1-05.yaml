id: MT1-05
official_ref: "Bab 5"
name: "Ungkapan Algebra (Algebraic Expressions)"
subject_id: malaysia-kssm-matematik-tingkatan-1
syllabus_id: malaysia-kssm

content_standards:
  - id: 5.1
    text: "Pemboleh ubah dan ungkapan algebra"
  - id: 5.2
    text: "Ungkapan algebra yang melibatkan operasi asas aritmetik"

learning_objectives:
  - id: 5.1.1
    text: "Menggunakan huruf untuk mewakilkan kuantiti yang tidak diketahui nilai. Seterusnya menyatakan sama ada pemboleh ubah itu mempunyai nilai yang tetap atau nilai yang berubah dengan memberi justifikasi."
  - id: 5.1.2
    text: "Menerbitkan ungkapan algebra berdasarkan ungkapan aritmetik yang mewakili suatu situasi."
  - id: 5.1.3
    text: "Menentukan nilai ungkapan algebra apabila nilai pemboleh ubah diberi dan membuat perkaitan dengan situasi yang sesuai."
  - id: 5.1.4
    text: "Mengenal pasti sebutan dalam suatu ungkapan algebra. Seterusnya menyatakan pekali yang mungkin bagi sebutan algebra."
  - id: 5.1.5
    text: "Mengenal pasti sebutan serupa dan sebutan tidak serupa."
  - id: 5.2.1
    text: "Menambah dan menolak dua atau lebih ungkapan algebra."
  - id: 5.2.2
    text: "Membuat generalisasi tentang pendaraban berulang ungkapan algebra."
  - id: 5.2.3
    text: "Mendarab dan membahagi ungkapan algebra yang mengandungi satu sebutan."

performance_standards:
  - level: 1
    text: "Mempamerkan pengetahuan asas tentang pemboleh ubah dan ungkapan algebra."
  - level: 2
    text: "Mempamerkan kefahaman tentang pemboleh ubah dan ungkapan algebra."
  - level: 3
    text: "Mengaplikasikan kefahaman tentang ungkapan algebra untuk melaksanakan tugasan mudah."
  - level: 4
    text: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ungkapan algebra dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    text: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ungkapan algebra dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    text: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ungkapan algebra dalam konteks penyelesaian masalah bukan rutin secara kreatif."
