id: MT1-06
official_ref: "Bab 6"
name: "Persamaan Linear (Linear Equations)"
subject_id: malaysia-kssm-matematik-tingkatan-1
syllabus_id: malaysia-kssm

content_standards:
  - id: 6.1
    text: "Persamaan linear dalam satu pemboleh ubah"
  - id: 6.2
    text: "Persamaan linear dalam dua pemboleh ubah"
  - id: 6.3
    text: "Persamaan linear serentak dalam dua pemboleh ubah"

learning_objectives:
  - id: 6.1.1
    text: "Mengenal pasti persamaan linear dalam satu pemboleh ubah dan menghuraikan ciri-ciri persamaan tersebut."
  - id: 6.1.2
    text: "Membentuk persamaan linear dalam satu pemboleh ubah berdasarkan suatu penyataan atau situasi, dan sebaliknya."
  - id: 6.1.3
    text: "Menyelesaikan persamaan linear dalam satu pemboleh ubah."
  - id: 6.1.4
    text: "Menyelesaikan masalah yang melibatkan persamaan linear dalam satu pemboleh ubah."
  - id: 6.2.1
    text: "Mengenal pasti persamaan linear dalam dua pemboleh ubah dan menghuraikan ciri-ciri persamaan tersebut."
  - id: 6.2.2
    text: "Membentuk persamaan linear dalam dua pemboleh ubah berdasarkan suatu penyataan atau situasi, dan sebaliknya."
  - id: 6.2.3
    text: "Menentu dan menjelaskan penyelesaian yang mungkin bagi persamaan linear dalam dua pemboleh ubah."
  - id: 6.2.4
    text: "Mewakilkan persamaan linear dalam dua pemboleh ubah secara graf."
  - id: 6.3.1
    text: "Membentuk persamaan linear serentak berdasarkan situasi harian. Seterusnya mewakilkan persamaan linear serentak dalam dua pemboleh ubah secara graf dan menjelaskan maksud persamaan linear serentak."
  - id: 6.3.2
    text: "Menyelesaikan persamaan linear serentak dalam dua pemboleh ubah menggunakan pelbagai kaedah."
  - id: 6.3.3
    text: "Menyelesaikan masalah yang melibatkan persamaan linear serentak dalam dua pemboleh ubah."

performance_standards:
  - level: 1
    text: "Mempamerkan pengetahuan asas tentang persamaan linear."
  - level: 2
    text: "Mempamerkan kefahaman tentang persamaan linear dan persamaan linear serentak."
  - level: 3
    text: "Mengaplikasikan kefahaman tentang penyelesaian persamaan linear dan persamaan linear serentak."
  - level: 4
    text: "Mengaplikasikan kefahaman dan kemahiran yang sesuai tentang persamaan linear dan persamaan linear serentak dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    text: "Mengaplikasikan kefahaman dan kemahiran yang sesuai tentang persamaan linear dan persamaan linear serentak dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    text: "Mengaplikasikan kefahaman dan kemahiran yang sesuai tentang persamaan linear dan persamaan linear serentak dalam konteks penyelesaian masalah bukan rutin."
