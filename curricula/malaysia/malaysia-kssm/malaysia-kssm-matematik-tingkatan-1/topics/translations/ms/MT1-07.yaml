id: MT1-07
official_ref: "Bab 7"
name: "Ketaksamaan Linear (Linear Inequalities)"
subject_id: malaysia-kssm-matematik-tingkatan-1
syllabus_id: malaysia-kssm

content_standards:
  - id: 7.1
    text: "Ketaksamaan"
  - id: 7.2
    text: "Ketaksamaan linear dalam satu pemboleh ubah"

learning_objectives:
  - id: 7.1.1
    text: "Membanding nilai nombor, memerihal ketaksamaan dan seterusnya menerbitkan ketaksamaan algebra."
  - id: 7.1.2
    text: "Membuat generalisasi tentang ketaksamaan yang berkaitan dengan (i) sifat akas dan transitif, songsangan terhadap penambahan dan pendaraban, (ii) operasi asas aritmetik."
  - id: 7.2.1
    text: "Membentuk ketaksamaan linear berdasarkan suatu situasi kehidupan harian, dan sebaliknya."
  - id: 7.2.2
    text: "Menyelesaikan masalah yang melibatkan ketaksamaan linear dalam satu pemboleh ubah."
  - id: 7.2.3
    text: "Menyelesaikan ketaksamaan linear serentak dalam satu pemboleh ubah."

performance_standards:
  - level: 1
    text: "Mempamerkan pengetahuan asas tentang ketaksamaan linear dalam satu pemboleh ubah."
  - level: 2
    text: "Mempamerkan kefahaman tentang ketaksamaan linear dalam satu pemboleh ubah."
  - level: 3
    text: "Mengaplikasikan kefahaman tentang ketaksamaan linear dalam satu pemboleh ubah untuk melaksanakan tugasan mudah."
  - level: 4
    text: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ketaksamaan linear dalam satu pemboleh ubah dalam konteks penyelesaian masalah rutin yang mudah."
  - level: 5
    text: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ketaksamaan linear dalam satu pemboleh ubah dalam konteks penyelesaian masalah rutin yang kompleks."
  - level: 6
    text: "Mengaplikasikan pengetahuan dan kemahiran yang sesuai tentang ketaksamaan linear dalam satu pemboleh ubah dalam konteks penyelesaian masalah bukan rutin."
